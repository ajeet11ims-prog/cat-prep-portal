  <script>
    const questions = [{"no":1,"itemId":33041,"source":"Careerlauncher Logical Reasoning Intermediate | Q1 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Refer to the data below and answer the questions that follow.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003eFive Englishmen met at a restaurant and had breakfast comprising of bacon and eggs. The number of slices of bacon consumed are 2, 8, 10, 12 and 16, while the number of eggs consumed are 0, 2, 4, 8 and 12.\u003c/p\u003e\u003cp\u003eBelow are some more facts about who eats what and how much.\u003c/p\u003e\u003cp\u003ea) The number of eggs eaten by Ignatius is three times the number of eggs eaten by the person who ate 8 slices of bacon.\u003c/p\u003e\u003cp\u003eb) Three persons, including the one who ate 8 eggs, ate without sauce.\u003c/p\u003e\u003cp\u003ec) Sandhurst did not take any sauce.\u003c/p\u003e\u003cp\u003ed) The one who ate 2 slices of bacon did not eat any eggs or take sauce. Further, he was not Murdoch.\u003c/p\u003e\u003cp\u003ee) Dalton ate bacon with sauce and also ate eggs.\u003c/p\u003e\u003cp\u003ef) Murdoch, who did not take sauce, ate half as many eggs as the person who ate twice as many slices of bacon as Murdoch did.\u003c/p\u003e\u003cp\u003eg) Bimmy ate four more slices of bacon than Ignatius, but Ignatius ate four more eggs than Bimmy.\u003c/p\u003e","question":"\u003cp\u003eWhich of the following statements is not true?\u003c/p\u003e","options":["\u003cp\u003eExactly one person ate equal number of eggs and slices of bacon.\u003c/p\u003e","\u003cp\u003eSandhurst did not eat eggs.\u003c/p\u003e","\u003cp\u003eBimmy and Ignatius did not eat sauce.\u003c/p\u003e","\u003cp\u003eDalton ate 10 slices of bacon.\u003c/p\u003e"],"answer":2,"typedAnswer":"Bimmy and Ignatius did not eat sauce.","solution":""},{"no":2,"itemId":33045,"source":"Careerlauncher Logical Reasoning Intermediate | Q2 | Medium","type":"text","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions on the basis of the following information.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003eA code language used by spies during the second world war substituted numbers with letters from the English alphabet. Each letter represented just one decimal digit and different letters were used to represent different digits. Consider the following simple sums written in that code language:\u003c/p\u003e\u003cp\u003ePP + PL = XLP and QZH + QZH + QZH = XQZX\u003c/p\u003e","question":"\u003cp\u003eHow many divisors does the number P x Q x Z x H have?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e[quizky-text]\u003c/p\u003e","options":["\u003cp\u003e18\u003c/p\u003e","\u003cp\u003e36\u003c/p\u003e","\u003cp\u003e24\u003c/p\u003e","\u003cp\u003e48\u003c/p\u003e"],"answer":1,"typedAnswer":"36","solution":""},{"no":3,"itemId":33046,"source":"Careerlauncher Logical Reasoning Intermediate | Q3 | Easy","type":"text","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions on the basis of the following information.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003eA code language used by spies during the second world war substituted numbers with letters from the English alphabet. Each letter represented just one decimal digit and different letters were used to represent different digits. Consider the following simple sums written in that code language:\u003c/p\u003e\u003cp\u003ePP + PL = XLP and QZH + QZH + QZH = XQZX\u003c/p\u003e","question":"\u003cp\u003eHow many prime numbers that are less than 100 can we form using the digits represented by P, X, Q, Z, H without repetition?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e[quizky-text]\u003c/p\u003e","options":["\u003cp\u003e8\u003c/p\u003e","\u003cp\u003e10\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e","\u003cp\u003e12\u003c/p\u003e"],"answer":1,"typedAnswer":"10","solution":""},{"no":4,"itemId":33047,"source":"Careerlauncher Logical Reasoning Intermediate | Q4 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions on the basis of the following information.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003eA code language used by spies during the second world war substituted numbers with letters from the English alphabet. Each letter represented just one decimal digit and different letters were used to represent different digits. Consider the following simple sums written in that code language:\u003c/p\u003e\u003cp\u003ePP + PL = XLP and QZH + QZH + QZH = XQZX\u003c/p\u003e","question":"\u003cp\u003eHow many even natural numbers less than 100 can be formed using all the digits that are decoded (not more than once)?\u003c/p\u003e","options":["\u003cp\u003eXP\u003c/p\u003e","\u003cp\u003eZ\u003c/p\u003e","\u003cp\u003eXL\u003c/p\u003e","\u003cp\u003eNone of these\u003c/p\u003e"],"answer":2,"typedAnswer":"XL","solution":""},{"no":5,"itemId":33050,"source":"Careerlauncher Logical Reasoning Intermediate | Q5 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Refer to the data below and answer the questions that follow.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003eFor a renovation of a house, some workers were appointed. There were two carpenters (D, G), two painters (B, I), two plumbers (E, J) and two electricians (A, K). Two workers (F, H) can do carpentry as well as plumbing. One worker (C) can do carpentry as well as painting. These workers work in two shifts, viz, morning and evening. Each shift should have three carpenters, two plumbers, one electrician and at most two painters.\u003c/p\u003e\u003cp\u0     const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));

    let current = 0, submitted = false, secondsLeft = 60 * 60;

    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
        function isMcq(q){const t=String(q.type||'').toLowerCase();return t==='mcq'||t==='radio'||(Array.isArray(q.options)&&q.options.length>0);}
    function isTextQuestion(q){return !isMcq(q);}

    function typedCorrect(q){return String(q.typedAnswer ?? q.correct ?? q.answerText ?? q.answer ?? '').trim();}
    function correctText(q){if(isMcq(q)){const idx=correctIndex(q);return "(" + labels[idx] + ") " + stripHtml((q.options||[])[idx] || typedCorrect(q));}return typedCorrect(q);}

    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(directionHtml(q),'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+questionHtml(q)+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}

    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(isMcq(q))return Number(ans)===correctIndex(q);return norm(ans)===norm(typedCorrect(q));}

    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
