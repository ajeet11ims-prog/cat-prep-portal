  <script>
    const questions = [{"no":1,"itemId":32281,"source":"Careerlauncher Arithmetic Advance | Q1 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003c/span\u003e Three\r\n  pipes P, Q and R, when functioning alone, can fill a pool in 4, 8 and 12\r\n  hours respectively, while another pipe S, functioning alone, can empty the\r\n  completely filled pool in 10 hours. Which of the following arrangements will\r\n  fill the pool in the least possible time?\u003cspan\u003e","options":["\u003c/span\u003e Q\r\n  alone is opened.\u003cspan\u003e","\u003c/span\u003e P and\r\n  S are opened together.\u003cspan\u003e","\u003c/span\u003e P, Q\r\n  and S are opened together.\u003cspan\u003e","\u003c/span\u003e Q, R\r\n  and S are opened together.\u003cspan\u003e"],"answer":2,"typedAnswer":"P, Q and S are opened together.","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":2,"itemId":32286,"source":"Careerlauncher Arithmetic Advance | Q2 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eThere are two beakers I and II filled with 100 ml of alcohol and 100 ml of water respectively. First, 10 ml of water is poured from beaker II to beaker I. Then, 11 ml mixture from beaker I is poured back into beaker II. Then from this new mixture in beaker II, 1 ml is poured back into beaker I. Which of the following statements is true?\u003c/p\u003e","options":["\u003c/span\u003e There\r\n  is more water in beaker I than alcohol in beaker II.\u003cspan\u003e","\u003c/span\u003e There\r\n  is more alcohol in beaker I than water in beaker II.\u003cspan\u003e","\u003c/span\u003e\r\n  Neither [1] nor [2]\u003cspan\u003e","\u003c/span\u003e Both\r\n  [1] and [2]\u003cspan\u003e"],"answer":2,"typedAnswer":"Neither [1] nor [2]","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":3,"itemId":32298,"source":"Careerlauncher Arithmetic Advance | Q3 | Reconstructed","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Refer to the data below and answer the questions that follow.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eA rectangular tank 15 m x 7 m x 10 m can be filled by pipe A alone in 5 hours and by pipe B alone in 8 hours. Pipe C at the bottom can empty the completely filled tank in 15 hours. Pipe D is 5 m above pipe C and can empty a completely filled tank up to that level in 6 hours. If the tank is initially empty and all pipes function simultaneously, in how much time will the tank be filled? Assume the tank height is 10 m.\u003c/p\u003e","options":["\u003cp\u003e1040/217 hours\u003c/p\u003e","\u003cp\u003e60/31 hours\u003c/p\u003e","\u003cp\u003e20/7 hours\u003c/p\u003e","\u003cp\u003e217/1040 hours\u003c/p\u003e"],"answer":0,"typedAnswer":"1040/217 hours","solution":"\u003cp\u003eUntil the water reaches 5 m, pipe D does not operate. Net filling rate = 1/5 + 1/8 - 1/15 = 31/120 tank/hour. Time to fill half tank = (1/2)/(31/120) = 60/31 hours.\u003c/p\u003e\u003cp\u003eFor the remaining half, D also operates. Net rate = 1/5 + 1/8 - 1/15 - 1/12 = 7/40 tank/hour. Time = (1/2)/(7/40) = 20/7 hours.\u003c/p\u003e\u003cp\u003eTotal time = 60/31 + 20/7 = 1040/217 hours.\u003c/p\u003e"},{"no":4,"itemId":36467,"source":"Careerlauncher Arithmetic Advance | Q4 | Reconstructed","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eShanti started her homework assignment between 3 o clock and 4 o clock. When she completed her assignment between 5 o clock and 6 o clock, she found the hour and minute hand positions to be the same as the minute and hour hand positions respectively when she started. How long did she spend on the assignment?\u003c/p\u003e","options":["\u003cp\u003e1 hour 50 minutes 46 seconds\u003c/p\u003e","\u003cp\u003e1 hour 45 minutes\u003c/p\u003e","\u003cp\u003e1 hour 54 minutes 33 seconds\u003c/p\u003e","\u003cp\u003e2 hours 10 minutes\u003c/p\u003e"],"answer":0,"typedAnswer":"1 hour 50 minutes 46 seconds","solution":"\u003cp\u003eLet the start time be 3:m and the end time be 5:n.\u003c/p\u003e\u003cp\u003eSwapped positions give 150 + n/2 = 6m and 6n = 90 + m/2.\u003c/p\u003e\u003cp\u003eSolving gives m = 3780/143 minutes and n = 2460/143 minutes. Duration = 1 hour + (n + 60 - m) minutes = 110.77 minutes, approximately 1 hour 50 minutes 46 seconds.\u003c/p\u003e"},{"no":5,"itemId":36478,"source":"Careerlauncher Arithmetic Advance | Q5 | Difficult.","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e In a\r\n  group there are a certain number of boys and girls. A girl works one and a\r\n  half times faster than a boy. If they work together, they finish the work in\r\n  5 days. If the number of boys and girls are interchanged and one more girl is\r\n  added to the group, then working together, they finish the work in 4 days. In\r\n  how many days can they finish the work if the original number of boys and\r\n  girls work with an efficiency which is 250% of a boy\u0027s efficiency and one\r\n  girl who works with the original efficiency joins them?\u003cspan\r\n \u003e","options":["\u003c/span\u003e 3.33\r\n  days\u003cspan\u003e","\u003c/span\u003e 2.22\r\n  days\u003cspan\u003e","\u003c/span\u003e 1 day\u003cspan\r\n \u003e","\u003c/span\u003e\r\n  Cannot be determined\u003cspan\u003e"],"answer":1,"typedAnswer":"2.22 days","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":6,"itemId":36487,"source":"Careerlauncher Arithmetic Advance | Q6 | Difficult.","type":"mcq","direction":"\u003c/span\u003e\r\n  Answer the questions independently of each other.\u003cspan\u003e","passage":"","question":"\u003c/span\u003e\r\n  Rs.25000 is divided into two unequal parts. One part is invested in a simple\r\n  interest scheme and other is invested in a compound interest scheme. The rate\r\n  of interest and period of investment are the same for both the schemes and\r\n  are equal to 15% and 2 years respectively. After 2 years the amount obtained\r\n  from the simple interest scheme is more than that obtained from the compound\r\n  interest scheme by Rs.1030. Had we interchanged the invested amounts in the\r\n  two schemes then what would be the difference in amounts obtained after 3\r\n  years at the same rate of interest?\u003cspan\u003e","options":["\u003c/span\u003e\r\n  Rs.1300\u003cspan\u003e","\u003c/span\u003e\r\n  Rs.2371\u003cspan\u003e","\u003c/span\u003e\r\n  Rs.2871\u003cspan\u003e","\u003c/span\u003e\r\n  Rs.3230\u003cspan\u003e"],"answer":1,"typedAnswer":"Rs.2371","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":7,"itemId":36530,"source":"Careerlauncher Arithmetic Advance | Q7 | Reconstructed","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eIn a 1000 metres race, Manish gives Ravi a headstart of 40 metres and beats him by 19 seconds. If Manish gives Ravi a headstart of 30 seconds, then Ravi beats Manish by 40 metres. Find the ratio of Manish speed to Ravi speed.\u003c/p\u003e","options":["\u003cp\u003e6 : 5\u003c/p\u003e","\u003cp\u003e5 : 6\u003c/p\u003e","\u003cp\u003e4 : 3\u003c/p\u003e","\u003cp\u003e3 : 2\u003c/p\u003e"],"answer":0,"typedAnswer":"6 : 5","solution":"\u003cp\u003eLet Ravi speed be r and Manish speed be m.\u003c/p\u003e\u003cp\u003eFirst race: 960/r - 1000/m = 19.\u003c/p\u003e\u003cp\u003eSecond race: 1000/r - 30 = 960/m.\u003c/p\u003e\u003cp\u003eSolving these equations gives r = 20/3 and m = 8. Hence m : r = 8 : 20/3 = 6 : 5.\u003c/p\u003e"},{"no":8,"itemId":36531,"source":"Careerlauncher Arithmetic Advance | Q8 | Difficult.","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e A\r\n  business house has three companies A, B and C and one trust D. Each company\r\n  contributes 5% of its own revenue, calculated after excluding loans taken\r\n  from group companies, to the trust. A lent B 10% of B\u0027s revenue. Considering\r\n  the loan from A and B\u0027s revenue, B has twice as much money as C\u0027s revenue. C\r\n  had taken no loan from A or B, and gave the trust Rs.10000. How much\r\n  approximately did B contribute to the trust?\u003cspan\u003e","options":["\u003c/span\u003e\r\n  Rs.17000\u003cspan\u003e","\u003c/span\u003e\r\n  Rs.18000\u003cspan\u003e","\u003c/span\u003e\r\n  Rs.20000\u003cspan\u003e","\u003c/span\u003e\r\n  Cannot be determined\u003cspan\u003e"],"answer":1,"typedAnswer":"Rs.18000","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":9,"itemId":36539,"source":"Careerlauncher Arithmetic Advance | Q9 | Difficult.","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e John\r\n  sells cornflour at the rate of Rs.5.10 per kg and gains a profit of 20%. If\r\n  he decreases the price so as to gain only 25 p. per kg, what should be the\r\n  ratio in which the sales should increase so as to get the same amount of\r\n  profit?\u003cspan\u003e","options":["\u003c/span\u003e 5 :\r\n  17\u003cspan\u003e","\u003c/span\u003e 1 : 3\u003cspan\r\n \u003e","\u003c/span\u003e 17 :\r\n  5\u003cspan\u003e","\u003c/span\u003e 12 :\r\n  17\u003cspan\u003e"],"answer":0,"typedAnswer":"5 : 17","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":10,"itemId":36548,"source":"Careerlauncher Arithmetic Advance | Q10 | ","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eVijay takes a loan of Rs.5000 from Ajay at a simple interest of 5% p.a. and agrees to pay it back in 3 years. Ajay gives him 2 options, either to pay the full amount with the interest at the end of the 3 years or pay the amount in 3 equal annual installments. Vijay chooses the option in which he has to pay less interest. What is the total amount that Vijay pays?\u003c/p\u003e","options":["\u003cp\u003eRs.5750\u003c/p\u003e","\u003cp\u003eRs.5508\u003c/p\u003e","\u003cp\u003eRs.5974\u003c/p\u003e","\u003cp\u003eNone of these\u003c/p\u003e"],"answer":1,"typedAnswer":"Rs.5508","solution":""},{"no":11,"itemId":36549,"source":"Careerlauncher Arithmetic Advance | Q11 | Reconstructed","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eTwo persons A and B could finish a work together in x days. Initially, B worked for y days and was later joined by A. The remaining work was completed by them together in z days. In how many days could each of them finish the work individually?\u003c/p\u003e","options":["\u003cp\u003eA = xy/(y - x + z), B = xy/(x - z)\u003c/p\u003e","\u003cp\u003eA = xy/(x - z), B = xy/(y - x + z)\u003c/p\u003e","\u003cp\u003eA = x(y + z)/y, B = x(y + z)/z\u003c/p\u003e","\u003cp\u003eNone of these\u003c/p\u003e"],"answer":0,"typedAnswer":"A = xy/(y - x + z), B = xy/(x - z)","solution":"\u003cp\u003eCombined rate of A and B is 1/x.\u003c/p\u003e\u003cp\u003eIf B rate is b, then by + z/x = 1, so b = (x - z)/(xy). Hence B alone takes xy/(x - z) days.\u003c/p\u003e\u003cp\u003eA rate = 1/x - b = (y - x + z)/(xy). Hence A alone takes xy/(y - x + z) days.\u003c/p\u003e"},{"no":12,"itemId":36555,"source":"Careerlauncher Arithmetic Advance | Q12 | Difficult.","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e John\r\n  sells cornflour at the rate of Rs.5.10 per kg and gains a profit of 20%. If\r\n  he decreases the price so as to gain only 25 p. per kg, what should be the\r\n  ratio in which the sales should increase so as to get the same amount of\r\n  profit?\u003cspan\u003e","options":["\u003c/span\u003e 5 :\r\n  17\u003cspan\u003e","\u003c/span\u003e 1 : 3\u003cspan\r\n \u003e","\u003c/span\u003e 17 :\r\n  5\u003cspan\u003e","\u003c/span\u003e 12 :\r\n  17\u003cspan\u003e"],"answer":0,"typedAnswer":"5 : 17","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":13,"itemId":98723,"source":"Careerlauncher Arithmetic Advance | Q13 | ","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eA chemical plant has four tanks (A, B, C and D) each containing 1000 litres of a chemical. The chemical is being pumped from one tank to another as follows :\u003cbr /\u003e From A to B @ 20 litres/minute\u003cbr /\u003e From C to A @ 90 litres/minute\u003cbr /\u003e From A to D @ 10 litres/minute\u003cbr /\u003e From C to D @ 50 litres/minute\u003cbr /\u003e From B to C @ 100 litres/minute\u003cbr /\u003e From D to B @ 110 litres/minute\u003cbr /\u003e Which tank gets emptied first, and how long does it take (in minutes) to get empty after pumping starts?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2005)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003eA, 16.66\u003c/p\u003e","\u003cp\u003eC, 20\u003c/p\u003e","\u003cp\u003eD, 20\u003c/p\u003e","\u003cp\u003eD, 25\u003c/p\u003e"],"answer":2,"typedAnswer":"D, 20","solution":""},{"no":14,"itemId":98783,"source":"Careerlauncher Arithmetic Advance | Q14 | Difficult","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eRahim plans to drive from city A to station C, at the speed of 70 km per hour, to catch a train arriving there from B. He must reach C at least 15 minutes before the arrival of the train. The train leaves B, located 500 km south of A, at 8:00 am and travels at a speed of 50 km per hour. It is known that C is located between west and northwest of B, with BC at 60° to AB. Also, C is located between south and southwest of A with AC at 30° to AB. The latest time by which Rahim must leave A and still catch the train is closest to \u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2008)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e6:15 am\u003c/p\u003e","\u003cp\u003e6:30 am \u003c/p\u003e","\u003cp\u003e6:45 am\u003c/p\u003e","\u003cp\u003e7:00 am\u003c/p\u003e","\u003cp\u003e7:15 am \u003c/p\u003e"],"answer":1,"typedAnswer":"6:30 am","solution":""},{"no":15,"itemId":32271,"source":"Careerlauncher Arithmetic Advance | Q15 | Reconstructed","type":"text","direction":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eA thief escapes from prison and runs at 40 m/min. A police officer starts following the thief after 5 minutes at 50 m/min. The officer has a dog that runs at 60 m/min. The dog runs to the thief and comes back to the police to show him the direction. It keeps moving to and fro between them until the police catches the thief. Find the distance travelled by the dog in the direction of the thief.\u003c/p\u003e\u003cp\u003eEnter your response as an integer in metres.\u003c/p\u003e","options":["\u003cp\u003e1100\u003c/p\u003e"],"answer":0,"typedAnswer":"1100","solution":"\u003cp\u003eThe thief gets a 5 minute lead, so the initial gap is 40 x 5 = 200 m.\u003c/p\u003e\u003cp\u003eThe police catches the thief after 200/(50 - 40) = 20 minutes.\u003c/p\u003e\u003cp\u003eOnly the dog runs towards the thief in alternating forward trips. The forward distances form a geometric series: 600, then 600 x 5/11, then 600 x (5/11)^2, and so on.\u003c/p\u003e\u003cp\u003eTotal forward distance = 600/(1 - 5/11) = 1100 m.\u003c/p\u003e"},{"no":16,"itemId":98746,"source":"Careerlauncher Arithmetic Advance | Q16 | Difficult","type":"mcq","direction":"","passage":"\u003cp\u003e\u003cem\u003e\u003cstrong\u003eRefer to the data below and answer the questions that follow.\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003eRam and Shyam run a race between points A and B, 5 km apart. Ram starts at 9 a.m. from A at a speed of 5 km/hr, reaches B and returns to A at the same speed. Shyam starts at 9:45 a.m. from A at a speed of 10 km/hr, reaches B and comes back to A at the same speed.\u003c/p\u003e","question":"\u003cp\u003e \u003c/p\u003e\n\u003cp\u003eAt what time do Ram and Shyam first meet each other?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2005)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e10 a.m.\u003c/p\u003e","\u003cp\u003e10:10 a.m.\u003c/p\u003e","\u003cp\u003e10:20 a.m.\u003c/p\u003e","\u003cp\u003e10:30 a.m.\u003c/p\u003e"],"answer":1,"typedAnswer":"10:10 a.m.","solution":""},{"no":17,"itemId":98757,"source":"Careerlauncher Arithmetic Advance | Q17 | Difficult","type":"mcq","direction":"","passage":"\u003cp\u003e\u003cem\u003e\u003cstrong\u003eRefer to the data below and answer the questions that follow.\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003eRam and Shyam run a race between points A and B, 5 km apart. Ram starts at 9 a.m. from A at a speed of 5 km/hr, reaches B and returns to A at the same speed. Shyam starts at 9:45 a.m. from A at a speed of 10 km/hr, reaches B and comes back to A at the same speed.\u003c/p\u003e","question":"\u003cp\u003e \u003c/p\u003e\n\u003cp\u003eAt what time does Shyam overtake Ram?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2005)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e10:20 a.m.\u003c/p\u003e","\u003cp\u003e10:30 a.m.\u003c/p\u003e","\u003cp\u003e10:40 a.m.\u003c/p\u003e","\u003cp\u003e10:50 a.m.\u003c/p\u003e"],"answer":1,"typedAnswer":"10:30 a.m.","solution":""},{"no":18,"itemId":98777,"source":"Careerlauncher Arithmetic Advance | Q18 | Reconstructed","type":"mcq","direction":"\u003cp\u003e\u003cem\u003e\u003cstrong\u003eRefer to the data given below and answer the questions that follow.\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eShabnam is considering three alternatives to invest her surplus cash for a week. She wishes to guarantee maximum returns on her investment. She has three options, each of which can be utilized fully or partially with others.\u003c/p\u003e\u003cp\u003eOption A: Invest in a public sector bank. It promises a return of +0.10%.\u003c/p\u003e\u003cp\u003eOption B: Invest in mutual funds of ABC Ltd. A rise in the stock market will result in a return of +5%, while a fall will entail a return of -3%.\u003c/p\u003e\u003cp\u003eOption C: Invest in mutual funds of CBA Ltd. A rise in the stock market will result in a return of -2.5%, while a fall will entail a return of +2%.\u003c/p\u003e\u003cp\u003eWhat strategy will maximize the guaranteed return to Shabnam?\u003c/p\u003e","options":["\u003cp\u003e64% in option B and 36% in option C\u003c/p\u003e","\u003cp\u003e36% in option B and 64% in option C\u003c/p\u003e","\u003cp\u003e30% in option A, 32% in option B and 38% in option C\u003c/p\u003e","\u003cp\u003e100% in option A\u003c/p\u003e"],"answer":1,"typedAnswer":"36% in option B and 64% in option C","solution":"\u003cp\u003eLet x be the investment fraction in option B and 1 - x in option C.\u003c/p\u003e\u003cp\u003eReturn if market rises = 5x - 2.5(1 - x). Return if market falls = -3x + 2(1 - x).\u003c/p\u003e\u003cp\u003eFor maximum guaranteed return, equate both: 5x - 2.5 + 2.5x = -3x + 2 - 2x. So 12.5x = 4.5 and x = 36%.\u003c/p\u003e\u003cp\u003eThus invest 36% in B and 64% in C.\u003c/p\u003e"}];

    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
