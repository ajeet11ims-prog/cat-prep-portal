tom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}

  <script>
    const questions = [{"no":1,"itemId":98722,"source":"Careerlauncher Numbers Basic | Q1 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe remainder, when (15\u003csup\u003e23\u003c/sup\u003e + 23\u003csup\u003e23\u003c/sup\u003e) is divided by 19, is\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2004)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e4\u003c/p\u003e","\u003cp\u003e15\u003c/p\u003e","\u003cp\u003e0\u003c/p\u003e","\u003cp\u003e18\u003c/p\u003e"],"answer":2,"typedAnswer":"0","solution":""},{"no":2,"itemId":98745,"source":"Careerlauncher Numbers Basic | Q2 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eIf x = (16\u003csup\u003e3\u003c/sup\u003e + 17\u003csup\u003e3\u003c/sup\u003e + 18\u003csup\u003e3\u003c/sup\u003e + 19\u003csup\u003e3\u003c/sup\u003e), then x divided by 70 leaves a remainder of\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2005)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e0\u003c/p\u003e","\u003cp\u003e1\u003c/p\u003e","\u003cp\u003e69\u003c/p\u003e","\u003cp\u003e35\u003c/p\u003e"],"answer":0,"typedAnswer":"0","solution":""},{"no":3,"itemId":31818,"source":"Careerlauncher Numbers Basic | Q3 | Reconstructed","type":"mcq","direction":"","passage":"","question":"\u003cp\u003eFind the least positive integer n such that the product n x 646 is divisible by 897.\u003c/p\u003e","options":["\u003cp\u003e885\u003c/p\u003e","\u003cp\u003e323\u003c/p\u003e","\u003cp\u003e896\u003c/p\u003e","\u003cp\u003e897\u003c/p\u003e"],"answer":3,"typedAnswer":"897","solution":"\u003cp\u003e646 = 17 x 19 x 2 and 897 = 3 x 23 x 13. Thus 646 and 897 are co-prime.\u003c/p\u003e\u003cp\u003eFor n x 646 to be divisible by 897, n must be a multiple of 897. The least such positive integer is 897.\u003c/p\u003e"},{"no":4,"itemId":31819,"source":"Careerlauncher Numbers Basic | Q4 | Easy","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003eWhen asked about their ages, Ram and Rohit said that their ages are odd integers and sum of square of their ages is 729. If Ram is older than Rohit, then find the age of Rohit.\u003c/p\u003e","options":["\u003cp\u003e21 years\u003c/p\u003e","\u003cp\u003e23 years\u003c/p\u003e","\u003cp\u003e19 years\u003c/p\u003e","\u003cp\u003eRam and Rohit are lying\u003c/p\u003e"],"answer":3,"typedAnswer":"Ram and Rohit are lying","solution":"\u003cp\u003eLet the ages of Ram and Rohit be a and b years respectively.\u003cbr /\u003e Squares of odd numbers end in 1, 5 or 9.\u003cbr /\u003e Each of a2 and b2 will end in 1, 5 or 9 and hence a2 + b2 will end in 0, 2, 4, 6 or 8.\u003cbr /\u003e But Ram and Rohit are saying that sum of square of their ages is 729 (which ends in 9), which is not possible. \u003cbr /\u003e Hence, [4].\u003c/p\u003e"},{"no":5,"itemId":31830,"source":"Careerlauncher Numbers Basic | Q5 | Easy","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003en being any odd number greater than 1, n\u003csup\u003e65\u003c/sup\u003e – n is always divisible by:\u003c/p\u003e","options":["\u003cp\u003e7\u003c/p\u003e","\u003cp\u003e13\u003c/p\u003e","\u003cp\u003e24\u003c/p\u003e","\u003cp\u003e21\u003c/p\u003e"],"answer":2,"typedAnswer":"24","solution":""},{"no":6,"itemId":31833,"source":"Careerlauncher Numbers Basic | Q6 | Easy","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003eRam visits the Recreation club every 5 days, Harish visits every 24 days, while Rajesh goes there after every 9 days. If all three of them met at the club last time on a Sunday on what day of the week will all three meet again?\u003c/p\u003e","options":["\u003cp\u003eSunday\u003c/p\u003e","\u003cp\u003eThursday\u003c/p\u003e","\u003cp\u003eWednesday\u003c/p\u003e","\u003cp\u003eMonday\u003c/p\u003e"],"answer":2,"typedAnswer":"Wednesday","solution":""},{"no":7,"itemId":32407,"source":"Careerlauncher Numbers Basic | Q7 | Easy","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003c/span\u003e If\r\n  the base for writing numbers were two, instead of ten, the number 18 would be\r\n  written as:\u003cspan\u003e","options":["\u003c/span\u003e 1111\u003cspan\r\n \u003e","\u003c/span\u003e 1101\u003cspan\r\n \u003e","\u003c/span\u003e 10010\u003cspan\r\n \u003e","\u003c/span\u003e\r\n  100010\u003cspan\u003e"],"answer":2,"typedAnswer":"10010","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":8,"itemId":32885,"source":"Careerlauncher Numbers Basic | Q8 | Easy","type":"mcq","direction":"\u003cp\u003eEach question is followed by two statements, I and II.\u003c/p\u003e\n\u003cp\u003eMark [1], if the question can be answered by using one of the statements alone, but cannot be answered using the other statement alone.\u003c/p\u003e\n\u003cp\u003eMark [2], if the question can be answered by using either statement alone.\u003c/p\u003e\n\u003cp\u003eMark [3], if the question can be answered using both statements together, but cannot be answered using either statement alone.\u003c/p\u003e\n\u003cp\u003eMark [4], if the question cannot be answered even by using both statements together.\u003c/p\u003e","passage":"","question":"\u003cp\u003eIs y a perfect square, where x and y are natural numbers?\u003c/p\u003e\n\u003cp\u003eI.  y is divisible by (x + 1) and (x + 2).\u003c/p\u003e\n\u003cp\u003eII. y \u003c 200\u003c/p\u003e","options":["1","2","3","4"],"answer":3,"typedAnswer":"4","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":9,"itemId":36256,"source":"Careerlauncher Numbers Basic | Q9 | Reconstructed","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eA special set is formed from prime numbers using the given rule in the source. How many such sets are possible?\u003c/p\u003e","options":["\u003cp\u003e4\u003c/p\u003e","\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e6\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e"],"answer":1,"typedAnswer":"5","solution":"\u003cp\u003eFrom the limits of y, y can be 1 or 2. Substituting the possible values gives the sets {3, 5, 7}, {5, 7, 11}, {11, 13, 17}, {17, 19, 23}, and {41, 43, 47}. Hence, 5 sets are possible.\u003c/p\u003e"},{"no":10,"itemId":36265,"source":"Careerlauncher Numbers Basic | Q10 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eWhat is the remainder when 15 x 13! divides 13! + 20 x 21!?\u003c/p\u003e","options":["\u003cp\u003e21\u003c/p\u003e","\u003cp\u003e13!\u003c/p\u003e","\u003cp\u003e12!\u003c/p\u003e","\u003cp\u003e10!\u003c/p\u003e"],"answer":1,"typedAnswer":"13!","solution":"\u003cp\u003eWe can split the dividend separately as 13! and 20 x 21!\u003cbr /\u003e13! is less than 15 x 13! therefore, the remainder = 13!\u003cbr /\u003e20 x 21! is completely divisible by 15 x 13!\u003cbr /\u003eTherefore, the remainder will be 0.\u003cbr /\u003eHence, the final remainder is 13!. \u003cbr /\u003eHence, [2].\u003c/p\u003e"},{"no":11,"itemId":36498,"source":"Careerlauncher Numbers Basic | Q11 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e How\r\n  many numbers are there between 1 and 30 including both the numbers such that\r\n  n! is divisible by (n + 1)?\u003cspan\u003e","options":["\u003c/span\u003e 30\u003cspan\r\n \u003e","\u003c/span\u003e 18\u003cspan\r\n \u003e","\u003c/span\u003e 17\u003cspan\r\n \u003e","\u003c/span\u003e 19\u003cspan\r\n \u003e"],"answer":1,"typedAnswer":"18","solution":"\u003cp\u003e\u003cspan\u003eThere are total 18 numbers between 1 and 30 including both such that n! is divisible by (n + 1).\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"expans\"\u003e\u003cspan\u003eNumbers are 5!, 7!, 8!, 9!, 11!, 13!, 14!, 15!, 17!, 19!, 20!, 21!, 23!, 24!, 25!, 26!, 27!, 29!\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"expans\"\u003e\u003cspan\u003eHence, [2].\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"expans\"\u003e\u003cem\u003e\u003cspan\u003eAlternatively,\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp class=\"MsoNormal\"\u003e\u003cspan\u003eAll the numbers which are not followed by a prime number satisfy the given conditions. There are 18 such numbers from 1 to 30.\u003c/span\u003e\u003c/p\u003e"},{"no":12,"itemId":36518,"source":"Careerlauncher Numbers Basic | Q12 | Reconstructed","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003ex, y and z are odd positive integers. Which of the following is necessarily true?\u003c/p\u003e\u003cp\u003eI. x^2yz is odd\u003c/p\u003e\u003cp\u003eII. (x - y)(z + y)x is even\u003c/p\u003e\u003cp\u003eIII. (x - y - z)(x + z) is even\u003c/p\u003e\u003cp\u003eIV. (x - y)z is even\u003c/p\u003e","options":["\u003cp\u003eI and II only\u003c/p\u003e","\u003cp\u003eI, II, III and IV\u003c/p\u003e","\u003cp\u003eII and IV only\u003c/p\u003e","\u003cp\u003eI only\u003c/p\u003e"],"answer":1,"typedAnswer":"I, II, III and IV","solution":"\u003cp\u003eSince x, y and z are odd, x^2yz is odd. Also x - y, z + y, x + z, and x - y are even wherever they appear as sums/differences of odd numbers. Therefore all four statements are necessarily true.\u003c/p\u003e"},{"no":13,"itemId":100209,"source":"Careerlauncher Numbers Basic | Q13 | Easy","type":"mcq","direction":"\u003cp\u003eEach question is followed by two statements, A and B. Answer each question using the following instructions.\u003c/p\u003e","passage":"","question":"\u003cp\u003eIs a\u003csup\u003e44\u003c/sup\u003e \u003c b\u003csup\u003e11\u003c/sup\u003e, given that a = 2 and b is an integer?\u003c/p\u003e\n\u003cp\u003eA.  b is even\u003c/p\u003e\n\u003cp\u003eB.  b  is greater than 16\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2003)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003eif the question can be answered by one of the statements alone but not by the other.\u003c/p\u003e","\u003cp\u003eif the question can be answered by using either statement alone.\u003c/p\u003e","\u003cp\u003eif the question can be answered by using both the statements together, but cannot be answered by using either statement alone.\u003c/p\u003e","\u003cp\u003eif the question cannot be answered even by using both the statements together.\u003c/p\u003e"],"answer":0,"typedAnswer":"if the question can be answered by one of the statements alone but not by the other.","solution":"\u003cp\u003ea\u003csup\u003e44\u003c/sup\u003e \u003c b\u003csup\u003e11\u003c/sup\u003e\u003cbr /\u003e a = 2\u003cbr /\u003e  2\u003csup\u003e44\u003c/sup\u003e \u003c b\u003csup\u003e11\u003c/sup\u003e\u003cbr /\u003e This is only possible when b \u003e 2\u003csup\u003e4\u003c/sup\u003e\u003cbr /\u003e Thus, answer can be obtained using statement B only. Statement A does not give relevant information to obtain accurate answer. Hence, [1].\u003c/p\u003e"},{"no":14,"itemId":100211,"source":"Careerlauncher Numbers Basic | Q14 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe total number of integer pairs (x, y) satisfying the equation x + y = xy is\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2004)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e0\u003c/p\u003e","\u003cp\u003e1\u003c/p\u003e","\u003cp\u003e2\u003c/p\u003e","\u003cp\u003eNone of the above\u003c/p\u003e"],"answer":2,"typedAnswer":"2","solution":"\u003cp\u003eTotal number of integer pairs (x, y) which satisfy equation: x + y = xy are\u003cbr /\u003e (1)     (x, y) = (2, 2)\u003cbr /\u003e           2 + 2 = 2 × 2 = 4\u003cbr /\u003e (2)     (x, y) = (0, 0)\u003cbr /\u003e          0 + 0 = 0 × 0 = 0\u003cbr /\u003e i.e., 2 integer pairs. Hence, [3].\u003c/p\u003e"},{"no":15,"itemId":100230,"source":"Careerlauncher Numbers Basic | Q15 | Easy","type":"mcq","direction":"","passage":"","question":"\u003cp\u003eA group of 630 children is arranged in rows for a group photograph session. Each row contains three fewer children than the row in front of it. What number of rows is not possible?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2006)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e4\u003c/p\u003e","\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e6\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e"],"answer":3,"typedAnswer":"6","solution":"\n"},{"no":16,"itemId":100231,"source":"Careerlauncher Numbers Basic | Q16 | Easy","type":"mcq","direction":"","passage":"","question":"\u003cp\u003eThe sum of four consecutive two-digit odd numbers, when divided by 10, becomes a perfect square. Which of the following can possibly be one of these four numbers?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2006)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e21\u003c/p\u003e","\u003cp\u003e25\u003c/p\u003e","\u003cp\u003e41\u003c/p\u003e","\u003cp\u003e67\u003c/p\u003e","\u003cp\u003e73\u003c/p\u003e"],"answer":2,"typedAnswer":"41","solution":""},{"no":17,"itemId":100232,"source":"Careerlauncher Numbers Basic | Q17 | Easy","type":"mcq","direction":"","passage":"","question":"\u003cp\u003eWhen you reverse the digits of the number 13, the number increases by 18. How many other two-digit numbers increase by 18 when their digits are reversed?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2006)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e6\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e","\u003cp\u003e8\u003c/p\u003e","\u003cp\u003e10\u003c/p\u003e"],"answer":1,"typedAnswer":"6","solution":""},{"no":18,"itemId":100233,"source":"Careerlauncher Numbers Basic | Q18 | Easy","type":"mcq","direction":"","passage":"","question":"\u003cp\u003eThe number of employees in Obelix Menhir Co. is a prime number and is less than 300. The ratio of the number of employees who are graduates and above, to that of employees who are not, can possibly be:\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2006)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e101 : 88\u003c/p\u003e","\u003cp\u003e87 : 100\u003c/p\u003e","\u003cp\u003e110 : 111\u003c/p\u003e","\u003cp\u003e85 : 98\u003c/p\u003e","\u003cp\u003e97 : 84\u003c/p\u003e"],"answer":4,"typedAnswer":"97 : 84","solution":"\n"},{"no":19,"itemId":100495,"source":"Careerlauncher Numbers Basic | Q19 | Easy","type":"mcq","direction":"\u003cp\u003eChoose the correct alternative.\u003c/p\u003e","passage":"","question":"\u003cp\u003eSuppose you have a Currency, named Miso, in three denominations I Miso, 10 Misos and 50 Misos. In how many ways can you pay a bill of 107 Misos?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2007)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e18\u003c/p\u003e","\u003cp\u003e15\u003c/p\u003e","\u003cp\u003e19\u003c/p\u003e","\u003cp\u003e17\u003c/p\u003e","\u003cp\u003e16\u003c/p\u003e"],"answer":0,"typedAnswer":"18","solution":""},{"no":20,"itemId":100499,"source":"Careerlauncher Numbers Basic | Q20 | Easy","type":"mcq","direction":"\u003cp\u003eChoose the correct alternative.\u003c/p\u003e","passage":"","question":"\u003cp\u003eSuppose, the seed of any positive integer n is defined as follows:\u003cbr /\u003e seed(n) = n, if n \u003c 10 = seed(s(n)), otherwise,\u003cbr /\u003e where s(n) indicates the sum of digits of n. For example, \u003cbr /\u003e seed(7) = 7, seed(248) = seed(2 + 4 + 8) = seed(14) = seed(1 + 4) = seed(5) = 5 etc. How many positive integers n, such that n \u003c 500, will have seed(n) = 9?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2008)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e39\u003c/p\u003e","\u003cp\u003e72\u003c/p\u003e","\u003cp\u003e81\u003c/p\u003e","\u003cp\u003e108\u003c/p\u003e","\u003cp\u003e55\u003c/p\u003e"],"answer":4,"typedAnswer":"55","solution":"\u003cp\u003eFrom the definition of ‘Seed’, it is clear that we have to count number of integers between 1 and 500, which are divisible by 9.\u003cbr /\u003e The smallest is 9 and the largest is 495.\u003cbr /\u003e 9 × 1 = 9 and 9 × 55 = 495.\u003cbr /\u003e Hence there are 55 such numbers.\u003cbr /\u003e Hence, [5].\u003c/p\u003e"},{"no":21,"itemId":31816,"source":"Careerlauncher Numbers Basic | Q21 | Easy","type":"text","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other. gin to toll together and toll respectively at intervals of 6, 7, 8, 9 and 12 seconds. How many times they will toll together in one hour?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below.\u003c/p\u003e\n\u003cp\u003e[quizky-text]times/hr\u003c/p\u003e","options":["\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e","\u003cp\u003e6\u003c/p\u003e","\u003cp\u003e14\u003c/p\u003e"],"answer":1,"typedAnswer":"7","solution":""},{"no":24,"itemId":32391,"source":"Careerlauncher Numbers Basic | Q24 | Easy","type":"text","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe smallest positive integer which can be expressed as a sum of two different cubes in two different ways is:\u003c/p\u003e","options":["\u003cp\u003e1000\u003c/p\u003e","\u003cp\u003e1729\u003c/p\u003e","\u003cp\u003e729\u003c/p\u003e","\u003cp\u003e1728\u003c/p\u003e"],"answer":1,"typedAnswer":"1729","solution":"\u003cp\u003eIt is  1729.\u003c/p\u003e\n\u003cp\u003e1729 = 10\u003csup\u003e3\u003c/sup\u003e + 9\u003csup\u003e3\u003c/sup\u003e = 12\u003csup\u003e3\u003c/sup\u003e + 1\u003csup\u003e3\u003c/sup\u003e\u003c/p\u003e"},{"no":25,"itemId":32398,"source":"Careerlauncher Numbers Basic | Q25 | Easy","type":"text","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eI built a time machine in 2003. The peculiar thing about the time machine was that it had a range of twenty years into the future and 30 years into the past. I used the machine and went back 15 years. After spending a year in the past, I again used it and went 10 years into the future. There I spent around two years and finally went to the future by 6 years. In which year did I land up?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below.\u003c/p\u003e\n\u003cp\u003e[quizky-text]\u003c/p\u003e","options":["\u003cp\u003e2003\u003c/p\u003e","\u003cp\u003e2007\u003c/p\u003e","\u003cp\u003e2006\u003c/p\u003e","\u003cp\u003e2000\u003c/p\u003e"],"answer":1,"typedAnswer":"2007","solution":"\u003cp\u003eThe years can be calculated as:\u003c/p\u003e\n\u003cp\u003e2003 - 15 + 1 + 10 + 2 + 6 = 2007.\u003c/p\u003e"},{"no":26,"itemId":36284,"source":"Careerlauncher Numbers Basic | Q26 | Easy","type":"text","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eIn an archery contest, there are x targets. For y = 1, 2, ...., x, there are 2\u003cspan\u003ex - y\u003c/span\u003e\u003cspan\u003e \u003c/span\u003earchers who miss y\u003cspan\u003eth \u003c/span\u003etarget. If the total numbers of targets missed is 4095, then what is the value of x?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e[quizky-text]\u003c/p\u003e","options":["\u003cp\u003e12\u003c/p\u003e","\u003cp\u003e13\u003c/p\u003e","\u003cp\u003e11\u003c/p\u003e","\u003cp\u003e9\u003c/p\u003e"],"answer":0,"typedAnswer":"12","solution":""},{"no":27,"itemId":36497,"source":"Careerlauncher Numbers Basic | Q27 | Easy","type":"text","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eWhat is the remainder when 52\u003cspan\u003e3\u003c/span\u003e\u003cspan\u003e \u003c/span\u003e+ 25\u003cspan\u003e3\u003c/span\u003e\u003cspan\u003e \u003c/span\u003eis divided by 7?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003e[quizky-text]\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e0\u003c/p\u003e","\u003cp\u003e1\u003c/p\u003e","\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e"],"answer":0,"typedAnswer":"0","solution":""},{"no":28,"itemId":36510,"source":"Careerlauncher Numbers Basic | Q28 | Easy","type":"text","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eAn architect has to measure lengths of 625 cm, 1090 cm and 2000 cm. What should be the length of the tape so that he is able to perform the job in minimum number of integral steps?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003e[quizky-text]\u003c/em\u003e\u003c/em\u003ecm\u003c/p\u003e","options":["\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e15 cm\u003c/p\u003e","\u003cp\u003e25 cm\u003c/p\u003e","\u003cp\u003e50 cm\u003c/p\u003e"],"answer":0,"typedAnswer":"5","solution":"\u003cp\u003e\u003cspan\u003eRequired length = HCF of (625, 1090, 2000)\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"MsoNormal\"\u003e= 5 cm. \u003c/p\u003e"},{"no":29,"itemId":32864,"source":"Careerlauncher Numbers Basic | Q29 | Easy","type":"text","direction":"\u003cp\u003eRefer to the data below and answer the questions that follow.\u003c/p\u003e","passage":"\u003cp\u003eMony, XEE and Moon are three T.V. channels. A survey shows that 30%, 20% and 85% of the people watch Mony, XEE and Moon respectively. 20% of the people watch exactly two of the three channels and 5% watch none.\u003c/p\u003e","question":"\u003cp\u003eIf survey also indicates that 20% of the people watch Mony and Moon, and 16% watch XEE and Moon, then what percentage of the people watch only XEE? \u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e[quizky-text]\u003c/p\u003e","options":["\u003cp\u003e0\u003c/p\u003e","\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e10\u003c/p\u003e","\u003cp\u003e20\u003c/p\u003e"],"answer":0,"typedAnswer":"0","solution":""}];
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
        function isMcq(q){const t=String(q.type||'').toLowerCase();return t==='mcq'||t==='radio'||(Array.isArray(q.options)&&q.options.length>0);}
    function isTextQuestion(q){return !isMcq(q);}
    function correctIndex(q){if(typeof q.answer==='number')return q.answer;if(String(q.answer||'').match(/^\d+$/))return Number(q.answer);const c=String(q.correct||'').trim().toUpperCase();if(c.length===1&&c>='A'&&c<='D')return c.charCodeAt(0)-65;return 0;}
    function typedCorrect(q){return String(q.typedAnswer ?? q.correct ?? q.answerText ?? q.answer ?? '').trim();}
    function correctText(q){if(isMcq(q)){const idx=correctIndex(q);return "(" + labels[idx] + ") " + stripHtml((q.options||[])[idx] || typedCorrect(q));}return typedCorrect(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(isMcq(q)) return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(directionHtml(q),'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+questionHtml(q)+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(isMcq(q))return Number(ans)===correctIndex(q);return norm(ans)===norm(typedCorrect(q));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
