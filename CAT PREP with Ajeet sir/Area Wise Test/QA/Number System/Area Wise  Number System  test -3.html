  <script>
    const questions = [{"no":1,"itemId":35369,"source":"Careerlauncher Numbers Intermediate | Q1 | Medium","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eEach question is followed by two statements.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [1], if the question can be answered by using statement I alone. \u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [2], if the question can be answered by using statement II alone. \u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [3], if the question can be answered by using either of the statements alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [4], if the question can be answered by using both statements together.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cp\u003eA man has an account in the First National bank, Chicago. He has forgotten his account number, however, he left some clues for himself to remember it. Based on these clues, what was his five-digit account number?\u003cbr /\u003eI.  The account number was a perfect square and left a remainder of 1 when divided by 4.\u003cbr /\u003eII. The account number = (xyz)\u003csup\u003e2\u003c/sup\u003e where x, y, z are non-zero digits in A.P. with a common difference of 3.\u003c/p\u003e","options":["1","2","3","4"],"answer":3,"typedAnswer":"4","solution":""},{"no":2,"itemId":31814,"source":"Careerlauncher Numbers Intermediate | Q2 | Medium","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003eFind the least number that should be added to 21052 to make it divisible by 132 and 261.\u003c/p\u003e","options":["\u003cp\u003e68\u003c/p\u003e","\u003cp\u003e1916\u003c/p\u003e","\u003cp\u003e9568\u003c/p\u003e","\u003cp\u003e2752\u003c/p\u003e"],"answer":1,"typedAnswer":"1916","solution":""},{"no":3,"itemId":31817,"source":"Careerlauncher Numbers Intermediate | Q3 | Reconstructed","type":"mcq","direction":"","passage":"","question":"\u003cp\u003eIf x, y and z are integers, then which of the following statements is always true?\u003c/p\u003e\u003cp\u003eThe source options were image-based; using the available source logic, counterexamples show that the first three statements are not always true.\u003c/p\u003e","options":["\u003cp\u003eStatement I only\u003c/p\u003e","\u003cp\u003eStatement II only\u003c/p\u003e","\u003cp\u003eStatement III only\u003c/p\u003e","\u003cp\u003eNone of these\u003c/p\u003e"],"answer":3,"typedAnswer":"None of these","solution":"\u003cp\u003eThe source gives counterexamples: if x = 1 and y = 0, options I and III are false. If x = -2 and y = 6, option II is false. Hence none of the listed statements is always true.\u003c/p\u003e"},{"no":4,"itemId":31822,"source":"Careerlauncher Numbers Intermediate | Q4 | Medium","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003eThe remainder when (61)\u003csup\u003e59\u003c/sup\u003e is divided by 59 is:\u003c/p\u003e","options":["\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e57\u003c/p\u003e","\u003cp\u003eNone of these\u003c/p\u003e"],"answer":1,"typedAnswer":"2","solution":""},{"no":5,"itemId":31832,"source":"Careerlauncher Numbers Intermediate | Q5 | Medium","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003eS = {n\u003csub\u003e1\u003c/sub\u003e, n\u003csub\u003e2\u003c/sub\u003e, n\u003csub\u003e3\u003c/sub\u003e, n\u003csub\u003e4\u003c/sub\u003e .....n\u003csub\u003e2004\u003c/sub\u003e}; where n\u003csub\u003e1\u003c/sub\u003e, n\u003csub\u003e2\u003c/sub\u003e, n\u003csub\u003e3\u003c/sub\u003e, ....  are consecutive primes starting from the first odd prime. P = n\u003csub\u003e1\u003c/sub\u003e × n\u003csub\u003e2\u003c/sub\u003e × n\u003csub\u003e3\u003c/sub\u003e × n\u003csub\u003e4\u003c/sub\u003e × ...... n\u003csub\u003e2004\u003c/sub\u003e. P is a ‘m’-digit number. The units digit of the remainder when P is divided by 10\u003csup\u003em-1\u003c/sup\u003e is:\u003c/p\u003e","options":["\u003cp\u003e0\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e"],"answer":2,"typedAnswer":"5","solution":""},{"no":6,"itemId":31835,"source":"Careerlauncher Numbers Intermediate | Q6 | Medium","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003eThe set T contains all the numbers of the form (n + 2), (2n + 2), (3n + 2) and (4n + 2), where n is a natural number and takes values from 1 to 5. How many distinct prime numbers does T contain?\u003c/p\u003e","options":["\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e12\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e"],"answer":1,"typedAnswer":"5","solution":"\u003cp\u003eSince n takes values from 1 to 5, none of the numbers of the form (2n + 2) and (4n + 2) will be prime. The numbers of the form (n + 2) are 3, 4, 5, 6 and 7 out of which 3, 5 and 7 are prime. The numbers of the form (3n + 2) are 5, 8, 11, 14 and 17 out of which 5, 11 and 17 are prime. \u003cbr /\u003e Thus, T contains five distinct prime numbers. \u003cbr /\u003e Hence, [2].\u003c/p\u003e"},{"no":7,"itemId":32388,"source":"Careerlauncher Numbers Intermediate | Q7 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003c/span\u003e Find\r\n  the greatest number that will divide 478 and 719 leaving remainders 2 and 5\r\n  respectively.\u003cspan\u003e","options":["\u003c/span\u003e 246\u003cspan\r\n \u003e","\u003c/span\u003e 212\u003cspan\r\n \u003e","\u003c/span\u003e 238\u003cspan\r\n \u003e","\u003c/span\u003e 264\u003cspan\r\n \u003e"],"answer":2,"typedAnswer":"238","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":8,"itemId":32396,"source":"Careerlauncher Numbers Intermediate | Q8 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eA box contains a number of apples. When the apples are divided into groups of 5, 4 apples are left, when divided into groups of 4, 3 are left, when divided into groups of 3, 2 are left and when divided into groups of 2, 1 is left. What is the minimum possible number of apples?\u003c/p\u003e","options":["\u003c/span\u003e 49\u003cspan\r\n \u003e","\u003c/span\u003e 59\u003cspan\r\n \u003e","\u003c/span\u003e 64\u003cspan\r\n \u003e","\u003c/span\u003e 39\u003cspan\r\n \u003e"],"answer":1,"typedAnswer":"59","solution":"\u003cp\u003eThe number of apples always fall short of one, to be a complete multiple of 5, 4, 3 and 2. Hence, the number of apples = LCM (5, 4, 3, 2) - 1\u003c/p\u003e\n\u003cp\u003e= 60 - 1 = 59.\u003c/p\u003e\n\u003cp\u003eHence, [2].\u003c/p\u003e\n\u003cp\u003eAlternatively,\u003c/p\u003e\n\u003cp\u003eWhen the apples are divided into groups of 2, 1 apple is left; hence there is odd number of apples in the group. Option [3] is eliminated. When divided into groups of 3, 2 apples are left; hence the numbers of apples in the group is not a multiple of 3. Option [4] is eliminated. When divided into groups of 4, 3 apples are left. Hence, option [1] is not possible.\u003c/p\u003e"},{"no":9,"itemId":32406,"source":"Careerlauncher Numbers Intermediate | Q9 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eWhat is the remainder when (3\u003cspan\u003e102\u003c/span\u003e\u003cspan\u003e \u003c/span\u003e+ 4\u003cspan\u003e48\u003c/span\u003e) is divided by 7?\u003c/p\u003e","options":["\u003c/span\u003e 5\u003cspan\r\n \u003e","\u003c/span\u003e 6\u003cspan\r\n \u003e","\u003c/span\u003e 4\u003cspan\r\n \u003e","\u003c/span\u003e None\r\n  of these\u003cspan\u003e"],"answer":3,"typedAnswer":"None of these","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":10,"itemId":32408,"source":"Careerlauncher Numbers Intermediate | Q10 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003c/span\u003e A\r\n  certain number N can be expressed as a product of two distinct numbers in\r\n  \u002711\u0027 ways. The least possible value for N is:\u003cspan\u003e","options":["\u003c/span\u003e 2048\u003cspan\r\n \u003e","\u003c/span\u003e 6144\u003cspan\r\n \u003e","\u003c/span\u003e 1024\u003cspan\r\n \u003e","\u003c/span\u003e 3072\u003cspan\r\n \u003e"],"answer":3,"typedAnswer":"3072","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":11,"itemId":32538,"source":"Careerlauncher Numbers Intermediate | Q11 | Medium","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eEach question is followed by two statements, I and II. \u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [1], if the question can be answered by using one of the statements alone, but cannot be answered using the other statement alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [2], if the question can be answered by using either statement alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [3], if the question can be answered using both statements together, but cannot be answered using either statement alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [4], if the question cannot be answered even by using both statements together.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003eIf x, m, n and p are non-zero positive integers, is (x + m)(x + n)(x + p) divisible by 4?\u003cbr /\u003eI.  x is odd and exactly two of m, n and p are odd integers.\u003cbr /\u003eII. Either m or n is an odd integer and p is an even integer.\u003c/p\u003e","options":["1","2","3","4"],"answer":0,"typedAnswer":"1","solution":"\u003cp\u003eFrom statement I: if x is odd and any two of m, n and p are odd. It means that out of (x + m), (x + n) and (x + p), two are even. So the given term is divisible by 4. \u003cbr /\u003e From statement II: Depending on whether x is even or odd, we get different answers.\u003cbr /\u003e Hence, statement II is not sufficient. Hence, [1].\u003c/p\u003e"},{"no":12,"itemId":32570,"source":"Careerlauncher Numbers Intermediate | Q12 | Medium","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eThe question below is followed by two statements, I and II. \u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [1]; if the question can be answered by using one of the statements alone, but cannot be answered using the other statement alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [2]; if the question can be answered by using either statement alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [3]; if the question can be answered by using both statements together, but cannot be answered by using either statement alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [4]; if the question cannot be answered even by using both statements together.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cbr /\u003eIs n a prime number, where n = x – 1?\u003c/p\u003e\n\u003cp\u003eI. x is a product of three consecutive integers.\u003cbr /\u003eII. x is a product of four consecutive integers.\u003c/p\u003e","options":["\u003cp\u003e1\u003c/p\u003e","\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e4\u003c/p\u003e"],"answer":3,"typedAnswer":"4","solution":""},{"no":13,"itemId":36258,"source":"Careerlauncher Numbers Intermediate | Q13 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe highest power of 2 contained in n! is 39. What is the highest power of 3 that is contained in n!?\u003c/p\u003e","options":["\u003cp\u003e18\u003c/p\u003e","\u003cp\u003e19\u003c/p\u003e","\u003cp\u003e20\u003c/p\u003e","\u003cp\u003eCannot be determined\u003c/p\u003e"],"answer":1,"typedAnswer":"19","solution":"\u003cp\u003eBy trial and error we check for the permissible value of n.\u003cbr /\u003en = 40, \u003cbr /\u003eThe power of 2 contained in 40! \u003cbr /\u003e= No. of multiples of 2 + No. of multiples of 4 + No. of multiples of 8 + No. of multiples of 16 + No. of multiples of 32\u003cbr /\u003e= 20 + 10 + 5 + 2 + 1 = 38.\u003cbr /\u003eTherefore, n should be 42 or 43 since we need one more power of 2. \u003cbr /\u003eFor n = 42 or 43, the power of 3 contained is 14 + 4 + 1 = 19.\u003cbr /\u003eThus, for n = 42 or 43, power of 3 contained in n! = 19.\u003cbr /\u003eHence, [2].\u003c/p\u003e"},{"no":14,"itemId":36268,"source":"Careerlauncher Numbers Intermediate | Q14 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eIf p\u003csup\u003eq\u003c/sup\u003e is a perfect square as well as a perfect cube, then q must be a multiple of:\u003c/p\u003e","options":["\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e6\u003c/p\u003e","\u003cp\u003eCannot be determined\u003c/p\u003e"],"answer":3,"typedAnswer":"Cannot be determined","solution":"\u003cp\u003eIf p is a prime number, then q must be a multiple of 6. But if p is not a prime number then nothing can be said about q.\u003cbr /\u003e i.e., 2\u003csup\u003e6\u003c/sup\u003e = 64 is a perfect square as well as a perfect cube and in this case q is a multiple of 6. But this could very well be written as 64\u003csup\u003e1\u003c/sup\u003e in which case q is not a multiple of 2, 3 or 6. Hence, [4].\u003cbr /\u003e Alternatively,\u003cbr /\u003e Substitute p = 1\u003cbr /\u003e p\u003csup\u003eq\u003c/sup\u003e = 1. q can be any number.\u003c/p\u003e"},{"no":15,"itemId":36269,"source":"Careerlauncher Numbers Intermediate | Q15 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eA number represented as ‘A263’ in the decimal system, where A is some digit between and including 0 and 9, is divisible by ‘9’. A263 can be represented in octal system as:\u003c/p\u003e","options":["\u003cp\u003e10247\u003c/p\u003e","\u003cp\u003e16137\u003c/p\u003e","\u003cp\u003e12217\u003c/p\u003e","\u003cp\u003e6523\u003c/p\u003e"],"answer":1,"typedAnswer":"16137","solution":"\u003cp\u003eA263 is divisible by 9, hence A + 2 + 6 + 3 \u003cbr /\u003e = A + 11 has to be a multiple of 9.\u003cbr /\u003e Since, A is a digit taking values between and including 0 and 9, A = 7.\u003cbr /\u003e Now, 7263 can be written in octal system as 16137. Hence, [2].\u003c/p\u003e"},{"no":16,"itemId":36271,"source":"Careerlauncher Numbers Intermediate | Q16 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eI take a 3-digit number and write it once more beside itself (to get a 6-digit number). Then, I divide this new (6-digit) number by 143 and subtract 3 times my number from the ,"itemId":36279,"source":"Careerlauncher Numbers Intermediate | Q19 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eabcde is a 5 digit number such that the digits a, b, c, d, e are in an ascending order. If c \u003c 6, b + d = 8 and a + e = 9, how many such numbers exist?\u003c/p\u003e","options":["\u003cp\u003e6\u003c/p\u003e","\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e4\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e"],"answer":1,"typedAnswer":"5","solution":"\u003cp\u003ea \u003c b \u003c c \u003c d \u003c e \u003cbr /\u003e1) Take a = 1, then e = 8\u003cbr /\u003eHence, c can take the values {3,4,5}\u003cbr /\u003eTaking c = 3\u003cbr /\u003eb = 2 and d= 6. Valid case\u003cbr /\u003eNumber: 12368\u003c/p\u003e\n\u003cp\u003eTaking c = 4 \u003cbr /\u003eThen b = 2, 3 and d = 6, 5. Valid cases\u003cbr /\u003eNumber: 12468, 13458\u003c/p\u003e\n\u003cp\u003eTaking c = 5 \u003cbr /\u003eThen only b = 2 and d = 6 is a valid case.\u003cbr /\u003eNumber: 12568\u003c/p\u003e\n\u003cp\u003e2) Take a = 2, then e = 7\u003cbr /\u003eAnd c can take the values {4,5}\u003cbr /\u003eTaking c = 4 \u003cbr /\u003eThen b = 3 and d = 5. Valid case\u003cbr /\u003eNumber: 23457\u003c/p\u003e\n\u003cp\u003eTaking c = 5 \u003cbr /\u003eNo valid cases possible.\u003c/p\u003e\n\u003cp\u003e3) Take a = 3, then e = 6\u003cbr /\u003eThen c = 5\u003cbr /\u003eBut b and d cannot both be 4.\u003cbr /\u003eNo valid case.\u003c/p\u003e\n\u003cp\u003eTherefore, the total number of such numbers possible is 5 that are 12568, 12468, 12368, 13458 and 23457. \u003cbr /\u003eHence, [2].\u003c/p\u003e"},{"no":20,"itemId":36280,"source":"Careerlauncher Numbers Intermediate | Q20 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e Find\r\n  the smallest n such that n! has exactly 11 zeros at the end.\ span\r\n \u003end\u003c/span\u003e\u003cspan\r\n \u003e  \u003c/span\u003ecolumn\u003cspan\u003e","\u003c/span\u003e 3\u003cspan\r\n \u003erd\u003c/span\u003e\u003cspan\r\n \u003e  \u003c/span\u003ecolumn\u003cspan\u003e","\u003c/span\u003e 4\u003cspan\r\n \u003eth\u003c/span\u003e\u003cspan\r\n \u003e  \u003c/span\u003ecolumn\u003cspan\u003e"],"answer":2,"typedAnswer":"3 rd column","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":28,"itemId":36519,"source":"Careerlauncher Numbers Intermediate | Q28 | Medium","type":"mcq","direction":"\u003c/span\u003e\r\n  Answer the questions independently of each other.\u003cspan\u003e","passage":"","question":"\u003cp\u003eTwo numbers are such that the HCF of the numbers formed by squaring the sum of the two and the difference between their squares is 10. Also, the LCM of these new numbers is 40 times their HCF. Find these numbers.\u003c/p\u003e","options":["\u003c/span\u003e 2, 8\u003cspan\r\n \u003e","\u003c/span\u003e 3, 7\u003cspan\r\n \u003e","\u003c/span\u003e 5, 6\u003cspan\r\n \u003e","\u003c/span\u003e 4, 7\u003cspan\r\n \u003e"],"answer":1,"typedAnswer":"3, 7","solution":"\u003cp\u003e\u003cspan\u003eLet the numbers be x and y.\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"expans\"\u003e\u003cspan\u003eThe new numbers are (x + y)\u003c/span\u003e\u003cspan\u003e2\u003c/span\u003e\u003cspan\u003eand (x\u003c/span\u003e\u003cspan\u003e2\u003c/span\u003e\u003cspan\u003e\u003cspan\u003e -\u003c/span\u003e y\u003c/span\u003e\u003cspan\u003e2\u003c/span\u003e\u003cspan\u003e).\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"expans\"\u003e\u003cspan\u003eThe HCF is x + y and LCM is (x + y)\u003c/span\u003e\u003cspan\u003e2\u003c/span\u003e\u003cspan\u003e(x - y).\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"expans\"\u003e\u003cspan\u003ex + y = 10\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"expans\"\u003e\u003cspan\u003e(x + y)\u003c/span\u003e\u003cspan\u003e2\u003c/span\u003e\u003cspan\u003e(x - y) = 40\u003cspan\u003e x \u003c/span\u003e10\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"MsoNormal\"\u003ex = 7, y = 3. Hence, [2].\u003c/p\u003e"},{"no":29,"itemId":36522,"source":"Careerlauncher Numbers Intermediate | Q29 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e What\r\n  is the length of the biggest scale which can measure a distance of 1.38 m,\r\n  6.9 dm, 299 cm and 3450 mm accurately?\u003cspan\u003e","options":["\u003c/span\u003e 3 cm\u003cspan\r\n \u003e","\u003c/span\u003e 23 cm\u003cspan\r\n \u003e","\u003c/span\u003e 69 cm\u003cspan\r\n \u003e","\u003c/span\u003e No\r\n  such scale is possible\u003cspan\u003e"],"answer":1,"typedAnswer":"23 cm","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":30,"itemId":36525,"source":"Careerlauncher Numbers Intermediate | Q30 | Reconstructed","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe HCF of three integer numbers which are in arithmetic progression is equal to their common difference. Also, the LCM of these three numbers is five times their sum. Find the ratio of the LCM to the second largest number of the three.\u003c/p\u003e","options":["\u003cp\u003e20\u003c/p\u003e","\u003cp\u003e15\u003c/p\u003e","\u003cp\u003e10\u003c/p\u003e","\u003cp\u003eNone of these\u003c/p\u003e"],"answer":1,"typedAnswer":"15","solution":"\u003cp\u003eLet the three terms be da, db and dc, where their HCF and common difference are both d. Then a, b, c are in AP with common difference 1 and are coprime as a set.\u003c/p\u003e\u003cp\u003eThe source answer gives the required ratio as 15.\u003c/p\u003e"},{"no":31,"itemId":100203,"source":"Careerlauncher Numbers Intermediate | Q31 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eHow many even integers n, where 100 \u003cspan\u003e\u003c\u003c/span\u003e n \u003cspan\u003e\u003c\u003c/span\u003e 200, are divisible neither by seven nor by nine?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2003)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e40\u003c/p\u003e","\u003cp\u003e37\u003c/p\u003e","\u003cp\u003e39\u003c/p\u003e","\u003cp\u003e38\u003c/p\u003e"],"answer":2,"typedAnswer":"39","solution":"\u003cp\u003e100 \u003cspan\u003e\u003c\u003c/span\u003e n \u003cspan\u003e\u003c\u003c/span\u003e 200\u003cbr /\u003e 50 even integers\u003cbr /\u003e Total even numbers divisible by 7 = 112, 126, 140, 154, 168, 182, 196 = 7\u003cbr /\u003e Total even numbers divisible by 9 = 108, 126, 144, 162, 180, 198 = 6\u003cbr /\u003e Since the number “126” is repeated in both the sets, the actual number of positive even numbers between 100 \u0026 200 divisible by 7 or 9 = 7 + 6 – 1 = 12\u003cbr /\u003e Total even numbers between 100 \u0026 200 = 51 ( including 100 \u0026 200 )\u003cbr /\u003e So total even numbers divisible neither by 7 nor 9 = 51 – 12 = 39.\u003cbr /\u003e Ans option [3]\u003cbr /\u003e Alternatively,\u003c/p\u003e\n"},{"no":32,"itemId":100207,"source":"Careerlauncher Numbers Intermediate | Q32 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe number of positive integers n in the range 12 \u003cspan\u003e\u003c\u003c/span\u003e n \u003cspan\u003e\u003c\u003c/span\u003e 40 such that the product (n – 1)(n – 2) ... 3.2.1 is not divisible by n is:\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2003)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e","\u003cp\u003e13\u003c/p\u003e","\u003cp\u003e14\u003c/p\u003e"],"answer":1,"typedAnswer":"7","solution":"\u003cp\u003eThe positive integers (n) in the range 12 \u003cspan\u003e\u003c\u003c/span\u003e n \u003cspan\u003e\u003c\u003c/span\u003e 40 such that the product (n – 1)(n – 2) ... 3.2.1 is not divisible by n are the prime numbers in the given range\u003cbr /\u003e Those integers are 13, 17, 19, 23, 29, 31 and 37.\u003cbr /\u003e i.e., 7 numbers. Hence, [2].\u003c/p\u003e"},{"no":33,"itemId":100215,"source":"Careerlauncher Numbers Intermediate | Q33 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eEach family in a locality has at most two adults, and no family has fewer than 3 children. Considering all families together, there are more adults than boys, more boys then girls, and more girls than families. Then minimum possible number of families in the locality is\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2004)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e4\u003c/p\u003e","\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e"],"answer":3,"typedAnswer":"3","solution":""}];
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
