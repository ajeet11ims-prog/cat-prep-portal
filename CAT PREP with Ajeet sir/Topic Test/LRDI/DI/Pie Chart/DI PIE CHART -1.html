<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DI PIE CHART -1 ( 40 MINUTES )</title>
  <style>
    :root{--brand:#0f4c81;--brand-dark:#0a3357;--brand-soft:#e8f1f8;--ink:#111827;--muted:#6b7280;--line:#c9d3df;--ok:#157347;--bad:#b02a37}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:#eef2f6}
    header{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;box-shadow:0 1px 3px rgba(15,23,42,.08)}
    .topbar{width:100%;display:flex;align-items:center;gap:14px}.topbar h1{font-size:20px;line-height:1.15;margin:0;color:var(--brand-dark)}.meta{font-size:13px;color:var(--muted);margin-top:3px}
    .pill{margin-left:auto;border:1px solid var(--line);border-radius:6px;padding:8px 12px;background:#f8fafc;font-weight:700}.pill+ .pill{margin-left:0}.calc-open{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:9px 14px;font-weight:700;cursor:pointer}
    main{height:calc(100vh - 64px);display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:10px;padding:10px}
    main>section,aside{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:0;overflow:hidden}
    #testForm{height:100%;min-height:0;display:grid;grid-template-rows:minmax(0,1fr) auto auto;overflow:hidden}
    #result,.question{padding:12px;margin-bottom:0}#result{display:none}#result h2{margin:0 0 10px;color:var(--brand);font-size:18px}
    .score-grid{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:9px;margin-top:12px}.score-box{border:1px solid var(--line);border-radius:6px;padding:9px;background:#fbfcfd}.score-box strong{display:block;font-size:22px;margin-top:2px}
    .question{display:none}.question.active{display:grid;grid-template-columns:minmax(0,1.18fr) minmax(390px,.82fr);gap:10px;align-items:stretch;height:100%;min-height:0}.question h2{margin:0 0 12px;font-size:17px;line-height:1.32}
    .set-info{border:1px solid var(--line);border-radius:8px;background:#fff;min-height:0;height:100%;overflow:auto}.source-card{padding:10px;min-height:100%}.source-title{font-size:16px;line-height:1.28;margin:0 0 12px}.source-title strong{font-style:italic}.source-copy{font-size:17px;line-height:1.22;margin:0 0 10px}.source-note{font-size:16px;line-height:1.22;margin:10px 0 0}.chart-svg{width:100%;height:auto;display:block;background:#fff}.source-card .chart-svg text{font-size:16px!important}.source-card .chart-svg text[font-weight="700"]{font-size:17px!important}.question-body{border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px;min-height:0;height:100%;overflow:auto}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px}label.option{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--line);border-radius:6px;padding:10px;cursor:pointer;background:#fbfcfd;min-height:42px;font-size:16px}label.option:hover{border-color:#9ab7ca}input[type=radio]{width:17px;height:17px;margin-top:3px;flex:0 0 auto;accent-color:var(--brand)}
    .text-answer{width:100%;max-width:260px;border:1px solid var(--line);border-radius:6px;padding:12px 14px;font-size:19px;margin-top:8px}.text-answer:focus{outline:2px solid #b8d7ed}
    .question-nav,.actions{display:flex;justify-content:space-between;gap:10px;margin:8px 12px 0;flex-wrap:wrap}button{border:0;border-radius:6px;background:var(--brand);color:white;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer}button.secondary{background:#e8edf4;color:var(--ink)}button:disabled{opacity:.55;cursor:default}
    aside{padding:14px;overflow:auto}.panel-title{font-size:17px;margin:0 0 12px;color:var(--brand-dark)}.palette{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.dot{height:38px;border-radius:6px;border:1px solid var(--line);background:#f8fafc;color:var(--ink);font-weight:700}.dot.active{background:var(--brand);color:white}.dot.answered{border-color:var(--ok);box-shadow:inset 0 -4px 0 rgba(21,115,71,.4)}
    .answer-note{margin-top:12px;font-weight:700}.answer-note.ok{color:var(--ok)}.answer-note.bad{color:var(--bad)}.answer-note.muted{color:var(--muted)}.correct{border-color:rgba(21,115,71,.45);background:#eef8f2}.wrong{border-color:rgba(176,42,55,.45);background:#fff1f2}.missed{border-color:rgba(93,109,126,.45);background:#f6f7f9}
    .calculator-dialog{width:min(360px,calc(100vw - 28px));max-width:360px;margin:0;inset:90px auto auto 50%;transform:translateX(-50%);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:0 12px 34px rgba(15,23,42,.2)}.calculator-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;cursor:move;user-select:none}.calculator-head h2{margin:0;color:var(--brand-dark);font-size:18px}.calc-close{border:1px solid var(--line);border-radius:6px;background:#eef2f6;color:var(--ink);width:34px;height:34px;padding:0;font-size:20px;line-height:1;cursor:pointer}.calc-display{width:100%;border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px;background:#fbfcfd;color:var(--ink);font-size:22px;font-weight:700;text-align:right}.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.calc-key{min-height:44px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:var(--ink);font-size:17px;font-weight:700;cursor:pointer}.calc-key.operator{background:var(--brand-soft);color:var(--brand-dark)}.calc-key.equal{background:var(--brand);color:#fff;grid-column:span 2}.calc-key.clear{color:var(--bad)}
    @media(max-width:1000px){main{grid-template-columns:1fr}.question.active{grid-template-columns:1fr}.options{grid-template-columns:1fr}aside{display:none}}
  </style>
</head>
<body>
  <header><div class="topbar"><div><h1>DI PIE CHART -1 ( 40 MINUTES )</h1><div class="meta">20 Questions | 40 Minutes</div></div><div class="pill">Time Left: <span id="time">40:00</span></div><div class="pill">Answered: <span id="answeredCount">0</span>/20</div><button class="calc-open" type="button" id="openCalculator">Calculator</button></div></header>
  <main><section><section id="result"></section><form id="testForm"></form></section><aside><h2 class="panel-title">Question Palette</h2><div class="palette" id="palette"></div></aside></main>

  <dialog class="calculator-dialog" id="calculatorDialog"><div class="calculator-head"><h2>Calculator</h2><button class="calc-close" type="button" id="closeCalculator" aria-label="Close calculator">x</button></div><input class="calc-display" id="calcDisplay" type="text" value="0" inputmode="decimal" aria-label="Calculator display"><div class="calc-grid" id="calcKeys"><button class="calc-key clear" type="button" data-action="clear">C</button><button class="calc-key" type="button" data-action="backspace">DEL</button><button class="calc-key operator" type="button" data-value="%">%</button><button class="calc-key operator" type="button" data-value="/">/</button><button class="calc-key" type="button" data-value="7">7</button><button class="calc-key" type="button" data-value="8">8</button><button class="calc-key" type="button" data-value="9">9</button><button class="calc-key operator" type="button" data-value="*">x</button><button class="calc-key" type="button" data-value="4">4</button><button class="calc-key" type="button" data-value="5">5</button><button class="calc-key" type="button" data-value="6">6</button><button class="calc-key operator" type="button" data-value="-">-</button><button class="calc-key" type="button" data-value="1">1</button><button class="calc-key" type="button" data-value="2">2</button><button class="calc-key" type="button" data-value="3">3</button><button class="calc-key operator" type="button" data-value="+">+</button><button class="calc-key" type="button" data-value="0">0</button><button class="calc-key" type="button" data-value=".">.</button><button class="calc-key equal" type="button" data-action="equals">=</button></div></dialog>

  <script>
    const optionLabels=["A","B","C","D"];
    const questions=[
      {set:1,type:"mcq",q:"What percentage of the total students got placed in the software or the manufacturing sector?",options:["12.5%","25%","27.5%","50%"],answer:"B"},
      {set:1,type:"mcq",q:"If the number of students who were placed in the banking sector was 51, then how many students were there in the batch?",options:["340","330","333","350"],answer:"A"},
      {set:1,type:"mcq",q:"If 25% of the students who were placed in the consulting sector had instead been placed in the retail sector, then what percentage of the total students of the batch would have been placed in the retail sector?",options:["20%","18%","25%","33%"],answer:"C"},
      {set:1,type:"mcq",q:"If the number of students who were placed in consulting companies exceeded those placed in software companies by 72, then the number of students in the batch who were placed in manufacturing companies is ____.",options:["54","72","108","144"],answer:"C"},
      {set:1,type:"mcq",q:"If 20% of the students who got placed in software companies opted out of placements and a new pie chart is drawn for students who accepted placements, then the percentage of the students of the batch who accepted jobs in software companies is (assume that all other students accepted placements) ____.",options:["7%","7.5%","7.8%","8.2%"],answer:"D"},
      {set:2,type:"mcq",q:"If the total production of wheat and rice together in 2016 is 88% more than that in the previous year, then what was the total production (in million tonnes) of wheat and rice in 2015?",options:["30","20","25","35"],answer:"C"},
      {set:2,type:"mcq",q:"In 2016, by what percentage is the production of rice more than that of wheat?",options:["30%","25%","24%","35%"],answer:"D"},
      {set:2,type:"mcq",q:"If in the next year, the production of rice increases by 25% and the total production of crops increases by 15%, then what will be the total production (in million tonnes) of the given crops (except rice) in that year?",options:["42","46.35","48.25","49.05"],answer:"D"},
      {set:2,type:"mcq",q:"If in 2016, half of the wheat got spoiled due to rain and 25% of the remaining wheat got spoiled due to improper storage, then what would be the approximate angle made by the wheat left, if a new pie chart is drawn, all other values remaining the same?",options:["37.5°","40.2°","35.4°","45°"],answer:"D"},
      {set:2,type:"mcq",q:"Due to a mistake, the production of rice in 2016 had been under quoted by 40%. If this mistake is corrected, then wheat contributed what percentage of the production of major crops in that year?",options:["27.42%","24.82%","14.37%","22.22%"],answer:"D"},
      {set:3,type:"text",q:"If the number of votes cast for the BJP is 20% more than that in the previous election, then what is the difference between the number of votes cast for that party in this election and the previous one?",answer:"12200"},
      {set:3,type:"text",q:"If out of the total votes cast for the Congress party, 6000 votes were found to be invalid, then how many valid votes were cast for the party?",answer:"52560"},
      {set:3,type:"text",q:"By what percentage is the total votes cast for the Congress party more than that for 'Others'?",answer:"60"},
      {set:3,type:"text",q:"The total number of votes cast for the CPI forms what percentage of the total number of votes cast for the BSP?",answer:"75"},
      {set:3,type:"text",q:"If the number of votes cast for the TDP in 2017 is 20% less than that in the previous election, which was 10% of the total votes cast in that year, then how many votes were cast in total in the previous election?",answer:"305000"},
      {set:4,type:"mcq",q:"From 2015-16 to 2016-17, which of the following states showed the maximum percentage increase in the iron ore production?",options:["Andhra Pradesh","Madhya Pradesh","Bihar","Uttar Pradesh"],answer:"A"},
      {set:4,type:"mcq",q:"From 2015-16 to 2016-17, which of the following states showed the minimum percentage increase in the iron ore production?",options:["Uttar Pradesh","West Bengal","Madhya Pradesh","Jharkhand"],answer:"B"},
      {set:4,type:"mcq",q:"In each of 2015-16 and 2016-17, 40% of the total iron ore production is exported. What is the percentage increase in the iron ore exported from 2015-16 to 2016-17?",options:["25%","10%","50%","75%"],answer:"C"},
      {set:4,type:"mcq",q:"What is the percentage increase in the production of iron ore in Andhra Pradesh from 2015-16 to 2016-17?",options:["100%","200%","300%","500%"],answer:"D"},
      {set:4,type:"mcq",q:"In the pie chart for 2016-17, only 50% of the iron ore produced in West Bengal was included, and if a new pie chart is drawn after correcting this, all other values remaining the same, then what percentage of the total iron ore produced in India was produced in West Bengal?",options:["18%","22%","26%","28%"],answer:"C"}
    ];
    const setCache={};
    function svgDefs(id){
      return `<defs>
        <pattern id="dots-${id}" width="12" height="12" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="#111"/></pattern>
        <pattern id="grid-${id}" width="12" height="12" patternUnits="userSpaceOnUse"><path d="M0 0h12v12H0z" fill="#fff"/><path d="M0 0l12 12M12 0L0 12" stroke="#111" stroke-width="1.5"/></pattern>
        <pattern id="diag-${id}" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M-3 10L10 -3M2 12L12 2" stroke="#111" stroke-width="2"/></pattern>
        <pattern id="h-${id}" width="8" height="8" patternUnits="userSpaceOnUse"><path d="M0 2h8M0 6h8" stroke="#111" stroke-width="1.7"/></pattern>
        <pattern id="v-${id}" width="8" height="8" patternUnits="userSpaceOnUse"><path d="M2 0v8M6 0v8" stroke="#111" stroke-width="1.7"/></pattern>
        <pattern id="brick-${id}" width="16" height="14" patternUnits="userSpaceOnUse"><path d="M0 0h16v14H0z" fill="#fff"/><path d="M0 0h16M0 7h16M0 14h16M4 0v7M12 7v7" stroke="#111" stroke-width="1.2"/></pattern>
        <pattern id="dash-${id}" width="12" height="10" patternUnits="userSpaceOnUse"><path d="M1 2h7M4 6h7" stroke="#111" stroke-width="1.6"/></pattern>
      </defs>`;
    }
    function polar(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)]}
    function sector(cx,cy,r,start,angle,fill){const [x1,y1]=polar(cx,cy,r,start),[x2,y2]=polar(cx,cy,r,start+angle),large=angle>180?1:0;return `<path d="M${cx} ${cy} L${x1.toFixed(2)} ${y1.toFixed(2)} A${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z" fill="${fill}" stroke="#111" stroke-width="2"/>`}
    function label(x1,y1,x2,y2,txt,anchor="start"){return `<path d="M${x1} ${y1} L${x2} ${y2}" stroke="#111" stroke-width="2" fill="none"/><text x="${x2+(anchor==="start"?6:-6)}" y="${y2}" text-anchor="${anchor}" font-size="19">${txt}</text>`}
    function placementSvg(id){
      const fills=[`url(#dots-${id})`,`url(#grid-${id})`,"#fff",`url(#grid-${id})`,`url(#dots-${id})`,`url(#h-${id})`];
      const angles=[54,36,72,54,72,72];let s=0,parts="";angles.forEach((a,i)=>{parts+=sector(320,260,130,s,a,fills[i]);s+=a});
      return `<svg class="chart-svg" viewBox="0 0 650 725">${svgDefs(id)}<text x="18" y="34" font-size="22" font-style="italic" font-weight="700">Directions for questions 1 to 5: <tspan font-style="normal" font-weight="400">These questions are</tspan></text><text x="18" y="64" font-size="22">based on the following pie chart.</text><text x="18" y="122" font-size="23">The following pie chart represents the distribution of the</text><text x="18" y="150" font-size="23">students in a batch of a Business school who got placed</text><text x="18" y="178" font-size="23">in companies in various sectors.</text><g transform="translate(0,105)">${parts}<circle cx="320" cy="260" r="130" fill="none" stroke="#111" stroke-width="2.5"/>${label(392,150,420,102,"Manufacturing", "start")}<text x="476" y="130" font-size="20" text-anchor="middle">54°</text>${label(448,230,492,238,"Software", "start")}<text x="548" y="266" font-size="20" text-anchor="middle">36°</text>${label(430,370,492,405,"Textiles", "start")}<text x="530" y="432" font-size="20" text-anchor="middle">72°</text>${label(276,389,242,455,"Banking", "end")}<text x="230" y="482" font-size="20" text-anchor="middle">54°</text>${label(202,306,146,330,"Retail", "end")}<text x="142" y="356" font-size="20" text-anchor="middle">72°</text>${label(242,154,205,106,"Consulting", "end")}<text x="170" y="132" font-size="20" text-anchor="middle">72°</text></g><text x="18" y="650" font-size="22">All students of the batch got placed and it is also known</text><text x="18" y="680" font-size="22">that each student got placed in exactly one company and</text><text x="18" y="710" font-size="22">that each company belonged to only one sector.</text></svg>`;
    }
    function cropsSvg(id){
      const angles=[15,30,45,135,35,100],fills=["#fff",`url(#grid-${id})`,`url(#dots-${id})`,`url(#diag-${id})`,`url(#dots-${id})`,`url(#v-${id})`];let s=0,parts="";angles.forEach((a,i)=>{parts+=sector(310,275,150,s,a,fills[i]);s+=a});
      return `<svg class="chart-svg" viewBox="0 0 650 710">${svgDefs(id)}<text x="18" y="34" font-size="22" font-style="italic" font-weight="700">Directions for questions 6 to 10: <tspan font-style="normal" font-weight="400">These questions are</tspan></text><text x="18" y="64" font-size="22">based on the following pie chart.</text><text x="18" y="124" font-size="22">The following pie chart represents the production of</text><text x="18" y="154" font-size="22">major crops in a particular region ‘x’ in the year 2016.</text><g transform="translate(0,90)">${parts}<circle cx="310" cy="275" r="150" fill="none" stroke="#111" stroke-width="2.5"/>${label(310,125,310,92,"Gram", "middle")}<text x="310" y="116" font-size="20" text-anchor="middle">15°</text>${label(374,145,412,98,"Bajra", "start")}<text x="446" y="126" font-size="20" text-anchor="middle">30°</text>${label(454,214,510,208,"Jowar", "start")}<text x="548" y="236" font-size="20" text-anchor="middle">45°</text>${label(392,397,505,380,"Rice", "start")}<text x="538" y="407" font-size="20" text-anchor="middle">135°</text>${label(182,346,130,408,"Maize", "end")}<text x="112" y="434" font-size="20" text-anchor="middle">35°</text>${label(177,197,120,174,"Wheat", "end")}<text x="102" y="202" font-size="20" text-anchor="middle">100°</text></g><text x="150" y="665" font-size="24" font-weight="700">Total production = 72 million tonnes</text></svg>`;
    }
    function votesSvg(id){
      const angles=[108,86.4,36,43.2,32.4,54],fills=[`url(#v-${id})`,`url(#dots-${id})`,`url(#h-${id})`,`url(#brick-${id})`,`url(#grid-${id})`,`url(#dash-${id})`];let s=0,parts="";angles.forEach((a,i)=>{parts+=sector(315,300,130,s,a,fills[i]);s+=a});
      return `<svg class="chart-svg" viewBox="0 0 650 680">${svgDefs(id)}<text x="24" y="44" font-size="22" font-style="italic" font-weight="700">Directions for questions 11 to 15: <tspan font-style="normal" font-weight="400">These questions are</tspan></text><text x="24" y="74" font-size="22">based on the following pie chart.</text><text x="24" y="128" font-size="22">The following pie chart represents the number of votes</text><text x="24" y="156" font-size="22">cast for different political parties in an election in the year</text><text x="24" y="184" font-size="22">2017. The total number of votes cast in that election is</text><text x="24" y="212" font-size="22">2,44,000.</text><g transform="translate(0,70)">${parts}<circle cx="315" cy="300" r="130" fill="none" stroke="#111" stroke-width="2.5"/>${label(425,235,478,218,"BJP", "start")}<text x="508" y="244" font-size="20">30%</text>${label(410,405,468,424,"Congress", "start")}<text x="500" y="452" font-size="20">24%</text>${label(270,423,235,462,"TDP", "end")}<text x="232" y="490" font-size="20">10%</text>${label(188,352,154,374,"BSP", "end")}<text x="150" y="402" font-size="20">12%</text>${label(194,270,162,238,"CPI", "end")}<text x="158" y="266" font-size="20">9%</text>${label(268,176,232,148,"Others", "middle")}<text x="232" y="176" font-size="20" text-anchor="middle">15%</text></g></svg>`;
    }
    function ironSvg(id){
      const data1=[["Uttar Pradesh","10%",36,`url(#grid-${id})`],["Andhra Pradesh","5%",18,`url(#brick-${id})`],["West Bengal","20%",72,"#fff"],["Jharkhand","25%",90,`url(#h-${id})`],["Madhya Pradesh","10%",36,`url(#dash-${id})`],["Bihar","15%",54,`url(#diag-${id})`],["Uttaranchal","15%",54,`url(#dots-${id})`]];
      const data2=[["Bihar","15%",54,`url(#dash-${id})`],["Andhra Pradesh","20%",72,"#fff"],["Madhya Pradesh","10%",36,`url(#grid-${id})`],["Jharkhand","20%",72,`url(#brick-${id})`],["West Bengal","15%",54,`url(#diag-${id})`],["Uttar Pradesh","5%",18,`url(#dots-${id})`],["Uttaranchal","15%",54,`url(#v-${id})`]];
      function make(cx,cy,r,data){let s=0,out="";data.forEach(d=>{out+=sector(cx,cy,r,s,d[2],d[3]);s+=d[2]});return out+`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#111" stroke-width="2.5"/>`}
      return `<svg class="chart-svg" viewBox="0 0 980 600">${svgDefs(id)}<text x="24" y="32" font-size="22">The pie charts give the percentage distribution of iron ore produced in India in 2015-16 and 2016-17.</text><text x="235" y="70" font-size="23" font-weight="700" text-anchor="middle">2015-16</text><text x="745" y="70" font-size="23" font-weight="700" text-anchor="middle">2016-17</text><g transform="translate(0,45)">${make(235,270,120,data1)}${make(745,270,120,data2)}<text x="235" y="505" font-size="22" font-weight="700" text-anchor="middle">Total = 720 million tonnes</text><text x="745" y="505" font-size="22" font-weight="700" text-anchor="middle">Total = 1080 million tonnes</text><text x="240" y="98" font-size="18" text-anchor="middle">Uttar<tspan x="240" dy="22">Pradesh</tspan><tspan x="240" dy="22">10%</tspan></text><text x="360" y="170" font-size="18">Andhra<tspan x="360" dy="22">Pradesh</tspan><tspan x="360" dy="22">5%</tspan></text><text x="420" y="275" font-size="18">West Bengal<tspan x="420" dy="24">20%</tspan></text><text x="315" y="395" font-size="18">Jharkhand<tspan x="315" dy="24">25%</tspan></text><text x="95" y="340" font-size="18">Madhya<tspan x="95" dy="22">Pradesh</tspan><tspan x="95" dy="22">10%</tspan></text><text x="60" y="250" font-size="18">Bihar<tspan x="60" dy="24">15%</tspan></text><text x="72" y="160" font-size="18">Uttaranchal<tspan x="72" dy="24">15%</tspan></text><text x="745" y="115" font-size="18" text-anchor="middle">Bihar<tspan x="745" dy="24">15%</tspan></text><text x="865" y="145" font-size="18">Andhra<tspan x="865" dy="22">Pradesh</tspan><tspan x="865" dy="22">20%</tspan></text><text x="905" y="262" font-size="18">Madhya<tspan x="905" dy="22">Pradesh</tspan><tspan x="905" dy="22">10%</tspan></text><text x="835" y="395" font-size="18">Jharkhand<tspan x="835" dy="24">20%</tspan></text><text x="600" y="385" font-size="18">West Bengal<tspan x="600" dy="24">15%</tspan></text><text x="550" y="270" font-size="18">Uttar Pradesh<tspan x="550" dy="24">5%</tspan></text><text x="560" y="205" font-size="18">Uttaranchal<tspan x="560" dy="24">15%</tspan></text></g></svg>`;
    }
    function setInfo(set,index){const id=`q${index}`;if(set===1)return `<div class="source-card">${placementSvg(id)}</div>`;if(set===2)return `<div class="source-card">${cropsSvg(id)}</div>`;if(set===3)return `<div class="source-card">${votesSvg(id)}</div>`;return `<div class="source-card">${ironSvg(id)}</div>`}
    const form=document.getElementById("testForm"),resultBox=document.getElementById("result"),palette=document.getElementById("palette"),answeredCount=document.getElementById("answeredCount"),time=document.getElementById("time"),calculatorDialog=document.getElementById("calculatorDialog"),calcDisplay=document.getElementById("calcDisplay");
    let submitted=false,secondsLeft=40*60,currentQuestionIndex=0;
    function correctAnswerText(item){return item.type==="text"?item.answer:`(${item.answer}) ${item.options[optionLabels.indexOf(item.answer)]}`}
    function renderQuestions(){form.innerHTML=questions.map((item,index)=>{const control=item.type==="text"?`<input class="text-answer" name="q${index}" inputmode="numeric" autocomplete="off" aria-label="Answer for question ${index+1}">`:`<div class="options">${item.options.map((option,i)=>`<label class="option"><input type="radio" name="q${index}" value="${optionLabels[i]}"><span>(${optionLabels[i]}) ${option}</span></label>`).join("")}</div>`;return `<div class="question" id="qcard-${index}"><div class="set-info">${setInfo(item.set,index)}</div><div class="question-body"><h2>Q${index+1}. ${item.q}</h2>${control}<div class="answer-note" id="note-${index}"></div></div></div>`}).join("")+`<div class="question-nav"><button class="secondary" type="button" id="prevQuestion">Previous</button><button class="secondary" type="button" id="nextQuestion">Save & Next</button></div><div class="actions"><button type="submit" id="submitBtn">Submit Test</button><button class="secondary" type="button" id="clearAnswers">Clear Responses</button></div>`;palette.innerHTML=questions.map((_,i)=>`<button class="dot" type="button" data-target="${i}">${i+1}</button>`).join("");palette.querySelectorAll(".dot").forEach(b=>b.addEventListener("click",()=>showQuestion(Number(b.dataset.target))));form.querySelectorAll("input").forEach(input=>input.addEventListener("change",updateAnsweredState));form.querySelectorAll(".text-answer").forEach(input=>input.addEventListener("input",updateAnsweredState));document.getElementById("prevQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex-1));document.getElementById("nextQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex+1));document.getElementById("clearAnswers").addEventListener("click",()=>{if(submitted)return;form.reset();updateAnsweredState();showQuestion(currentQuestionIndex)});showQuestion(0)}
    function showQuestion(index){if(index<0||index>=questions.length)return;currentQuestionIndex=index;document.querySelectorAll(".question").forEach((card,i)=>card.classList.toggle("active",i===index));palette.querySelectorAll(".dot").forEach((dot,i)=>dot.classList.toggle("active",i===index));const prev=document.getElementById("prevQuestion"),next=document.getElementById("nextQuestion");if(prev)prev.disabled=index===0||submitted;if(next)next.disabled=index===questions.length-1||submitted}
    function getAnswer(index){const item=questions[index];if(item.type==="text"){const input=document.querySelector(`[name="q${index}"]`);return input?input.value.trim():""}const selected=document.querySelector(`input[name="q${index}"]:checked`);return selected?selected.value:""}
    function normalize(value){return String(value).trim().replace(/,/g,"").toLowerCase()}
    function updateAnsweredState(){let answered=0;questions.forEach((_,i)=>{const has=Boolean(getAnswer(i));if(has)answered++;const dot=palette.querySelector(`[data-target="${i}"]`);if(dot)dot.classList.toggle("answered",has)});answeredCount.textContent=answered}
    function updateTimer(){const m=String(Math.floor(secondsLeft/60)).padStart(2,"0"),s=String(secondsLeft%60).padStart(2,"0");time.textContent=`${m}:${s}`;if(secondsLeft<=0){submitTest();return}secondsLeft--}
    function submitTest(event){if(event)event.preventDefault();if(submitted)return;submitted=true;let correct=0,wrong=0,unattempted=0;questions.forEach((item,index)=>{const answer=getAnswer(index),card=document.getElementById(`qcard-${index}`),note=document.getElementById(`note-${index}`),correctText=`Correct answer: ${correctAnswerText(item)}`;document.querySelectorAll(`[name="q${index}"]`).forEach(input=>input.disabled=true);const isCorrect=item.type==="text"?normalize(answer)===normalize(item.answer):answer===item.answer;if(!answer){unattempted++;card.classList.add("missed");note.className="answer-note muted";note.textContent=`Unattempted. ${correctText}`}else if(isCorrect){correct++;card.classList.add("correct");note.className="answer-note ok";note.textContent=`Correct. ${correctText}`}else{wrong++;card.classList.add("wrong");note.className="answer-note bad";note.textContent=`Incorrect. ${correctText}`}});resultBox.style.display="block";resultBox.innerHTML=`<h2>Test Summary</h2><div class="score-grid"><div class="score-box">Score<strong>${correct} / ${questions.length}</strong></div><div class="score-box">Correct<strong>${correct}</strong></div><div class="score-box">Wrong<strong>${wrong}</strong></div><div class="score-box">Unattempted<strong>${unattempted}</strong></div></div>`;document.querySelectorAll(".question").forEach(card=>card.classList.add("active"));document.getElementById("prevQuestion").disabled=true;document.getElementById("nextQuestion").disabled=true;document.getElementById("submitBtn").disabled=true;document.getElementById("clearAnswers").disabled=true}
    function appendCalcValue(v){if(calcDisplay.value==="0"||calcDisplay.value==="Error"){calcDisplay.value=v==="."?"0.":v;return}calcDisplay.value+=v}function calculateExpression(){const expression=calcDisplay.value.trim();if(!/^[0-9+\-*/%. ()]+$/.test(expression)){calcDisplay.value="Error";return}try{const value=Function(`"use strict"; return (${expression})`)();calcDisplay.value=Number.isFinite(value)?String(Number(value.toFixed(10))):"Error"}catch{calcDisplay.value="Error"}}
    document.getElementById("openCalculator").addEventListener("click",()=>{calculatorDialog.showModal();if(!calculatorDialog.dataset.moved){calculatorDialog.style.left=`${Math.max(14,(window.innerWidth-calculatorDialog.offsetWidth)/2)}px`;calculatorDialog.style.top="90px";calculatorDialog.style.transform="none"}calcDisplay.focus()});document.getElementById("closeCalculator").addEventListener("click",()=>calculatorDialog.close());document.getElementById("calcKeys").addEventListener("click",event=>{const key=event.target.closest("button");if(!key)return;if(key.dataset.action==="clear")calcDisplay.value="0";else if(key.dataset.action==="backspace")calcDisplay.value=calcDisplay.value.length>1?calcDisplay.value.slice(0,-1):"0";else if(key.dataset.action==="equals")calculateExpression();else if(key.dataset.value)appendCalcValue(key.dataset.value);calcDisplay.focus()});calcDisplay.addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();calculateExpression()}});
    const calculatorHead=calculatorDialog.querySelector(".calculator-head");let calculatorDrag=null;calculatorHead.addEventListener("pointerdown",event=>{if(event.target.closest("button"))return;const rect=calculatorDialog.getBoundingClientRect();calculatorDrag={offsetX:event.clientX-rect.left,offsetY:event.clientY-rect.top};calculatorDialog.style.transform="none";calculatorHead.setPointerCapture(event.pointerId)});calculatorHead.addEventListener("pointermove",event=>{if(!calculatorDrag)return;const maxLeft=window.innerWidth-calculatorDialog.offsetWidth-8,maxTop=window.innerHeight-calculatorDialog.offsetHeight-8;calculatorDialog.style.left=`${Math.min(Math.max(8,event.clientX-calculatorDrag.offsetX),Math.max(8,maxLeft))}px`;calculatorDialog.style.top=`${Math.min(Math.max(8,event.clientY-calculatorDrag.offsetY),Math.max(8,maxTop))}px`;calculatorDialog.dataset.moved="true"});calculatorHead.addEventListener("pointerup",event=>{calculatorDrag=null;calculatorHead.releasePointerCapture(event.pointerId)});calculatorHead.addEventListener("pointercancel",()=>{calculatorDrag=null});
    renderQuestions();updateAnsweredState();updateTimer();const timerId=setInterval(()=>{if(submitted){clearInterval(timerId);return}updateTimer()},1000);form.addEventListener("submit",submitTest);
  </script>
