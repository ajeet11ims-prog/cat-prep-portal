    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;grid-template-rows:minmax(0,1fr);gap:0;margin:0;padding:0;background:#fff;position:relative}main>section{grid-column:1;grid-row:1;min-width:0;min-height:0;border-right:2px solid #41515c}main>aside:first-child{grid-column:2;grid-row:1}.panel,.question-card,#result{background:var(--paper);border:0;border-radius:0}.panel{padding:14px;align-self:stretch;position:static;background:#e5f6fc}.question-palette-panel{display:flex;flex-direction:column;overflow:auto}.calc-wrap{position:fixed!important;top:120px;left:52%;width:264px;z-index:50;border:1px solid #7c8991;box-shadow:0 7px 18px rgba(0,0,0,.28);display:none;padding:0;align-self:auto;background:#eee}.calc-wrap.open{display:block}.panel h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--brand-mid);color:#fff;font-weight:700}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#7fd7f2;color:#fff;font-weight:700;font-size:16px;cursor:pointer}

157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

<body>
  <header><div class="topbar"><div class="title"><h1>Practice Exercise - 1</h1><div class="meta">Percentage | 15 Questions | 40 Minutes | +3 correct, -1 wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">40:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>
    <section><div id="result"></div><form id="testForm" autocomplete="off"><div id="questionHost" class="question-card"></div></form></section>
    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">x</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">Back</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">sqrt</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
      {
        level: "Level of difficulty - 1",
        q: "A wire manufacturing company purchased a certain amount of raw material, of which 10% was wasted due to improper handling. After using 85% of the remaining raw material, 47.25 kg of raw material was left. How much raw material was purchased initially?",
        options: ["200 kg", "250 kg", "300 kg", "350 kg"],
        answer: 3,
        solution: "Let 100x raw material be purchased. After 10% wastage, remaining material = 90x. Since 85% of the remaining material is used, left material = 15% of 90x = 13.5x. Given 13.5x = 47.25 kg, so x = 3.5 kg. Initial raw material = 100x = 350 kg. Hence, option D is correct."
      },
      {
        level: "Level of difficulty - 1",
        q: "The rate of inflation is 2,000% per annum. What is the value of the article two years from now, if it costs Rs. 12 today?",
        options: ["Rs. 5,292", "Rs. 5,992", "Rs. 6,992", "Rs. 7,052"],
        answer: 0,
        solution: "A 2000% increase means the value becomes 21 times every year. After 2 years, value = 12 x 21 x 21 = Rs. 5292. Hence, option A is correct."
      },
      {
        level: "Level of difficulty - 1",
        q: "A positive real number is first increased by 20%, then decreased by 25% and then finally increased by 10%. This process is repeated 49 more times. What can be said about the new number obtained?",
        options: ["It is less than 45% of the original number.", "It is between 45% and 55% of the original number.", "It is between 55% and 65% of the original number.", "It is greater than 65% of the original number."],
        answer: 2,
        solution: "One full operation multiplies the number by 1.20 x 0.75 x 1.10 = 0.99. The process is done 50 times, so final value = original x (0.99)^50, which is approximately 60.29% of the original. Hence, option C is correct."
      },
      {
        level: "Level of difficulty - 1",
        q: "Due to the rise in price by 9.09%, 2 kg wheat is obtainable for Rs. 60. Find the original per kg price of wheat.",
        options: ["Rs. 5/kg", "Rs. 2.5/kg", "Rs. 10/kg", "Rs. 9/kg"],
        answer: 1,
        solution: "9.09% = 1/11, so price ratio old:new = 11:12. For the same money, consumption ratio old:new = 12:11. If new consumption is 2 kg, old consumption would be 24/11 kg. Original price per kg = 60 / 24 = Rs. 2.5/kg. Hence, option B is correct."
      },
      {
        level: "Level of difficulty - 1",
        q: "Kajal went to a vegetable market with a certain amount of money. With this money she can buy either 40 apples or 70 mangoes. She retains 15% of her money for auto fare. If she buys 35 mangoes, how many more apples can she buy?",
        options: ["14", "20", "25", "28"],
        answer: 0,
        solution: "Let total money be Rs. 100. She keeps Rs. 15 for fare, so Rs. 85 is available for fruits. Cost of 70 mangoes = Rs. 100, so 35 mangoes cost Rs. 50. Remaining money = Rs. 35. Since Rs. 100 buys 40 apples, Rs. 35 buys 14 apples. Hence, option A is correct."
      },
      {
        level: "Level of difficulty - 2",
        q: "A's income is 75% of B's income and A's expenditure is 80% of B's expenditure. If A's income is 90% of B's expenditure, then find the ratio of A's savings to B's savings.",
        options: ["1 : 2", "2 : 1", "5 : 2", "3 : 5"],
        answer: 0,
        solution: "Let B's income = x and B's expenditure = y. A's income = 3x/4 and A's expenditure = 4y/5. Given A's income = 90% of B's expenditure, so 3x/4 = 9y/10, giving x/y = 6/5. Now A's savings = 3x/4 - 4y/5 and B's savings = x - y. Substituting x = 6y/5 gives A's savings : B's savings = 1 : 2. Hence, option A is correct."
      },
      {
        level: "Level of difficulty - 2",
        q: "A trader marks an article 60% above the cost price and makes 12% profit by selling at a certain discount. If the mark-up percentage and the discount percentage are each increased by 10 percentage points, then the percentage change in the profit will be?",
        options: ["It will decrease by 16.67%", "It will decrease by 83.33%", "It will increase by 21%", "It will decrease by 21%"],
        answer: 1,
        solution: "Let CP = 100. Initially profit = 12, so SP = 112 and MRP = 160. Discount = 48, so discount rate = 30%. New mark-up = 70%, so MRP = 170. New discount = 40% of 170 = 68, so new SP = 102 and new profit = 2. Profit decreases from 12 to 2, so percentage decrease = 10/12 x 100 = 83.33%. Hence, option B is correct."
      },
      {
        level: "Level of difficulty - 2",
        q: "An amount first increased by 14% and then further increased by 45%, such that the final amount becomes Rs. 16,530. How much was the initial amount?",
        options: ["Rs. 12,000", "Rs. 16,000", "Rs. 18,000", "Rs. 10,000"],
        answer: 3,
        solution: "Let initial amount be 100 units. After 14% increase it becomes 114 units. A further 45% increase on 114 = 51.3 units, so final amount = 165.3 units. If 165.3 units = Rs. 16,530, then 1 unit = Rs. 100 and 100 units = Rs. 10,000. Hence, option D is correct."
      },
      {
        level: "Level of difficulty - 2",
        q: "Shopkeeper Laxman sells chocolates at Rs. 100 per chocolate up to 200 chocolates. He sells chocolates in packets where each packet contains 20 chocolates. For every additional packet after 20 chocolates, he allows a discount of Rs. 5 per chocolate for all packets. What would be the number of packets he should sell so that his revenue is maximised?",
        options: ["13", "14", "15", "16"],
        answer: 2,
        solution: "Assume he sells k additional packets after the first 10 packets. Chocolates sold = 200 + 20k = 20(10 + k). Price per chocolate = 100 - 5k = 5(20 - k). Revenue = 100(10 + k)(20 - k). Since the sum of the two factors is constant, product is maximum when 10 + k = 20 - k, so k = 5. Packets = 10 + 5 = 15. Hence, option C is correct."
      },
      {
        level: "Level of difficulty - 2",
        q: "The income of Mr. Rajesh is 88.88% more than his expenditure. If his income increases by 30% and his expenditure increases by 35%, then his saving increases by Rs. 78,000. Find the difference between his initial income and initial expenditure.",
        options: ["Rs. 3,20,000", "Rs. 4,40,000", "Rs. 5,50,000", "Rs. 6,60,000"],
        answer: 0,
        solution: "88.88% = 8/9, so if expenditure = 900 units, income = 1700 units and savings = 800 units. Increase in income = 30% of 1700 = 510 units. Increase in expenditure = 35% of 900 = 315 units. Increase in savings = 510 - 315 = 195 units = Rs. 78,000. Therefore 1 unit = Rs. 400. Initial savings = 800 units = Rs. 3,20,000. Hence, option A is correct."
      },
      {
        level: "Level of difficulty - 3",
        q: "There are two types of biscuits P and Q. Type P has carbohydrates, fats and proteins and type Q has carbohydrates, fats and sugar. These two types are mixed in equal proportion to form type R. Both P and R have 30% carbohydrates. The percentage of sugar in Q and R is 40% and 20%, respectively. Type R has 24% proteins. The percentage of fat in type R biscuit is?",
        options: ["26%", "33%", "21%", "22%"],
        answer: 0,
        solution: "Since P and Q are mixed equally, R has average composition. R has 30% carbohydrates and P also has 30%, so Q also has 30% carbohydrates. R has 24% protein, and Q has no protein, so P has 48% protein. Fat in P = 100 - 30 - 48 = 22%. Fat in Q = 100 - 30 - 40 = 30%. Fat in R = (22 + 30)/2 = 26%. Hence, option A is correct."
      },
      {
        level: "Level of difficulty - 3",
        q: "A sweet seller decreases the price of one kg of sweet by 20% in the first month. In the second month, he increases the price by 20%. He follows this pattern every month. Find the month in which the price per kg goes below 60% of the initial price for the first time.",
        options: ["17th month", "16th month", "8th month", "10th month"],
        answer: 0,
        solution: "Let initial price be 100. After two months: 100 x 0.8 x 1.2 = 96, so every 2 months price falls by 4%. After 16 months, price = 100 x (0.96)^8 = about 72.11. In the 17th month it decreases by 20%, becoming about 57.69, which is below 60 for the first time. Hence, option A is correct."
      },
      {
        level: "Level of difficulty - 3",
        q: "In a class, each student likes at least one of the five subjects: Physics, Chemistry, Maths, English and Biotechnology. 80% like Physics, 70% like Chemistry, 90% like Maths, 80% like English and 90% like Biotechnology. What is the maximum percentage of students who like exactly 4 of the 5 subjects?",
        options: ["90%", "70%", "62%", "50%"],
        answer: 0,
        solution: "Total subject-likes = 80 + 70 + 90 + 80 + 90 = 410%. Let P be the percentage liking exactly 4 subjects and Q exactly 5 subjects. To maximize P, make the percentage liking 1, 2 and 3 subjects zero. Then P + Q = 100 and 4P + 5Q = 410. Subtracting 4P + 4Q = 400 gives Q = 10 and P = 90. Hence, option A is correct."
      },
      {
        level: "Level of difficulty - 3",
        q: "Shubham deals in only two types of beverages, cinnamon lime and jasmine crush. He wishes to spend Rs. 3.5 lakh to purchase a total of 100 cartons. Cinnamon lime costs Rs. 4,000 per carton and jasmine crush costs Rs. 3,000 per carton. During shortage, he can sell both at Rs. 6,000 per carton. For maximum profit, find the number of cartons he should stock of cinnamon lime and jasmine crush respectively.",
        options: ["70, 30", "60, 40", "50, 50", "None of these"],
        answer: 2,
        solution: "Let C and J be cinnamon lime and jasmine crush cartons. C + J = 100. Budget condition: 4000C + 3000J <= 350000, or 4C + 3J <= 350. From C + J = 100, multiplying by 4 gives 4C + 4J = 400. Subtracting the budget equation gives J >= 50, so C <= 50. Since selling price is the same and cinnamon lime gives lower profit per carton than jasmine crush, maximum feasible split from the given options is 50, 50. Hence, option C is correct."
      },
      {
        level: "Level of difficulty - 3",
        q: "There are two schemes of investment where interest is compounded annually. In the first scheme, an amount becomes 81 times in 8 years, whereas in the second scheme, the rate of interest is 70% per annum. Which scheme is better for investment?",
        options: ["The first scheme", "The second scheme", "Both would yield equal returns", "Cannot be determined"],
        answer: 0,
        solution: "For the first scheme, 81P = P(1 + R/100)^8. Since 81 = 3^4, (1 + R/100)^8 = 3^4, so (1 + R/100)^2 = 3. Therefore 1 + R/100 = sqrt(3) = 1.732, giving R = 73.2% approximately. This is greater than 70%, so the first scheme is better. Hence, option A is correct."
      }
    ];
    let current = 0, submitted = false, secondsLeft = 40 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function rich(s){return hasHtml(s) ? String(s) : esc(s);}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
        function isMcq(q){const t=String(q.type||'').toLowerCase();return t==='mcq'||t==='radio'||(Array.isArray(q.options)&&q.options.length>0);}
    function isTextQuestion(q){return !isMcq(q);}
    function correctIndex(q){if(typeof q.answer==='number')return q.answer;if(String(q.answer||'').match(/^\d+$/))return Number(q.answer);const c=String(q.correct||'').trim().toUpperCase();if(c.length===1&&c>='A'&&c<='D')return c.charCodeAt(0)-65;return 0;}
    function typedCorrect(q){return String(q.typedAnswer ?? q.correct ?? q.answerText ?? q.answer ?? '').trim();}
    function correctText(q){if(isMcq(q)){const idx=correctIndex(q);return "(" + labels[idx] + ") " + stripHtml((q.options||[])[idx] || typedCorrect(q));}return typedCorrect(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(directionHtml(q),'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(isMcq(q))return Number(ans)===correctIndex(q);return norm(ans)===norm(typedCorrect(q));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
