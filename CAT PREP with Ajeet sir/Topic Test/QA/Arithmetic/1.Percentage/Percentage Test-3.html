  <style>
    :root{--ink:#101820;--muted:#5f6f7a;--line:#b8c3cc;--brand:#0b75bb;--brand-dark:#24313a;--brand-mid:#4089c8;--soft:#dff3fb;--ok:#60b947;--bad:#e55b25;--review:#7b4ab0;--paper:#fff;--bg:#eef3f7}
    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;grid-template-rows:minmax(0,1fr);gap:0;margin:0;padding:0;background:#fff;position:relative}main>section{grid-column:1;grid-row:1;min-width:0;min-height:0;border-right:2px solid #41515c}main>aside:first-child{grid-column:2;grid-row:1}.panel,.question-card,#result{background:var(--paper);border:0;border-radius:0}.panel{padding:14px;align-self:stretch;position:static;background:#e5f6fc}.question-palette-panel{display:flex;flex-direction:column;overflow:auto}.calc-wrap{position:fixed!important;top:120px;left:52%;width:264px;z-index:50;border:1px solid #7c8991;box-shadow:0 7px 18px rgba(0,0,0,.28);display:none;padding:0;align-self:auto;background:#eee}.calc-wrap.open{display:block}.panel h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--brand-mid);color:#fff;font-weight:700}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#7fd7f2;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin:18px 0;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;overflow:auto;padding:0 0 74px;background:#fff}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:block;font-size:13px;color:var(--muted);margin-top:2px}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px;white-space:pre-wrap}.qtext p,.block p,.option p{margin:0 0 10px}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,calc(100% - 48px));font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 0;padding-top:14px;border-top:1px solid var(--line);font-size:17px;white-space:pre-wrap}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}
  </style>

<body>
  <header><div class="topbar"><div class="title"><h1>Practice Exercise - 2</h1><div class="meta">Percentage | 30 Questions | 60 Minutes | +3 correct, -1 wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>
    <section><div id="result"></div><form id="testForm" autocomplete="off"><div id="questionHost" class="question-card"></div></form></section>
    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">x</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">Back</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">sqrt</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
      {
        level: "Level of Difficulty - 1",
        q: "To qualify for the board exam, a student has to obtain 39% of the total marks. Rohan got 98 marks and yet failed by 19 marks in the annual exam. Find the total marks in the exam.",
        type: "mcq",
        options: ["500", "450", "400", "300"],
        answer: 3,
        solution: "Rohan failed by 19 marks, so qualifying marks = 98 + 19 = 117. Since 117 is 39% of total marks, total marks = 117 x 100 / 39 = 300. Hence, option D is correct."
      },
      {
        level: "Level of Difficulty - 1",
        q: "Akhilesh usually saves 36% of his monthly income. In one month, he gives some donations and hence his monthly expenses increase by 25%. He manages to save Rs. 37,000 in that month. Find his monthly salary.",
        type: "mcq",
        options: ["1,50,000", "1,75,000", "1,85,000", "1,95,000"],
        answer: 2,
        solution: "Assume usual income = Rs. 100. Savings = Rs. 36, so expenses = Rs. 64. Expenses increase by 25%, so new expenses = 64 + 16 = Rs. 80. New savings = 100 - 80 = Rs. 20. Given Rs. 20 corresponds to Rs. 37,000, so Rs. 100 corresponds to Rs. 1,85,000. Hence, option C is correct."
      },
      {
        level: "Level of Difficulty - 1",
        q: "In a company, the amount of work in month 2 is 150% of month 1. Due to this, the company hires new workers who have 25% more efficiency than the usual workers. The number of workers in month 2 is what percent more than the number of workers in month 1, given that the time taken to do the work in both months is the same?",
        type: "mcq",
        options: ["33.33%", "40%", "25%", "28%"],
        answer: 1,
        solution: "Let there be 100 workers in month 1 and total work = 100 units. In month 2, work = 150 units. If normal workers were used, 50 extra workers would be needed. New workers are 25% more efficient, so required new workers = 50 / 1.25 = 40. Total workers in month 2 = 140, which is 40% more than month 1. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 1",
        q: "Due to a 37.5% decrease in the price of chocolates, Anand bought 21 extra chocolates for his daughter at the same price in which he usually gets A chocolates. Find A.",
        type: "mcq",
        options: ["20", "35", "55", "56"],
        answer: 1,
        solution: "Let Anand initially bought A chocolates at price B per chocolate. New price after 37.5% decrease = 62.5% of B = 5B/8. Expenditure is constant, so A x B = (A + 21) x (5B/8). Solving gives 8A = 5A + 105, so A = 35. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 1",
        q: "'P' is a number such that 80% of P is more than 57% by 25,300. What is 116% of the number P?",
        type: "mcq",
        options: ["1,20,000", "1,10,000", "1,27,600", "None of these"],
        answer: 2,
        solution: "According to the question, 80% of P - 57% of P = 25,300. So 23% of P = 25,300, giving P = 1,10,000. Therefore 116% of P = 1,27,600. Hence, option C is correct."
      },
      {
        level: "Level of Difficulty - 1",
        q: "The vehicle of Mr. Madmax needs 40% more fuel at 90 kmph than it needs at 60 kmph. At 60 kmph, with K litres of fuel, he can travel 322 km. At 90 kmph with the same K litres, what distance will he be able to travel?",
        type: "mcq",
        options: ["214.67 km", "230 km", "242 km", "450.8 km"],
        answer: 1,
        solution: "Fuel required for 322 km at 60 kmph = K litres. At 90 kmph, same distance requires 1.4K litres. So with K litres at 90 kmph, distance = 322 / 1.4 = 230 km. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 1",
        q: "Sonia saves 18.75% of her income. A year later, her income shoots up by 37.5%, but her savings remain the same. Find the approximate percentage increase in her expenditure.",
        type: "mcq",
        options: ["48%", "46%", "44%", "42%"],
        answer: 1,
        solution: "18.75% = 3/16 and 37.5% = 3/8. Let earlier income = 16K. Savings = 3K and expenditure = 13K. New income = 22K, savings remain 3K, so new expenditure = 19K. Increase in expenditure = (19K - 13K) / 13K x 100 = approximately 46%. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 1",
        q: "Archana decided to donate 15% of her monthly income to an NGO. On the day of donation, she changed her mind and donated Rs. 96,000 which was equal to 80% of what she had decided earlier. What is 40% of her monthly income?",
        type: "mcq",
        options: ["Rs 4,00,000", "Rs 3,20,000", "Rs 4,80,000", "Rs 5,00,000"],
        answer: 1,
        solution: "Let monthly salary = K. Planned donation = 15% of K = 0.15K. Actual donation = 80% of planned donation = 0.15K x 80% = 96,000. So K = 8,00,000. Therefore 40% of monthly salary = Rs. 3,20,000. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 1",
        q: "If the present cost of an article is Rs. 2916 and the annual rate of inflation for that article is 166.67%, then what will be the cost of the same article 3 years from now?",
        type: "mcq",
        options: ["Rs. 52,300", "Rs. 54,300", "Rs. 55,200", "Rs. 55,296"],
        answer: 3,
        solution: "166.67% increase means the multiplying factor is 1 + 5/3? More directly, new value factor = 1 + 166.67/100 = 8/3. After 3 years, cost = 2916 x (8/3)^3 = Rs. 55,296. Hence, option D is correct."
      },
      {
        level: "Level of Difficulty - 1",
        q: "Khushi went shopping with a certain amount. She spent one-third of the amount on groceries, 30% of the remaining amount on chocolates, and one-fifth of the remaining amount on a gift for her sister. She came back with Rs. 336. Find the initial amount with her.",
        type: "mcq",
        options: ["Rs. 600", "Rs. 800", "Rs. 900", "Rs. 960"],
        answer: 2,
        solution: "Let initial amount = 150K. Grocery expense = 50K, leaving 100K. Chocolate expense = 30% of 100K = 30K, leaving 70K. Gift expense = 1/5 of 70K = 14K, leaving 56K. Given 56K = 336, so K = 6. Initial amount = 150 x 6 = Rs. 900. Hence, option C is correct."
      },
      {
        level: "Level of Difficulty - 2",
        q: "In an election between two candidates, 15% of voters did not vote, 3900 votes were declared invalid and the winner got 57% of the valid votes and won by 1120 votes. Find the total number of voters enrolled in the voting list.",
        type: "mcq",
        options: ["15,000 voters", "18,000 voters", "14,000 voters", "16,000 voters"],
        answer: 2,
        solution: "Let total voters = 20K. Voters who did not vote = 3K, so votes cast = 17K. Valid votes = 17K - 3900. Winner got 57% and loser 43%, so winning margin = 14% of valid votes = 1120. Thus 14% of (17K - 3900) = 1120, giving K = 700. Total voters = 20K = 14,000. Hence, option C is correct."
      },
      {
        level: "Level of Difficulty - 2",
        q: "The price of the bicycle first increased by 11.11%, then increased by 16.66% and then increased by 7.7% such that the price becomes Rs. 9800. What was the original price of the bicycle?",
        type: "mcq",
        options: ["Rs. 5,940", "Rs. 6,480", "Rs. 7,020", "Rs. 7,560"],
        answer: 2,
        solution: "11.11% = 1/9, 16.66% = 1/6 and 7.7% is treated as 1/13. Let original price = K. Then K x 10/9 x 7/6 x 14/13 = 9800. Solving gives K = Rs. 7020. Hence, option C is correct."
      },
      {
        level: "Level of Difficulty - 2",
        q: "A Business Group has 3 companies X, Y, Z, and a Trust P. Each group company donates 5% of its funds to the Trust, excluding loans taken from other group companies. X has given a loan to Y equivalent to 10% of Y's funds. After receiving the loan, Y has funds 2 times the funds of Z. If Z gave Rs. 10,000 as donation to Trust P, how much is the approximate contribution of Y to Trust P?",
        type: "mcq",
        options: ["Rs 17,000", "Rs 18000", "Rs 19000", "Rs 20000"],
        answer: 1,
        solution: "Z's donation = Rs. 10,000 = 5% of Z's fund, so Z's fund = Rs. 2,00,000. Y's new fund = 2 x Z = Rs. 4,00,000. Since this includes a loan equal to 10% of Y's original fund, 110% of Y's original fund = 4,00,000, so original fund is about Rs. 3,63,636. Y's donation = 5% of this = about Rs. 18,182, nearest Rs. 18,000. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 2",
        q: "The price of a watch is first increased by 20% and then decreased by 5%. The price of another digital watch first increased by 25% and then decreased by 10%. If the final price of both watches is the same, find the ratio of their initial prices.",
        type: "mcq",
        options: ["75 : 76", "76 : 75", "97 : 71", "71 : 78"],
        answer: 0,
        solution: "Let the initial prices be x and y. Final price of first watch = x x 120% x 95%. Final price of second watch = y x 125% x 90%. Since final prices are equal, x/y = (125 x 90) / (120 x 95) = 75/76. Hence, option A is correct."
      },
      {
        level: "Level of Difficulty - 2",
        q: "9.09% of the voters did not cast their vote in an election involving only 2 candidates. 11.11% of the votes polled were declared invalid. The losing candidate got 33.5% of the valid votes polled and lost by 39,600 votes. The number of voters enrolled on the voter list was:",
        type: "mcq",
        options: ["1,47,500", "1,36,500", "1,48,500", "1,62,000"],
        answer: 2,
        solution: "Let enrolled voters = N. Votes cast = 10N/11. Valid votes = (8/9) x (10N/11). Losing candidate got 33.5%, so winner got 66.5%, and margin = 33% of valid votes. Thus 33% x (8/9) x (10/11) x N = 39,600, giving N = 1,48,500. Hence, option C is correct."
      },
      {
        level: "Level of Difficulty - 2",
        q: "Rahul spends 12.5% of his monthly income on house rent, 16.66% of the remaining income on food, 18.75% of the remaining on education and travel, one-third of the remaining on medicines and saves the remaining amount of Rs. 27,300. Find Rahul's monthly income.",
        type: "text",
        answer: "69120",
        accepted: ["69120", "69,120", "rs69120", "rs.69120", "rs.69120"],
        solution: "Let monthly income = K. After rent, amount left = 7K/8. After food, left = (5/6)(7K/8). After education/travel, left = (13/16)(5/6)(7K/8). After medicines, savings = (2/3)(13/16)(5/6)(7K/8)K = 27,300. Solving gives K = Rs. 69,120."
      },
      {
        level: "Level of Difficulty - 2",
        q: "The income of Ankit is 60% more than Shrikant and the income of Shrikant is 20% less than Shishir. If Shishir's income goes down by 12% and Shrikant's income goes up by 20%, then the percent by which Shishir's income would become less than Shrikant is near to:",
        type: "mcq",
        options: ["4%", "6%", "8%", "10%"],
        answer: 2,
        solution: "Let Shrikant's income = 100. Then Shishir's income = 125. After changes, Shishir's income = 88% of 125 = 110 and Shrikant's income = 120% of 100 = 120. Difference = 10. Required percent = 10/120 x 100 = 8.33%, nearest 8%. Hence, option C is correct."
      },
      {
        level: "Level of Difficulty - 2",
        q: "There are two alloys A and B made up of Silver, Copper and Zinc. Alloy A contains 55% Silver and the rest Copper. Alloy B contains 45% Silver, 40% Copper and the rest Zinc. Alloys A and B are mixed in a ratio 5:3 to form a new alloy. Find the approximate percentage of Silver in the newly formed alloy.",
        type: "mcq",
        options: ["55%", "51%", "48%", "None of these"],
        answer: 1,
        solution: "Assume alloy A = 500 kg and alloy B = 300 kg. Silver in A = 55% of 500 = 275 kg. Silver in B = 45% of 300 = 135 kg. Total silver = 410 kg and total alloy = 800 kg. Silver percentage = 410/800 x 100 = 51.25%, approximately 51%. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 2",
        q: "Data scientists predicted that 20% of people who consume alcohol get liver damage and 80% of liver patients consume alcohol. If 30% of the population consumes alcohol, find the percent of the total population having liver damage.",
        type: "mcq",
        options: ["13%", "9%", "6%", "7.5%"],
        answer: 3,
        solution: "Let total population = 100K. People consuming alcohol = 30K. Alcohol consumers with liver damage = 20% of 30K = 6K. These are 80% of all liver patients, so total liver patients = 6K / 0.8 = 7.5K, which is 7.5% of total population. Hence, option D is correct."
      },
      {
        level: "Level of Difficulty - 2",
        q: "There are 5 friends A, B, C, D and E. B's income is 20% less than A's. C's income is 12.5% more than B's. D's income is 33.33% more than C's, but 14.28% less than E's. E's income is how much percent more than A's income?",
        type: "mcq",
        options: ["20%", "25%", "33.33%", "40%"],
        answer: 3,
        solution: "Let A's income = 100K. B = 80K. C = 80K + 12.5% of 80K = 90K. D = 90K + 33.33% of 90K = 120K. Since D is 14.28% less than E, D = 6/7 of E, so E = 140K. E is 40% more than A. Hence, option D is correct."
      },
      {
        level: "Level of Difficulty - 3",
        q: "The production of rice as a percentage of total food production was 28% in India in 2019. In 2020, rice production as a percentage of total food production decreased by 5 percentage points. Total food production increased by 20% from 2019 to 2020. If total rice production in 2020 was 138 million tons, what was total rice production in 2019?",
        type: "text",
        answer: "140",
        accepted: ["140", "140 million tons", "140milliontons"],
        solution: "Rice share in 2020 = 28% - 5% = 23%. Since 23% of total food production in 2020 = 138 million tons, total food production in 2020 = 600 million tons. Total food production in 2019 = 600 / 1.2 = 500 million tons. Rice production in 2019 = 28% of 500 = 140 million tons."
      },
      {
        level: "Level of Difficulty - 3",
        q: "In a class, 59% of the students are boys and the rest are girls. There are 162 more boys than girls. If 73% of the students in class, including 423 boys, pass an examination, then the approximate percentage of girls who did not pass the exam is:",
        type: "mcq",
        options: ["44%", "40%", "36%", "32%"],
        answer: 2,
        solution: "Let total students = 100K. Boys = 59K, girls = 41K. Difference = 18K = 162, so K = 9. Total students = 900, boys = 531, girls = 369. Total passed = 73% of 900 = 657. Boys passed = 423, so girls passed = 234. Girls not passed = 369 - 234 = 135. Required percentage = 135/369 x 100 = approximately 36%. Hence, option C is correct."
      },
      {
        level: "Level of Difficulty - 3",
        q: "Shubham was working in company A. He got a letter from company B with a hike of 20% on his current salary. Company A increased his salary by 25%. Company B then offered 16.66% more after knowing this. This was repeated once more by company A increasing the salary by 20% more and company B giving a hike of 14.28% more. Finally, Shubham joined company B. What is the percentage increase in Shubham's salary?",
        type: "mcq",
        options: ["40%", "45%", "60%", "75%"],
        answer: 2,
        solution: "Let Shubham's current salary be K. First offer by B = (6/5)K. Company A then gives 25% hike, and B gives 16.66% more: (6/5) x (7/6)K. Next A gives 20% more, and B gives 14.28% more: (6/5) x (7/6) x (8/7)K = (8/5)K = 1.6K. So salary increases by 60%. Hence, option C is correct."
      },
      {
        level: "Level of Difficulty - 3",
        q: "Price of the bicycle first increased by 11.11%, then increased by 6.66%, then increased by 7.14%, then increased by 6.25% and then increased by 12.5%, such that the price becomes Rs. 13,600. What was the original price?",
        type: "text",
        answer: "8960",
        accepted: ["8960", "8,960", "rs8960", "rs.8960"],
        solution: "11.11% = 1/9, 6.66% = 1/15, 7.14% = 1/14, 6.25% = 1/16 and 12.5% = 1/8. Let original price = K. Then K x 10/9 x 16/15 x 15/14 x 17/16 x 9/8 = 13600. Solving gives K = Rs. 8960."
      },
      {
        level: "Level of Difficulty - 3",
        q: "Manufacturing a product requires raw materials A, B, C in the ratio 1:2:4 by quantity. Cost per ton of A, B and C is in the ratio 3:4:6. The product is sold at 20% profit. If costs of A, B and C increase by 30%, 40% and 10% respectively, what should be the approximate percent increase in selling price so that profit percent remains the same?",
        type: "mcq",
        options: ["17%", "19%", "20%", "23%"],
        answer: 1,
        solution: "Assume quantities of A, B, C are 1, 2, 4 tons and costs per ton are Rs. 30, 40, 60. Initial cost = 1x30 + 2x40 + 4x60 = Rs. 350. Initial selling price at 20% profit = Rs. 420. New costs: A = 39, B = 56, C = 66. New cost = 1x39 + 2x56 + 4x66 = Rs. 415. New selling price at 20% profit = Rs. 498. Increase = (498 - 420)/420 x 100 = approximately 19%. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 3",
        q: "Raja bought a shotgun for Rs. 10,10,101. He sold it to Ram at 33.33% profit, Ram sold it to Mohan at 22.22% loss, Mohan sold it to Roy at 81.25% loss, Roy sold it to Neil at 6.66% profit, Neil sold it to Nitin at 28.57% profit, and Nitin sold it to Mukesh at 275% profit. What is the difference between the CP of Raja and Mukesh?",
        type: "text",
        answer: "0",
        accepted: ["0", "zero", "rs0", "rs.0"],
        solution: "The combined multiplying factor is (4/3) x (7/9) x (3/16) x (16/15) x (9/7) x (15/4) = 1. Therefore Mukesh's cost price equals Raja's original cost price, Rs. 10,10,101. Difference = 0."
      },
      {
        level: "Level of Difficulty - 3",
        q: "Ratan is considering 3 alternatives to invest his surplus cash for a month. He wishes to guarantee maximum return on his investment. He has 3 options, each of which can be utilized fully or partially in conjunction with others. Find the maximum guaranteed return.",
        type: "mcq",
        options: ["0.75%", "1%", "1.5%", "2%"],
        answer: 1,
        solution: "From the given solution method, mutual funds are better than debt funds. For guaranteed return, balance the stock-market-rise and stock-market-fall cases. Let investment in the two mutual funds be 100x and 100y. Returns are 6x - 3y and -4x + 5y. Equating gives 10x = 8y, so x:y = 4:5. Total investment = 900k and guaranteed return = 9k, giving 1%. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 3",
        q: "There are 2 factories A and B. In factory A, male employees are 60% more than female employees. In factory B, female employees are 60% less than male employees. If total employees in A and B together are 6400, what could be the maximum number of total employees in factory B?",
        type: "mcq",
        options: ["6,160", "5,880", "5,600", "5,320"],
        answer: 1,
        solution: "Let female employees in factory A = 100a, so male employees = 160a and total A = 260a. Let male employees in factory B = 100b, so female employees = 40b and total B = 140b. Given 260a + 140b = 6400, or 13a + 7b = 320. To maximize 140b, maximize b with natural-number a. Taking a = 2 gives b = 42, so factory B total = 140 x 42 = 5880. Hence, option B is correct."
      },
      {
        level: "Level of Difficulty - 3",
        q: "The production of rice formed 30% of total food grain produced in India in 2018. In 2019, the share of rice in total food grain production decreased by 10 percentage points. Find the percentage change in rice production from 2018 to 2019, if total food grain production increased by 25%.",
        type: "mcq",
        options: ["Decreased by 16.66%", "Increased by 16.66%", "Decreased by 12.5%", "Increased by 12.5%"],
        answer: 0,
        solution: "Assume total food grain production in 2018 = 100 kg. Rice in 2018 = 30% = 30 kg. In 2019, rice share = 20%. Total food grain production in 2019 = 125 kg. Rice in 2019 = 20% of 125 = 25 kg. Decrease = 5/30 x 100 = 16.66%. Hence, option A is correct."
      },
      {
        level: "Level of Difficulty - 3",
        q: "In a basketball tournament, a central region team has played 20 matches so far and won 40% of them. If they win 60% of the remaining matches, their overall winning percentage will be 50%. Suppose they win 80% of the remaining matches, then the total number of matches won by the team in this tournament will be:",
        type: "mcq",
        options: ["20", "16", "24", "28"],
        answer: 2,
        solution: "Matches won so far = 40% of 20 = 8. Let remaining matches = K. If they win 60% of remaining matches, then (8 + 0.6K)/(20 + K) = 1/2. Solving gives K = 20. If they instead win 80% of remaining matches, wins in remaining matches = 16. Total wins = 8 + 16 = 24. Hence, option C is correct."
      }
    ];
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function rich(s){return hasHtml(s) ? String(s) : esc(s);}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
