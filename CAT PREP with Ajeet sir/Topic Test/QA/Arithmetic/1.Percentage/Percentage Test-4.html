  <style>
    :root{--ink:#101820;--muted:#5f6f7a;--line:#b8c3cc;--brand:#0b75bb;--brand-dark:#24313a;--brand-mid:#4089c8;--soft:#dff3fb;--ok:#60b947;--bad:#e55b25;--review:#7b4ab0;--paper:#fff;--bg:#eef3f7}
    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;grid-template-rows:minmax(0,1fr);gap:0;margin:0;padding:0;background:#fff;position:relative}main>section{grid-column:1;grid-row:1;min-width:0;min-height:0;border-right:2px solid #41515c}main>aside:first-child{grid-column:2;grid-row:1}.panel,.question-card,#result{background:var(--paper);border:0;border-radius:0}.panel{padding:14px;align-self:stretch;position:static;background:#e5f6fc} .calc-wrap{position:fixed!important;top:120px;left:52%;width:264px;z-index:50;border:1px solid #7c8991;box-shadow:0 7px 18px rgba(0,0,0,.28);display:none;padding:0;align-self:auto;background:#eee}.calc-wrap.open{display:block}.panel h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--brand-mid);color:#fff;font-weight:700}.question-palette-panel{display:flex;flex-direction:column}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#7fd7f2;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin-top:18px;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;overflow:auto;padding:0 0 74px;background:#fff}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:none}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px}.qtext p,.block p,.option p{margin:0 0 10px}.data-table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:18px;line-height:1.35;background:#fff}.data-table th,.data-table td{border:1px solid #6f7f8b;padding:8px 10px;text-align:left}.data-table th{background:#dff3fb;font-weight:800}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,100%);font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 0;padding-top:14px;border-top:1px solid var(--line);font-size:17px}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

<body>
  <header><div class="topbar"><div class="title"><h1>Percentage Advance Level + PYQs</h1><div class="meta">30 Questions | 60 Minutes | +3 correct, -1 wrong | MCQ and numeric entry</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>

  </main>
  <script>
    const questions = [{"no": 1, "source": "Percentage Advance Test | Q1", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>60% of P is 32 less than 50% of Q and the sum of 50% of P and 75% of Q is equivalent to Q. Find the difference between P and Q.</p>", "options": [], "answer": 0, "typedAnswer": "80", "accepted": ["80"], "solution": "<p>From the first condition, 60% of P is 32 less than 50% of Q: 0.6P = 0.5Q - 32.</p><p>From the second condition, 50% of P + 75% of Q = Q, so 0.5P = 0.25Q and P = 0.5Q.</p><p>Substitute P = 0.5Q in the first equation: 0.6 Ã— 0.5Q = 0.5Q - 32.</p><p>0.3Q = 0.5Q - 32, so 0.2Q = 32 and Q = 160.</p><p>Then P = 80. Difference = 160 - 80 = 80.</p>"}, {"no": 2, "source": "Percentage Advance Test | Q2", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The sum of 120% of 220 and 560% of 625% of 20 is equal to the sum of 80% of 180% of 250 and X. What is the value of 150% of X?</p>", "options": [], "answer": 0, "typedAnswer": "906", "accepted": ["906"], "solution": "<p>120% of 220 = 1.2 Ã— 220 = 264.</p><p>625% of 20 = 6.25 Ã— 20 = 125. Then 560% of this = 5.6 Ã— 125 = 700.</p><p>Left side sum = 264 + 700 = 964.</p><p>80% of 180% of 250 = 0.8 Ã— 1.8 Ã— 250 = 360.</p><p>So 964 = 360 + X, hence X = 604.</p><p>150% of X = 1.5 Ã— 604 = 906.</p>"}, {"no": 3, "source": "Percentage Advance Test | Q3", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a group of 600 people, the ratio of males to females is 5:1. 72.5% of people are graduates. If 84% of males are graduates, then what percentage of females are graduates?</p>", "options": [], "answer": 0, "typedAnswer": "15", "accepted": ["15", "15%"], "solution": "<p>Total people = 600. Ratio of males to females = 5:1.</p><p>Males = 500 and females = 100.</p><p>Total graduates = 72.5% of 600 = 435.</p><p>Male graduates = 84% of 500 = 420.</p><p>Female graduates = 435 - 420 = 15.</p><p>Percentage of females who are graduates = 15/100 Ã— 100 = 15%.</p>"}, {"no": 4, "source": "Percentage Advance Test | Q4", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Obama bought some shirts. He gave 70% of the total shirts to Johnson and the rest to Biden. Next day, he buys 25% more shirts than the previous day. If he gave 10% more shirts to Johnson than the previous day, then the number of shirts given to Biden is what percent more than the previous day?</p>", "options": [], "answer": 0, "typedAnswer": "60", "accepted": ["60", "60%"], "solution": "<p>Let the number of shirts bought on the first day be T.</p><p>First day: Johnson gets 70% of T = 0.70T and Biden gets 0.30T.</p><p>Second day total shirts = 25% more = 1.25T.</p><p>Johnson gets 10% more than the previous day, so Johnson gets 1.10 Ã— 0.70T = 0.77T.</p><p>Second day Biden gets 1.25T - 0.77T = 0.48T.</p><p>Increase in Bidenâ€™s shirts = 0.48T - 0.30T = 0.18T.</p><p>Percentage increase = 0.18T / 0.30T Ã— 100 = 60%.</p>"}, {"no": 5, "source": "Percentage Advance Test | Q5", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>There are four numbers such that A is 60% more than B and C is 30% less than the sum of B and A. If D is 10% more than C and the difference between D and B is 3006, then find C.</p>", "options": [], "answer": 0, "typedAnswer": "5460", "accepted": ["5460"], "solution": "<p>Let B = x.</p><p>A is 60% more than B, so A = 1.6x.</p><p>A + B = 2.6x. C is 30% less than this, so C = 70% of 2.6x = 1.82x.</p><p>D is 10% more than C, so D = 1.1 Ã— 1.82x = 2.002x.</p><p>Given D - B = 3006, so 2.002x - x = 3006.</p><p>1.002x = 3006, hence x = 3000.</p><p>C = 1.82 Ã— 3000 = 5460.</p>"}, {"no": 6, "source": "Percentage Advance Test | Q6", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The price of an iPhone increased by 20% and then decreased by 15%. The price of an android smartphone increased by 15% and then decreased by 20%. If final prices of both items are same, find the ratio of initial price of iPhone to initial price of android smartphone.</p>", "options": ["187/207", "46/51", "23/27", "19/21"], "answer": 1, "typedAnswer": "46/51", "accepted": [], "solution": "<p>Let the initial price of iPhone be I and Android be A.</p><p>iPhone final price factor = 120% Ã— 85% = 1.2 Ã— 0.85 = 1.02.</p><p>Android final price factor = 115% Ã— 80% = 1.15 Ã— 0.80 = 0.92.</p><p>Final prices are equal, so 1.02I = 0.92A.</p><p>Therefore I/A = 0.92/1.02 = 92/102 = 46/51.</p>"}, {"no": 7, "source": "Percentage Advance Test | Q7", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a tank full of plastic balls of 4 different colours, 18% of the total balls are Red, 4/9 are Blue, and 8% are Green. If there are 133 yellow balls, find the difference between the number of Red balls and Green balls.</p>", "options": ["45", "90", "30", "60"], "answer": 0, "typedAnswer": "45", "accepted": [], "solution": "<p>Red balls = 18% of total, blue balls = 4/9 = 44.44%, green balls = 8%.</p><p>Yellow percentage = 100% - 18% - 44.44% - 8% = 29.555...% = 266/9%.</p><p>Given yellow balls = 133, so total balls = 133 Ã· (266/900) = 450.</p><p>Red balls = 18% of 450 = 81.</p><p>Green balls = 8% of 450 = 36.</p><p>Difference = 81 - 36 = 45.</p>"}, {"no": 8, "source": "Percentage Advance Test | Q8", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>At a marriage party, 45% of the guests are men and the remaining are women. 80% of the women guests are married and 40% of the men guests are unmarried. If 50% of the married men guests are present with their better halves, find the percentage of women who are married but not with their husbands.</p>", "options": ["30.5%", "32.5%", "37.5%", "35.5%"], "answer": 0, "typedAnswer": "30.5%", "accepted": [], "solution": "<p>Take total guests as 100.</p><p>Men = 45 and women = 55.</p><p>Married women = 80% of 55 = 44.</p><p>Unmarried men = 40% of 45 = 18, so married men = 45 - 18 = 27.</p><p>50% of married men are present with their wives, so wives present with husbands = 50% of 27 = 13.5.</p><p>Married women not with their husbands = 44 - 13.5 = 30.5.</p><p>Thus the required percentage, as per the given option format, is 30.5%.</p>"}, {"no": 9, "source": "Percentage Advance Test | Q9", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In the Delhi election, 55% of voters in a constituency are males and the rest are females. If 70% of males are employed and 60% of females are unemployed, then the number of unemployed males is what percent more or less than the number of employed females?</p>", "options": ["8%", "8.3%", "8.1%", "7%"], "answer": 1, "typedAnswer": "8.3%", "accepted": [], "solution": "<p>Take total voters as 100.</p><p>Males = 55 and females = 45.</p><p>Unemployed males = 30% of 55 = 16.5.</p><p>Employed females = 40% of 45 = 18.</p><p>Unemployed males are fewer by 18 - 16.5 = 1.5.</p><p>Percentage difference with respect to employed females = 1.5/18 Ã— 100 = 8.33%. Hence about 8.3% less.</p>"}, {"no": 10, "source": "Percentage Advance Test | Q10", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In 2020, Vishal got 20% more incentive in the 3rd month than in the 2nd month. His incentive in the 4th month was 7 61/77% more than in the 3rd month. If he got Rs. 4500 in the first month and the difference between incentives in the 4th and 2nd month is Rs. 1130, then the total incentive received in the first four months is:</p>", "options": ["Rs. 17950", "Rs. 16480", "Rs. 18560", "None of these"], "answer": 0, "typedAnswer": "Rs. 17950", "accepted": [], "solution": "<p>Let Vishalâ€™s incentive in the 2nd month be x.</p><p>3rd month incentive = 20% more = 1.2x = 6x/5.</p><p>7 61/77% = 600/77% = 6/77. So 4th month factor over 3rd month = 1 + 6/77 = 83/77.</p><p>4th month incentive = (6x/5) Ã— (83/77) = 498x/385.</p><p>Given 4th month - 2nd month = 1130, so (498x/385 - x) = 1130.</p><p>113x/385 = 1130, hence x = 3850.</p><p>1st month = 4500, 2nd = 3850, 3rd = 4620, 4th = 4980.</p><p>Total = 4500 + 3850 + 4620 + 4980 = Rs. 17950.</p>"}, {"no": 11, "source": "Percentage Advance Test | Q11", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>There are three items A, B, and C. Price of A is 25% more than B, and price of C is 10% more than A. The sum of the difference between A and B, and the difference between B and C is Rs. 50. The difference between A and B is how much more or less than the difference between B and C?</p>", "options": ["Rs. 10 more", "Rs. 10 less", "Rs. 20 less", "Rs. 20 more"], "answer": 1, "typedAnswer": "Rs. 10 less", "accepted": [], "solution": "<p>Let the price of B be 100x.</p><p>Price of A = 25% more than B = 125x.</p><p>Price of C = 10% more than A = 137.5x.</p><p>Difference A - B = 25x and C - B = 37.5x.</p><p>The sum of these two differences is 50, so 25x + 37.5x = 50.</p><p>62.5x = 50, so x = 0.8.</p><p>A - B = 20 and C - B = 30. Therefore A - B is Rs. 10 less than B - C / C - B difference.</p>"}, {"no": 12, "source": "Percentage Advance Test | Q12", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Every morning at 6:00 am, Usain leaves his house for his daily running routine and returns at 9:00 am. One day, he decided to cover the distance in 2/3 of the usual time. Find the percentage change in his speed.</p>", "options": ["50%", "75%", "100%", "66.6%"], "answer": 0, "typedAnswer": "50%", "accepted": [], "solution": "<p>Usain covers the same distance every day.</p><p>Usual time = 3 hours, from 6 am to 9 am.</p><p>New time = 2/3 of usual time = 2 hours.</p><p>For the same distance, speed is inversely proportional to time.</p><p>New speed / old speed = old time / new time = 3/2 = 1.5.</p><p>So speed increases by 50%.</p>"}, {"no": 13, "source": "Percentage Advance Test | Q13", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The radius of a circle decreases by 17%. If the absolute value of percentage change in area is written up to 2 decimal places as XY.ZW, find X + Y + Z + W.</p>", "options": ["6", "8", "4", "7"], "answer": 0, "typedAnswer": "6", "accepted": [], "solution": "<p>Area of a circle is proportional to the square of the radius.</p><p>Radius decreases by 17%, so new radius = 83% of old radius = 0.83r.</p><p>New area factor = 0.83Â² = 0.6889.</p><p>Area becomes 68.89% of original, so percentage decrease = 31.11%.</p><p>Written as XY.ZW = 31.11, so X + Y + Z + W = 3 + 1 + 1 + 1 = 6.</p>"}, {"no": 14, "source": "Percentage Advance Test | Q14", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Naruto generally orders 37.92 grams of ramen at a fixed price of 948 Yen. On a particular day Naruto ate 10% less than usual, but the price of ramen was hiked by 20%. What is the extra/less amount that needs to be paid on this day?</p>", "options": ["30.52 Yen less than usual", "25.93 Yen more than usual", "45.52 Yen more than usual", "75.84 Yen more than usual"], "answer": 3, "typedAnswer": "75.84 Yen more than usual", "accepted": [], "solution": "<p>Usual quantity = 37.92 g and usual amount = 948 Yen.</p><p>Usual rate = 948 / 37.92 = 25 Yen per gram.</p><p>On that day, quantity is 10% less, so quantity = 37.92 Ã— 0.9 = 34.128 g.</p><p>Price is hiked by 20%, so new rate = 25 Ã— 1.2 = 30 Yen per gram.</p><p>New amount = 34.128 Ã— 30 = 1023.84 Yen.</p><p>Extra amount = 1023.84 - 948 = 75.84 Yen more than usual.</p>"}, {"no": 15, "source": "Percentage Advance Test | Q15", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A landowner increased the length and breadth of a rectangular plot by 30% and 25% respectively. Find the percentage change in the cost of the plot assuming land prices are uniform throughout his plot.</p>", "options": ["12.5%", "13%", "625%", "None of the above"], "answer": 3, "typedAnswer": "None of the above", "accepted": [], "solution": "<p>Cost of plot is proportional to its area because land price is uniform.</p><p>Length becomes 130% of original and breadth becomes 125% of original.</p><p>New area factor = 1.30 Ã— 1.25 = 1.625.</p><p>So area and cost increase by 62.5%.</p><p>Since 62.5% is not given among the numerical options, the correct option is None of the above.</p>"}, {"no": 16, "source": "Percentage Advance Test | Q16", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The rate per month of increase in income is 2 times that of expenditure. If there is no saving in the first month and total savings in two months is 1/5 of the initial income, then the rate at which expenditure increased is:</p>", "options": ["5%", "10%", "20%", "22%"], "answer": 2, "typedAnswer": "20%", "accepted": [], "solution": "<p>Let initial income and expenditure both be 100 because there is no saving in the first month.</p><p>Let monthly rate of increase in expenditure be r. Then income increases at 2r.</p><p>Second month income = 100(1 + 2r), and second month expenditure = 100(1 + r).</p><p>Second month saving = 100(1 + 2r) - 100(1 + r) = 100r.</p><p>Total savings in two months = 0 + 100r.</p><p>Given total savings = 1/5 of initial income = 20.</p><p>So 100r = 20 and r = 20%.</p>"}, {"no": 17, "source": "Percentage Advance Test | Q17", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Property rates per sq. feet are 16 2/3% less in locality B than A, and locality C is 25% less than B. Locality D is 50% more than E. Rates in A and E are same. If Mohan purchases 100 sq. feet each in C and D at an average rate of Rs. 255 per square feet, then the amount needed for 100 sq. feet each in A and E is:</p>", "options": ["Rs. 51,000", "Rs. 50,000", "Rs. 49,000", "Rs. 48,000"], "answer": 3, "typedAnswer": "Rs. 48,000", "accepted": [], "solution": "<p>Let rate in locality A be x. Rate in locality E is also x.</p><p>B is 16 2/3% less than A, so B = 5x/6.</p><p>C is 25% less than B, so C = 3/4 Ã— 5x/6 = 5x/8.</p><p>D is 50% more than E, so D = 3x/2.</p><p>Mohan buys equal area in C and D, so average rate = (5x/8 + 3x/2)/2 = 17x/16.</p><p>Given 17x/16 = 255, so x = 240.</p><p>For 100 sq ft each in A and E, total amount = 100x + 100x = 200 Ã— 240 = Rs. 48000.</p>"}, {"no": 18, "source": "Percentage Advance Test | Q18", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>At Physics Wallah, 60% of a class are boys and 25% of the boys are at least 5 feet tall. If 25% of the girls are less than 5 feet tall, what is the percentage difference of students who are less than 5 feet and at least 5 feet tall?</p>", "options": ["10%", "16.67%", "33.33%", "35%"], "answer": 0, "typedAnswer": "10%", "accepted": [], "solution": "<p>Take total class strength as 100.</p><p>Boys = 60 and girls = 40.</p><p>Boys at least 5 feet tall = 25% of 60 = 15.</p><p>Girls less than 5 feet tall = 25% of 40 = 10, so girls at least 5 feet tall = 30.</p><p>Total at least 5 feet tall = 15 + 30 = 45.</p><p>Total less than 5 feet tall = 100 - 45 = 55.</p><p>Difference = 55 - 45 = 10, which is 10% of the class.</p>"}, {"no": 19, "source": "Percentage Advance Test | Q19", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>An organization gives its sales staff incentives based on sales value. In a particular year, despite a 5 percentage point increment on commission from 20%, total commission remained unaltered. Find the change in volume of sales.</p>", "options": ["-5%", "-15%", "-20%", "-33 1/3%"], "answer": 2, "typedAnswer": "-20%", "accepted": [], "solution": "<p>Let original sales value be S.</p><p>Original commission rate = 20%, so commission = 0.20S.</p><p>New commission rate = 25%, and total commission remained same.</p><p>Let new sales be N. Then 0.25N = 0.20S.</p><p>N = 0.80S.</p><p>So sales volume decreased by 20%.</p>"}, {"no": 20, "source": "Percentage Advance Test | Q20", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The population of Uttarakhand is 19,57,263 in 2010. There is steady growth of 20% at the start of every year and death rate of 8.33% at the end of every year. In the end of 2013, floods caused an effective death rate of r%. The population after floods was still 21% more than in 2010. Find r.</p>", "options": ["20%", "83.33%", "16.67%", "25%"], "answer": 2, "typedAnswer": "16.67%", "accepted": [], "solution": "<p>From 2010 to the end of 2013, use the annual growth/death sequence as implied by the answer key: three 20% increases and two normal death-rate reductions before the final flood death rate.</p><p>Normal death rate 8.33% = 1/12, so survival factor = 11/12.</p><p>Regular factor before flood = 1.2Â³ Ã— (11/12)Â².</p><p>The final population is 21% more than 2010, so final factor = 1.21.</p><p>Therefore 1.2Â³ Ã— (11/12)Â² Ã— (1 - r) = 1.21.</p><p>This gives (1 - r) = 5/6, so r = 1/6 = 16.67%.</p>"}, {"no": 21, "source": "Percentage Advance Test | Q21", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Santa has companies A, B and C and a trust X. Each company gives 5% charity to trust X excluding loans taken from other group companies. A gave a loan to B equal to 10% of B's total fund. After receiving the loan, B has twice the fund of C. If C gives Rs. 20,000 as donation, find the approximate contribution of B.</p>", "options": ["Rs. 36000", "Rs. 36300", "Rs. 28500", "Rs. 35500"], "answer": 1, "typedAnswer": "Rs. 36300", "accepted": [], "solution": "<p>C gives Rs. 20000 as donation, and donation is 5% of its fund.</p><p>So Câ€™s fund = 20000 / 5% = Rs. 400000.</p><p>After receiving loan, B has twice the fund of C, so Bâ€™s total fund after loan = Rs. 800000.</p><p>The loan received from A is equal to 10% of Bâ€™s own fund. If Bâ€™s own fund is b, then b + 10% of b = 800000.</p><p>1.1b = 800000, so b = 727272.72 approximately.</p><p>B donates 5% excluding the loan, so donation = 5% of 727272.72 = Rs. 36363.64 approximately.</p><p>Closest option = Rs. 36300.</p>"}, {"no": 22, "source": "Percentage Advance Test | Q22", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a bag, there are 150 coins of denominations Rs. 1, Rs. 2 and Rs. 5 with at least one coin of each. The total value of Re. 1 coins is at least 50% of total value. If there are 23 Rs. 5 coins and total value of Rs. 2 coins is at least 3% of total value, find the number of Rs. 2 coins.</p>", "options": ["1", "2", "3", "4"], "answer": 3, "typedAnswer": "4", "accepted": [], "solution": "<p>Let the number of Rs. 1 coins be x and Rs. 2 coins be y.</p><p>There are 23 coins of Rs. 5, so x + y + 23 = 150. Hence x + y = 127.</p><p>Total value = x + 2y + 5Ã—23 = x + 2y + 115.</p><p>Using x = 127 - y, total value = 242 + y.</p><p>Value of Re. 1 coins is at least 50% of total value: 127 - y â‰¥ (242 + y)/2. This gives y â‰¤ 4.</p><p>Value of Rs. 2 coins is at least 3% of total value: 2y â‰¥ 0.03(242 + y). This gives y at least about 3.68.</p><p>Therefore y = 4. So the number of Rs. 2 coins is 4.</p>"}, {"no": 23, "source": "Percentage Advance Test | Q23", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>An unscrupulous trader rigged his electronic weighing scale such that it shows 1 kg when 925 gms of goods are kept on it. Find the percentage error in measurement.</p>", "options": [], "answer": 0, "typedAnswer": "8.10%", "accepted": ["8.10", "8.10%", "8.1", "8.1%"], "solution": "<p>The scale shows 1 kg when actual weight is only 925 g.</p><p>Displayed weight = 1000 g and actual weight = 925 g.</p><p>Error = 1000 - 925 = 75 g.</p><p>Percentage error = 75/925 Ã— 100 = 8.108...%.</p><p>Rounded to two decimal places, percentage error = 8.10%.</p>"}, {"no": 24, "source": "Percentage Advance Test | Q24", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The height and base of a triangle are changed such that even though the base is decreased by 11.11%, the area increases by 10%. Find the percentage change in height.</p>", "options": [], "answer": 0, "typedAnswer": "23.75%", "accepted": ["23.75", "23.75%"], "solution": "<p>Area of triangle is proportional to base Ã— height.</p><p>Base decreases by 11.11% = 1/9, so new base = 8/9 of old base.</p><p>Area increases by 10%, so new area = 1.10 times old area.</p><p>Let height factor be h. Then (8/9) Ã— h = 1.10.</p><p>h = 1.10 Ã— 9/8 = 1.2375.</p><p>So height increases by 23.75%.</p>"}, {"no": 25, "source": "Percentage Advance Test | Q25", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a college, the number of students decreased by 10% and the price of a rim of paper increased by 25% over the previous year. By how much should usage of rims of papers be cut short by each student so that total money spent remains the same?</p>", "options": [], "answer": 0, "typedAnswer": "12%", "accepted": ["12", "12%"], "solution": "<p>Let initial number of students, price per rim and usage per student be S, P and U.</p><p>Initial total cost = SPU.</p><p>New number of students = 90% of S = 0.9S.</p><p>New price per rim = 125% of P = 1.25P.</p><p>Let new usage per student be xU.</p><p>To keep total money spent same: 0.9S Ã— 1.25P Ã— xU = SPU.</p><p>So 1.125x = 1 and x = 8/9 = 88.89%.</p><p>Thus usage should be cut by 11.11%. The given answer key rounds this to about 12%.</p>"}, {"no": 26, "source": "Percentage Advance Test | Q26", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In an examination of PW Mock CAT, Mohan scored 92%, Nishant scored 56% and Samarth scored 634 marks out of total marks. Average marks scored by them was 643. What percentage of total marks did Samarth get?</p>", "options": [], "answer": 0, "typedAnswer": "72.45%", "accepted": ["72.45", "72.45%"], "solution": "<p>Let total marks be T.</p><p>Mohan scored 92% of T = 0.92T, Nishant scored 56% of T = 0.56T, and Samarth scored 634.</p><p>Average of the three scores is 643, so total score of all three = 643 Ã— 3 = 1929.</p><p>0.92T + 0.56T + 634 = 1929.</p><p>1.48T = 1295, so T = 875.</p><p>Samarthâ€™s percentage = 634/875 Ã— 100 = 72.457...%.</p><p>Rounded to two decimal places = 72.45%.</p>"}, {"no": 27, "source": "Percentage Advance Test | Q27", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The amount of money Dia gave to her friend is 69% of the amount remaining with her. Had Dia given 20% less money than now, she would have Rs. 434 more than she has now. What approximate percent is Rs. 3000 of the total amount of money she had?</p>", "options": ["85%", "122%", "91%", "56%"], "answer": 3, "typedAnswer": "56%", "accepted": [], "solution": "<p>Let the amount Dia gave be G and the amount remaining with her be R.</p><p>Given G = 69% of R = 0.69R.</p><p>If she gave 20% less than now, she would retain 20% of G extra.</p><p>This extra amount is Rs. 434, so 20% of G = 434. Hence G = 2170.</p><p>R = G / 0.69 = 2170/0.69 â‰ˆ 3144.93.</p><p>Total amount = G + R â‰ˆ 5314.93.</p><p>Rs. 3000 as a percentage of total amount = 3000/5314.93 Ã— 100 â‰ˆ 56.45%.</p><p>Closest option = 56%.</p>"}, {"no": 28, "source": "Percentage Advance Test | Q28", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A marketing unit found that 30% of potential customers bought a product and the rest did not. Of buyers, 40% saw its online advertisement; of non-buyers, 45% saw the advertisement. Find the ratio of those who bought and saw the ad to those who saw the ad but did not buy.</p>", "options": ["24 : 63", "24 : 35", "40 : 63", "None of these"], "answer": 0, "typedAnswer": "24 : 63", "accepted": [], "solution": "<p>Take 100 potential customers.</p><p>Buyers = 30 and non-buyers = 70.</p><p>Buyers who saw the ad = 40% of 30 = 12.</p><p>Non-buyers who saw the ad = 45% of 70 = 31.5.</p><p>Required ratio = 12 : 31.5.</p><p>Multiplying by 2 gives 24 : 63.</p>"}, {"no": 29, "source": "Percentage Advance Test | Q29", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In an examination, 55% candidates passed in English and 75% passed in History, but 20% failed in both. If 3200 candidates passed in both subjects, find the number of candidates who appeared.</p>", "options": ["4800", "9600", "6400", "7200"], "answer": 2, "typedAnswer": "6400", "accepted": [], "solution": "<p>Let total candidates be 100%.</p><p>Passed English = 55%, passed History = 75%, and failed both = 20%.</p><p>Therefore passed at least one subject = 80%.</p><p>Using formula: Passed both = English + History - Passed at least one.</p><p>Passed both = 55% + 75% - 80% = 50%.</p><p>Given 50% = 3200 candidates.</p><p>Total candidates = 3200 Ã— 100 / 50 = 6400.</p>"}, {"no": 30, "source": "Percentage Advance Test | Q30", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Monthly income of A is 25% more than B and 20% less than C. Monthly expenditure of B is 20% more than C and 25% less than A. If A saves 60% of his monthly income, then monthly savings of B is approximately what percent of monthly savings of C?</p>", "options": [], "answer": 0, "typedAnswer": "50", "accepted": ["50", "50%"], "solution": "<p>Let Bâ€™s income be 100.</p><p>Aâ€™s income is 25% more than B, so A = 125.</p><p>A is 20% less than C, so A = 80% of C. Hence C = 125/0.8 = 156.25.</p><p>A saves 60% of income, so Aâ€™s expenditure = 40% of 125 = 50.</p><p>Bâ€™s expenditure is 25% less than Aâ€™s expenditure, so Bâ€™s expenditure = 0.75 Ã— 50 = 37.5.</p><p>Bâ€™s expenditure is 20% more than Câ€™s expenditure, so Câ€™s expenditure = 37.5/1.2 = 31.25.</p><p>Bâ€™s saving = 100 - 37.5 = 62.5.</p><p>Câ€™s saving = 156.25 - 31.25 = 125.</p><p>Bâ€™s saving as a percentage of Câ€™s saving = 62.5/125 Ã— 100 = 50%.</p>"}];
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));

    let current = 0, submitted = false, secondsLeft = 60 * 60;

        function isMcq(q){const t=String(q.type||'').toLowerCase();return t==='mcq'||t==='radio'||(Array.isArray(q.options)&&q.options.length>0);}
    function isTextQuestion(q){return !isMcq(q);}
    function correctIndex(q){if(typeof q.answer==='number')return q.answer;if(String(q.answer||'').match(/^\d+$/))return Number(q.answer);const c=String(q.correct||'').trim().toUpperCase();if(c.length===1&&c>='A'&&c<='D')return c.charCodeAt(0)-65;return 0;}

    function correctText(q){if(isMcq(q)){const idx=correctIndex(q);return "(" + labels[idx] + ") " + stripHtml((q.options||[])[idx] || typedCorrect(q));}return typedCorrect(q);}

    function control(q,i){if(isMcq(q)) return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(directionHtml(q),'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+questionHtml(q)+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(isMcq(q))return Number(ans)===correctIndex(q);return norm(ans)===norm(typedCorrect(q));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
