  <script>
    const questions = [
      {
        level: "Percentage Basics",
        q: "After an increment of 16 <sup>2</sup>/<sub>3</sub>% in the cost of a machine, it becomes Rs. 4900. Find the initial cost of machine.",
        type: "mcq",
        options: ["Rs. 4000", "Rs. 4200", "Rs. 4500", "Rs. 4600"],
        answer: 1,
        solution: "16 2/3% is equal to the fraction 1/6.\nLet the initial cost be C.\nNew cost = C * (1 + 1/6) = 7/6 * C = 4900\nC = 4900 * 6 / 7 = Rs. 4200."
      },
      {
        level: "Exams & Marks",
        q: "A student required 36% marks to pass in an examination. He scored 24% marks and failed by 18 marks. Find the passing mark.",
        type: "mcq",
        options: ["36", "45", "54", "72"],
        answer: 2,
        solution: "The difference in marks percentage is 36% - 24% = 12%.\nAccording to the question, this 12% corresponds to 18 marks.\nLet the total marks be T.\n12% of T = 18 => T = (18 / 12) * 100 = 150.\nPassing marks = 36% of 150 = 54."
      },
      {
        level: "Exams & Marks",
        q: "A student scored 30% marks and failed by 45 marks. Another student scored 42% marks and scored 45 marks more than the passing marks. Find the passing marks.",
        type: "mcq",
        options: ["225", "270", "300", "315"],
        answer: 1,
        solution: "Difference in marks percentage = 42% - 30% = 12%.\nDifference in actual scores = 45 - (-45) = 90 marks.\nThus, 12% of total marks = 90 => Total marks = (90 * 100) / 12 = 750.\nPassing marks = 30% of 750 + 45 = 225 + 45 = 270."
      },
      {
        level: "Exams & Marks",
        q: "A student got 20% marks and failed by 30 marks. Another student got 32% marks and scored 42 marks more than passing mark. Find the passing mark in an examination.",
        type: "mcq",
        options: ["120", "150", "180", "200"],
        answer: 1,
        solution: "Difference in percentage = 32% - 20% = 12%.\nDifference in marks = 42 - (-30) = 72.\n12% of total marks = 72 => Total marks = 600.\nPassing mark = 20% of 600 + 30 = 120 + 30 = 150."
      },
      {
        level: "Election Problems",
        q: "There were two candidates in an election. One got 41% of total votes and lost by 5580 votes. Find the total votes.",
        type: "mcq",
        options: ["28000", "30000", "31000", "32000"],
        answer: 2,
        solution: "Let total votes be 100%.\nThe losing candidate got 41%.\nThe winning candidate got 100% - 41% = 59%.\nDifference = 59% - 41% = 18%.\nGiven: 18% of total votes = 5580 => Total votes = 5580 / 0.18 = 31,000."
      },
      {
        level: "Election Problems",
        q: "There were two candidates in an election. One got 55% of total valid votes and 20% of votes were invalid. If the total votes are 5500. How many valid votes did the other person get?",
        type: "mcq",
        options: ["1980", "2200", "2420", "2970"],
        answer: 0,
        solution: "Total votes = 5500.\nInvalid votes = 20%, so Valid votes = 80% of 5500 = 4400.\nOne candidate got 55% of valid votes.\nThe other candidate must have received 100% - 55% = 45% of valid votes.\nVotes received by other candidate = 45% of 4400 = 1980."
      },
      {
        level: "Election Problems",
        q: "There were two candidates in an election. 8% of voters did not cast their votes. The winning candidate secured 48% of total votes and won by 1100 votes. Find the total votes.",
        type: "mcq",
        options: ["25000", "27500", "28000", "30000"],
        answer: 1,
        solution: "Let total registered voters = 100%.\nNon-voters = 8%, so votes polled = 92%.\nWinning candidate got 48% of the total votes.\nLosing candidate got 92% - 48% = 44% of total votes.\nWinning margin = 48% - 44% = 4%.\nGiven: 4% of total votes = 1100 => Total votes = 1100 / 0.04 = 27,500."
      },
      {
        level: "Election Problems",
        q: "There were two candidates in an election. 10% of voters did not cast their votes. 10% of the votes polled were found invalid. The winning candidate got 54% of the valid votes and won by 1620 votes. Find the number of voters enrolled.",
        type: "mcq",
        options: ["22500", "25000", "27500", "30000"],
        answer: 1,
        solution: "Let total enrolled voters be V.\nVotes polled = 90% of V = 0.90 * V.\nValid votes = 90% of 0.90 * V = 0.81 * V.\nWinning candidate got 54% of valid votes, so loser got 46%.\nMargin = 54% - 46% = 8% of valid votes.\n0.08 * 0.81 * V = 1620 => 0.0648 * V = 1620 => V = 1620 / 0.0648 = 25,000."
      },
      {
        level: "Election Problems",
        q: "There were two candidates in an election. 75% of voters cast their votes, out of which 2% of the votes were found invalid. A candidate got 9261 votes which were 75% of total valid votes. Find the total number of voters enrolled.",
        type: "mcq",
        options: ["16000", "16800", "18000", "20000"],
        answer: 1,
        solution: "Let total enrolled voters be x.\nVotes cast = 0.75 * x.\nValid votes = 98% of 0.75 * x = 0.98 * 0.75 * x.\nCandidate got 75% of valid votes = 9261.\n=> 0.75 * 0.98 * 0.75 * x = 9261\n=> (3/4) * (49/50) * (3/4) * x = 9261\n=> (441 / 800) * x = 9261\n=> x = (9261 * 800) / 441 = 21 * 800 = 16,800."
      },
      {
        level: "Election Problems",
        q: "There were two candidates in an election. 10% of voters did not cast their votes. 60 votes were found invalid. The winning candidate got 47% of the total votes and won by 308 votes. Find the number of voters enrolled.",
        type: "mcq",
        options: ["5800", "6000", "6200", "6400"],
        answer: 2,
        solution: "Let total enrolled voters be x.\nVotes cast = 0.90 * x.\nValid votes = 0.90 * x - 60.\nWinner got 47% of total votes = 0.47 * x.\nLoser's votes = (0.90 * x - 60) - 0.47 * x = 0.43 * x - 60.\nMargin = Winner's votes - Loser's votes = 0.47 * x - (0.43 * x - 60) = 0.04 * x + 60.\nGiven: 0.04 * x + 60 = 308 => 0.04 * x = 248 => x = 6200."
      },
      {
        level: "Election Problems",
        q: "There are two candidates in an election. 10000 voters didn't cast their vote. 75% of casted votes are valid. Winning candidate won by 2250 votes and losing candidate got 18% of total votes. Find the total number of votes.",
        type: "mcq",
        options: ["20000", "22500", "25000", "27500"],
        answer: 2,
        solution: "Let total voters be x.\nVotes cast = x - 10000.\nValid votes = 0.75 * (x - 10000).\nLoser got 18% of total votes = 0.18 * x.\nWinner got = Valid votes - Loser votes = 0.75 * (x - 10000) - 0.18 * x = 0.57 * x - 7500.\nWinning margin = Winner - Loser = (0.57 * x - 7500) - 0.18 * x = 0.39 * x - 7500.\nGiven margin = 2250 => 0.39 * x - 7500 = 2250 => 0.39 * x = 9750 => x = 25,000."
      },
      {
        level: "Election Problems",
        q: "2/5 of the voters promise to vote for Mulayam Singh and rest promise to vote Mayawati. On election day 15% of the voters went back on their promise to vote for Mulayam Singh & 25% of the voters went back on their promise to vote for Mayawati. Mayawati won by 1500 votes. Find the total number of voters.",
        type: "mcq",
        options: ["60000", "75000", "80000", "90000"],
        answer: 1,
        solution: "Let total voters = 500 units.\nInitially promised to Mulayam (M) = 2/5 * 500 = 200 units.\nInitially promised to Mayawati (Y) = 300 units.\nOn election day:\n- 15% of M's voters backed out => 15% of 200 = 30 units went to Y.\n- 25% of Y's voters backed out => 25% of 300 = 75 units went to M.\nFinal votes for M = 200 - 30 + 75 = 245 units.\nFinal votes for Y = 300 - 75 + 30 = 255 units.\nWinning margin for Y = 255 - 245 = 10 units.\nGiven: 10 units = 1500 => 1 unit = 150.\nTotal voters = 500 * 150 = 75,000."
      },
      {
        level: "Comparisons",
        q: "The income of A is 30% more than the income of B. How much percent B's income less than A's?",
        type: "mcq",
        options: ["23.07%", "25%", "27.3%", "30%"],
        answer: 0,
        solution: "Let B's income = 100.\nA's income = 130.\nPercentage by which B's income is less = [(130 - 100) / 130] * 100 = (30 / 130) * 100 = 23.07%."
      },
      {
        level: "Comparisons",
        q: "The income of A is 40% less than B's income. How much percent is B's income more than A's?",
        type: "mcq",
        options: ["40%", "50%", "66.67%", "75%"],
        answer: 2,
        solution: "Let B's income = 100.\nA's income = 100 - 40 = 60.\nPercentage by which B is more than A = [(100 - 60) / 60] * 100 = (40 / 60) * 100 = 66.67%."
      },
      {
        level: "Comparisons",
        q: "The income of A is 40% more than B's income. B's income is 20% less than C's income. Find the ratio of income of A and C.",
        type: "mcq",
        options: ["28 : 25", "25 : 28", "14 : 15", "7 : 5"],
        answer: 0,
        solution: "Let C's income = 100.\nB's income = 80.\nA's income = 80 * (1 + 0.40) = 112.\nRatio of income of A and C = 112 : 100 = 28 : 25."
      },
      {
        level: "Comparisons",
        q: "Income of A is 50% more than that of B's, income of C is 2/3rd of income of A's. Income of D is half of income of C. Income of D is increased by 10%. Find income of B is what percent of income of D after the increment.",
        type: "mcq",
        options: ["150%", "181.82%", "200%", "220%"],
        answer: 1,
        solution: "Let B's income = 100.\nA's income = 150.\nC's income = 2/3 * 150 = 100.\nD's income = 100 / 2 = 50.\nD's income after 10% increment = 50 * 1.10 = 55.\nRequired percentage = (100 / 55) * 100 = 181.82%."
      },
      {
        level: "Commission",
        q: "An agent gets 5% commission on all sales up to Rs. 10000 and 4% commission on all sales exceeding this amount. He gives Rs. 31100 from his sales to his company after deducting his commission. Find his total sales.",
        type: "mcq",
        options: ["30000", "32500", "35000", "37500"],
        answer: 1,
        solution: "Let total sales be S.\nCommission on first 10,000 = 5% of 10,000 = 500.\nCommission on remaining (S - 10,000) = 4% of (S - 10,000) = 0.04*S - 400.\nTotal commission = 500 + 0.04*S - 400 = 0.04*S + 100.\nAmount deposited = S - (0.04*S + 100) = 0.96*S - 100.\n0.96*S - 100 = 31100 => 0.96*S = 31200 => S = 32,500."
      },
      {
        level: "Commission",
        q: "A company gives 9% commission to his salesman up to the sale of Rs. 15000 and 7% commission on the sale more than Rs. 15000. If the sales deposited is Rs. 32250 after deducting his commission from the sale, find the total sale.",
        type: "mcq",
        options: ["30000", "32000", "35000", "38000"],
        answer: 2,
        solution: "Let total sales be S.\nCommission on first 15,000 = 9% of 15,000 = 1350.\nCommission on remaining sales above 15,000 = 7% of (S - 15,000) = 0.07*S - 1050.\nTotal commission = 1350 + 0.07*S - 1050 = 0.07*S + 300.\nAmount deposited = S - (0.07*S + 300) = 0.93*S - 300.\n0.93*S - 300 = 32250 => 0.93*S = 32550 => S = 35,000."
      },
      {
        level: "Commission",
        q: "A company gives 8.5% commission to his salesman up to the sale of Rs. 20000 and 7.0% commission on the sale more than Rs. 20000. If the sales deposited is Rs. 42480 after deducting his commission from the sale, find the total sale of the salesman.",
        type: "mcq",
        options: ["44000", "46000", "48000", "50000"],
        answer: 1,
        solution: "Let total sales be S.\nCommission on first 20,000 = 8.5% of 20,000 = 1700.\nCommission on remaining = 7% of (S - 20,000) = 0.07*S - 1400.\nTotal commission = 1700 + 0.07*S - 1400 = 0.07*S + 300.\nAmount deposited = S - (0.07*S + 300) = 0.93*S - 300.\n0.93*S - 300 = 42480 => 0.93*S = 42780 => S = 46,000."
      },
      {

      },
      {

      },
      {
        level: "Commission",
        q: "A salesman is allowed 7.5% commission on the sale made by him up to Rs. 12000 and additional bonus of 1.5% on sale made over Rs. 12000. If his total earning is Rs. 4185. Find the total sales made by him?",
        type: "mcq",

        answer: 1,
        solution: "Let total sales be S.\nCommission on first 12,000 = 7.5% of 12,000 = 900.\nRate above 12,000 = 7.5% + 1.5% = 9%.\nCommission on remaining = 9% of (S - 12,000) = 0.09*S - 1080.\nTotal earnings = 900 + 0.09*S - 1080 = 0.09*S - 180.\n0.09*S - 180 = 4185 => 0.09*S = 4365 => S = 48,500."
      },
      {

        q: "A salesman is allowed 9.25% commission on the sale made by him up to Rs. 20000 and additional bonus of 0.75% on sale made over Rs. 20000. If his total earning is Rs. 6170. Find the total sales made by him?",
        type: "mcq",
        options: ["60000", "63200", "65000", "68000"],
        answer: 1,
        solution: "Let total sales be S.\nCommission on first 20,000 = 9.25% of 20,000 = 1850.\nRate above 20,000 = 9.25% + 0.75% = 10%.\nCommission on remaining = 10% of (S - 20,000) = 0.10*S - 2000.\nTotal earnings = 1850 + 0.10*S - 2000 = 0.10*S - 150.\n0.10*S - 150 = 6170 => 0.10*S = 6320 => S = 63,200."

      {
        level: "Commission",

        type: "mcq",
        options: ["50000", "60000", "70000", "80000"],
        answer: 1,
        solution: "Let total sales be S.\nCase 1 (only commission): Earnings = 0.07*S.\nCase 2 (Salary + Commission): Earnings = 3000 + 4% of (S - 10000) = 0.04*S + 2600.\nGiven: Case 2 - Case 1 = 800\n(0.04*S + 2600) - 0.07*S = 800\n-0.03*S + 2600 = 800 => 0.03*S = 1800 => S = 60,000."

    let current = 0, submitted = false, secondsLeft = 40 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,â‚¹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function rich(s){return hasHtml(s) ? String(s) : esc(s);}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    
    function renderBar(){
      qbar.innerHTML = questions.map((q,i)=>{
        let cls = '';
        if (i === current) cls += 'current ';
        
        if (submitted) {
          const r = isCorrect(q, responses[i]);
          if (r === true) {
            cls += 'correct answered ';
          } else if (r === false) {
            cls += 'wrong answered ';
          }
        } else {
          if (responses[i] !== null && responses[i] !== '') cls += 'answered ';
          if (marked[i]) cls += 'marked ';
        }
        
        return '<button type="button" class="qbtn ' + cls + '" onclick="go(' + i + ')">' + (i + 1) + '</button>';
      }).join('');
    }
    
        function isMcq(q){const t=String(q.type||'').toLowerCase();return t==='mcq'||t==='radio'||(Array.isArray(q.options)&&q.options.length>0);}
    function isTextQuestion(q){return !isMcq(q);}
    function correctIndex(q){if(typeof q.answer==='number')return q.answer;if(String(q.answer||'').match(/^\d+$/))return Number(q.answer);const c=String(q.correct||'').trim().toUpperCase();if(c.length===1&&c>='A'&&c<='D')return c.charCodeAt(0)-65;return 0;}
    function typedCorrect(q){return String(q.typedAnswer ?? q.correct ?? q.answerText ?? q.answer ?? '').trim();}
    function correctText(q){if(isMcq(q)){const idx=correctIndex(q);return "(" + labels[idx] + ") " + stripHtml((q.options||[])[idx] || typedCorrect(q));}return typedCorrect(q);}
    function contentBlock(html, cls){
      return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';
    }
    
    function control(q,i){
      if(qType(q)==="mcq") {
        return '<div class="options">' + (q.options||[]).map((op,j)=>
          '<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>'
        ).join('') + '</div>';
      }
      return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';
    }
    
    function solutionHtml(q){
      return rich(q.solution || "Solution not provided.");
    }
    
    function renderQuestion(){
      const q = questions[current];
      host.innerHTML = '<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>' +
        contentBlock(directionHtml(q),'block') + 
        contentBlock(q.passage,'block') + 
        '<div class="qtext">'+rich(qText(q))+'</div>' + 
        control(q,current) + 
        '<div id="note" class="answer-note"></div>' + 
        '<div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div>' + 
        '<div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';
      
      if(submitted) showReviewForCurrent();
      bindAnswer();
      renderBar();
    }
    
    function bindAnswer(){
      host.querySelectorAll('[name^="answer_"]').forEach(el=>{
        if(responses[current]===null && el.type==='radio') el.checked = false;
        el.addEventListener('input',()=>{
          responses[current] = el.type==='radio' ? el.value : el.value;
          renderBar();
        });
        el.addEventListener('change',()=>{
          responses[current] = el.type==='radio' ? el.value : el.value;
          renderBar();
        });
      });
    }
    
    function saveCurrent(){
      const el = host.querySelector('[name^="answer_"]:checked') || host.querySelector('input.typed-answer');
      if(el && !submitted) responses[current] = el.value || null;
    }
    
    function go(i){ saveCurrent(); current = i; renderQuestion(); }
    function prevQ(){ if(current>0) go(current-1); }
    function nextQ(){ if(current<questions.length-1) go(current+1); }
    function markReviewNext(){ marked[current] = true; if(current<questions.length-1) nextQ(); else renderQuestion(); }
    function clearResponse(){ responses[current] = null; renderQuestion(); }
    
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(isMcq(q))return Number(ans)===correctIndex(q);return norm(ans)===norm(typedCorrect(q));}
    function showReviewForCurrent(){
      const q = questions[current], r = isCorrect(q,responses[current]), note = document.getElementById('note'), sol = document.getElementById('solution');
      sol.style.display = 'block';
      if(r===null){
        note.className = 'answer-note muted';
        note.textContent = 'Unattempted. Correct answer: ' + correctText(q);
      } else if(r){
        note.className = 'answer-note ok';
        note.textContent = 'Correct.';
      } else {
        note.className = 'answer-note bad';
        note.textContent = 'Wrong. Correct answer: ' + correctText(q);
      }
    }
    
    function submitTest(){
      if(submitted) return;
      saveCurrent();
      submitted = true;
      let c=0, w=0, u=0;
      questions.forEach((q,i)=>{
        const r = isCorrect(q,responses[i]);
        if(r===null) u++;
        else if(r) c++;
        else w++;
      });
      const score = c*3 - w;
      resultBox.style.display = 'block';
      resultBox.innerHTML = '<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';
      showReviewForCurrent();
      renderBar();
      resultBox.scrollIntoView({behavior:'smooth',block:'start'});
    }
    
    function tick(){
      const m = Math.floor(secondsLeft/60), s = secondsLeft%60;
      document.getElementById('time').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      if(secondsLeft<=0){ submitTest(); return; }
      secondsLeft--;
    }
    
    function calcEval(expr){
      if(!/^[0-9+\-*/().%\s]+$/.test(expr)) return 'Error';
      return Function('return ('+expr.replace(/%/g,'/100')+')')();
    }
    
    function updateCalcSub(){
      document.getElementById('calcSubDisplay').textContent = document.getElementById('calcDisplay').value || '0';
    }
    
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{
      const d = document.getElementById('calcDisplay'), v = btn.dataset.calc;
      if(['MC','MR','MS','M+','M-'].includes(v)) return;
      if(v==='C') d.value='';
      else if(v==='B') d.value = d.value.slice(0,-1);
      else if(v==='+/-') { d.value = d.value.startsWith('-') ? d.value.slice(1) : ('-'+d.value); }
      else if(v==='sqrt') {
        try { d.value = Math.sqrt(Number(calcEval(d.value||'0'))); } catch(e) { d.value='Error'; }
      } else if(v==='1/x') {
        try { d.value = 1/Number(calcEval(d.value||'0')); } catch(e) { d.value='Error'; }
      } else if(v==='=') {
        try { d.value = calcEval(d.value); } catch(e) { d.value='Error'; }
      } else d.value += v;
      updateCalcSub();
    }));
    
    const calcPopup = document.getElementById('calcPopup'), calcDragHandle = document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{
      calcPopup.classList.toggle('open');
      if(calcPopup.classList.contains('open') && !calcPopup.dataset.moved){
        calcPopup.style.left = '52%'; calcPopup.style.top = '120px';
      }
    });
    
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{ e.stopPropagation(); calcPopup.classList.remove('open'); });
    
    let dragCalc = false, calcDx = 0, calcDy = 0;
    calcDragHandle.addEventListener('pointerdown',e=>{
      dragCalc = true;
      calcDragHandle.setPointerCapture(e.pointerId);
      const r = calcPopup.getBoundingClientRect();
      calcDx = e.clientX - r.left;
      calcDy = e.clientY - r.top;
      calcPopup.style.left = r.left + 'px';
      calcPopup.style.top = r.top + 'px';
      calcPopup.style.right = 'auto';
      calcPopup.dataset.moved = '1';
      e.preventDefault();
    });
    
    calcDragHandle.addEventListener('pointermove',e=>{
      if(!dragCalc) return;
      const maxX = window.innerWidth - calcPopup.offsetWidth - 4, maxY = window.innerHeight - calcPopup.offsetHeight - 4;
      calcPopup.style.left = Math.max(4, Math.min(maxX, e.clientX - calcDx)) + 'px';
      calcPopup.style.top = Math.max(4, Math.min(maxY, e.clientY - calcDy)) + 'px';
    });
    
    calcDragHandle.addEventListener('pointerup',e=>{ dragCalc = false; try { calcDragHandle.releasePointerCapture(e.pointerId); } catch(err){} });
    calcDragHandle.addEventListener('pointercancel',()=>{ dragCalc = false; });
    
    renderQuestion();
    tick();
    setInterval(tick,1000);
  </script>
</body>
</html>
