  <script>
    const questions = [{"no": 1, "itemId": 70001, "source": "Ratio Proportion Variation Partnership Test -1 | Q1 | Level of difficulty - 1", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>P and Q together have Rs. 1,210. If 4/15 of P&#x27;s amount is equal to 2/5 of Q&#x27;s amount, how much amount does Q have?</p>", "options": ["<p>Rs. 484</p>", "<p>Rs. 605</p>", "<p>Rs. 726</p>", "<p>Rs. 806</p>"], "answer": 0, "typedAnswer": "Rs. 484", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Since (4/15)P = (2/5)Q, P = (3/2)Q.</li>\n<li>Therefore P:Q = 3:2.</li>\n<li>Q&#x27;s share = 2/5 of 1,210 = Rs. 484.</li></ol>"}, {"no": 2, "itemId": 70002, "source": "Ratio Proportion Variation Partnership Test -1 | Q2 | Level of difficulty - 1", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Two quantities are, respectively, 30% and 60% more than a third quantity. What is their ratio?</p>", "options": ["<p>13:16</p>", "<p>16:13</p>", "<p>3:5</p>", "<p>5:8</p>"], "answer": 0, "typedAnswer": "13:16", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let the third quantity be 100x.</li>\n<li>The two quantities are 130x and 160x.</li>\n<li>Their ratio is 130:160 = 13:16.</li></ol>"}, {"no": 3, "itemId": 70003, "source": "Ratio Proportion Variation Partnership Test -1 | Q3 | Level of difficulty - 1", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The ratio of dogs and cats in a house is 3:2 and the ratio of cats and birds is 4:5. Find the ratio of dogs, cats, and birds in the same house.</p>", "options": ["<p>3:4:5</p>", "<p>6:4:5</p>", "<p>6:8:5</p>", "<p>12:8:10</p>"], "answer": 1, "typedAnswer": "6:4:5", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Dogs:cats = 3:2.</li>\n<li>Cats:birds = 4:5.</li>\n<li>Make cats equal by multiplying the first ratio by 2, giving dogs:cats = 6:4.</li>\n<li>Therefore dogs:cats:birds = 6:4:5.</li></ol>"}, {"no": 4, "itemId": 70004, "source": "Ratio Proportion Variation Partnership Test -1 | Q4 | Level of difficulty - 1", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Rs. 3,105 is to be divided among P, Q, and R in the ratio of 2/3 : 3/4 : 1/2, respectively. How much amount will Q get?</p>", "options": ["<p>Rs. 945</p>", "<p>Rs. 1,080</p>", "<p>Rs. 1,215</p>", "<p>Rs. 1,350</p>"], "answer": 2, "typedAnswer": "Rs. 1,215", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Multiply 2/3 : 3/4 : 1/2 by the LCM 12 to get 8:9:6.</li>\n<li>Total units = 23.</li>\n<li>One unit = 3,105/23 = 135.</li>\n<li>Q&#x27;s share = 9 x 135 = Rs. 1,215.</li></ol>"}, {"no": 5, "itemId": 70005, "source": "Ratio Proportion Variation Partnership Test -1 | Q5 | Level of difficulty - 1", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Find the compounded ratio of (2:3), (5:11), and (11:2).</p>", "options": ["<p>3:5</p>", "<p>5:3</p>", "<p>10:33</p>", "<p>11:15</p>"], "answer": 1, "typedAnswer": "5:3", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>The compounded ratio is (2/3) x (5/11) x (11/2) = 5/3.</li>\n<li>Hence, the ratio is 5:3.</li></ol>"}, {"no": 6, "itemId": 70006, "source": "Ratio Proportion Variation Partnership Test -1 | Q6 | Level of difficulty - 2", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The value of a diamond varies directly with the square of its weight. A diamond broke into three pieces whose weights were in the ratio 32:24:9. The loss caused due to the breakage was Rs. 25.44 lakhs. Find the initial value of the diamond.</p>", "options": ["<p>Rs. 25.44 lakhs</p>", "<p>Rs. 36.25 lakhs</p>", "<p>Rs. 42.25 lakhs</p>", "<p>Rs. 50.75 lakhs</p>"], "answer": 2, "typedAnswer": "Rs. 42.25 lakhs", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let the weights be 32x, 24x, and 9x.</li>\n<li>Initial weight = 65x.</li>\n<li>Since value is proportional to weight squared, initial value = k(65x)^2 = 4,225kx^2.</li>\n<li>Broken value = k[(32x)^2 + (24x)^2 + (9x)^2] = 1,681kx^2.</li>\n<li>Loss = 2,544kx^2 = Rs. 25.44 lakhs, so kx^2 = 1,000.</li>\n<li>Initial value = 4,225 x 1,000 = Rs. 42.25 lakhs.</li></ol>"}, {"no": 7, "itemId": 70007, "source": "Ratio Proportion Variation Partnership Test -1 | Q7 | Level of difficulty - 2", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Raghav distributed a certain amount of money among his friends Ankur, Ashwani, and Neeti in the ratio of 3:4:5. Neeti distributed her total amount among Dheeraj, Sunil, and Surendra in the ratio of 6:7:8. If Dheeraj gets Rs. 3,000, find the amount that Ashwani got from Raghav.</p>", "options": ["<p>Rs. 6,400</p>", "<p>Rs. 7,200</p>", "<p>Rs. 8,400</p>", "<p>Rs. 9,600</p>"], "answer": 2, "typedAnswer": "Rs. 8,400", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let Ankur, Ashwani, and Neeti get 3x, 4x, and 5x.</li>\n<li>Let Dheeraj, Sunil, and Surendra get 6y, 7y, and 8y.</li>\n<li>Neeti&#x27;s amount gives 5x = 21y.</li>\n<li>Given 6y = 3,000, so y = 500.</li>\n<li>Then x = (21/5) x 500 = 2,100.</li>\n<li>Ashwani gets 4x = Rs. 8,400.</li></ol>"}, {"no": 8, "itemId": 70008, "source": "Ratio Proportion Variation Partnership Test -1 | Q8 | Level of difficulty - 2", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The ratio of income to expenditure of P is 5:3 and that of Q is 7:6. If the savings of P are twice that of Q, then what is the ratio of the total income of P and Q to the total expenditure of P and Q?</p>", "options": ["<p>3:2</p>", "<p>4:3</p>", "<p>5:4</p>", "<p>7:5</p>"], "answer": 1, "typedAnswer": "4:3", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let P&#x27;s income and expenditure be 5x and 3x, so P&#x27;s saving = 2x.</li>\n<li>Let Q&#x27;s income and expenditure be 7y and 6y, so Q&#x27;s saving = y.</li>\n<li>Given P&#x27;s saving is twice Q&#x27;s saving, 2x = 2y, so x = y.</li>\n<li>Total income : total expenditure = (5x + 7x):(3x + 6x) = 12x:9x = 4:3.</li></ol>"}, {"no": 9, "itemId": 70009, "source": "Ratio Proportion Variation Partnership Test -1 | Q9 | Level of difficulty - 2", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>During Navratri, every devotee offers fruits to the orphans. Every orphan received bananas, oranges, and mangoes in the ratio 3:2:7. The weight of a mango is 24 g and the weights of a banana and an orange are in the ratio 4:5. The weight of an orange is 150 g. Find the ratio of all three fruits in terms of weight that an orphan gets.</p>", "options": ["<p>20:25:14</p>", "<p>24:30:7</p>", "<p>30:25:14</p>", "<p>45:50:28</p>"], "answer": 2, "typedAnswer": "30:25:14", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Banana:orange weight = 4:5 and orange = 150 g, so banana = 120 g.</li>\n<li>Number of fruits = 3:2:7.</li>\n<li>Total weights = 3 x 120 : 2 x 150 : 7 x 24 = 360:300:168 = 30:25:14.</li></ol>"}, {"no": 10, "itemId": 70010, "source": "Ratio Proportion Variation Partnership Test -1 | Q10 | Level of difficulty - 2", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Rs. 4,199 was intended to be divided among P, Q, R, and S in the ratio of 2:3:5:7, respectively. By mistake, the money is divided in the reciprocal of the intended ratio. Find the gain of P due to this mistake.</p>", "options": ["<p>Rs. 1,235</p>", "<p>Rs. 741</p>", "<p>Rs. 1,291</p>", "<p>None of the above</p>"], "answer": 2, "typedAnswer": "Rs. 1,291", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Intended share of P = (2/17) x 4,199 = Rs. 494.</li>\n<li>Mistaken ratio = 1/2:1/3:1/5:1/7.</li>\n<li>Multiplying by LCM 210 gives 105:70:42:30.</li>\n<li>Mistaken share of P = (105/247) x 4,199 = Rs. 1,785.</li>\n<li>Gain = 1,785 - 494 = Rs. 1,291.</li></ol>"}, {"no": 11, "itemId": 70011, "source": "Ratio Proportion Variation Partnership Test -1 | Q11 | Level of difficulty - 3", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Let A, B, C, D, and E be positive integers such that (2/3)A = (3/4)B = (5/6)C and (7/8)B = (9/10)D = (11/12)E. Find the minimum value of A + B + C + D + E.</p>", "options": ["<p>18,450</p>", "<p>19,609</p>", "<p>20,790</p>", "<p>24,700</p>"], "answer": 1, "typedAnswer": "19,609", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>From (2/3)A = (3/4)B = (5/6)C, multiplying by 12 gives 8A = 9B = 10C.</li>\n<li>From (7/8)B = (9/10)D = (11/12)E, multiplying by 120 gives 105B = 108D = 110E.</li>\n<li>Combining conditions gives 280A = 315B = 350C and 315B = 324D = 330E.</li>\n<li>The least common value is LCM(280,315,350,324,330) = 1,247,400.</li>\n<li>Therefore A, B, C, D, E are 4,455, 3,960, 3,564, 3,850, and 3,780.</li>\n<li>Their sum is 19,609.</li></ol>"}, {"no": 12, "itemId": 70012, "source": "Ratio Proportion Variation Partnership Test -1 | Q12 | Level of difficulty - 3", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The number of mangoes in three containers is in the ratio 3:4:5. In which ratio must the number of mangoes in the first two containers be increased, so the new ratio becomes 5:4:3?</p>", "options": ["<p>5:4</p>", "<p>3:1</p>", "<p>2:1</p>", "<p>4:1</p>"], "answer": 2, "typedAnswer": "2:1", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Initially C1:C2:C3 = 3x:4x:5x.</li>\n<li>Finally C1:C2:C3 = 5y:4y:3y.</li>\n<li>Since the third container is unchanged, 5x = 3y.</li>\n<li>Thus x = 3y/5.</li>\n<li>Initial first two containers are 9y/5 and 12y/5, while final first two are 5y and 4y.</li>\n<li>Increases are 16y/5 and 8y/5, so the required ratio is 2:1.</li></ol>"}, {"no": 13, "itemId": 70013, "source": "Ratio Proportion Variation Partnership Test -1 | Q13 | Level of difficulty - 3", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Pyare Lal Ji sells gulab-jamun at Rs. 15 per kg. A gulab-jamun is made up of flour and sugar in the ratio of 5:3. The ratio of the price of sugar and flour is 7:3 per kg. He earns 66 2/3% profit. What is the cost price per kg of sugar?</p>", "options": ["<p>Rs. 12</p>", "<p>Rs. 14</p>", "<p>Rs. 16</p>", "<p>Rs. 18</p>"], "answer": 1, "typedAnswer": "Rs. 14", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>A 66 2/3% profit means profit is 2 units when CP is 3 units, so SP is 5 units.</li>\n<li>If SP = Rs. 15, then 1 unit = Rs. 3 and CP per kg of gulab-jamun = Rs. 9.</li>\n<li>In 1 kg, flour = 625 g and sugar = 375 g.</li>\n<li>Let flour cost per gram = 3K and sugar cost per gram = 7K.</li>\n<li>Total cost = 625 x 3K + 375 x 7K = 4,500K = Rs. 9, so K = 1/500.</li>\n<li>Sugar cost per kg = 7,000K = Rs. 14.</li></ol>"}, {"no": 14, "itemId": 70014, "source": "Ratio Proportion Variation Partnership Test -1 | Q14 | Level of difficulty - 3", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In an examination of 1,260 students, the ratio of the number of boys to the number of girls is 3:4. The ratio of students who passed the exam to those who failed is 11:3. Among the girls, the ratio of passed to failed is 11:4. Find the number of boys who passed.</p>", "options": ["<p>462</p>", "<p>528</p>", "<p>990</p>", "<p>270</p>"], "answer": 0, "typedAnswer": "462", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Boys = 1,260 x 3/7 = 540 and girls = 720.</li>\n<li>Total passed = 1,260 x 11/14 = 990.</li>\n<li>Girls passed = 720 x 11/15 = 528.</li>\n<li>Therefore boys passed = 990 - 528 = 462.</li></ol>"}, {"no": 15, "itemId": 70015, "source": "Ratio Proportion Variation Partnership Test -1 | Q15 | Level of difficulty - 3", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Three employees of an IT company started a business. Employee 1 invested Rs. 30,000 for 5 months. After this, he again invested Rs. 20,000 extra for the rest of the year. Employee 2 invested Rs. 60,000 after 6 months of the start of the business. Employee 3 invested Rs. 50,000 for the first 8 months, then he took out Rs. 20,000. Find the share of the second employee in the total profit, if the total profit at the end of 1 year is Rs. 7,65,900.</p>", "options": ["<p>Rs. 1,55,400</p>", "<p>Rs. 1,99,800</p>", "<p>Rs. 2,22,000</p>", "<p>Rs. 2,88,600</p>"], "answer": 1, "typedAnswer": "Rs. 1,99,800", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Capital-time values are Employee 1 = 30,000 x 5 + 50,000 x 7 = 500,000</li>\n<li>Employee 2 = 60,000 x 6 = 360,000</li>\n<li>Employee 3 = 50,000 x 8 + 30,000 x 4 = 520,000.</li>\n<li>Profit ratio = 50:36:52 = 25:18:26.</li>\n<li>Total units = 69.</li>\n<li>One unit = 7,65,900/69 = Rs. 11,100.</li>\n<li>Employee 2 gets 18 units = Rs. 1,99,800.</li></ol>"}];
    let current = 0, submitted = false, secondsLeft = 40 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function rich(s){return hasHtml(s) ? String(s) : esc(s);}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} 
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
