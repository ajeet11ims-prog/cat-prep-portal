<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DPP 05 Ratio Proportion Advance PYQ Test</title>
  <style>
    :root{--ink:#17202a;--muted:#5d6d7e;--line:#d7dde5;--brand:#4f79c7;--brand-soft:#eef4ff;--ok:#157347;--bad:#b02a37;--paper:#fff;--bg:#f4f7fa}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55}
    header{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(20,40,60,.08)}
    .topbar{max-width:1100px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    h1{margin:0;font-size:22px;color:var(--brand)} .meta{color:var(--muted);font-size:14px;margin-top:2px}
    .timer{min-width:150px;text-align:center;border:1px solid var(--line);background:var(--brand-soft);border-radius:6px;padding:8px 12px;font-weight:700;color:var(--brand)}
    main{max-width:1100px;margin:22px auto 40px;padding:0 18px}.instructions,.question,#result{background:var(--paper);border:1px solid var(--line);border-radius:8px}
    .instructions{padding:16px;margin-bottom:18px}.question{padding:16px;margin-bottom:14px}.question h2{margin:0 0 12px;font-size:17px}
    .difficulty{display:inline-block;margin:0 0 10px;color:var(--brand);font-weight:700;border-bottom:2px solid var(--brand)}
    .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}label.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:6px;padding:10px;cursor:pointer;background:#fbfcfd}
    label.option:hover{border-color:#9ab7ca}input[type=radio]{margin-top:4px}.text-answer{width:min(360px,100%);border:1px solid var(--line);border-radius:6px;padding:11px 12px;font-size:16px}
    .actions{display:flex;justify-content:center;margin:24px 0}button{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:12px 22px;font-size:16px;font-weight:700;cursor:pointer}
    button:hover{background:#3d66b2}#result{display:none;padding:16px;margin-bottom:18px}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px;margin-top:12px}
    .score-box{border:1px solid var(--line);border-radius:6px;padding:10px;background:#fbfcfd}.score-box strong{display:block;font-size:22px;margin-top:2px}
    .correct{border-color:rgba(21,115,71,.45);background:#eef8f2}.wrong{border-color:rgba(176,42,55,.45);background:#fff1f2}.missed{border-color:rgba(93,109,126,.45);background:#f6f7f9}
    .answer-note{margin-top:10px;font-weight:700}.answer-note.ok{color:var(--ok)}.answer-note.bad{color:var(--bad)}.answer-note.muted{color:var(--muted)}
    .solution{display:none;margin-top:12px;border-top:1px solid var(--line);padding-top:12px;color:#243447}.solution h3{margin:0 0 6px;font-size:15px;color:var(--brand)}
    @media(max-width:720px){.options,.score-grid{grid-template-columns:1fr}.timer{width:100%}}
  </style>
</head>
<body>
  <header><div class="topbar"><div><h1>DPP - 05: Ratio Proportion-03</h1><div class="meta">Advance Level + PYQ's | 30 Questions | 60 Minutes | +3 correct, -1 wrong</div></div><div class="timer" id="timer">60:00</div></div></header>
  <main>
    <section class="instructions">Attempt all questions. Typed numerical answers accept plain numbers, commas, decimals, and currency symbols. Solutions and correct answers will appear after submission.</section>
    <section id="result"></section>
    <section id="quiz"></section>
    <div class="actions"><button type="button" id="submitBtn">Submit Test</button></div>
  </main>
  <script>
    const optionLabels=["a","b","c","d"];
    const questions=[
      {level:"Questions 1-10",q:"A started a business investing some amount. B entered into the business 3 months after A by investing $4000. If the profit is distributed in the ratio of 4:3, then what was A's investment?",options:["$2000","$3000","$4000","$6000"],answer:2,solution:"Let A invest $x for 12 months. B invests $4000 for 9 months. 12x:(4000 x 9)=4:3, so x=4000."},
      {level:"Questions 1-10",q:"Suman and Sukhbeer started a business by investing $3000 and $2000 each. After 2 months, Sahev joined with $4000. Four months after Sahev's investment, Ashwani joined and invested some money. If Ashwani got 9/34 of the total profit after the year, how much money did he invest?",options:["6000","6250","6500","6750"],answer:0,solution:"Capital-time total = 3000x12 + 2000x12 + 4000x10 + 6x = 100000 + 6x. Given 6x/(100000+6x)=9/34, so x=6000."},
      {level:"Questions 1-10",q:"Ramu is buying fruits in the market. The seller is selling fruits by quantity. Ramu realizes that his total expenses on fruits directly varies with the number of apples he buys. His total expense is Rs. 120 if he buys 5 apples. If he buys 15 apples, what will be his total expenses?",options:["240","360","624","720"],answer:1,solution:"Expense is directly proportional to apples. Cost per apple = 120/5 = 24. For 15 apples, expense = 15 x 24 = Rs. 360."},
      {level:"Questions 1-10",q:"A sum of Rs. X is divided among A, B, C, and D such that A's share is one-fifth of X, B:C = 3:4, D receives Rs. 24120, and 5 times the difference between B and C is Rs. 15000. If (A+C):(B+D)=97:138, find X.",options:["Rs. 56400","Rs. 48200","Rs. 64400","Rs. 60400"],answer:0,solution:"Let B=3y and C=4y. Since 5(C-B)=15000, y=3000, so B=9000 and C=12000. (X/5+12000):(9000+24120)=97:138 gives X=56400."},
      {level:"Questions 1-10",q:"The rainfall in Kerala, Orissa and West Bengal was in the ratio 6:5:7 in 2017 and 3:4:3 in 2022. If Kerala rainfall increased by 25% during 2017-2022, then the percentage increase in West Bengal rainfall is closest to:",options:["5%","6%","7%","8%"],answer:2,solution:"Kerala goes from 6 to 7.5. Matching 2022 ratio 3:4:3 means multiplier 2.5, so 2022 rainfall = 7.5:10:7.5. West Bengal rises from 7 to 7.5, about 7%."},
      {level:"Questions 1-10",q:"x years ago, Bolu was 7 times as old as his only brother. y years from now, Bolu will be 3 times as old as his brother. If x:y = 1:2, then how many years from now will Bolu be twice as old as his brother?",options:["13x","6.5x","2x + 3y","5y - 1.5x"],answer:1,solution:"Let brother's age x years ago be a. Then Bolu's present age is 7a+x and brother's is a+x. Since y=2x and after y years Bolu is thrice brother, a=1.5x. Solving for twice age gives k=6.5x."},
      {level:"Questions 1-10",q:"Simba's chance of winning inversely varies with the opponent's score. If opponent score is 16, his chance is 1/4. If his chance is 1/3, what is the opponent's score?",options:["12","14","15","18"],answer:0,solution:"Let chance P=k/S. With P=1/4 and S=16, k=4. If P=1/3, then 1/3=4/S, so S=12."},
      {level:"Questions 1-10",q:"When 6 is added to the numerator and 15 to the denominator, a fraction becomes 1/2. When 9 is added to the numerator and 4 is subtracted from the denominator, it becomes 4/3. Find the difference between the numerator and denominator of the original fraction.",options:["7","8","5","3"],answer:1,solution:"Let the fraction be X/Y. (X+6)/(Y+15)=1/2 gives 2X-Y=3. (X+9)/(Y-4)=4/3 gives 4Y-3X=43. Solving gives X=11, Y=19. Difference = 8."},
      {level:"Questions 1-10",q:"A starts business with $2000 and after 6 months B joins. C joins sometime before year-end with $6000. After a year, profit is divided 4:5:3 among A, B and C. Had B invested for the same period as C, what would be his profit share out of $1900?",options:["$400","$500","$600","$450"],answer:1,solution:"A's capital-time = 2000x12=24000. Let B invest x for 6 months and C for t months: 24000:6x:6000t=4:5:3 gives x=5000 and t=3. If B invested 3 months, shares become 8:5:6, so B gets 5/19 of 1900 = $500."},
      {level:"Questions 1-10",q:"A starts business with $2000. B joins after 6 months with $4000. C joins sometime before year-end with $6000. D joins a month after C with the same capital as B. The end-year profit ratio of A, B and C is 4:5:3. What is C's profit if D got $500 as his share?",options:["$900","$540","$600","$450"],answer:0,solution:"From A:B:C = 4:5:3, B invested $5000 and C invested for 3 months. D invests $5000 for 2 months. C:D = 6000x3 : 5000x2 = 9:5. If D gets $500, C gets $900."},
      {level:"Questions 11-20",q:"The cost of a solid golden ball varies with the square of the area. A ball broke into 4 pieces whose areas are in the ratio 8:6:5:1. Its cost decreased by Rs. 57,540. What is the cost of the largest broken part?",options:["13440","13460","13420","14000"],answer:0,solution:"Total original area = 20k. Original value = 400k^2p. Broken value = (64+36+25+1)k^2p=126k^2p. Loss = 274k^2p = 57540, so k^2p=210. Largest part = 64x210 = Rs. 13440."},
      {level:"Questions 11-20",q:"Ashwani ji and Sounak ji started a business by investing Rs. 18,000 and Rs. 20,000 respectively at the beginning of a year. After 8 months Ashwani invested Rs. 3000 more. If yearly profit was Rs. 25,428, Ashwani ji's share is:",options:["Rs. 12,388","Rs. 13,244","Rs. 16,256","Rs. 14,248"],answer:0,solution:"Ashwani's capital-time = 18000x12 + 3000x4 = 228000. Sounak's = 20000x12 = 240000. Ratio = 19:20. Ashwani's share = 25428 x 19/39 = Rs. 12388."},
      {level:"Questions 11-20",q:"Ashwani purchased a 60-seater Roller coaster loop. Profit is directly dependent on riders over a minimum number n and number of rounds. Profit is Rs. 2700 with 30 riders for 42 rounds and Rs. 5400 with 45 riders for 48 rounds. What is the minimum number of riders required so he will not suffer loss?",options:["12","10","18","15"],answer:1,solution:"Let P=k(m-n)d. 2700=k(30-n)42 and 5400=k(45-n)48. Dividing gives n=10."},
      {level:"Questions 11-20",q:"The weight of a cylinder varies directly with square of radius when height is constant and with height when radius is constant. What is the ratio of radii of two cylinders of same weights whose heights are in the ratio 9:25?",options:["27:125","3:5","6:25","5:3"],answer:3,solution:"Weight is proportional to r^2h. For equal weights, r1^2h1=r2^2h2. If h1:h2=9:25, then r1:r2=5:3."},
      {level:"Questions 11-20",q:"A cylinder is partitioned into 3 parts whose volumes are in the ratio 2:3:1. Pressure is directly proportional to mass and inversely proportional to volume. If gas masses are the same, find the pressure ratio in the same order.",options:["3:2:1","1:2:3","6:3:2","3:2:6"],answer:3,solution:"With equal mass, pressure is inversely proportional to volume. For volumes 2:3:1, pressures = 1/2:1/3:1 = 3:2:6."},
      {level:"Questions 11-20",q:"Three Entrepreneurs A, B, C invested Rs. 6000, Rs. 9000 and Rs. 11000 respectively. They took a bank loan and after paying annual installment Rs. 4186, divided remaining profit from total Rs. 19500 in capital ratio. What is the difference between B and C's profit?",options:["1067","1089","1156","1178"],answer:3,solution:"Remaining profit = 19500-4186=15314. Capital ratio = 6:9:11. B gets 15314x9/26=5301 and C gets 15314x11/26=6479. Difference = Rs. 1178."},
      {level:"Questions 11-20",q:"Abir, Babar and Cantor took loans of Rs. 4800, Rs. 6400 and Rs. 3600 and invested them. After two years, profit excluding expenses was Rs. 35,150, divided in capital ratio, and loans were repaid. Find the difference between Abir and Cantor's remaining shares.",options:["Rs. 1250","Rs. 1650","Rs. 2050","Rs. 1450"],answer:1,solution:"Capital ratio = 4800:6400:3600 = 12:16:9. Profit shares are 11400, 15200 and 8550. After loan repayment, Abir has 6600 and Cantor has 4950. Difference = Rs. 1650."},
      {level:"Questions 11-20",q:"A invested $2000 at the start and again in the 2nd and 3rd month. B invested $4000 in the 7th, 8th and 9th months. C invested $6000 in the 11th and 12th months. A takes 20% of profit as salary. If A received $1700 at year-end, find B's share.",options:["$1100","$1200","$1000","$800"],answer:2,solution:"Capital-times: A=2000(12+11+10)=66000, B=4000(6+5+4)=60000, C=6000(2+1)=18000. Ratio = 11:10:3. If total profit is P, A gets P/5 salary plus 11/24 of 4P/5 = 17P/30. Given 1700, P=3000, so B's share = 10/24 x 2400 = $1000."},
      {level:"Questions 11-20",q:"Distance covered by a bus is directly proportional to time and varies directly as square root of diesel used and inversely proportional to people. A bus covers 60 km in 10 hours with 10 people and 144 liters. Find diesel consumption per km when it goes 200 km in 25 hours with 10 people. [Up to 2 decimals]",type:"text",answerText:"1.28",solution:"D = Kt sqrt(F)/n. From 60 = K x 10 x sqrt(144)/10, K=5. For 200 km, 200=5 x 25 x sqrt(F)/10, so sqrt(F)=16 and F=256 liters. Per km = 256/200 = 1.28."},
      {level:"Questions 11-20",q:"Kiran appears in six papers with maximum marks 50 each. His marks are in ratio 8:9:10:13:14:15. He fails to obtain 50% aggregate. What is the minimum additional marks required to obtain 50%, given integral marks in each paper?",options:["10","11","12","18"],answer:2,solution:"Total maximum = 300, so 50% = 150. Marks total = 69x and must be below 150; integral marks allow x=2, giving 138. Additional marks needed = 12."},
      {level:"Questions 21-30",q:"An amount is divided among A, B and C. (A+B):(B+C)=18:23 and (A+C):(B+C)=20:23. If A received Rs. 750, find B.",options:["Rs 1020","Rs 990","Rs 1050","Rs 1250"],answer:2,solution:"Let A+B=18k, B+C=23k and A+C=20k. Then A=15k/2. Since A=750, k=100. B=(61k/2)-20k=21k/2=1050."},
      {level:"Questions 21-30",q:"Total salary of Rajesh, Deepak and Pankaj is Rs. 1136. If they spend 84%, 82% and 75% of salaries, and savings are 8:10.8:8, find Rajesh and Deepak's salaries.",options:["Rs. 507, Rs. 323","Rs. 270, Rs. 507","Rs. 423, Rs. 270","Rs. 400, Rs. 480"],answer:3,solution:"Savings are 16%, 18% and 25% of salaries. 0.16a:0.18b:0.25c=8:10.8:8 gives a=50k, b=60k, c=32k. Sum 142k=1136, so k=8. Salaries: Rs. 400 and Rs. 480."},
      {level:"Questions 21-30",q:"Avesh, Vimal and Yogesh invested for same time. 6/13 of Avesh's investment equals 3/13 of the sum of Yogesh and Vimal's investments. Yogesh invested Rs. 2000 more than Vimal and Vimal invested Rs. 25000. Find profit ratio and total profit if Avesh gets Rs. 5200.",options:["26:27:28, 20000","26:25:27, 15600","20:1:22, 16000","21:25:27, 57000"],answer:1,solution:"Vimal=25000 and Yogesh=27000. (6/13)A = (3/13)(52000), so A=26000. Ratio = 26:25:27. If 26 units = 5200, total 78 units = Rs. 15600."},
      {level:"Questions 21-30",q:"Bulbul and Ashwani invested $1000 and $2000. Sahev joined after 3 months and Sounak after 6 months. Bulbul claims salary and remaining profit is distributed by investment. At year-end all 4 received equal profit. What percent of profit does Bulbul claim as salary?",options:["10%","12.5%","15%","20%"],answer:1,solution:"Let total profit be 8x and each receives 2x. Bulbul gets salary a plus investment share b. Since Ashwani's investment is twice Bulbul's, b=x. Thus a=2x-x=x. Salary percent = x/8x = 12.5%."},
      {level:"Questions 21-30",q:"In a wedding, bride:groom side people = 5:6. Bride-side males:females = 3:7. Among bride-side females, traditional:non-traditional dress = 1:3. Find the minimum number of people who attended.",options:["1760","880","440","88"],answer:3,solution:"Total N must make bride side 5N/11 integral, bride-side females 7/10 of that integral, and one-fourth of those females integral. The least such total is 88."},
      {level:"Questions 21-30",q:"Four friends A, B, C and D invested between $1000 and $2000 each. After 2 months A invested $2000 more; after another 2 months B invested $2000; after another 2 months C invested $2000; and after another 2 months D invested $2000. Profits were equal. Find starting investment ratio A:B:C:D.",options:["2:4:5:6","3:4:5:6","1:2:3:4","2:3:4:5"],answer:1,solution:"Equal profit means equal capital-time. Solving with the staggered $2000 additions and starting amounts between $1000 and $2000 gives A:B:C:D = 3:4:5:6."},
      {level:"Questions 21-30",q:"A truck without load runs at 40 kmph. Speed diminishes by an amount proportional to cube root of load. It is 34 kmph with 27 tons. What maximum load can it carry so speed does not fall below 30 kmph?",type:"text",answerText:"125",solution:"Reduction in speed is proportional to cube root of load. From 40 to 34, reduction 6 = k cube-root(27), so k=2. For speed at least 30, reduction <=10, so 2 cube-root(W) <=10 and W <=125 tons."},
      {level:"Questions 21-30",q:"Ashutosh and Binod shared Rs. 40000 profit, with Ashutosh getting Rs. 8000 more. If Ashutosh had invested Rs. 120000 more and Binod Rs. 120000 less, Ashutosh would have got 25% more. What would be Binod's share if investments were reduced by Rs. 60000 and Rs. 140000 respectively and profit decreased by 20%?",options:["Rs. 9,600","Rs. 5,760","Rs. 6,720","Rs. 7,200"],answer:0,solution:"Actual shares are 24000 and 16000, so investment ratio is 3:2. Solving the altered condition gives investments 480000 and 320000. New reduced ratio = 420000:180000 = 7:3. New total profit = 80% of 40000 = 32000, so Binod gets 3/10 = Rs. 9600."},
      {level:"Questions 21-30",q:"Asmita, Sushmita and Gourav share a three-day tour expense such that Asmita's share is two-thirds of Sushmita's and Gourav's is 33.33% more than Sushmita's. Bills paid: Asmita Rs.3310, Sushmita Rs.5220, Gourav Rs.6230. Which final settlement happens?",options:["Gourav pays Rs. 30 to Asmita and Rs. 300 to Sushmita","Asmita pays Rs. 300 to Sushmita","Sushmita pays Rs. 240 to Asmita and Rs. 90 to Gourav","Gourav pays Rs. 60 to Asmita and Rs. 270 to Sushmita"],answer:0,solution:"Their share ratio is 2:3:4. Total bill = 14760, so shares are 3280, 4920 and 6560. Asmita paid 30 extra, Sushmita 300 extra, and Gourav paid 330 less. Gourav pays Rs.30 to Asmita and Rs.300 to Sushmita."},
      {level:"Questions 21-30",q:"Bheema Jewellers prices diamond necklaces such that cost varies as square of number of diamonds. A 10-diamond necklace is split into 5:3:2 to create three necklaces. What is the loss or gain to Ravi?",options:["Rs. 1,00,000","Rs. 1,55,000","Rs. 2,50,000","Rs. 95,000"],answer:1,solution:"Given 8 diamonds cost 160000, k=2500. Original 10-diamond necklace costs 2500 x 100 = 250000. Split cost = 2500(25+9+4)=95000. Ravi gains Rs.155000."}
    ];

    const quiz=document.getElementById("quiz"),result=document.getElementById("result"),submitBtn=document.getElementById("submitBtn"),timer=document.getElementById("timer");
    let secondsLeft=3600,submitted=false;
    function norm(v){return v.toLowerCase().replace(/rs\.?|\$|,/g,"").replace(/[^0-9.\-]/g,"").trim()}
    function renderQuestions(){
      let current="";
      quiz.innerHTML=questions.map((item,index)=>{
        const levelHtml=item.level!==current?`<div class="difficulty">${item.level}</div>`:""; current=item.level;
        const control=item.type==="text"?`<input class="text-answer" type="text" name="q${index}" placeholder="Type your answer">`:`<div class="options">${item.options.map((option,i)=>`<label class="option"><input type="radio" name="q${index}" value="${i}"><span>(${optionLabels[i]}) ${option}</span></label>`).join("")}</div>`;
        const ans=item.type==="text"?item.answerText:`(${optionLabels[item.answer]}) ${item.options[item.answer]}`;
        return `<div class="question" id="qcard-${index}">${levelHtml}<h2>Q${index+1}. ${item.q}</h2>${control}<div class="answer-note" id="note-${index}"></div><div class="solution" id="solution-${index}"><h3>Solution</h3><p><strong>Answer: ${ans}</strong></p><p>${item.solution}</p></div></div>`;
      }).join("");
    }
    function updateTimer(){const m=String(Math.floor(secondsLeft/60)).padStart(2,"0"),s=String(secondsLeft%60).padStart(2,"0");timer.textContent=`${m}:${s}`;if(secondsLeft<=0){submitTest();return}secondsLeft-=1}
    function submitTest(){
      if(submitted)return; submitted=true; let correct=0,wrong=0,unattempted=0;
      questions.forEach((item,index)=>{
        const card=document.getElementById(`qcard-${index}`),note=document.getElementById(`note-${index}`),solution=document.getElementById(`solution-${index}`);
        solution.style.display="block";
        const correctText=item.type==="text"?`Correct answer: ${item.answerText}`:`Correct answer: (${optionLabels[item.answer]}) ${item.options[item.answer]}`;
        let attempted=false,isCorrect=false;
        if(item.type==="text"){const input=document.querySelector(`input[name="q${index}"]`);const response=norm(input.value);attempted=response.length>0;isCorrect=response===norm(item.answerText);input.disabled=true}
        else{const selected=document.querySelector(`input[name="q${index}"]:checked`);attempted=Boolean(selected);isCorrect=attempted&&Number(selected.value)===item.answer;document.querySelectorAll(`input[name="q${index}"]`).forEach(input=>input.disabled=true)}
        if(!attempted){unattempted++;card.classList.add("missed");note.className="answer-note muted";note.textContent=`Unattempted. ${correctText}`}
        else if(isCorrect){correct++;card.classList.add("correct");note.className="answer-note ok";note.textContent=`Correct. ${correctText}`}
        else{wrong++;card.classList.add("wrong");note.className="answer-note bad";note.textContent=`Incorrect. ${correctText}`}
      });
      const score=correct*3-wrong;
      result.style.display="block";
      result.innerHTML=`<h2>Test Summary</h2><div class="score-grid"><div class="score-box">Score<strong>${score}</strong></div><div class="score-box">Correct<strong>${correct}</strong></div><div class="score-box">Wrong<strong>${wrong}</strong></div><div class="score-box">Unattempted<strong>${unattempted}</strong></div><div class="score-box">Total<strong>${questions.length}</strong></div></div>`;
      submitBtn.disabled=true;submitBtn.textContent="Submitted";window.scrollTo({top:0,behavior:"smooth"});
    }
    renderQuestions();updateTimer();setInterval(updateTimer,1000);submitBtn.addEventListener("click",submitTest);
  </script>
</body>
</html>
