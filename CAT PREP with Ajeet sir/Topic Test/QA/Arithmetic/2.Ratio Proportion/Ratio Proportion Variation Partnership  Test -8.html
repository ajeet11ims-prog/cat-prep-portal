<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arithmetic DPP 03 MBA Pro 2025 Test</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #5d6d7e;
      --line: #d7dde5;
      --brand: #4f79c7;
      --brand-soft: #eef4ff;
      --ok: #157347;
      --bad: #b02a37;
      --paper: #ffffff;
      --bg: #f4f7fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.55;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 10px rgba(20, 40, 60, 0.08);
    }

    .topbar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      color: var(--brand);
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-top: 2px;
    }

    .timer {
      min-width: 150px;
      text-align: center;
      border: 1px solid var(--line);
      background: var(--brand-soft);
      border-radius: 6px;
      padding: 8px 12px;
      font-weight: 700;
      color: var(--brand);
    }

    main {
      max-width: 1100px;
      margin: 22px auto 40px;
      padding: 0 18px;
    }

    .instructions, .question, #result {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .instructions {
      padding: 16px;
      margin-bottom: 18px;
    }

    .question {
      padding: 16px;
      margin-bottom: 14px;
    }

    .question h2 {
      margin: 0 0 12px;
      font-size: 17px;
    }

    .difficulty {
      display: inline-block;
      margin: 0 0 10px;
      color: var(--brand);
      font-weight: 700;
      border-bottom: 2px solid var(--brand);
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    label.option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      background: #fbfcfd;
    }

    label.option:hover { border-color: #9ab7ca; }
    input[type="radio"] { margin-top: 4px; }

    .actions {
      display: flex;
      justify-content: center;
      margin: 24px 0;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--brand);
      color: white;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: #3d66b2; }

    #result {
      display: none;
      padding: 16px;
      margin-bottom: 18px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .score-box {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fbfcfd;
    }

    .score-box strong {
      display: block;
      font-size: 22px;
      margin-top: 2px;
    }

    .correct { border-color: rgba(21, 115, 71, 0.45); background: #eef8f2; }
    .wrong { border-color: rgba(176, 42, 55, 0.45); background: #fff1f2; }
    .missed { border-color: rgba(93, 109, 126, 0.45); background: #f6f7f9; }
    .answer-note { margin-top: 10px; font-weight: 700; }
    .answer-note.ok { color: var(--ok); }
    .answer-note.bad { color: var(--bad); }
    .answer-note.muted { color: var(--muted); }

    .solution {
      display: none;
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      color: #243447;
    }

    .solution h3 {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--brand);
    }

    .solution p { margin: 6px 0; }

    @media (max-width: 700px) {
      .options, .score-grid { grid-template-columns: 1fr; }
      .timer { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Arithmetic DPP - 03</h1>
        <div class="meta">MBA Pro 2025 | CAT + OMETs | 30 Questions | 60 Minutes | +3 correct, -1 wrong</div>
      </div>
      <div class="timer">Time Left: <span id="time">60:00</span></div>
    </div>
  </header>

  <main>
    <section class="instructions">
      <strong>Instructions:</strong> Select one option for each question. Unattempted questions carry 0 marks.
      Solutions will appear only after submission.
    </section>

    <section id="result"></section>
    <form id="testForm"></form>
  </main>

  <script>
    const questions = [
      {
        level: "Questions 1-10",
        q: "A, B, and C have Rs. 364 with them in the ratio 3:4:6. What is the amount with B?",
        options: ["Rs. 84", "Rs. 96", "Rs. 108", "Rs. 112"],
        answer: 3,
        solution: "Let the amounts with A, B, and C be 3x, 4x, and 6x. Then 13x = 364, so x = 28. Amount with B = 4x = Rs. 112."
      },
      {
        level: "Questions 1-10",
        q: "The scores of Ram and Shyam are in the ratio 3:4, and the scores of Shyam and Tom are in the ratio 5:7. If their total score is 1260, find Tom's score.",
        options: ["420", "480", "560", "600"],
        answer: 2,
        solution: "Ram:Shyam = 3:4 and Shyam:Tom = 5:7. Making Shyam common gives Ram:Shyam:Tom = 15:20:28. Total units = 63, so one unit = 20. Tom's score = 28 x 20 = 560."
      },
      {
        level: "Questions 1-10",
        q: "Two natural numbers are in the ratio 6:7 and the sum of their squares is 765. Find the difference between the two numbers.",
        options: ["3", "6", "9", "12"],
        answer: 0,
        solution: "Let the numbers be 6x and 7x. Then 36x^2 + 49x^2 = 765, so 85x^2 = 765 and x = 3. The numbers are 18 and 21. Difference = 3."
      },
      {
        level: "Questions 1-10",
        q: "Two numbers are in the ratio 9:20. When 8 is added to each number, the new ratio becomes 1:2. Find the larger number.",
        options: ["60", "64", "72", "80"],
        answer: 3,
        solution: "Let the numbers be 9x and 20x. Given (9x+8):(20x+8)=1:2. Therefore 18x+16 = 20x+8, so x = 4. Larger number = 20x = 80."
      },
      {
        level: "Questions 1-10",
        q: "The price of a stone is directly proportional to the square of its weight. A stone is broken into pieces in the ratio 2:3:4 and its value decreases by Rs. 1352. Find the original price of the stone.",
        options: ["Rs. 2106", "Rs. 2028", "Rs. 1950", "Rs. 2184"],
        answer: 0,
        solution: "Let the total weight be 9x. Original price = k(9x)^2 = 81kx^2. Broken value = k[(2x)^2+(3x)^2+(4x)^2] = 29kx^2. Loss = 52kx^2 = 1352, so kx^2 = 26. Original price = 81 x 26 = Rs. 2106."
      },
      {
        level: "Questions 1-10",
        q: "In the first basket, apples and mangoes are in the ratio 4:5. In the second basket, apples and mangoes are in the ratio 1:2. If the total fruits in the second basket are four times the total fruits in the first basket, find the ratio of apples in the first basket to apples in the second basket.",
        options: ["1:2", "1:3", "2:3", "3:4"],
        answer: 1,
        solution: "Let apples and mangoes in the first basket be 4x and 5x. Let apples and mangoes in the second basket be y and 2y. Since 3y = 4(9x), y = 12x. Required ratio = 4x:12x = 1:3."
      },
      {
        level: "Questions 1-10",
        q: "If a/6 = b/8 = 3c/4 = 5d/12, find the ratio a:b:c:d.",
        options: ["90:120:20:36", "45:60:20:18", "6:8:3:5", "30:40:45:50"],
        answer: 0,
        solution: "Let each expression be k. Then a = 6k, b = 8k, c = 4k/3, and d = 12k/5. Multiplying by 15 gives a:b:c:d = 90:120:20:36."
      },
      {
        level: "Questions 1-10",
        q: "If 9a = 12b = 5c = 18d = 24e and the sum of the two largest numbers is 560, find the sum of the two smallest numbers.",
        options: ["175", "180", "190", "200"],
        answer: 0,
        solution: "Let 9a = 12b = 5c = 18d = 24e = 360k. Then a=40k, b=30k, c=72k, d=20k, e=15k. The two largest are c and a, so 112k = 560 and k=5. The two smallest are d and e, so 35k = 175."
      },
      {
        level: "Questions 1-10",
        q: "In an office, the ratio of men to women is 4:3. The ratio of skilled men to unskilled women is 2:3. If skilled people are two-fifths of the total office, find the ratio of skilled women to unskilled women.",
        options: ["2:1", "3:1", "5:2", "4:1"],
        answer: 3,
        solution: "Let men = 4x and women = 3x. Let skilled men = 2y and unskilled women = 3y. Skilled women = 3x - 3y. Total skilled = 2y + 3x - 3y = 3x - y. Since skilled people are 2/5 of 7x, 3x - y = 14x/5, so x = 5y. Skilled women = 12y and unskilled women = 3y. Ratio = 4:1."
      },
      {
        level: "Questions 1-10",
        q: "After revaluation, the marks of Shyam, Pam and Ram are in the ratio 10:5:3. Each person's score increased by 9 marks. If Ram's original score was one-eighth of the combined original scores of Shyam and Pam, find Pam's original score.",
        options: ["18", "21", "24", "27"],
        answer: 1,
        solution: "Let the revised scores be 10x, 5x, and 3x. Original scores are 10x-9, 5x-9, and 3x-9. Given Ram's original score is one-eighth of Shyam and Pam's combined original score, 8(3x-9)=15x-18. Thus x=6. Pam's original score = 5x - 9 = 21."
      },
      {
        level: "Questions 11-20",
        q: "Three numbers are in the ratio 8:7:5 respectively and their sum is 900. When the largest number is decreased by 80 and the other two numbers are increased by 35 each, then the respective ratio changes to:",
        options: ["9:10:7", "24:28:21", "28:35:26", "14:15:13"],
        answer: 2,
        solution: "Let the numbers be 8a, 7a, and 5a. Since 20a=900, a=45. New values are 360-80, 315+35, and 225+35 = 280, 350, and 260. Ratio = 28:35:26."
      },
      {
        level: "Questions 11-20",
        q: "The ratio of the monthly income of P and Q is 6:7 and that of their monthly expenditure is 4:5. If the income of P is twice the expenditure of Q, then what is the ratio between the savings of P and Q?",
        options: ["10:9", "9:10", "3:7", "6:5"],
        answer: 1,
        solution: "Let incomes be 6a and 7a, and expenditures be 4b and 5b. Given 6a = 2 x 5b, so a:b = 5:3. Savings are 18y and 20y, so the ratio is 9:10."
      },
      {
        level: "Questions 11-20",
        q: "Some amount of money was given to Bhima, Nakul and Arjun such that Bhima:(Nakul + Arjun) = 3:8 and Bhima:Arjun = 6:7. Find the ratio of money received by Nakul to money received by Bhima.",
        options: ["3:2", "2:1", "1:5", "4:3"],
        answer: 0,
        solution: "Let Bhima = 6a and Arjun = 7a. Then 6a:(Nakul+7a)=3:8, so Nakul+7a=16a and Nakul=9a. Required ratio = 9a:6a = 3:2."
      },
      {
        level: "Questions 11-20",
        q: "A number is divided into 3 parts. Six times the third part is equal to eight times the second part, which is equal to five times the first part. In what ratio is the number divided?",
        options: ["5:8:6", "24:15:20", "6:8:5", "20:16:23"],
        answer: 1,
        solution: "Let the parts be a, b, c. Given 5a = 8b = 6c. Therefore a:b:c = 1/5:1/8:1/6. Multiplying by 120 gives 24:15:20."
      },
      {
        level: "Questions 11-20",
        q: "A South Indian dish is made using jaggery and orange peels in the proportion 2:5. The price of jaggery is three times the price of orange peels. The overall cost of production of a bottle is Rs. 520 including Rs. 80 labour charges. What is the value of jaggery used in a bottle?",
        options: ["Rs. 440", "Rs. 200", "Rs. 240", "Cannot be determined"],
        answer: 2,
        solution: "Material cost = 520 - 80 = 440. Let quantities be 2x and 5x, and orange peel price be p. Jaggery price = 3p. Cost = 2x(3p)+5x(p)=11xp=440. Jaggery value = 6xp = Rs. 240."
      },
      {
        level: "Questions 11-20",
        q: "A consultancy company reduced the number of employees in the ratio 18:7 and increased average salary per employee in the ratio 8:15. The company saved Rs. 97,500. What is the current expenditure on salary?",
        options: ["Rs. 225000", "Rs. 262500", "Rs. 315000", "Rs. 375000"],
        answer: 1,
        solution: "Initial expenditure = 18x x 8 = 144x. Current expenditure = 7x x 15 = 105x. Saving = 39x = 97500, so x = 2500. Current expenditure = Rs. 262500."
      },
      {
        level: "Questions 11-20",
        q: "The monthly salaries of Karan and Arjun are in the ratio 7:8. If both get a salary increment of Rs. 1500 each, the new ratio becomes 52:59. What is the new monthly salary of Arjun?",
        options: ["Rs. 28000", "Rs. 29500", "Rs. 31000", "Rs. 32500"],
        answer: 1,
        solution: "Let old salaries be 7x and 8x. Then (7x+1500):(8x+1500)=52:59. Solving gives x=3500. Arjun's new salary = 8x+1500 = Rs. 29500."
      },
      {
        level: "Questions 11-20",
        q: "Jitu's current age is fourteen years less than 1.8 times Chinu's age. Thirty years ago, Chinu's age was three years more than two-fifth of Jitu's age then. What is Jitu's present age?",
        options: ["75", "80", "85", "90"],
        answer: 2,
        solution: "Let Jitu's age be x and Chinu's age be y. Given x=1.8y-14 and y-30 = 0.4(x-30)+3. Solving gives y=55 and x=85."
      },
      {
        level: "Questions 11-20",
        q: "If (a + b):(b + c):(c + a) = 4:6:5 and a + b + c = 30, consider: i. a > b, ii. c - b = 4, iii. c - b = c - a. Which is true?",
        options: ["Only i", "Only ii", "i, ii and iii", "Neither i nor ii"],
        answer: 1,
        solution: "Let a+b=4k, b+c=6k, c+a=5k. Since 2(a+b+c)=15k and a+b+c=30, k=4. Thus a=6, b=10, c=14. Only c-b=4 is true."
      },
      {
        level: "Questions 11-20",
        q: "The sum of the present age of Chandan and his wife is 60 years. After 4 years this ratio will be 9:8. When they were married, the sum of their ages was 50 years. Find the ratio of their ages at the time of marriage.",
        options: ["7:6", "27:23", "9:8", "None of these"],
        answer: 1,
        solution: "Let present ages be x and y. x+y=60 and (x+4):(y+4)=9:8. Solving gives x=32 and y=28. They married 5 years ago, so ages then were 27 and 23. Ratio = 27:23."
      },
      {
        level: "Questions 21-30",
        q: "Three numbers a, b and c are in continued proportion. If 3 is subtracted from each number, the ratio becomes 3:5:8. Find a + b + c.",
        options: ["57", "40", "60", "20"],
        answer: 0,
        solution: "Let a-3=3k, b-3=5k, c-3=8k. Since a, b, c are in continued proportion, b^2=ac. Then (5k+3)^2=(3k+3)(8k+3), so k=3. Sum = 12+18+27 = 57."
      },
      {
        level: "Questions 21-30",
        q: "P, Q, R, S and T are five companies. Profits of P, Q and R are in the ratio 5:5.5:6 while profits of Q, S and T are in the ratio 11:18:20. If R made Rs. 10 crore more than P, find the total profit made by all companies.",
        options: ["Rs. 249 crore", "Rs. 284 crore", "Rs. 240 crore", "Rs. 355 crore"],
        answer: 3,
        solution: "P:Q:R = 10:11:12 and Q:S:T = 11:18:20. Thus P:Q:R:S:T = 10:11:12:18:20. R-P = 2 units = Rs. 10 crore, so 1 unit = Rs. 5 crore. Total = 71 units = Rs. 355 crore."
      },
      {
        level: "Questions 21-30",
        q: "Kumar said that one-third of his salary, two-fifth of his brother's salary, half of his wife's salary and three-fourth of his son's salary are the same. If the total family income is Rs. 6,36,000, what are the salaries earned by Kumar and his son together?",
        options: ["Rs. 1,40,000", "Rs. 4,76,000", "Rs. 3,12,000", "Rs. 2,84,000"],
        answer: 2,
        solution: "K:B:W:S = 18:15:12:8. Total units = 53 and total income = Rs. 636000, so 1 unit = Rs. 12000. Kumar plus son = 26 units = Rs. 312000."
      },
      {
        level: "Questions 21-30",
        q: "If the ratio of the population of Timbuktoo to Gimbuktoo is 7:9, male population of Timbuktoo is equal to female population of Gimbuktoo, and female population of Timbuktoo to male population of Gimbuktoo is 2:3, find the ratio of male population of Timbuktoo to male population of Gimbuktoo.",
        options: ["1:3", "1:2", "1:4", "Cannot be determined"],
        answer: 1,
        solution: "Let male populations be m1 and m2, female populations be f1 and f2. Given m1=f2 and f1:m2=2:3. Using the total population ratio gives 9m1+6m2=7m2+7m1, so m1:m2 = 1:2."
      },
      {
        level: "Questions 21-30",
        q: "Rs. 4500 was distributed among Amit, Bhanu and Chintu. Amit, Bhanu and Chintu spent Rs. 110, Rs. 120 and Rs. 140 respectively. The amounts left with Amit and Bhanu were in the ratio 3:4 and with Bhanu and Chintu in the ratio 5:6. What amount did Bhanu receive?",
        options: ["1520", "1400", "1600", "1420"],
        answer: 0,
        solution: "After spending, A:B = 3:4 and B:C = 5:6, so A:B:C = 15:20:24. Amount left = 4500-110-120-140 = 4130. Since 59 units = 4130, 1 unit = 70. Bhanu received = 20 x 70 + 120 = Rs. 1520."
      },
      {
        level: "Questions 21-30",
        q: "In an election with only two parties A and B, the ratio of votes to A and B is 4:5. The number of males to females who voted is 2:1. Two-thirds of the females voted for B. If one-fourth of the total votes of A and one-sixth of the male votes of B were invalid, B won by 18,000 votes. Find the number of women who voted for party A.",
        options: ["12,000", "18,000", "8,000", "6,000"],
        answer: 0,
        solution: "Let total votes be 36x. A=16x, B=20x, males=24x, females=12x. Female votes for B = 8x, so female votes for A = 4x. Male votes for B = 12x. Valid A = 12x and valid B = 18x. Margin = 6x = 18000, so x=3000. Women voting for A = 4x = 12000."
      },
      {
        level: "Questions 21-30",
        q: "A couple married 6 years ago when their ages were in the ratio 5:7. Since then, they have had twins and triplets. In 12 years from now, the ages of the husband, combined age of twins, combined age of triplets and wife are in the ratio 23:14:15:19. How many years before the triplets were the twins born?",
        options: ["2", "3", "4", "6"],
        answer: 2,
        solution: "Six years ago wife:husband = 5:7. In 12 years, their ages are in ratio 19:23, giving x=4 and ages 38 and 46. The combined ages of twins and triplets then are in ratio 14:15, so each twin is 14 and each triplet is 10. Difference = 4 years."
      },
      {
        level: "Questions 21-30",
        q: "The income of A and B is in the ratio 4:7. B spends twice as much as A every month. If the savings of A and B are in the ratio 2:3, what fraction of his income does B save?",
        options: ["2/7", "3/7", "1/2", "4/7"],
        answer: 1,
        solution: "Let incomes of A and B be 4i and 7i, and their expenditures be e and 2e. Savings are 4i-e and 7i-2e. Given (4i-e):(7i-2e)=2:3, so e=2i. B's saving = 7i-4i = 3i. Fraction saved by B = 3i/7i = 3/7."
      },
      {
        level: "Questions 21-30",
        q: "The profit earned by a taxi is directly proportional to the number of passengers over a certain minimum number and the distance traveled. With 45 passengers for 42 km, profit is Rs. 3080. With 60 passengers for 20 km, profit is Rs. 3300. Find the minimum number of passengers such that the taxi does not make any loss.",
        options: ["33", "34", "36", "39"],
        answer: 0,
        solution: "Let the minimum number be n. Profit = k(passengers-n)(distance). So 3080 = k(45-n)42 and 3300 = k(60-n)20. Dividing gives 4(60-n)=9(45-n), so n=33."
      },
      {
        level: "Questions 21-30",
        q: "The lengths of two trees A and B are in the ratio 4:7 and their rates of growth are in the ratio 5:3. After 10 days, one-third of tree B is cut so that the lengths of the two trees become equal. What is the ratio of lengths of A and B after 5 more days?",
        options: ["27:23", "53:47", "26:24", "51:49"],
        answer: 3,
        solution: "Let initial lengths be 4l and 7l, and growth rates be 5r and 3r. After 10 days, A=4l+50r and B=7l+30r. After cutting one-third of B, (2/3)(7l+30r)=4l+50r, giving l=45r. Equal length then = 230r. After 5 more days, A=255r and B=245r. Ratio = 51:49."
      }
    ];

    const form = document.getElementById("testForm");
    const resultBox = document.getElementById("result");
    const optionLabels = ["A", "B", "C", "D"];
    let submitted = false;
    let secondsLeft = 60 * 60;

    function renderQuestions() {
      let currentLevel = "";
      const html = questions.map((item, index) => {
        const levelHtml = item.level !== currentLevel ? `<div class="difficulty">${item.level}</div>` : "";
        currentLevel = item.level;

        return `
          <div class="question" id="qcard-${index}">
            ${levelHtml}
            <h2>Q${index + 1}. ${item.q}</h2>
            <div class="options">
              ${item.options.map((option, optionIndex) => `
                <label class="option">
                  <input type="radio" name="q${index}" value="${optionIndex}">
                  <span>(${optionLabels[optionIndex]}) ${option}</span>
                </label>
              `).join("")}
            </div>
            <div class="answer-note" id="note-${index}"></div>
            <div class="solution" id="solution-${index}">
              <h3>Solution</h3>
              <p><strong>Answer: (${optionLabels[item.answer]}) ${item.options[item.answer]}</strong></p>
              <p>${item.solution}</p>
            </div>
          </div>
        `;
      }).join("");

      form.innerHTML = html + `
        <div class="actions">
          <button type="submit">Submit Test</button>
        </div>
      `;
    }

    function updateTimer() {
      const minutes = Math.floor(secondsLeft / 60);
      const seconds = secondsLeft % 60;
      document.getElementById("time").textContent =
        `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

      if (secondsLeft <= 0) {
        submitTest();
        return;
      }
      secondsLeft -= 1;
    }

    function submitTest() {
      if (submitted) return;
      submitted = true;

      let correct = 0;
      let wrong = 0;
      let unattempted = 0;

      questions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const card = document.getElementById(`qcard-${index}`);
        const note = document.getElementById(`note-${index}`);
        const solution = document.getElementById(`solution-${index}`);
        const correctText = `Correct answer: (${optionLabels[item.answer]}) ${item.options[item.answer]}`;

        solution.style.display = "block";

        if (!selected) {
          unattempted += 1;
          card.classList.add("missed");
          note.className = "answer-note muted";
          note.textContent = `Unattempted. ${correctText}`;
        } else if (Number(selected.value) === item.answer) {
          correct += 1;
          card.classList.add("correct");
          note.className = "answer-note ok";
          note.textContent = "Correct.";
        } else {
          wrong += 1;
          card.classList.add("wrong");
          note.className = "answer-note bad";
          note.textContent = `Wrong. ${correctText}`;
        }
      });

      const score = correct * 3 - wrong;
      const attempted = correct + wrong;
      resultBox.style.display = "block";
      resultBox.innerHTML = `
        <h2>Test Submitted</h2>
        <div class="score-grid">
          <div class="score-box">Score<strong>${score}</strong></div>
          <div class="score-box">Correct<strong>${correct}</strong></div>
          <div class="score-box">Wrong<strong>${wrong}</strong></div>
          <div class="score-box">Attempted<strong>${attempted}</strong></div>
          <div class="score-box">Unattempted<strong>${unattempted}</strong></div>
        </div>
      `;

      document.querySelectorAll("input, button").forEach((element) => {
        element.disabled = true;
      });
      resultBox.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      submitTest();
    });

    renderQuestions();
    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
