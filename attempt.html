<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CAT Test Console</title>
  <style>
    :root {
      --navy:#102235;
      --navy-2:#19324a;
      --blue:#0b73e8;
      --sky:#eaf7ff;
      --ink:#17212f;
      --muted:#667085;
      --line:#d6e0ea;
      --paper:#ffffff;
      --soft:#f7faff;
      --green:#16a34a;
      --orange:#ff5b1a;
      --purple:#8b5cf6;
      --danger:#dc2626;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,Segoe UI,Arial,sans-serif;background:#f4f7fb;color:var(--ink)}
    body{overflow:hidden}
    .exam{height:100vh;display:grid;grid-template-columns:minmax(0,1fr) 286px;grid-template-rows:74px minmax(0,1fr);background:#fff}
    .exam-head{grid-column:1/3;display:grid;grid-template-columns:minmax(0,1fr) 180px 286px;border-bottom:1px solid var(--line);background:var(--navy);color:#fff}
    .head-main{padding:12px 18px;display:flex;flex-direction:column;justify-content:center;min-width:0}.head-main h1{margin:0 0 6px;font-size:21px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.head-main p{margin:0;color:#c7d7e8;font-size:13px}
    .head-action{display:flex;align-items:center;justify-content:center;border-left:1px solid rgba(255,255,255,.16)}.head-action a{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.26);border-radius:999px;padding:9px 14px;font-weight:750;font-size:13px;background:rgba(255,255,255,.08)}
    .timer{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;color:#111;border-left:1px solid var(--line);font-weight:800}.timer small{font-size:13px}.timer span{font-size:24px;margin-top:3px}
    .workspace{min-width:0;min-height:0;display:grid;grid-template-rows:52px minmax(0,1fr) 66px;border-right:1px solid #9db0c2;background:#fff}.qtop{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 18px;border-bottom:1px solid var(--line);background:#fbfdff}.qtop strong{font-size:18px}.qtop span{font-size:13px;color:var(--muted);font-weight:700}
    .question-area{overflow:auto;padding:26px 28px 110px;background:#fff}.block{margin:0 0 18px;padding:16px 18px;border:1px solid var(--line);border-radius:12px;background:#fbfdff;line-height:1.55;font-size:16px}.question-text{font-size:19px;line-height:1.6;font-weight:650;margin:0 0 22px}.question-text p,.block p,.option p{margin:0 0 10px}.question-text img,.block img{max-width:100%;height:auto}.options{display:grid;gap:12px;max-width:950px}.option{display:flex;gap:13px;align-items:flex-start;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;font-size:17px;line-height:1.45;transition:.15s ease}.option:hover{border-color:#9cc8f5;background:#f8fbff}.option input{margin-top:4px;transform:scale(1.15)}.option .label{font-weight:800;color:var(--blue);min-width:24px}.typed-answer{width:min(420px,100%);height:50px;border:1px solid #aab7c4;border-radius:10px;padding:0 14px;font-size:18px;font-weight:700;outline:none}.typed-answer:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(11,115,232,.11)}
    .nav-row{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:10px 18px;background:#f2f7fb;border-top:1px solid var(--line)}button{font-family:inherit}.btn{height:42px;border:1px solid var(--line);border-radius:10px;background:#fff;color:#243449;font-weight:800;padding:0 15px;cursor:pointer}.btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}.btn.review{background:#fff8ed;border-color:#fed7aa;color:#9a3412}.btn.submit{background:var(--blue);border-color:var(--blue);color:#fff}.btn:disabled{opacity:.55;cursor:not-allowed}
    .side{min-height:0;display:flex;flex-direction:column;background:#eaf9ff}.side h2{margin:0;padding:13px 14px;background:#258bd6;color:#fff;font-size:17px}.qbar{padding:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.qbtn{height:41px;border:1px solid #aebdca;border-radius:8px;background:linear-gradient(#fff,#eaf0f5);font-size:16px;font-weight:800;color:#374151;cursor:pointer}.qbtn.current{background:var(--orange);border-color:#e64a10;color:#fff}.qbtn.answered{background:var(--green);border-color:#138a3f;color:#fff}.qbtn.marked{background:var(--purple);border-color:#7c3aed;color:#fff}.legend{display:grid;gap:10px;padding:0 18px 18px;color:#374151;font-size:14px}.dot{display:inline-block;width:16px;height:16px;border-radius:5px;margin-right:8px;vertical-align:-3px}.dot.current{background:var(--orange)}.dot.answered{background:var(--green)}.dot.marked{background:var(--purple)}.side .btn.submit{margin:auto 18px 18px;width:calc(100% - 36px)}
    .notice,.result{margin:20px;padding:22px;border:1px solid var(--line);border-radius:16px;background:var(--soft)}.notice h2,.result h2{margin:0 0 8px}.notice p{margin:6px 0;color:var(--muted);line-height:1.55}.notice code{background:#eef2f7;border:1px solid #d8e1eb;border-radius:6px;padding:2px 6px;color:#111}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(110px,1fr));gap:10px;margin-top:14px}.score-card{border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px}.score-card small{color:var(--muted);font-weight:700}.score-card strong{display:block;font-size:26px;margin-top:4px}.answer-note{margin-top:18px;font-weight:850}.ok{color:var(--green)}.bad{color:var(--danger)}.muted{color:var(--muted)}.solution{display:none;margin-top:16px;border-top:1px solid var(--line);padding-top:14px}.solution h3{margin:0 0 8px;color:var(--blue)}
    @media(max-width:920px){body{overflow:auto}.exam{height:auto;min-height:100vh;grid-template-columns:1fr;grid-template-rows:auto auto auto}.exam-head{grid-column:1;grid-template-columns:1fr}.head-action{display:none}.timer{padding:10px}.workspace{min-height:70vh;border-right:0}.side{order:3}.qbar{grid-template-columns:repeat(8,1fr)}.score-grid{grid-template-columns:repeat(2,1fr)}.nav-row{flex-wrap:wrap;justify-content:flex-start}}
  </style>
</head>
<body>
  <div class="exam">
    <header class="exam-head">
      <div class="head-main">
        <h1 id="testTitle">Loading Test...</h1>
        <p id="testMeta">Loading questions from uploaded HTML file...</p>
      </div>
      <div class="head-action"><a href="./#home">← Back to Portal</a></div>
      <div class="timer"><small>Time Left</small><span id="timeLeft">--:--</span></div>
    </header>

    <main class="workspace">
      <div class="qtop"><strong id="qNumber">Question</strong><span id="qStatus">Loading...</span></div>
      <section class="question-area" id="questionArea">
        <div class="notice"><h2>Loading test...</h2><p>Please wait while the question data is being prepared.</p></div>
      </section>
      <div class="nav-row" id="navRow">
        <button class="btn review" type="button" id="markBtn">Mark for Review & Next</button>
        <button class="btn" type="button" id="clearBtn">Clear Response</button>
        <button class="btn" type="button" id="prevBtn">Previous</button>
        <button class="btn primary" type="button" id="nextBtn">Save & Next</button>
      </div>
    </main>

    <aside class="side">
      <h2>Question Bar</h2>
      <div class="qbar" id="qbar"></div>
      <div class="legend">
        <span><i class="dot current"></i>Current</span>
        <span><i class="dot answered"></i>Answered</span>
        <span><i class="dot marked"></i>Marked</span>
      </div>
      <button class="btn submit" type="button" id="submitBtn">Submit Test</button>
    </aside>
  </div>
  <script src="attempt.js"></script>
</body>
</html>
