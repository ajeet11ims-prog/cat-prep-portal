  "Suppose the original number of people is x and the new people are y. Each of the y contributes 3 inches extra (compared to the old average) and this makes the average of the entire group go up by 0.375 per person. So 3y = 0.375(x&nbsp;+&nbsp;y) or 2.625y = 0.375x which gives us x : y = 7 : 1.&nbsp; <br> <br>Hence, [1]. <br> <br><span><b>Alternatively;</b></span> <br> <br>Suppose the original number of people is x and their average height is k, while the new people are&nbsp;y and their average height is&nbsp;(k&nbsp;+&nbsp;3). Then x × k + y ×&nbsp;(k&nbsp;+&nbsp;3) = (x&nbsp;+&nbsp;y) × (k&nbsp;+&nbsp;0.375) which gives us x : y = 7 : 1.",
  "<p>Suppose, x = 1, z = 2, and y = 2</p> <p>Then the concentration of acid in the resulting solution will be =&nbsp;(<span class=\"math-frac\"><span class=\"frac-num\">1 &times; 30 + 2 &times; 40 + 2 &times; 80</span><span class=\"frac-den\">1 + 2 + 2</span></span>)% = 54%</p> <p>If we increase the value of y, the overall concentration of the resulting solution will decrease.</p> <p>Hence, [1].</p>",
  "<p> <br>Profit remaining after paying 12.5% to Vinay is 87.5%&nbsp; <br>&rArr;&nbsp;&nbsp;From this, Amay and Vinay should get 50% and 37.5% i.e. in ratio 4:3. <br>&rArr; 40000 : x = 4 : 3&nbsp; <br>&rArr; x = Rs. 30000 <br><br>Hence, [3].</p>",
  "<p>Let the total number of students appeared for the examination be N.</p> <p>Therefore, 0.92 &times; N &times;&nbsp;(<span class=\"math-frac\"><span class=\"frac-num\">5</span><span class=\"frac-den\">10</span></span>‒<span class=\"math-frac\"><span class=\"frac-num\">2</span><span class=\"frac-den\">10</span></span>) = 2622 <br><span style=\"font-family: Cambria Math;\">&rArr;</span> N = 9500 </p> <p>Hence, [3].</p>",
  "<span style=\"color: #202124;background-color: white;\">Total score in 9 innings = 9 × 35 = 315</span> <br><span style=\"color: #202124;background-color: white;\">His highest score in the first 5 innings is 31 and he never scored more than 50 in a single innings.</span> <br><span style=\"color: #202124;background-color: white;\">If he scores 0 in the first innings and 31 in the 2</span><span style=\"color: #202124;background-color: white;\"><sup>nd</sup></span><span style=\"color: #202124;background-color: white;\">, 3</span><span style=\"color: #202124;background-color: white;\"><sup>rd</sup></span><span style=\"color: #202124;background-color: white;\">, 4</span><span style=\"color: #202124;background-color: white;\"><sup>th</sup></span><span style=\"color: #202124;background-color: white;\">, and 5</span><span style=\"color: #202124;background-color: white;\"><sup>th</sup></span><span style=\"color: #202124;background-color: white;\"> innings then total runs scored in first 5 innings = 124</span> <br><span style=\"color: #202124;background-color: white;\">Runs scored in last 4 innings = 315 – 124 = 191</span> <br><span style=\"color: #202124;background-color: white;\">With the given constraints it is possible to score</span><span style=\"color: #202124;background-color: white;\">&nbsp;</span><span style=\"color: #202124;background-color: white;\">191 in the last 4 innings (e.g., 47 + 48 + 48 + 48 or 41 + 50 + 50 + 50, etc.)</span> <br><span style=\"color: #202124;background-color: white;\">Thus, the largest possible difference between two lowest scores = 31 – 0 = 31.</span> <br><span style=\"color: #202124;background-color: white;\">Hence, [3].</span>",
  "<p>Let the volumes of corn syrup in the first pitcher and that of pure water in the second pitcher be 6A and 4B. </p> <p>After first round of transfer, volume of corn syrup left in first pitcher = 3A and volume of pure water left in second pitcher = 2B </p> <p>After second round of transfer, volume of corn syrup left in first pitcher = 2A and volume of pure water left in second pitcher = B <br>According to the question, 2A = B </p> <p>Therefore, in the large glass bowl, <br>volume of corn syrup : volume of pure water = 4A : 3B = 2B : 3B = 2 : 3 </p> <p>Hence, [3].</p>",

  "</span>\tIf the average age of the boys is x, we get the following -&nbsp; <br><span style=\"font-family: ;\">36(x + 1) = 35x + 57</span> <br><span style=\"font-family: ;\">Solving for x, x =</span><span style=\"font-family: ;\">&nbsp;</span><span style=\"font-family: ;\">21.</span> <br> <br><span style=\"font-family: ;\">Therefore, the required answer is 21.</span>",
  "</span>\tLet, the cost price of Ganga brand oil be Rs. g per litre and that of Yamuna oil be Rs. y per litre. <br><span class=\"math-frac\"><span class=\"frac-num\">4g+5y</span><span class=\"frac-den\">4+5</span></span><span style=\"font-family: ;\"> × 1.2 = 126</span>\t… (1) and <br><span class=\"math-frac\"><span class=\"frac-num\">5g+4y</span><span class=\"frac-den\">4+5</span></span><span style=\"font-family: ;\"> × 1.05 = 126</span>\t… (2) <br> <br><span style=\"font-family: ;\">From eq. (1), we get</span>\t4g + 5y = 945\t… (3) <br><span style=\"font-family: ;\">From eq. (2), we get</span>\t5g + 4y = 1080\t… (4) <br> <br><span style=\"font-family: ;\">Solving the two equations, the derived value of g is 180.</span> <br> <br><span style=\"font-family: ;\">Hence, [3].</span>",
  "</span>\tLet the total number of students enrolled in these two programs be 36k<span>.</span> <br>\t<span>Suppose, in commerce program, the number of male students be 7c and female students be 9c</span><span>.</span> <br>\t<span>In a similar way we assume that, in humanities program, the number of male students be h and female students be h.</span> <br>\t<span>Therefore, (7c + h) : (9c + h) = 17 : 19</span> <br>\t⇒<span> 133c + 19h = 153c + 17h</span> <br>\t<span style=\"font-family: Cambria Math;\">⇒</span><span> 20c = 2h</span> <br>\t<span style=\"font-family: Cambria Math;\">⇒</span><span> h = 10c</span> <br>\t<span>It is given that 7c = 91&nbsp;</span><span style=\"font-family: Cambria Math;\">⇒</span><span> c = 13 and h = 130</span> <br>\t<span>Thus, total number of students enrolled in these two programs in the college = 16c + 2h = 468</span> <br>\t<span>Therefore, the required answer is 468.</span>",
  "<p>According to the question,&nbsp; <br>a<sub>1</sub> + a<sub>2</sub> + &hellip; + a<sub>50</sub> = 50 &times; 50&nbsp;&hellip; (i) and <br>a<sub>2</sub> + a<sub>3</sub> + &hellip; + a<sub>50</sub> = 49 &times; 51&nbsp;&hellip; (ii) <br>By subtraction, we get &ndash; <br>a<sub>1</sub> = 2500 &ndash; 2499 = 1 <br>The minimum sum of a<sub>1</sub> + a<sub>2</sub> + &hellip; + a<sub>49</sub> = 1 + 2 + 3 + &hellip; + 49 = 1225 and hence, maximum value of a<sub>50</sub> = 2500 &ndash; 1225 = 1275 <br>Now, starting from a<sub>2</sub> till a<sub>50</sub>, the sum is 2499 and the average of these 49 numbers is 51.&nbsp; <br>Thus, a<sub>50</sub> will be minimum, when the median number will be 51 and all the numbers will be in AP with common difference of 1. <br>The minimum value of a<sub>50</sub> = 51&nbsp;+&nbsp;<span class=\"math-frac\"><span class=\"frac-num\">48</span><span class=\"frac-den\">2</span></span> = 75 <br>Thus, the difference = 1275 &ndash; 75 = 1200 <br>Hence, [3].</p>",
  "<p>Total volume of solution in the large bowl =&nbsp;(<span class=\"math-frac\"><span class=\"frac-num\">1</span><span class=\"frac-den\">3</span></span>+<span class=\"math-frac\"><span class=\"frac-num\">1</span><span class=\"frac-den\">2</span></span>+1)&nbsp;litres =&nbsp;<span class=\"math-frac\"><span class=\"frac-num\">11</span><span class=\"frac-den\">6</span></span>&nbsp;litres </p> <p>Therefore, volume of milk in the solution = 1 litre </p> <p><span style=\"font-family: Cambria Math;\">&there4;</span> Concentration of milk in the solution contained in the large bowl now =&nbsp;<span class=\"math-frac\"><span class=\"frac-num\">6</span><span class=\"frac-den\">11</span></span> &times; 100% = 54<span class=\"math-frac\"><span class=\"frac-num\">6</span><span class=\"frac-den\">11</span></span>% </p> <p>Hence, [2].</p>",
  "<p>We&nbsp;have to work with&nbsp;<span class=\"math-frac\"><span class=\"frac-num\">3</span><span class=\"frac-den\">7</span></span>.&nbsp; <br>&rArr;&nbsp;Let us assume that the total number of voters = 70 <br><span class=\"math-frac\"><span class=\"frac-num\">3</span><span class=\"frac-den\">7</span></span>th = 30 and remaining = 40 <br>5% of 30 = 1.5 and P% of 40 = 0.4P <br><br>Number of voters voted for Kushal = 30&nbsp;‒ 1.5 + 0.4P <br>Number of voters voted for Vishal = 40&nbsp;‒&nbsp;0.4P + 1.5 <br>Difference = |10&nbsp;‒&nbsp;0.8P + 3| = |13&nbsp;‒&nbsp;0.8P| = 10% of the total votes <br>&there4; |13&nbsp;‒&nbsp;0.8P| = 7 <br>&rArr;&nbsp;13&nbsp;‒&nbsp;0.8P = 7 (OR) 13&nbsp;‒&nbsp;0.8P =&nbsp;‒7 <br>&rArr;&nbsp;0.8P = 6 (OR)&nbsp;0.8P = 20 <br>&rArr;&nbsp;P = 7.5 (OR) P = 25 <br><br>Hence, [4].</p>",
  "</span>\t2M + 3N = 53 <br><span style=\"font-family: Cambria Math;\">⇒</span><span> 2(M + N) + N = 53</span> <br><span>Now, M + N will be maximum when N will be minimum.</span> <br><span>Thus, (M + N)</span><span><sub>max</sub></span><span> = 26 when N</span><span><sub>min</sub></span><span> = 1</span> <br><span>Again, M + N will be minimum when N will be maximum.</span> <br><span>Thus, (M + N)</span><span><sub>min</sub></span><span> = 18 when N</span><span><sub>max</sub></span><span> = 17</span> <br><span>Therefore, the required average = {(26 + 18) ÷ 2} = 22</span> <br><span>Hence, [3].</span>",
  "<p>The volume of the final solution of water and milk is (10 + 30) litres and volume of water in this final solution is 12.5% of 40 litres i.e. 5 litres. <br>Thus, the original solution of milk and water had 5 litres of water. This is 50% of the total volume of the solution. So, the profit would have been 100%. </p> <p>Therefore, the required answer is 100.</p>",
  "</span>\tLet the initial ages of father and mother be 5x years and 4x years respectively. <br> <br><span style=\"font-family: Cambria Math;\">∴</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">5x + 6</span><span class=\"frac-den\">4x + 6</span></span><span style=\"font-family: ;\"> =&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">6</span><span class=\"frac-den\">5</span></span><span style=\"font-family: ;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">⇒</span><span style=\"font-family: ;\"> x = 6</span> <br> <br><span style=\"font-family: Cambria Math;\">∴</span><span style=\"font-family: ;\"> The initial ages of father and mother were 30 years and 24 years respectively.&nbsp;</span> <br> <br><span style=\"font-family: ;\">The age of the son at this point of time was 6 years.</span> <br> <br><span style=\"font-family: ;\">Let the ratio</span><span style=\"font-family: ;\"> of the ages of mother and son&nbsp;</span><span style=\"font-family: ;\">become 3</span><span style=\"font-family: ;\">&nbsp;</span><span style=\"font-family: ;\">:</span><span style=\"font-family: ;\">&nbsp;</span><span style=\"font-family: ;\">1 ‘y’ years after this.</span> <br> <br><span style=\"font-family: Cambria Math;\">∴</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">30 + y</span><span class=\"frac-den\">6 + y</span></span><span style=\"font-family: ;\"> =&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">3</span><span class=\"frac-den\">1</span></span><span style=\"font-family: ;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">⇒</span><span style=\"font-family: ;\"> y = 6</span> <br> <br><span style=\"font-family: ;\">Therefore, the required answer is 6.</span>",
  "<p>Let, the positive real roots of the equation x<sup style=\"font-family: Calibri, 'sans-serif';\">4 </sup>&ndash; 12x<sup>3</sup> + cx<sup>2</sup>&ndash; dx + 81 = 0 be p, q, r and s.</p> <p>Now, p + q + r + s = &ndash; (&ndash;12) = 12 and p &times; q &times; r &times; s = 81<br>Thus, the AM of p, q, r and s = 3 and their GM = 3.</p> <p>For four positive real numbers, AM = GM.<br>This means that all these four numbers are equal.</p> <p><span style=\"font-family: Cambria Math;\"><span style=\"font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;\">c = Sum of the products taken two at a time = pq + pr + ps + qr + qs + rs =</span></span>&nbsp;(3 &times; 3 &times; 6) = 54</p> <p class=\"MsoNormal\" style=\"margin-bottom: .0001pt; line-height: normal;\">&nbsp;</p> <p><span style=\"font-family: Cambria Math;\"><span style=\"font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;\">d = Sum of the products taken three at a time =&nbsp;</span><span style=\"font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;\">pqr + prs + pqs + qrs</span><span style=\"font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;\"> = </span><span style=\"font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;\">(3&nbsp;</span></span>&times; 3 &times; 3 &times; 4) = 108</p> <p>Therefore, c + d = 54 + 108 = 162<br><br>Hence, [2].</p>",
  "</span>\tSuppose, 2 litres of water is mixed with 2 litres of pure milk. <br><span>The volume of this solution is 4 litres.</span> <br><span>Then, 1 litre of pure milk is added to this solution.</span> <br><span>Now, the volume of the solution is 5 litres in which 3 litres of pure milk is present.</span> <br><span>Therefore, the concentration of milk in this final solution is 60%.</span> <br><span>Therefore, the required answer is 60.</span>",
  "The sum of the ages of three sisters = 17&nbsp;</span>&#215;<span> 3 = 51 years.</span> <br> <br><span>The new average age is an odd integer.&nbsp;</span> <br><span>So, the numbers after 51 which are multiples of 4 can be checked for the new sum of ages.</span> <br><span>52 years: Average age = 13 years but age of son = 1 year&nbsp;</span><span style=\"font-family: Cambria Math;\">⇒</span><span> Not valid</span> <br><span>56 years: Average age = 14 years&nbsp;</span><span style=\"font-family: Cambria Math;\">⇒</span><span> Not valid</span> <br><span>60 years: Average age = 15 years and age of son = 9 years&nbsp;</span><span style=\"font-family: Cambria Math;\">⇒</span><span> Valid answer</span> <br> <br><span>Hence, [3].</span>",
  "</span>\tLet, the cost of the mixture of the two varieties of rice be Rs. G per kg<span>.</span> <br><span>Therefore, quantity of cheaper variety : quantity of costlier variety = (60&nbsp;</span><span>–</span><span> G) : (G&nbsp;</span><span>–</span><span> 50)</span> <br><span>Now, as the quantity of the cheaper variety is 5 kg more than that of the costlier variety, therefore, the value of G should be less than 55.</span> <br><span>If G = 54 then&nbsp;</span><span>(60&nbsp;</span><span>–</span><span> G) : (G&nbsp;</span><span>–</span><span> 50)</span><span> = 3 : 2 and the total quantity of the mixture will be 25 kg</span><span>.</span> <br><span>If G = 53 then</span><span>&nbsp;</span><span>(60&nbsp;</span><span>–</span><span> G) : (G&nbsp;</span><span>–</span><span> 50)</span><span> = 7 : 3 and the total quantity of the mixture will be 12.5 kg</span><span>.</span> <br><span>If G = 52 then</span><span>&nbsp;</span><span>(60&nbsp;</span><span>–</span><span> G) : (G&nbsp;</span><span>–</span><span> 50)</span><span> = 8 : 2 and the total quantity of the mixture will be 8</span><span class=\"math-frac\"><span class=\"frac-num\">1</span><span class=\"frac-den\">3</span></span><span> kg</span><span>.</span> <br><span>If G = 51 then</span><span>&nbsp;</span><span>(60&nbsp;</span><span>–</span><span> G) : (G&nbsp;</span><span>–</span><span> 50)</span><span> = 9 : 1 and the total quantity of the mixture will be 6.25 kg</span><span>.</span> <br><span>Therefore, the required answer is 25.</span>",
  "</span>\tLet, the average weight of the males be M kg and that of the females be W kg. <br>\t<span>Therefore, 8W + 12M = 8W + 12(W +&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">1</span><span class=\"frac-den\">3</span></span><span>) = 20W + 4</span> <br> <br>\t<span>As, 50 < W < 55,&nbsp;</span><span>1004 < (20W + 4) < 1104</span> <br>\t<span>The two perfect squares in this range are 1024 and 1089.</span> <br>\t<span>However, we cannot take 1089 as that will produce a fraction value for W.</span> <br>\t<span style=\"font-family: Cambria Math;\">∴</span><span> 20W + 4 = 1024</span> <br>\t<span style=\"font-family: Cambria Math;\">⇒</span><span> W = 51</span> <br>\tTherefore, the required answer is 51.",
  "<p>Volume of milk = 90% of 200 = 180 litres.&nbsp; <br><br>After adding water, the percentage of water becomes 40% and so, milk is now 60%.&nbsp; <br><br>If 60% &equiv; 180 litres, 100% &equiv;&nbsp;100&nbsp;&times;&nbsp;<span class=\"math-frac\"><span class=\"frac-num\">180</span><span class=\"frac-den\">60</span></span>&nbsp;=&nbsp;300. <br><br>Therefore, the volume of water required to be added = 300&nbsp;‒&nbsp;200 = 100. <br><br>Therefore, the required answer is 100.</p>",
  "<p>Let the total number of players in the club be &lsquo;n&rsquo; and their average height be &lsquo;a&rsquo; cm. </p> <p><span style=\"font-family: Calibri;\">&there4;&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">na‒680</span><span class=\"frac-den\">n‒5</span></span><span style=\"font-family: Calibri;\">&nbsp;</span><span style=\"font-family: Calibri;\">=</span><span style=\"font-family: Calibri;\">&nbsp;</span><span style=\"font-family: Calibri;\">a</span><span style=\"font-family: Calibri;\">&nbsp;</span><span style=\"font-family: Calibri;\">+</span><span style=\"font-family: Calibri;\">&nbsp;</span><span style=\"font-family: Calibri;\">2</span><span style=\"font-family: Calibri;\">&nbsp;</span><span style=\"font-family: Calibri;\">and</span><span style=\"font-family: Calibri;\">&nbsp;</span><span style=\"font-family: Calibri;\">&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">na‒920</span><span class=\"frac-den\">n‒5</span></span><span style=\"font-family: Calibri;\">&nbsp;</span><span style=\"font-family: Calibri;\">=</span><span style=\"font-family: Calibri;\">&nbsp;</span><span style=\"font-family: Calibri;\">a</span><span style=\"font-family: Calibri;\"> ‒&nbsp;</span><span style=\"font-family: Calibri;\">2</span> </p> <p><span style=\"font-family: Calibri;\">Therefore,&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">na ‒ 680</span><span class=\"frac-den\">n ‒ 5</span></span><span style=\"font-family: Calibri;\">‒&nbsp;</span><span style=\"font-family: Calibri;\">2</span><span style=\"font-family: Calibri;\"> =</span><span style=\"font-family: Calibri; font-size: 18.7px;\">&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">na‒920</span><span class=\"frac-den\">n‒5</span></span><span style=\"font-family: Calibri;\">+ 2</span><span style=\"font-family: Calibri; font-size: 18.7px;\">&nbsp;</span> </p> <p><span style=\"font-family: Cambria Math;\">&rArr;</span><span style=\"font-family: Calibri;\">&nbsp;</span><span class=\"math-frac\"><span class=\"frac-num\">240</span><span class=\"frac-den\">n‒5</span></span><span style=\"font-family: Calibri; font-size: 18.7px;\">&nbsp;</span><span style=\"font-family: Calibri;\">= 4</span><span style=\"font-family: Calibri; font-size: 18.7px;\"> </span></p> <p>&rArr; n = 65</p> <p>Therefore, the required answer is 65.</p>",
  "Since the average of the six students is 42, their total would be 42 × 6 = 252. 4 of them have distinct scores not more than 40. Let us consider the maximum possible case for these 4.&nbsp;<span style=\"font-family: ;\">So</span><span style=\"font-family: ;\"> their maximum total could be (40 + 39 + 38 + 37) = 154 leaving 98 marks for the other two. Since Aman has to be the highest, he has to have more than half of this so he could get anything from 50 to 57 marks (with the 6</span><span style=\"font-family: ;\"><sup>th</sup></span><span style=\"font-family: ;\"> student correspondingly getting between 48 and 41 marks).</span> <br> <br><span style=\"font-family: ;\">In case the other 4 get lower than the maximum possible, however, there will be more than 98 marks left (for example if they get 39, 38, 37 and 36, that would leave 102 marks for the other two, which would allow Aman to get 58, 59 or a full 60 as well. Hence Aman’s highest possible score is 60 while his lowest is 50, a difference of 10 marks.&nbsp;</span> <br> <br><span style=\"font-family: ;\">Hence, [4].</span>"
];

    questions.forEach((q, i) => { q.solution = solutionText[i] || 'Solution not provided.'; });
    let current = 0, submitted = false, secondsLeft = 50 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let html=hasHtml(s)?String(s):esc(s);html=html.replace(/(\d+)\s*<sup>(\d+)<\/sup>\s*\/\s*<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');const wrap=document.createElement("span");wrap.innerHTML=html;const nodes=[];const walker=document.createTreeWalker(wrap,NodeFilter.SHOW_TEXT);while(walker.nextNode())nodes.push(walker.currentNode);const pattern=/(^|[^A-Za-z0-9.])((?:\d+(?:\.\d+)?|[A-Za-z]))\s*\/\s*((?:\d+(?:\.\d+)?|[A-Za-z]))(?=$|[^A-Za-z0-9.])/g;nodes.forEach(node=>{const parent=node.parentElement;if(parent&&parent.closest('.math-frac,script,style'))return;const text=node.nodeValue||'';pattern.lastIndex=0;if(!pattern.test(text))return;pattern.lastIndex=0;const frag=document.createDocumentFragment();let last=0,m;while((m=pattern.exec(text))){frag.append(document.createTextNode(text.slice(last,m.index)+m[1]));const fraction=document.createElement('span');fraction.className='math-frac';const numerator=document.createElement('span');numerator.className='frac-num';numerator.textContent=m[2];const denominator=document.createElement('span');denominator.className='frac-den';denominator.textContent=m[3];fraction.append(numerator,denominator);frag.append(fraction);last=pattern.lastIndex;}frag.append(document.createTextNode(text.slice(last)));node.replaceWith(frag);});return wrap.innerHTML;}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(q.palette || (i+1))+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="text" inputmode="decimal" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your numerical answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(q.display || (current+1))+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;let score=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r){c++;score+=3;}else{w++;if(qType(q)==='mcq')score-=1;}});resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
