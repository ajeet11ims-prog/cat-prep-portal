\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":14,"itemId":36532,"source":"Careerlauncher Arithmetic Intermediate | Q14 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e P\r\n  beats Q by 100 m in a race of 1200 m and Q beats R by 200 m in a race of 1600\r\n  m. Approximately by how many metres can P beat R in a race of 1500 m?\u003cspan\r\n \u003e","options":["\u003c/span\u003e 150 m\u003cspan\r\n \u003e","\u003c/span\u003e 250 m\u003cspan\r\n \u003e","\u003c/span\u003e 300 m\u003cspan\r\n \u003e","\u003c/span\u003e 350 m\u003cspan\r\n \u003e"],"answer":2,"typedAnswer":"300 m","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":15,"itemId":36534,"source":"Careerlauncher Arithmetic Intermediate | Q15 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eHarish purchased a motorcycle for Rs.19725 in the year 1992. Due to some financial problems, he wanted to sell it in the year 1995. He displayed the selling price as Rs.19200. Ram wanted to purchase it and negotiated for a 10% discount on the price. But Harish sold him the motorcycle after giving 2 consecutive discounts of 7% and then 3% on the displayed selling price.\u003c/p\u003e\n\u003cp\u003eThe depreciation for the motorcycle is 10% per annum. What is the net discount that Harish offered Ram?\u003c/p\u003e","options":["\u003c/span\u003e 10%\u003cspan\r\n \u003e","\u003c/span\u003e\r\n  13.79%\u003cspan\u003e","\u003c/span\u003e 9.79%\u003cspan\r\n \u003e","\u003c/span\u003e\r\n  10.21%\u003cspan\u003e"],"answer":2,"typedAnswer":"9.79%","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":16,"itemId":36552,"source":"Careerlauncher Arithmetic Intermediate | Q16 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe value of a specific bike gets depreciated at the rate of 8% p.a. If the bike was sold at Rs.10000, 8 years after it was manufactured, what was the approximate depreciation in the price of the bike in these 8 years? (log92 = 1.9638 and 10\u003cspan\u003e0.29\u003c/span\u003e\u003cspan\u003e \u003c/span\u003e= 1.9498)\u003c/p\u003e","options":["\u003cp\u003eRs.9590\u003c/p\u003e","\u003cp\u003eRs.6930\u003c/p\u003e","\u003cp\u003eRs.9500\u003c/p\u003e","\u003cp\u003eRs.3950\u003c/p\u003e"],"answer":2,"typedAnswer":"Rs.9500","solution":"\u003cp\u003e\u003cspan\u003e \u003c/span\u003e\u003c/p\u003e"},{"no":17,"itemId":36553,"source":"Careerlauncher Arithmetic Intermediate | Q17 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eTen cows can graze in a field for 15 days and twenty cows can graze in the same field for 6 days. For how many days can thirty cows graze in the same field?\u003c/p\u003e","options":["\u003cp\u003e3 days\u003c/p\u003e","\u003cp\u003e3.67 days\u003c/p\u003e","\u003cp\u003e3.75 days\u003c/p\u003e","\u003cp\u003eCannot be determined\u003c/p\u003e"],"answer":2,"typedAnswer":"3.75 days","solution":"\u003cp\u003eLet the one cow can graze \"a\" grass in 1 day.\u003c/p\u003e\n\u003cp\u003eThus, 10 cows graze 10a grass in one day.\u003c/p\u003e\n\u003cp\u003eTotal grass grazed by 10 cows in 15 days = 150a\u003c/p\u003e\n\u003cp\u003eTotal grass grazed by 20 cows in 6 days = 120a\u003c/p\u003e\n\u003cp\u003eThe difference is the growth of grass in (15 - 6 = 9 ) days = 150a - 120a  = 30a\u003c/p\u003e\n\u003cp\u003eSo, the growth of grass in 1 day = 30a/9 = 10a/3\u003c/p\u003e\n\u003cp\u003eThus, the growth of grass in 6 days = 60a/3 = 20a\u003c/p\u003e\n\u003cp\u003eThe amount of grass in the field originnally = 120a - 20a = 100a\u003c/p\u003e\n\u003cp\u003eLet us assume 30 cows graze the field in b days.\u003c/p\u003e\n\u003cp\u003eGiven, 30ab - 10ab/3 = 100a\u003c/p\u003e\n\u003cp\u003eSolving tis, we get b = 3.75 days.\u003c/p\u003e\n\u003cp\u003eHence, [3]\u003c/p\u003e"},{"no":18,"itemId":98711,"source":"Careerlauncher Arithmetic Intermediate | Q18 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eIn a 4000 meter race around a circular stadium having a circumference of 1000 meters, the fastest runner and the slowest runner reach the same point at the end of the 5th minute, for the first time after the start of the race. All the runners have the same starting point and each runner maintains a uniform speed throughout the race. If the fastest runner runs at twice the speed of the slowest runner, what is the time taken by the fastest runner to finish the race?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2003)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e20 min\u003c/p\u003e","\u003cp\u003e15 min\u003c/p\u003e","\u003cp\u003e10 min\u003c/p\u003e","\u003cp\u003e5 min\u003c/p\u003e"],"answer":2,"typedAnswer":"10 min","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":19,"itemId":98712,"source":"Careerlauncher Arithmetic Intermediate | Q19 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eAt the end of year 1998, Shepard bought nine dozen goats. Henceforth, every year he added p% of the goats at the beginning of the year and sold q% of the goats at the end of the year where p \u003e 0 and q \u003e 0. If Shepard had nine dozen goats at the end of year 2002, after making the sales for that year, which of the following is true?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2003)\u003c/strong\u003e age weight of a class of 100 students is 45 kg. The class consists of two sections, I and II, each with 50 students. The average weight, WI , of Section  I is smaller than the average weight, WII, of Section II. If the heaviest student, say Deepak, of Section II is moved to Section I, and the lightest student, say Poonam, of Section I is moved to Section II, then the average weights of the two sections are switched, i.e., the average weight of Section I becomes WII and that of Section II becomes WI. What is the weight of Poonam?\u003cbr /\u003e A : WII – WI = 1.0\u003cbr /\u003e B : Moving Deepak from Section II to I (without any move from I to II) makes the average weights of the two sections equal.\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2007)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e1\u003c/p\u003e","\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e4\u003c/p\u003e"],"answer":2,"typedAnswer":"3","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":22,"itemId":32284,"source":"Careerlauncher Arithmetic Intermediate | Q22 | Medium","type":"text","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eIrfan Pathan opened a restaurant at Treasure Island Mall in Indore by investing Rs.3 crore. After a few months his brother Yusuf Pathan joined him by investing Rs.2 crore. At the end of the year Yusuf got Rs.800000 as his share from a total profit of Rs.2600000. After how many months did Yusuf joined the business?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cdiv\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003e[quizky-text]months\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n \n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003e[quizky-text] km\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e216 km\u003c/p\u003e","\u003cp\u003e648\u003c/p\u003e","\u003cp\u003e548 km\u003c/p\u003e","\u003cp\u003e 162 km\u003c/p\u003e"],"answer":1,"typedAnswer":"648","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":27,"itemId":32296,"source":"Careerlauncher Arithmetic Intermediate | Q27 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Refer to the data below and answer the questions that follow.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003e \u003c/p\u003e\u003cp\u003eEveryday, Anil\u0027s driver takes the car from Anil\u0027s home at certain time, reaches his office exactly at 5 p.m., picks up Anil and drives him home, travelling at a constant speed throughout. One day, Anil left his office at 3 p.m. and started walking on the usual route towards his home. His driver picked him on the way and drove him home. Anil noted that he reached home 40 minutes earlier than his usual time.\u003c/p\u003e","question":"\u003c/span\u003e How\r\n  long did Anil walk?\u003cspan\u003e","options":["\u003c/span\u003e 20\r\n  minutes\u003cspan\u003e","\u003c/span\u003e 40\r\n  minutes\u003cspan\u003e","\u003c/span\u003e 100\r\n  minutes\u003cspan\u003e","\u003c/span\u003e 80\r\n  minutes\u003cspan\u003e"],"answer":2,"typedAnswer":"100 minutes","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":28,"itemId":32297,"source":"Careerlauncher Arithmetic Intermediate | Q28 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Refer to the data below and answer the questions that follow.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003e \u003c/p\u003e\u003cp\u003eEveryday, Anil\u0027s driver takes the car from Anil\u0027s home at certain time, reaches his office exactly at 5 p.m., picks up Anil and drives him home, travelling at a constant speed throughout. One day, Anil left his office at 3 p.m. and started walking on the usual route towards his home. His driver picked him on the way and drove him home. Anil noted that he reached home 40 minutes earlier than his usual time.\u003c/p\u003e","question":"\u003c/span\u003e What\r\n  was the speed with which Anil walked?\u003cspan\u003e","options":["\u003c/span\u003e 2\r\n  km/hr\u003cspan\u003e","\u003c/span\u003e 3\r\n  km/hr\u003cspan\u003e","\u003c/span\u003e 5\r\n  km/hr\u003cspan\u003e","\u003c/span\u003e Data\r\n  insufficient\u003cspan\u003e"],"answer":3,"typedAnswer":"Data insufficient","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":29,"itemId":32300,"source":"Careerlauncher Arithmetic Intermediate | Q29 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Refer to the data below and answer the questions that follow.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003e \u003c/p\u003e\u003cp\u003eAnita purchased five packs of beads of different colours. Each pack has 100 beads. She made two types of necklaces using all the beads.\u003c/p\u003e\u003cp\u003eType 1: Necklace with two coloured beads.\u003c/p\u003e\u003cp\u003eType 2: Necklace with single coloured beads.\u003c/p\u003e\u003cp\u003eShe sold \u0027Type 1\u0027 necklace for Rs.30 and \u0027Type 2\u0027 necklace for Rs.25.\u003c/p\u003e\u003cp\u003eEach pack of beads cost Rs.80. All necklaces that Anita made have equal number of beads.\u003c/p\u003e","question":"\u003c/span\u003e If\r\n  she had made 25 necklaces in all and earned a 60% profit, find the profit she\r\n  made by selling \u0027Type 2\u0027 necklaces.\u003cspan\u003e","options":["\u003c/span\u003e Rs.80\u003cspan\r\n \u003e","\u003c/span\u003e\r\n  Rs.120\u003cspan\u003e","\u003c/span\u003e\r\n  Rs.100\u003cspan\u003e","\u003c/span\u003e None\r\n  of these\u003cspan\u003e"],"answer":3,"typedAnswer":"None of these","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":30,"itemId":32240,"source":"Careerlauncher Arithmetic Intermediate | Q30 | Medium","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003eIn class X, the number of girls is 40% more than that boys. In a test, 75% of the total students passed the examination. Had 4 more boys failed in the test, the percentage of boys who cleared the test would have been 85%. Had 8 more girls failed in the test, the percentage of students who cleared the test would drop to 66.66%. Find the percentage of girl students who cleared the test.\u003c/p\u003e","options":["\u003cp\u003e45%\u003c/p\u003e","\u003cp\u003e61%\u003c/p\u003e","\u003cp\u003e56%\u003c/p\u003e","\u003cp\u003eCannot be determined\u003c/p\u003e"],"answer":1,"typedAnswer":"61%","solution":"\u003cp\u003e\u003c/p\u003e"}];
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
