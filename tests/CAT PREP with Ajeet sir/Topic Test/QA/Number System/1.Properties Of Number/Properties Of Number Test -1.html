":1,"typedAnswer":"8","solution":""},{"no":23,"itemId":60023,"source":"Number System Properties of Numbers Basic Test | Q23 | Basic | Alphametic","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>If AB + XY = 1XP, where A &ne; 0 and all letters signify different digits from 0 to 9, then the value of A is</p>","options":["<p>6</p>","<p>7</p>","<p>9</p>","<p>8</p>"],"answer":2,"typedAnswer":"9","solution":""},{"no":24,"itemId":60024,"source":"Number System Properties of Numbers Basic Test | Q24 | Basic | Recurring decimal","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>xy is a number that is divided by ab where xy &lt; ab and gives a result 0.xyxyxy... then ab equals</p>","options":["<p>11</p>","<p>33</p>","<p>99</p>","<p>66</p>"],"answer":2,"typedAnswer":"99","solution":""},{"no":25,"itemId":60025,"source":"Number System Properties of Numbers Basic Test | Q25 | Basic | Digit reversal","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>If the difference between a two-digit number and the number obtained by reversing its digits is 27, find the difference between the digits.</p>","options":["<p>2</p>","<p>9</p>","<p>3</p>","<p>6</p>"],"answer":2,"typedAnswer":"3","solution":""},{"no":26,"itemId":60026,"source":"Number System Properties of Numbers Basic Test | Q26 | Basic | Fractions","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Arrange the fractions in descending order: A = 5/9, B = 7/11, C = 8/15, D = 11/17.</p>","options":["<p>(A), (B), (C), (D)</p>","<p>(A), (C), (D), (B)</p>","<p>(D), (B), (C), (A)</p>","<p>(D), (B), (A), (C)</p>"],"answer":3,"typedAnswer":"(D), (B), (A), (C)","solution":""},{"no":27,"itemId":60027,"source":"Number System Properties of Numbers Basic Test | Q27 | Basic | Fractions","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>After adding 5 to both numerator and denominator of A = 2/3, B = 3/4, C = 4/5, D = 5/6, arrange them in ascending order of magnitude of change.</p>","options":["<p>D &lt; C &lt; A &lt; B</p>","<p>D &lt; A &lt; B &lt; C</p>","<p>D &lt; C &lt; B &lt; A</p>","<p>A &lt; D &lt; B &lt; C</p>"],"answer":2,"typedAnswer":"D &lt; C &lt; B &lt; A","solution":""},{"no":28,"itemId":60028,"source":"Number System Properties of Numbers Basic Test | Q28 | Basic | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Find the two-digit number whose unit digit exceeds the tens digit by 2 and whose product with the sum of its digits is 144.</p>","options":[],"answer":0,"typedAnswer":"24","solution":""},{"no":29,"itemId":60029,"source":"Number System Properties of Numbers Basic Test | Q29 | Basic | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>The sum of the squares of the digits of a two-digit number is 13. If we subtract 9 from that number, we get the number with the same digits reversed. Find the number.</p>","options":[],"answer":0,"typedAnswer":"32","solution":""},{"no":30,"itemId":60030,"source":"Number System Properties of Numbers Basic Test | Q30 | Basic | Two-digit numbers","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>What two-digit number is less than the sum of the squares of its digits by 11 and exceeds their doubled product by 5?</p>","options":["<p>15, 95</p>","<p>95</p>","<p>Both (a) and (b)</p>","<p>15, 95 and 12345</p>"],"answer":2,"typedAnswer":"Both (a) and (b)","solution":""}];

    const solutionOverrides = {
      "1": "<p>The sum of an even number of odd numbers is even. Since 36 is even, the sum of 36 odd numbers is even.</p>",
      "2": "<p>Composite numbers may be even or odd. If any selected composite number is even, the product is even; if all five are odd composites, the product is odd. Hence it cannot be determined.</p>",
      "3": "<p>The parity depends on how many odd composite numbers are used. For example, six even composites give an even sum, but one odd composite plus five even composites gives an odd sum. Hence it cannot be determined.</p>",
      "4": "<p>Prime numbers include 2 and odd primes. If 2 is included in the product, the product is even; if all five primes are odd, the product is odd. Hence it cannot be determined.</p>",
      "5": "<p>The first 10 primes contain 2 and nine odd primes. The sum of nine odd numbers is odd, and adding 2 keeps it odd. Hence the sum is odd.</p>",
      "6": "<p>Check divisibility up to √307, which is less than 18. The number 307 is not divisible by 2, 3, 5, 7, 11, 13 or 17. Hence 307 is prime. The others are composite: 851 = 23 × 37, 589 = 19 × 31, and 429 = 3 × 143.</p>",
      "7": "<p>A twin-prime pair must contain two primes differing by 2. Here 133 = 7 × 19 and 159 = 3 × 53, so the pairs 131 and 133, and 157 and 159 are not twin-prime pairs. Therefore more than one pair is not twin prime.</p>",
      "8": "<p>For four consecutive natural numbers n, n+1, n+2, n+3, we have n(n+1)(n+2)(n+3)+1 = (n<sup>2</sup>+3n+1)<sup>2</sup>. Therefore the product is one less than a perfect square.</p>",
      "9": "<p>The product of any 7 consecutive natural numbers is always divisible by 7! because it contains one full set of residues needed for 1 × 2 × ... × 7. Thus it is always divisible by 5040.</p>",
      "10": "<p>For a perfect number, the sum of its proper divisors is equal to the number itself. Therefore the sum of all factors, including the number, is 2N. The ratio is 2N:N = 2.</p>",
      "11": "<p>Every prime number greater than 3 is neither even nor divisible by 3. Therefore it must be one less or one more than a multiple of 6, i.e. 6k ± 1. Hence mk must be divisible by 6.</p>",
      "12": "<p>Irrational numbers are real numbers, and addition, subtraction and multiplication of real numbers always give a real number. Hence x + y - xy is definitely a real number.</p>",
      "13": "<p>We need N(N+1)/2 to be a perfect square x<sup>2</sup> with x &lt; 100. The valid triangular-square cases are N = 1, 8 and 49, giving sums 1, 36 and 1225 respectively.</p>",
      "14": "<p>If n<sup>3</sup> is odd, then n must be odd. Hence n<sup>2</sup> and n<sup>4</sup> are also odd, so I and II are false. Also n-1 and n+1 are even, so (n-1)(n+1) is even. Thus III and IV are true.</p>",
      "15": "<p>From y to x, the total gap is x-y. Excluding both endpoints removes one count from the gap, so the number of integers strictly between them is x - y - 1.</p>",
      "16": "<p>Let the two-digit number be 10a+b. Reversing gives 10b+a. The increase is 9(b-a). Given 9(b-a)=18, so b-a=2. The numbers are 13, 24, 35, 46, 57, 68 and 79. Excluding 13, there are 6 other numbers.</p>",
      "17": "<p>For k=6, the only triplet is 1,2,3. For k=7, the only triplet is 1,2,4. For k=8, two different triplets are possible: 1,2,5 and 1,3,4. Hence the smallest such k is 8.</p>",
      "18": "<p>For tens digit 1, there are 8 choices for the unit digit; for tens digit 2, there are 7 choices, and so on up to tens digit 8. Total numbers = 8+7+...+1 = 36. Each contributes 2 digits, so total digits = 72.</p>",
      "19": "<p>Let the original number be 10a+b. Its digit sum is 10, so a+b=10. The reversed number is 54 less, so 9(a-b)=54, giving a-b=6. Solving gives a=8 and b=2. The changed number is 28.</p>",
      "20": "<p>Let the number be N, its reverse be R and digit sum be S. Given NS=405 and RS=486, so N:R = 405:486 = 5:6. The pair 45 and 54 has the same digit sum 9, and 45 × 9 = 405 while 54 × 9 = 486. Hence the number is 45.</p>",
      "21": "<p>None of the statements is always true. The unit digit can be 5, as 2+3=5. It can be 0, as 3+7=10. Also L can be odd when one prime is 2 and the other is an odd prime, such as 2+3=5.</p>",
      "22": "<p>XYZ - YXZ = (100X+10Y+Z) - (100Y+10X+Z) = 90(X-Y). Given this equals 90, so X-Y=1. Since Y cannot be 0 for YXZ to be a three-digit number, X can be 2 to 9. Hence 8 possible values.</p>",
      "23": "<p>In AB + XY = 1XP, the hundreds digit 1 comes from a carry. In the tens column, A + X + carry from units must give X with a carry to hundreds. Thus A + carry = 10. The carry from units is 1, so A = 9.</p>",
      "24": "<p>0.xyxyxy... is the recurring decimal xy/99. Since xy divided by ab gives xy/99, the denominator ab must be 99.</p>",
      "25": "<p>For a two-digit number 10a+b and its reverse 10b+a, the difference is 9|a-b|. Given the difference is 27, we get |a-b| = 3. Hence the digit difference is 3.</p>",
      "26": "<p>Compare the fractions approximately: A = 5/9 ≈ 0.556, B = 7/11 ≈ 0.636, C = 8/15 ≈ 0.533, and D = 11/17 ≈ 0.647. Descending order is D, B, A, C.</p>",
      "27": "<p>For a fraction n/(n+1), after adding 5 to numerator and denominator, the change is 5/[(n+1)(n+6)]. For A, B, C, D this becomes 5/24, 1/9, 1/12 and 5/77 respectively. Ascending order of change is D &lt; C &lt; B &lt; A.</p>",
      "28": "<p>Let the tens digit be a, so the units digit is a+2. The number is 11a+2 and the digit sum is 2a+2. Given (11a+2)(2a+2)=144. Testing digit values gives a=2, so the number is 24.</p>",
      "29": "<p>The digit-square sum is 13, so the digits must be 2 and 3. Subtracting 9 gives the reversed number, so the tens digit is one more than the units digit. Hence the number is 32.</p>",
      "30": "<p>For 15, sum of squares = 1+25 = 26, and 26-15 = 11. Also twice the digit product is 10, and 15-10 = 5. For 95, sum of squares = 81+25 = 106, and 106-95 = 11. Also twice the digit product is 90, and 95-90 = 5. Hence both 15 and 95 work.</p>"
};
    questions.forEach(q=>{ if(solutionOverrides[q.no]) q.solution = solutionOverrides[q.no]; });
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 45 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><p class="muted" style="margin:0 0 10px">Solutions are now visible below each question. Use the Question Bar to review all questions.</p><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
