    const questions = [{"no":1,"itemId":60001,"source":"Number System Properties of Numbers Advance Test | Q1 | Advanced | Strategy","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>A and B play a game of 'Dingo'. Each player chooses a positive integer less than the previous number but at least half of it. The player who chooses 1 loses. A starts with 2021. What should B choose immediately after A chooses 2021 to ensure victory?</p>","options":["<p>1025</p>","<p>011</p>","<p>2049</p>","<p>1535</p>"],"answer":3,"typedAnswer":"1535","solution":""},{"no":2,"itemId":60002,"source":"Number System Properties of Numbers Advance Test | Q2 | Advanced | Prime elimination","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>20 persons in a row are numbered 1 to 20. On each count, persons seated at prime-numbered seats are removed and remaining seats are renumbered from 1. This repeats until only 3 persons remain. What was the original seat number of the person finally at seat number 3?</p>","options":["<p>8</p>","<p>14</p>","<p>16</p>","<p>18</p>"],"answer":2,"typedAnswer":"16","solution":""},{"no":3,"itemId":60003,"source":"Number System Properties of Numbers Advance Test | Q3 | Advanced | Digit reversal","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>When the digits of a three-digit number N are reversed to form M, S = N + M. Which statements are correct? A. At most only two digits of S can be even. B. S cannot be prime. C. Each digit of S is greater than 2.</p>","options":["<p>A & B</p>","<p>B & C</p>","<p>A & C</p>","<p>None of these</p>"],"answer":3,"typedAnswer":"None of these","solution":""},{"no":4,"itemId":60004,"source":"Number System Properties of Numbers Advance Test | Q4 | Advanced | Factorization","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>The product of three positive integers is 6 times their sum. One integer is the sum of the other two. If the product is P, find the sum of all distinct possible values of P.</p>","options":[],"answer":0,"typedAnswer":"336","solution":""},{"no":5,"itemId":60005,"source":"Number System Properties of Numbers Advance Test | Q5 | Advanced | Recurring decimals","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Let D = 0.a1a2a3a1a2a3... be a recurring decimal, with at most one of the digits zero. Which number necessarily produces an integer when multiplied by D?</p>","options":["<p>1800</p>","<p>1080</p>","<p>1998</p>","<p>2898</p>"],"answer":2,"typedAnswer":"1998","solution":""},{"no":6,"itemId":60006,"source":"Number System Properties of Numbers Advance Test | Q6 | Advanced | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>The product of the digits of a two-digit number is twice the sum of its digits. If 27 is subtracted from the number, the digits reverse. Find the number.</p>","options":[],"answer":0,"typedAnswer":"63","solution":""},{"no":7,"itemId":60007,"source":"Number System Properties of Numbers Advance Test | Q7 | Advanced | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>The product of the digits of a two-digit number is one-third that number. If 18 is added to the number, the digits reverse. Find the number.</p>","options":[],"answer":0,"typedAnswer":"24","solution":""},{"no":8,"itemId":60008,"source":"Number System Properties of Numbers Advance Test | Q8 | Advanced | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Find a two-digit number that exceeds by 12 the sum of the squares of its digits and by 16 the doubled product of its digits.</p>","options":[],"answer":0,"typedAnswer":"64","solution":""},{"no":9,"itemId":60009,"source":"Number System Properties of Numbers Advance Test | Q9 | Advanced | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Find a two-digit number that exceeds by 12 the sum of the squares of its digits and by 16 the doubled product of its digits.</p>","options":[],"answer":0,"typedAnswer":"64","solution":""},{"no":10,"itemId":60010,"source":"Number System Properties of Numbers Advance Test | Q10 | Advanced | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>The sum of the squares of the digits of a two-digit number is 10, and the product of the number with its reverse is 403. Find the two numbers.</p>","options":[],"answer":0,"typedAnswer":"13,31","solution":""},{"no":11,"itemId":60011,"source":"Number System Properties of Numbers Advance Test | Q11 | Advanced | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>If a two-digit number divided by the sum of its digits gives quotient 4 and remainder 3, and divided by the product of its digits gives quotient 3 and remainder 5, find the number.</p>","options":[],"answer":0,"typedAnswer":"23","solution":""},{"no":12,"itemId":60012,"source":"Number System Properties of Numbers Advance Test | Q12 | Advanced | Squares","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>A natural number becomes a square when 100 is added to it and another square when 169 is added to it. Find the number.</p>","options":[],"answer":0,"typedAnswer":"69","solution":""},{"no":13,"itemId":60013,"source":"Number System Properties of Numbers Advance Test | Q13 | Advanced | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>The difference between the digits in a two-digit number is 2, and the sum of the squares of the digits is 52. Find all possible numbers.</p>","options":[],"answer":0,"typedAnswer":"46,64","solution":""},{"no":14,"itemId":60014,"source":"Number System Properties of Numbers Advance Test | Q14 | Advanced | Two-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>A two-digit number divided by the product of its digits gives quotient 3 and remainder 9. If the product of its digits is subtracted from the square of the sum of its digits, the result is the number. Find the number.</p>","options":[],"answer":0,"typedAnswer":"63","solution":""},{"no":15,"itemId":60015,"source":"Number System Properties of Numbers Advance Test | Q15 | Advanced | Three-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Find the three-digit number whose digit sum is 17 and digit-square sum is 109. If 495 is subtracted, the digits reverse.</p>","options":[],"answer":0,"typedAnswer":"863","solution":""},{"no":16,"itemId":60016,"source":"Number System Properties of Numbers Advance Test | Q16 | Advanced | Cubes","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>The sum of the cubes of the digits of a two-digit number is 243 and the product of the digit sum with the digit product is 162. Find the two two-digit numbers.</p>","options":[],"answer":0,"typedAnswer":"36,63","solution":""},{"no":17,"itemId":60017,"source":"Number System Properties of Numbers Advance Test | Q17 | Advanced | Factorials","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>M is a two-digit number such that the product of factorials of its digits is greater than the sum of factorials of its digits. How many values of M exist?</p>","options":["<p>56</p>","<p>64</p>","<p>63</p>","<p>None of these</p>"],"answer":2,"typedAnswer":"63","solution":""},{"no":18,"itemId":60018,"source":"Number System Properties of Numbers Advance Test | Q18 | Advanced | Digit series","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Find the 28383rd term of the series 123456789101112....</p>","options":["<p>3</p>","<p>4</p>","<p>9</p>","<p>7</p>"],"answer":0,"typedAnswer":"3","solution":""},{"no":19,"itemId":60019,"source":"Number System Properties of Numbers Advance Test | Q19 | Advanced | Digit optimization","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>K is a three-digit number such that the ratio of the number to the sum of its digits is least. What is the difference between the hundreds and tens digits of K?</p>","options":["<p>9</p>","<p>8</p>","<p>7</p>","<p>None of these</p>"],"answer":1,"typedAnswer":"8","solution":""},{"no":20,"itemId":60020,"source":"Number System Properties of Numbers Advance Test | Q20 | Advanced | Consecutive numbers","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>If n = 1 + m, where m is the product of four consecutive positive integers, which statements are true? A. n is odd. B. n is not a multiple of 3. C. n is a perfect square.</p>","options":["<p>All three</p>","<p>A and B only</p>","<p>A and C only</p>","<p>None of these</p>"],"answer":0,"typedAnswer":"All three","solution":""},{"no":21,"itemId":60021,"source":"Number System Properties of Numbers Advance Test | Q21 | Advanced | Factorials","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>How many two-digit numbers less than or equal to 50 have the product of the factorials of their digits less than or equal to the sum of the factorials of their digits?</p>","options":["<p>18</p>","<p>16</p>","<p>15</p>","<p>None of these</p>"],"answer":0,"typedAnswer":"18","solution":""},{"no":22,"itemId":60022,"source":"Number System Properties of Numbers Advance Test | Q22 | Advanced | Consecutive numbers","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Find the lower of two successive natural numbers if the square of their sum exceeds the sum of their squares by 112.</p>","options":["<p>6</p>","<p>7</p>","<p>8</p>","<p>9</p>"],"answer":1,"typedAnswer":"7","solution":""},{"no":23,"itemId":60023,"source":"Number System Properties of Numbers Advance Test | Q23 | Advanced | Digit reversal","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>The product of a two-digit number and its reverse is 2430. Find the lower number.</p>","options":["<p>54</p>","<p>52</p>","<p>63</p>","<p>45</p>"],"answer":3,"typedAnswer":"45","solution":""},{"no":24,"itemId":60024,"source":"Number System Properties of Numbers Advance Test | Q24 | Advanced | Four-digit numbers","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>In a four-digit number, the thousands digit plus tens digit is 4, the hundreds digit plus units digit is 15, and the units digit exceeds the thousands digit by 7. Among all such numbers, find the number for which (thousands &times; units) + (hundreds &times; tens) is least.</p>","options":["<p>4708</p>","<p>1738</p>","<p>2629</p>","<p>1812</p>"],"answer":1,"typedAnswer":"1738","solution":""},{"no":25,"itemId":60025,"source":"Number System Properties of Numbers Advance Test | Q25 | Advanced | Four-digit numbers","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>In a four-digit number, thousands + hundreds + tens = 14 and units + tens + hundreds = 15. Among all such numbers, find the number whose sum of squares of digits is greatest.</p>","options":["<p>2572</p>","<p>1863</p>","<p>2573</p>","<p>None of these</p>"],"answer":3,"typedAnswer":"None of these","solution":""},{"no":26,"itemId":60026,"source":"Number System Properties of Numbers Advance Test | Q26 | Advanced | Two-digit constraints","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Find all two-digit numbers such that digit sum is not less than 7, digit-square sum is not greater than 30, and the reversed number is not larger than half the given number.</p>","options":["<p>52</p>","<p>51</p>","<p>49</p>","<p>53</p>"],"answer":0,"typedAnswer":"52","solution":""},{"no":27,"itemId":60027,"source":"Number System Properties of Numbers Advance Test | Q27 | Advanced | Digit sum","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>N = 202 &times; 20002 &times; 200000002 &times; 20000000000000002 &times; 20000000...2 (31 zeroes). The sum of digits in this multiplication will be:</p>","options":["<p>112</p>","<p>160</p>","<p>144</p>","<p>Cannot be determined</p>"],"answer":1,"typedAnswer":"160","solution":""},{"no":28,"itemId":60028,"source":"Number System Properties of Numbers Advance Test | Q28 | Advanced | Four-digit numbers","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>In a four-digit number, the product of the thousands and units digits is zero and their difference is 7. The product of the middle digits is 18. The thousands digit exceeds the units digit by as much as the hundreds digit exceeds the tens digit. Find the number.</p>","options":[],"answer":0,"typedAnswer":"7920","solution":""},{"no":29,"itemId":60029,"source":"Number System Properties of Numbers Advance Test | Q29 | Advanced | Prime equation","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>If a, b and c are three prime numbers such that abc = 23(a + b + c), then the maximum possible value of a + b - c is</p>","options":["<p>28</p>","<p>46</p>","<p>33</p>","<p>25</p>"],"answer":2,"typedAnswer":"33","solution":""},{"no":30,"itemId":60030,"source":"Number System Properties of Numbers Advance Test | Q30 | Advanced | Last digit","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>P denotes the sum of two three-digit numbers and P = 606. How many digits from 0 to 9 cannot appear as the last digit of the product of these two numbers?</p>","options":["<p>4</p>","<p>3</p>","<p>5</p>","<p>2</p>"],"answer":0,"typedAnswer":"4","solution":""}];
    const solutionOverrides = {
      1:"<p>Losing positions in this game are 2, 5, 11, 23, ... i.e. each next losing position is 2 times the previous one plus 1. Thus the sequence is 3 x 2<sup>k</sup> - 1. The losing position between 1011 and 2020 is 1535. So B should choose 1535.</p>",
      2:"<p>After the first removal, original seats left are 1, 4, 6, 8, 9, 10, 12, 14, 15, 16, 18, 20. After the second removal, seats left are 1, 8, 10, 14, 15, 16, 20. After the third removal, seats left are 1, 14, 16. Therefore the person finally at seat 3 had original seat number 16.</p>",
      3:"<p>Counterexamples disprove the statements. For A, N = 202 gives S = 404, which has three even digits. For B, N = 100 gives S = 101, which is prime. For C, S = 404 has digits not greater than 2. Hence none of A, B and C is necessarily true.</p>",
      4:"<p>Let the three numbers be a, b and a + b. Then ab(a + b) = 6(a + b + a + b) = 12(a + b). Since a + b is positive, ab = 12. Possible pairs are (1,12), (2,6), (3,4). Products are 156, 96 and 84. Sum = 156 + 96 + 84 = 336.</p>",
      5:"<p>D = 0.<span style='text-decoration:overline'>a1a2a3</span> = N/999 for some integer N. Any multiple of 999 will always produce an integer when multiplied by D. Among the options, 1998 = 2 x 999. Hence 1998 is necessary.</p>",
      6:"<p>Let the number be 10a + b. Given ab = 2(a + b). Also 10a + b - 27 = 10b + a, so a - b = 3. Put b = a - 3 in ab = 2a + 2b. This gives a = 6 and b = 3. The number is 63.</p>",
      7:"<p>Let the number be 10a + b. Given ab = (10a + b)/3. Also 10a + b + 18 = 10b + a, so b - a = 2. Put b = a + 2. Then 3a(a + 2) = 10a + a + 2, giving a = 2 and b = 4. The number is 24.</p>",
      8:"<p>Let the number be 10a + b. It satisfies 10a + b = a<sup>2</sup> + b<sup>2</sup> + 12 and 10a + b = 2ab + 16. Checking digit pairs gives a = 6 and b = 4. Thus the number is 64.</p>",
      9:"<p>This is the same condition as the previous question. For 64, sum of squares of digits = 36 + 16 = 52, and 52 + 12 = 64. Also twice the product of digits = 2 x 6 x 4 = 48, and 48 + 16 = 64. Hence the number is 64.</p>",
      10:"<p>If the digits are a and b, then a<sup>2</sup> + b<sup>2</sup> = 10. The only digit pair is 1 and 3. The two numbers are 13 and 31, and 13 x 31 = 403. Hence the required numbers are 13 and 31.</p>",
      11:"<p>Let the number be 10a + b. From division by digit sum: 10a + b = 4(a + b) + 3, so 2a - b = 1. From division by digit product: 10a + b = 3ab + 5. Solving gives a = 2, b = 3. The number is 23.</p>",
      12:"<p>Let the number be n. Then n + 100 = a<sup>2</sup> and n + 169 = b<sup>2</sup>. So b<sup>2</sup> - a<sup>2</sup> = 69, i.e. (b - a)(b + a) = 69. Taking 1 and 69 gives b = 35, a = 34. Hence n = 34<sup>2</sup> - 100 = 1056.</p>",
      13:"<p>Let the digits be a and b. Given |a - b| = 2 and a<sup>2</sup> + b<sup>2</sup> = 52. The digit pair is 4 and 6. Therefore the possible numbers are 46 and 64.</p>",
      14:"<p>Let the number be 10a + b. Given 10a + b = 3ab + 9. Also (a + b)<sup>2</sup> - ab = 10a + b. Checking feasible digit pairs gives a = 6, b = 3. Hence the number is 63.</p>",
      15:"<p>Let the number be 100a + 10b + c. Digit sum gives a + b + c = 17. Subtracting 495 reverses the digits, so 100a + 10b + c - 495 = 100c + 10b + a, giving a - c = 5. The digit-square sum is 109. Solving gives a = 8, b = 6, c = 3. The number is 863.</p>",
      16:"<p>Let the digits be a and b. a<sup>3</sup> + b<sup>3</sup> = 243 and (a + b)ab = 162. The digit pair 3 and 6 works because 27 + 216 = 243 and 9 x 18 = 162. Hence the two numbers are 36 and 63.</p>",
      17:"<p>For digits a and b, we need a!b! &gt; a! + b!. This fails only when one of the factorials is 1 or when both factorials are too small. Counting all two-digit numbers and excluding the failing cases gives 63 valid values.</p>",
      18:"<p>Digits used from 1 to 9 = 9. Digits used from 10 to 99 = 90 x 2 = 180. Digits used from 100 to 999 = 900 x 3 = 2700. Total before four-digit numbers = 2889. Position needed in four-digit block = 28383 - 2889 = 25494. This lies in the number 7373, and the required digit is 3.</p>",
      19:"<p>To minimize K divided by digit sum, we want a small three-digit number with a large digit sum. The best number is 199, giving ratio 199/(1 + 9 + 9). Difference between hundreds and tens digits = 9 - 1 = 8.</p>",
      20:"<p>Let the four consecutive positive integers be k, k + 1, k + 2, k + 3. Their product plus 1 is k(k+1)(k+2)(k+3)+1 = (k<sup>2</sup> + 3k + 1)<sup>2</sup>, a perfect square. The product is even, so n is odd. The product is divisible by 3, so n is not a multiple of 3. Hence all three statements are true.</p>",
      21:"<p>For a two-digit number ab, the condition is a!b! <= a! + b!. Counting the numbers from 10 to 50 that satisfy this digit-factorial condition gives 18 numbers.</p>",
      22:"<p>Let the numbers be n and n + 1. Then (2n + 1)<sup>2</sup> - [n<sup>2</sup> + (n + 1)<sup>2</sup>] = 112. This simplifies to 2n(n + 1) = 112, so n(n + 1) = 56. Hence n = 7.</p>",
      23:"<p>Check digit-reversal pairs. 45 x 54 = 2430. Therefore the two numbers are 45 and 54, and the lower number is 45.</p>",
      24:"<p>Let the digits be a, b, c, d. Given a + c = 4, b + d = 15 and d = a + 7. Thus b = 8 - a and c = 4 - a. Testing valid a values gives 1738 and 2629. The expression (thousands x units) + (hundreds x tens) is least for 1738.</p>",
      25:"<p>Let the digits be a, b, c, d. Given a + b + c = 14 and d + c + b = 15, so d = a + 1. Maximizing the sum of squares of digits under these constraints does not give any of the listed numerical options. Hence the correct option is None of these.</p>",
      26:"<p>Let the number be 10a + b. The reversed number condition gives 10b + a <= (10a + b)/2, so 19b <= 8a. Among the options, 52 satisfies digit sum 7, square sum 25 + 4 = 29 and reverse 25 <= 26. Hence 52.</p>",
      27:"<p>Each factor is of the form 2 x 10<sup>k</sup> + 2 = 2(10<sup>k</sup> + 1). Multiplying the given pattern and collecting digit sums gives final digit sum 160. Hence the answer is 160.</p>",
      28:"<p>Let the digits be a, b, c, d. Since the product of thousands and units digits is zero and their difference is 7, a = 7 and d = 0. Also b x c = 18 and a - d = b - c = 7. Thus b = 9 and c = 2. The number is 7920.</p>",
      29:"<p>Since abc = 23(a + b + c), one prime must be 23. Put one prime as 23. Then xy = x + y + 23, so (x - 1)(y - 1) = 24. Valid prime pairs are (3,13) and (5,7). To maximize a + b - c, use 23 + 13 - 3 = 33.</p>",
      30:"<p>The last digits x and y of the two numbers must satisfy x + y = 6 or 16. Possible last digits of xy are {0,5,8,9} from sum 6 and {3,4} from sum 16. Thus possible last digits are 0,3,4,5,8,9. The digits that cannot appear are 1,2,6,7, i.e. 4 digits.</p>"
    };
    questions.forEach(q=>{if(solutionOverrides[q.no]) q.solution=solutionOverrides[q.no];});
    const q12 = questions.find(q=>q.no===12); if(q12) q12.typedAnswer = "1056";
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 75 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
