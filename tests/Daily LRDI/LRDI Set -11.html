<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balance Weights 10 Minute Test</title>
  <style>
    :root{--bg:#f4f7fa;--paper:#fff;--ink:#17202a;--muted:#5d6d7e;--line:#d7dde5;--brand:#4f79c7;--brand-dark:#2f5ca8;--brand-soft:#eef4ff;--ok:#157347;--bad:#b02a37}
    *{box-sizing:border-box}html,body{height:100%;width:100%}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:#fff;line-height:1.45;overflow:hidden}
    header{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(20,40,60,.08)}
    .topbar{width:100%;margin:0;padding:10px 14px;display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center}
    h1{margin:0;font-size:21px;color:var(--brand);letter-spacing:0}.meta{color:var(--muted);font-size:13px;margin-top:2px}
    .pill,.calc-open{border:1px solid var(--line);border-radius:6px;background:var(--brand-soft);color:var(--brand-dark);padding:8px 11px;font-weight:700;white-space:nowrap}.calc-open{border-color:var(--brand);background:var(--brand);color:#fff;cursor:pointer}
    main{width:100vw;height:calc(100vh - 61px);margin:0;padding:8px 10px;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:10px;overflow:hidden;background:var(--bg)}
    aside,.question,#result{background:var(--paper);border:1px solid var(--line);border-radius:8px}
    aside{grid-column:2;grid-row:1;align-self:stretch;padding:14px;min-height:0;overflow-y:auto}
    main>section{grid-column:1;grid-row:1;min-width:0;overflow:hidden;display:grid;grid-template-rows:minmax(0,1fr) auto auto}.panel-title{margin:0 0 12px;color:var(--brand);font-size:17px}
    .palette{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.dot{min-height:52px;border:1px solid var(--line);border-radius:6px;background:#fbfcfd;color:var(--ink);font-weight:700;cursor:pointer;font-size:16px}.dot.active{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark)}.dot.answered{background:#eef8f2;border-color:rgba(21,115,71,.4);color:var(--ok)}
    #testForm{height:100%;min-height:0;display:grid;grid-template-rows:minmax(0,1fr) auto auto;overflow:hidden}
    #result,.question{padding:12px;margin-bottom:0}#result{display:none}#result h2{margin:0 0 10px;color:var(--brand);font-size:18px}
    .score-grid{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:9px;margin-top:12px}.score-box{border:1px solid var(--line);border-radius:6px;padding:9px;background:#fbfcfd}.score-box strong{display:block;font-size:22px;margin-top:2px}
    .question{display:none}.question.active{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(360px,.75fr);gap:10px;align-items:stretch;height:100%;min-height:0}.question h2{margin:0 0 14px;font-size:18px}.qcode{color:#6c757d;font-weight:700;white-space:nowrap}
    .set-info{border:1px solid var(--line);border-radius:8px;padding:8px;background:#fbfcfd;min-height:0;height:100%;display:grid;grid-template-rows:minmax(0,1fr);gap:8px;overflow:hidden}
    .chart-card,.info-card{border:1px solid var(--line);border-radius:7px;background:#fff;padding:8px;min-height:0;overflow:auto}.chart-card{display:block}.chart-svg{width:100%;height:auto;min-height:100%;display:block;background:#fff}
    .info-card{font-size:15px}.info-card p{margin:0 0 8px}.info-card strong{font-weight:800}.question-body{border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px;min-height:0;height:100%;overflow:auto}
    .options{display:grid;grid-template-columns:1fr;gap:10px}label.option{display:flex;gap:9px;align-items:flex-start;border:1px solid var(--line);border-radius:6px;padding:10px;cursor:pointer;background:#fbfcfd;min-height:44px}label.option:hover{border-color:#9ab7ca}input[type=radio]{width:17px;height:17px;margin-top:4px;flex:0 0 auto;accent-color:var(--brand)}
    .question-nav,.actions{display:flex;justify-content:space-between;gap:10px;margin:8px 0 0;flex-wrap:wrap}button{border:0;border-radius:6px;background:var(--brand);color:white;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer}button.secondary{background:#e8edf4;color:var(--ink)}button:disabled{opacity:.55;cursor:default}
    .answer-note{margin-top:10px;font-weight:700}.answer-note.ok{color:var(--ok)}.answer-note.bad{color:var(--bad)}.answer-note.muted{color:var(--muted)}.correct{border-color:rgba(21,115,71,.45);background:#eef8f2}.wrong{border-color:rgba(176,42,55,.45);background:#fff1f2}.missed{border-color:rgba(93,109,126,.45);background:#f6f7f9}
    .calculator-dialog{width:min(360px,calc(100vw - 28px));max-width:360px;margin:0;inset:90px auto auto 50%;transform:translateX(-50%);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:0 12px 34px rgba(15,23,42,.2)}.calculator-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;cursor:move;user-select:none}.calculator-head h2{margin:0;color:var(--brand-dark);font-size:18px}.calc-close{border:1px solid var(--line);border-radius:6px;background:#eef2f6;color:var(--ink);width:34px;height:34px;padding:0;font-size:20px;line-height:1;cursor:pointer}.calc-display{width:100%;border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px;background:#fbfcfd;color:var(--ink);font-size:22px;font-weight:700;text-align:right}.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.calc-key{min-height:44px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:var(--ink);font-size:17px;font-weight:700;cursor:pointer}.calc-key.operator{background:var(--brand-soft);color:var(--brand-dark)}.calc-key.equal{background:var(--brand);color:#fff;grid-column:span 2}.calc-key.clear{color:var(--bad)}
    .svg-line{stroke:#111;stroke-width:2.2;fill:none}.svg-text{font-size:18px;fill:#111}.svg-small{font-size:15px;fill:#111}.box{fill:#fff;stroke:#111;stroke-width:2}.source-page{padding:0}.source-title{font-size:22px;fill:#111}.source-body{font-size:23px;font-weight:800;fill:#111}.source-body-small{font-size:21px;font-weight:800;fill:#111}.source-line{stroke:#111;stroke-width:2;fill:none}.source-box{fill:#fff;stroke:#111;stroke-width:2}
  </style>
</head>
<body>
  <header><div class="topbar"><div><h1>Balance Weights</h1><div class="meta">3 Questions | 10 Minutes</div></div><div class="pill">Time Left: <span id="time">10:00</span></div><div class="pill">Answered: <span id="answeredCount">0</span>/3</div><button class="calc-open" type="button" id="openCalculator">Calculator</button></div></header>
  <main><section><section id="result"></section><form id="testForm"></form></section><aside><h2 class="panel-title">Question Palette</h2><div class="palette" id="palette"></div></aside></main>

  <template id="commonInfo">
    <div class="set-info">
      <div class="chart-card source-page">
        <svg class="chart-svg" viewBox="0 0 1200 1080" role="img" aria-label="Directions and balanced weights system">
          <rect x="1" y="1" width="1198" height="1078" fill="#fff" stroke="#111" stroke-width="2"/>
          <text class="source-title" x="44" y="30"><tspan font-weight="800" font-style="italic">DIRECTIONS:</tspan> <tspan font-style="italic">Read the information given below and answer the questions that follow.</tspan></text>

          <g transform="translate(245,48)">
            <line class="source-line" x1="340" y1="0" x2="340" y2="24"/>
            <line class="source-line" x1="245" y1="24" x2="565" y2="24"/>
            <line class="source-line" x1="245" y1="24" x2="245" y2="70"/>
            <line class="source-line" x1="405" y1="24" x2="405" y2="92"/>
            <line class="source-line" x1="565" y1="24" x2="565" y2="138"/>
            <line class="source-line" x1="295" y1="24" x2="295" y2="42"/>
            <line class="source-line" x1="392" y1="24" x2="392" y2="42"/>
            <line class="source-line" x1="498" y1="24" x2="498" y2="42"/>

            <line class="source-line" x1="150" y1="70" x2="340" y2="70"/>
            <line class="source-line" x1="150" y1="70" x2="150" y2="115"/>
            <line class="source-line" x1="200" y1="70" x2="200" y2="115"/>
            <line class="source-line" x1="300" y1="70" x2="300" y2="115"/>
            <line class="source-line" x1="250" y1="70" x2="250" y2="88"/>
            <line class="source-line" x1="320" y1="70" x2="320" y2="88"/>
            <rect class="source-box" x="130" y="115" width="42" height="42"/><text class="svg-text" x="151" y="143" text-anchor="middle">3</text>
            <rect class="source-box" x="180" y="115" width="42" height="42"/><text class="svg-text" x="201" y="143" text-anchor="middle">C</text>
            <rect class="source-box" x="280" y="115" width="42" height="42"/><text class="svg-text" x="301" y="143" text-anchor="middle">D</text>

            <rect class="source-box" x="385" y="92" width="42" height="42"/><text class="svg-text" x="406" y="120" text-anchor="middle">8</text>

            <line class="source-line" x1="565" y1="138" x2="690" y2="138"/>
            <line class="source-line" x1="565" y1="138" x2="565" y2="186"/>
            <line class="source-line" x1="630" y1="138" x2="630" y2="186"/>
            <line class="source-line" x1="690" y1="138" x2="690" y2="186"/>
            <line class="source-line" x1="610" y1="138" x2="610" y2="156"/>
            <rect class="source-box" x="545" y="186" width="42" height="42"/><text class="svg-text" x="566" y="214" text-anchor="middle">E</text>
            <rect class="source-box" x="610" y="186" width="42" height="42"/><text class="svg-text" x="631" y="214" text-anchor="middle">F</text>
            <rect class="source-box" x="670" y="186" width="42" height="42"/><text class="svg-text" x="691" y="214" text-anchor="middle">1</text>

            <line class="source-line" x1="340" y1="24" x2="340" y2="290"/>
            <line class="source-line" x1="205" y1="290" x2="455" y2="290"/>
            <line class="source-line" x1="205" y1="290" x2="205" y2="340"/>
            <line class="source-line" x1="255" y1="290" x2="255" y2="340"/>
            <line class="source-line" x1="455" y1="290" x2="455" y2="340"/>
            <line class="source-line" x1="315" y1="290" x2="315" y2="308"/>
            <line class="source-line" x1="405" y1="290" x2="405" y2="308"/>
            <rect class="source-box" x="185" y="340" width="42" height="42"/><text class="svg-text" x="206" y="368" text-anchor="middle">A</text>
            <rect class="source-box" x="235" y="340" width="42" height="42"/><text class="svg-text" x="256" y="368" text-anchor="middle">B</text>
            <rect class="source-box" x="435" y="340" width="42" height="42"/><text class="svg-text" x="456" y="368" text-anchor="middle">9</text>
          </g>

          <g transform="translate(900,420)">
            <line class="source-line" x1="100" y1="0" x2="100" y2="25"/>
            <line class="source-line" x1="0" y1="25" x2="200" y2="25"/>
            <line class="source-line" x1="0" y1="25" x2="0" y2="70"/>
            <line class="source-line" x1="50" y1="25" x2="50" y2="70"/>
            <line class="source-line" x1="200" y1="25" x2="200" y2="70"/>
            <line class="source-line" x1="155" y1="25" x2="155" y2="43"/>
            <rect class="source-box" x="-20" y="70" width="42" height="42"/><text class="svg-text" x="1" y="98" text-anchor="middle">A</text>
            <rect class="source-box" x="30" y="70" width="42" height="42"/><text class="svg-text" x="51" y="98" text-anchor="middle">B</text>
            <rect class="source-box" x="180" y="70" width="42" height="42"/><text class="svg-text" x="201" y="98" text-anchor="middle">C</text>
          </g>
          <text class="source-body-small" x="790" y="590">(Both the figures are drawn to scale)</text>

          <text class="source-body" x="54" y="670">
            <tspan x="54" dy="0">I have 10 weights of integral values ranging from 1 to 10 kg. Some of the weights</tspan>
            <tspan x="54" dy="28">have been placed at the positions, while at some places the values have been</tspan>
            <tspan x="54" dy="28">replaced by some alphabets. They are placed in the balance shown above, such</tspan>
            <tspan x="54" dy="28">that, the whole system is balanced. For this system, the basic rule states that a</tspan>
            <tspan x="54" dy="28">weight A at a point p units from the point of suspension effectively acts as a</tspan>
            <tspan x="54" dy="28">weight of pA kg. For example consider the adjacent figure.</tspan>
          </text>

          <text class="source-body" x="54" y="855">
            <tspan x="54" dy="0">The equation of balance will be written as 2A + B = 2C. Because both weights A and C are at</tspan>
            <tspan x="54" dy="28">a distance of 2 units from the points of suspension. Apart from this, in case a balanced</tspan>
            <tspan x="54" dy="28">system (or a part of it) is against another system to balance the same, the total weights</tspan>
            <tspan x="54" dy="28">present on the balanced system will be considered at its total weight. i.e. in the above</tspan>
            <tspan x="54" dy="28">given example we can balance the system with the following values : A = 3, B = 4 and</tspan>
            <tspan x="54" dy="28">C = 5. Thus the above given equation will be satisfied 2 x 3 + 4 = 2 x 5. But if this system</tspan>
            <tspan x="54" dy="28">is used as a part of another system, then its total weight from the point of suspension will</tspan>
            <tspan x="54" dy="28">always be considered as 3 + 4 + 5 = 12 (and not 20 as observed from the equation).</tspan>
          </text>
        </svg>
      </div>
    </div>
  </template>

  <dialog class="calculator-dialog" id="calculatorDialog"><div class="calculator-head"><h2>Calculator</h2><button class="calc-close" type="button" id="closeCalculator" aria-label="Close calculator">x</button></div><input class="calc-display" id="calcDisplay" type="text" value="0" inputmode="decimal" aria-label="Calculator display"><div class="calc-grid" id="calcKeys"><button class="calc-key clear" type="button" data-action="clear">C</button><button class="calc-key" type="button" data-action="backspace">DEL</button><button class="calc-key operator" type="button" data-value="%">%</button><button class="calc-key operator" type="button" data-value="/">/</button><button class="calc-key" type="button" data-value="7">7</button><button class="calc-key" type="button" data-value="8">8</button><button class="calc-key" type="button" data-value="9">9</button><button class="calc-key operator" type="button" data-value="*">x</button><button class="calc-key" type="button" data-value="4">4</button><button class="calc-key" type="button" data-value="5">5</button><button class="calc-key" type="button" data-value="6">6</button><button class="calc-key operator" type="button" data-value="-">-</button><button class="calc-key" type="button" data-value="1">1</button><button class="calc-key" type="button" data-value="2">2</button><button class="calc-key" type="button" data-value="3">3</button><button class="calc-key operator" type="button" data-value="+">+</button><button class="calc-key" type="button" data-value="0">0</button><button class="calc-key" type="button" data-value=".">.</button><button class="calc-key equal" type="button" data-action="equals">=</button></div></dialog>

  <script>
    const optionLabels=["1","2","3","4"];
    const questions=[
      {q:"What is the value of A? <em class=\"qcode\">(Q. code - 100306001)</em>",options:["4 kg","5 kg","2 kg","The system cannot be balanced"],answer:"3"},
      {q:"What is the value of F? <em class=\"qcode\">(Q. code - 100306002)</em>",options:["5 kg","10 kg","7 kg","The system cannot be balanced"],answer:"1"},
      {q:"If the weights B and E are swapped, which side will the balance tip? <em class=\"qcode\">(Q. code - 100306003)</em>",options:["Right side","Left side","It will remain balanced","Cannot say"],answer:"2"}
    ];
    const form=document.getElementById("testForm"),resultBox=document.getElementById("result"),palette=document.getElementById("palette"),answeredCount=document.getElementById("answeredCount"),time=document.getElementById("time"),calculatorDialog=document.getElementById("calculatorDialog"),calcDisplay=document.getElementById("calcDisplay");
    let submitted=false,secondsLeft=10*60,currentQuestionIndex=0;
    function correctAnswerText(item){const i=optionLabels.indexOf(item.answer);return `(${item.answer}) ${item.options[i]}`}
    function renderQuestions(){const info=document.getElementById("commonInfo").innerHTML;form.innerHTML=questions.map((item,index)=>{const control=`<div class="options">${item.options.map((option,i)=>`<label class="option"><input type="radio" name="q${index}" value="${optionLabels[i]}"><span>(${optionLabels[i]}) ${option}</span></label>`).join("")}</div>`;return `<div class="question" id="qcard-${index}">${info}<div class="question-body"><h2>Q${index+1}. ${item.q}</h2>${control}<div class="answer-note" id="note-${index}"></div></div></div>`}).join("")+`<div class="question-nav"><button class="secondary" type="button" id="prevQuestion">Previous</button><button class="secondary" type="button" id="nextQuestion">Save & Next</button></div><div class="actions"><button type="submit" id="submitBtn">Submit Test</button><button class="secondary" type="button" id="clearAnswers">Clear Responses</button></div>`;palette.innerHTML=questions.map((_,i)=>`<button class="dot" type="button" data-target="${i}">${i+1}</button>`).join("");palette.querySelectorAll(".dot").forEach(b=>b.addEventListener("click",()=>showQuestion(Number(b.dataset.target))));form.querySelectorAll("input").forEach(input=>input.addEventListener("change",updateAnsweredState));document.getElementById("prevQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex-1));document.getElementById("nextQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex+1));document.getElementById("clearAnswers").addEventListener("click",()=>{if(submitted)return;form.reset();updateAnsweredState();showQuestion(currentQuestionIndex)});showQuestion(0)}
    function showQuestion(index){if(index<0||index>=questions.length)return;currentQuestionIndex=index;document.querySelectorAll(".question").forEach((card,i)=>card.classList.toggle("active",i===index));palette.querySelectorAll(".dot").forEach((dot,i)=>dot.classList.toggle("active",i===index));const prev=document.getElementById("prevQuestion"),next=document.getElementById("nextQuestion");if(prev)prev.disabled=index===0||submitted;if(next)next.disabled=index===questions.length-1||submitted}
    function getAnswer(index){const selected=document.querySelector(`input[name="q${index}"]:checked`);return selected?selected.value:""}
    function updateAnsweredState(){let answered=0;questions.forEach((_,i)=>{const has=Boolean(getAnswer(i));if(has)answered++;const dot=palette.querySelector(`[data-target="${i}"]`);if(dot)dot.classList.toggle("answered",has)});answeredCount.textContent=answered}
    function updateTimer(){const m=String(Math.floor(secondsLeft/60)).padStart(2,"0"),s=String(secondsLeft%60).padStart(2,"0");time.textContent=`${m}:${s}`;if(secondsLeft<=0){submitTest();return}secondsLeft--}
    function submitTest(event){if(event)event.preventDefault();if(submitted)return;submitted=true;let correct=0,wrong=0,unattempted=0;questions.forEach((item,index)=>{const answer=getAnswer(index),card=document.getElementById(`qcard-${index}`),note=document.getElementById(`note-${index}`),correctText=`Correct answer: ${correctAnswerText(item)}`;document.querySelectorAll(`[name="q${index}"]`).forEach(input=>input.disabled=true);if(!answer){unattempted++;card.classList.add("missed");note.className="answer-note muted";note.textContent=`Unattempted. ${correctText}`}else if(answer===item.answer){correct++;card.classList.add("correct");note.className="answer-note ok";note.textContent=`Correct. ${correctText}`}else{wrong++;card.classList.add("wrong");note.className="answer-note bad";note.textContent=`Incorrect. ${correctText}`}});resultBox.style.display="block";resultBox.innerHTML=`<h2>Test Summary</h2><div class="score-grid"><div class="score-box">Score<strong>${correct} / ${questions.length}</strong></div><div class="score-box">Correct<strong>${correct}</strong></div><div class="score-box">Wrong<strong>${wrong}</strong></div><div class="score-box">Unattempted<strong>${unattempted}</strong></div></div>`;document.querySelectorAll(".question").forEach(card=>card.classList.add("active"));document.getElementById("prevQuestion").disabled=true;document.getElementById("nextQuestion").disabled=true;document.getElementById("submitBtn").disabled=true;document.getElementById("clearAnswers").disabled=true}
    function appendCalcValue(v){if(calcDisplay.value==="0"||calcDisplay.value==="Error"){calcDisplay.value=v==="."?"0.":v;return}calcDisplay.value+=v}function calculateExpression(){const expression=calcDisplay.value.trim();if(!/^[0-9+\-*/%. ()]+$/.test(expression)){calcDisplay.value="Error";return}try{const value=Function(`"use strict"; return (${expression})`)();calcDisplay.value=Number.isFinite(value)?String(Number(value.toFixed(10))):"Error"}catch{calcDisplay.value="Error"}}
    document.getElementById("openCalculator").addEventListener("click",()=>{calculatorDialog.showModal();if(!calculatorDialog.dataset.moved){calculatorDialog.style.left=`${Math.max(14,(window.innerWidth-calculatorDialog.offsetWidth)/2)}px`;calculatorDialog.style.top="90px";calculatorDialog.style.transform="none"}calcDisplay.focus()});document.getElementById("closeCalculator").addEventListener("click",()=>calculatorDialog.close());document.getElementById("calcKeys").addEventListener("click",event=>{const key=event.target.closest("button");if(!key)return;if(key.dataset.action==="clear")calcDisplay.value="0";else if(key.dataset.action==="backspace")calcDisplay.value=calcDisplay.value.length>1?calcDisplay.value.slice(0,-1):"0";else if(key.dataset.action==="equals")calculateExpression();else if(key.dataset.value)appendCalcValue(key.dataset.value);calcDisplay.focus()});calcDisplay.addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();calculateExpression()}});
    const calculatorHead=calculatorDialog.querySelector(".calculator-head");let calculatorDrag=null;calculatorHead.addEventListener("pointerdown",event=>{if(event.target.closest("button"))return;const rect=calculatorDialog.getBoundingClientRect();calculatorDrag={offsetX:event.clientX-rect.left,offsetY:event.clientY-rect.top};calculatorDialog.style.transform="none";calculatorHead.setPointerCapture(event.pointerId)});calculatorHead.addEventListener("pointermove",event=>{if(!calculatorDrag)return;const maxLeft=window.innerWidth-calculatorDialog.offsetWidth-8,maxTop=window.innerHeight-calculatorDialog.offsetHeight-8;calculatorDialog.style.left=`${Math.min(Math.max(8,event.clientX-calculatorDrag.offsetX),Math.max(8,maxLeft))}px`;calculatorDialog.style.top=`${Math.min(Math.max(8,event.clientY-calculatorDrag.offsetY),Math.max(8,maxTop))}px`;calculatorDialog.dataset.moved="true"});calculatorHead.addEventListener("pointerup",event=>{calculatorDrag=null;calculatorHead.releasePointerCapture(event.pointerId)});calculatorHead.addEventListener("pointercancel",()=>{calculatorDrag=null});
    renderQuestions();updateAnsweredState();updateTimer();const timerId=setInterval(()=>{if(submitted){clearInterval(timerId);return}updateTimer()},1000);form.addEventListener("submit",submitTest);
  </script>
</body>
</html>
