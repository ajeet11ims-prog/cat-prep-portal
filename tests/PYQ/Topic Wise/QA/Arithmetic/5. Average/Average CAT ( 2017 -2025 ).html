    "question": "<p><strong>Q1.</strong> A class consists of 20 boys and 30 girls. In the mid-semester examination, the average score of the girls was 5 higher than that of the boys. In the final exam, however, the average score of the girls dropped by 3 while the average score of the entire class increased by 2. The increase in the average score of the boys is</p>",

    "solution": "<p><strong>Detailed solution:</strong></p><ol class='solution-steps'><li>Let the boys' mid-semester average be <span class=\"math\">b</span>. Then girls' mid-semester average is <span class=\"math\">b+5</span>.</li><li>Class average in mid-semester = <span class=\"math\">(20b+30(b+5))/50 = b+3</span>.</li><li>In final exam, girls' average becomes <span class=\"math\">b+2</span>. Let boys' final average be <span class=\"math\">b+x</span>.</li><li>Final class average increased by 2, so it is <span class=\"math\">b+5</span>.</li><li>Thus <span class=\"math\">[20(b+x)+30(b+2)]/50 = b+5</span>.</li><li>This gives <span class=\"math\">20x+60=250</span>, so <span class=\"math\">x=9.5</span>.</li></ol>"

    "question": "<p><strong>Q2.</strong> The average height of 22 toddlers increases by 2 inches when two of them leave this group. If the average height of these two toddlers is one-third the average height of the original 22, then the average height, in inches, of the remaining 20 toddlers is</p>",

    "solution": "<p><strong>Detailed solution:</strong></p><ol class='solution-steps'><li>Let the original average height of 22 toddlers be <span class=\"math\">A</span>. Total height = <span class=\"math\">22A</span>.</li><li>The two toddlers who leave have average <span class=\"math\">A/3</span>, so their total height = <span class=\"math\">2A/3</span>.</li><li>Remaining total height = <span class=\"math\">22A-2A/3 = 64A/3</span>.</li><li>Average of remaining 20 = <span class=\"math\">(64A/3)/20 = 16A/15</span>.</li><li>This average is 2 inches more than the original, so <span class=\"math\">16A/15 = A+2</span>.</li><li>Hence <span class=\"math\">A=30</span>, and remaining average = <span class=\"math\">32</span>.</li></ol>"

    "question": "<p><strong>Q3.</strong> In an apartment complex, the number of people aged 51 years and above is 30 and there are at most 39 people whose ages are below 51 years. The average age of all the people in the apartment complex is 38 years. What is the largest possible average age, in years, of the people whose ages are below 51 years?</p>",
    "options": [

      "<p>27</p>",
      "<p>28</p>",
      "<p>25</p>"

    "answer": 2,

    "acceptedAnswers": [

    ],
    "solution": "<p><strong>Detailed solution:</strong></p><ol class='solution-steps'><li>To maximize the average age of people below 51, minimize the average age of the 30 people aged 51 and above.</li><li>Their minimum possible age is 51 each, so their total age is at least <span class=\"math\">30×51=1530</span>.</li><li>Let there be <span class=\"math\">n</span> people below 51 with average <span class=\"math\">x</span>. Given <span class=\"math\">n≤39</span>.</li><li>Overall average is 38, so <span class=\"math\">(1530+nx)/(30+n)=38</span>.</li><li>This gives <span class=\"math\">nx = 38n - 390</span>, hence <span class=\"math\">x = 38 - 390/n</span>.</li><li>This is largest when <span class=\"math\">n</span> is largest, i.e. <span class=\"math\">n=39</span>. Then <span class=\"math\">x=28</span>.</li></ol>"

    "direction": "<p>Answer the question independently.</p>",
    "passage": "",
    "question": "<p><strong>Q4.</strong> A CAT aspirant appears for a certain number of tests. His average score increases by 1 if the first 10 tests are not considered, and decreases by 1 if the last 10 tests are not considered. If his average scores for the first 10 and the last 10 tests are 20 and 30, respectively, then the total number of tests taken by him is</p>",

    "solution": "<p><strong>Detailed solution:</strong></p><ol class='solution-steps'><li>Let total number of tests be <span class=\"math\">N</span> and overall average be <span class=\"math\">A</span>.</li><li>First 10 tests have average 20, so their total score is <span class=\"math\">200</span>.</li><li>Removing first 10 tests increases average by 1: <span class=\"math\">(NA-200)/(N-10)=A+1</span>. This gives <span class=\"math\">10A = N+190</span>.</li><li>Last 10 tests have average 30, so their total score is <span class=\"math\">300</span>.</li><li>Removing last 10 tests decreases average by 1: <span class=\"math\">(NA-300)/(N-10)=A-1</span>. This gives <span class=\"math\">10A = 310-N</span>.</li><li>Equating, <span class=\"math\">N+190=310-N</span>, so <span class=\"math\">N=60</span>.</li></ol>"

    "question": "<p><strong>Q5.</strong> The arithmetic mean of <span class=\"math\">x, y</span> and <span class=\"math\">z</span> is 80, and that of <span class=\"math\">x, y, z, u</span> and <span class=\"math\">v</span> is 75, where <span class=\"math\">u = (x + y)/2</span> and <span class=\"math\">v = (y + z)/2</span>. If <span class=\"math\">x ≥ z</span>, then the minimum possible value of <span class=\"math\">x</span> is</p>",

    "question": "<p><strong>Q23.</strong> There are three persons <span class=\"math\">A, B</span> and <span class=\"math\">C</span> in a room. If a person <span class=\"math\">D</span> joins the room, the average weight of the persons in the room reduces by <span class=\"math\">x</span> kg. Instead of <span class=\"math\">D</span>, if person <span class=\"math\">E</span> joins the room, the average weight of the persons in the room increases by <span class=\"math\">2x</span> kg. If the weight of <span class=\"math\">E</span> is 12 kg more than that of <span class=\"math\">D</span>, then the value of <span class=\"math\">x</span> is</p>",

    "solution": "<p><strong>Detailed solution:</strong></p><ol class='solution-steps'><li>Let the average weight of A, B, C be <span class=\"math\">m</span>. Their total weight is <span class=\"math\">3m</span>.</li><li>When D joins, new average is <span class=\"math\">m-x</span>, so <span class=\"math\">(3m+D)/4=m-x</span>. Hence <span class=\"math\">D=m-4x</span>.</li><li>When E joins, new average is <span class=\"math\">m+2x</span>, so <span class=\"math\">(3m+E)/4=m+2x</span>. Hence <span class=\"math\">E=m+8x</span>.</li><li>Given <span class=\"math\">E-D=12</span>, so <span class=\"math\">(m+8x)-(m-4x)=12</span>.</li><li>Thus <span class=\"math\">12x=12</span>, so <span class=\"math\">x=1</span>.</li></ol>"
