  <script>
    const questions = [
    {
        "no": 1,
        "itemId": "MA-2017-S2-01",
        "source": "CAT 2017 Slot 2",
        "type": "mcq",
        "question": "Bottle 1 contains a mixture of milk and water in 7 : 2 ratio and Bottle 2 contains a mixture of milk and water in 9 : 4 ratio. In what ratio of volumes should the liquids in Bottle 1 and Bottle 2 be combined to obtain a mixture of milk and water in 3 : 1 ratio?",
        "options": [
            "27 : 14",
            "27 : 13",
            "27 : 16",
            "27 : 18"
        ],
        "answer": 0,
        "solution": "<ol class=\"solution-steps\"><li>Milk fractions in Bottle 1, Bottle 2 and target are 7/9, 9/13 and 3/4.</li><li>By alligation, Bottle 1 : Bottle 2 = (3/4 - 9/13) : (7/9 - 3/4).</li><li>This equals 3/52 : 1/36 = 27 : 14.</li></ol>"
    },
    {
        "no": 2,
        "itemId": "MA-2017-S2-02",
        "source": "CAT 2017 Slot 2",
        "type": "mcq",
        "question": "Consider three mixtures - the first having water and liquid A in the ratio 1 : 2, the second having water and liquid B in the ratio 1 : 3, and the third having water and liquid C in the ratio 1 : 4. These three mixtures of A, B, and C, respectively, are further mixed in the proportion 4 : 3 : 2. Then the resulting mixture has",
        "options": [
            "The same amount of water and liquid B",
            "The same amount of liquids B and C",
            "More water than liquid B",
            "More water than liquid A"
        ],
        "answer": 2,
        "solution": "<ol class=\"solution-steps\"><li>Take 4, 3 and 2 units of the three mixtures.</li><li>Water = 4/3 + 3/4 + 2/5 = 149/60, while liquid B = 3 x 3/4 = 9/4 = 135/60.</li><li>Since 149/60 is greater than 135/60, the mixture has more water than liquid B.</li></ol>"
    },
    {
        "no": 3,
        "itemId": "MA-2018-S1-01",
        "source": "CAT 2018 Slot 1",
        "type": "mcq",
        "question": "A trader sells 10 litres of a mixture of paints A and B, where the amount of B in the mixture does not exceed that of A. The cost of paint A per litre is Rs. 8 more than that of paint B. If the trader sells the entire mixture for Rs. 264 and makes a profit of 10%, then the highest possible cost of paint B, in Rs. per litre, is",
        "options": [
            "20",
            "22",
            "16",
            "26"
        ],
        "answer": 0,
        "solution": "<ol class=\"solution-steps\"><li>Cost price of the 10 litres = 264/1.10 = Rs. 240, so average cost is Rs. 24 per litre.</li><li>Let paint B cost Rs. b per litre, so paint A costs Rs. b + 8.</li><li>Since B does not exceed A, A is at least 5 litres. To maximize b, take A = 5 litres.</li><li>Then average cost = b + 8 x 5/10 = b + 4 = 24, so b = 20.</li></ol>"
    },
    {
        "no": 4,
        "itemId": "MA-2018-S2-01",
        "source": "CAT 2018 Slot 2",
        "type": "mcq",
        "question": "There are two drums, each containing a mixture of paints A and B. In drum 1, A and B are in the ratio 18 : 7. The mixtures from drums 1 and 2 are mixed in the ratio 3 : 4 and in this final mixture, A and B are in the ratio 13 : 7. In drum 2, then A and B were in the ratio",
        "options": [
            "239 : 161",
            "229 : 141",
            "251 : 163",
            "220 : 149"
        ],
        "answer": 0,
        "solution": "<ol class=\"solution-steps\"><li>A fraction in drum 1 is 18/25 and in the final mixture is 13/20.</li><li>Let A fraction in drum 2 be x. Then (3 x 18/25 + 4x)/7 = 13/20.</li><li>Solving gives x = 239/400. Hence B fraction is 161/400.</li><li>So A : B in drum 2 = 239 : 161.</li></ol>"
    },
    {
        "no": 5,
        "itemId": "MA-2018-S2-02",
        "source": "CAT 2018 Slot 2",
        "type": "mcq",
        "question": "The strength of a salt solution is p% if 100ml of the solution contains p grams of salt. If three salt solutions A, B, C are mixed in the proportion 1 : 2 : 3, then the resulting solution has strength 20%. If instead the proportion is 3 : 2 : 1, then the resulting solution has strength 30%. A fourth solution, D, is produced by mixing B and C in the ratio 2 : 7. The ratio of the strength of D to that of A is",
        "options": [
            "1 : 4",
            "3 : 10",
            "1 : 3",
            "2 : 5"
        ],
        "answer": 2,
        "solution": "<ol class=\"solution-steps\"><li>Let strengths be a, b and c.</li><li>a + 2b + 3c = 120 and 3a + 2b + c = 180.</li><li>Subtracting gives a - c = 30. From the first equation, b = 45 - 2c.</li><li>Strength of D = (2b + 7c)/9 = (90 + 3c)/9 = (c + 30)/3 = a/3.</li><li>Therefore D : A = 1 : 3.</li></ol>"
    },
    {
        "no": 6,
        "itemId": "MA-2018-S2-03",
        "source": "CAT 2018 Slot 2",
        "type": "mcq",
        "question": "A 20% ethanol solution is mixed with another ethanol solution, say S of unknown concentration in the proportion 1 : 3 by volume. This mixture is then mixed with an equal volume of 20% ethanol solution. If the resultant mixture is a 31.25% ethanol solution, then the unknown concentration of S is",
        "options": [
            "48%",
            "55%",
            "52%",
            "50%"
        ],
        "answer": 3,
        "solution": "<ol class=\"solution-steps\"><li>The concentration of the first mixture is (20 + 3S)/4.</li><li>This is mixed equally with a 20% solution, giving [(20 + 3S)/4 + 20]/2 = 31.25.</li><li>Solving gives 20 + 3S = 170, so S = 50%.</li></ol>"
    },
    {
        "no": 7,
        "itemId": "MA-2018-S2-04",
        "source": "CAT 2018 Slot 2",
        "type": "mcq",
        "question": "A jar contains a mixture of 175ml water and 700ml alcohol. Gopal takes out 10% of the mixture and substitutes it by water of the same amount. The process is repeated once again. The percentage of water in the mixture is now",
        "options": [
            "30.3",
            "20.2",
            "25.4",
            "35.2"
        ],
        "answer": 3,
        "solution": "<ol class=\"solution-steps\"><li>Total mixture = 875 ml and initial alcohol = 700 ml.</li><li>After two 10% replacements, alcohol left = 700 x 0.9 x 0.9 = 567 ml.</li><li>Water = 875 - 567 = 308 ml.</li><li>Water percentage = 308/875 x 100 = 35.2%.</li></ol>"
    },
    {
        "no": 8,
        "itemId": "MA-2019-S1-01",
        "source": "CAT 2019 Slot 1",
        "type": "mcq",
        "question": "A chemist mixes two liquids 1 and 2. One litre of liquid 1 weighs 1 kg and one litre of liquid 2 weighs 800gm. If half litre of the mixture weighs 480gm, then the percentage of liquid 1 in the mixture, in terms of volume, is",
        "options": [
            "80",
            "75",
            "85",
            "70"
        ],
        "answer": 0,
        "solution": "<ol class=\"solution-steps\"><li>The mixture density is 480 gm per half litre, or 960 gm per litre.</li><li>Let the volume fraction of liquid 1 be x. Then 1000x + 800(1 - x) = 960.</li><li>So 200x = 160, hence x = 0.8 = 80%.</li></ol>"
    },
    {
        "no": 9,
        "itemId": "MA-2019-S2-01",
        "source": "CAT 2019 Slot 2",
        "type": "mcq",
        "question": "The strength of a salt solution is p% if 100ml of the solution contains p grams of salt. Each of three vessels A, B, C contains 500ml of salt solution of strengths 10%, 22%, and 32%, respectively. Now, 100ml of the solution in vessel A is transferred to vessel B. Then, 100ml of the solution in vessel B is transferred to vessel C. Finally, 100ml of the solution in vessel C is transferred to vessel A. The strength, in percentage, of the resulting solution in vessel A is",
        "options": [
            "15",
            "13",
            "14",
            "12"
        ],
        "answer": 2,
        "solution": "<ol class=\"solution-steps\"><li>Initial salt in A, B and C is 50, 110 and 160 grams.</li><li>After 100 ml from A to B, A has 400 ml with 40 grams salt; B has 600 ml with 120 grams salt.</li><li>B is now 20%, so 100 ml sent to C carries 20 grams salt. C becomes 600 ml with 180 grams salt, i.e. 30%.</li><li>100 ml from C to A carries 30 grams salt. A now has 500 ml with 70 grams salt.</li><li>Strength of A = 70/500 x 100 = 14%.</li></ol>"
    },
    {
        "no": 10,
        "itemId": "MA-2020-S1-01",
        "source": "CAT 2020 Slot 1",
        "type": "text",
        "question": "A solution, of volume 40 litres, has dye and water in the proportion 2 : 3. Water is added to the solution to change this proportion to 2 : 5. If one-fourths of this diluted solution is taken out, how many litres of dye must be added to the remaining solution to bring the proportion back to 2 : 3?",
        "typedAnswer": "",
        "acceptedAnswers": [
            "8"
        ],
        "solution": "<ol class=\"solution-steps\"><li>Initially dye = 16 litres and water = 24 litres.</li><li>To make dye : water = 2 : 5 while dye remains 16, water must become 40 litres. So total is 56 litres.</li><li>One-fourth is removed, leaving dye = 12 litres and water = 30 litres.</li><li>If x litres dye is added, (12 + x) : 30 = 2 : 3, so 12 + x = 20.</li><li>Thus x = 8 litres.</li></ol>"
    },
