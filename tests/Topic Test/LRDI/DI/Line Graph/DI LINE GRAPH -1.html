<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DI LINE GRAPH -1 ( 40 MINUTES )</title>
  <style>
    :root{--brand:#0f4c81;--brand-dark:#0a3357;--line:#c9d3df;--ink:#111827;--muted:#6b7280;--ok:#157347;--bad:#b02a37}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:#eef2f6}
    header{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px}.topbar{width:100%;display:flex;align-items:center;gap:14px}.topbar h1{font-size:20px;margin:0;color:var(--brand-dark)}.meta{font-size:13px;color:var(--muted);margin-top:3px}.pill{margin-left:auto;border:1px solid var(--line);border-radius:6px;padding:8px 12px;background:#f8fafc;font-weight:700}.pill+.pill{margin-left:0}.calc-open{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:9px 14px;font-weight:700;cursor:pointer}
    main{height:calc(100vh - 64px);display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:10px;padding:10px}main>section,aside{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:0;overflow:hidden}
    #testForm{height:100%;display:grid;grid-template-rows:minmax(0,1fr) auto auto;overflow:hidden}#result,.question{padding:12px}#result{display:none}.question{display:none}.question.active{display:grid;grid-template-columns:minmax(0,1.18fr) minmax(390px,.82fr);gap:10px;height:100%;min-height:0}.question h2{margin:0 0 12px;font-size:17px;line-height:1.32}
    .set-info,.question-body{border:1px solid var(--line);border-radius:8px;background:#fff;min-height:0;height:100%;overflow:auto}.source-card{padding:10px}.chart-svg{width:100%;height:auto;display:block}.chart-svg text{font-size:16px}.chart-svg .title{font-size:20px;font-weight:700}.chart-svg .small{font-size:14px}.question-body{padding:14px}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px}label.option{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--line);border-radius:6px;padding:10px;background:#fbfcfd;cursor:pointer;font-size:16px;min-height:42px}input[type=radio]{width:17px;height:17px;margin-top:3px;accent-color:var(--brand)}.text-answer{width:100%;max-width:260px;border:1px solid var(--line);border-radius:6px;padding:12px 14px;font-size:19px}
    .question-nav,.actions{display:flex;justify-content:space-between;gap:10px;margin:8px 12px 0;flex-wrap:wrap}button{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer}button.secondary{background:#e8edf4;color:var(--ink)}button:disabled{opacity:.55}
    aside{padding:14px;overflow:auto}.panel-title{font-size:17px;margin:0 0 12px;color:var(--brand-dark)}.palette{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.dot{height:38px;border-radius:6px;border:1px solid var(--line);background:#f8fafc;color:var(--ink);font-weight:700}.dot.active{background:var(--brand);color:#fff}.dot.answered{border-color:var(--ok);box-shadow:inset 0 -4px 0 rgba(21,115,71,.4)}
    .score-grid{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:9px;margin-top:12px}.score-box{border:1px solid var(--line);border-radius:6px;padding:9px;background:#fbfcfd}.score-box strong{display:block;font-size:22px}.answer-note{margin-top:12px;font-weight:700}.answer-note.ok{color:var(--ok)}.answer-note.bad{color:var(--bad)}.answer-note.muted{color:var(--muted)}.correct{background:#eef8f2}.wrong{background:#fff1f2}.missed{background:#f6f7f9}
    .calculator-dialog{width:min(360px,calc(100vw - 28px));max-width:360px;margin:0;inset:90px auto auto 50%;transform:translateX(-50%);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:0 12px 34px rgba(15,23,42,.2)}.calculator-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.calculator-head h2{margin:0;color:var(--brand-dark);font-size:18px}.calc-close{background:#eef2f6;color:var(--ink);width:34px;height:34px;padding:0}.calc-display{width:100%;border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px;background:#fbfcfd;font-size:22px;font-weight:700;text-align:right}.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.calc-key{min-height:44px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:var(--ink);font-size:17px;font-weight:700}.calc-key.equal{background:var(--brand);color:#fff;grid-column:span 2}.calc-key.clear{color:var(--bad)}
  </style>
</head>
<body>
  <header><div class="topbar"><div><h1>DI LINE GRAPH -1 ( 40 MINUTES )</h1><div class="meta">20 Questions | 40 Minutes</div></div><div class="pill">Time Left: <span id="time">40:00</span></div><div class="pill">Answered: <span id="answeredCount">0</span>/20</div><button class="calc-open" type="button" id="openCalculator">Calculator</button></div></header>
  <main><section><section id="result"></section><form id="testForm"></form></section><aside><h2 class="panel-title">Question Palette</h2><div class="palette" id="palette"></div></aside></main>
  <dialog class="calculator-dialog" id="calculatorDialog"><div class="calculator-head"><h2>Calculator</h2><button class="calc-close" type="button" id="closeCalculator">x</button></div><input class="calc-display" id="calcDisplay" value="0"><div class="calc-grid" id="calcKeys"><button class="calc-key clear" type="button" data-action="clear">C</button><button class="calc-key" type="button" data-action="backspace">DEL</button><button class="calc-key" type="button" data-value="%">%</button><button class="calc-key" type="button" data-value="/">/</button><button class="calc-key" type="button" data-value="7">7</button><button class="calc-key" type="button" data-value="8">8</button><button class="calc-key" type="button" data-value="9">9</button><button class="calc-key" type="button" data-value="*">x</button><button class="calc-key" type="button" data-value="4">4</button><button class="calc-key" type="button" data-value="5">5</button><button class="calc-key" type="button" data-value="6">6</button><button class="calc-key" type="button" data-value="-">-</button><button class="calc-key" type="button" data-value="1">1</button><button class="calc-key" type="button" data-value="2">2</button><button class="calc-key" type="button" data-value="3">3</button><button class="calc-key" type="button" data-value="+">+</button><button class="calc-key" type="button" data-value="0">0</button><button class="calc-key" type="button" data-value=".">.</button><button class="calc-key equal" type="button" data-action="equals">=</button></div></dialog>
  <script>
    const optionLabels=["A","B","C","D"];
    const questions=[
      {set:1,type:"mcq",q:"If in 2004-05, the manufacturing cost and selling price of each unit for all the companies is ₹25 and ₹40 respectively, then the total profit (in ₹) earned by all the three companies in that year, if all the manufactured goods are sold, is",options:["6.75 million.","6 lakh 75 thousand.","0.225 million.","0.3 million."],answer:"B"},
      {set:1,type:"mcq",q:"Which company has the maximum revenue in the years 2004-05 and 2005-06 together, if the selling price (in rupees) of each unit, in both the years, for companies X, Y, Z are 12, 18 and 8 respectively?",options:["X","Y","Z","Both X and Y"],answer:"D"},
      {set:1,type:"mcq",q:"How are the revenues from 2003-04 to 2007-08 for company X and company Z related if the selling price of each unit sold in any year is the same for both the companies?",options:["Inverse relationship.","Sum of their revenues is a constant.","Direct relationship.","Difference of their revenues is a constant."],answer:"C"},
      {set:1,type:"mcq",q:"What is the ratio of the profits generated by the companies X, Y and Z in 2003-04, if their average profit per unit is ₹15, ₹5 and ₹8 respectively?",options:["15 : 20 : 24","5 : 7 : 8","6 : 6 : 8","6 : 5 : 8"],answer:"A"},
      {set:1,type:"mcq",q:"Which company had the highest percentage growth in profits during the period from 2003-04 to 2006-07?",options:["X","Y","Z","Cannot be determined"],answer:"D"},
      {set:2,type:"mcq",q:"For how many families is the ratio of savings to educational expenses more than 0.6?",options:["4","3","6","5"],answer:"A"},
      {set:2,type:"mcq",q:"What is the percentage point difference between the percentage savings of B and H?",options:["9.67%","12.87%","10.67%","None of these"],answer:"D"},
      {set:2,type:"mcq",q:"By what percentage are the savings of family D more than that of family A?",options:["200%","160%","175%","100%"],answer:"A"},
      {set:2,type:"mcq",q:"For how many families are the household expenses more than 55% of the total income?",options:["4","3","5","2"],answer:"B"},
      {set:2,type:"mcq",q:"For which of the given families is the percentage savings the highest?",options:["G","H","D","E"],answer:"C"},
      {set:3,type:"mcq",q:"During which year was the expenditure of the family the highest?",options:["2010","2011","2012","2013"],answer:"C"},
      {set:3,type:"mcq",q:"What is the least ratio of income and savings of the family in any of the given years?",options:["1.5","1.8","2","2.4"],answer:"B"},
      {set:3,type:"mcq",q:"During which of the following years is the percentage decrease in expenditure, over the previous year, the highest?",options:["2011","2013","2014","2015"],answer:"C"},
      {set:3,type:"mcq",q:"Which of the following pairs show the same trend (increase, remain constant or decrease) in at least three of the given years?",options:["Income and savings","Income and expenses","Expenses and savings","All the above"],answer:"A"},
      {set:3,type:"mcq",q:"What percentage of the total income in the given period did the family save?",options:["20%","25%","33 1/3%","40%"],answer:"C"},
      {set:4,type:"text",q:"What were the expenses (in ₹ cr) of company B in 2013?",answer:"138"},
      {set:4,type:"text",q:"What was the profit percentage of company A in 2014?",answer:"25.75"},
      {set:4,type:"text",q:"In which of the given years was the profit percentage of company A, the highest?",answer:"2016"},
      {set:4,type:"text",q:"What were the total expenses (in ₹ cr) of company B in the five years together?",answer:"702"},
      {set:4,type:"text",q:"In which year were the expenses of companies A and B together, the lowest?",answer:"2012"}
    ];
    function plot(points,xs,ys,kind,color="#111"){let d=points.map((p,i)=>`${i?"L":"M"}${xs[i]} ${ys(p)}`).join(" ");let out=`<path d="${d}" fill="none" stroke="${color}" stroke-width="2"/>`;points.forEach((p,i)=>{const x=xs[i],y=ys(p);out+=kind==="square"?`<rect x="${x-4}" y="${y-4}" width="8" height="8" fill="#111"/>`:kind==="tri"?`<path d="M${x} ${y-6} L${x-6} ${y+5} L${x+6} ${y+5} Z" fill="#111"/>`:kind==="diamond"?`<path d="M${x} ${y-6} L${x+6} ${y} L${x} ${y+6} L${x-6} ${y} Z" fill="#111"/>`:kind==="x"?`<path d="M${x-6} ${y-6} L${x+6} ${y+6}M${x+6} ${y-6} L${x-6} ${y+6}" stroke="#111" stroke-width="2"/>`:kind==="openCircle"?`<circle cx="${x}" cy="${y}" r="4" fill="#fff" stroke="${color}" stroke-width="2"/>`:`<circle cx="${x}" cy="${y}" r="4" fill="#111"/>`;out+=`<text x="${x}" y="${y-12}" text-anchor="middle">${p}</text>`});return out}
    function graph1(){const xs=[125,260,395,530,665],ys=v=>420-v*9.5;return `<div class="source-card"><svg class="chart-svg" viewBox="0 0 760 510"><text x="20" y="30">The line graph represents the number of units sold by three companies X, Y and Z in the years from 2003-2004 to 2007-2008.</text><text x="380" y="82" class="title" text-anchor="middle">Units sold (in thousands)</text><path d="M60 420H720M60 40V420" stroke="#111" stroke-width="2"/><text x="120" y="450">2003-04</text><text x="255" y="450">2004-05</text><text x="390" y="450">2005-06</text><text x="525" y="450">2006-07</text><text x="660" y="450">2007-08</text>${plot([5,15,15,20,25],xs,ys,"square")}${plot([20,10,10,5,0],xs,ys,"diamond")}${plot([15,20,20,30,35],xs,ys,"circle")}<rect x="50" y="470" width="660" height="28" fill="none" stroke="#111"/><text x="190" y="490">■ X</text><text x="365" y="490">◆ Y</text><text x="540" y="490">● Z</text></svg></div>`}
    function graph2(){const xs=[110,200,290,380,470,560,650,740],ys=v=>380-v/80;return `<div class="source-card"><svg class="chart-svg" viewBox="0 0 820 540"><text x="35" y="30">The line graph shows the total monthly income and monthly expenditure of eight families - A, B, C, D, E, F, G and H.</text><path d="M70 390H785M70 60V390" stroke="#111" stroke-width="2"/><text x="105" y="420">A</text><text x="195" y="420">B</text><text x="285" y="420">C</text><text x="375" y="420">D</text><text x="465" y="420">E</text><text x="555" y="420">F</text><text x="645" y="420">G</text><text x="735" y="420">H</text>${plot([20000,24000,22000,18000,16000,26000,22000,16000],xs,ys,"circle")}${plot([14000,12000,12000,10000,6000,16000,10000,8000],xs,ys,"tri")}${plot([4000,8000,6000,2000,8000,6000,8000,4000],xs,ys,"square")}<rect x="40" y="445" width="760" height="34" fill="none" stroke="#111"/><text x="95" y="468">● Total income</text><text x="300" y="468">▲ Household expenses</text><text x="560" y="468">■ Education expenses</text><text x="35" y="510">Savings = Total income - (Household expenses + Education expenses)</text><text x="35" y="530">Percentage savings = Savings / Total income x 100</text></svg></div>`}
    function graph3(){const xs=[110,230,350,470,590,710],ys=v=>380-v*3.2;return `<div class="source-card"><svg class="chart-svg" viewBox="0 0 820 540"><text x="30" y="30" font-style="italic" font-weight="700">Directions for questions 11 to 15: <tspan font-style="normal" font-weight="400">These questions are based on the information given below.</tspan></text><text x="30" y="70">The line graph gives the income and savings of a family in different years.</text><path d="M70 390H760M70 60V390" stroke="#111" stroke-width="2"/><text x="100" y="420">2010</text><text x="220" y="420">2011</text><text x="340" y="420">2012</text><text x="460" y="420">2013</text><text x="580" y="420">2014</text><text x="700" y="420">2015</text>${plot([20,30,30,5,15,50],xs,ys,"square")}${plot([70,80,90,60,60,90],xs,ys,"tri")}<rect x="40" y="450" width="740" height="34" fill="none" stroke="#111"/><text x="200" y="474">■ Savings</text><text x="560" y="474">▲ Income</text><text x="30" y="515">Savings = Income - Expenditure</text></svg></div>`}
    function graph4(){const xs=[150,280,410,540,670],ys1=v=>315-(v-120)*1.5,ys2=v=>690-v*3.2;return `<div class="source-card"><svg class="chart-svg" viewBox="0 0 820 830"><text x="25" y="28">The first line graph gives the sales of two companies A and B across five years. The second line graph gives the profits</text><text x="25" y="52">of the companies over the years.</text><path d="M80 315H745M80 90V315" stroke="#111" stroke-width="2"/><text x="28" y="210" transform="rotate(-90 28 210)" font-weight="700">(in ₹ cr)</text><text x="62" y="318">0</text><text x="52" y="273">50</text><text x="44" y="228">100</text><text x="44" y="183">150</text><text x="44" y="138">200</text><text x="44" y="93">250</text><text x="135" y="340">2012</text><text x="265" y="340">2013</text><text x="395" y="340">2014</text><text x="525" y="340">2015</text><text x="655" y="340">2016</text>${plot([185,205,198,230,226],xs,ys1,"openCircle","#1520a6")}${plot([155,162,170,174,180],xs,ys1,"x")}<rect x="90" y="355" width="640" height="32" fill="none" stroke="#111"/><path d="M215 371H250" stroke="#1520a6" stroke-width="2"/><circle cx="232" cy="371" r="4" fill="#fff" stroke="#1520a6" stroke-width="2"/><text x="260" y="378" font-weight="700">A</text><path d="M520 371H555" stroke="#111" stroke-width="2"/><path d="M532 365L544 377M544 365L532 377" stroke="#111" stroke-width="2"/><text x="565" y="378" font-weight="700">B</text><path d="M80 690H745M80 455V690" stroke="#111" stroke-width="2"/><text x="25" y="580" transform="rotate(-90 25 580)" font-weight="700">(in ₹ cr)</text><text x="62" y="693">0</text><text x="52" y="661">10</text><text x="52" y="629">20</text><text x="52" y="597">30</text><text x="52" y="565">40</text><text x="52" y="533">50</text><text x="52" y="501">60</text><text x="52" y="469">70</text><text x="135" y="715">2012</text><text x="265" y="715">2013</text><text x="395" y="715">2014</text><text x="525" y="715">2015</text><text x="655" y="715">2016</text>${plot([35,42,51,53,60],xs,ys2,"openCircle")}${plot([18,24,27,31,39],xs,ys2,"x")}<rect x="90" y="730" width="640" height="32" fill="none" stroke="#111"/><path d="M215 746H250" stroke="#111" stroke-width="2"/><circle cx="232" cy="746" r="4" fill="#fff" stroke="#111" stroke-width="2"/><text x="260" y="753" font-weight="700">A</text><path d="M520 746H555" stroke="#111" stroke-width="2"/><path d="M532 740L544 752M544 740L532 752" stroke="#111" stroke-width="2"/><text x="565" y="753" font-weight="700">B</text><text x="25" y="795">Sales - Expenses = Profit</text><text x="25" y="820">Profit% = Profit / Sales</text></svg></div>`}
    function setInfo(set){return set===1?graph1():set===2?graph2():set===3?graph3():graph4()}
    const form=document.getElementById("testForm"),resultBox=document.getElementById("result"),palette=document.getElementById("palette"),answeredCount=document.getElementById("answeredCount"),time=document.getElementById("time"),calculatorDialog=document.getElementById("calculatorDialog"),calcDisplay=document.getElementById("calcDisplay");let submitted=false,secondsLeft=40*60,currentQuestionIndex=0;
    function correctAnswerText(item){return item.type==="text"?item.answer:`(${item.answer}) ${item.options[optionLabels.indexOf(item.answer)]}`}function renderQuestions(){form.innerHTML=questions.map((item,index)=>{const control=item.type==="text"?`<input class="text-answer" name="q${index}" autocomplete="off">`:`<div class="options">${item.options.map((o,i)=>`<label class="option"><input type="radio" name="q${index}" value="${optionLabels[i]}"><span>(${optionLabels[i]}) ${o}</span></label>`).join("")}</div>`;return `<div class="question" id="qcard-${index}"><div class="set-info">${setInfo(item.set)}</div><div class="question-body"><h2>Q${index+1}. ${item.q}</h2>${control}<div class="answer-note" id="note-${index}"></div></div></div>`}).join("")+`<div class="question-nav"><button class="secondary" type="button" id="prevQuestion">Previous</button><button class="secondary" type="button" id="nextQuestion">Save & Next</button></div><div class="actions"><button type="submit" id="submitBtn">Submit Test</button><button class="secondary" type="button" id="clearAnswers">Clear Responses</button></div>`;palette.innerHTML=questions.map((_,i)=>`<button class="dot" type="button" data-target="${i}">${i+1}</button>`).join("");palette.querySelectorAll(".dot").forEach(b=>b.addEventListener("click",()=>showQuestion(Number(b.dataset.target))));form.querySelectorAll("input").forEach(input=>{input.addEventListener("change",updateAnsweredState);input.addEventListener("input",updateAnsweredState)});document.getElementById("prevQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex-1));document.getElementById("nextQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex+1));document.getElementById("clearAnswers").addEventListener("click",()=>{if(submitted)return;form.reset();updateAnsweredState();showQuestion(currentQuestionIndex)});showQuestion(0)}
    function showQuestion(i){if(i<0||i>=questions.length)return;currentQuestionIndex=i;document.querySelectorAll(".question").forEach((c,n)=>c.classList.toggle("active",n===i));palette.querySelectorAll(".dot").forEach((d,n)=>d.classList.toggle("active",n===i));document.getElementById("prevQuestion").disabled=i===0||submitted;document.getElementById("nextQuestion").disabled=i===questions.length-1||submitted}function getAnswer(i){const item=questions[i];if(item.type==="text"){const el=document.querySelector(`[name="q${i}"]`);return el?el.value.trim():""}const s=document.querySelector(`input[name="q${i}"]:checked`);return s?s.value:""}function norm(v){return String(v).replace(/,/g,"").trim().toLowerCase()}function updateAnsweredState(){let a=0;questions.forEach((_,i)=>{const has=!!getAnswer(i);if(has)a++;const dot=palette.querySelector(`[data-target="${i}"]`);if(dot)dot.classList.toggle("answered",has)});answeredCount.textContent=a}
    function updateTimer(){const m=String(Math.floor(secondsLeft/60)).padStart(2,"0"),s=String(secondsLeft%60).padStart(2,"0");time.textContent=`${m}:${s}`;if(secondsLeft<=0){submitTest();return}secondsLeft--}function submitTest(e){if(e)e.preventDefault();if(submitted)return;submitted=true;let c=0,w=0,u=0;questions.forEach((item,i)=>{const ans=getAnswer(i),card=document.getElementById(`qcard-${i}`),note=document.getElementById(`note-${i}`),ok=item.type==="text"?norm(ans)===norm(item.answer):ans===item.answer;document.querySelectorAll(`[name="q${i}"]`).forEach(x=>x.disabled=true);if(!ans){u++;card.classList.add("missed");note.className="answer-note muted";note.textContent=`Unattempted. Correct answer: ${correctAnswerText(item)}`}else if(ok){c++;card.classList.add("correct");note.className="answer-note ok";note.textContent=`Correct. Correct answer: ${correctAnswerText(item)}`}else{w++;card.classList.add("wrong");note.className="answer-note bad";note.textContent=`Incorrect. Correct answer: ${correctAnswerText(item)}`}});resultBox.style.display="block";resultBox.innerHTML=`<h2>Test Summary</h2><div class="score-grid"><div class="score-box">Score<strong>${c} / ${questions.length}</strong></div><div class="score-box">Correct<strong>${c}</strong></div><div class="score-box">Wrong<strong>${w}</strong></div><div class="score-box">Unattempted<strong>${u}</strong></div></div>`;document.querySelectorAll(".question").forEach(x=>x.classList.add("active"));["prevQuestion","nextQuestion","submitBtn","clearAnswers"].forEach(id=>document.getElementById(id).disabled=true)}
    function appendCalcValue(v){if(calcDisplay.value==="0"||calcDisplay.value==="Error")calcDisplay.value=v==="."?"0.":v;else calcDisplay.value+=v}function calculateExpression(){try{const exp=calcDisplay.value.trim();if(!/^[0-9+\-*/%. ()]+$/.test(exp))throw Error();const val=Function(`"use strict"; return (${exp})`)();calcDisplay.value=Number.isFinite(val)?String(Number(val.toFixed(10))):"Error"}catch{calcDisplay.value="Error"}}document.getElementById("openCalculator").addEventListener("click",()=>calculatorDialog.showModal());document.getElementById("closeCalculator").addEventListener("click",()=>calculatorDialog.close());document.getElementById("calcKeys").addEventListener("click",e=>{const k=e.target.closest("button");if(!k)return;if(k.dataset.action==="clear")calcDisplay.value="0";else if(k.dataset.action==="backspace")calcDisplay.value=calcDisplay.value.length>1?calcDisplay.value.slice(0,-1):"0";else if(k.dataset.action==="equals")calculateExpression();else if(k.dataset.value)appendCalcValue(k.dataset.value)});
    renderQuestions();updateAnsweredState();updateTimer();const timerId=setInterval(()=>{if(submitted){clearInterval(timerId);return}updateTimer()},1000);form.addEventListener("submit",submitTest);
  </script>
</body>
</html>
