<script>
function lineChart(c){const W=760,H=430,l=72,r=20,t=45,b=65,pw=W-l-r,ph=H-t-b;let vals=c.series.flatMap(s=>s.v),min=c.min??Math.min(0,...vals),max=c.max??Math.max(...vals),xs=c.x.map((_,i)=>l+(c.x.length===1?0:i*pw/(c.x.length-1))),y=v=>t+(max-v)*ph/(max-min);let ticks=c.ticks||Array.from({length:6},(_,i)=>min+i*(max-min)/5);let out=`<svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="${c.title}"><text x="380" y="24" text-anchor="middle" font-size="17" font-weight="700">${c.title}</text>`;ticks.forEach(v=>out+=`<line class="grid" x1="${l}" y1="${y(v)}" x2="${W-r}" y2="${y(v)}"/><text x="${l-8}" y="${y(v)+4}" text-anchor="end">${v}</text>`);out+=`<line class="axis" x1="${l}" y1="${t}" x2="${l}" y2="${H-b}"/><line class="axis" x1="${l}" y1="${H-b}" x2="${W-r}" y2="${H-b}"/>`;c.x.forEach((v,i)=>out+=`<text x="${xs[i]}" y="${H-b+24}" text-anchor="middle">${v}</text>`);c.series.forEach((s,k)=>{let pts=s.v.map((v,i)=>`${xs[i]},${y(v)}`).join(' ');out+=`<polyline class="series ${k%2?'dash':''}" points="${pts}"/>`;s.v.forEach((v,i)=>out+=k%3===0?`<circle class="marker" cx="${xs[i]}" cy="${y(v)}" r="4"/>`:k%3===1?`<rect class="marker" x="${xs[i]-4}" y="${y(v)-4}" width="8" height="8"/>`:`<polygon class="marker" points="${xs[i]},${y(v)-6} ${xs[i]-6},${y(v)+5} ${xs[i]+6},${y(v)+5}"/>`)});out+=`<text x="380" y="${H-8}" text-anchor="middle">${c.xlabel||''}</text><text x="18" y="220" text-anchor="middle" transform="rotate(-90 18 220)">${c.ylabel||''}</text><g class="legend">`;c.series.forEach((s,k)=>out+=`<text x="${90+k*155}" y="${H-30}">${['●','■','▲'][k%3]} ${s.n}</text>`);return out+'</g></svg>'}
function boot(){const L=['A','B','C','D'];let current=0,submitted=false,left=TEST.minutes*60;const marked=new Set(),form=document.querySelector('#form'),palette=document.querySelector('#palette');
function solutionHTML(x){const index=TEST.questions.indexOf(x),custom=typeof SOLUTIONS!=='undefined'&&SOLUTIONS[index];if(custom)return '<h3>Detailed Solution</h3><div class="worked-solution">'+custom+'</div><div class="final-answer">Final Answer: ('+x.a+') '+x.o[L.indexOf(x.a)]+'</div>';const q=x.q.toLowerCase();let formula='<span class="math">Required value = value read from the graph</span>';if(q.includes('average'))formula='<span class="math">Average = <span class="frac"><span>Sum of observations</span><span>Number of observations</span></span></span>';else if(q.includes('percentage')||q.includes('percent')||q.includes('growth'))formula='<span class="math">Percentage change = <span class="frac"><span>New value − Original value</span><span>Original value</span></span> × 100</span>';return '<h3>Detailed Solution</h3><div class="formula-box">'+formula+'</div><p>Read the required values from the graph, apply the displayed relationship and compare the result with the options.</p><div class="final-answer">Final Answer: ('+x.a+') '+x.o[L.indexOf(x.a)]+'</div>'}
function render(){document.querySelector('title').textContent=TEST.title;document.querySelector('#title').textContent=TEST.title;document.querySelector('#meta').textContent=`LRDI | ${TEST.title} | ${TEST.questions.length} Questions | ${TEST.minutes} Minutes | +3 correct, -1 wrong`;form.innerHTML=TEST.questions.map((x,i)=>`<article class="question" id="card${i}"><div class="qhead">Question ${i+1} of ${TEST.questions.length}</div><section class="source"><p class="directions"><strong>${TEST.sets[x.set].text}</strong></p>${TEST.sets[x.set].svg}</section><section class="qbody"><h2>Q${i+1}. ${x.q}</h2><div class="options">${x.o.map((v,j)=>`<label class="option"><input type="radio" name="q${i}" value="${L[j]}"><span>(${L[j]}) ${v}</span></label>`).join('')}</div><div class="note" id="note${i}"></div><div class="solution" id="solution${i}">${solutionHTML(x)}</div></section></article>`).join('')+`<div class="nav"><button type="button" class="mark-btn" id="mark">Mark for Review</button><button type="button" class="secondary" id="clear">Clear Response</button><button type="button" class="secondary" id="prev">Previous</button><button type="button" id="next">Save & Next</button></div><div class="actions"><button type="submit" id="submit">Submit Test</button></div>`;palette.innerHTML=TEST.questions.map((_,i)=>`<button type="button" class="dot" data-i="${i}">${i+1}</button>`).join('');form.querySelectorAll('input').forEach(e=>e.addEventListener('change',state));palette.querySelectorAll('.dot').forEach(e=>e.onclick=()=>show(+e.dataset.i));document.querySelector('#prev').onclick=()=>show(current-1);document.querySelector('#next').onclick=()=>show(current+1);document.querySelector('#mark').onclick=()=>{marked.has(current)?marked.delete(current):marked.add(current);state()};document.querySelector('#clear').onclick=()=>{if(submitted)return;form.querySelectorAll(`[name="q${current}"]`).forEach(e=>e.checked=false);state()};document.querySelector('#sideSubmit').onclick=()=>submit();show(0);state()}
function ans(i){return form.querySelector(`input[name="q${i}"]:checked`)?.value||''}function state(){TEST.questions.forEach((_,i)=>{let d=palette.querySelector(`[data-i="${i}"]`);d.classList.toggle('answered',!!ans(i));d.classList.toggle('marked',marked.has(i))});document.querySelector('#mark').textContent=marked.has(current)?'Unmark Review':'Mark for Review'}function show(i){if(i<0||i>=TEST.questions.length)return;current=i;form.querySelectorAll('.question').forEach((e,j)=>e.classList.toggle('active',j===i));palette.querySelectorAll('.dot').forEach((e,j)=>e.classList.toggle('active',j===i));document.querySelector('#prev').disabled=i===0||submitted;document.querySelector('#next').disabled=i===TEST.questions.length-1||submitted;state()}
function submit(e){e?.preventDefault();if(submitted)return;submitted=true;let c=0,w=0,u=0;TEST.questions.forEach((x,i)=>{let a=ans(i),card=document.querySelector(`#card${i}`),note=document.querySelector(`#note${i}`),solution=document.querySelector(`#solution${i}`);solution.style.display="block";form.querySelectorAll(`[name="q${i}"]`).forEach(z=>z.disabled=true);if(!a){u++;card.classList.add('missed');note.className='note muted';note.textContent=`Unattempted. Correct answer: (${x.a}) ${x.o[L.indexOf(x.a)]}`}else if(a===x.a){c++;card.classList.add('correct');note.className='note ok';note.textContent=`Correct: (${x.a}) ${x.o[L.indexOf(x.a)]}`}else{w++;card.classList.add('wrong');note.className='note bad';note.textContent=`Incorrect. Correct answer: (${x.a}) ${x.o[L.indexOf(x.a)]}`}});document.querySelector('#result').style.display='block';document.querySelector('#result').innerHTML=`<div class="score"><div>Score<strong>${c*3-w}</strong></div><div>Correct<strong>${c}</strong></div><div>Wrong<strong>${w}</strong></div><div>Unattempted<strong>${u}</strong></div></div>`;document.querySelectorAll('#prev,#next,#submit,#clear,#mark,#sideSubmit').forEach(e=>e.disabled=true);show(current)}
function tick(){let m=String(Math.floor(left/60)).padStart(2,'0'),s=String(left%60).padStart(2,'0');document.querySelector('#time').textContent=`${m}:${s}`;if(left--<=0)submit()}let memory=0,expression='';const display=document.querySelector('#display'),sub=document.querySelector('#calcSub');function calcValue(){let safe=expression.replace(/%/g,'/100');if(!/^[0-9+\-*/. ()]+$/.test(safe))throw Error();return Function(`"use strict";return (${safe})`)()}const calcDialog=document.querySelector('#calculator'),calcHandle=calcDialog.querySelector('.calc-head');let drag=null;document.querySelector('#calcOpen').onclick=()=>calcDialog.showModal();document.querySelector('#calcClose').onclick=()=>calcDialog.close();calcHandle.addEventListener('pointerdown',e=>{if(e.target.closest('button'))return;const r=calcDialog.getBoundingClientRect();calcDialog.style.margin='0';calcDialog.style.left=r.left+'px';calcDialog.style.top=r.top+'px';drag={x:e.clientX-r.left,y:e.clientY-r.top};calcHandle.setPointerCapture(e.pointerId);e.preventDefault()});calcHandle.addEventListener('pointermove',e=>{if(!drag)return;const maxX=Math.max(0,window.innerWidth-calcDialog.offsetWidth),maxY=Math.max(0,window.innerHeight-calcDialog.offsetHeight);calcDialog.style.left=Math.min(maxX,Math.max(0,e.clientX-drag.x))+'px';calcDialog.style.top=Math.min(maxY,Math.max(0,e.clientY-drag.y))+'px'});function stopDrag(e){drag=null;if(calcHandle.hasPointerCapture&&calcHandle.hasPointerCapture(e.pointerId))calcHandle.releasePointerCapture(e.pointerId)}calcHandle.addEventListener('pointerup',stopDrag);calcHandle.addEventListener('pointercancel',stopDrag);document.querySelector('#keys').onclick=e=>{const b=e.target.closest('button');if(!b)return;const k=b.dataset.calc;if(/^[0-9.]$/.test(k)){expression=expression==='0'?k:expression+k}else if(['+','-','*','/'].includes(k)){expression+=(expression?` ${k} `:'0 '+k+' ')}else if(k==='C'){expression='';display.value='0'}else if(k==='B'){expression=expression.trim().slice(0,-1).trim()}else if(k==='+/-'){try{expression=String(-calcValue())}catch{}}else if(k==='%'){expression+='%' }else if(k==='sqrt'){try{expression=String(Math.sqrt(calcValue()))}catch{expression='Error'}}else if(k==='1/x'){try{expression=String(1/calcValue())}catch{expression='Error'}}else if(k==='='){try{expression=String(Number(calcValue().toFixed(10)))}catch{expression='Error'}}else if(k==='MS'){try{memory=calcValue()}catch{}}else if(k==='MR'){expression=String(memory)}else if(k==='MC'){memory=0}else if(k==='M+'){try{memory+=calcValue()}catch{}}else if(k==='M-'){try{memory-=calcValue()}catch{}}display.value=expression||'0';sub.textContent=`M: ${Number(memory.toFixed(10))}`};form.addEventListener('submit',submit);render();tick();setInterval(()=>{if(!submitted)tick()},1000);}

const TEST={title:'DI Line Graph Test -4',minutes:35,sets:[

`<p>Percentage declines are compared relative to the earlier year. The fall from 632 to 330 in 2007–08 is <span class="frac"><span>302</span><span>632</span></span> × 100 ≈ 47.8%, greater than the other declines.</p>`,

`<p>For 2009, volume sold = 73.8 million/45 = 1.64 million units. Profit per unit = 45 − 20 = ₹25. Profit for eight months = 1.64 million × ₹25 = ₹41 million = ₹410 lakh. Since the 2009 figures are through August, annualise by multiplying by 12/8: ₹410 lakh × 12/8 = ₹615 lakh, closest to ₹618 lakh.</p>`,
`<p>Profit exceeds 10% of turnover when the point lies above the line Profit = 0.1 × Turnover. Counting such points in the scatter plot gives 7 companies.</p>`,

`<p>At 20 units, revenue = ₹400 and variable cost ≈ ₹275. After fixed cost ₹60, profit ≈ ₹65, which is at least ₹50. Smaller offered outputs do not meet the target; hence 20.</p>`,
