<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DI PIE CHART -2 ( 40 MINUTES )</title>
  <style>
    :root{--brand:#0f4c81;--brand-dark:#0a3357;--line:#c9d3df;--ink:#111827;--muted:#6b7280;--ok:#157347;--bad:#b02a37}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:#eef2f6}
    header{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px}
    .topbar{width:100%;display:flex;align-items:center;gap:14px}.topbar h1{font-size:20px;margin:0;color:var(--brand-dark)}.meta{font-size:13px;color:var(--muted);margin-top:3px}.pill{margin-left:auto;border:1px solid var(--line);border-radius:6px;padding:8px 12px;background:#f8fafc;font-weight:700}.pill+.pill{margin-left:0}.calc-open{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:9px 14px;font-weight:700;cursor:pointer}
    main{height:calc(100vh - 64px);display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:10px;padding:10px}main>section,aside{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:0;overflow:hidden}
    #testForm{height:100%;display:grid;grid-template-rows:minmax(0,1fr) auto auto;overflow:hidden}#result,.question{padding:12px}#result{display:none}.question{display:none}.question.active{display:grid;grid-template-columns:minmax(0,1.18fr) minmax(390px,.82fr);gap:10px;height:100%;min-height:0}.question h2{margin:0 0 12px;font-size:17px;line-height:1.32}
    .set-info,.question-body{border:1px solid var(--line);border-radius:8px;background:#fff;min-height:0;height:100%;overflow:auto}.source-card{padding:10px}.chart-svg{width:100%;height:auto;display:block}.source-card .chart-svg text{font-size:16px!important}.source-card .chart-svg text.big{font-size:18px!important}.source-card .chart-svg text.title{font-size:20px!important;font-weight:700}.question-body{padding:14px}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px}label.option{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--line);border-radius:6px;padding:10px;background:#fbfcfd;cursor:pointer;font-size:16px;min-height:42px}input[type=radio]{width:17px;height:17px;margin-top:3px;accent-color:var(--brand)}.text-answer{width:100%;max-width:260px;border:1px solid var(--line);border-radius:6px;padding:12px 14px;font-size:19px}
    .question-nav,.actions{display:flex;justify-content:space-between;gap:10px;margin:8px 12px 0;flex-wrap:wrap}button{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer}button.secondary{background:#e8edf4;color:var(--ink)}button:disabled{opacity:.55}
    aside{padding:14px;overflow:auto}.panel-title{font-size:17px;margin:0 0 12px;color:var(--brand-dark)}.palette{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.dot{height:38px;border-radius:6px;border:1px solid var(--line);background:#f8fafc;color:var(--ink);font-weight:700}.dot.active{background:var(--brand);color:#fff}.dot.answered{border-color:var(--ok);box-shadow:inset 0 -4px 0 rgba(21,115,71,.4)}
    .score-grid{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:9px;margin-top:12px}.score-box{border:1px solid var(--line);border-radius:6px;padding:9px;background:#fbfcfd}.score-box strong{display:block;font-size:22px}.answer-note{margin-top:12px;font-weight:700}.answer-note.ok{color:var(--ok)}.answer-note.bad{color:var(--bad)}.answer-note.muted{color:var(--muted)}.correct{background:#eef8f2}.wrong{background:#fff1f2}.missed{background:#f6f7f9}
    .calculator-dialog{width:min(360px,calc(100vw - 28px));max-width:360px;margin:0;inset:90px auto auto 50%;transform:translateX(-50%);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:0 12px 34px rgba(15,23,42,.2)}.calculator-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;cursor:move}.calculator-head h2{margin:0;color:var(--brand-dark);font-size:18px}.calc-close{background:#eef2f6;color:var(--ink);width:34px;height:34px;padding:0}.calc-display{width:100%;border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px;background:#fbfcfd;font-size:22px;font-weight:700;text-align:right}.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.calc-key{min-height:44px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:var(--ink);font-size:17px;font-weight:700}.calc-key.equal{background:var(--brand);color:#fff;grid-column:span 2}.calc-key.clear{color:var(--bad)}
  </style>
</head>
<body>
  <header><div class="topbar"><div><h1>DI PIE CHART -2 ( 40 MINUTES )</h1><div class="meta">20 Questions | 40 Minutes</div></div><div class="pill">Time Left: <span id="time">40:00</span></div><div class="pill">Answered: <span id="answeredCount">0</span>/20</div><button class="calc-open" type="button" id="openCalculator">Calculator</button></div></header>
  <main><section><section id="result"></section><form id="testForm"></form></section><aside><h2 class="panel-title">Question Palette</h2><div class="palette" id="palette"></div></aside></main>
  <dialog class="calculator-dialog" id="calculatorDialog"><div class="calculator-head"><h2>Calculator</h2><button class="calc-close" type="button" id="closeCalculator">x</button></div><input class="calc-display" id="calcDisplay" value="0"><div class="calc-grid" id="calcKeys"><button class="calc-key clear" type="button" data-action="clear">C</button><button class="calc-key" type="button" data-action="backspace">DEL</button><button class="calc-key" type="button" data-value="%">%</button><button class="calc-key" type="button" data-value="/">/</button><button class="calc-key" type="button" data-value="7">7</button><button class="calc-key" type="button" data-value="8">8</button><button class="calc-key" type="button" data-value="9">9</button><button class="calc-key" type="button" data-value="*">x</button><button class="calc-key" type="button" data-value="4">4</button><button class="calc-key" type="button" data-value="5">5</button><button class="calc-key" type="button" data-value="6">6</button><button class="calc-key" type="button" data-value="-">-</button><button class="calc-key" type="button" data-value="1">1</button><button class="calc-key" type="button" data-value="2">2</button><button class="calc-key" type="button" data-value="3">3</button><button class="calc-key" type="button" data-value="+">+</button><button class="calc-key" type="button" data-value="0">0</button><button class="calc-key" type="button" data-value=".">.</button><button class="calc-key equal" type="button" data-action="equals">=</button></div></dialog>
  <script>
    const optionLabels=["A","B","C","D"];
    const questions=[
      {set:1,type:"text",q:"How many of the men surveyed were of age 35 years or above?",answer:"5760"},
      {set:1,type:"text",q:"At most what percentage of the businessmen were less than 25 years old?",answer:"72"},
      {set:1,type:"mcq",q:"If all men of age 75 years or above were from the same profession, their profession can be",options:["Businessman","Engineer","Doctor","More than one of the above"],answer:"D"},
      {set:1,type:"text",q:"If all the engineers were younger than 45 years of age, then at least what percentage of the engineers were of age 35 or above and less than 45 years.",answer:"10"},
      {set:1,type:"text",q:"At least what percentage of the men were less than 75 years of age and are neither engineers nor doctors?",answer:"30"},
      {set:2,type:"mcq",q:"If the number of schools with students ranging from 1000 to less than 1500 in the year 2016 is equal to the number of schools with students ranging from 500 to less than 1000 in 2017, then what is the percentage increase in the total number of schools from 2016 to 2017?",options:["16.66%","20%","25%","33.33%"],answer:"B"},
      {set:2,type:"mcq",q:"If the ratio of the total number of schools in 2016 and 2017 is 7 : 8, then for which of the following categories of schools is the percentage change in the number of schools from 2016 to 2017, the highest?",options:["A","B","C","E"],answer:"D"},
      {set:2,type:"mcq",q:"In 2016, if there are at the most 50 schools which have less than 500 students, then what is the least number of schools with less than 500 students in 2017, given that the total number of schools in 2017 is greater than that in 2016?",options:["58","63","70","120"],answer:"C"},
      {set:2,type:"mcq",q:"What is the least number of students studying in these schools in the year 2017?",options:["83,535","1,26,685","1,51,035","1,62,500"],answer:"A"},
      {set:2,type:"mcq",q:"In the year 2017, what is the least difference between the number of students in schools having 1000 or more but less than 1500 students and the number of students in schools having 1500 or more but less than 2000 students?",options:["17","16","1250","1561"],answer:"B"},
      {set:3,type:"mcq",q:"If the ratio of the incomes of Mr. and Mrs. Iyer is 4 : 3, then what percentage of their total income is invested in equities?",options:["3.82%","4.43%","4.78%","5.21%"],answer:"B"},
      {set:3,type:"mcq",q:"If the total money invested by them in fixed deposits forms 15% of Mrs. Iyer's income, then what is the ratio of the incomes of Mr. and Mrs. Iyer?",options:["4 : 5","3 : 2","7 : 5","None of these"],answer:"D"},
      {set:3,type:"mcq",q:"If the amount spent by Mr. Iyer on clothes is more than that by Mrs. Iyer, then the amount spent by Mr. Iyer on which of following is definitely more than that by Mrs. Iyer? (1) Groceries (2) Medicines (3) Others (4) Entertainment",options:["Only 1 and 2","Only 1, 3 and 4","Only 2, 3 and 4","Only 2 and 3"],answer:"C"},
      {set:3,type:"mcq",q:"If the amount they invested in equities form 4.55% of their combined total income, then Mrs. Iyer's salary is what percentage of Mr. Iyer's salary?",options:["66.66","81.81","122.22","75"],answer:"C"},
      {set:3,type:"mcq",q:"If the amount that is invested in savings accounts is the same as what Mr. Iyer spent on groceries, then the ratio of the amounts spent by Mr. and Mrs. Iyer towards entertainment is",options:["10 : 3","3 : 1","5 : 3","2 : 1"],answer:"A"},
      {set:4,type:"mcq",q:"What is the ratio of the quantity of wheat produced to that exported in 1999?",options:["64 : 25","50 : 27","62 : 27","54 : 29"],answer:"A"},
      {set:4,type:"mcq",q:"If the export of wheat in 1999 was 200 million tonnes, then what was the production (in million tonnes) in 1999?",options:["356","465","512","655"],answer:"C"},
      {set:4,type:"mcq",q:"The export of wheat in 1997 forms what percentage of the production in that year?",options:["24.35","22.15","26.50","28.12"],answer:"D"},
      {set:4,type:"mcq",q:"By what percentage is the export in 2001 more than that in 1998, if the total production of wheat in 1997 was 1024 million tonnes?",options:["70%","120%","140%","80%"],answer:"C"},
      {set:4,type:"mcq",q:"If the production of wheat in 1998 was 1272 million tonnes, then what was the quantity of wheat exported in 1997 (in million tonnes)?",options:["240.5","365.2","425.6","None of these"],answer:"D"}
    ];
    function defs(id){return `<defs><pattern id="v-${id}" width="8" height="8" patternUnits="userSpaceOnUse"><path d="M2 0v8M6 0v8" stroke="#111" stroke-width="1.7"/></pattern><pattern id="h-${id}" width="8" height="8" patternUnits="userSpaceOnUse"><path d="M0 2h8M0 6h8" stroke="#111" stroke-width="1.7"/></pattern><pattern id="d-${id}" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M-2 10L10 -2M2 12L12 2" stroke="#111" stroke-width="2"/></pattern><pattern id="dot-${id}" width="10" height="10" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.3" fill="#111"/></pattern><pattern id="grid-${id}" width="12" height="12" patternUnits="userSpaceOnUse"><path d="M0 0h12v12H0z" fill="#fff"/><path d="M0 0h12M0 6h12M0 12h12M0 0v12M6 0v12M12 0v12" stroke="#111" stroke-width="1"/></pattern><pattern id="brick-${id}" width="14" height="12" patternUnits="userSpaceOnUse"><path d="M0 0h14v12H0z" fill="#fff"/><path d="M0 0h14M0 6h14M0 12h14M4 0v6M10 6v6" stroke="#111" stroke-width="1"/></pattern></defs>`}
    function polar(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)]}
    function sector(cx,cy,r,start,angle,fill){const p1=polar(cx,cy,r,start),p2=polar(cx,cy,r,start+angle);return `<path d="M${cx} ${cy} L${p1[0].toFixed(1)} ${p1[1].toFixed(1)} A${r} ${r} 0 ${angle>180?1:0} 1 ${p2[0].toFixed(1)} ${p2[1].toFixed(1)} Z" fill="${fill}" stroke="#111" stroke-width="2"/>`}
    function pie(cx,cy,r,angles,fills){let s=0,out="";angles.forEach((a,i)=>{out+=sector(cx,cy,r,s,a,fills[i]);s+=a});return out+`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#111" stroke-width="2.4"/>`}
    function line(x1,y1,x2,y2){return `<path d="M${x1} ${y1} L${x2} ${y2}" stroke="#111" stroke-width="2" fill="none"/>`}
    function setInfo(set,i){const id=`s${i}`;if(set===1)return `<div class="source-card"><svg class="chart-svg" viewBox="0 0 1000 520">${defs(id)}<text x="28" y="32" class="big">The following pie charts show the results of a survey among working men in a colony.</text><text x="250" y="76" class="title" text-anchor="middle">Percentage distribution by age</text><text x="750" y="76" class="title" text-anchor="middle">Percentage distribution by Profession</text>${pie(250,260,115,[36,72,54,108,18,36,36],[`url(#v-${id})`,`url(#dot-${id})`,`url(#d-${id})`,`url(#dot-${id})`,"#fff",`url(#grid-${id})`,"#fff"])}${pie(750,260,115,[100,80,60,70,50],[`url(#v-${id})`,`url(#grid-${id})`,`url(#dot-${id})`,`url(#d-${id})`,"#fff"])}<text x="250" y="500" class="title" text-anchor="middle">Total number of men surveyed = 7200</text><text x="90" y="150">&lt; 35 and ≥ 25<tspan x="130" dy="22">10%</tspan></text><text x="430" y="160">≥ 75<tspan x="435" dy="22">20%</tspan></text><text x="80" y="250">&lt; 55 and ≥ 45<tspan x="125" dy="22">5%</tspan></text><text x="90" y="380">&lt; 65 and ≥ 55<tspan x="145" dy="22">30%</tspan></text><text x="610" y="135">Businessmen<tspan x="650" dy="22">50°</tspan></text><text x="855" y="145">Doctors<tspan x="875" dy="22">100°</tspan></text><text x="865" y="340">Engineers<tspan x="895" dy="22">80°</tspan></text><text x="610" y="350">Lawyers<tspan x="635" dy="22">60°</tspan></text><text x="600" y="260">Others<tspan x="620" dy="22">70°</tspan></text></svg></div>`;
      if(set===2)return `<div class="source-card"><svg class="chart-svg" viewBox="0 0 1000 550">${defs(id)}<text x="48" y="32" class="big">The two pie charts given below show the distribution of schools, based on the number of students in them, over two years.</text><text x="260" y="72" class="title" text-anchor="middle">2016</text><text x="730" y="72" class="title" text-anchor="middle">2017</text>${pie(260,245,115,[108,72,64.8,61.2,54],[`url(#h-${id})`,`url(#dot-${id})`,`url(#d-${id})`,`url(#brick-${id})`,"#fff"])}${pie(730,245,115,[126,54,57.6,57.6,64.8],[`url(#h-${id})`,`url(#dot-${id})`,`url(#v-${id})`,`url(#brick-${id})`,"#fff"])}<text x="365" y="120">A<tspan x="365" dy="22">30%</tspan></text><text x="370" y="355">B<tspan x="370" dy="22">20%</tspan></text><text x="150" y="360">C<tspan x="150" dy="22">18%</tspan></text><text x="95" y="210">D<tspan x="95" dy="22">17%</tspan></text><text x="155" y="130">E<tspan x="155" dy="22">15%</tspan></text><text x="850" y="120">A<tspan x="850" dy="22">35%</tspan></text><text x="850" y="380">B<tspan x="850" dy="22">15%</tspan></text><text x="630" y="370">C<tspan x="630" dy="22">16%</tspan></text><text x="595" y="220">D<tspan x="595" dy="22">16%</tspan></text><text x="620" y="130">E<tspan x="620" dy="22">18%</tspan></text><text x="45" y="465">A = number of schools with one or more but less than 500 students.</text><text x="45" y="490">B = number of schools with 500 or more but less than 1000 students.</text><text x="45" y="515">C = number of schools with 1000 or more but less than 1500 students.</text><text x="45" y="540">D = number of schools with 1500 or more but less than 2000 students. E = 2000 or more.</text></svg></div>`;
      if(set===3)return `<div class="source-card"><svg class="chart-svg" viewBox="0 0 1000 870">${defs(id)}<text x="20" y="32" class="big">The pie charts show the distribution of the annual expenses and savings by Mr. and Mrs. Iyer and also the distribution of investment of their combined savings.</text><text x="245" y="85" class="title" text-anchor="middle">Mr. Iyer</text><text x="750" y="85" class="title" text-anchor="middle">Mrs. Iyer</text>${pie(245,255,120,[36,54,72,28.8,97.2,72],["#fff",`url(#dot-${id})`,`url(#d-${id})`,`url(#dot-${id})`,`url(#v-${id})`,`url(#grid-${id})`])}${pie(750,255,120,[90,72,18,36,54,90],["#fff",`url(#dot-${id})`,`url(#d-${id})`,`url(#dot-${id})`,`url(#v-${id})`,`url(#grid-${id})`])}<text x="470" y="465" class="title">Distribution of Savings</text>${pie(500,640,120,[72,36,54,18,108,72],[`url(#dot-${id})`,`url(#d-${id})`,`url(#dot-${id})`,`url(#h-${id})`,"#fff",`url(#dot-${id})`])}<text x="320" y="160">Savings<tspan x="320" dy="22">20%</tspan></text><text x="380" y="160">Groceries<tspan x="385" dy="22">10%</tspan></text><text x="405" y="250">Clothes<tspan x="420" dy="22">15%</tspan></text><text x="385" y="360">Entertainment<tspan x="430" dy="22">20%</tspan></text><text x="55" y="350">Medicines<tspan x="70" dy="22">27%</tspan></text><text x="870" y="160">Groceries<tspan x="895" dy="22">25%</tspan></text><text x="870" y="350">Clothes<tspan x="890" dy="22">20%</tspan></text><text x="565" y="340">Medicines<tspan x="590" dy="22">15%</tspan></text><text x="570" y="165">Savings<tspan x="590" dy="22">25%</tspan></text><text x="670" y="505">Equities<tspan x="685" dy="22">20%</tspan></text><text x="745" y="625">Bonds<tspan x="760" dy="22">10%</tspan></text><text x="655" y="760">Gold<tspan x="670" dy="22">15%</tspan></text><text x="260" y="750">Fixed deposits<tspan x="300" dy="22">30%</tspan></text><text x="20" y="845" class="big">The total expenditure on any of the heads and also of the savings is the sum of the values of both the persons on that particular item.</text></svg></div>`;
      return `<div class="source-card"><svg class="chart-svg" viewBox="0 0 1000 500">${defs(id)}<text x="30" y="35" class="big">The following pie charts represent the production and export of wheat in the years from 1997 to 2001.</text><text x="285" y="90" class="title" text-anchor="middle">Production</text><text x="735" y="90" class="title" text-anchor="middle">Export</text>${pie(285,265,120,[72,72,86.4,64.8,64.8],[`url(#d-${id})`,`url(#dot-${id})`,`url(#v-${id})`,`url(#brick-${id})`,"#fff"])}${pie(735,265,120,[54,36,90,93.6,86.4],[`url(#d-${id})`,`url(#dot-${id})`,`url(#v-${id})`,`url(#brick-${id})`,"#fff"])}<text x="390" y="135">1997<tspan x="390" dy="22">20%</tspan></text><text x="420" y="300">1998<tspan x="420" dy="22">20%</tspan></text><text x="135" y="350">1999<tspan x="135" dy="22">24%</tspan></text><text x="90" y="235">2000<tspan x="90" dy="22">18%</tspan></text><text x="130" y="125">2001<tspan x="130" dy="22">18%</tspan></text><text x="850" y="135">1997<tspan x="850" dy="22">15%</tspan></text><text x="890" y="235">1998<tspan x="890" dy="22">10%</tspan></text><text x="855" y="360">1999<tspan x="855" dy="22">25%</tspan></text><text x="600" y="365">2000<tspan x="600" dy="22">26%</tspan></text><text x="600" y="150">2001<tspan x="600" dy="22">24%</tspan></text><text x="30" y="470" class="big">The ratio of quantity of wheat produced to quantity of wheat exported in 1998 is 16 : 3.</text></svg></div>`}
    const form=document.getElementById("testForm"),resultBox=document.getElementById("result"),palette=document.getElementById("palette"),answeredCount=document.getElementById("answeredCount"),time=document.getElementById("time"),calculatorDialog=document.getElementById("calculatorDialog"),calcDisplay=document.getElementById("calcDisplay");let submitted=false,secondsLeft=40*60,currentQuestionIndex=0;
    function correctAnswerText(item){return item.type==="text"?item.answer:`(${item.answer}) ${item.options[optionLabels.indexOf(item.answer)]}`}function renderQuestions(){form.innerHTML=questions.map((item,index)=>{const control=item.type==="text"?`<input class="text-answer" name="q${index}" autocomplete="off">`:`<div class="options">${item.options.map((o,i)=>`<label class="option"><input type="radio" name="q${index}" value="${optionLabels[i]}"><span>(${optionLabels[i]}) ${o}</span></label>`).join("")}</div>`;return `<div class="question" id="qcard-${index}"><div class="set-info">${setInfo(item.set,index)}</div><div class="question-body"><h2>Q${index+1}. ${item.q}</h2>${control}<div class="answer-note" id="note-${index}"></div></div></div>`}).join("")+`<div class="question-nav"><button class="secondary" type="button" id="prevQuestion">Previous</button><button class="secondary" type="button" id="nextQuestion">Save & Next</button></div><div class="actions"><button type="submit" id="submitBtn">Submit Test</button><button class="secondary" type="button" id="clearAnswers">Clear Responses</button></div>`;palette.innerHTML=questions.map((_,i)=>`<button class="dot" type="button" data-target="${i}">${i+1}</button>`).join("");palette.querySelectorAll(".dot").forEach(b=>b.addEventListener("click",()=>showQuestion(Number(b.dataset.target))));form.querySelectorAll("input").forEach(input=>{input.addEventListener("change",updateAnsweredState);input.addEventListener("input",updateAnsweredState)});document.getElementById("prevQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex-1));document.getElementById("nextQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex+1));document.getElementById("clearAnswers").addEventListener("click",()=>{if(submitted)return;form.reset();updateAnsweredState();showQuestion(currentQuestionIndex)});showQuestion(0)}
    function showQuestion(i){if(i<0||i>=questions.length)return;currentQuestionIndex=i;document.querySelectorAll(".question").forEach((c,n)=>c.classList.toggle("active",n===i));palette.querySelectorAll(".dot").forEach((d,n)=>d.classList.toggle("active",n===i));document.getElementById("prevQuestion").disabled=i===0||submitted;document.getElementById("nextQuestion").disabled=i===questions.length-1||submitted}function getAnswer(i){const item=questions[i];if(item.type==="text"){const el=document.querySelector(`[name="q${i}"]`);return el?el.value.trim():""}const s=document.querySelector(`input[name="q${i}"]:checked`);return s?s.value:""}function norm(v){return String(v).replace(/,/g,"").trim().toLowerCase()}function updateAnsweredState(){let a=0;questions.forEach((_,i)=>{const has=!!getAnswer(i);if(has)a++;const dot=palette.querySelector(`[data-target="${i}"]`);if(dot)dot.classList.toggle("answered",has)});answeredCount.textContent=a}
    function updateTimer(){const m=String(Math.floor(secondsLeft/60)).padStart(2,"0"),s=String(secondsLeft%60).padStart(2,"0");time.textContent=`${m}:${s}`;if(secondsLeft<=0){submitTest();return}secondsLeft--}function submitTest(e){if(e)e.preventDefault();if(submitted)return;submitted=true;let c=0,w=0,u=0;questions.forEach((item,i)=>{const ans=getAnswer(i),card=document.getElementById(`qcard-${i}`),note=document.getElementById(`note-${i}`),ok=item.type==="text"?norm(ans)===norm(item.answer):ans===item.answer;document.querySelectorAll(`[name="q${i}"]`).forEach(x=>x.disabled=true);if(!ans){u++;card.classList.add("missed");note.className="answer-note muted";note.textContent=`Unattempted. Correct answer: ${correctAnswerText(item)}`}else if(ok){c++;card.classList.add("correct");note.className="answer-note ok";note.textContent=`Correct. Correct answer: ${correctAnswerText(item)}`}else{w++;card.classList.add("wrong");note.className="answer-note bad";note.textContent=`Incorrect. Correct answer: ${correctAnswerText(item)}`}});resultBox.style.display="block";resultBox.innerHTML=`<h2>Test Summary</h2><div class="score-grid"><div class="score-box">Score<strong>${c} / ${questions.length}</strong></div><div class="score-box">Correct<strong>${c}</strong></div><div class="score-box">Wrong<strong>${w}</strong></div><div class="score-box">Unattempted<strong>${u}</strong></div></div>`;document.querySelectorAll(".question").forEach(x=>x.classList.add("active"));["prevQuestion","nextQuestion","submitBtn","clearAnswers"].forEach(id=>document.getElementById(id).disabled=true)}
    function appendCalcValue(v){if(calcDisplay.value==="0"||calcDisplay.value==="Error")calcDisplay.value=v==="."?"0.":v;else calcDisplay.value+=v}function calculateExpression(){try{const exp=calcDisplay.value.trim();if(!/^[0-9+\-*/%. ()]+$/.test(exp))throw Error();const val=Function(`"use strict"; return (${exp})`)();calcDisplay.value=Number.isFinite(val)?String(Number(val.toFixed(10))):"Error"}catch{calcDisplay.value="Error"}}document.getElementById("openCalculator").addEventListener("click",()=>calculatorDialog.showModal());document.getElementById("closeCalculator").addEventListener("click",()=>calculatorDialog.close());document.getElementById("calcKeys").addEventListener("click",e=>{const k=e.target.closest("button");if(!k)return;if(k.dataset.action==="clear")calcDisplay.value="0";else if(k.dataset.action==="backspace")calcDisplay.value=calcDisplay.value.length>1?calcDisplay.value.slice(0,-1):"0";else if(k.dataset.action==="equals")calculateExpression();else if(k.dataset.value)appendCalcValue(k.dataset.value)});
    renderQuestions();updateAnsweredState();updateTimer();const timerId=setInterval(()=>{if(submitted){clearInterval(timerId);return}updateTimer()},1000);form.addEventListener("submit",submitTest);
  </script>
</body>
