    "options": [

    "answer": "D",
    "passage": "<p><strong><em>Directions for Questions 1 to 15: Answer on the basis of the information provided in the table given below.</em></strong></p><p>The following table gives the product-wise sales value for ABCDE Limited for the period 2007-08 to 2012-13.</p><div class=\"table-wrap\"><table class=\"sales-table\"><thead><tr><th rowspan=\"2\">Year</th><th colspan=\"5\">Product Sales (Value in Rs. '000s)</th></tr><tr><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th></tr></thead><tbody><tr><td>2007-08</td><td>564</td><td>850</td><td>620</td><td>690</td><td>564</td></tr><tr><td>2008-09</td><td>625</td><td>965</td><td>780</td><td>795</td><td>965</td></tr><tr><td>2009-10</td><td>641</td><td>885</td><td>820</td><td>740</td><td>740</td></tr><tr><td>2010-11</td><td>689</td><td>1020</td><td>910</td><td>800</td><td>1020</td></tr><tr><td>2011-12</td><td>775</td><td>1280</td><td>940</td><td>850</td><td>775</td></tr><tr><td>2012-13</td><td>880</td><td>1175</td><td>1000</td><td>900</td><td>900</td></tr></tbody></table></div><p><strong>Note:</strong> SAGR = Simple Annual Growth Rate; CAGR = Compound Annual Growth Rate.</p>",
    "solution": "<p><strong>Detailed solution:</strong></p><div class=\"formula-box\"><strong>Required calculation</strong><br><span class=\"math\">Total sales in a year = A + B + C + D + E</span></div><ol class=\"solution-steps\"><li><strong>Step 1:</strong> Add the five product values for each year given in the options.</li><li><strong>Step 2:</strong> <strong>2009-10:</strong> 641 + 885 + 820 + 740 + 740 = <strong>3826</strong>.</li><li><strong>Step 3:</strong> <strong>2010-11:</strong> 689 + 1020 + 910 + 800 + 1020 = <strong>4439</strong>.</li><li><strong>Step 4:</strong> <strong>2011-12:</strong> 775 + 1280 + 940 + 850 + 775 = <strong>4620</strong>.</li><li><strong>Step 5:</strong> <strong>2012-13:</strong> 880 + 1175 + 1000 + 900 + 900 = <strong>4855</strong>.</li><li><strong>Step 6:</strong> The largest total is 4855 (Rs. &lsquo;000s), obtained in 2012-13.</li></ol><div class=\"final-answer\">Final Answer: (D) 2012-13</div>"

  {

    "options": [
      "700",

    ],
    "answer": "B",
    "passage": "<p><strong><em>Directions for Questions 1 to 15: Answer on the basis of the information provided in the table given below.</em></strong></p><p>The following table gives the product-wise sales value for ABCDE Limited for the period 2007-08 to 2012-13.</p><div class=\"table-wrap\"><table class=\"sales-table\"><thead><tr><th rowspan=\"2\">Year</th><th colspan=\"5\">Product Sales (Value in Rs. '000s)</th></tr><tr><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th></tr></thead><tbody><tr><td>2007-08</td><td>564</td><td>850</td><td>620</td><td>690</td><td>564</td></tr><tr><td>2008-09</td><td>625</td><td>965</td><td>780</td><td>795</td><td>965</td></tr><tr><td>2009-10</td><td>641</td><td>885</td><td>820</td><td>740</td><td>740</td></tr><tr><td>2010-11</td><td>689</td><td>1020</td><td>910</td><td>800</td><td>1020</td></tr><tr><td>2011-12</td><td>775</td><td>1280</td><td>940</td><td>850</td><td>775</td></tr><tr><td>2012-13</td><td>880</td><td>1175</td><td>1000</td><td>900</td><td>900</td></tr></tbody></table></div><p><strong>Note:</strong> SAGR = Simple Annual Growth Rate; CAGR = Compound Annual Growth Rate.</p>",
    "solution": "<p><strong>Detailed solution:</strong></p><div class=\"formula-box\"><strong>Average formula</strong><br><span class=\"math\">Average = <span class=\"frac\"><span>Sum of all observations</span><span>Number of observations</span></span></span></div><ol class=\"solution-steps\"><li><strong>Step 1:</strong> The six sales values of product E are 564, 965, 740, 1020, 775 and 900.</li><li><strong>Step 2:</strong> Sum = 564 + 965 + 740 + 1020 + 775 + 900 = <strong>4964</strong>.</li><li><strong>Step 3:</strong> Average sales of E = <span class=\"frac\"><span>4964</span><span>6</span></span> = 827.33 (Rs. &lsquo;000s).</li><li><strong>Step 4:</strong> Among the choices, 827.33 is closest to 825.</li></ol><div class=\"final-answer\">Final Answer: (B) 825</div>"

    "passage": "<p><strong><em>Directions for Questions 1 to 15: Answer on the basis of the information provided in the table given below.</em></strong></p><p>The following table gives the product-wise sales value for ABCDE Limited for the period 2007-08 to 2012-13.</p><div class=\"table-wrap\"><table class=\"sales-table\"><thead><tr><th rowspan=\"2\">Year</th><th colspan=\"5\">Product Sales (Value in Rs. '000s)</th></tr><tr><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th></tr></thead><tbody><tr><td>2007-08</td><td>564</td><td>850</td><td>620</td><td>690</td><td>564</td></tr><tr><td>2008-09</td><td>625</td><td>965</td><td>780</td><td>795</td><td>965</td></tr><tr><td>2009-10</td><td>641</td><td>885</td><td>820</td><td>740</td><td>740</td></tr><tr><td>2010-11</td><td>689</td><td>1020</td><td>910</td><td>800</td><td>1020</td></tr><tr><td>2011-12</td><td>775</td><td>1280</td><td>940</td><td>850</td><td>775</td></tr><tr><td>2012-13</td><td>880</td><td>1175</td><td>1000</td><td>900</td><td>900</td></tr></tbody></table></div><p><strong>Note:</strong> SAGR = Simple Annual Growth Rate; CAGR = Compound Annual Growth Rate.</p>",

    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function formatMathText(text){let out=esc(text);out=out.replace(/(\d+)(?:st|nd|rd|th)\s+power\s+of\s+([A-Za-z][A-Za-z0-9]*)/gi,'$2<sup>$1</sup>');out=out.replace(/([A-Za-z][A-Za-z0-9]*|\d+)\s+(?:raised\s+to\s+the\s+power|to\s+the\s+power)\s+(?:of\s+)?(-?\d+)/gi,'$1<sup>$2</sup>');out=out.replace(/square\s+root\s+of\s+([A-Za-z0-9]+(?:\s*[+\-*/]\s*[A-Za-z0-9]+)?)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/sqrt\s*\(([^()]+)\)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/√\s*([A-Za-z0-9]+)/g,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/([A-Za-z0-9\)])\^\s*\{?(-?\d+)\}?/g,'$1<sup>$2</sup>');out=out.replace(/(\d+)\s+(\d+)\/(\d+)/g,'$1 <span class="frac"><span>$2</span><span>$3</span></span>').replace(/(^|[^\w>])(\d+)\/(\d+)(?![\w<])/g,'$1<span class="frac"><span>$2</span><span>$3</span></span>');return out;}
    function formatFractionText(text){return formatMathText(text);}
    function formatMathHtml(html){const template=document.createElement('template');template.innerHTML=String(html ?? "");const walker=document.createTreeWalker(template.content,NodeFilter.SHOW_TEXT);const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(node=>{const span=document.createElement('span');span.innerHTML=formatMathText(node.nodeValue);node.replaceWith(...Array.from(span.childNodes));});return template.innerHTML;}

    function topicGuide(q){const title=(document.title||'').toLowerCase(), ans=rich(correctText(q));let topic='this topic', method='Start by converting the information in the question into equations or unit values. Keep the required answer in mind, then simplify step by step.', formula='Use the standard relationship stated in the question and substitute the given values carefully.';if(title.includes('average')){topic='Average';method='Use the average formula: total = average × number of observations. When an item is added, removed, replaced, or combined, compare the old total with the new total.';formula='Average = total of observations / number of observations.';}else if(title.includes('si')||title.includes('ci')||title.includes('simple')||title.includes('compound')){topic='Simple Interest and Compound Interest';method='Identify principal, rate, and time. For simple interest, interest is proportional to time. For compound interest, multiply by the growth factor for each compounding period.';formula='SI = P × R × T / 100 and CI amount = P(1 + R/100)^T, adjusted for the compounding interval.';}else if(title.includes('profit')||title.includes('loss')){topic='Profit and Loss';method='Mark the cost price, selling price, marked price, discount, and profit/loss relation separately. Convert each percentage into a multiplier before calculating.';formula='Profit% = profit / CP × 100, Loss% = loss / CP × 100, and SP = MP × (1 - discount%).';}else if(title.includes('ratio')||title.includes('proportion')||title.includes('partnership')){topic='Ratio, Proportion and Partnership';method='Convert every ratio into common units. If two ratios share a term, make that common term equal. For partnership, multiply capital by time before dividing profit.';formula='Required share = required ratio units / total ratio units × total quantity.';}return '<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li><strong>Identify the concept:</strong> This is a '+topic+' question.<     function detailedSolutionHtml(q){const sol=q.solution; if(sol && String(sol).trim()){ if(hasHtml(sol)) return rich(sol); const steps=sentenceSteps(sol); const items=steps.map((step,i)=>'<li><strong>Step '+(i+1)+':</strong> '+rich(step)+'</li>').join(''); return '<p><strong>Detailed solution:</strong></p><ol class="solution-steps">'+items+'</ol><div class="final-answer">Final Answer: '+rich(correctText(q))+'</div>'; } return topicGuide(q);}

    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
