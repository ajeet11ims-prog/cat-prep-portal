<script>
const raw = [
{q:`Directions: Read the information and answer the question.<br><br>In a family of 3 generations, there are two couples and two pairs of brothers and sisters.<br>Neeta is the sister-in-law of Leena.<br>Geeta is the daughter of Jai.<br>Jyotsna and Rajesh are the eldest couple in the family.<br>Jagdish is the son of Leena.<br>Jai is the son of Rajesh. His wife is Leena.<br><br>Leena is the .... of Rajesh.`,o:[`Aunt`,`Sister`,`Daughter`,`Daughter-in-law`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Rajesh and Jyotsna are the eldest couple.</li><li>Jai is Rajesh's son, and Leena is Jai's wife.</li><li>Therefore Leena is married to Rajesh's son.</li><li>Hence Leena is Rajesh's daughter-in-law.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>In a family of 3 generations, there are two couples and two pairs of brothers and sisters.<br>Neeta is the sister-in-law of Leena.<br>Geeta is the daughter of Jai.<br>Jyotsna and Rajesh are the eldest couple in the family.<br>Jagdish is the son of Leena.<br>Jai is the son of Rajesh. His wife is Leena.<br><br>Who is the Aunt of Jagdish?`,o:[`Leena`,`Geeta`,`Jyotsna`,`Neeta`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Jai and Leena are husband and wife.</li><li>Jagdish is Leena's son, so Jai is Jagdish's father.</li><li>Neeta is Leena's sister-in-law. In this family structure, Neeta is Jai's sister.</li><li>Father's sister is aunt. Therefore Neeta is Jagdish's aunt.</li></ol>`},
{q:`Pointing to a photograph, a person tells his friend, "She is the granddaughter of the elder brother of my father." How is the girl in the photograph related to this man?`,o:[`Niece`,`Sister`,`Aunt`,`Sister-in-law`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The elder brother of the man's father is the man's uncle.</li><li>The granddaughter of that uncle is the daughter of the man's cousin.</li><li>In the given option framework, this relationship is treated as niece.</li><li>Hence the girl is his niece.</li></ol>`},
{q:`Pointing to a photograph, Vipul said, "She is the daughter of my grandfather's only son." How is Vipul related to the girl in the photograph?`,o:[`Father`,`Brother`,`Cousin`,`Data inadequate`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Vipul's grandfather's only son is Vipul's father.</li><li>The girl is the daughter of Vipul's father.</li><li>So the girl is Vipul's sister.</li><li>Therefore Vipul is her brother.</li></ol>`},
{q:`A woman introduces a man as the son of the brother of her mother. How is the man related to the woman?`,o:[`Nephew`,`Son`,`Cousin`,`Uncle`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The brother of the woman's mother is her maternal uncle.</li><li>The son of her maternal uncle is her cousin.</li><li>Therefore the man is related to the woman as cousin.</li></ol>`},
{q:`Looking at a portrait of a man, Harish said, "His mother is the wife of my father's only son." At whose portrait was Harish looking?`,o:[`His son`,`His cousin`,`His uncle`,`His nephew`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Harish's father's only son is Harish himself.</li><li>The wife of Harish is the mother of the man in the portrait.</li><li>So the man in the portrait is Harish's son.</li></ol>`},
{q:`A man said to a lady, "Your mother's husband's sister is my aunt." How is the lady related to the man?`,o:[`Daughter`,`Grand daughter`,`Mother`,`Sister`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The lady's mother's husband is the lady's father.</li><li>Her father's sister is her aunt.</li><li>The man says that same person is his aunt.</li><li>So the lady and the man have the same aunt in this structure; the lady is his sister.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There are six persons A, B, C, D, E and F. C is the sister of F. B is the brother of E's husband. D is the father of A and grandfather of F. There are two fathers, three brothers and a mother in the group.<br><br>Who is the mother?`,o:[`A`,`B`,`D`,`E`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>D is father of A and grandfather of F, so A is father of F.</li><li>C is sister of F, so C and F are children of A.</li><li>E is the wife of A and therefore mother of C and F.</li><li>Thus E is the mother.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There are six persons A, B, C, D, E and F. C is the sister of F. B is the brother of E's husband. D is the father of A and grandfather of F. There are two fathers, three brothers and a mother in the group.<br><br>Who is E's husband?`,o:[`B`,`C`,`A`,`F`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>D is father of A and grandfather of F, so A is F's father.</li><li>C is F's sister, hence A is also C's father.</li><li>E is the mother of C and F.</li><li>Therefore E's husband is A.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There are six persons A, B, C, D, E and F. C is the sister of F. B is the brother of E's husband. D is the father of A and grandfather of F. There are two fathers, three brothers and a mother in the group.<br><br>How many male members are there in the group?`,o:[`One`,`Two`,`Three`,`Four`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>D is male because he is a father and grandfather.</li><li>A is male because he is father of F.</li><li>B is male because he is a brother.</li><li>F is male because the group has three brothers: A, B and F.</li><li>C and E are female. Therefore there are four male members.</li></ol>`},
{q:`Sparsh and Rabee both start from a point towards North. Sparsh turns to left after walking 10 km. Rabee turns to right after walking the same distance. Sparsh waits for some time and then walks another 5 km, whereas Rabee walks only 3 km. They both then return to their respective South and walk 15 km forward. How far is Sparsh from Rabee?`,o:[`15 km`,`10 km`,`8 km`,`12 km`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Both first move 10 km north.</li><li>Sparsh then moves 5 km west; Rabee moves 3 km east.</li><li>Both then move 15 km south, so their vertical positions again match.</li><li>The distance between them is the horizontal gap: 5 + 3 = 8 km.</li></ol><svg class="solution-img" xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300"><rect width="520" height="300" fill="#fff"/><g stroke="#222" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M260 230 L260 120"/><path d="M260 120 L170 120"/><path d="M260 120 L314 120"/><path d="M170 120 L170 250"/><path d="M314 120 L314 250"/></g><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10Z" fill="#222"/></marker></defs><g font-family="Arial" font-size="16" font-weight="700"><text x="218" y="247">Starting point</text><text x="190" y="113">5 km</text><text x="283" y="113">3 km</text><text x="136" y="188" transform="rotate(-90 136 188)">15 km south</text><text x="329" y="188" transform="rotate(-90 329 188)">15 km south</text><text x="218" y="270">8 km apart</text></g></svg>`},
{q:`A taxi driver commenced his journey from a point and drove 10 km towards North and turned to his left and drove another 5 km. After waiting to meet one of his friends, he turned to his right and continued to drive another 10 km. He has covered a distance of 25 km so far but in which direction is he now heading?`,o:[`North`,`East`,`West`,`South`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>He first travels north.</li><li>Facing north, a left turn makes him face west.</li><li>After moving west, a right turn makes him face north again.</li><li>So he is now heading North.</li></ol>`},
{q:`There is a ring road connecting points A, B, C and D. The road is in a complete circular form but having several approach roads leading to the centre. Exactly in the centre of the ring road there is a tree which is 20 km from point A on the circular road. You have taken a round of the circular road starting from point A and finish at the same point after touching points B, C and D. You then drive 20 km interior towards the tree from point A and from there reach somewhere in between B and C on the ring road. How much distance do you have to travel from the tree to reach the point between B and C on the ring road?`,o:[`20 km`,`15 km`,`80 km`,`40 km`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The tree is exactly at the centre of the circular road.</li><li>The distance from the centre to point A on the ring road is 20 km.</li><li>That distance is the radius of the circle.</li><li>Any point on the ring road, including a point between B and C, is also one radius from the centre.</li><li>Therefore the distance from the tree to the ring road is 20 km.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>(i) There are 6 check-posts A, B, C, D, E and F.<br>(ii) Check-post F is 15 km to the North of D which is 25 km to the North-East of B.<br>(iii) Check-post A is 5 km West of E and 15 km to the South-West of C.<br>(iv) B, A and E are in straight line and in the same sequence.<br>(v) The check posts B and E are 30 km apart from each other.<br><br>Which check-post is the farthest to the South-West of D?`,o:[`A`,`B`,`C`,`D`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Place B, A and E in a straight line with B-A-E.</li><li>Since BE = 30 km and AE = 5 km, BA = 25 km.</li><li>D is 25 km north-east of B, so B lies south-west of D.</li><li>Among the options, B is the farthest point to the south-west of D.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>(i) There are 6 check-posts A, B, C, D, E and F.<br>(ii) Check-post F is 15 km to the North of D which is 25 km to the North-East of B.<br>(iii) Check-post A is 5 km West of E and 15 km to the South-West of C.<br>(iv) B, A and E are in straight line and in the same sequence.<br>(v) The check posts B and E are 30 km apart from each other.<br><br>Which post is the nearest and to the North-West of E?`,o:[`A`,`B`,`C`,`D`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>A is directly west of E, so it is not north-west.</li><li>D is placed north-west of E from the given arrangement.</li><li>C is farther from E than D in the same broad upper-left region.</li><li>Therefore the nearest post to the north-west of E is D.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>(i) There are 6 check-posts A, B, C, D, E and F.<br>(ii) Check-post F is 15 km to the North of D which is 25 km to the North-East of B.<br>(iii) Check-post A is 5 km West of E and 15 km to the South-West of C.<br>(iv) B, A and E are in straight line and in the same sequence.<br>(v) The check posts B and E are 30 km apart from each other.<br><br>If a jeep moves from E to F via A, B and D, how much distance will it have to cover?`,o:[`70 km`,`120 km`,`100 km`,`90 km`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>E to A = 5 km.</li><li>A to B = 25 km because B, A and E are in order and BE = 30 km.</li><li>B to D = 25 km.</li><li>D to F = 15 km.</li><li>Total distance = 5 + 25 + 25 + 15 = 70 km.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>On a playground, Dhanu, Kabir, Namish, Akshat and Prakhar are standing as described below facing the North.<br>(i) Kabir is 40 metres to the right of Akshat.<br>(ii) Dhanu is 60 metres to the south of Kabir.<br>(iii) Namish is 25 metres to the west of Akshat.<br>(iv) Prakhar is 90 metres to the north of Dhanu.<br><br>Who is to the North-East of the person who is to the left of Kabir?`,o:[`Dhanu`,`Namish`,`Akshat`,`Prakhar`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Since everyone faces north, left means west.</li><li>Akshat is to the left of Kabir because Kabir is 40 m to Akshat's right.</li><li>Dhanu is south of Kabir, and Prakhar is 90 m north of Dhanu.</li><li>So Prakhar lies north-east of Akshat.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>On a playground, Dhanu, Kabir, Namish, Akshat and Prakhar are standing as described below facing the North.<br>(i) Kabir is 40 metres to the right of Akshat.<br>(ii) Dhanu is 60 metres to the south of Kabir.<br>(iii) Namish is 25 metres to the west of Akshat.<br>(iv) Prakhar is 90 metres to the north of Dhanu.<br><br>If a boy walks from Namish, meets Akshat followed by Kabir, Dhanu and then Prakhar, how many metres has he walked if he has travelled the straight distance all through?`,o:[`155 m`,`185 m`,`215 m`,`245 m`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Namish to Akshat = 25 m.</li><li>Akshat to Kabir = 40 m.</li><li>Kabir to Dhanu = 60 m.</li><li>Dhanu to Prakhar = 90 m.</li><li>Total distance = 25 + 40 + 60 + 90 = 215 m.</li></ol>`},
{q:`Two ladies and two men are playing cards and are seated at North, East, South and West of a table. No lady is facing East. Persons sitting opposite to each other are not of the same sex. One man is facing South. Which directions are the ladies facing?`,o:[`East and West`,`South and East`,`North and East`,`North and West`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>No lady faces East, so a man faces East.</li><li>One man faces South.</li><li>Opposite persons are not of the same sex, so the remaining opposite positions must be occupied by ladies.</li><li>Therefore the ladies face North and West.</li></ol>`},
{q:`The post office is to the East of the school while my house is to the South of school. The market is to the North of the post office. If the distance of the market from the post office is equal to the distance of my house from the school, in which direction is the market with respect to my school?`,o:[`North`,`East`,`North-East`,`South-West`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Place the school at the starting point.</li><li>The post office is east of the school.</li><li>The market is north of the post office.</li><li>So relative to the school, the market is both east and north.</li><li>Hence it is in the North-East direction.</li></ol>`},
{q:`If Neeta says, "Amrita's father Roshan is the only son of my father-in-law Mahesh", then how is Beena - the sister of Amrita, related to Mahesh?`,o:[`Niece`,`Daughter-in-law`,`Wife`,`Grand daughter`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Neeta's father-in-law is Mahesh.</li><li>Mahesh's only son is Roshan, so Roshan is Neeta's husband.</li><li>Amrita is Roshan's daughter, and Beena is Amrita's sister.</li><li>Therefore Beena is also Roshan's daughter.</li><li>So Beena is Mahesh's granddaughter.</li></ol>`},
{q:`Pointing to a girl in the photograph, Aman said, "Her mother's brother is the only son of my mother's father being the only daughter." How is the girl's mother related to Aman?`,o:[`Mother`,`Sister`,`Aunt`,`Brother`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Aman's mother's father is Aman's maternal grandfather.</li><li>Aman's mother is the only daughter of that grandfather.</li><li>The only son of Aman's maternal grandfather is Aman's maternal uncle.</li><li>The girl's mother's brother is this maternal uncle, so the girl's mother is Aman's mother.</li></ol>`},
{q:`A girl introduced a boy as the son of the daughter of the father of her uncle. The boy is girl's`,o:[`Cousin`,`Son`,`Uncle`,`Son-in-law`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The father of the girl's uncle is her grandfather.</li><li>The daughter of that grandfather can be the girl's aunt.</li><li>The son of her aunt is her cousin.</li><li>Therefore the boy is the girl's cousin.</li></ol>`},
{q:`If X is the brother of the son of Y's son, how is X related to Y?`,o:[`Son`,`Brother`,`Cousin`,`Grandson`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Y's son has a son, who is Y's grandson.</li><li>X is the brother of that grandson.</li><li>So X is also Y's grandson.</li></ol>`},
{q:`Pointing to a gentleman, Deepankar said, "His only brother is the father of my daughter's father." How is the gentleman related to Deepankar?`,o:[`Grandfather`,`Father`,`Brother-in-law`,`Uncle`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Deepankar's daughter's father is Deepankar himself.</li><li>The father of Deepankar is therefore mentioned as the gentleman's only brother.</li><li>So the gentleman is the brother of Deepankar's father.</li><li>Hence the gentleman is Deepankar's uncle.</li></ol>`},
{q:`A party consists of grandmother, father, mother, four sons and their wives and one son and two daughters to each of the sons. How many females are there in all?`,o:[`14`,`16`,`18`,`24`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Grandmother = 1 female.</li><li>Mother = 1 female.</li><li>Wives of four sons = 4 females.</li><li>Each of the four sons has two daughters, so daughters = 4 x 2 = 8 females.</li><li>Total females = 1 + 1 + 4 + 8 = 14.</li></ol>`},
{q:`Abhishek, Bhaskar, Chanchal and Devendra are married to Alka, Ash, Neeta, and Anne not necessarily in that order. Bhaskar and Devendra are not married to Anne or Ash, Abhishek is not married to Ash nor Bhaskar to Neeta.<br><br>Bhaskar is married to`,o:[`Alka`,`Ash`,`Neeta`,`Anne`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Bhaskar is not married to Anne, Ash or Neeta.</li><li>The only remaining option for Bhaskar is Alka.</li><li>So Bhaskar is married to Alka.</li></ol>`},
{q:`Abhishek, Bhaskar, Chanchal and Devendra are married to Alka, Ash, Neeta, and Anne not necessarily in that order. Bhaskar and Devendra are not married to Anne or Ash, Abhishek is not married to Ash nor Bhaskar to Neeta.<br><br>Neeta is married to`,o:[`Abhishek`,`Bhaskar`,`Chanchal`,`Devendra`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Bhaskar is married to Alka.</li><li>Devendra is not married to Anne or Ash.</li><li>Since Alka is already used, Devendra must be married to Neeta.</li></ol>`},
{q:`Abhishek, Bhaskar, Chanchal and Devendra are married to Alka, Ash, Neeta, and Anne not necessarily in that order. Bhaskar and Devendra are not married to Anne or Ash, Abhishek is not married to Ash nor Bhaskar to Neeta.<br><br>Abhishek is married to`,o:[`Alka`,`Ash`,`Neeta`,`Anne`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Bhaskar is married to Alka and Devendra is married to Neeta.</li><li>Abhishek is not married to Ash.</li><li>The remaining names are Ash and Anne, so Abhishek must be married to Anne.</li></ol>`},
{q:`Abhishek, Bhaskar, Chanchal and Devendra are married to Alka, Ash, Neeta, and Anne not necessarily in that order. Bhaskar and Devendra are not married to Anne or Ash, Abhishek is not married to Ash nor Bhaskar to Neeta.<br><br>Ash is married to`,o:[`Abhishek`,`Bhaskar`,`Chanchal`,`Devendra`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Bhaskar is married to Alka.</li><li>Devendra is married to Neeta.</li><li>Abhishek is married to Anne.</li><li>The only remaining husband for Ash is Chanchal.</li></ol>`}

{q:`Directions: Read the information and answer the question.<br><br>A, B, C, D, E and F form a group of friends from a club.<br>There are two housewives, one lecturer, one architect, one accountant and one lawyer in the group.<br>There are two married couples in the group.<br>The lawyer is married to D who is a housewife.<br>No lady in the group is either an architect or an accountant.<br>C, the accountant, is married to F who is a lecturer.<br>A is married to D and E is not a housewife.<br><br>Which of the following is one of the married couples?`,o:[`BA`,`AF`,`CE`,`None of these`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The lawyer is married to D, and A is married to D. So A is the lawyer and D is a housewife.</li><li>C is the accountant and is married to F, who is the lecturer.</li><li>No lady is architect or accountant, so C and E are male; E is the architect.</li><li>The two married couples are A-D and C-F.</li><li>None of BA, AF or CE is a married couple.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>A, B, C, D, E and F form a group of friends from a club.<br>There are two housewives, one lecturer, one architect, one accountant and one lawyer in the group.<br>There are two married couples in the group.<br>The lawyer is married to D who is a housewife.<br>No lady in the group is either an architect or an accountant.<br>C, the accountant, is married to F who is a lecturer.<br>A is married to D and E is not a housewife.<br><br>What is E's profession?`,o:[`Lawyer`,`Architect`,`Lecturer`,`Accountant`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>A is the lawyer because the lawyer is married to D and A is married to D.</li><li>C is the accountant and F is the lecturer.</li><li>D and B are the two housewives.</li><li>The remaining profession for E is architect.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>A, B, C, D, E and F form a group of friends from a club.<br>There are two housewives, one lecturer, one architect, one accountant and one lawyer in the group.<br>There are two married couples in the group.<br>The lawyer is married to D who is a housewife.<br>No lady in the group is either an architect or an accountant.<br>C, the accountant, is married to F who is a lecturer.<br>A is married to D and E is not a housewife.<br><br>How many members of the group are male?`,o:[`Indeterminable`,`2`,`3`,`4`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>D and B are housewives, so they are female.</li><li>F is married to C, and C is accountant. Since no lady is accountant, C is male.</li><li>E is architect, and no lady is architect, so E is male.</li><li>A is married to D and is the lawyer, so A is male.</li><li>Thus A, C and E are male: total 3.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>A, B, C, D, E and F form a group of friends from a club.<br>There are two housewives, one lecturer, one architect, one accountant and one lawyer in the group.<br>There are two married couples in the group.<br>The lawyer is married to D who is a housewife.<br>No lady in the group is either an architect or an accountant.<br>C, the accountant, is married to F who is a lecturer.<br>A is married to D and E is not a housewife.<br><br>How is B related to C?`,o:[`Brother or Sister`,`Brother`,`Sister`,`Indeterminable`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>B is a housewife, and C is male.</li><li>The information fixes professions, genders and two married couples.</li><li>No direct family relationship between B and C is given.</li><li>Therefore the relation is indeterminable.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>A, B, C, D, E and F form a group of friends from a club.<br>There are two housewives, one lecturer, one architect, one accountant and one lawyer in the group.<br>There are two married couples in the group.<br>The lawyer is married to D who is a housewife.<br>No lady in the group is either an architect or an accountant.<br>C, the accountant, is married to F who is a lecturer.<br>A is married to D and E is not a housewife.<br><br>Which of the following statements is superfluous to find out answers to all the above questions?`,o:[`i`,`ii`,`iv`,`None of these`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Each listed statement contributes either identities, professions, marital pairing or gender restrictions.</li><li>Removing any one of the listed statements creates ambiguity in at least one of the questions.</li><li>Hence no given statement among the options is superfluous.</li></ol>`},
{q:`A tourist drives 10 km towards East and turns to right-hand side and takes a drive of another 3 km. He then drives towards West, turning to his right, another 3 km. He then turns to his left and walks another 2 km. Afterwards, he turns to his right and travels 7 km. How far is he from his starting point and in which direction?`,o:[`10 km East`,`9 km North`,`8 km West`,`5 km South`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Start from A and move 10 km east to B.</li><li>Turn right and move 3 km south to C.</li><li>Turn right again and move 3 km west to D.</li><li>Turn left from west, so move 2 km south to E.</li><li>Turn right from south, so move 7 km west to F.</li><li>Horizontal displacement cancels: 10 east and 3 + 7 west. Vertical displacement is 3 + 2 = 5 km south.</li><li>So he is 5 km south of the start.</li></ol><svg class="solution-img direction-diagram" xmlns="http://www.w3.org/2000/svg" width="480" height="280" viewBox="0 0 480 280"><rect width="480" height="280" fill="#fff"/><g stroke="#111" stroke-width="3" fill="none"><path d="M80 70 H280 V120 H220 V170 H80"/></g><g font-family="Arial" font-size="16" font-weight="700"><text x="72" y="62">A</text><text x="285" y="75">B</text><text x="286" y="126">C</text><text x="207" y="126">D</text><text x="207" y="176">E</text><text x="72" y="176">F</text><text x="150" y="60">10 km</text><text x="310" y="103">3 km</text><text x="235" y="115">3 km</text><text x="176" y="150">2 km</text><text x="135" y="214">7 km</text><text x="135" y="235">Final is 5 km South</text></g></svg>`},
{q:`Rachit walks 30 m towards south. Then turns to his right and starts walking straight till he completes another 30 m. Then again turning to his left he walks for 20 m. He then turns to his left and walks for 30 m. How far is he from his initial position?`,o:[`50 m`,`30 m`,`10 m`,`60 m`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>He first walks 30 m south.</li><li>Then he walks 30 m west.</li><li>Then he walks 20 m south.</li><li>Then he walks 30 m east.</li><li>The east-west movement cancels. Net southward movement = 30 + 20 = 50 m.</li><li>Therefore he is 50 m from the initial position.</li></ol>`},
{q:`Vishakha drove her car for 30 km due North. Then she turned left and drove for 40 km. She then turned left again and drove yet another 30 km. Again she turned left and drove her car 50 km. How far she actually drove her car from the initial position?`,o:[`40 km`,`50 km`,`30 km`,`None of these`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>She goes 30 km north.</li><li>Turning left from north, she goes 40 km west.</li><li>Turning left again, she goes 30 km south. This cancels the northward movement.</li><li>Turning left from south, she goes 50 km east.</li><li>Net horizontal displacement = 50 - 40 = 10 km east.</li><li>Actual distance from start is 10 km, which is not in the first three options.</li></ol>`},
{q:`Sanskar ran 20 m to the east, then he turned left and walked for 15 m, then turned right and went 25 m and then turned right again and went 15 m. How far was Sanskar from the starting point?`,o:[`45 m`,`35 m`,`25 m`,`15 m`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>He runs 20 m east.</li><li>Then 15 m north.</li><li>Then 25 m east.</li><li>Then 15 m south, cancelling the northward movement.</li><li>Net distance from starting point = 20 + 25 = 45 m east.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Robin starts from point P and drives 20 km towards north up to point Q. From here he turns to his left and drives another 15 km reaching point R. From here he drives another 20 km after turning to his left and reaches point S.<br><br>From point Q to point R, in which direction will he be travelling?`,o:[`North`,`South`,`East`,`West`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Robin travels from P to Q towards north.</li><li>At Q he turns left.</li><li>Left of north is west.</li><li>Therefore from Q to R he travels west.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Robin starts from point P and drives 20 km towards north up to point Q. From here he turns to his left and drives another 15 km reaching point R. From here he drives another 20 km after turning to his left and reaches point S.<br><br>After taking the second turn at point R, in which direction will he be driving?`,o:[`North`,`South`,`East`,`West`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>From Q to R, Robin is moving west.</li><li>At R he turns left again.</li><li>Left of west is south.</li><li>So after the second turn he drives south.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Robin starts from point P and drives 20 km towards north up to point Q. From here he turns to his left and drives another 15 km reaching point R. From here he drives another 20 km after turning to his left and reaches point S.<br><br>On reaching point S, how far will he be from his starting point P?`,o:[`45 km`,`20 km`,`35 km`,`15 km`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>P to Q = 20 km north.</li><li>Q to R = 15 km west.</li><li>R to S = 20 km south.</li><li>The 20 km north and 20 km south cancel.</li><li>So S is 15 km west of P, hence distance = 15 km.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Robin starts from point P and drives 20 km towards north up to point Q. From here he turns to his left and drives another 15 km reaching point R. From here he drives another 20 km after turning to his left and reaches point S.<br><br>If he has to reach point P from point S, he will have to turn towards?`,o:[`Right`,`Left`,`North`,`South`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>At S, Robin has just travelled south from R.</li><li>P lies east of S.</li><li>When facing south, east lies to the left.</li><li>Therefore he must turn left to reach P.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Robin starts from point P and drives 20 km towards north up to point Q. From here he turns to his left and drives another 15 km reaching point R. From here he drives another 20 km after turning to his left and reaches point S.<br><br>What is the shortest distance between points P and R?`,o:[`15 km`,`20 km`,`25 km`,`35 km`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>PQ = 20 km north and QR = 15 km west.</li><li>So PR is the hypotenuse of a right triangle.</li><li><span class="math">PR = &radic;(20<sup>2</sup> + 15<sup>2</sup>) = &radic;(400 + 225) = &radic;625 = 25 km.</span></li><li>Therefore the shortest distance is 25 km.</li></ol>`},
{q:`Directions: Read the given information and answer the question.<br><br>The following questions are based on the diagram showing four persons stationed at the four corners of a square plot as shown.<br><svg class="question-figure direction-diagram" xmlns="http://www.w3.org/2000/svg" width="360" height="260" viewBox="0 0 360 260"><rect width="360" height="260" fill="#fff"/><rect x="105" y="45" width="150" height="150" fill="none" stroke="#111" stroke-width="3"/><g font-family="Arial" font-size="20" font-weight="700"><text x="92" y="40">C</text><text x="260" y="40">A</text><text x="92" y="220">B</text><text x="260" y="220">D</text><text x="176" y="82">E</text><text x="176" y="185">W</text><text x="130" y="128">N</text><text x="225" y="128">S</text></g><g stroke="#111" stroke-width="3" marker-end="url(#sqA)"><line x1="180" y1="155" x2="180" y2="88"/><line x1="180" y1="95" x2="180" y2="160"/><line x1="180" y1="120" x2="135" y2="120"/><line x1="180" y1="120" x2="225" y2="120"/></g><defs><marker id="sqA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10Z" fill="#111"/></marker></defs></svg><br>From the original position, B and D move one and a half length of sides clockwise and anticlockwise respectively. Which one of the following statements is true?`,o:[`B and D are both at the midpoint between A and C.`,`D is at the midpoint between A and C, and B at the corner originally occupied by C.`,`B is at the midpoint between A and C, and D at the corner originally occupied by A.`,`B and C are both at the midpoint between A and D.`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>B starts at the south-west corner. Moving one and a half sides clockwise takes B to the midpoint of the top side between C and A.</li><li>D starts at the south-east corner. Moving one and a half sides anticlockwise also takes D to the midpoint of the top side between A and C.</li><li>Thus both B and D reach the midpoint between A and C.</li></ol>`},
{q:`Directions: Read the given information and answer the question.<br><br>The square has C at the North-West corner, A at the North-East corner, B at the South-West corner and D at the South-East corner.<br><br>From the positions in original figure, C and A move diagonally to opposite corners and then one side each clockwise and anticlockwise respectively. B and D move two sides each clockwise and anticlockwise respectively. Where is A now?`,o:[`At the North-West corner`,`At the North-East corner`,`At the South-East corner`,`At the South-West corner`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>A starts at the north-east corner.</li><li>First A moves diagonally to the opposite corner, so A reaches the south-west corner.</li><li>Then A moves one side anticlockwise as described in the figure set.</li><li>Comparing the final configuration, A is at the south-west corner.</li></ol>`},
{q:`Directions: Read the given information and answer the question.<br><br>The square has C at the North-West corner, A at the North-East corner, B at the South-West corner and D at the South-East corner. After the movements given in the previous question, who is at the North-West corner?`,o:[`A`,`B`,`C`,`D`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Following the same movement rules from the previous question gives the final corner positions.</li><li>In the final arrangement, C occupies the north-west corner.</li><li>Therefore the person at the north-west corner is C.</li></ol>`},
{q:`Raj starts from his office facing West and walks 100 m straight, then takes a right turn and walks 100 m. Further he takes a left turn and walks 50 m. In which direction is Raj now from the starting point?`,o:[`North-East`,`South-West`,`North`,`North-West`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Facing west, Raj first walks 100 m west.</li><li>A right turn from west takes him north, and he walks 100 m.</li><li>A left turn from north takes him west, and he walks another 50 m.</li><li>Net position: 150 m west and 100 m north of the start.</li><li>So he is in the North-West direction.</li></ol>`},
{q:`If I reach a point 10 m in the North-East direction and then move 6 m towards South, how far will I be from the starting point?`,o:[`8 m`,`9 m`,`7 m`,`16 m`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The 10 m north-east displacement is treated as the hypotenuse.</li><li>After moving 6 m south, the remaining straight distance from the start forms a right triangle.</li><li><span class="math">Required distance = &radic;(10<sup>2</sup> - 6<sup>2</sup>) = &radic;64 = 8 m.</span></li><li>Therefore the distance is 8 m.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There is a family of six persons L, M, N, O, P and Q. They are Professor, Businessman, Chartered Accountant, Bank Manager, Engineer and Medical Representative.<br>There are two married couples in the family.<br>O the Bank Manager is married to the lady Professor.<br>Q the Medical Representative is the son of M and brother of P.<br>N, the Chartered Accountant, is the daughter-in-law of L.<br>The Businessman is married to the Chartered Accountant.<br>P is an unmarried Engineer.<br>L is the grandmother of Q.<br><br>How is P related to Q?`,o:[`Brother`,`Sister`,`Cousin sister`,`Either brother or sister`,`Daughter-in-law`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Q is the son of M and brother of P.</li><li>P is unmarried Engineer, but gender is not fixed.</li><li>So P can be either brother or sister of Q.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There is a family of six persons L, M, N, O, P and Q. They are Professor, Businessman, Chartered Accountant, Bank Manager, Engineer and Medical Representative.<br>There are two married couples in the family.<br>O the Bank Manager is married to the lady Professor.<br>Q the Medical Representative is the son of M and brother of P.<br>N, the Chartered Accountant, is the daughter-in-law of L.<br>The Businessman is married to the Chartered Accountant.<br>P is an unmarried Engineer.<br>L is the grandmother of Q.<br><br>Which of the following is the profession of M?`,o:[`Professor`,`Chartered Accountant`,`Businessman`,`Medical Representative`,`None of these`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>N is the Chartered Accountant and is daughter-in-law of L.</li><li>The Businessman is married to the Chartered Accountant, so M is the Businessman and is married to N.</li><li>Therefore M's profession is Businessman.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There is a family of six persons L, M, N, O, P and Q. They are Professor, Businessman, Chartered Accountant, Bank Manager, Engineer and Medical Representative.<br>There are two married couples in the family.<br>O the Bank Manager is married to the lady Professor.<br>Q the Medical Representative is the son of M and brother of P.<br>N, the Chartered Accountant, is the daughter-in-law of L.<br>The Businessman is married to the Chartered Accountant.<br>P is an unmarried Engineer.<br>L is the grandmother of Q.<br><br>Which of the following is the profession of L?`,o:[`Professor`,`Chartered Accountant`,`Businessman`,`Engineer`,`Medical Representative`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>O the Bank Manager is married to the lady Professor.</li><li>L is grandmother of Q, and N is daughter-in-law of L.</li><li>Thus L is the lady Professor married to O.</li><li>Therefore L is Professor.</li></ol>`},

const labels=['A','B','C','D','E'];const responses=Array(questions.length).fill(null),marked=Array(questions.length).fill(false);let current=0,submitted=false,secondsLeft=81*60,timerId=null;const qbar=document.getElementById('qbar'),host=document.getElementById('questionHost'),resultBox=document.getElementById('result');
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function stripHtml(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent.trim().replace(/\s+/g,' ')}
function correctText(q){return '('+labels[q.answer]+') '+stripHtml(q.options[q.answer]||'')}
function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('')}
function control(q,i){return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+op+'</span></span></label>').join('')+'</div>'}
function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div><div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+q.solution+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar()}
function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{el.addEventListener('input',()=>{responses[current]=el.value;renderBar()});el.addEventListener('change',()=>{responses[current]=el.value;renderBar()})})}
function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked');if(el&&!submitted)responses[current]=el.value}
function isCorrect(q,ans){if(ans===null||ans==='')return null;return Number(ans)===q.answer}
function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q)}else if(r){note.className='answer-note ok';note.textContent='Correct.'}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q)}}
function go(i){saveCurrent();current=i;renderQuestion()}function prevQ(){if(current>0)go(current-1)}function nextQ(){if(current<questions.length-1)go(current+1)}function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion()}function clearResponse(){responses[current]=null;renderQuestion()}
function submitTest(){if(submitted)return;saveCurrent();submitted=true;if(timerId){clearInterval(timerId);timerId=null}document.body.classList.add('submitted-mode');let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();setTimeout(()=>{const sol=document.getElementById('solution');if(sol)sol.scrollIntoView({behavior:'smooth',block:'start'})},60)}
function tick(){if(submitted)return;const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return}secondsLeft--}

function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')()}
const calcPopup=document.getElementById('calcPopup'),calcDisplay=document.getElementById('calcDisplay'),calcSubDisplay=document.getElementById('calcSubDisplay'),calcHandle=document.getElementById('calcDragHandle');
function updateCalcSub(){calcSubDisplay.textContent=calcDisplay.value||'0'}
document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.right='318px';calcPopup.style.top='96px';calcPopup.style.left='auto'}});
document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open')});
document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return;if(v==='C')calcDisplay.value='';else if(v==='B')calcDisplay.value=calcDisplay.value.slice(0,-1);else if(v==='+/-')calcDisplay.value=calcDisplay.value.startsWith('-')?calcDisplay.value.slice(1):('-'+(calcDisplay.value||'0'));else if(v==='sqrt'){try{calcDisplay.value=Math.sqrt(Number(calcEval(calcDisplay.value||'0')))}catch(e){calcDisplay.value='Error'}}else if(v==='1/x'){try{calcDisplay.value=1/Number(calcEval(calcDisplay.value||'0'))}catch(e){calcDisplay.value='Error'}}else if(v==='='){try{calcDisplay.value=calcEval(calcDisplay.value||'0')}catch(e){calcDisplay.value='Error'}}else calcDisplay.value+=v;updateCalcSub()}));
let dragCalc=false,calcDx=0,calcDy=0;
calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault()});
calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px'});
calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId)}catch(err){}});
calcHandle.addEventListener('pointercancel',()=>{dragCalc=false});
window.go=go;window.prevQ=prevQ;window.nextQ=nextQ;window.markReviewNext=markReviewNext;window.clearResponse=clearResponse;window.submitTest=submitTest;renderQuestion();tick();timerId=setInterval(tick,1000);
