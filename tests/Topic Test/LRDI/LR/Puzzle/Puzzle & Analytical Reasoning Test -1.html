const raw = [
{q:`A customer visits a shop, which sells radios of five different kinds. The prices of the types/pieces are A -> Rs.1155, B -> Rs.1365, C -> Rs.2145, D -> Rs.3003, E -> Rs.5005. He buys different numbers of each of the five kinds and pays a total of Rs.57362.<br><br>How many did he buy of A type?`,o:[`10`,`18`,`16`,`14`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Let quantities of A, B, C, D and E be a, b, c, d and e.</li><li>Cost equation: 1155a + 1365b + 2145c + 3003d + 5005e = 57362.</li><li>Using modular remainders with 3, 5, 7, 11 and 13 gives e = 2, d = 4, c = 6, b = 8 and a = 10.</li><li>Check: 1155 x 10 + 1365 x 8 + 2145 x 6 + 3003 x 4 + 5005 x 2 = 57362.</li><li>Therefore A type radios = 10.</li></ol>`},
{q:`A customer visits a shop, which sells radios of five different kinds. The prices of the types/pieces are A -> Rs.1155, B -> Rs.1365, C -> Rs.2145, D -> Rs.3003, E -> Rs.5005. He buys different numbers of each of the five kinds and pays a total of Rs.57362.<br><br>How many did he buy of B type?`,o:[`8`,`16`,`14`,`2`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The same cost equation is used.</li><li>The modular method gives A = 10, B = 8, C = 6, D = 4 and E = 2.</li><li>Hence B type radios = 8.</li><li>The substitution total is exactly Rs.57362.</li></ol>`},
{q:`A customer visits a shop, which sells radios of five different kinds. The prices of the types/pieces are A -> Rs.1155, B -> Rs.1365, C -> Rs.2145, D -> Rs.3003, E -> Rs.5005. He buys different numbers of each of the five kinds and pays a total of Rs.57362.<br><br>How many did he buy of C type?`,o:[`18`,`6`,`14`,`2`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The unique quantity set satisfying the total is A = 10, B = 8, C = 6, D = 4 and E = 2.</li><li>Therefore C type radios = 6.</li></ol>`},
{q:`A customer visits a shop, which sells radios of five different kinds. The prices of the types/pieces are A -> Rs.1155, B -> Rs.1365, C -> Rs.2145, D -> Rs.3003, E -> Rs.5005. He buys different numbers of each of the five kinds and pays a total of Rs.57362.<br><br>How many did he buy of D type?`,o:[`18`,`16`,`4`,`2`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Solving the purchase equation gives A = 10, B = 8, C = 6, D = 4 and E = 2.</li><li>Thus D type radios = 4.</li></ol>`},
{q:`A customer visits a shop, which sells radios of five different kinds. The prices of the types/pieces are A -> Rs.1155, B -> Rs.1365, C -> Rs.2145, D -> Rs.3003, E -> Rs.5005. He buys different numbers of each of the five kinds and pays a total of Rs.57362.<br><br>How many did he buy of E type?`,o:[`18`,`16`,`14`,`2`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The quantities are A = 10, B = 8, C = 6, D = 4 and E = 2.</li><li>Therefore E type radios = 2.</li></ol>`},
{q:`A party is held at the house of the Sharmas. There were four other couples present (besides Mr. and Mrs. Sharma), and many, but not all, people shook hands. Nobody shook hands with anyone twice, and nobody shook hands with his/her spouse. Both the host and hostess shook some hands. At the end of the party, Mr. Sharma polls each person present to see how many hands each person (other than himself) shook. Each person gives a different answer. Determine how many hands Mrs. Sharma must have shaken?`,o:[`4`,`5`,`7`,`8`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Mr. Sharma receives 9 different answers from 9 people.</li><li>The possible different answers must be 0, 1, 2, ..., 8.</li><li>The person with 8 handshakes is married to the person with 0 handshakes.</li><li>Similarly, 7 pairs with 1, 6 pairs with 2, and 5 pairs with 3.</li><li>The only unpaired count is 4, so Mrs. Sharma shook 4 hands.</li></ol>`},
{q:`Each * shown in the following multiplication cryptarithm is a single digit prime number. Find the value of final product.<br><img class="question-figure" src="assets/puzzle-analytical-q7-cryptarithm.svg" alt="Multiplication cryptarithm with prime digit stars">`,o:[`25575`,`53572`,`72533`,`35752`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The single digit prime numbers are 2, 3, 5 and 7.</li><li>Every star must be filled using only these digits.</li><li>Checking the units digit and carry positions eliminates the other products.</li><li>The only option matching the cryptarithm is 25575.</li></ol>`},
{q:`Suppose that you have 12 pearls, all having the same weight but with one having an odd weight. You do not know whether the odd pearl is heavier or lighter. How many minimum weighings are needed to find the odd pearl?`,o:[`2`,`3`,`4`,`6`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>A balance weighing has three outcomes: left heavy, right heavy or balanced.</li><li>The odd pearl can be any of 12 and may be heavy or light.</li><li>The classic 12-coin strategy starts with 4 versus 4 and uses the result to create controlled groups.</li><li>Three weighings are sufficient to find the odd pearl and decide whether it is heavy or light.</li><li>Two weighings are insufficient, so the answer is 3.</li></ol>`},
{q:`You have 80 pearls. One is lighter than all other. How many minimum weighings are required to find out the odd one?`,o:[`Odd`,`Even`,`Either`,`None`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The odd pearl is known to be lighter, so each weighing can split suspects into three groups.</li><li>3 weighings can distinguish at most 3<sup>3</sup> = 27 pearls.</li><li>4 weighings can distinguish at most 3<sup>4</sup> = 81 pearls.</li><li>Since there are 80 pearls, 4 weighings are required.</li><li>Four is even.</li></ol>`},
{q:`Radha has some flowers with her when she leaves from her home. She has to worship 4 deities to whom she presents flowers. She moves from her home with X number of flowers and goes to the bank of the river nearby. She dips the number of flowers in the river and the number of flowers doubles. She then goes to the first deity and presents Y number of flowers to him. This doubling and presenting Y flowers happens before each deity. Finally, after presenting Y flowers to the last deity, she has no flowers left. The minimum number of flowers Radha could have got from her home is`,o:[`16`,`15`,`0`,`Cannot be determined`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Work backwards from the fourth deity.</li><li>Before the final offering, after doubling, she must have Y flowers.</li><li>So before the fourth river dip she had <span class="frac"><span>Y</span><span>2</span></span> flowers.</li><li>Repeating this backwards through four deities gives X = <span class="frac"><span>15Y</span><span>16</span></span>.</li><li>For minimum positive integer X, take Y = 16.</li><li>Then X = 15.</li></ol>`},
{q:`Two numbers are in the form of QQ and Q.Q (Q point Q). If the sum and the product of the given number are identical, then what is the numerical value of Q? [You cannot use zero.]`,o:[`1`,`2`,`3`,`4`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Try Q = 1.</li><li>The two numbers become 11 and 1.1.</li><li>Sum = 11 + 1.1 = 12.1.</li><li>Product = 11 x 1.1 = 12.1.</li><li>Thus Q = 1 satisfies the condition.</li></ol>`},
{q:`Jaswant's socks drawer has 10 blue socks and 12 grey socks. The room is dark and the light cannot be turned on. What is the least amount of socks he must take out to be certain that he has a blue pair and a grey pair?`,o:[`10`,`14`,`12`,`18`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Consider the worst possible draw.</li><li>He may first draw all 12 grey socks, which gives a grey pair but no blue pair.</li><li>The 13th sock may be the first blue sock.</li><li>The 14th sock must be blue, giving a blue pair too.</li><li>Therefore the least number is 14.</li></ol>`},
{q:`Three volumes of a book first, second and third are kept in a shelf from left to right. The front and back covers of each volume are each <span class="frac"><span>1</span><span>8</span></span> inches thick. The page section inside each book is exactly 2 inches thick. If a book worm starts eating at page 1 of volume 1 and eats in a straight line through to the last page of volume 3, how far will it travel?`,o:[`4.5 inches`,`4.25 inches`,`2.75 inches`,`2.5 inches`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>In a shelved book, page 1 of volume 1 is near the right side of volume 1.</li><li>The last page of volume 3 is near the left side of volume 3.</li><li>The worm crosses the front cover of volume 1, all of volume 2, and the back cover of volume 3.</li><li>Distance = <span class="frac"><span>1</span><span>8</span></span> + (<span class="frac"><span>1</span><span>8</span></span> + 2 + <span class="frac"><span>1</span><span>8</span></span>) + <span class="frac"><span>1</span><span>8</span></span> = 2.5 inches.</li></ol>`},
{q:`Fifteen teams play in a tournament. Each team plays every other team exactly once. A team gets 3 points to win, 2 for a draw and 1 for a loss. Every team ends up with different total and the score of the team getting the lowest total was 21. Then the best team necessarily had at least`,o:[`One loss`,`One draw`,`Could be both`,`Cannot say`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Total matches = <span class="frac"><span>15 x 14</span><span>2</span></span> = 105.</li><li>Every match distributes 4 points in total.</li><li>Total points = 105 x 4 = 420.</li><li>With 15 different totals and lowest total 21, the totals must be 21, 22, ..., 35 because these sum to 420.</li><li>The best team therefore has 35 points.</li><li>In 14 matches, 35 points cannot be formed without at least one draw, so the best team necessarily had a draw.</li></ol>`},
{q:`When Ram will be as old as Ram's father is now, Ram will be five times as old as Ram's son is now. But at that time Ram's son will be eight years older than Ram is now. At present, the sum of the ages of Ram's father and Ram is 100 years.<br><br>How old is Ram's son?`,o:[`8 years`,`13 years`,`16 years`,`19 years`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Let Ram, his son and his father be x, y and z years old.</li><li>Given x + z = 100.</li><li>When Ram becomes z years old, time elapsed = z - x.</li><li>At that time Ram is five times his son's present age, so z = 5y.</li><li>The son at that time is y + z - x, and this equals x + 8.</li><li>Solving gives y = 13, x = 35 and z = 65.</li><li>Ram's son is 13 years old.</li></ol>`},
{q:`When Ram will be as old as Ram's father is now, Ram will be five times as old as Ram's son is now. But at that time Ram's son will be eight years older than Ram is now. At present, the sum of the ages of Ram's father and Ram is 100 years.<br><br>How old would Ram have been 5 years ago?`,o:[`30 years`,`33 years`,`38 years`,`45 years`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Using the same equations x + z = 100, z = 5y and y + z - x = x + 8.</li><li>Solving gives Ram's present age x = 35.</li><li>Five years ago, Ram was 35 - 5 = 30 years old.</li></ol>`},
{q:`When Ram will be as old as Ram's father is now, Ram will be five times as old as Ram's son is now. But at that time Ram's son will be eight years older than Ram is now. At present, the sum of the ages of Ram's father and Ram is 100 years.<br><br>After 10 years, how old will Ram's father be?`,o:[`56 years`,`65 years`,`75 years`,`66 years`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The common age equations give Ram's father's present age z = 65.</li><li>After 10 years, his age will be 65 + 10 = 75 years.</li></ol>`},
{q:`How many digits are used to number the pages of a book having pages from 1 to 100?`,o:[`198`,`194`,`192`,`190`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Pages 1 to 9 use 9 digits.</li><li>Pages 10 to 99 are 90 pages and use 90 x 2 = 180 digits.</li><li>Page 100 uses 3 digits.</li><li>Total digits = 9 + 180 + 3 = 192.</li></ol>`},
{q:`Mr. X has a nasty habit of posing questions in the form of puzzles. He tells his friend: "The other day I had been to a party. There was a grand-father, a grand-mother, two fathers, two mothers, four children, three grand-children, one brother, two sisters, two sons, two daughters, one father-in-law, one mother-in-law and one daughter-in-law." His friend immediately said, "So, there were 22 people." "No," replied X. Can you tell the minimum possible number?`,o:[`6`,`9`,`13`,`7`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Use one grandfather and one grandmother.</li><li>Their son and his wife form the next generation.</li><li>Let this couple have three children: one boy and two girls.</li><li>This group satisfies all listed relations, including two fathers, two mothers, three grandchildren, one brother and two sisters.</li><li>Total people = 7.</li></ol>`},
{q:`In a game of cards called "Larger-The Better", all cards of the single suit, except the King, Queen and Jack (i.e., 10 cards of the suit) are distributed among five players (two cards each). The one with maximum number of points wins the game. Points scored = sum of card values. Joy, Jolly, Jayesh, Jyoti and Jasmin were once playing using the suit of hearts. Jayesh, Joy, Jyoti and Jolly scored 11, 7, 5 and 14 points respectively.<br><br>Who won the game?`,o:[`Joy`,`Jyoti`,`Jolly`,`Jasmine`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The cards Ace to 10 have total value 1 + 2 + ... + 10 = 55.</li><li>Known scores total = 11 + 7 + 5 + 14 = 37.</li><li>Jasmine's score = 55 - 37 = 18.</li><li>Since 18 is the largest score, Jasmine won.</li></ol>`},
{q:`In a game of cards called "Larger-The Better", all cards of the single suit, except the King, Queen and Jack (i.e., 10 cards of the suit) are distributed among five players (two cards each). The one with maximum number of points wins the game. Points scored = sum of card values. Joy, Jolly, Jayesh, Jyoti and Jasmin were once playing using the suit of hearts. Jayesh, Joy, Jyoti and Jolly scored 11, 7, 5 and 14 points respectively.<br><br>Which cards did Jyoti have?`,o:[`The two and the three of spade`,`The two and the three of hearts.`,`The ace and the four of spade`,`The ace and the four of hearts`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Jyoti scored 5 points.</li><li>The game was played using the suit of hearts, so Jyoti's cards must be hearts.</li><li>The consistent 5-point pair is 2 and 3.</li><li>Therefore Jyoti had the two and the three of hearts.</li></ol>`},
{q:`Prabhu went 10 m to the East, then turned North and walked another 15 m, then turned West and covered 12 m and then turned South and covered 15 m. How far is Prabhu from his starting point?`,o:[`0 m`,`2 m`,`3 m`,`5 m`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>East movement = 10 m.</li><li>West movement = 12 m, so net horizontal displacement is 2 m west.</li><li>North movement 15 m and south movement 15 m cancel out.</li><li>Distance from starting point = 2 m.</li></ol>`},
{q:`In 1932, a man was as old as the last two digits of his birth year. In 1932 itself, another man (older than the man above) was also as old as the last two digits of the year of his birth. The difference of their ages is/was`,o:[`50 years`,`30 years`,`28 years`,`26 years`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>A younger man born in 1916 was 16 years old in 1932.</li><li>An older man born in 1866 was 66 years old in 1932.</li><li>Both ages match the last two digits of their birth years.</li><li>Difference = 66 - 16 = 50 years.</li></ol>`},
{q:`Hariharan is fond of shopping. He took nearly Rs.15 with him in the form of one rupee notes and 20 p coins. When he came back, he had as many one rupee notes as he originally had 20p coins and as many 20p coins as he originally had one rupee notes. Total was also reduced by two-thirds. Thus, he spent (Rs.)`,o:[`10.20`,`9.30`,`9.60`,`4.28`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Let original one-rupee notes be X and original 20p coins be Y.</li><li>Original amount = 100X + 20Y paise.</li><li>After shopping, remaining amount = 100Y + 20X paise.</li><li>Remaining is one-third of original, so 100Y + 20X = <span class="frac"><span>100X + 20Y</span><span>3</span></span>.</li><li>This gives X = 7Y.</li><li>Nearly Rs.15 is obtained with Y = 2 and X = 14, so original amount = Rs.14.40.</li><li>He spent <span class="frac"><span>2</span><span>3</span></span> of Rs.14.40 = Rs.9.60.</li></ol>`},
{q:`A Logical Reasoning class has 18 students. At the beginning of the class, each student shakes hands with each of the other students. How many handshakes take place?`,o:[`153`,`324`,`306`,`None of these`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Each handshake is a pair of students.</li><li>Number of pairs among 18 students = 18C2.</li><li>18C2 = <span class="frac"><span>18 x 17</span><span>2</span></span> = 153.</li></ol>`},
{q:`A group of students gather for a party and a lot of handshaking goes on. Each student shakes hands with another student only once. Then the number of people who shake hands an odd number of times should be .....`,o:[`Odd`,`Even`,`Either`,`None`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Model people as points and handshakes as lines.</li><li>The number of handshakes by a person is the degree of that point.</li><li>In any graph, the number of odd-degree points is always even.</li><li>Therefore the number of such people must be even.</li></ol>`},
{q:`An 8' x 8' bathroom is to have its floor tiled. Each tile is 2' x 1'. In one corner of the bathroom is a sink, and its plumbing occupies a 1' x 1' square on the floor. In the opposite corner is a toilet, and its plumbing occupies a 1' x 1' square in the floor. Is it possible to achieve the required tiling of the floor (without breaking the tiles)?`,o:[`No`,`Yes`,`Depends on who fixes the tiles`,`Cannot say`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Colour the 8 x 8 floor like a chessboard.</li><li>Every 2 x 1 tile covers one square of each colour.</li><li>The sink and toilet remove two opposite corner 1 x 1 squares.</li><li>Opposite corners of an 8 x 8 board have the same colour.</li><li>So two squares of the same colour are removed, leaving unequal colour counts.</li><li>Such a board cannot be tiled by 2 x 1 tiles without breaking tiles.</li></ol><p><img class="solution-img" src="assets/puzzle-analytical-q27-tiling-solution.svg" alt="Tiling impossibility diagram"></p>`},
{q:`A herd of cattle invades a dance party. Suddenly the party is running amok with both cattle and people. A quick count reveals 120 heads and 300 feet. How many cattle are there and how many people?`,o:[`60, 150`,`30, 90`,`100, 50`,`None of these`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Let cattle = x and people = y.</li><li>Heads: x + y = 120.</li><li>Feet: 4x + 2y = 300.</li><li>Double the heads equation: 2x + 2y = 240.</li><li>Subtracting gives 2x = 60, so x = 30.</li><li>Then y = 90.</li></ol>`},
{q:`There are 2101 envelopes and 2101 letters addressed to different people. Closing your eyes, you randomly stuff one letter into each envelope. What is the probability that exactly one envelope contains the wrong letter?`,o:[`<span class="frac"><span>1</span><span>2101</span></span>`,`<span class="frac"><span>1</span><span>2</span></span>`,`1`,`0`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Exactly one wrong envelope is impossible.</li><li>If one envelope has a wrong letter, its correct letter must be in another envelope.</li><li>That other envelope is also wrong.</li><li>Hence wrong envelopes cannot be exactly one.</li><li>Probability = 0.</li></ol>`},
{q:`Three men are seated in a row, one behind the other. The last man can see the first two, the middle man can see only the first man, and the first man can see nobody. Each man has either a red or a black hat placed on his head, from a supply of three red and two black hats. The last man is asked if he knows the colour of his hat, then the middle man is asked the same question, and then the front man gives his answer. Give the possible combination of answers (yes or no) given by the three men assuming all three can think logically.`,o:[`2`,`3`,`4`,`5`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The last man can see the hats of the first two men.</li><li>If he sees two black hats, he knows his own hat must be red and says yes.</li><li>If he does not see two black hats, he says no.</li><li>The middle man then combines the last man's answer with the one hat he can see.</li><li>Checking the logical cases gives three answer sequences: yes-yes-yes, no-yes-yes and no-no-yes.</li><li>Thus the number of possible combinations is 3.</li></ol>`}
];
const questions=raw.map((q,i)=>({no:i+1,source:'Puzzle & Analytical Reasoning',type:'mcq',question:'<p><strong>Q'+(i+1)+'.</strong> '+q.q+'</p>',options:q.o.map(op=>op),answer:q.a,solution:q.s}));
const labels=['A','B','C','D'];const responses=Array(questions.length).fill(null),marked=Array(questions.length).fill(false);let current=0,submitted=false,secondsLeft=40*60,timerId=null;const qbar=document.getElementById('qbar'),host=document.getElementById('questionHost'),resultBox=document.getElementById('result');
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function stripHtml(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent.trim().replace(/\s+/g,' ')}
function correctText(q){return '('+labels[q.answer]+') '+stripHtml(q.options[q.answer]||'')}
function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('')}
function control(q,i){return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+op+'</span></span></label>').join('')+'</div>'}
function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div><div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+q.solution+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar()}
function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{el.addEventListener('input',()=>{responses[current]=el.value;renderBar()});el.addEventListener('change',()=>{responses[current]=el.value;renderBar()})})}
function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked');if(el&&!submitted)responses[current]=el.value}
function isCorrect(q,ans){if(ans===null||ans==='')return null;return Number(ans)===q.answer}
function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q)}else if(r){note.className='answer-note ok';note.textContent='Correct.'}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q)}}
function go(i){saveCurrent();current=i;renderQuestion()}function prevQ(){if(current>0)go(current-1)}function nextQ(){if(current<questions.length-1)go(current+1)}function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion()}function clearResponse(){responses[current]=null;renderQuestion()}
function submitTest(){if(submitted)return;saveCurrent();submitted=true;if(timerId){clearInterval(timerId);timerId=null}document.body.classList.add('submitted-mode');let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();setTimeout(()=>{const sol=document.getElementById('solution');if(sol)sol.scrollIntoView({behavior:'smooth',block:'start'})},60)}
function tick(){if(submitted)return;const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return}secondsLeft--}

function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')()}
const calcPopup=document.getElementById('calcPopup'),calcDisplay=document.getElementById('calcDisplay'),calcSubDisplay=document.getElementById('calcSubDisplay'),calcHandle=document.getElementById('calcDragHandle');
function updateCalcSub(){calcSubDisplay.textContent=calcDisplay.value||'0'}
document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.right='318px';calcPopup.style.top='96px';calcPopup.style.left='auto'}});
document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open')});
document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return;if(v==='C')calcDisplay.value='';else if(v==='B')calcDisplay.value=calcDisplay.value.slice(0,-1);else if(v==='+/-')calcDisplay.value=calcDisplay.value.startsWith('-')?calcDisplay.value.slice(1):('-'+(calcDisplay.value||'0'));else if(v==='sqrt'){try{calcDisplay.value=Math.sqrt(Number(calcEval(calcDisplay.value||'0')))}catch(e){calcDisplay.value='Error'}}else if(v==='1/x'){try{calcDisplay.value=1/Number(calcEval(calcDisplay.value||'0'))}catch(e){calcDisplay.value='Error'}}else if(v==='='){try{calcDisplay.value=calcEval(calcDisplay.value||'0')}catch(e){calcDisplay.value='Error'}}else calcDisplay.value+=v;updateCalcSub()}));
let dragCalc=false,calcDx=0,calcDy=0;
calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault()});
calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px'});
calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId)}catch(err){}});
calcHandle.addEventListener('pointercancel',()=>{dragCalc=false});
window.go=go;window.prevQ=prevQ;window.nextQ=nextQ;window.markReviewNext=markReviewNext;window.clearResponse=clearResponse;window.submitTest=submitTest;renderQuestion();tick();timerId=setInterval(tick,1000);
</script>
</body>
</html>
