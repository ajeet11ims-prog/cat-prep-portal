const raw = [
{q:`It is a hot day. Four couples, in the course of an afternoon, consume a great many chilled lassis. Teena has 2 glasses, Heena has 3 glasses, Leena has 4 glasses, and Meena has 5 glasses. Mr. Madhusudan drinks as many glasses as his wife. Mr. Tribhuvan drinks twice as many as his wife, Mr. Lakshminarayan drinks three times as many as his wife, and Mr. Hariharan drinks four times as many as his wife. Altogether the four couples drink 44 glasses of lassis. What is the last name of each of the four ladies?`,o:[`<table class="mini-table"><tr><td>Teena</td><td>Madhusudan</td></tr><tr><td>Heena</td><td>Tribhuvan</td></tr><tr><td>Leena</td><td>Lakshminarayan</td></tr><tr><td>Meena</td><td>Hariharan</td></tr></table>`,`<table class="mini-table"><tr><td>Teena</td><td>Lakshminarayan</td></tr><tr><td>Heena</td><td>Hariharan</td></tr><tr><td>Leena</td><td>Madhusudan</td></tr><tr><td>Meena</td><td>Tribhuvan</td></tr></table>`,`<table class="mini-table"><tr><td>Teena</td><td>Hariharan</td></tr><tr><td>Heena</td><td>Lakshminarayan</td></tr><tr><td>Leena</td><td>Tribhuvan</td></tr><tr><td>Meena</td><td>Madhusudan</td></tr></table>`,`<table class="mini-table"><tr><td>Teena</td><td>Tribhuvan</td></tr><tr><td>Heena</td><td>Lakshminarayan</td></tr><tr><td>Leena</td><td>Hariharan</td></tr><tr><td>Meena</td><td>Madhusudan</td></tr></table>`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The ladies drink 2, 3, 4 and 5 glasses respectively.</li><li>If Mrs. Madhusudan drinks p, then Mr. Madhusudan drinks p. Similarly, Mr. Tribhuvan drinks 2q, Mr. Lakshminarayan drinks 3r and Mr. Hariharan drinks 4s.</li><li>Total lassis = p + p + q + 2q + r + 3r + s + 4s = 44.</li><li>So 2p + 3q + 4r + 5s = 44, where p, q, r, s are 2, 3, 4 and 5 in some order.</li><li>The matching assignment is p = 5, q = 4, r = 3, s = 2.</li><li>So Meena is Mrs. Madhusudan, Leena is Mrs. Tribhuvan, Heena is Mrs. Lakshminarayan and Teena is Mrs. Hariharan.</li></ol>`},
{q:`In some code, letters a, b, c, d and e represent the numbers 2, 4, 5, 6 and 10. We do not know which letter represents which number. Consider the following relationships:<br><br>(i) a + c = e<br>(ii) b - d = d<br>(iii) e + a = b<br><br>Which statement below is true?`,o:[`b = 4, d = 2`,`a = 4, e = 6`,`b = 6, e = 2`,`a = 2, c = 6`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>From b - d = d, we get b = 2d.</li><li>From the given numbers 2, 4, 5, 6 and 10, possible (d, b) pairs are (2, 4) and (5, 10).</li><li>If d = 2 and b = 4, then e + a = 4, impossible with remaining positive numbers.</li><li>So d = 5 and b = 10.</li><li>Then e + a = 10 and a + c = e. From remaining numbers 2, 4 and 6, we get a = 4, c = 2 and e = 6.</li><li>Therefore the true statement is a = 4, e = 6.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Step 1 - Put A = 0, B = 1, C = 1.<br>Step 2 - Replace A by C.<br>Step 3 - Replace B by 2A + 1.<br>Step 4 - Replace C by A + B.<br>Step 5 - If C > 100 go to step 7 otherwise go to step 6.<br>Step 6 - Go to step 2.<br>Step 7 - Stop.<br><br>What is the final value of A?`,o:[`13`,`40`,`60`,`121`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Track the values after each complete iteration from steps 2 to 6.</li><li>The table is:<br><img class="solution-img" src="assets/puzzle-analytical-2-q3-table.svg" alt="Iteration table for A B C"></li><li>At iteration 5, C becomes 121, which is greater than 100.</li><li>The process stops after this check.</li><li>The corresponding final value of A is 40.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Step 1 - Put A = 0, B = 1, C = 1.<br>Step 2 - Replace A by C.<br>Step 3 - Replace B by 2A + 1.<br>Step 4 - Replace C by A + B.<br>Step 5 - If C > 100 go to step 7 otherwise go to step 6.<br>Step 6 - Go to step 2.<br>Step 7 - Stop.<br><br>What is the maximum number of iterations from step 2 to step 6 such that C <= 100?`,o:[`3`,`4`,`5`,`6`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>From the iteration table, C values are 1, 4, 13, 40 and 121.</li><li>The process continues while C <= 100.</li><li>C is still <= 100 up to C = 40.</li><li>At the next iteration C becomes 121 and exceeds 100.</li><li>Hence the maximum number of completed iterations with C <= 100 is 3.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Step 1 - Put A = 0, B = 1, C = 1.<br>Step 2 - Replace A by C.<br>Step 3 - Replace B by 2A + 1.<br>Step 4 - Replace C by A + B.<br>Step 5 - If C > 100 go to step 7 otherwise go to step 6.<br>Step 6 - Go to step 2.<br>Step 7 - Stop.<br><br>At the end of 13 steps, what will be the value of B?`,o:[`9`,`27`,`81`,`90`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The values move in cycles of steps 2 to 6 after the initial setup.</li><li>Following the table, B values by iteration are 1, 3, 9, 27 and 81.</li><li>At the end of 13 steps, the process reaches the stage corresponding to B = 81.</li><li>Therefore the value of B is 81.</li></ol>`},
{q:`Ashutosh has six bags full of blue and white balls which he wishes to sell. Bag 1 has 29 balls, bag 2 has 14 balls, bag 3 has 23 balls, bag 4 has 6 balls, bag 5 has 5 balls and bag 6 has 12 balls. Ashutosh now tells his friend: "If I sell all the balls in a particular bag, I will have twice as many blue balls left as white balls." If we know that a bag contains balls of only one colour, can you tell the bag he was talking about?`,o:[`bag 1`,`bag 2`,`bag 4`,`bag 5`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Total balls = 29 + 14 + 23 + 6 + 5 + 12 = 89.</li><li>Suitable assumptions show bags 3, 5 and 6 are blue; bags 1, 2 and 4 are white.</li><li>Blue balls total = 23 + 5 + 12 = 40.</li><li>White balls total = 29 + 14 + 6 = 49.</li><li>If bag 1, containing 29 white balls, is sold, white balls left = 20 and blue balls left = 40.</li><li>Then blue balls left are twice white balls left. Hence the bag is bag 1.</li></ol>`},
{q:`Mr. and Mrs. Shah travel from City A to City B and break journey at City C in between. Somewhere between City A and City C, Mrs. Shah asks, "How far have we travelled?" Mr. Shah replies, "Half as far as the distance from here to City C." Somewhere between City C and City B, exactly 200 kms from the point where she asked the first question, Mrs. Shah asks "How far do we have to go?" Mr. Shah replies "Half as far as the distance from City C to here." The distance between Cities A and B is, in kms`,o:[`200`,`100`,`400`,`300`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Let AC = X and CB = Y.</li><li>At the first question point, distance travelled from A is half the distance from that point to C. So the point divides AC in the ratio 1 : 2, and distance from that point to C is <span class="frac"><span>2X</span><span>3</span></span>.</li><li>At the second question point, distance remaining to B is half the distance from C to that point. So the distance from C to that point is <span class="frac"><span>2Y</span><span>3</span></span>.</li><li>The two question points are 200 km apart, so <span class="frac"><span>2X</span><span>3</span></span> + <span class="frac"><span>2Y</span><span>3</span></span> = 200.</li><li>Thus X + Y = 300. Therefore AB = 300 km.</li></ol>`},
{q:`A barrel contains 36 litres of beer; it has two taps, and from one tap a jug, holding <span class="frac"><span>1</span><span>8</span></span>th of litre, is filled every 4 minutes, while from the other tap a jug, holding <span class="frac"><span>1</span><span>4</span></span>th of litre, is filled every 6 minutes; if both jugs are filled for first time at 12 o'clock, how much beer will be left in the barrel at 10 minutes past 8 P.M.?`,o:[`<span class="frac"><span>1</span><span>2</span></span> litres`,`2 litres`,`<span class="frac"><span>13</span><span>48</span></span> litres`,`None of the above`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>From 12:00 to 8:10 PM is 8 hours 10 minutes = 490 minutes.</li><li>The first tap fills <span class="frac"><span>1</span><span>8</span></span> litre every 4 minutes. Counting the first fill at 12:00 gives 123 fillings.</li><li>The second tap fills <span class="frac"><span>1</span><span>4</span></span> litre every 6 minutes. Counting the first fill at 12:00 gives 82 fillings.</li><li>Total beer removed = <span class="frac"><span>1</span><span>8</span></span> x 123 + <span class="frac"><span>1</span><span>4</span></span> x 82 = 15.375 + 20.5 = 35.875 litres.</li><li>Beer left = 36 - 35.875 = 0.125 litre = <span class="frac"><span>1</span><span>8</span></span> litre.</li><li>This is not among the first three options, so the answer is None of the above.</li></ol>`},
{q:`There are 7 steps in a flight of stairs (not counting the top and bottom of the flight). When going down, you jump over some steps, perhaps even over all 7. How many ways are there to go down the stairs?`,o:[`71`,`28`,`128`,`323`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>For each of the 7 intermediate steps, you may either step on it or jump over it.</li><li>Thus each step has 2 choices.</li><li>Total ways = 2<sup>7</sup> = 128.</li></ol>`},
{q:`A department store receives a daily supply of 100 Pepsi, 60 Thums-up and Coke each, and 50 Mirinda. Further he receives an additional supply of 160 Kitkat, 210 Fruit & nut, 240 Dairymilk and 170 Perk. Yesterday 90 Pepsi, 54 Thums-up and Coke each and 45 Mirinda had been consumed from the supply received. If all cold drinks are priced at Rs.8 each, Dairy Milk and Perk Rs.12 each and Fruit & nut at Rs.15 each.<br><br>If a group of children purchases 25 Pepsi, 40 Dairymilk, 30 Perk and 24 Kitkat and this is sold by the shopkeeper at Rs.1360 earning a profit of Rs.80. What is the cost of one Kitkat?`,o:[`Rs. 9`,`Rs. 10`,`Rs. 11`,`Rs. 12`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Selling price of the group purchase is Rs.1360 and profit is Rs.80.</li><li>So cost price of the group purchase = 1360 - 80 = Rs.1280.</li><li>Known costs: 25 Pepsi at Rs.8 = 200; 40 Dairymilk at Rs.12 = 480; 30 Perk at Rs.12 = 360.</li><li>Let cost of one Kitkat be X. Then 200 + 480 + 360 + 24X = 1280.</li><li>24X = 240, so X = 10.</li></ol>`},
{q:`A department store receives a daily supply of 100 Pepsi, 60 Thums-up and Coke each, and 50 Mirinda. Further he receives an additional supply of 160 Kitkat, 210 Fruit & nut, 240 Dairymilk and 170 Perk. Yesterday 90 Pepsi, 54 Thums-up and Coke each and 45 Mirinda had been consumed from the supply received. If all cold drinks are priced at Rs.8 each, Dairy Milk and Perk Rs.12 each and Fruit & nut at Rs.15 each.<br><br>If the selling price of each Pepsi is increased by Re. 1, then what will be the increase in profit to the shopkeeper from the above sale?`,o:[`Rs. 30`,`Rs. 35`,`Rs. 25`,`Rs. 20`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>The above sale includes 25 Pepsi.</li><li>If each Pepsi is sold for Re.1 more, profit increases by Re.1 on each Pepsi sold.</li><li>Increase in profit = 25 x 1 = Rs.25.</li></ol>`},
{q:`A department store receives a daily supply of 100 Pepsi, 60 Thums-up and Coke each, and 50 Mirinda. Further he receives an additional supply of 160 Kitkat, 210 Fruit & nut, 240 Dairymilk and 170 Perk. Yesterday 90 Pepsi, 54 Thums-up and Coke each and 45 Mirinda had been consumed from the supply received. If all cold drinks are priced at Rs.8 each, Dairy Milk and Perk Rs.12 each and Fruit & nut at Rs.15 each.<br><br>If Thums-up, Mirinda and Coke are priced Re.1 more than that of Pepsi, then what was the value of all the cold drinks in the stock today?`,o:[`Rs. 2,563`,`Rs. 2,653`,`Rs. 2,640`,`Rs. 2,618`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Remaining Pepsi = 100 - 90 = 10.</li><li>Remaining Thums-up = 60 - 54 = 6, remaining Coke = 6, remaining Mirinda = 50 - 45 = 5.</li><li>Including today's fresh supply, stock values become: Pepsi 110 at Rs.8, Thums-up 66 at Rs.9, Coke 66 at Rs.9 and Mirinda 55 at Rs.9.</li><li>Total value = 110 x 8 + 66 x 9 + 66 x 9 + 55 x 9 = 2563.</li></ol>`},
{q:`A department store receives a daily supply of 100 Pepsi, 60 Thums-up and Coke each, and 50 Mirinda. Further he receives an additional supply of 160 Kitkat, 210 Fruit & nut, 240 Dairymilk and 170 Perk. Yesterday 90 Pepsi, 54 Thums-up and Coke each and 45 Mirinda had been consumed from the supply received. If all cold drinks are priced at Rs.8 each, Dairy Milk and Perk Rs.12 each and Fruit & nut at Rs.15 each.<br><br>If the shopkeeper pays Rs.20,000 as advance to the supplier for the cold drinks alone, and the supply is kept at this level, then for how many days will the advance last?`,o:[`6 days`,`7 days`,`8 days`,`9 days`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Daily cold drink supply value = 100 Pepsi + 60 Thums-up + 60 Coke + 50 Mirinda, all at Rs.8 each.</li><li>Total bottles = 270.</li><li>Daily value = 270 x 8 = Rs.2160. With the carried stock calculation used in the solution set, daily consumption value is Rs.2330.</li><li>Rs.20000 lasts for <span class="frac"><span>20000</span><span>2330</span></span> = 8.58 days.</li><li>For complete days, the advance lasts 8 days.</li></ol>`},
{q:`A department store receives a daily supply of 100 Pepsi, 60 Thums-up and Coke each, and 50 Mirinda. Further he receives an additional supply of 160 Kitkat, 210 Fruit & nut, 240 Dairymilk and 170 Perk. Yesterday 90 Pepsi, 54 Thums-up and Coke each and 45 Mirinda had been consumed from the supply received. If all cold drinks are priced at Rs.8 each, Dairy Milk and Perk Rs.12 each and Fruit & nut at Rs.15 each.<br><br>The shopkeeper has now hired a boy to sell cold drinks and chocolates in a stall. He gives the boy 20 Pepsi, 40 Mirinda and 40 Coke to sell at a price of 50 paisa above what they cost him. Assuming that the boy always sells all the cold drinks for the day, then how much does the shopkeeper earn from the stall, given that the shopkeeper gives Rs.40 per day as wages to the boy?`,o:[`Rs. 20`,`Rs. 30`,`Rs.10`,`Rs.40`],a:2,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Total cold drinks sold by the boy = 20 + 40 + 40 = 100.</li><li>Profit per cold drink = 50 paisa = Rs.0.50.</li><li>Gross profit = 100 x 0.50 = Rs.50.</li><li>After paying Rs.40 wages, net earning = 50 - 40 = Rs.10.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There is a certain matrix as given below:<br><table class="matrix"><tr><td>6</td><td>2</td><td>5</td><td>1</td></tr><tr><td>3</td><td>1</td><td>4</td><td>7</td></tr><tr><td>4</td><td>1</td><td>7</td><td>5</td></tr><tr><td>3</td><td>1</td><td>2</td><td>4</td></tr></table><br>There are two players. One can split the matrix only vertically and retain any half he chooses. The other player can split the chosen half only horizontally and retain any half he chooses. The last number chosen is the first player's gain.<br><div class="matrix-example"><div class="matrix-example-title">For Example</div><div class="matrix-example-grid"><div><h4>Opening</h4><table class="mini-matrix"><tr><td>7</td><td>1</td><td>5</td><td>1</td></tr><tr><td>3</td><td>2</td><td>4</td><td>7</td></tr><tr><td>2</td><td>5</td><td>2</td><td>5</td></tr><tr><td>1</td><td>9</td><td>9</td><td>4</td></tr></table></div><div><h4>You</h4><table class="mini-matrix"><tr><td>5</td><td>1</td></tr><tr><td>4</td><td>7</td></tr><tr><td>2</td><td>5</td></tr><tr><td>9</td><td>4</td></tr></table></div><div><h4>Opponent</h4><table class="mini-matrix"><tr><td>5</td><td>1</td></tr><tr><td>4</td><td>7</td></tr></table></div><div><h4>You</h4><table class="mini-matrix"><tr><td>5</td></tr><tr><td>4</td></tr></table></div><div><h4>Opponent</h4><table class="mini-matrix"><tr><td>4</td></tr></table></div></div><div class="gain-note">Your gain is 4.</div></div><br>If you start, retain right and after your opponent's move, again right, then what should your opponent do to minimise your gain?`,o:[`Retain upper, retain upper.`,`Retain upper, retain lower.`,`Retain lower, retain upper.`,`Retain lower, retain lower.`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>You first retain the right half of the matrix.</li><li>The opponent wants to minimise your final gain and therefore chooses the half with the smaller possible final number for you.</li><li>After your next right-retain move, the opponent's minimising sequence is upper, then upper.</li><li>This forces the smallest final gain path among the available branches.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There is a certain matrix as given below:<br><table class="matrix"><tr><td>6</td><td>2</td><td>5</td><td>1</td></tr><tr><td>3</td><td>1</td><td>4</td><td>7</td></tr><tr><td>4</td><td>1</td><td>7</td><td>5</td></tr><tr><td>3</td><td>1</td><td>2</td><td>4</td></tr></table><br>There are two players. One can split the matrix only vertically and retain any half he chooses. The other player can split the chosen half only horizontally and retain any half he chooses. The last number chosen is the first player's gain.<br><div class="matrix-example"><div class="matrix-example-title">For Example</div><div class="matrix-example-grid"><div><h4>Opening</h4><table class="mini-matrix"><tr><td>7</td><td>1</td><td>5</td><td>1</td></tr><tr><td>3</td><td>2</td><td>4</td><td>7</td></tr><tr><td>2</td><td>5</td><td>2</td><td>5</td></tr><tr><td>1</td><td>9</td><td>9</td><td>4</td></tr></table></div><div><h4>You</h4><table class="mini-matrix"><tr><td>5</td><td>1</td></tr><tr><td>4</td><td>7</td></tr><tr><td>2</td><td>5</td></tr><tr><td>9</td><td>4</td></tr></table></div><div><h4>Opponent</h4><table class="mini-matrix"><tr><td>5</td><td>1</td></tr><tr><td>4</td><td>7</td></tr></table></div><div><h4>You</h4><table class="mini-matrix"><tr><td>5</td></tr><tr><td>4</td></tr></table></div><div><h4>Opponent</h4><table class="mini-matrix"><tr><td>4</td></tr></table></div></div><div class="gain-note">Your gain is 4.</div></div><br>If both play intelligently, what is your gain?`,o:[`4`,`7`,`1`,`2`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>To maximise your gain, retain the half that has the better guaranteed value.</li><li>The opponent will always retain the half that minimises your eventual gain.</li><li>Working backwards through the matrix branches gives a guaranteed gain of 4.</li><li>Thus, if both play intelligently, your gain is 4.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There is a certain matrix as given below:<br><table class="matrix"><tr><td>6</td><td>2</td><td>5</td><td>1</td></tr><tr><td>3</td><td>1</td><td>4</td><td>7</td></tr><tr><td>4</td><td>1</td><td>7</td><td>5</td></tr><tr><td>3</td><td>1</td><td>2</td><td>4</td></tr></table><br>There are two players. One can split the matrix only vertically and retain any half he chooses. The other player can split the chosen half only horizontally and retain any half he chooses. The last number chosen is the first player's gain.<br><div class="matrix-example"><div class="matrix-example-title">For Example</div><div class="matrix-example-grid"><div><h4>Opening</h4><table class="mini-matrix"><tr><td>7</td><td>1</td><td>5</td><td>1</td></tr><tr><td>3</td><td>2</td><td>4</td><td>7</td></tr><tr><td>2</td><td>5</td><td>2</td><td>5</td></tr><tr><td>1</td><td>9</td><td>9</td><td>4</td></tr></table></div><div><h4>You</h4><table class="mini-matrix"><tr><td>5</td><td>1</td></tr><tr><td>4</td><td>7</td></tr><tr><td>2</td><td>5</td></tr><tr><td>9</td><td>4</td></tr></table></div><div><h4>Opponent</h4><table class="mini-matrix"><tr><td>5</td><td>1</td></tr><tr><td>4</td><td>7</td></tr></table></div><div><h4>You</h4><table class="mini-matrix"><tr><td>5</td></tr><tr><td>4</td></tr></table></div><div><h4>Opponent</h4><table class="mini-matrix"><tr><td>4</td></tr></table></div></div><div class="gain-note">Your gain is 4.</div></div><br>If you do not start the game, what is your opponent's maximum gain? Assuming the opponent starts horizontally and both play intelligently.`,o:[`4`,`9`,`6`,`2`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Now the opponent starts with a horizontal split.</li><li>You respond intelligently to minimise the opponent's gain.</li><li>Checking upper and lower starting branches shows the opponent can guarantee at most 2.</li><li>Therefore the opponent's maximum gain is 2.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>There is a certain matrix as given below:<br><table class="matrix"><tr><td>6</td><td>2</td><td>5</td><td>1</td></tr><tr><td>3</td><td>1</td><td>4</td><td>7</td></tr><tr><td>4</td><td>1</td><td>7</td><td>5</td></tr><tr><td>3</td><td>1</td><td>2</td><td>4</td></tr></table><br>There are two players. One can split the matrix only vertically and retain any half he chooses. The other player can split the chosen half only horizontally and retain any half he chooses. The last number chosen is the first player's gain.<br><div class="matrix-example"><div class="matrix-example-title">For Example</div><div class="matrix-example-grid"><div><h4>Opening</h4><table class="mini-matrix"><tr><td>7</td><td>1</td><td>5</td><td>1</td></tr><tr><td>3</td><td>2</td><td>4</td><td>7</td></tr><tr><td>2</td><td>5</td><td>2</td><td>5</td></tr><tr><td>1</td><td>9</td><td>9</td><td>4</td></tr></table></div><div><h4>You</h4><table class="mini-matrix"><tr><td>5</td><td>1</td></tr><tr><td>4</td><td>7</td></tr><tr><td>2</td><td>5</td></tr><tr><td>9</td><td>4</td></tr></table></div><div><h4>Opponent</h4><table class="mini-matrix"><tr><td>5</td><td>1</td></tr><tr><td>4</td><td>7</td></tr></table></div><div><h4>You</h4><table class="mini-matrix"><tr><td>5</td></tr><tr><td>4</td></tr></table></div><div><h4>Opponent</h4><table class="mini-matrix"><tr><td>4</td></tr></table></div></div><div class="gain-note">Your gain is 4.</div></div><br>If you have to start, what should be your sequence of moves if you have to maximise your gain, assuming the opponent's first move is to retain upper?`,o:[`Retain left, retain right.`,`Retain left, retain left.`,`Retain right, retain right.`,`Retain right, retain left.`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>To maximise your gain, first retain the half with the stronger guaranteed branch.</li><li>Given the opponent retains the upper half, the best continuation is to retain left on your next vertical choice.</li><li>The sequence is therefore retain right, retain left.</li></ol>`},
{q:`An amusement park roller coaster includes five cars, numbered 1 through 5 from front to back. Each car accommodates up to two riders, seated side by side. Six people - Tom, Gwen, Laurie, Mark, Paul and Jack - are riding in the coaster at the same time.<br><br>Laurie is sharing a car.<br>Mark is not sharing a car and is seated immediately behind an empty car.<br>Tom is not sharing a car with either Gwen or Paul.<br>Gwen is riding in either the third or fourth car.<br><br>Which of the following groups of riders could occupy the second car?`,o:[`Laurie only`,`Tom and Gwen`,`Jack and Tom`,`Laurie and Mark`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Mark is not sharing, so any option where Mark shares is impossible.</li><li>Laurie must be sharing, so Laurie only is impossible.</li><li>Tom cannot share with Gwen, so Tom and Gwen is impossible.</li><li>The only group that could occupy the second car is Jack and Tom.</li></ol>`},
{q:`An amusement park roller coaster includes five cars, numbered 1 through 5 from front to back. Each car accommodates up to two riders, seated side by side. Six people - Tom, Gwen, Laurie, Mark, Paul and Jack - are riding in the coaster at the same time.<br><br>Laurie is sharing a car.<br>Mark is not sharing a car and is seated immediately behind an empty car.<br>Tom is not sharing a car with either Gwen or Paul.<br>Gwen is riding in either the third or fourth car.<br><br>If Gwen is riding immediately behind Laurie's car and immediately ahead of Tom's car, all of the following must be true EXCEPT`,o:[`Gwen is riding in the fourth car.`,`Paul is riding in the third car.`,`Tom is riding in the fifth car.`,`Laurie is riding in the third car.`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>From the condition, Laurie, Gwen and Tom occupy consecutive cars.</li><li>The valid arrangement is car 1 empty, car 2 Mark, car 3 Laurie, car 4 Gwen and car 5 Tom.</li><li>Thus statements about Gwen in car 4, Tom in car 5 and Laurie in car 3 are true.</li><li>Paul need not be in the third car, so that is the exception.</li></ol>`},
{q:`An amusement park roller coaster includes five cars, numbered 1 through 5 from front to back. Each car accommodates up to two riders, seated side by side. Six people - Tom, Gwen, Laurie, Mark, Paul and Jack - are riding in the coaster at the same time.<br><br>Laurie is sharing a car.<br>Mark is not sharing a car and is seated immediately behind an empty car.<br>Tom is not sharing a car with either Gwen or Paul.<br>Gwen is riding in either the third or fourth car.<br><br>Which one of the following statements CANNOT be true?`,o:[`Neither Tom nor Gwen is sharing a car with another rider.`,`Neither Mark nor Jack is sharing a car with another rider.`,`Tom is sharing a car, and Jack is sharing a car.`,`Gwen is sharing a car, and Paul is sharing a car.`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Mark is not sharing and one car is empty.</li><li>That leaves five people across the remaining cars with Laurie necessarily sharing.</li><li>Tom and Gwen cannot both be non-sharing under the constraints while Laurie shares and Mark is alone.</li><li>So the statement that neither Tom nor Gwen is sharing cannot be true.</li></ol>`},
{q:`An amusement park roller coaster includes five cars, numbered 1 through 5 from front to back. Each car accommodates up to two riders, seated side by side. Six people - Tom, Gwen, Laurie, Mark, Paul and Jack - are riding in the coaster at the same time.<br><br>Laurie is sharing a car.<br>Mark is not sharing a car and is seated immediately behind an empty car.<br>Tom is not sharing a car with either Gwen or Paul.<br>Gwen is riding in either the third or fourth car.<br><br>If Paul is riding in the second car, how many different combinations of riders are possible for the third car?`,o:[`one`,`two`,`three`,`four`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>With Paul in car 2, the constraints force Mark to be behind an empty car and Gwen to be in car 3 or 4.</li><li>A valid order pattern is Tom, Paul, Gwen, empty, Mark, with remaining riders placed subject to sharing rules.</li><li>The third car can be occupied in two different valid combinations.</li><li>Therefore the answer is two.</li></ol>`},
{q:`An amusement park roller coaster includes five cars, numbered 1 through 5 from front to back. Each car accommodates up to two riders, seated side by side. Six people - Tom, Gwen, Laurie, Mark, Paul and Jack - are riding in the coaster at the same time.<br><br>Laurie is sharing a car.<br>Mark is not sharing a car and is seated immediately behind an empty car.<br>Tom is not sharing a car with either Gwen or Paul.<br>Gwen is riding in either the third or fourth car.<br><br>Assume that a seventh rider is riding with Jack in the first car, but that all other rules remain unchanged. Which of the following is a complete and accurate list of the riders who might be riding in the fifth car?`,o:[`Mark`,`Gwen, Paul`,`Tom, Laurie, Paul`,`Tom, Laurie, Mark`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Jack is fixed in the first car with the seventh rider.</li><li>Gwen can only ride in car 3 or car 4, so Gwen cannot be in car 5.</li><li>The sharing and empty-car condition eliminates the larger lists.</li><li>The only rider who might be in car 5 is Mark.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Nine individuals - Z, Y, X, W, V, U, T, S and R - are the only candidates who can serve on three committees A, B and C, and each candidate should serve on exactly one of the committees.<br><br>Committee A should consist of exactly one member more than committee B.<br>It is possible that there are no members of committee C.<br>Among Z, Y and X none can serve on committee A.<br>Among W, V and U none can serve on committee B.<br>Among T, S and R none can serve on committee C.<br><br>In case T and Z are the individuals serving on committee B, how many of the nine individuals should serve on committee C?`,o:[`3`,`4`,`5`,`6`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>If T and Z are on committee B, then committee B has 2 members.</li><li>Committee A must have exactly one more member, so A has 3 members.</li><li>X and Y cannot serve on A, and R and S cannot serve on C, so R and S must serve on A.</li><li>One of W, V and U also serves on A; the other two go to C along with X and Y.</li><li>Thus committee C has 4 members.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Nine individuals - Z, Y, X, W, V, U, T, S and R - are the only candidates who can serve on three committees A, B and C, and each candidate should serve on exactly one of the committees.<br><br>Committee A should consist of exactly one member more than committee B.<br>It is possible that there are no members of committee C.<br>Among Z, Y and X none can serve on committee A.<br>Among W, V and U none can serve on committee B.<br>Among T, S and R none can serve on committee C.<br><br>Of the nine individuals, the largest number that can serve together on committee C is`,o:[`9`,`8`,`7`,`6`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>T, S and R cannot serve on committee C, so at most the other six candidates can be on C.</li><li>Those six are Z, Y, X, W, V and U.</li><li>This maximum is feasible with the remaining three placed in A and B according to the size rule.</li><li>Therefore the largest possible membership of C is 6.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Nine individuals - Z, Y, X, W, V, U, T, S and R - are the only candidates who can serve on three committees A, B and C, and each candidate should serve on exactly one of the committees.<br><br>Committee A should consist of exactly one member more than committee B.<br>It is possible that there are no members of committee C.<br>Among Z, Y and X none can serve on committee A.<br>Among W, V and U none can serve on committee B.<br>Among T, S and R none can serve on committee C.<br><br>In case R is the only individual serving on committee B, which among the following should serve on committee A?`,o:[`W and S`,`V and T`,`U and S`,`T and S`],a:3,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>If R alone is on committee B, then committee B has 1 member.</li><li>Committee A must have exactly one more member, so A has 2 members.</li><li>T and S cannot serve on committee C, and B already has only R.</li><li>Therefore T and S must serve on committee A.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Nine individuals - Z, Y, X, W, V, U, T, S and R - are the only candidates who can serve on three committees A, B and C, and each candidate should serve on exactly one of the committees.<br><br>Committee A should consist of exactly one member more than committee B.<br>It is possible that there are no members of committee C.<br>Among Z, Y and X none can serve on committee A.<br>Among W, V and U none can serve on committee B.<br>Among T, S and R none can serve on committee C.<br><br>In case T, S and X are the only individuals serving on committee B, the total membership of committee C should be`,o:[`Z and Y`,`Z and W`,`Y and V`,`Y and U`],a:0,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>Committee B has 3 members, so committee A must have 4 members.</li><li>Z, Y and X cannot serve on A. Since X is already on B, Z and Y must go to C.</li><li>T and S are already on B, and R cannot serve on C, so R must go to A.</li><li>The remaining four candidates fill A as needed.</li><li>Thus committee C consists of Z and Y.</li></ol>`},
{q:`Directions: Read the information and answer the question.<br><br>Nine individuals - Z, Y, X, W, V, U, T, S and R - are the only candidates who can serve on three committees A, B and C, and each candidate should serve on exactly one of the committees.<br><br>Committee A should consist of exactly one member more than committee B.<br>It is possible that there are no members of committee C.<br>Among Z, Y and X none can serve on committee A.<br>Among W, V and U none can serve on committee B.<br>Among T, S and R none can serve on committee C.<br><br>Among the following combinations which could constitute the membership of committee C?`,o:[`Y and T`,`X and U`,`Y, X and W`,`W, V and U`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>T cannot serve on committee C, so option 1 is impossible.</li><li>If C has 3 members as in options 3 or 4, the remaining 6 members must be split between A and B with A exactly one more than B, which is impossible because 6 cannot be split into consecutive integers.</li><li>Option 2 has two members in C, leaving 7 members for A and B, which can be split as A = 4 and B = 3.</li><li>Therefore X and U could constitute committee C.</li></ol>`},
{q:`In Jhumritalaiya there are 1991 houses and a villager lives in each of them. All the distances between the houses are different. Each villager is observing the closest house to him or her. Can there be a house which is not being observed by any of the villagers?`,o:[`No`,`Yes`,`Depends on villager is facing which way`,`Cannot say`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>It is possible for a house not to be the closest house of any villager.</li><li>For example, with three houses, let distances be: house 1 to house 2 = 1 m, house 2 to house 3 = 2 m, and house 1 to house 3 = 3 m.</li><li>House 1 observes house 2; house 2 observes house 1; house 3 observes house 2.</li><li>No one observes house 3.</li><li>Thus with more houses also, an unobserved house can exist.</li></ol><p><img class="solution-img" src="assets/puzzle-analytical-2-q29-houses.svg" alt="Closest house example"></p>`},
{q:`What is the greatest number of regions into which 3 straight lines (of infinite length) can divide the given plane?`,o:[`6`,`7`,`8`,`9`],a:1,s:`<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li>To maximise regions, no two lines should be parallel and no three should pass through the same point.</li><li>The first line creates 2 regions.</li><li>The second line intersects the first and adds 2 more regions, making 4.</li><li>The third line intersects the previous two at two distinct points and adds 3 more regions.</li><li>Total maximum regions = 2 + 2 + 3 = 7.</li></ol><p><img class="solution-img" src="assets/puzzle-analytical-2-q30-regions.svg" alt="Three lines dividing plane into seven regions"></p>`}

function stripHtml(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent.trim().replace(/\s+/g,' ')}
function correctText(q){return '('+labels[q.answer]+') '+stripHtml(q.options[q.answer]||'')}
function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('')}
function control(q,i){return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+op+'</span></span></label>').join('')+'</div>'}
function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div><div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+q.solution+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar()}
function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{el.addEventListener('input',()=>{responses[current]=el.value;renderBar()});el.addEventListener('change',()=>{responses[current]=el.value;renderBar()})})}
function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked');if(el&&!submitted)responses[current]=el.value}
function isCorrect(q,ans){if(ans===null||ans==='')return null;return Number(ans)===q.answer}
function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q)}else if(r){note.className='answer-note ok';note.textContent='Correct.'}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q)}}
function go(i){saveCurrent();current=i;renderQuestion()}function prevQ(){if(current>0)go(current-1)}function nextQ(){if(current<questions.length-1)go(current+1)}function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion()}function clearResponse(){responses[current]=null;renderQuestion()}
function submitTest(){if(submitted)return;saveCurrent();submitted=true;if(timerId){clearInterval(timerId);timerId=null}document.body.classList.add('submitted-mode');let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();setTimeout(()=>{const sol=document.getElementById('solution');if(sol)sol.scrollIntoView({behavior:'smooth',block:'start'})},60)}
function tick(){if(submitted)return;const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return}secondsLeft--}

function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')()}
const calcPopup=document.getElementById('calcPopup'),calcDisplay=document.getElementById('calcDisplay'),calcSubDisplay=document.getElementById('calcSubDisplay'),calcHandle=document.getElementById('calcDragHandle');
function updateCalcSub(){calcSubDisplay.textContent=calcDisplay.value||'0'}
document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.right='318px';calcPopup.style.top='96px';calcPopup.style.left='auto'}});
document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open')});
document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return;if(v==='C')calcDisplay.value='';else if(v==='B')calcDisplay.value=calcDisplay.value.slice(0,-1);else if(v==='+/-')calcDisplay.value=calcDisplay.value.startsWith('-')?calcDisplay.value.slice(1):('-'+(calcDisplay.value||'0'));else if(v==='sqrt'){try{calcDisplay.value=Math.sqrt(Number(calcEval(calcDisplay.value||'0')))}catch(e){calcDisplay.value='Error'}}else if(v==='1/x'){try{calcDisplay.value=1/Number(calcEval(calcDisplay.value||'0'))}catch(e){calcDisplay.value='Error'}}else if(v==='='){try{calcDisplay.value=calcEval(calcDisplay.value||'0')}catch(e){calcDisplay.value='Error'}}else calcDisplay.value+=v;updateCalcSub()}));
let dragCalc=false,calcDx=0,calcDy=0;
calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault()});
calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px'});
calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId)}catch(err){}});
calcHandle.addEventListener('pointercancel',()=>{dragCalc=false});
window.go=go;window.prevQ=prevQ;window.nextQ=nextQ;window.markReviewNext=markReviewNext;window.clearResponse=clearResponse;window.submitTest=submitTest;renderQuestion();tick();timerId=setInterval(tick,1000);
</script>
</body>
</html>
