{q:`Seven offices in a building are to be painted. The offices are numbered 1 to 7 from front to back. Two offices must be blue, two green, two white and exactly one yellow. The two green offices must be next to each other. The two blue offices cannot be next to each other. Yellow cannot be next to white. Office 3 must be white.<br><br>If office 2 is painted green, which office must also be painted green?`,o:[`1`,`3`,`4`,`5`],a:0,s:`<p>Office 3 is white. If office 2 is green, its adjacent green partner can only be office 1 or 3. Since office 3 is already white, office 1 must be green.</p>`},
{q:`Seven offices in a building are to be painted. The offices are numbered 1 to 7 from front to back. Two offices must be blue, two green, two white and exactly one yellow. The two green offices must be next to each other. The two blue offices cannot be next to each other. Yellow cannot be next to white. Office 3 must be white.<br><br>If office 5 is painted white, which of the following could be true?`,o:[`Office 1 is painted blue.`,`Office 2 is painted yellow.`,`Office 4 is painted green.`,`Office 6 is painted blue.`],a:3,s:`<p>With offices 3 and 5 white, yellow cannot be beside either white office. Checking possible placements gives two valid patterns where office 6 can be blue. Therefore option D could be true.</p><table class="mini-table"><tr><td>Office</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td></tr><tr><td>Case</td><td>Y/G</td><td>B/G</td><td>W</td><td>B/W</td><td>W</td><td>B/G</td><td>G/Y</td></tr></table>`},
{q:`Seven offices in a building are to be painted. The offices are numbered 1 to 7 from front to back. Two offices must be blue, two green, two white and exactly one yellow. The two green offices must be next to each other. The two blue offices cannot be next to each other. Yellow cannot be next to white. Office 3 must be white.<br><br>If office 4 is painted white and an office that is green is next to a white office, which of the following must be true?`,o:[`Office 1 is painted green.`,`Office 1 is painted yellow.`,`Office 5 is painted blue.`,`Office 7 is painted blue.`],a:3,s:`<p>Office 3 and 4 are white. Green must be adjacent and also next to a white office, so possible green blocks are checked around 2-3-4-5. In all valid arrangements the seventh office becomes blue.</p>`},
{q:`Seven offices in a building are to be painted. The offices are numbered 1 to 7 from front to back. Two offices must be blue, two green, two white and exactly one yellow. The two green offices must be next to each other. The two blue offices cannot be next to each other. Yellow cannot be next to white. Office 3 must be white.<br><br>Which condition, when combined with the original conditions, determines the colour of every office?`,o:[`Office 1 must be painted yellow.`,`Office 1 must be painted green.`,`Office 4 must be painted blue.`,`Office 6 must be painted white.`],a:3,s:`<p>If office 6 is white, then with office 3 already white the remaining placement of yellow, the adjacent green pair and the non-adjacent blue pair becomes fixed.</p><table class="mini-table"><tr><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td></tr><tr><td>Y</td><td>B</td><td>W</td><td>G</td><td>G</td><td>W</td><td>B</td></tr></table>`},
{q:`In a country, signals mean:<br><table class="mini-table"><tr><td>4 Red</td><td>Stop</td></tr><tr><td>3 Red</td><td>Turn Left</td></tr><tr><td>2 Red</td><td>Turn Right</td></tr><tr><td>4 Green</td><td>Go at 150 kmph</td></tr><tr><td>3 Green</td><td>Go at 60 kmph</td></tr><tr><td>2 Green</td><td>Go at 40 kmph</td></tr></table><br>A man heads north. Starting signal is 2 Green. Then after 30 min: 3 Red and 3 Green; after 15 min: 2 Red and 3 Green; after 30 min: 2 Red and 4 Green; after 24 min: 3 Red and 3 Green; after 15 min: 4 Red. What is the total distance covered till last signal?`,o:[`140 km`,`120 km`,`110 km`,`84 km`,`115 km`],a:0,s:`<p>Distances are: 40 kmph for 30 min = 20 km; 60 kmph for 15 min = 15 km; 60 kmph for 30 min = 30 km; 150 kmph for 24 min = 60 km; 60 kmph for 15 min = 15 km. Total = 20 + 15 + 30 + 60 + 15 = 140 km.</p>`},
{q:`In a country, signals mean:<br><table class="mini-table"><tr><td>4 Red</td><td>Stop</td></tr><tr><td>3 Red</td><td>Turn Left</td></tr><tr><td>2 Red</td><td>Turn Right</td></tr><tr><td>4 Green</td><td>Go at 150 kmph</td></tr><tr><td>3 Green</td><td>Go at 60 kmph</td></tr><tr><td>2 Green</td><td>Go at 40 kmph</td></tr></table><br>A man heads north. Starting signal is 2 Green. Then after 30 min: 3 Red and 3 Green; after 15 min: 2 Red and 3 Green; after 30 min: 2 Red and 4 Green; after 24 min: 3 Red and 3 Green; after 15 min: 4 Red.<br><br>What is his net displacement with respect to the starting point?`,o:[`85.5 km towards South West`,`79.05 km towards North East`,`60 km towards North East`,`120 km towards South West`,`70 km towards South West`],a:1,s:`<p>The movement map gives net east = 45 km and net north = 65 km. Displacement = <span class="math">&radic;(45<sup>2</sup> + 65<sup>2</sup>) = &radic;6250 = 79.05 km</span>, towards North-East.</p><svg class="solution-img direction-diagram" xmlns="http://www.w3.org/2000/svg" width="520" height="330" viewBox="0 0 520 330"><rect width="520" height="330" fill="#fff"/><defs><marker id="m1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10Z" fill="#111"/></marker></defs><g stroke="#111" stroke-width="3" fill="none" marker-end="url(#m1)"><path d="M120 260 V220 H95 V190 H285 V145 H390 V70"/></g><line x1="120" y1="260" x2="390" y2="70" stroke="#777" stroke-dasharray="5 6"/><g font-size="16" font-weight="700" fill="#111"><text x="100" y="282">Start</text><text x="395" y="68">Stop</text><text x="250" y="285">45 km East</text><text x="404" y="175">65 km North</text></g></svg>`},
{q:`In a country, signals mean:<br><table class="mini-table"><tr><td>4 Red</td><td>Stop</td></tr><tr><td>3 Red</td><td>Turn Left</td></tr><tr><td>2 Red</td><td>Turn Right</td></tr><tr><td>4 Green</td><td>Go at 150 kmph</td></tr><tr><td>3 Green</td><td>Go at 60 kmph</td></tr><tr><td>2 Green</td><td>Go at 40 kmph</td></tr></table><br>A man heads north. Starting signal is 2 Green. Then after 30 min: 3 Red and 3 Green; after 15 min: 2 Red and 3 Green; after 30 min: 2 Red and 4 Green; after 24 min: 3 Red and 3 Green; after 15 min: 4 Red.<br><br>If the first signal after the starting point is 2 Red and 3 Green lights, what is the total distance covered by the man till the last signal?`,o:[`140 km`,`150 km`,`120 km`,`180 km`,`170 km`],a:0,s:`<p>The first post-signal changes direction but the speeds and time blocks remain 40, 60, 60, 150 and 60 kmph for the same durations. Total distance remains 20 + 15 + 30 + 60 + 15 = 140 km.</p>`},
{q:`Directions: If EFGHIJK are coded letters representing VUTSRQP, choose the right code.<br><br>LIMIT`,o:[`KNRNC`,`ORNRG`,`JKOKG`,`RSTSG`,`None of these`],a:1,s:`<p>The coding is based on a reverse alphabet pairing. Applying the given pattern to LIMIT gives ORNRG.</p>`},
{q:`Directions: If EFGHIJK are coded letters representing VUTSRQP, choose the right code.<br><br>SOUR`,o:[`IFLT`,`HLFI`,`LIFT`,`IHIF`,`None of these`],a:1,s:`<p>Using the same reverse-letter code, SOUR becomes HLFI.</p>`},
{q:`Directions: If EFGHIJK are coded letters representing VUTSRQP, choose the right code.<br><br>POCKET`,o:[`LKXPUC`,`KLXUPG`,`KLXGUP`,`KLXVPG`,`KLXPVG`],a:4,s:`<p>Each letter is replaced by its corresponding coded pair in the reverse pattern. POCKET becomes KLXPVG.</p>`},
{q:`If DATABASE is written as ESABATAD, then CURTAIN is written as`,o:[`NAIRTUC`,`NIATRUC`,`NIAUTRC`,`None of these`],a:1,s:`<p>DATABASE is simply written in reverse order: E S A B A T A D. Therefore CURTAIN becomes NIATRUC.</p>`},
{q:`If TAKEN is written as SYJCM, then SCHOOL is written as`,o:[`RBGKKM`,`RBGMMK`,`GBRMMK`,`RBFMMJ`],a:1,s:`<p>The letters are shifted alternately by -1 and -2: T to S, A to Y, K to J, E to C, N to M. Applying this to SCHOOL gives R B G M M K.</p>`},
{q:`When A increases, B decreases. With increase in B, C decreases. When C increases, D also increases. When D decreases, E also decreases. If there is a decrease in A then`,o:[`C decreases`,`D and E decreases`,`B increases`,`All of the above`],a:3,s:`<p>If A decreases, B increases. If B increases, C decreases. If C decreases, D decreases. If D decreases, E decreases. Hence all statements are true.</p>`},
{q:`Which option comes next in the series?<br>0, 2, 6, 12, 20, 30, 42, ?`,o:[`56`,`54`,`50`,`72`],a:0,s:`<p>The differences are consecutive even numbers: +2, +4, +6, +8, +10, +12. Next difference is +14, so next term = 42 + 14 = 56.</p>`},
{q:`Which number does not fit into the series?<br>0, 6, 24, 60, 120, 216, 336`,o:[`24`,`60`,`120`,`216`],a:3,s:`<p>The pattern is <span class="math">n<sup>3</sup> - n</span>: 1 gives 0, 2 gives 6, 3 gives 24, 4 gives 60, 5 gives 120, 6 gives 210, 7 gives 336. So 216 should be 210.</p>`},
{q:`Between 12:00 noon and 1:00 pm, when will both hands of a clock be together again?`,o:[`50 <span class="frac"><span>2</span><span>11</span></span> minutes past 12`,`45 minutes past 12`,`59 minutes past 12`,`None of the above`],a:3,s:`<p>The hands coincide at <span class="math">65<span class="frac"><span>5</span><span>11</span></span></span> minutes after 12, which is after 1:00 pm. Between 12 and 1 they do not meet again. Hence none of the above.</p>`},
{q:`P drank more at a party than W and left later than V. T drank more than P and less than V and left later than P and earlier than S. U drank less than Q and more than V and left later than S. W drank more than R and left earlier than V. Which of the following left earliest?`,o:[`P`,`S`,`T`,`W`],a:3,s:`<p>For leaving order: W left earlier than V; V earlier than P; P earlier than T; T earlier than S; S earlier than U. Therefore W left earliest.</p>`},
{q:`Identify the number at the place of (?).<br><table class="mini-table"><tr><td>4</td><td>5</td><td>26</td></tr><tr><td>9</td><td>10</td><td>101</td></tr><tr><td>25</td><td>26</td><td>?</td></tr></table>`,o:[`150`,`218`,`677`,`812`],a:2,s:`<p>In each row, the third number is square of the middle number plus 1: <span class="math">5<sup>2</sup>+1=26</span>, <span class="math">10<sup>2</sup>+1=101</span>. So <span class="math">26<sup>2</sup>+1=677</span>.</p>`},
{q:`Choose the odd one out.`,o:[`256`,`16`,`81`,`361`],a:3,s:`<p>256, 16 and 81 are powers with even or simple square structure in the given grouping; 361 = 19 square is the odd one as per the given key.</p>`},
{q:`Find the missing value.<br><table class="mini-table"><tr><td>5</td><td>81</td><td>10</td></tr><tr><td>10</td><td>289</td><td>-20</td></tr><tr><td>20</td><td>?</td><td>40</td></tr></table>`,o:[`1156`,`1225`,`1024`,`1296`],a:1,s:`<p>Middle number is the nearest perfect square to the difference of squares of the side numbers. For 10 and -20, difference is 300, nearest square is 289. For 20 and 40, difference is 1200, nearest square is 1225.</p>`},
{q:`In the following four figures/letters, find the odd one out: A, E, I, O`,o:[`A`,`E`,`I`,`O`],a:3,s:`<p>A, E and I are made only of straight strokes in the printed style. O is made by a curve. Hence O is odd.</p>`}
];
const questions=raw.map((q,i)=>({no:i+1,source:'miscellaneous',type:'mcq',question:'<p><strong>Q'+(i+1)+'.</strong> '+q.q+'</p>',options:q.o.map(op=>op),answer:q.a,solution:q.s}));
const labels=['A','B','C','D','E'];const responses=Array(questions.length).fill(null),marked=Array(questions.length).fill(false);let current=0,submitted=false,secondsLeft=32*60,timerId=null;const qbar=document.getElementById('qbar'),host=document.getElementById('questionHost'),resultBox=document.getElementById('result');
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function stripHtml(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent.trim().replace(/\s+/g,' ')}
function correctText(q){return '('+labels[q.answer]+') '+stripHtml(q.options[q.answer]||'')}
function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('')}
function control(q,i){return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+op+'</span></span></label>').join('')+'</div>'}
function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div><div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+q.solution+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar()}
function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{el.addEventListener('input',()=>{responses[current]=el.value;renderBar()});el.addEventListener('change',()=>{responses[current]=el.value;renderBar()})})}
function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked');if(el&&!submitted)responses[current]=el.value}
function isCorrect(q,ans){if(ans===null||ans==='')return null;return Number(ans)===q.answer}
function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q)}else if(r){note.className='answer-note ok';note.textContent='Correct.'}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q)}}
function go(i){saveCurrent();current=i;renderQuestion()}function prevQ(){if(current>0)go(current-1)}function nextQ(){if(current<questions.length-1)go(current+1)}function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion()}function clearResponse(){responses[current]=null;renderQuestion()}
function submitTest(){if(submitted)return;saveCurrent();submitted=true;if(timerId){clearInterval(timerId);timerId=null}document.body.classList.add('submitted-mode');let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();setTimeout(()=>{const sol=document.getElementById('solution');if(sol)sol.scrollIntoView({behavior:'smooth',block:'start'})},60)}
function tick(){if(submitted)return;const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return}secondsLeft--}

function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')()}
const calcPopup=document.getElementById('calcPopup'),calcDisplay=document.getElementById('calcDisplay'),calcSubDisplay=document.getElementById('calcSubDisplay'),calcHandle=document.getElementById('calcDragHandle');
function updateCalcSub(){calcSubDisplay.textContent=calcDisplay.value||'0'}
document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.right='318px';calcPopup.style.top='96px';calcPopup.style.left='auto'}});
document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open')});
document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return;if(v==='C')calcDisplay.value='';else if(v==='B')calcDisplay.value=calcDisplay.value.slice(0,-1);else if(v==='+/-')calcDisplay.value=calcDisplay.value.startsWith('-')?calcDisplay.value.slice(1):('-'+(calcDisplay.value||'0'));else if(v==='sqrt'){try{calcDisplay.value=Math.sqrt(Number(calcEval(calcDisplay.value||'0')))}catch(e){calcDisplay.value='Error'}}else if(v==='1/x'){try{calcDisplay.value=1/Number(calcEval(calcDisplay.value||'0'))}catch(e){calcDisplay.value='Error'}}else if(v==='='){try{calcDisplay.value=calcEval(calcDisplay.value||'0')}catch(e){calcDisplay.value='Error'}}else calcDisplay.value+=v;updateCalcSub()}));
let dragCalc=false,calcDx=0,calcDy=0;
calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault()});
calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px'});
calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId)}catch(err){}});
calcHandle.addEventListener('pointercancel',()=>{dragCalc=false});
window.go=go;window.prevQ=prevQ;window.nextQ=nextQ;window.markReviewNext=markReviewNext;window.clearResponse=clearResponse;window.submitTest=submitTest;renderQuestion();tick();timerId=setInterval(tick,1000);
</script>
</body>
</html>
