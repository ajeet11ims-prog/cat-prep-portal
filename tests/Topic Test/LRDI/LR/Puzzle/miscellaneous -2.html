<script>
const raw = [
{q:`How many squares are there in a 6 by 6 grid?<br><svg class="question-figure direction-diagram" xmlns="http://www.w3.org/2000/svg" width="230" height="230" viewBox="0 0 230 230"><rect width="230" height="230" fill="#fff"/><g stroke="#111" stroke-width="2.2" fill="none"><rect x="25" y="25" width="168" height="168"/><line x1="53" y1="25" x2="53" y2="193"/><line x1="81" y1="25" x2="81" y2="193"/><line x1="109" y1="25" x2="109" y2="193"/><line x1="137" y1="25" x2="137" y2="193"/><line x1="165" y1="25" x2="165" y2="193"/><line x1="25" y1="53" x2="193" y2="53"/><line x1="25" y1="81" x2="193" y2="81"/><line x1="25" y1="109" x2="193" y2="109"/><line x1="25" y1="137" x2="193" y2="137"/><line x1="25" y1="165" x2="193" y2="165"/></g></svg>`,o:[`45`,`75`,`91`,`65`],a:2,s:`<p>Total squares in a 6 x 6 grid = <span class="math">1<sup>2</sup>+2<sup>2</sup>+3<sup>2</sup>+4<sup>2</sup>+5<sup>2</sup>+6<sup>2</sup> = 91</span>.</p><svg class="question-figure direction-diagram" xmlns="http://www.w3.org/2000/svg" width="210" height="210" viewBox="0 0 210 210"><rect width="210" height="210" fill="#fff"/><g stroke="#111" stroke-width="2">` + Array.from({length:7},(_,i)=>`<line x1="${20+i*28}" y1="20" x2="${20+i*28}" y2="188"/><line x1="20" y1="${20+i*28}" x2="188" y2="${20+i*28}"/>`).join('') + `</g></svg>`},
{q:`P + Q means P is the son of Q; P - Q means P is the wife of Q; P x Q means P is the brother of Q; P / Q means P is the mother of Q; P = Q means P is the sister of Q. What does X + Y - Z mean?`,o:[`Z is the father of X`,`Z is the son of X`,`Z is the uncle of X`,`Z is the brother of X`],a:0,s:`<p>X + Y means X is son of Y. Y - Z means Y is wife of Z. Therefore Z is the father of X.</p>`},
{q:`Soni, who is Dubey's daughter, says to Preeti, "Your mother Shyama is the youngest sister of my father, who is third child of Prabhat." How is Prabhat related to Preeti?`,o:[`Uncle`,`Father`,`Maternal Grandfather`,`Father-in-law`],a:2,s:`<p>Soni's father is Dubey. Shyama is Dubey's sister and Preeti's mother. Prabhat is father of Dubey and Shyama, so Prabhat is Preeti's maternal grandfather.</p><svg id="soniTree" class="solution-img direction-diagram" xmlns="http://www.w3.org/2000/svg" width="520" height="260" viewBox="0 0 520 260"><rect width="520" height="260" fill="#fff"/><g stroke="#111" stroke-width="2" fill="none"><line x1="260" y1="45" x2="160" y2="120"/><line x1="260" y1="45" x2="360" y2="120"/><line x1="160" y1="120" x2="160" y2="200"/><line x1="360" y1="120" x2="360" y2="200"/></g><g fill="#fff" stroke="#111" stroke-width="2"><ellipse cx="260" cy="45" rx="55" ry="24"/><ellipse cx="160" cy="120" rx="50" ry="24"/><ellipse cx="360" cy="120" rx="55" ry="24"/><ellipse cx="160" cy="200" rx="45" ry="22"/><ellipse cx="360" cy="200" rx="45" ry="22"/></g><g font-size="16" font-weight="700" fill="#111" text-anchor="middle"><text x="260" y="51">Prabhat</text><text x="160" y="126">Dubey</text><text x="360" y="126">Shyama</text><text x="160" y="206">Soni</text><text x="360" y="206">Preeti</text><text x="418" y="166">Mother</text><text x="300" y="88">Youngest sister</text></g></svg>`},
{q:`Pointing to a person, a man said to a woman, "His mother is the only daughter of your father." How is the person related to the woman?`,o:[`Grandson`,`Son`,`Husband`,`Brother`],a:1,s:`<p>The only daughter of the woman's father is the woman herself. The person's mother is the woman. Hence the person is her son.</p>`},
{q:`P + Q means P is son of Q; P - Q means Q is wife of P; P x Q means P is brother of Q; P / Q means P is mother of Q; P = Q means Q is sister of P. What does A / B = C mean?`,o:[`C is the daughter of A`,`C is the son of A`,`C is the uncle of A`,`C is the brother of A`],a:0,s:`<p>A / B means A is mother of B. B = C means C is sister of B. Therefore C is also daughter of A.</p>`},
{q:`Pointing to a woman in a photograph, a man said, "The son of her sister's father is the maternal-uncle of my son." How is the sister of that woman related to the son of that man?`,o:[`Mother`,`Mother's sister`,`Mother or Mother's sister`,`Aunt`],a:2,s:`<p>Her sister's father is also her father. The son of that father is the woman's brother. If this brother is maternal uncle of the man's son, then the man's wife is either the woman or her sister. Therefore the sister of that woman is either mother or mother's sister of the son.</p>`},
{q:`Following data is for an examination:<br>Candidates appeared = 10,500; passed in all five subjects = 5,685; passed in three subjects only = 1,498; passed in two subjects only = 1,250; passed in one subject only = 835; failed in English only = 78; Maths only = 275; Physics only = 149; Chemistry only = 147; Biology only = 221.<br><br>How many candidates failed in all five subjects?`,o:[`4815`,`3317`,`2867`,`362`],a:3,s:`<p>Failed in exactly one subject means passed in other four subjects. So passed in four subjects only = 78 + 275 + 149 + 147 + 221 = 870. Failed in all five = 10500 - (5685 + 1498 + 1250 + 835 + 870) = 362.</p>`},
{q:`Following data is for an examination:<br>Candidates appeared = 10,500; passed in all five subjects = 5,685; passed in three subjects only = 1,498; passed in two subjects only = 1,250; passed in one subject only = 835; failed in English only = 78; Maths only = 275; Physics only = 149; Chemistry only = 147; Biology only = 221.<br><br>How many candidates passed at least in four subjects?`,o:[`6555`,`5685`,`1705`,`870`],a:0,s:`<p>Passed at least four subjects = passed all five + passed exactly four = 5685 + 870 = 6555.</p>`},

function go(i){saveCurrent();current=i;renderQuestion()}function prevQ(){if(current>0)go(current-1)}function nextQ(){if(current<questions.length-1)go(current+1)}function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion()}function clearResponse(){responses[current]=null;renderQuestion()}
function submitTest(){if(submitted)return;saveCurrent();submitted=true;if(timerId){clearInterval(timerId);timerId=null}document.body.classList.add('submitted-mode');let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();setTimeout(()=>{const sol=document.getElementById('solution');if(sol)sol.scrollIntoView({behavior:'smooth',block:'start'})},60)}
function tick(){if(submitted)return;const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return}secondsLeft--}

function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')()}
const calcPopup=document.getElementById('calcPopup'),calcDisplay=document.getElementById('calcDisplay'),calcSubDisplay=document.getElementById('calcSubDisplay'),calcHandle=document.getElementById('calcDragHandle');
function updateCalcSub(){calcSubDisplay.textContent=calcDisplay.value||'0'}
document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.right='318px';calcPopup.style.top='96px';calcPopup.style.left='auto'}});
document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open')});
document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return;if(v==='C')calcDisplay.value='';else if(v==='B')calcDisplay.value=calcDisplay.value.slice(0,-1);else if(v==='+/-')calcDisplay.value=calcDisplay.value.startsWith('-')?calcDisplay.value.slice(1):('-'+(calcDisplay.value||'0'));else if(v==='sqrt'){try{calcDisplay.value=Math.sqrt(Number(calcEval(calcDisplay.value||'0')))}catch(e){calcDisplay.value='Error'}}else if(v==='1/x'){try{calcDisplay.value=1/Number(calcEval(calcDisplay.value||'0'))}catch(e){calcDisplay.value='Error'}}else if(v==='='){try{calcDisplay.value=calcEval(calcDisplay.value||'0')}catch(e){calcDisplay.value='Error'}}else calcDisplay.value+=v;updateCalcSub()}));
let dragCalc=false,calcDx=0,calcDy=0;
calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault()});
calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px'});
calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId)}catch(err){}});
calcHandle.addEventListener('pointercancel',()=>{dragCalc=false});
window.go=go;window.prevQ=prevQ;window.nextQ=nextQ;window.markReviewNext=markReviewNext;window.clearResponse=clearResponse;window.submitTest=submitTest;renderQuestion();tick();timerId=setInterval(tick,1000);
</script>
</body>
</html>
