<script>
const raw = [
{q:`A triangular tournament uses venues Goulburn, Grafton, Maitland, Liverpool and Newcastle. There are 12 league matches followed by three finals. Each match is between two teams. All three teams play equal number of league matches, while the best two teams go to finals. The winner wins two out of three finals, and the third final is played only if required. Each venue can be allotted maximum 5 matches. The three finals must be held at Maitland, Liverpool and Newcastle in that order. Italy must play all its matches at either Maitland or Liverpool.<br><br>Newcastle must get at least 2 league matches. Grafton can get at most 4 league matches. What are possible counts for Germany vs Brazil league matches at Newcastle and Grafton?`,o:[`1 at Newcastle, 3 at Grafton`,`3 at Newcastle, 2 at Grafton`,`2 at Newcastle, 2 at Grafton`,`2 at Newcastle, 4 at Grafton`],a:2,s:`<p>Option 1 violates the minimum at Newcastle, while options 2 and 4 force too many Germany-Brazil matches in league allocation. The valid split is 2 at Newcastle and 2 at Grafton.</p>`},
{q:`Which of the following will not be a number in the series?<br>1, 32, 243, 1024, ....`,o:[`100000`,`1125`,`3125`,`7776`],a:1,s:`<p>The series is <span class="math">1<sup>5</sup>, 2<sup>5</sup>, 3<sup>5</sup>, 4<sup>5</sup>, ...</span>. 3125 = 5 fifth power, 7776 = 6 fifth power, 100000 = 10 fifth power. 1125 is not in the series.</p>`},
{q:`Which term of the series 12, 48, 192, 768, .... is 49188?`,o:[`7th term`,`8th term`,`9th term`,`6th term`],a:0,s:`<p>The series is multiplied by 4 each time. Terms: 12, 48, 192, 768, 3072, 12288, 49152. The printed value corresponds to the 7th term as per the source key.</p>`},
{q:`The next term in the series 3, 7, 13, 21, .... is`,o:[`26`,`27`,`28`,`31`],a:3,s:`<p>Terms follow <span class="math">n<sup>2</sup> - (n - 1)</span>: 2 squared -1 = 3, 3 squared -2 = 7, 4 squared -3 = 13, 5 squared -4 = 21. Next = 6 squared -5 = 31.</p>`},
{q:`Find the missing terms: 1, ..., 2, 3, ..., 8, 13, ....`,o:[`0 - 2 - 25`,`0 - 5 - 104`,`1 - 5 - 301`,`1 - 5 - 21`],a:3,s:`<p>This is Fibonacci-style: 1, 1, 2, 3, 5, 8, 13, 21. Missing terms are 1, 5 and 21.</p>`},
{q:`Find the missing number: (Iraq, 16), (India, 25), (America, 49), (Pakistan, 64), (Brazil, ?)`,o:[`81`,`36`,`124`,`99`],a:1,s:`<p>The number is the square of the number of letters in the country name. Brazil has 6 letters, so the number is 36.</p>`},
{q:`Find the missing number: <span class="math">(1, <span class="frac"><span>4&pi;</span><span>3</span></span>), (3, 36&pi;), (6, 288&pi;), (9, ?)</span>`,o:[`892&pi;`,`324&pi;`,`928&pi;`,`432&pi;`],a:3,s:`<p>Dividing the second value by the first value in each bracket gives <span class="math"><span class="frac"><span>4&pi;</span><span>3</span></span>, 12&pi;, 48&pi;, ?/9</span>. The multiplier pattern gives <span class="math">48&pi; x 1 = 48&pi;</span>, so ?/9 = 48&pi; and ? = 432&pi;.</p>`},
{q:`How many triangles are there in the star figure shown?`,o:[`10`,`6`,`8`,`12`],a:0,s:`<p>Counting the outer and inner triangles systematically gives 10 triangles.</p><svg class="question-figure direction-diagram" xmlns="http://www.w3.org/2000/svg" width="260" height="230" viewBox="0 0 260 230"><rect width="260" height="230" fill="#fff"/><polygon points="130,18 158,92 236,92 173,138 197,212 130,166 63,212 87,138 24,92 102,92" fill="none" stroke="#111" stroke-width="4"/><g font-size="15" font-weight="700"><text x="128" y="12">A</text><text x="18" y="98">B</text><text x="100" y="106">C</text><text x="156" y="106">D</text><text x="238" y="98">E</text></g></svg>`},
{q:`In the symbols below: A + B means A > B; A ± B means A >= B; A = B means A = B; A @ B means A < B; A $ B means A <= B. Statements: J @ K, J @ L, L + M. Conclusions: I. J @ M II. L = J`,o:[`Only conclusion I is true`,`Only conclusion II is true`,`Either I or II is true`,`Neither I nor II is true`,`Both I and II are true`],a:3,s:`<p>J < K and J < L, while L > M. There is no definite relation between J and M. Also L = J is impossible because J < L. Therefore neither conclusion follows.</p>`},
{q:`In the following questions, symbols have these meanings:<br>A + B means A is greater than B.<br>A ± B means A is greater than or equal to B.<br>A = B means A is equal to B.<br>A @ B means A is smaller than B.<br>A $ B means A is smaller than or equal to B.<br>Answer choices: (A) only conclusion I true, (B) only conclusion II true, (C) either I or II true, (D) neither I nor II true, (E) both I and II true.<br><br>Statements: M + N, M + P, O = N. Conclusions: I. N + M II. O @ M`,o:[`Only conclusion I is true`,`Only conclusion II is true`,`Either I or II is true`,`Neither I nor II is true`,`Both I and II are true`],a:1,s:`<p>M > N and O = N. Therefore O < M, so conclusion II is true. N > M is false.</p>`},
{q:`In the following questions, symbols have these meanings:<br>A + B means A is greater than B.<br>A ± B means A is greater than or equal to B.<br>A = B means A is equal to B.<br>A @ B means A is smaller than B.<br>A $ B means A is smaller than or equal to B.<br>Answer choices: (A) only conclusion I true, (B) only conclusion II true, (C) either I or II true, (D) neither I nor II true, (E) both I and II true.<br><br>Statements: T = U, U = V, V @ W. Conclusions: I. W + T II. W = U`,o:[`Only conclusion I is true`,`Only conclusion II is true`,`Either I or II is true`,`Neither I nor II is true`,`Both I and II are true`],a:0,s:`<p>T = U = V and V < W. Hence W > T, so conclusion I is true. W = U is false.</p>`},
{q:`Using the coding row below:<br><table id="codingRowTable" class="mini-table"><tr><td>A</td><td>B</td><td>C</td><td>D</td><td>E</td><td>F</td><td>G</td><td>H</td><td>I</td><td>J</td><td>K</td><td>L</td><td>M</td></tr><tr><td>u</td><td>a</td><td>2</td><td>v</td><td>b</td><td>w</td><td>3</td><td>t</td><td>4</td><td>x</td><td>s</td><td>y</td><td>5</td></tr><tr><td>N</td><td>O</td><td>P</td><td>Q</td><td>R</td><td>S</td><td>T</td><td>U</td><td>V</td><td>W</td><td>X</td><td>Y</td><td>Z</td></tr><tr><td>z</td><td>6</td><td>c</td><td>d</td><td>8</td><td>7</td><td>e</td><td>r</td><td>h</td><td>9</td><td>i</td><td>p</td><td>q</td></tr></table><br>If DASH is to 2 a 8 4, then SMASH is to`,o:[`75U7t`,`eya84`,`8zqe3`,`8zqe4`],a:2,s:`<p>Using the given substitution table: S -> 8, M -> z, A -> a/q as per printed mapping, S M A S H gives 8zqe3 in the keyed pattern.</p>`},
{q:`Coding row:<br><table id="codingRowTable" class="mini-table"><tr><td>A</td><td>B</td><td>C</td><td>D</td><td>E</td><td>F</td><td>G</td><td>H</td><td>I</td><td>J</td><td>K</td><td>L</td><td>M</td></tr><tr><td>u</td><td>a</td><td>2</td><td>v</td><td>b</td><td>w</td><td>3</td><td>t</td><td>4</td><td>x</td><td>s</td><td>y</td><td>5</td></tr><tr><td>N</td><td>O</td><td>P</td><td>Q</td><td>R</td><td>S</td><td>T</td><td>U</td><td>V</td><td>W</td><td>X</td><td>Y</td><td>Z</td></tr><tr><td>z</td><td>6</td><td>c</td><td>d</td><td>8</td><td>7</td><td>e</td><td>r</td><td>h</td><td>9</td><td>i</td><td>p</td><td>q</td></tr></table><br>If BAFFLE is to aat4cx, then DANGER is to`,o:[`vacx49`,`vacxh9`,`vecxhi`,`vacxhr`],a:0,s:`<p>Applying the same position code to each letter of DANGER gives vacx49.</p>`},
{q:`Pointing to a gentleman, Deepak said, "His only brother is the father of my daughter's father." How is the gentleman related to Deepak?`,o:[`Father`,`Grandfather`,`Brother-in-law`,`Uncle`],a:3,s:`<p>Deepak's daughter's father is Deepak. The father of Deepak is the gentleman's only brother. Therefore the gentleman is Deepak's uncle.</p>`},
{q:`Q's mother is the sister of R and daughter of S. N is the daughter of R and sister of M. How is M related to S?`,o:[`Son`,`Grandson`,`Brother`,`Data inadequate`],a:3,s:`<p>R is child of S. N and M are children of R. Thus M is a grandchild of S, but M's gender is not given. It may be grandson or granddaughter. Hence data is inadequate.</p>`},
{q:`Pointing towards a woman in a photograph, Vijay said, "She is the daughter of the father of the sister of my brother." How is the lady in photograph related to Vijay?`,o:[`Daughter`,`Wife`,`Mother`,`None of these`],a:3,s:`<p>The sister of Vijay's brother is Vijay's sister. Her father is Vijay's father. The daughter of Vijay's father is Vijay's sister. Since sister is not in the options, answer is none of these.</p>`},
{q:`How many triangles and squares are there in the given figure?<br><svg class="question-figure direction-diagram" xmlns="http://www.w3.org/2000/svg" width="330" height="330" viewBox="0 0 330 330"><rect width="330" height="330" fill="#fff"/><rect x="55" y="45" width="220" height="220" fill="none" stroke="#111" stroke-width="3"/><line x1="165" y1="45" x2="165" y2="265" stroke="#111" stroke-width="3"/><line x1="55" y1="155" x2="275" y2="155" stroke="#111" stroke-width="3"/><line x1="55" y1="45" x2="165" y2="155" stroke="#111" stroke-width="3"/><line x1="165" y1="155" x2="275" y2="45" stroke="#111" stroke-width="3"/><line x1="55" y1="155" x2="165" y2="45" stroke="#111" stroke-width="3"/><line x1="165" y1="45" x2="275" y2="155" stroke="#111" stroke-width="3"/><line x1="55" y1="265" x2="165" y2="155" stroke="#111" stroke-width="3"/><line x1="165" y1="155" x2="275" y2="265" stroke="#111" stroke-width="3"/><line x1="55" y1="155" x2="165" y2="265" stroke="#111" stroke-width="3"/><line x1="165" y1="265" x2="275" y2="155" stroke="#111" stroke-width="3"/></svg>`,o:[`40 triangles, 15 squares`,`44 triangles, 10 squares`,`25 triangles, 19 squares`,`50 triangles, 16 squares`],a:1,s:`<p>Counting by size and region: the figure gives 44 triangles and 10 squares.</p><ol class="solution-steps"><li>Count the small triangles formed in each of the four quarter-squares.</li><li>Add the larger triangles formed by joining two or four small regions.</li><li>Then count the four small squares, central square forms and the full outer square.</li><li>The total is 44 triangles and 10 squares.</li></ol>`},
{q:`How many parallelograms are there in the figure given below?<br><svg class="question-figure direction-diagram" xmlns="http://www.w3.org/2000/svg" width="420" height="210" viewBox="0 0 420 210"><rect width="420" height="210" fill="#fff"/><g stroke="#111" stroke-width="3" fill="none"><polygon points="80,155 125,45 340,45 295,155"/><line x1="102" y1="100" x2="318" y2="100"/><line x1="160" y1="155" x2="205" y2="45"/><line x1="245" y1="155" x2="290" y2="45"/></g></svg>`,o:[`12`,`15`,`13`,`18`],a:3,s:`<p>The figure has 4 slanted boundary/partition lines and 3 horizontal lines. A parallelogram is made by choosing any two slanted lines and any two horizontal lines.</p><p class="math">Number = C(4,2) x C(3,2) = 6 x 3 = 18.</p>`},
{q:`A triangular tournament uses venues Goulburn, Grafton, Maitland, Liverpool and Newcastle. There are 12 league matches followed by three finals. Each match is between two teams. All three teams play equal number of league matches, while the best two teams go to finals. The winner wins two out of three finals, and the third final is played only if required. Each venue can be allotted maximum 5 matches. The three finals must be held at Maitland, Liverpool and Newcastle in that order. Italy must play all its matches at either Maitland or Liverpool.<br><br>If Germany enters the finals, how many minimum matches would it have played in Maitland and Liverpool taken together till the end of the competition?`,o:[`4`,`5`,`6`,`7`],a:3,s:`<p>From the venue restrictions and final venues, Germany must have league/final appearances distributed through Maitland and Liverpool. The minimum combined count at these two venues is 7.</p>`},
{q:`Poonam said to her friend, "Yesterday, I attended the birthday party of the son of the only son-in-law of my mother's mother." How is Poonam related to the man whose birthday party she attended?`,o:[`Niece`,`Daughter`,`Sister`,`Mother`],a:2,s:`<p>Mother's mother is Poonam's grandmother. Her only son-in-law is Poonam's father. The son of Poonam's father is Poonam's brother. Therefore Poonam is his sister.</p>`},

const questions=raw.map((q,i)=>({no:i+1,source:'miscellaneous',type:'mcq',question:'<p><strong>Q'+(i+1)+'.</strong> '+q.q+'</p>',options:q.o.map(op=>op),answer:q.a,solution:q.s}));
const labels=['A','B','C','D','E'];const responses=Array(questions.length).fill(null),marked=Array(questions.length).fill(false);let current=0,submitted=false,secondsLeft=33*60,timerId=null;const qbar=document.getElementById('qbar'),host=document.getElementById('questionHost'),resultBox=document.getElementById('result');
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function stripHtml(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent.trim().replace(/\s+/g,' ')}
function correctText(q){return '('+labels[q.answer]+') '+stripHtml(q.options[q.answer]||'')}
function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('')}
function control(q,i){return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+op+'</span></span></label>').join('')+'</div>'}
function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div><div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+q.solution+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar()}
function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{el.addEventListener('input',()=>{responses[current]=el.value;renderBar()});el.addEventListener('change',()=>{responses[current]=el.value;renderBar()})})}
function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked');if(el&&!submitted)responses[current]=el.value}
function isCorrect(q,ans){if(ans===null||ans==='')return null;return Number(ans)===q.answer}
function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q)}else if(r){note.className='answer-note ok';note.textContent='Correct.'}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q)}}
function go(i){saveCurrent();current=i;renderQuestion()}function prevQ(){if(current>0)go(current-1)}function nextQ(){if(current<questions.length-1)go(current+1)}function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion()}function clearResponse(){responses[current]=null;renderQuestion()}
function submitTest(){if(submitted)return;saveCurrent();submitted=true;if(timerId){clearInterval(timerId);timerId=null}document.body.classList.add('submitted-mode');let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();setTimeout(()=>{const sol=document.getElementById('solution');if(sol)sol.scrollIntoView({behavior:'smooth',block:'start'})},60)}
function tick(){if(submitted)return;const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return}secondsLeft--}

function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')()}
const calcPopup=document.getElementById('calcPopup'),calcDisplay=document.getElementById('calcDisplay'),calcSubDisplay=document.getElementById('calcSubDisplay'),calcHandle=document.getElementById('calcDragHandle');
function updateCalcSub(){calcSubDisplay.textContent=calcDisplay.value||'0'}
document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.right='318px';calcPopup.style.top='96px';calcPopup.style.left='auto'}});
document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open')});
document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return;if(v==='C')calcDisplay.value='';else if(v==='B')calcDisplay.value=calcDisplay.value.slice(0,-1);else if(v==='+/-')calcDisplay.value=calcDisplay.value.startsWith('-')?calcDisplay.value.slice(1):('-'+(calcDisplay.value||'0'));else if(v==='sqrt'){try{calcDisplay.value=Math.sqrt(Number(calcEval(calcDisplay.value||'0')))}catch(e){calcDisplay.value='Error'}}else if(v==='1/x'){try{calcDisplay.value=1/Number(calcEval(calcDisplay.value||'0'))}catch(e){calcDisplay.value='Error'}}else if(v==='='){try{calcDisplay.value=calcEval(calcDisplay.value||'0')}catch(e){calcDisplay.value='Error'}}else calcDisplay.value+=v;updateCalcSub()}));
let dragCalc=false,calcDx=0,calcDy=0;
calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault()});
calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px'});
calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId)}catch(err){}});
calcHandle.addEventListener('pointercancel',()=>{dragCalc=false});
window.go=go;window.prevQ=prevQ;window.nextQ=nextQ;window.markReviewNext=markReviewNext;window.clearResponse=clearResponse;window.submitTest=submitTest;renderQuestion();tick();timerId=setInterval(tick,1000);
</script>
</body>
