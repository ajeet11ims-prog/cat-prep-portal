  }
  function bindAnswer(){
    var inputs = host.querySelectorAll('[name^="answer_"]');
    for (var i = 0; i < inputs.length; i++) {
      inputs[i].addEventListener('input',function(){responses[current]=this.value;renderBar();});
      inputs[i].addEventListener('change',function(){responses[current]=this.value;renderBar();});
    }
  }
  function normalizedAnswer(v){return String(valueOrEmpty(v)).replace(/,/g,'').replace(/^\s+|\s+$/g,'').toLowerCase();}
  function isCorrect(i){
    if (responses[i] === null || responses[i] === '') { return false; }
    return normalizedAnswer(responses[i]) === normalizedAnswer(answerKey[i].value);
  }
  function answerHtml(i){
    var q = questions[i];
    var v = responses[i];
    if (v === null || v === '') { return 'Not answered'; }
    if (qType(q) === 'mcq') {
      var idx = parseInt(v,10);
      if (!isNaN(idx) && q.options && q.options[idx]) {
        return labels[idx] + ') ' + rich(q.options[idx]);
      }
    }
    return esc(v);
  }
  function renderResults(){
    var score = 0;
    var rows = [];
    var cards = [];
    for (var i = 0; i < questions.length; i++) {
      var ok = isCorrect(i);
      if (ok) { score++; }
      rows.push('<tr><td>'+(i+1)+'</td><td>'+answerHtml(i)+'</td><td>'+rich(answerKey[i].display)+'</td><td class="'+(ok?'correct':'wrong')+'">'+(ok?'Correct':'Wrong')+'</td></tr>');
      cards.push('<div class="solution-card"><h3>Question '+(i+1)+'</h3><div class="answer-line"><span><b>Your answer:</b> '+answerHtml(i)+'</span><span><b>Correct answer:</b> '+rich(answerKey[i].display)+'</span><span class="'+(ok?'correct':'wrong')+'">'+(ok?'Correct':'Wrong')+'</span></div><div class="solution-text">'+rich(answerKey[i].solution)+'</div></div>');
    }
    host.innerHTML = '<div class="result-panel"><div class="score-box"><h2>Score: '+score+' / '+questions.length+'</h2><p>Answer key and solutions are shown below.</p></div><table class="answer-key"><thead><tr><th>Q</th><th>Your Answer</th><th>Correct Answer</th><th>Status</th></tr></thead><tbody>'+rows.join('')+'</tbody></table>'+cards.join('')+'<div class="navrow"><button type="button" onclick="reviewTest()">Back to Questions</button></div></div>';
    renderBar();
    typesetMath(host);
  }
  function pad2(n){return n < 10 ? '0' + n : String(n);}
  function tick(){var m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=pad2(m)+':'+pad2(s);if(secondsLeft>0)secondsLeft--;}
  window.go=function(i){if(!submitted){saveCurrent();}current=i;submitted=false;renderQuestion();};window.nextQ=function(){saveCurrent();if(current<questions.length-1)current++;renderQuestion();};window.markReviewNext=function(){saveCurrent();marked[current]=true;if(current<questions.length-1)current++;renderQuestion();};window.clearResponse=function(){responses[current]=null;renderQuestion();};window.submitTest=function(){saveCurrent();submitted=true;renderResults();};window.reviewTest=function(){submitted=false;renderQuestion();};
  renderQuestion();tick();setInterval(tick,1000);
})();
</script>
