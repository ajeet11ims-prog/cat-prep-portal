  <style>

    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;grid-template-rows:minmax(0,1fr);gap:0;margin:0;padding:0;background:#fff;position:relative}main>section{grid-column:1;grid-row:1;min-width:0;min-height:0;border-right:2px solid #41515c;display:flex;flex-direction:column;overflow:hidden}main>section>#result{flex:0 0 auto}main>section>#testForm{flex:1 1 auto;min-height:0;overflow:hidden}main>aside:first-child{grid-column:2;grid-row:1}.panel,.question-card,#result{background:var(--paper);border:0;border-radius:0}.panel{padding:14px;align-self:stretch;position:static;background:#e5f6fc}.question-palette-panel{display:flex;flex-direction:column;overflow:auto}.calc-wrap{position:fixed!important;top:120px;left:52%;width:264px;z-index:50;border:1px solid #7c8991;box-shadow:0 7px 18px rgba(0,0,0,.28);display:none;padding:0;align-self:auto;background:#eee}.calc-wrap.open{display:block}.panel h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--brand-mid);color:#fff;font-weight:700}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#7fd7f2;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin:18px 0;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;min-height:0;overflow-y:auto;overflow-x:hidden;padding:0 0 88px;background:#fff;scroll-behavior:smooth;overscroll-behavior:contain}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:block;font-size:13px;color:var(--muted);margin-top:2px}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px;white-space:pre-wrap}.qtext p,.block p,.option p{margin:0 0 10px}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,calc(100% - 48px));font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 28px;padding:16px 18px 24px;border:1px solid var(--line);border-radius:4px;background:#fbfcfd;font-size:17px;line-height:1.6;white-space:normal;overflow:visible}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}

    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

    .formula-box{margin:14px 0;padding:12px 14px;border:2px solid #2d7fb8;background:#f4fbff;font-size:17px;font-weight:700}
    .shortcut-box{margin:14px 0;padding:12px 14px;border-left:5px solid #60b947;background:#f5fbf2}
    .final-answer{margin-top:14px;padding:10px 12px;background:#fff7df;border:1px solid #e4c86d;font-size:18px;font-weight:800}
    .solution-step{margin:0 0 10px}

<body>
  <header><div class="topbar"><div class="title"><h1>Percentage Test -4</h1><div class="meta">Quantitative Aptitude | 30 Questions | 60 Minutes | +3 correct, -1 wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>
    <section><div id="result"></div><form id="testForm" autocomplete="off"><div id="questionHost" class="question-card"></div></form></section>
    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">x</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">Back</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">sqrt</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
      { q: "60% of P is 32 less than 50% of Q and the sum of 50% of P and 75% of Q is equivalent to Q. Find the difference between P and Q.", type: "text", answer: "80", accepted: ["80"] },
      { q: "The sum of 120% of 220 and 560% of 625% of 20 is equal to the sum of 80% of 180% of 250 and X. What is the value of 150% of X?", type: "text", answer: "906", accepted: ["906"] },
      { q: "In a group of 600 people, the ratio of males to females is 5:1. 72.5% of people are graduates. If 84% of males are graduates, then what percentage of females are graduates?", type: "text", answer: "15", accepted: ["15", "15%"] },
      { q: "Obama bought some shirts. He gave 70% of the total shirts to Johnson and the rest to Biden. Next day, he buys 25% more shirts than the previous day. If he gave 10% more shirts to Johnson than the previous day, then the number of shirts given to Biden is what percent more than the previous day?", type: "text", answer: "60", accepted: ["60", "60%"] },
      { q: "There are four numbers such that A is 60% more than B and C is 30% less than the sum of B and A. If D is 10% more than C and the difference between D and B is 3006, then find C.", type: "text", answer: "5460", accepted: ["5460"] },
      { q: "The price of an iPhone increased by 20% and then decreased by 15%. The price of an android smartphone increased by 15% and then decreased by 20%. If final prices of both items are same, find the ratio of initial price of iPhone to initial price of android smartphone.", type: "mcq", options: ["187/207", "46/51", "23/27", "19/21"], answer: 1 },
      { q: "In a tank full of plastic balls of 4 different colours, 18% of the total balls are Red, 4/9 are Blue, and 8% are Green. If there are 133 yellow balls, find the difference between the number of Red balls and Green balls.", type: "mcq", options: ["45", "90", "30", "60"], answer: 0 },
      { q: "At a marriage party, 45% of the guests are men and the remaining are women. 80% of the women guests are married and 40% of the men guests are unmarried. If 50% of the married men guests are present with their better halves, find the percentage of women who are married but not with their husbands.", type: "mcq", options: ["30.5%", "32.5%", "37.5%", "35.5%"], answer: 0 },
      { q: "In the Delhi election, 55% of voters in a constituency are males and the rest are females. If 70% of males are employed and 60% of females are unemployed, then the number of unemployed males is what percent more or less than the number of employed females?", type: "mcq", options: ["8%", "8.3%", "8.1%", "7%"], answer: 1 },
      { q: "In 2020, Vishal got 20% more incentive in the 3rd month than in the 2nd month. His incentive in the 4th month was 7 61/77% more than in the 3rd month. If he got Rs. 4500 in the first month and the difference between incentives in the 4th and 2nd month is Rs. 1130, then the total incentive received in the first four months is:", type: "mcq", options: ["Rs. 17950", "Rs. 16480", "Rs. 18560", "None of these"], answer: 0 },
      { q: "There are three items A, B, and C. Price of A is 25% more than B, and price of C is 10% more than A. The sum of the difference between A and B, and the difference between B and C is Rs. 50. The difference between A and B is how much more or less than the difference between B and C?", type: "mcq", options: ["Rs. 10 more", "Rs. 10 less", "Rs. 20 less", "Rs. 20 more"], answer: 1 },
      { q: "Every morning at 6:00 am, Usain leaves his house for his daily running routine and returns at 9:00 am. One day, he decided to cover the distance in 2/3 of the usual time. Find the percentage change in his speed.", type: "mcq", options: ["50%", "75%", "100%", "66.6%"], answer: 0 },
      { q: "The radius of a circle decreases by 17%. If the absolute value of percentage change in area is written up to 2 decimal places as XY.ZW, find X + Y + Z + W.", type: "mcq", options: ["6", "8", "4", "7"], answer: 0 },
      { q: "Naruto generally orders 37.92 grams of ramen at a fixed price of 948 Yen. On a particular day Naruto ate 10% less than usual, but the price of ramen was hiked by 20%. What is the extra/less amount that needs to be paid on this day?", type: "mcq", options: ["30.52 Yen less than usual", "25.93 Yen more than usual", "45.52 Yen more than usual", "75.84 Yen more than usual"], answer: 3 },
      { q: "A landowner increased the length and breadth of a rectangular plot by 30% and 25% respectively. Find the percentage change in the cost of the plot assuming land prices are uniform throughout his plot.", type: "mcq", options: ["12.5%", "13%", "625%", "None of the above"], answer: 3 },
      { q: "The rate per month of increase in income is 2 times that of expenditure. If there is no saving in the first month and total savings in two months is 1/5 of the initial income, then the rate at which expenditure increased is:", type: "mcq", options: ["5%", "10%", "20%", "22%"], answer: 2 },
      { q: "Property rates per sq. feet are 16 2/3% less in locality B than A, and locality C is 25% less than B. Locality D is 50% more than E. Rates in A and E are same. If Mohan purchases 100 sq. feet each in C and D at an average rate of Rs. 255 per square feet, then the amount needed for 100 sq. feet each in A and E is:", type: "mcq", options: ["Rs. 51,000", "Rs. 50,000", "Rs. 49,000", "Rs. 48,000"], answer: 3 },
      { q: "At Physics Wallah, 60% of a class are boys and 25% of the boys are at least 5 feet tall. If 25% of the girls are less than 5 feet tall, what is the percentage difference of students who are less than 5 feet and at least 5 feet tall?", type: "mcq", options: ["10%", "16.67%", "33.33%", "35%"], answer: 0 },
      { q: "An organization gives its sales staff incentives based on sales value. In a particular year, despite a 5 percentage point increment on commission from 20%, total commission remained unaltered. Find the change in volume of sales.", type: "mcq", options: ["-5%", "-15%", "-20%", "-33 1/3%"], answer: 2 },
      { q: "The population of Uttarakhand is 19,57,263 in 2010. There is steady growth of 20% at the start of every year and death rate of 8.33% at the end of every year. In the end of 2013, floods caused an effective death rate of r%. The population after floods was still 21% more than in 2010. Find r.", type: "mcq", options: ["20%", "83.33%", "16.67%", "25%"], answer: 2 },
      { q: "Santa has companies A, B and C and a trust X. Each company gives 5% charity to trust X excluding loans taken from other group companies. A gave a loan to B equal to 10% of B's total fund. After receiving the loan, B has twice the fund of C. If C gives Rs. 20,000 as donation, find the approximate contribution of B.", type: "mcq", options: ["Rs. 36000", "Rs. 36300", "Rs. 28500", "Rs. 35500"], answer: 1 },
      { q: "In a bag, there are 150 coins of denominations Rs. 1, Rs. 2 and Rs. 5 with at least one coin of each. The total value of Re. 1 coins is at least 50% of total value. If there are 23 Rs. 5 coins and total value of Rs. 2 coins is at least 3% of total value, find the number of Rs. 2 coins.", type: "mcq", options: ["1", "2", "3", "4"], answer: 3 },
      { q: "An unscrupulous trader rigged his electronic weighing scale such that it shows 1 kg when 925 gms of goods are kept on it. Find the percentage error in measurement.", type: "text", answer: "8.10%", accepted: ["8.10", "8.10%", "8.1", "8.1%"] },
      { q: "The height and base of a triangle are changed such that even though the base is decreased by 11.11%, the area increases by 10%. Find the percentage change in height.", type: "text", answer: "23.75%", accepted: ["23.75", "23.75%"] },
      { q: "In a college, the number of students decreased by 10% and the price of a rim of paper increased by 25% over the previous year. By how much should usage of rims of papers be cut short by each student so that total money spent remains the same?", type: "text", answer: "11.11%", accepted: ["11.11", "11.11%", "11.1", "11.1%", "100/9", "11 1/9%"] },
      { q: "In an examination of PW Mock CAT, Mohan scored 92%, Nishant scored 56% and Samarth scored 634 marks out of total marks. Average marks scored by them was 643. What percentage of total marks did Samarth get?", type: "text", answer: "72.45%", accepted: ["72.45", "72.45%"] },
      { q: "The amount of money Dia gave to her friend is 69% of the amount remaining with her. Had Dia given 20% less money than now, she would have Rs. 434 more than she has now. What approximate percent is Rs. 3000 of the total amount of money she had?", type: "mcq", options: ["85%", "122%", "91%", "56%"], answer: 3 },
      { q: "A marketing unit found that 30% of potential customers bought a product and the rest did not. Of buyers, 40% saw its online advertisement; of non-buyers, 45% saw the advertisement. Find the ratio of those who bought and saw the ad to those who saw the ad but did not buy.", type: "mcq", options: ["24 : 63", "24 : 35", "40 : 63", "None of these"], answer: 0 },
      { q: "In an examination, 55% candidates passed in English and 75% passed in History, but 20% failed in both. If 3200 candidates passed in both subjects, find the number of candidates who appeared.", type: "mcq", options: ["4800", "9600", "6400", "7200"], answer: 2 },
      { q: "Monthly income of A is 25% more than B and 20% less than C. Monthly expenditure of B is 20% more than C and 25% less than A. If A saves 60% of his monthly income, then monthly savings of B is approximately what percent of monthly savings of C?", type: "text", answer: "50", accepted: ["50", "50%"] }
    ];

    const solutionText = [
      `<p class="solution-step"><strong>Step 1:</strong> From 50% of P + 75% of Q = Q, we get 0.5P = 0.25Q, hence P = Q/2.</p><p class="solution-step"><strong>Step 2:</strong> Substitute P = Q/2 in 60% of P = 50% of Q − 32.</p><div class="formula-box">0.60(Q/2) = 0.50Q − 32<br>0.30Q = 0.50Q − 32<br>0.20Q = 32</div><p class="solution-step">Therefore Q = 160 and P = 80.</p><div class="shortcut-box"><strong>Difference:</strong> Q − P = 160 − 80 = 80.</div><div class="final-answer">Final Answer: 80</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Calculate the left side.</p><div class="formula-box">120% of 220 = 264<br>625% of 20 = 125<br>560% of 125 = 700<br>Left side = 264 + 700 = 964</div><p class="solution-step"><strong>Step 2:</strong> 80% of 180% of 250 = 0.8 × 1.8 × 250 = 360.</p><p class="solution-step">Thus 360 + X = 964, so X = 604.</p><div class="shortcut-box">150% of X = 1.5 × 604 = 906.</div><div class="final-answer">Final Answer: 906</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Male : Female = 5 : 1 in a group of 600.</p><div class="formula-box">Males = 500, Females = 100<br>Total graduates = 72.5% of 600 = 435</div><p class="solution-step"><strong>Step 2:</strong> Male graduates = 84% of 500 = 420.</p><p class="solution-step">Female graduates = 435 − 420 = 15.</p><div class="shortcut-box">Required percentage = 15/100 × 100 = 15%.</div><div class="final-answer">Final Answer: 15%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Assume Obama bought 100 shirts on the first day.</p><div class="formula-box">First day: Johnson = 70, Biden = 30<br>Second day total = 125</div><p class="solution-step"><strong>Step 2:</strong> Johnson receives 10% more than before: 70 × 1.10 = 77 shirts.</p><p class="solution-step">Therefore Biden receives 125 − 77 = 48 shirts.</p><div class="shortcut-box">Increase for Biden = (48 − 30)/30 × 100 = 60%.</div><div class="final-answer">Final Answer: 60% more</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let B = x. Then A = 1.6x.</p><div class="formula-box">C = 70% of (A + B) = 0.7(1.6x + x) = 1.82x<br>D = 110% of C = 2.002x</div><p class="solution-step"><strong>Step 2:</strong> D − B = 3006.</p><div class="formula-box">2.002x − x = 3006<br>1.002x = 3006<br>x = 3000</div><p class="solution-step">C = 1.82 × 3000 = 5460.</p><div class="final-answer">Final Answer: 5460</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let the initial prices be I for iPhone and A for Android.</p><div class="formula-box">Final iPhone price = I × 1.20 × 0.85 = 1.02I<br>Final Android price = A × 1.15 × 0.80 = 0.92A</div><p class="solution-step"><strong>Step 2:</strong> Final prices are equal, so 1.02I = 0.92A.</p><div class="shortcut-box">I/A = 0.92/1.02 = 92/102 = 46/51.</div><div class="final-answer">Final Answer: 46/51</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Yellow percentage is the remainder.</p><div class="formula-box">Yellow % = 100 − 18 − 8 − 4/9×100 = 29 5/9%</div><p class="solution-step">Since 29 5/9% = 133, total balls = 450.</p><div class="formula-box">Red balls = 18% of 450 = 81<br>Green balls = 8% of 450 = 36</div><div class="shortcut-box">Difference = 81 − 36 = 45.</div><div class="final-answer">Final Answer: 45</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Assume 100 guests: men = 45 and women = 55.</p><div class="formula-box">Married women = 80% of 55 = 44<br>Unmarried men = 40% of 45 = 18<br>Married men = 45 − 18 = 27</div><p class="solution-step"><strong>Step 2:</strong> Half of the married men are present with their wives, so 50% of 27 = 13.5 women are with husbands.</p><div class="shortcut-box">Married women not with husbands = 44 − 13.5 = 30.5% of total guests.</div><div class="final-answer">Final Answer: 30.5%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Assume 100 voters: males = 55 and females = 45.</p><div class="formula-box">Unemployed males = 30% of 55 = 16.5<br>Employed females = 40% of 45 = 18</div><p class="solution-step">Unemployed males are fewer by 18 − 16.5 = 1.5.</p><div class="shortcut-box">Percentage less = 1.5/18 × 100 = 8.33%.</div><div class="final-answer">Final Answer: 8.3% less</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let the second-month incentive be x.</p><div class="formula-box">Third month = 1.20x<br>7 61/77% = 600/77% = 6/77<br>Fourth month = 1.20x × 83/77</div><p class="solution-step"><strong>Step 2:</strong> The difference between fourth and second month is 1130.</p><div class="formula-box">x[(6/5)(83/77) − 1] = 1130<br>x(113/385) = 1130<br>x = 3850</div><p class="solution-step">Third month = 4620 and fourth month = 4980.</p><div class="shortcut-box">Total = 4500 + 3850 + 4620 + 4980 = 17,950.</div><div class="final-answer">Final Answer: Rs. 17,950</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let B = 100x. Then A = 125x and C = 137.5x.</p><div class="formula-box">A − B = 25x<br>C − B = 37.5x<br>25x + 37.5x = 50</div><p class="solution-step">62.5x = 50, hence x = 0.8.</p><div class="shortcut-box">A − B = 20 and C − B = 30. Therefore A − B is Rs. 10 less.</div><div class="final-answer">Final Answer: Rs. 10 less</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Speed is inversely proportional to time for a fixed distance.</p><div class="formula-box">New time = 2/3 of old time<br>New speed / Old speed = Old time / New time = 1 ÷ (2/3) = 3/2</div><div class="shortcut-box">Speed becomes 150% of the original, so it increases by 50%.</div><div class="final-answer">Final Answer: 50% increase</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> New radius = 83% of original radius.</p><div class="formula-box">Area multiplier = (0.83)² = 0.6889<br>Percentage decrease = 100 − 68.89 = 31.11%</div><p class="solution-step">Thus XY.ZW = 31.11.</p><div class="shortcut-box">X + Y + Z + W = 3 + 1 + 1 + 1 = 6.</div><div class="final-answer">Final Answer: 6</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Quantity falls by 10%, so quantity multiplier = 0.90.</p><p class="solution-step"><strong>Step 2:</strong> Price rises by 20%, so price multiplier = 1.20.</p><div class="formula-box">New total cost multiplier = 0.90 × 1.20 = 1.08</div><p class="solution-step">The payment therefore rises by 8%.</p><div class="shortcut-box">Extra amount = 8% of 948 = 75.84 Yen.</div><div class="final-answer">Final Answer: 75.84 Yen more than usual</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Cost is proportional to area because the land rate is uniform.</p><div class="formula-box">New area multiplier = 1.30 × 1.25 = 1.625</div><p class="solution-step">The new area is 162.5% of the original.</p><div class="shortcut-box">Percentage increase = 162.5 − 100 = 62.5%.</div><div class="final-answer">Final Answer: 62.5% increase — None of the above</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let the initial income and expenditure each be 100, because there is no saving in the first month.</p><p class="solution-step">Let expenditure increase by r%. Income then increases by 2r%.</p><div class="formula-box">Second-month saving = (100 + 2r) − (100 + r) = r</div><p class="solution-step">Total saving over two months is r, and this equals 1/5 of initial income = 20.</p><div class="shortcut-box">Therefore r = 20%.</div><div class="final-answer">Final Answer: 20%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let the rates in A and E be Rs. x per sq. ft.</p><div class="formula-box">B = 83⅓% of A = 5x/6<br>C = 75% of B = 5x/8<br>D = 150% of E = 3x/2</div><p class="solution-step"><strong>Step 2:</strong> The average rate in C and D is Rs. 255.</p><div class="formula-box">[(5x/8) + (3x/2)]/2 = 255<br>17x/16 = 255<br>x = 240</div><div class="shortcut-box">Cost of 100 sq. ft each in A and E = 200 × 240 = Rs. 48,000.</div><div class="final-answer">Final Answer: Rs. 48,000</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Assume 100 students: boys = 60 and girls = 40.</p><div class="formula-box">Boys at least 5 ft = 25% of 60 = 15<br>Boys below 5 ft = 45<br>Girls below 5 ft = 25% of 40 = 10<br>Girls at least 5 ft = 30</div><p class="solution-step">Below 5 ft = 55 and at least 5 ft = 45.</p><div class="shortcut-box">Difference = 55% − 45% = 10 percentage points.</div><div class="final-answer">Final Answer: 10%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> The commission rate rises from 20% to 25%, while total commission stays unchanged.</p><div class="formula-box">Old sales × 20% = New sales × 25%<br>New sales / Old sales = 20/25 = 0.8</div><div class="shortcut-box">Sales volume becomes 80% of the old level, hence it decreases by 20%.</div><div class="final-answer">Final Answer: −20%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> 8.33% = 1/12, so after normal annual growth and deaths the yearly multiplier is:</p><div class="formula-box">1.20 × (11/12) = 1.10</div><p class="solution-step"><strong>Step 2:</strong> For the first two years the multiplier is 1.10². In 2013, growth is 20% and the flood death rate is r%.</p><div class="formula-box">1.10² × 1.20 × (1 − r/100) = 1.21<br>1.452(1 − r/100) = 1.21<br>1 − r/100 = 5/6</div><div class="shortcut-box">r = 1/6 × 100 = 16.67%.</div><div class="final-answer">Final Answer: 16.67%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> C donates Rs. 20,000, equal to 5% of its fund.</p><div class="formula-box">C's fund = 20,000/0.05 = 4,00,000<br>B's fund after loan = 2 × 4,00,000 = 8,00,000</div><p class="solution-step"><strong>Step 2:</strong> Let B's own fund before loan be x. Loan from A = 10% of x, so 1.10x = 8,00,000.</p><div class="formula-box">x = 8,00,000/1.10 = 7,27,272.73</div><p class="solution-step">Charity excludes the inter-company loan, so B donates 5% of its own fund.</p><div class="shortcut-box">Donation = 5% of 7,27,272.73 ≈ Rs. 36,364, closest to Rs. 36,300.</div><div class="final-answer">Final Answer: Rs. 36,300 approximately</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let x be the number of Re. 1 coins and y be the number of Rs. 2 coins.</p><div class="formula-box">x + y + 23 = 150 ⇒ x + y = 127<br>Total value = x + 2y + 115 = 242 + y</div><p class="solution-step"><strong>Step 2:</strong> Re. 1 coins form at least 50% of total value.</p><div class="formula-box">127 − y ≥ 0.5(242 + y) ⇒ y ≤ 4</div><p class="solution-step"><strong>Step 3:</strong> Rs. 2 coins form at least 3% of total value.</p><div class="formula-box">2y ≥ 0.03(242 + y) ⇒ y ≥ 3.685</div><div class="shortcut-box">Since y is an integer and y ≤ 4, y = 4.</div><div class="final-answer">Final Answer: 4 coins</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> The scale displays 1000 g when the actual quantity is 925 g.</p><div class="formula-box">Error = 1000 − 925 = 75 g</div><p class="solution-step">Percentage error is measured relative to the actual quantity.</p><div class="shortcut-box">Percentage error = 75/925 × 100 = 8.108% ≈ 8.10%.</div><div class="final-answer">Final Answer: 8.10%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Base decreases by 11.11% = 1/9, so its multiplier is 8/9.</p><p class="solution-step"><strong>Step 2:</strong> Area increases by 10%, so area multiplier is 11/10.</p><div class="formula-box">Height multiplier = (11/10) ÷ (8/9) = 99/80 = 1.2375</div><div class="shortcut-box">Height therefore increases by 23.75%.</div><div class="final-answer">Final Answer: 23.75% increase</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let the old number of students, paper price and usage per student each be represented by multipliers.</p><div class="formula-box">Student multiplier = 0.90<br>Price multiplier = 1.25<br>Required usage multiplier = 1/(0.90 × 1.25) = 1/1.125 = 8/9</div><div class="shortcut-box">Required cut = 1 − 8/9 = 1/9 = 11.11%.</div><div class="final-answer">Final Answer: 11.11% decrease</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let total marks be T.</p><div class="formula-box">Mohan = 0.92T, Nishant = 0.56T, Samarth = 634<br>Total of their marks = 3 × 643 = 1929</div><p class="solution-step"><strong>Step 2:</strong></p><div class="formula-box">0.92T + 0.56T + 634 = 1929<br>1.48T = 1295<br>T = 875</div><div class="shortcut-box">Samarth's percentage = 634/875 × 100 = 72.457% ≈ 72.45%.</div><div class="final-answer">Final Answer: 72.45%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let the amount given now be G and the remaining amount be R.</p><div class="formula-box">G = 69% of R = 0.69R</div><p class="solution-step"><strong>Step 2:</strong> Giving 20% less would leave her with Rs. 434 extra. This extra is 20% of G.</p><div class="formula-box">0.20G = 434 ⇒ G = 2170<br>R = 2170/0.69 ≈ 3144.93</div><p class="solution-step">Total initial money ≈ 2170 + 3144.93 = 5314.93.</p><div class="shortcut-box">3000/5314.93 × 100 ≈ 56.45%, closest to 56%.</div><div class="final-answer">Final Answer: 56%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Assume 100 potential customers.</p><div class="formula-box">Buyers = 30, Non-buyers = 70<br>Buyers who saw ad = 40% of 30 = 12<br>Non-buyers who saw ad = 45% of 70 = 31.5</div><div class="shortcut-box">Required ratio = 12 : 31.5 = 24 : 63.</div><div class="final-answer">Final Answer: 24 : 63</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> 20% failed in both, so 80% passed at least one subject.</p><div class="formula-box">Passed both = Passed English + Passed History − Passed at least one<br>= 55% + 75% − 80% = 50%</div><p class="solution-step">50% of total candidates = 3200.</p><div class="shortcut-box">Total candidates = 3200/0.50 = 6400.</div><div class="final-answer">Final Answer: 6400</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Choose incomes in a convenient ratio.</p><div class="formula-box">Let B's income = 80<br>A's income = 25% more = 100<br>A is 20% less than C ⇒ C's income = 125</div><p class="solution-step"><strong>Step 2:</strong> A saves 60%, so A's expenditure = 40.</p><div class="formula-box">B's expenditure is 25% less than A = 30<br>B's expenditure is 20% more than C ⇒ C's expenditure = 25</div><p class="solution-step">Savings: B = 80 − 30 = 50; C = 125 − 25 = 100.</p><div class="shortcut-box">B's saving as a percentage of C's saving = 50/100 × 100 = 50%.</div><div class="final-answer">Final Answer: 50%</div>`
    ];
    questions.forEach((q, i) => { q.solution = solutionText[i] || q.solution || "Solution not provided."; });
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function rich(s){return hasHtml(s) ? String(s) : esc(s);}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
