<body>
  <header><div class="topbar"><div class="title"><h1>Percentage Basic + Multiplying Factor + Successive Percentage</h1><div class="meta">Quantitative Aptitude | 30 Questions | 60 Minutes | +3 correct, -1 wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>

    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">x</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">Back</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">sqrt</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
      {
        q: "A number is increased by 30% and then decreased by 40%. Find the net increase/decrease %.",
        options: ["20", "22", "32", "No increase/decrease"],
        answer: 1
      },
      {
        q: "Ashwini purchased a cup of coffee at Rs. 9 after availing two successive discounts of 70% on MRP. Find the MRP of a cup of coffee.",
        options: ["Rs. 70", "Rs. 130", "Rs. 100", "None of these"],
        answer: 2
      },
      {
        q: "City C population in the year 2017 was 1,20,000. In 2018, due to the pandemic the population dropped by 20% but it again increased by 20% in the upcoming year. Find the population of city C in 2019.",
        options: ["1,15,200", "1,10,000", "1,20,000", "1,22,000"],
        answer: 0
      },
      {
        q: "32% of a number after adding 5 is equal to 16. Find the number.",
        options: ["42", "50", "44", "45"],
        answer: 3
      },
      {
        q: "Suman salary is 20% more than that of Amar but less by 40% than that of Heman. If the difference in salary of Heman and Aman is Rs. 30,000, then Suman's salary is:",
        options: ["Rs. 36,000", "Rs. 40,000", "Rs. 32,000", "Rs. 33,000"],
        answer: 0
      },
      {
        q: "Jeevan got 50% of total marks. If he obtained 40% in Hindi, 20% in EVS, 80% in Maths and 48 in Science, then find the marks obtained in Maths. Assume each subject maximum marks is same.",
        options: ["48", "64", "40", "32"],
        answer: 1
      },
      {
        q: "Shivam spent 35% of his amount in buying a milk packet, 30% of amount in buying biscuit and 15% on purchasing Dahi. He is left with Rs. 16 after all the transactions. Find the initial amount of Shivam.",
        options: ["Rs. 90", "Rs. 80", "Rs. 100", "Rs. 110"],
        answer: 1
      },
      {
        q: "A smartphone company offered 30% discount on a newly launched flagship phone in the festive season. As a result, the sale of phone increased by 15%. Find the percentage increase/decrease in revenue.",
        options: ["20", "18", "17.5", "19.5"],
        answer: 3
      },
      {
        q: "In a race, Ramesh was 10% behind the final point when Vikky was 15% behind. If Ramesh was 20 m ahead of Vikky, then find the total distance of track.",
        options: ["400 m", "350 m", "380 m", "420 m"],
        answer: 0
      },
      {
        q: "In a pie chart, 30% represents Car 1, 25% represents Car 2 and 15% represents Car 3. The only Car remaining is Car 4 and is 60 in number. Find the number of Car 3.",
        options: ["30", "45", "40", "50"],
        answer: 0
      },
      {
        q: "Side of a square is increased by 30%, whereas length of rectangle is increased by 20% but breadth is decreased by 40%. If the breadth of rectangle is equal to side of square, then find the percentage change in area of square and rectangle respectively.",
        options: ["65, 30", "60, 39", "69, 28", "62, 27"],
        answer: 2
      },
      {
        q: "MCD election was contested among three major party A, B and C candidates. A defeated B by 10% of total vote. If A received 4500 votes out of total polled 10000 votes, then C got how many votes?",
        options: ["2000", "3000", "2500", "1500"],
        answer: 0
      },
      {
        q: "75% acid concentration of 40 litres acid-base solution is totally mixed with 30% acid concentration of 30 litres acid-base solution. After the mix-up, 40% of solution is removed. Find the remaining litres of acid in the final mixture.",
        options: ["23 litres", "23.4 litres", "22.2 litres", "23.2 litres"],
        answer: 1
      },
      {
        q: "Quarter of a number is less than 20% of 70 by 9. Then the number is:",
        options: ["32", "16", "5", "20"],
        answer: 3
      },
      {
        q: "Numerator of a fraction is increased by 50%, but simultaneously denominator is decreased by 50%. As a result we get 18/7. The fraction is:",
        options: ["66/77", "33/22", "22/55", "66/55"],
        answer: 0
      },
      {
        q: "A table and a chair are priced at Rs. 3000 and Rs. 1000 respectively. If the price of the table and that of the chair is increased by 20% and 25% respectively, then the price of 5 tables and 15 chairs is:",
        options: ["Rs. 36000", "Rs. 28000", "Rs. 48500", "None of the above"],
        answer: 3
      },
      {
        q: "Charlie Harper spends 20% of his income on food, 9.09% of the remaining on transport, 35% of the remaining on savings and $600 on charity. He is still left with $2000. Find his income.",
        options: ["$4000", "$4400", "$5000", "None of these"],
        answer: 3
      },
      {
        q: "In a classroom, there are 20% less girls than boys. Out of the boys, 60% have applied for a scholarship, and out of the girls, 55% have applied for the scholarship. The percentage of the total number of students who have applied for the scholarship is closest to:",
        options: ["57", "58", "59", "60"],
        answer: 1
      },
      {
        q: "Suvarn and Suramya both appear for an entrance test. Suvarn scores 65% marks and passes the test by 50 marks. Suramya scores 50% marks and fails the test by 40 marks. By what percentage of the total score is the average score of these two people more than the passing marks in the test?",
        options: ["0.5%", "0.83%", "1.10%", "1.2%"],
        answer: 1
      },
      {
        q: "Bawarchi always purchases all food-grains online from Big Basket. His monthly expense is Rs. 4400. Big Basket increased the rate of food-grains by 20% in a particular month. By how much percent should Bawarchi change his consumption so that total expenditure remains unchanged?",
        options: ["12.46%", "-15.89%", "16%", "-16.67%"],
        answer: 3
      },
      {
        q: "Chris Gardner saves 25% of his salary every month starting March 2021. After four months, he receives a raise of 20% and hence decides to save 30% of his salary. His overall expenditure for the year is approximately what percent of his total salary for the financial year?",
        options: ["70.6%", "72.4%", "71.5%", "73.6%"],
        answer: 2
      },
      {
        q: "Exofbro, an MNC, promises its employees a 10% incentive of the total sales target achieved by them in a given financial year. After the first quarter, every employee had already achieved 55% of the target. Forecasting that twice the target will be achieved by the end of the financial year, the company revised the percentage incentive for the next three quarters so that the overall incentive remains the same. Find the new percentage incentive set for the remaining year.",
        options: ["2% approx", "4.2% approx", "3.1% approx", "5.0% approx"],
        answer: 2
      },
      {
        q: "Salary of Mahesh is hiked by 20% but his savings increased by only 10%. Find out the percentage change in his expenditure if his initial salary was Rs. 20000.",
        options: ["8%", "Cannot be determined", "16%", "10%"],
        answer: 1
      },
      {
        q: "Mohan owned 66 2/3% of a property. If 30% of property that he owns is worth Rs. 125000, then 45% of the value of the property is:",
        options: ["Rs. 2,62,500", "Rs. 2,70,000", "Rs. 2,25,000", "Rs. 2,81,250"],
        answer: 3
      },
      {
        q: "KFC introduces special Spicy Zinger nuggets on New year's eve. The price per pack was increased in February and March by 20% and 25%, respectively. In April, the price was reduced by 10% on account of a promotional offer. If the price per pack in April was Rs. 540, find the initial introductory price.",
        options: ["300", "400", "500", "600"],
        answer: 1
      },
      {
        q: "A salesman is working for a pharma company. He earns a fixed salary of Rs. 20,000 per month and a commission of 8% on total annual sales done by him. What is the total annual sales done by him if, on average, he earns Rs. 26,000 per month?",
        options: ["Rs. 4,00,000", "Rs. 5,00,000", "Rs. 9,00,000", "None of the above"],
        answer: 2
      },
      {
        q: "On a morning prayer all the students of a school stand in three rows. The first row has 20% more students than the second row and the third row contains 20% less students than the second row. If the total number of students in all the rows is 600, then find the number of students in the first row.",
        options: ["240", "120", "160", "200"],
        answer: 0
      },
      {
        q: "The population of a town is 6000. If the number of males increases by 10% and the number of females increases by 20%, then the population becomes 6800. Find the population of females in the town now.",
        options: ["4000", "2400", "2000", "None of the above"],
        answer: 1
      },
      {
        q: "The average earning of each member of family A is 20% less than the average earning of each member of family B, but the total earning of family A is 20% more than that of family B. The number of members in family B is what percentage less than that of family A?",
        options: ["16.66%", "33.33%", "66.67%", "None of the above"],
        answer: 1
      },
      {
        q: "The total number of students in a class remains same if the number of girls is increased by 50% and the number of boys is decreased by 25%. By what percentage does the number of students increase, if the number of boys and the number of girls increase by 20% and 60% respectively?",
        options: ["28.56%", "33.33%", "14.28%", "16.67%"],
        answer: 1
      }
    ];
    const solutionText = [
      `<p><strong>Step 1: Assume an initial value.</strong></p><p>To make calculations easier, assume the original number is 100.</p><p><strong>Step 2: Calculate the increase.</strong></p><p>The number is increased by 30%. Increase amount = 30% of 100 = 0.30 x 100 = 30.</p><p>So the number after the increase = 100 + 30 = 130.</p><p><strong>Step 3: Calculate the decrease.</strong></p><p>The new number 130 is then decreased by 40%. Decrease amount = 40% of 130 = 0.40 x 130 = 52.</p><p>So the number after the decrease = 130 - 52 = 78.</p><p><strong>Step 4: Find the net change.</strong></p><p>Original value = 100 and final value = 78. Net change = 78 - 100 = -22.</p><p>Since the value is negative, it represents a decrease.</p><p><strong>Step 5: Calculate the net percentage change.</strong></p><p>Net percentage change = (Net Change / Original Number) x 100 = (-22 / 100) x 100 = -22%.</p><p><strong>Formula check:</strong> For +x% followed by -y%, net change = (x - y - xy/100)%. Here x = 30 and y = 40.</p><p>Net change = 30 - 40 - (30 x 40)/100 = -10 - 12 = -22%.</p><p><strong>Multiplier check:</strong> 1.30 x 0.60 = 0.78, so final value is 78% of original. Hence there is a net decrease of 22%.</p>`,
      `<p><strong>Step 1: Understand the discount.</strong></p><p>A 70% discount means the customer pays only 30% of the marked price.</p><p><strong>Step 2: Apply the first discount.</strong></p><p>If MRP is M, after the first 70% discount the price becomes 30% of M = 0.30M.</p><p><strong>Step 3: Apply the second discount.</strong></p><p>The second 70% discount is applied on the reduced price, so final price = 30% of 0.30M = 0.30 x 0.30M = 0.09M.</p><p><strong>Step 4: Use the given selling price.</strong></p><p>Given final selling price = Rs. 9. Therefore 0.09M = 9.</p><p>M = 9 / 0.09 = 100.</p><p><strong>Conclusion:</strong> The MRP of the cup of coffee is Rs. 100.</p>`,
      `<p><strong>Step 1: Start with the 2017 population.</strong></p><p>Population in 2017 = 1,20,000.</p><p><strong>Step 2: Apply the 20% decrease in 2018.</strong></p><p>A 20% decrease means 80% remains. Population after decrease = 1,20,000 x 80/100 = 96,000.</p><p><strong>Step 3: Apply the 20% increase in 2019.</strong></p><p>A 20% increase means multiplying by 120/100. New population = 96,000 x 120/100 = 1,15,200.</p><p><strong>Important note:</strong> A 20% decrease followed by a 20% increase does not return the value to the original, because the increase is applied on the reduced base.</p><p><strong>Final answer:</strong> 1,15,200.</p>`,
      `<p><strong>Step 1: Form the equation.</strong></p><p>Let the required number be x. The statement says 32% of the number after adding 5 is equal to 16.</p><p>So, 32% of (x + 5) = 16.</p><p><strong>Step 2: Convert percentage to fraction.</strong></p><p>32% = 32/100. Therefore, (32/100)(x + 5) = 16.</p><p><strong>Step 3: Solve for x.</strong></p><p>x + 5 = 16 x 100 / 32 = 50.</p><p>x = 50 - 5 = 45.</p><p><strong>Final answer:</strong> 45.</p>`,
      `<p><strong>Step 1: Define the variables.</strong></p><p>Let Heman's salary be H and Amar/Aman's salary be A. Let Suman's salary be S.</p><p><strong>Step 2: Write Suman's salary in terms of Heman.</strong></p><p>Suman is 40% less than Heman, so S = 60% of H = 0.6H.</p><p><strong>Step 3: Write Suman's salary in terms of Amar/Aman.</strong></p><p>Suman is 20% more than Amar/Aman, so S = 1.2A. Therefore A = S/1.2.</p><p>Since S = 0.6H, A = 0.6H / 1.2 = 0.5H.</p><p><strong>Step 4: Use the salary difference.</strong></p><p>Heman's salary - Amar/Aman's salary = 30,000.</p><p>H - 0.5H = 30,000, so 0.5H = 30,000 and H = 60,000.</p><p><strong>Step 5: Find Suman's salary.</strong></p><p>S = 0.6H = 0.6 x 60,000 = Rs. 36,000.</p><p><strong>Final answer:</strong> Rs. 36,000.</p>`,
      `<p><strong>Step 1: Assume equal maximum marks.</strong></p><p>Let the maximum marks in each subject be M. Since there are 4 subjects, total maximum marks = 4M.</p><p><strong>Step 2: Use the overall percentage.</strong></p><p>Jeevan got 50% of total marks. So total marks obtained = 50% of 4M = 2M.</p><p><strong>Step 3: Add known subject marks in terms of M.</strong></p><p>Hindi = 40% of M = 0.4M, EVS = 20% of M = 0.2M, Maths = 80% of M = 0.8M.</p><p>These three together = 0.4M + 0.2M + 0.8M = 1.4M.</p><p><strong>Step 4: Include Science marks.</strong></p><p>Science marks = 48. So total marks = 1.4M + 48.</p><p>Therefore, 1.4M + 48 = 2M.</p><p><strong>Step 5: Solve for M.</strong></p><p>48 = 0.6M, so M = 48 / 0.6 = 80.</p><p><strong>Step 6: Calculate Maths marks.</strong></p><p>Maths marks = 80% of 80 = 64.</p><p><strong>Final answer:</strong> 64.</p>`,
      `<p><strong>Step 1: Add the spending percentages.</strong></p><p>Amount spent on milk = 35%, biscuits = 30%, Dahi = 15%.</p><p>Total spent = 35% + 30% + 15% = 80%.</p><p><strong>Step 2: Find the remaining percentage.</strong></p><p>If 80% is spent, then 20% is left.</p><p><strong>Step 3: Use the given remaining amount.</strong></p><p>20% of the initial amount = Rs. 16.</p><p><strong>Step 4: Calculate the initial amount.</strong></p><p>Initial amount = 16 x 100 / 20 = Rs. 80.</p><p><strong>Final answer:</strong> Rs. 80.</p>`,
      `<p><strong>Step 1: Assume original price and sales.</strong></p><p>Let original price = 100 and original number of phones sold = 100. Original revenue = 100 x 100 = 10,000.</p><p><strong>Step 2: Apply the discount.</strong></p><p>A 30% discount means the new price is 70% of original price = 70.</p><p><strong>Step 3: Apply the increase in sales.</strong></p><p>Sales increase by 15%, so new quantity sold = 115.</p><p><strong>Step 4: Calculate new revenue.</strong></p><p>New revenue = 70 x 115 = 8,050.</p><p><strong>Step 5: Find revenue change.</strong></p><p>Revenue change = 8,050 - 10,000 = -1,950.</p><p>Percentage change = (-1,950 / 10,000) x 100 = -19.5%.</p><p><strong>Multiplier method:</strong> Price multiplier = 0.70 and quantity multiplier = 1.15. Revenue multiplier = 0.70 x 1.15 = 0.805 = 80.5% of original revenue.</p><p>So revenue decreases by 100% - 80.5% = 19.5%.</p><p><strong>Final answer:</strong> 19.5% decrease.</p>`,
      `<p><strong>Step 1: Convert the information into completed distance.</strong></p><p>Ramesh was 10% behind the final point, so he had completed 90% of the race.</p><p>Vikky was 15% behind the final point, so he had completed 85% of the race.</p><p><strong>Step 2: Find the lead.</strong></p><p>Ramesh's lead over Vikky = 90% - 85% = 5% of the track.</p><p><strong>Step 3: Use the given lead.</strong></p><p>5% of the track = 20 m.</p><p><strong>Step 4: Calculate the full track length.</strong></p><p>Total track length = 20 x 100 / 5 = 400 m.</p><p><strong>Final answer:</strong> 400 m.</p>`,

      `<p><strong>Step 1: Calculate percentage change in square area.</strong></p><p>Let original side of square be 100 units. New side after 30% increase = 130 units.</p><p>Area depends on side squared, so area multiplier = 1.30 x 1.30 = 1.69.</p><p>This means new area = 169% of original area, so area increases by 69%.</p><p><strong>Step 2: Calculate percentage change in rectangle area.</strong></p><p>Length increases by 20%, so length multiplier = 1.20.</p><p>Breadth decreases by 40%, so breadth multiplier = 0.60.</p><p>Area multiplier = 1.20 x 0.60 = 0.72.</p><p><strong>Step 3: Interpret the rectangle result.</strong></p><p>The rectangle's new area is 72% of original area. Therefore, the area decreases by 28%.</p><p><strong>Final answer:</strong> Square increases by 69% and rectangle decreases by 28%.</p>`,
      `<p><strong>Step 1: Identify A's votes.</strong></p><p>A received 4,500 votes out of 10,000.</p><p><strong>Step 2: Calculate the margin by which A defeated B.</strong></p><p>A defeated B by 10% of total votes.</p><p>10% of 10,000 = 1,000 votes.</p><p><strong>Step 3: Find B's votes.</strong></p><p>Since A beat B by 1,000 votes, B's votes = 4,500 - 1,000 = 3,500.</p><p><strong>Step 4: Find C's votes.</strong></p><p>Total votes = A + B + C.</p><p>10,000 = 4,500 + 3,500 + C, so C = 2,000.</p><p><strong>Final answer:</strong> 2,000 votes.</p>`,
      `<p><strong>Step 1: Find acid in the first solution.</strong></p><p>First solution = 40 litres with 75% acid.</p><p>Acid = 75% of 40 = 0.75 x 40 = 30 litres.</p><p><strong>Step 2: Find acid in the second solution.</strong></p><p>Second solution = 30 litres with 30% acid.</p><p>Acid = 30% of 30 = 0.30 x 30 = 9 litres.</p><p><strong>Step 3: Add the acid quantities.</strong></p><p>Total acid after mixing = 30 + 9 = 39 litres.</p><p>Total solution after mixing = 40 + 30 = 70 litres.</p><p><strong>Step 4: Remove 40% of the mixed solution.</strong></p><p>Since the solution is fully mixed, removing 40% of the solution removes 40% of the acid too.</p><p>Therefore, 60% of the acid remains.</p><p><strong>Step 5: Calculate remaining acid.</strong></p><p>Remaining acid = 60% of 39 = 0.60 x 39 = 23.4 litres.</p><p><strong>Final answer:</strong> 23.4 litres.</p>`,
      `<p><strong>Step 1: Calculate 20% of 70.</strong></p><p>20% of 70 = 20/100 x 70 = 14.</p><p><strong>Step 2: Interpret the statement.</strong></p><p>A quarter of the number is less than 14 by 9.</p><p>So, one-fourth of the number = 14 - 9 = 5.</p><p><strong>Step 3: Find the number.</strong></p><p>If x/4 = 5, then x = 5 x 4 = 20.</p><p><strong>Final answer:</strong> 20.</p>`,
      `<p><strong>Step 1: Let the original fraction be x/y.</strong></p><p>The numerator is x and the denominator is y.</p><p><strong>Step 2: Apply the percentage changes.</strong></p><p>Numerator increased by 50% becomes 150% of x = 1.5x.</p><p>Denominator decreased by 50% becomes 50% of y = 0.5y.</p><p><strong>Step 3: Write the new fraction.</strong></p><p>New fraction = 1.5x / 0.5y = 3x/y.</p><p><strong>Step 4: Use the given result.</strong></p><p>3x/y = 18/7.</p><p>Therefore x/y = (18/7) / 3 = 6/7.</p><p><strong>Step 5: Match with the options.</strong></p><p>66/77 simplifies to 6/7.</p><p><strong>Final answer:</strong> 66/77.</p>`,
      `<p><strong>Step 1: Calculate the new table price.</strong></p><p>Original table price = Rs. 3,000.</p><p>After 20% increase, new table price = 3,000 x 120/100 = Rs. 3,600.</p><p><strong>Step 2: Find the cost of 5 tables.</strong></p><p>Cost of 5 tables = 5 x 3,600 = Rs. 18,000.</p><p><strong>Step 3: Calculate the new chair price.</strong></p><p>Original chair price = Rs. 1,000.</p><p>After 25% increase, new chair price = 1,000 x 125/100 = Rs. 1,250.</p><p><strong>Step 4: Find the cost of 15 chairs.</strong></p><p>Cost of 15 chairs = 15 x 1,250 = Rs. 18,750.</p><p><strong>Step 5: Add both costs.</strong></p><p>Total cost = 18,000 + 18,750 = Rs. 36,750.</p><p>Since Rs. 36,750 is not among the numerical options, the correct option is none of the above.</p>`,
      `<p><strong>Step 1: Let Charlie's income be I.</strong></p><p>Food spending = 20% of I. So amount left after food = 80% of I = 0.8I.</p><p><strong>Step 2: Handle transport spending.</strong></p><p>9.09% is approximately 1/11. So transport = 1/11 of 0.8I.</p><p>Amount left after transport = 10/11 of 0.8I = 0.72727I.</p><p><strong>Step 3: Handle savings.</strong></p><p>He saves 35% of the remaining amount, so 65% remains after savings.</p><p>Amount left after savings = 65% of 0.72727I = 0.472727I.</p><p><strong>Step 4: Use charity and final balance.</strong></p><p>After these expenses, he gives $600 to charity and still has $2,000 left.</p><p>So 0.472727I = 600 + 2,000 = 2,600.</p><p><strong>Step 5: Solve for income.</strong></p><p>I = 2,600 / 0.472727 = approximately 5,500.</p><p><strong>Conclusion:</strong> $5,500 is not listed, so the answer is none of these.</p>`,
      `<p><strong>Step 1: Assume the number of boys.</strong></p><p>Let boys = 100.</p><p><strong>Step 2: Find the number of girls.</strong></p><p>Girls are 20% less than boys, so girls = 80% of 100 = 80.</p><p><strong>Step 3: Find scholarship applicants among boys.</strong></p><p>60% of boys applied = 60% of 100 = 60.</p><p><strong>Step 4: Find scholarship applicants among girls.</strong></p><p>55% of girls applied = 55% of 80 = 44.</p><p><strong>Step 5: Find total applicants and total students.</strong></p><p>Total applicants = 60 + 44 = 104.</p><p>Total students = 100 + 80 = 180.</p><p><strong>Step 6: Calculate the required percentage.</strong></p><p>Percentage = 104/180 x 100 = 57.78%.</p><p>Closest option = 58.</p>`,
      `<p><strong>Step 1: Define total and passing marks.</strong></p><p>Let total marks be T and passing marks be P.</p><p><strong>Step 2: Write Suvarn's condition.</strong></p><p>Suvarn scores 65% and passes by 50 marks.</p><p>So 0.65T = P + 50.</p><p><strong>Step 3: Write Suramya's condition.</strong></p><p>Suramya scores 50% and fails by 40 marks.</p><p>So 0.50T = P - 40.</p><p><strong>Step 4: Subtract the equations.</strong></p><p>0.65T - 0.50T = (P + 50) - (P - 40).</p><p>0.15T = 90, so T = 600.</p><p><strong>Step 5: Find passing marks.</strong></p><p>Using 0.50T = P - 40: 0.50 x 600 = P - 40.</p><p>300 = P - 40, so P = 340.</p><p><strong>Step 6: Find the average score.</strong></p><p>Suvarn's score = 65% of 600 = 390.</p><p>Suramya's score = 50% of 600 = 300.</p><p>Average score = (390 + 300)/2 = 345.</p><p><strong>Step 7: Compare average with passing marks.</strong></p><p>Average is 345 - 340 = 5 marks above passing.</p><p>As a percentage of total marks = 5/600 x 100 = 0.83%.</p>`,
      `<p><strong>Step 1: Use the expenditure relation.</strong></p><p>Total expenditure = price x consumption.</p><p><strong>Step 2: Apply the price increase.</strong></p><p>Price increased by 20%, so new price = 120% of old price = 1.20 times old price.</p><p><strong>Step 3: Keep expenditure unchanged.</strong></p><p>To keep price x consumption constant, consumption must become 1/1.20 of the original.</p><p>New consumption = 100/120 = 5/6 of original consumption.</p><p><strong>Step 4: Find percentage change in consumption.</strong></p><p>Decrease = 1 - 5/6 = 1/6.</p><p>1/6 x 100 = 16.67%.</p><p><strong>Final answer:</strong> Consumption should decrease by 16.67%, i.e. -16.67%.</p>`,
      `<p><strong>Step 1: Assume the monthly salary before raise.</strong></p><p>Let the monthly salary before raise be 100.</p><p><strong>Step 2: Calculate salary, savings and expenditure for first 4 months.</strong></p><p>Total salary for 4 months = 4 x 100 = 400.</p><p>Savings = 25% of 400 = 100.</p><p>Expenditure = 400 - 100 = 300.</p><p><strong>Step 3: Calculate salary after raise.</strong></p><p>After a 20% raise, monthly salary = 120.</p><p>For the next 8 months, total salary = 8 x 120 = 960.</p><p><strong>Step 4: Calculate savings and expenditure after raise.</strong></p><p>Savings = 30% of 960 = 288.</p><p>Expenditure = 960 - 288 = 672.</p><p><strong>Step 5: Combine the year.</strong></p><p>Total salary = 400 + 960 = 1360.</p><p>Total expenditure = 300 + 672 = 972.</p><p><strong>Step 6: Calculate expenditure percentage.</strong></p><p>Expenditure percentage = 972/1360 x 100 = 71.47%, approximately 71.5%.</p>`,
      `<p><strong>Step 1: Assume the annual sales target.</strong></p><p>Let the annual target be 100 units.</p><p><strong>Step 2: Understand the original incentive.</strong></p><p>Original incentive rate = 10% of the target achieved. To keep the total incentive same as the target-level incentive, total intended incentive = 10% of 100 = 10.</p><p><strong>Step 3: Calculate incentive already earned.</strong></p><p>After first quarter, employees achieved 55% of target = 55 units.</p><p>Incentive already earned = 10% of 55 = 5.5.</p><p><strong>Step 4: Calculate remaining achievement.</strong></p><p>Forecast final achievement = twice the target = 200 units.</p><p>Remaining achievement = 200 - 55 = 145 units.</p><p><strong>Step 5: Calculate remaining incentive allowed.</strong></p><p>Total incentive should remain 10. Already earned = 5.5.</p><p>Remaining incentive = 10 - 5.5 = 4.5.</p><p><strong>Step 6: Find new incentive rate.</strong></p><p>New rate = 4.5/145 x 100 = 3.103%, approximately 3.1%.</p>`,
      `<p><strong>Step 1: Note the salary change.</strong></p><p>Initial salary = Rs. 20,000.</p><p>After 20% hike, new salary = 20,000 x 120/100 = Rs. 24,000.</p><p><strong>Step 2: Understand what is missing.</strong></p><p>Savings increased by 10%, but the original savings amount is not given.</p><p><strong>Step 3: Why this matters.</strong></p><p>Expenditure = Salary - Savings.</p><p>To find percentage change in expenditure, we need both original expenditure and new expenditure.</p><p>Those depend on the original savings amount.</p><p><strong>Example:</strong> If original savings were Rs. 2,000, the answer would be different from the case where original savings were Rs. 8,000.</p><p><strong>Conclusion:</strong> The percentage change in expenditure cannot be determined.</p>`,
      `<p><strong>Step 1: Convert Mohan's share into a fraction.</strong></p><p>66 2/3% = 2/3. So Mohan owns 2/3 of the property.</p><p><strong>Step 2: Find 30% of Mohan's share.</strong></p><p>30% of Mohan's share = 30% of 2/3 of total property.</p><p>30% = 3/10, so (3/10) x (2/3) = 1/5.</p><p>Thus, 30% of Mohan's share is 1/5 of the total property value.</p><p><strong>Step 3: Use the given value.</strong></p><p>1/5 of total property value = Rs. 1,25,000.</p><p><strong>Step 4: Find total property value.</strong></p><p>Total value = 1,25,000 x 5 = Rs. 6,25,000.</p><p><strong>Step 5: Find 45% of total value.</strong></p><p>45% of 6,25,000 = 45/100 x 6,25,000 = Rs. 2,81,250.</p>`,
      `<p><strong>Step 1: Let the initial price be x.</strong></p><p>We need to reverse or model the successive percentage changes.</p><p><strong>Step 2: Apply February increase.</strong></p><p>A 20% increase changes x into 1.20x.</p><p><strong>Step 3: Apply March increase.</strong></p><p>A further 25% increase changes 1.20x into 1.20x x 1.25 = 1.50x.</p><p><strong>Step 4: Apply April reduction.</strong></p><p>A 10% reduction means 90% remains.</p><p>Final April price = 1.50x x 0.90 = 1.35x.</p><p><strong>Step 5: Use the given final price.</strong></p><p>1.35x = 540.</p><p>x = 540 / 1.35 = 400.</p><p><strong>Final answer:</strong> 400.</p>`,

      `<p><strong>Step 1: Let the second row have x students.</strong></p><p>The first and third rows are described in relation to the second row, so x is a convenient base.</p><p><strong>Step 2: Express first row.</strong></p><p>First row has 20% more than the second row.</p><p>First row = 120% of x = 1.2x.</p><p><strong>Step 3: Express third row.</strong></p><p>Third row has 20% less than the second row.</p><p>Third row = 80% of x = 0.8x.</p><p><strong>Step 4: Use total students.</strong></p><p>Total = 1.2x + x + 0.8x = 3x.</p><p>Given total = 600, so 3x = 600 and x = 200.</p><p><strong>Step 5: Find first row.</strong></p><p>First row = 1.2 x 200 = 240.</p>`,

      `<p><strong>Step 1: Assume family B's average earning.</strong></p><p>Let average earning per member of family B = 100.</p><p><strong>Step 2: Find family A's average earning.</strong></p><p>Family A's average is 20% less than family B's average.</p><p>So family A's average = 80.</p><p><strong>Step 3: Let family B's total earning be T.</strong></p><p>Number of members in family B = T / 100.</p><p><strong>Step 4: Express family A's members.</strong></p><p>Family A's total earning is 20% more than family B's total earning, so family A's total = 1.2T.</p><p>Number of members in family A = 1.2T / 80.</p><p><strong>Step 5: Compare members.</strong></p><p>Members in B = T/100.</p><p>Members in A = 1.2T/80 = 1.5T/100.</p><p>So B has (T/100) / (1.5T/100) = 1/1.5 = 2/3 of A's members.</p><p><strong>Step 6: Find percentage less.</strong></p><p>If B has 2/3 of A's members, it is 1/3 less than A.</p><p>1/3 x 100 = 33.33%.</p>`,

    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+mathify(rich(html))+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+mathify(rich(op))+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return mathify(rich(sol));}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+mathify(rich(qText(q)))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+mathify(esc(correctText(q)))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
