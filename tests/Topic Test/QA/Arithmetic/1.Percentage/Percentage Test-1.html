  <style>
    :root{--ink:#101820;--muted:#5f6f7a;--line:#b8c3cc;--brand:#0b75bb;--brand-dark:#24313a;--brand-mid:#4089c8;--soft:#dff3fb;--ok:#60b947;--bad:#e55b25;--review:#7b4ab0;--paper:#fff;--bg:#eef3f7}
    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;grid-template-rows:minmax(0,1fr);gap:0;margin:0;padding:0;background:#fff;position:relative}main>section{grid-column:1;grid-row:1;min-width:0;min-height:0;border-right:2px solid #41515c}main>aside:first-child{grid-column:2;grid-row:1}.panel,.question-card,#result{background:var(--paper);border:0;border-radius:0}.panel{padding:14px;align-self:stretch;position:static;background:#e5f6fc} .calc-wrap{position:fixed!important;top:120px;left:52%;width:264px;z-index:50;border:1px solid #7c8991;box-shadow:0 7px 18px rgba(0,0,0,.28);display:none;padding:0;align-self:auto;background:#eee}.calc-wrap.open{display:block}.panel h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--brand-mid);color:#fff;font-weight:700}.question-palette-panel{display:flex;flex-direction:column}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#7fd7f2;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin-top:18px;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;overflow:auto;padding:0 0 74px;background:#fff}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:none}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px}.qtext p,.block p,.option p{margin:0 0 10px}.data-table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:18px;line-height:1.35;background:#fff}.data-table th,.data-table td{border:1px solid #6f7f8b;padding:8px 10px;text-align:left}.data-table th{background:#dff3fb;font-weight:800}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,100%);font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 0;padding-top:14px;border-top:1px solid var(--line);font-size:17px}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

<body>
  <header><div class="topbar"><div class="title"><h1>Percentage Basic + Multiplying Factor + Successive Percentage</h1><div class="meta">30 Questions | 60 Minutes | +3 correct, -1 wrong | MCQ and numeric entry</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>

  <script>
    const questions = [{"no": 1, "source": "Percentage Basic Test | Q1", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A number is increased by 30% and then decreased by 40%. Find the net increase/decrease %.</p>", "options": ["20", "22", "32", "No increase/decrease"], "answer": 1, "typedAnswer": "22", "accepted": [], "solution": "<p>Take the original number as 100.</p><p>After a 30% increase it becomes 130.</p><p>After a 40% decrease on 130, the final value is 130 Ã— 60/100 = 78.</p><p>So the value changes from 100 to 78, a decrease of 22%.</p>"}, {"no": 2, "source": "Percentage Basic Test | Q2", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Ashwini purchased a cup of coffee at Rs. 9 after availing two successive discounts of 70% on MRP. Find the MRP of a cup of coffee.</p>", "options": ["Rs. 70", "Rs. 130", "Rs. 100", "None of these"], "answer": 2, "typedAnswer": "Rs. 100", "accepted": [], "solution": "<p>Let the MRP be Rs. x.</p><p>After one 70% discount, the customer pays 30% of x. After the second 70% discount, the customer pays 30% of 30% of x = 9% of x.</p><p>Given 9% of x = 9, so x = 9 Ã— 100 / 9 = 100.</p><p>Therefore, the MRP is Rs. 100.</p>"}, {"no": 3, "source": "Percentage Basic Test | Q3", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>City C population in the year 2017 was 1,20,000. In 2018, due to the pandemic the population dropped by 20% but it again increased by 20% in the upcoming year. Find the population of city C in 2019.</p>", "options": ["1,15,200", "1,10,000", "1,20,000", "1,22,000"], "answer": 0, "typedAnswer": "1,15,200", "accepted": [], "solution": "<p>Population in 2017 = 1,20,000.</p><p>In 2018, it dropped by 20%, so population = 1,20,000 Ã— 80/100 = 96,000.</p><p>In 2019, it increased by 20%, so population = 96,000 Ã— 120/100 = 1,15,200.</p><p>Therefore, the population in 2019 is 1,15,200.</p>"}, {"no": 4, "source": "Percentage Basic Test | Q4", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>32% of a number after adding 5 is equal to 16. Find the number.</p>", "options": ["42", "50", "44", "45"], "answer": 3, "typedAnswer": "45", "accepted": [], "solution": "<p>Let the required number be x.</p><p>The phrase means 32% of the number after adding 5 is 16, so 0.32(x + 5) = 16.</p><p>Thus x + 5 = 16 / 0.32 = 50.</p><p>Therefore, x = 45.</p>"}, {"no": 5, "source": "Percentage Basic Test | Q5", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Suman salary is 20% more than that of Amar but less by 40% than that of Heman. If the difference in salary of Heman and Aman is Rs. 30,000, then Suman's salary is:</p>", "options": ["Rs. 36,000", "Rs. 40,000", "Rs. 32,000", "Rs. 33,000"], "answer": 0, "typedAnswer": "Rs. 36,000", "accepted": [], "solution": "<p>Let Amar's salary be A.</p><p>Suman's salary is 20% more than Amar's, so Suman = 1.2A.</p><p>Suman is 40% less than Heman, so Suman = 60% of Heman. Hence Heman = 1.2A / 0.6 = 2A.</p><p>Given Heman - Amar = 30000, so 2A - A = 30000. Therefore A = 30000.</p><p>Suman's salary = 1.2 Ã— 30000 = Rs. 36,000.</p>"}, {"no": 6, "source": "Percentage Basic Test | Q6", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Jeevan got 50% of total marks. If he obtained 40% in Hindi, 20% in EVS, 80% in Maths and 48 in Science, then find the marks obtained in Maths. Assume each subject maximum marks is same.</p>", "options": ["48", "64", "40", "32"], "answer": 1, "typedAnswer": "64", "accepted": [], "solution": "<p>Let maximum marks in each subject be M. Total maximum marks = 4M.</p><p>Jeevan scored 50% overall, so his total score = 2M.</p><p>Hindi = 40% of M = 0.4M, EVS = 20% of M = 0.2M, Maths = 80% of M = 0.8M, Science = 48.</p><p>So 0.4M + 0.2M + 0.8M + 48 = 2M.</p><p>1.4M + 48 = 2M, so 0.6M = 48 and M = 80.</p><p>Maths marks = 80% of 80 = 64.</p>"}, {"no": 7, "source": "Percentage Basic Test | Q7", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Shivam spent 35% of his amount in buying a milk packet, 30% of amount in buying biscuit and 15% on purchasing Dahi. He is left with Rs. 16 after all the transactions. Find the initial amount of Shivam.</p>", "options": ["Rs. 90", "Rs. 80", "Rs. 100", "Rs. 110"], "answer": 1, "typedAnswer": "Rs. 80", "accepted": [], "solution": "<p>Shivam spends 35% + 30% + 15% = 80% of his amount.</p><p>So he is left with 20% of the amount.</p><p>20% of the initial amount = Rs. 16.</p><p>Initial amount = 16 Ã— 100 / 20 = Rs. 80.</p>"}, {"no": 8, "source": "Percentage Basic Test | Q8", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A smartphone company offered 30% discount on a newly launched flagship phone in the festive season. As a result, the sale of phone increased by 15%. Find the percentage increase/decrease in revenue.</p>", "options": ["20", "18", "17.5", "19.5"], "answer": 3, "typedAnswer": "19.5", "accepted": [], "solution": "<p>Let original price be P and original quantity sold be Q. Original revenue = PQ.</p><p>After 30% discount, price becomes 70% of P = 0.70P.</p><p>Sales quantity increases by 15%, so quantity becomes 115% of Q = 1.15Q.</p><p>New revenue = 0.70P Ã— 1.15Q = 0.805PQ.</p><p>So revenue becomes 80.5% of the original, i.e. revenue decreases by 19.5%.</p>"}, {"no": 9, "source": "Percentage Basic Test | Q9", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a race, Ramesh was 10% behind the final point when Vikky was 15% behind. If Ramesh was 20 m ahead of Vikky, then find the total distance of track.</p>", "options": ["400 m", "350 m", "380 m", "420 m"], "answer": 0, "typedAnswer": "400 m", "accepted": [], "solution": "<p>Let the total race distance be D metres.</p><p>Ramesh was 10% behind the finish, so he had covered 90% of D.</p><p>Vikky was 15% behind the finish, so he had covered 85% of D.</p><p>The difference between them = 5% of D = 20 m.</p><p>Therefore D = 20 Ã— 100 / 5 = 400 m.</p>"}, {"no": 10, "source": "Percentage Basic Test | Q10", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a pie chart, 30% represents Car 1, 25% represents Car 2 and 15% represents Car 3. The only Car remaining is Car 4 and is 60 in number. Find the number of Car 3.</p>", "options": ["30", "45", "40", "50"], "answer": 0, "typedAnswer": "30", "accepted": [], "solution": "<p>Car 1, Car 2 and Car 3 together represent 30% + 25% + 15% = 70%.</p><p>So Car 4 represents the remaining 30%.</p><p>Given 30% = 60 cars, so total cars = 60 Ã— 100 / 30 = 200.</p><p>Car 3 represents 15% of total cars = 15% of 200 = 30.</p>"}, {"no": 11, "source": "Percentage Basic Test | Q11", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Side of a square is increased by 30%, whereas length of rectangle is increased by 20% but breadth is decreased by 40%. If the breadth of rectangle is equal to side of square, then find the percentage change in area of square and rectangle respectively.</p>", "options": ["65, 30", "60, 39", "69, 28", "62, 27"], "answer": 2, "typedAnswer": "69, 28", "accepted": [], "solution": "<p>For the square, side becomes 130% of original. Area depends on square of side.</p><p>New square area factor = 1.3 Ã— 1.3 = 1.69, so square area increases by 69%.</p><p>For the rectangle, length becomes 120% and breadth becomes 60%.</p><p>New rectangle area factor = 1.2 Ã— 0.6 = 0.72.</p><p>So rectangle area becomes 72% of original, i.e. it decreases by 28%.</p>"}, {"no": 12, "source": "Percentage Basic Test | Q12", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>MCD election was contested among three major party A, B and C candidates. A defeated B by 10% of total vote. If A received 4500 votes out of total polled 10000 votes, then C got how many votes?</p>", "options": ["2000", "3000", "2500", "1500"], "answer": 0, "typedAnswer": "2000", "accepted": [], "solution": "<p>Total votes = 10000. A received 4500 votes.</p><p>A defeated B by 10% of total votes, so A - B = 10% of 10000 = 1000.</p><p>Therefore B = 4500 - 1000 = 3500.</p><p>Votes received by C = 10000 - 4500 - 3500 = 2000.</p>"}, {"no": 13, "source": "Percentage Basic Test | Q13", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>75% acid concentration of 40 litres acid-base solution is totally mixed with 30% acid concentration of 30 litres acid-base solution. After the mix-up, 40% of solution is removed. Find the remaining litres of acid in the final mixture.</p>", "options": ["23 litres", "23.4 litres", "22.2 litres", "23.2 litres"], "answer": 1, "typedAnswer": "23.4 litres", "accepted": [], "solution": "<p>Acid in first solution = 75% of 40 = 30 litres.</p><p>Acid in second solution = 30% of 30 = 9 litres.</p><p>Total acid after mixing = 30 + 9 = 39 litres and total solution = 70 litres.</p><p>When 40% of a well-mixed solution is removed, 40% of acid is also removed.</p><p>So acid remaining = 60% of 39 = 23.4 litres.</p>"}, {"no": 14, "source": "Percentage Basic Test | Q14", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Quarter of a number is less than 20% of 70 by 9. Then the number is:</p>", "options": ["32", "16", "5", "20"], "answer": 3, "typedAnswer": "20", "accepted": [], "solution": "<p>20% of 70 = 14.</p><p>A quarter of the number is 9 less than 14, so one-fourth of the number = 14 - 9 = 5.</p><p>Therefore the number = 5 Ã— 4 = 20.</p>"}, {"no": 15, "source": "Percentage Basic Test | Q15", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Numerator of a fraction is increased by 50%, but simultaneously denominator is decreased by 50%. As a result we get 18/7. The fraction is:</p>", "options": ["66/77", "33/22", "22/55", "66/55"], "answer": 0, "typedAnswer": "66/77", "accepted": [], "solution": "<p>Let the original fraction be a/b.</p><p>Numerator is increased by 50%, so it becomes 1.5a. Denominator is decreased by 50%, so it becomes 0.5b.</p><p>New fraction = 1.5a / 0.5b = 3a/b.</p><p>Given new fraction = 18/7, so 3a/b = 18/7.</p><p>Therefore a/b = 6/7 = 66/77.</p>"}, {"no": 16, "source": "Percentage Basic Test | Q16", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A table and a chair are priced at Rs. 3000 and Rs. 1000 respectively. If the price of the table and that of the chair is increased by 20% and 25% respectively, then the price of 5 tables and 15 chairs is:</p>", "options": ["Rs. 36000", "Rs. 28000", "Rs. 48500", "None of the above"], "answer": 3, "typedAnswer": "None of the above", "accepted": [], "solution": "<p>New price of table = 3000 Ã— 120/100 = Rs. 3600.</p><p>New price of chair = 1000 Ã— 125/100 = Rs. 1250.</p><p>Price of 5 tables = 5 Ã— 3600 = Rs. 18000.</p><p>Price of 15 chairs = 15 Ã— 1250 = Rs. 18750.</p><p>Total = 18000 + 18750 = Rs. 36750, which is not among the given numerical options. Hence, None of the above.</p>"}, {"no": 17, "source": "Percentage Basic Test | Q17", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Charlie Harper spends 20% of his income on food, 9.09% of the remaining on transport, 35% of the remaining on savings and $600 on charity. He is still left with $2000. Find his income.</p>", "options": ["$4000", "$4400", "$5000", "None of these"], "answer": 3, "typedAnswer": "None of these", "accepted": [], "solution": "<p>Let Charlieâ€™s income be I.</p><p>After spending 20% on food, remaining income = 80% of I.</p><p>Transport is 9.09% = 1/11 of the remaining amount, so after transport he keeps 10/11 of 80% of I = 8I/11.</p><p>He saves 35% of this, so after savings he keeps 65% of 8I/11 = 26I/55.</p><p>From this he gives $600 to charity and is left with $2000. So 26I/55 - 600 = 2000.</p><p>26I/55 = 2600, hence I = 5500.</p><p>Since $5500 is not among the first three options, the answer is None of these.</p>"}, {"no": 18, "source": "Percentage Basic Test | Q18", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a classroom, there are 20% less girls than boys. Out of the boys, 60% have applied for a scholarship, and out of the girls, 55% have applied for the scholarship. The percentage of the total number of students who have applied for the scholarship is closest to:</p>", "options": ["57", "58", "59", "60"], "answer": 1, "typedAnswer": "58", "accepted": [], "solution": "<p>Let the number of boys be 100.</p><p>Girls are 20% less than boys, so girls = 80. Total students = 180.</p><p>Boys who applied = 60% of 100 = 60.</p><p>Girls who applied = 55% of 80 = 44.</p><p>Total applicants = 60 + 44 = 104.</p><p>Percentage of total students = 104/180 Ã— 100 = 57.78%, which is closest to 58%.</p>"}, {"no": 19, "source": "Percentage Basic Test | Q19", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Suvarn and Suramya both appear for an entrance test. Suvarn scores 65% marks and passes the test by 50 marks. Suramya scores 50% marks and fails the test by 40 marks. By what percentage of the total score is the average score of these two people more than the passing marks in the test?</p>", "options": ["0.5%", "0.83%", "1.10%", "1.2%"], "answer": 1, "typedAnswer": "0.83%", "accepted": [], "solution": "<p>Let total marks be M and passing marks be P.</p><p>Suvarn scored 65% and passed by 50 marks: 0.65M = P + 50.</p><p>Suramya scored 50% and failed by 40 marks: 0.50M = P - 40.</p><p>Subtracting the equations: 0.15M = 90, so M = 600.</p><p>Then passing marks P = 0.50 Ã— 600 + 40 = 340.</p><p>Average score of the two = (0.65M + 0.50M)/2 = 0.575M = 345.</p><p>Average is 5 marks above passing marks. As a percentage of total score = 5/600 Ã— 100 = 0.83%.</p>"}, {"no": 20, "source": "Percentage Basic Test | Q20", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Bawarchi always purchases all food-grains online from Big Basket. His monthly expense is Rs. 4400. Big Basket increased the rate of food-grains by 20% in a particular month. By how much percent should Bawarchi change his consumption so that total expenditure remains unchanged?</p>", "options": ["12.46%", "-15.89%", "16%", "-16.67%"], "answer": 3, "typedAnswer": "-16.67%", "accepted": [], "solution": "<p>Let original price per unit be P and original quantity be Q. Original expenditure = PQ.</p><p>New price becomes 120% of P = 1.2P.</p><p>To keep expenditure unchanged, new quantity must be PQ / 1.2P = Q/1.2 = 5Q/6.</p><p>So consumption becomes 83.33% of original.</p><p>Therefore consumption must decrease by 16.67%.</p>"}, {"no": 21, "source": "Percentage Basic Test | Q21", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Chris Gardner saves 25% of his salary every month starting March 2021. After four months, he receives a raise of 20% and hence decides to save 30% of his salary. His overall expenditure for the year is approximately what percent of his total salary for the financial year?</p>", "options": ["70.6%", "72.4%", "71.5%", "73.6%"], "answer": 2, "typedAnswer": "71.5%", "accepted": [], "solution": "<p>Take monthly salary before raise as 100.</p><p>For the first 4 months, salary = 4 Ã— 100 = 400 and saving is 25%, so expenditure is 75 per month. Expenditure = 300.</p><p>After a 20% raise, salary becomes 120 for each of the next 8 months. Total salary = 8 Ã— 120 = 960.</p><p>Saving becomes 30%, so expenditure becomes 70% of 120 = 84 per month. Expenditure = 8 Ã— 84 = 672.</p><p>Total salary for the year = 400 + 960 = 1360.</p><p>Total expenditure = 300 + 672 = 972.</p><p>Required percentage = 972/1360 Ã— 100 = 71.47%, approximately 71.5%.</p>"}, {"no": 22, "source": "Percentage Basic Test | Q22", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Exofbro, an MNC, promises its employees a 10% incentive of the total sales target achieved by them in a given financial year. After the first quarter, every employee had already achieved 55% of the target. Forecasting that twice the target will be achieved by the end of the financial year, the company revised the percentage incentive for the next three quarters so that the overall incentive remains the same. Find the new percentage incentive set for the remaining year.</p>", "options": ["2% approx", "4.2% approx", "3.1% approx", "5.0% approx"], "answer": 2, "typedAnswer": "3.1% approx", "accepted": [], "solution": "<p>Assume total annual target = 100 units.</p><p>Original incentive plan was 10% of the target, so total incentive intended = 10 units.</p><p>After first quarter, 55% of target had already been achieved, and incentive already payable = 10% of 55 = 5.5 units.</p><p>If final achievement becomes 200% of target, remaining achievement = 200 - 55 = 145 units.</p><p>To keep total incentive equal to 10 units, remaining incentive = 10 - 5.5 = 4.5 units.</p><p>New incentive rate = 4.5/145 Ã— 100 = 3.10% approximately.</p>"}, {"no": 23, "source": "Percentage Basic Test | Q23", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Salary of Mahesh is hiked by 20% but his savings increased by only 10%. Find out the percentage change in his expenditure if his initial salary was Rs. 20000.</p>", "options": ["8%", "Cannot be determined", "16%", "10%"], "answer": 1, "typedAnswer": "Cannot be determined", "accepted": [], "solution": "<p>Let Maheshâ€™s initial salary be Rs. 20000 and initial savings be S.</p><p>Initial expenditure = 20000 - S.</p><p>After a 20% salary hike, new salary = Rs. 24000.</p><p>Savings increase by 10%, so new savings = 1.1S.</p><p>New expenditure = 24000 - 1.1S.</p><p>The percentage change in expenditure depends on S, the initial savings. Since S is not given, the change cannot be uniquely determined.</p>"}, {"no": 24, "source": "Percentage Basic Test | Q24", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Mohan owned 66 2/3% of a property. If 30% of property that he owns is worth Rs. 125000, then 45% of the value of the property is:</p>", "options": ["Rs. 2,62,500", "Rs. 2,70,000", "Rs. 2,25,000", "Rs. 2,81,250"], "answer": 3, "typedAnswer": "Rs. 2,81,250", "accepted": [], "solution": "<p>Mohan owns 66 2/3% = 2/3 of the property.</p><p>30% of what he owns = 30% of 2/3 = 1/5 of the whole property.</p><p>Given 1/5 of the property is worth Rs. 125000.</p><p>Therefore total property value = 125000 Ã— 5 = Rs. 625000.</p><p>45% of total property value = 0.45 Ã— 625000 = Rs. 281250.</p>"}, {"no": 25, "source": "Percentage Basic Test | Q25", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>KFC introduces special Spicy Zinger nuggets on New year's eve. The price per pack was increased in February and March by 20% and 25%, respectively. In April, the price was reduced by 10% on account of a promotional offer. If the price per pack in April was Rs. 540, find the initial introductory price.</p>", "options": ["300", "400", "500", "600"], "answer": 1, "typedAnswer": "400", "accepted": [], "solution": "<p>Let the initial price be P.</p><p>After a 20% increase, price becomes 1.2P.</p><p>After a further 25% increase, price becomes 1.2P Ã— 1.25 = 1.5P.</p><p>After a 10% reduction, price becomes 1.5P Ã— 0.9 = 1.35P.</p><p>Given final price = 540, so 1.35P = 540.</p><p>Therefore P = 540 / 1.35 = 400.</p>"}, {"no": 26, "source": "Percentage Basic Test | Q26", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A salesman is working for a pharma company. He earns a fixed salary of Rs. 20,000 per month and a commission of 8% on total annual sales done by him. What is the total annual sales done by him if, on average, he earns Rs. 26,000 per month?</p>", "options": ["Rs. 4,00,000", "Rs. 5,00,000", "Rs. 9,00,000", "None of the above"], "answer": 2, "typedAnswer": "Rs. 9,00,000", "accepted": [], "solution": "<p>Average monthly earning = Rs. 26000, so annual earning = 26000 Ã— 12 = Rs. 312000.</p><p>Fixed salary per month = Rs. 20000, so annual fixed salary = 20000 Ã— 12 = Rs. 240000.</p><p>Annual commission = 312000 - 240000 = Rs. 72000.</p><p>Commission is 8% of annual sales. So 8% of sales = 72000.</p><p>Annual sales = 72000 Ã— 100 / 8 = Rs. 900000.</p>"}, {"no": 27, "source": "Percentage Basic Test | Q27", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>On a morning prayer all the students of a school stand in three rows. The first row has 20% more students than the second row and the third row contains 20% less students than the second row. If the total number of students in all the rows is 600, then find the number of students in the first row.</p>", "options": ["240", "120", "160", "200"], "answer": 0, "typedAnswer": "240", "accepted": [], "solution": "<p>Let the number of students in the second row be x.</p><p>First row has 20% more, so first row = 1.2x.</p><p>Third row has 20% less, so third row = 0.8x.</p><p>Total = 1.2x + x + 0.8x = 3x = 600.</p><p>Therefore x = 200 and first row = 1.2 Ã— 200 = 240.</p>"}, {"no": 28, "source": "Percentage Basic Test | Q28", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The population of a town is 6000. If the number of males increases by 10% and the number of females increases by 20%, then the population becomes 6800. Find the population of females in the town now.</p>", "options": ["4000", "2400", "2000", "None of the above"], "answer": 1, "typedAnswer": "2400", "accepted": [], "solution": "<p>Let initial males be M and initial females be F.</p><p>M + F = 6000.</p><p>After increase, population becomes 1.1M + 1.2F = 6800.</p><p>Subtract 1.1(M + F) = 1.1 Ã— 6000 = 6600 from the second equation.</p><p>So 0.1F = 6800 - 6600 = 200, hence F = 2000 initially.</p><p>Female population now = 2000 Ã— 1.2 = 2400.</p>"}, {"no": 29, "source": "Percentage Basic Test | Q29", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The average earning of each member of family A is 20% less than the average earning of each member of family B, but the total earning of family A is 20% more than that of family B. The number of members in family B is what percentage less than that of family A?</p>", "options": ["16.66%", "33.33%", "66.67%", "None of the above"], "answer": 1, "typedAnswer": "33.33%", "accepted": [], "solution": "<p>Let average earning of each member of family B be 100. Then average earning of family A is 20% less = 80.</p><p>Let total earning of family B be T. Then total earning of family A is 20% more = 1.2T.</p><p>Number of members in family B = T/100.</p><p>Number of members in family A = 1.2T/80 = 1.5T/100.</p><p>So family B has 1/1.5 = 2/3 of the members of family A.</p><p>Therefore family B has 33.33% fewer members than family A.</p>"}, {"no": 30, "source": "Percentage Basic Test | Q30", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The total number of students in a class remains same if the number of girls is increased by 50% and the number of boys is decreased by 25%. By what percentage does the number of students increase, if the number of boys and the number of girls increase by 20% and 60% respectively?</p>", "options": ["28.56%", "33.33%", "14.28%", "16.67%"], "answer": 1, "typedAnswer": "33.33%", "accepted": [], "solution": "<p>Let the number of girls be G and boys be B.</p><p>Total remains the same when girls increase by 50% and boys decrease by 25%.</p><p>So 1.5G + 0.75B = G + B.</p><p>This gives 0.5G = 0.25B, so B = 2G.</p><p>Original total = G + 2G = 3G.</p><p>If boys increase by 20%, boys become 2G Ã— 1.2 = 2.4G. If girls increase by 60%, girls become 1.6G.</p><p>New total = 2.4G + 1.6G = 4G.</p><p>Increase = 4G - 3G = G, so percentage increase = G/3G Ã— 100 = 33.33%.</p>"}];
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
