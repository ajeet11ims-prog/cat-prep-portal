  <style>

    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;grid-template-rows:minmax(0,1fr);gap:0;margin:0;padding:0;background:#fff;position:relative}main>section{grid-column:1;grid-row:1;min-width:0;min-height:0;border-right:2px solid #41515c}main>aside:first-child{grid-column:2;grid-row:1}.panel,.question-card,#result{background:var(--paper);border:0;border-radius:0}.panel{padding:14px;align-self:stretch;position:static;background:#e5f6fc}.question-palette-panel{display:flex;flex-direction:column;overflow:auto}.calc-wrap{position:fixed!important;top:120px;left:52%;width:264px;z-index:50;border:1px solid #7c8991;box-shadow:0 7px 18px rgba(0,0,0,.28);display:none;padding:0;align-self:auto;background:#eee}.calc-wrap.open{display:block}.panel h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--brand-mid);color:#fff;font-weight:700}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#7fd7f2;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin:18px 0;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;overflow:auto;padding:0 0 74px;background:#fff}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:block;font-size:13px;color:var(--muted);margin-top:2px}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px;white-space:pre-wrap}.qtext p,.block p,.option p{margin:0 0 10px}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,calc(100% - 48px));font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 0;padding-top:14px;border-top:1px solid var(--line);font-size:17px;white-space:pre-wrap}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.solution .block{max-height:280px;overflow:auto;margin-top:10px;border:1px solid #cbd5dd;border-radius:4px;background:#fbfdff;line-height:1.55;overscroll-behavior:contain}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.solution .block{max-height:240px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

<body>
  <header><div class="topbar"><div class="title"><h1>Percentage Test -4</h1><div class="meta">Quantitative Aptitude | 30 Questions | 60 Minutes | +3 correct, -1 wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>

    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">x</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">Back</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">sqrt</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
      { q: "60% of P is 32 less than 50% of Q and the sum of 50% of P and 75% of Q is equivalent to Q. Find the difference between P and Q.", type: "text", answer: "80", accepted: ["80"], solution: "Let the two numbers be P and Q.<br>From the first condition, 60% of P is 32 less than 50% of Q, so 0.6P = 0.5Q - 32.<br>From the second condition, 50% of P + 75% of Q = Q, so 0.5P + 0.75Q = Q. This gives 0.5P = 0.25Q, hence P = Q/2.<br>Substitute P = Q/2 in the first equation: 0.6 x Q/2 = 0.5Q - 32. So 0.3Q = 0.5Q - 32, hence 0.2Q = 32 and Q = 160.<br>Therefore P = 80. The required difference is Q - P = 160 - 80 = 80." },
      { q: "The sum of 120% of 220 and 560% of 625% of 20 is equal to the sum of 80% of 180% of 250 and X. What is the value of 150% of X?", type: "text", answer: "906", accepted: ["906"], solution: "Evaluate each percentage expression carefully.<br>120% of 220 = 1.2 x 220 = 264.<br>625% of 20 = 6.25 x 20 = 125, and 560% of 125 = 5.6 x 125 = 700.<br>So the left side is 264 + 700 = 964.<br>Now 180% of 250 = 1.8 x 250 = 450, and 80% of 450 = 0.8 x 450 = 360.<br>According to the question, 964 = 360 + X, so X = 604.<br>150% of X = 1.5 x 604 = 906." },
      { q: "In a group of 600 people, the ratio of males to females is 5:1. 72.5% of people are graduates. If 84% of males are graduates, then what percentage of females are graduates?", type: "text", answer: "15", accepted: ["15", "15%"], solution: "Total people = 600 and male:female = 5:1. So males = 500 and females = 100.<br>Total graduates = 72.5% of 600 = 435.<br>Male graduates = 84% of 500 = 420.<br>Therefore female graduates = total graduates - male graduates = 435 - 420 = 15.<br>There are 100 females, so percentage of female graduates = 15/100 x 100 = 15%." },
      { q: "Obama bought some shirts. He gave 70% of the total shirts to Johnson and the rest to Biden. Next day, he buys 25% more shirts than the previous day. If he gave 10% more shirts to Johnson than the previous day, then the number of shirts given to Biden is what percent more than the previous day?", type: "text", answer: "60", accepted: ["60", "60%"], solution: "Assume the number of shirts bought on the first day is 100.<br>On the first day, Johnson gets 70% = 70 shirts and Biden gets the remaining 30 shirts.<br>On the next day, total shirts increase by 25%, so total shirts = 125.<br>Johnson receives 10% more than the previous day, so Johnson gets 70 + 10% of 70 = 77 shirts.<br>Hence Biden gets 125 - 77 = 48 shirts on the second day.<br>Increase in Biden's shirts = 48 - 30 = 18. Percentage increase = 18/30 x 100 = 60%." },
      { q: "There are four numbers such that A is 60% more than B and C is 30% less than the sum of B and A. If D is 10% more than C and the difference between D and B is 3006, then find C.", type: "text", answer: "5460", accepted: ["5460"], solution: "Let B = x.<br>A is 60% more than B, so A = 1.6x.<br>A + B = 1.6x + x = 2.6x. C is 30% less than this sum, so C = 70% of 2.6x = 1.82x.<br>D is 10% more than C, so D = 1.1 x 1.82x = 2.002x.<br>The difference between D and B is 3006, so 2.002x - x = 3006. Thus 1.002x = 3006 and x = 3000.<br>Therefore C = 1.82 x 3000 = 5460." },
      { q: "The price of an iPhone increased by 20% and then decreased by 15%. The price of an android smartphone increased by 15% and then decreased by 20%. If final prices of both items are same, find the ratio of initial price of iPhone to initial price of android smartphone.", type: "mcq", options: ["187/207", "46/51", "23/27", "19/21"], answer: 1, solution: "Let the initial prices of the iPhone and Android phone be I and A respectively.<br>For the iPhone: increase by 20% gives 1.20I, then decrease by 15% gives 1.20I x 0.85 = 1.02I.<br>For the Android phone: increase by 15% gives 1.15A, then decrease by 20% gives 1.15A x 0.80 = 0.92A.<br>Final prices are equal, so 1.02I = 0.92A.<br>Therefore I/A = 0.92/1.02 = 92/102 = 46/51." },
      { q: "In a tank full of plastic balls of 4 different colours, 18% of the total balls are Red, 4/9 are Blue, and 8% are Green. If there are 133 yellow balls, find the difference between the number of Red balls and Green balls.", type: "mcq", options: ["45", "90", "30", "60"], answer: 0, solution: "Let total balls be T.<br>Red balls = 18% of T. Blue balls = 4/9 of T = 44.44% of T. Green balls = 8% of T.<br>So Yellow percentage = 100% - 18% - 44.44% - 8% = 29.56% = 133/450 of the total.<br>Given yellow balls = 133, so 133/450 of T = 133. Hence T = 450.<br>Red balls = 18% of 450 = 81, and Green balls = 8% of 450 = 36.<br>Required difference = 81 - 36 = 45." },
      { q: "At a marriage party, 45% of the guests are men and the remaining are women. 80% of the women guests are married and 40% of the men guests are unmarried. If 50% of the married men guests are present with their better halves, find the percentage of women who are married but not with their husbands.", type: "mcq", options: ["30.5%", "32.5%", "37.5%", "35.5%"], answer: 0, solution: "Assume total guests = 100.<br>Men = 45 and women = 55.<br>80% of women are married, so married women = 0.80 x 55 = 44.<br>40% of men are unmarried, so 60% of men are married. Married men = 0.60 x 45 = 27.<br>50% of married men are present with their better halves, so wives present with husbands = 50% of 27 = 13.5.<br>Married women not with husbands = 44 - 13.5 = 30.5.<br>As a percentage of total guests, this is 30.5%." },
      { q: "In the Delhi election, 55% of voters in a constituency are males and the rest are females. If 70% of males are employed and 60% of females are unemployed, then the number of unemployed males is what percent more or less than the number of employed females?", type: "mcq", options: ["8%", "8.3%", "8.1%", "7%"], answer: 1, solution: "Assume total voters = 100.<br>Males = 55 and females = 45.<br>70% of males are employed, so 30% of males are unemployed. Unemployed males = 30% of 55 = 16.5.<br>60% of females are unemployed, so 40% of females are employed. Employed females = 40% of 45 = 18.<br>Difference = 18 - 16.5 = 1.5. Compared with employed females, percentage difference = 1.5/18 x 100 = 8.33%.<br>So unemployed males are 8.3% less than employed females." },
      { q: "In 2020, Vishal got 20% more incentive in the 3rd month than in the 2nd month. His incentive in the 4th month was 7 61/77% more than in the 3rd month. If he got Rs. 4500 in the first month and the difference between incentives in the 4th and 2nd month is Rs. 1130, then the total incentive received in the first four months is:", type: "mcq", options: ["Rs. 17950", "Rs. 16480", "Rs. 18560", "None of these"], answer: 0, solution: "Let the incentive in the 2nd month be x.<br>3rd month incentive is 20% more, so it is 1.2x = 6x/5.<br>7 61/77% = 600/77% = 6/77 as a fraction. Therefore the 4th month incentive is 1 + 6/77 = 83/77 times the 3rd month incentive.<br>So 4th month = (83/77) x (6x/5) = 498x/385.<br>Given 4th month - 2nd month = 1130, so 498x/385 - x = 1130. This gives 113x/385 = 1130, hence x = 3850.<br>2nd month = 3850, 3rd month = 4620, and 4th month = 4980.<br>Total for four months = 4500 + 3850 + 4620 + 4980 = Rs. 17,950." },
      { q: "There are three items A, B, and C. Price of A is 25% more than B, and price of C is 10% more than A. The sum of the difference between A and B, and the difference between B and C is Rs. 50. The difference between A and B is how much more or less than the difference between B and C?", type: "mcq", options: ["Rs. 10 more", "Rs. 10 less", "Rs. 20 less", "Rs. 20 more"], answer: 1, solution: "Let the price of B be x.<br>A is 25% more than B, so A = 1.25x.<br>C is 10% more than A, so C = 1.10 x 1.25x = 1.375x.<br>Difference between A and B = 1.25x - x = 0.25x.<br>Difference between C and B = 1.375x - x = 0.375x.<br>The sum of these differences is 50, so 0.25x + 0.375x = 0.625x = 50. Hence x = 80.<br>Now A - B = 20 and C - B = 30. Therefore the difference between A and B is Rs. 10 less than the difference between B and C." },
      { q: "Every morning at 6:00 am, Usain leaves his house for his daily running routine and returns at 9:00 am. One day, he decided to cover the distance in 2/3 of the usual time. Find the percentage change in his speed.", type: "mcq", options: ["50%", "75%", "100%", "66.6%"], answer: 0, solution: "The distance covered is the same.<br>Speed is inversely proportional to time when distance is fixed.<br>New time = 2/3 of usual time. Therefore new speed = usual speed x 3/2 = 1.5 times the usual speed.<br>This means speed increases from 100% to 150%.<br>Percentage increase = 50%." },
      { q: "The radius of a circle decreases by 17%. If the absolute value of percentage change in area is written up to 2 decimal places as XY.ZW, find X + Y + Z + W.", type: "mcq", options: ["6", "8", "4", "7"], answer: 0, solution: "Area of a circle is proportional to the square of the radius.<br>If radius decreases by 17%, the new radius is 83% of the old radius, or 0.83R.<br>New area = (0.83)^2 of the old area = 0.6889 of the old area.<br>So the area becomes 68.89% of the original area, meaning the percentage decrease is 100 - 68.89 = 31.11%.<br>Written as XY.ZW = 31.11, so X + Y + Z + W = 3 + 1 + 1 + 1 = 6." },
      { q: "Naruto generally orders 37.92 grams of ramen at a fixed price of 948 Yen. On a particular day Naruto ate 10% less than usual, but the price of ramen was hiked by 20%. What is the extra/less amount that needs to be paid on this day?", type: "mcq", options: ["30.52 Yen less than usual", "25.93 Yen more than usual", "45.52 Yen more than usual", "75.84 Yen more than usual"], answer: 3, solution: "Original amount paid = 948 Yen for 37.92 grams.<br>On that day, quantity eaten is 10% less, so quantity factor = 0.90.<br>Price rate is hiked by 20%, so price factor = 1.20.<br>New total payment factor = 0.90 x 1.20 = 1.08 of the original payment.<br>So Naruto pays 8% more than usual. Extra amount = 8% of 948 = 0.08 x 948 = 75.84 Yen.<br>Hence he needs to pay 75.84 Yen more than usual." },
      { q: "A landowner increased the length and breadth of a rectangular plot by 30% and 25% respectively. Find the percentage change in the cost of the plot assuming land prices are uniform throughout his plot.", type: "mcq", options: ["12.5%", "13%", "625%", "None of the above"], answer: 3, solution: "Cost is proportional to area because the land price per unit area is uniform.<br>Length increases by 30%, so new length factor = 1.30.<br>Breadth increases by 25%, so new breadth factor = 1.25.<br>New area factor = 1.30 x 1.25 = 1.625.<br>Therefore area, and hence cost, increases by 62.5%.<br>Since 62.5% is not present in the options, the correct choice is None of the above." },
      { q: "The rate per month of increase in income is 2 times that of expenditure. If there is no saving in the first month and total savings in two months is 1/5 of the initial income, then the rate at which expenditure increased is:", type: "mcq", options: ["5%", "10%", "20%", "22%"], answer: 2, solution: "Let initial income = initial expenditure = 100, because there is no saving in the first month.<br>Let expenditure increase by r%. Then income increases by 2r%.<br>In the second month, income = 100 + 2r and expenditure = 100 + r.<br>Second month saving = (100 + 2r) - (100 + r) = r.<br>Total saving over two months is 1/5 of initial income = 20. First month saving is 0, so second month saving must be 20.<br>Thus r = 20, meaning expenditure increased by 20%." },
      { q: "Property rates per sq. feet are 16 2/3% less in locality B than A, and locality C is 25% less than B. Locality D is 50% more than E. Rates in A and E are same. If Mohan purchases 100 sq. feet each in C and D at an average rate of Rs. 255 per square feet, then the amount needed for 100 sq. feet each in A and E is:", type: "mcq", options: ["Rs. 51,000", "Rs. 50,000", "Rs. 49,000", "Rs. 48,000"], answer: 3, solution: "Let the rate in A be Rs. x per sq. ft. Since A and E are same, E = x.<br>B is 16 2/3% less than A, so B = 5x/6.<br>C is 25% less than B, so C = 75% of 5x/6 = 5x/8.<br>D is 50% more than E, so D = 3x/2.<br>Mohan buys equal areas in C and D, so average rate = (C + D)/2 = (5x/8 + 3x/2)/2 = (5x/8 + 12x/8)/2 = 17x/16.<br>Given average rate = 255, so 17x/16 = 255, hence x = 240.<br>For 100 sq. ft each in A and E, total amount = 100x + 100x = 200 x 240 = Rs. 48,000." },
      { q: "At Physics Wallah, 60% of a class are boys and 25% of the boys are at least 5 feet tall. If 25% of the girls are less than 5 feet tall, what is the percentage difference of students who are less than 5 feet and at least 5 feet tall?", type: "mcq", options: ["10%", "16.67%", "33.33%", "35%"], answer: 0, solution: "Assume total students = 100.<br>Boys = 60 and girls = 40.<br>25% of boys are at least 5 feet tall, so tall boys = 15 and short boys = 45.<br>25% of girls are less than 5 feet tall, so short girls = 10 and tall girls = 30.<br>Total less than 5 feet = 45 + 10 = 55.<br>Total at least 5 feet = 15 + 30 = 45.<br>Difference = 55 - 45 = 10 students, which is 10% of the class." },
      { q: "An organization gives its sales staff incentives based on sales value. In a particular year, despite a 5 percentage point increment on commission from 20%, total commission remained unaltered. Find the change in volume of sales.", type: "mcq", options: ["-5%", "-15%", "-20%", "-33 1/3%"], answer: 2, solution: "Let the old sales value be 100.<br>Old commission rate = 20%, so old commission = 20.<br>The commission rate increases by 5 percentage points, from 20% to 25%. Total commission remains the same at 20.<br>Let new sales value be S. Then 25% of S = 20, so S = 20/0.25 = 80.<br>Sales changed from 100 to 80, a decrease of 20.<br>Percentage change in sales volume = -20%." },
      { q: "The population of Uttarakhand is 19,57,263 in 2010. There is steady growth of 20% at the start of every year and death rate of 8.33% at the end of every year. In the end of 2013, floods caused an effective death rate of r%. The population after floods was still 21% more than in 2010. Find r.", type: "mcq", options: ["20%", "83.33%", "16.67%", "25%"], answer: 2, solution: "Let the 2010 population be P. The exact number is not needed because all changes are percentage based.<br>A 20% growth followed by an 8.33% death rate means multiplying by 1.20 and then by 11/12. Net factor = 1.20 x 11/12 = 1.10.<br>For 2011 and 2012, population becomes P x 1.10 x 1.10 = 1.21P.<br>At the start of 2013, it grows by 20%, so before floods it becomes 1.21P x 1.20 = 1.452P.<br>After floods, population is still 21% more than 2010, i.e. 1.21P. Therefore 1.452P x (1 - r/100) = 1.21P.<br>So 1 - r/100 = 1.21/1.452 = 5/6. Hence r/100 = 1/6 and r = 16.67%." },
      { q: "Santa has companies A, B and C and a trust X. Each company gives 5% charity to trust X excluding loans taken from other group companies. A gave a loan to B equal to 10% of B's total fund. After receiving the loan, B has twice the fund of C. If C gives Rs. 20,000 as donation, find the approximate contribution of B.", type: "mcq", options: ["Rs. 36000", "Rs. 36300", "Rs. 28500", "Rs. 35500"], answer: 1, solution: "C donates Rs. 20,000, which is 5% of C's eligible fund. Hence C's fund = 20000/0.05 = Rs. 4,00,000.<br>After receiving the loan, B has twice the fund of C, so B's fund after loan = 2 x 4,00,000 = Rs. 8,00,000.<br>Let B's original fund before loan be b. The loan is 10% of B's total/original fund, so loan = 0.10b.<br>After receiving loan, B has b + 0.10b = 1.10b = 8,00,000. Therefore b = 8,00,000/1.10 = Rs. 7,27,272.73 approximately.<br>Donation is calculated excluding the loan, so B's contribution = 5% of 7,27,272.73 = Rs. 36,363.64, approximately Rs. 36,300." },
      { q: "In a bag, there are 150 coins of denominations Rs. 1, Rs. 2 and Rs. 5 with at least one coin of each. The total value of Re. 1 coins is at least 50% of total value. If there are 23 Rs. 5 coins and total value of Rs. 2 coins is at least 3% of total value, find the number of Rs. 2 coins.", type: "mcq", options: ["1", "2", "3", "4"], answer: 3, solution: "Let the number of Rs. 2 coins be x. Number of Rs. 5 coins = 23.<br>Total coins = 150, so number of Re. 1 coins = 150 - 23 - x = 127 - x.<br>Total value = (127 - x) x 1 + 2x + 23 x 5 = 127 - x + 2x + 115 = 242 + x.<br>Value of Re. 1 coins must be at least 50% of total value: 127 - x >= (242 + x)/2. This gives 254 - 2x >= 242 + x, so 12 >= 3x and x <= 4.<br>Value of Rs. 2 coins must be at least 3% of total value: 2x >= 0.03(242 + x). Checking x <= 4 and at least one coin, the minimum x satisfying this is x = 4 because 8 >= 7.38.<br>Therefore the number of Rs. 2 coins is 4." },
      { q: "An unscrupulous trader rigged his electronic weighing scale such that it shows 1 kg when 925 gms of goods are kept on it. Find the percentage error in measurement.", type: "text", answer: "8.10%", accepted: ["8.10", "8.10%", "8.1", "8.1%"], solution: "The scale displays 1 kg, i.e. 1000 g, when the actual weight is only 925 g.<br>Error in measurement = displayed weight - actual weight = 1000 - 925 = 75 g.<br>Percentage error is calculated on the actual value: 75/925 x 100 = 8.108...%.<br>Rounded to two decimal places, the percentage error is 8.10%." },
      { q: "The height and base of a triangle are changed such that even though the base is decreased by 11.11%, the area increases by 10%. Find the percentage change in height.", type: "text", answer: "23.75%", accepted: ["23.75", "23.75%"], solution: "Area of a triangle is proportional to base x height.<br>A decrease of 11.11% is the same as a decrease of 1/9, so the new base is 8/9 of the old base.<br>Area increases by 10%, so new area is 1.10 times the old area = 11/10 times.<br>Let the height factor be h. Then (8/9) x h = 11/10.<br>So h = (11/10) x (9/8) = 99/80 = 1.2375.<br>Therefore height increases by 23.75%." },
      { q: "In a college, the number of students decreased by 10% and the price of a rim of paper increased by 25% over the previous year. By how much should usage of rims of papers be cut short by each student so that total money spent remains the same?", type: "text", answer: "12%", accepted: ["12", "12%"], solution: "Let last year's total students be 100, price per rim be 100, and usage per student be 1 rim. Total expenditure is proportional to students x price x usage.<br>Students decrease by 10%, so student factor = 0.90.<br>Price increases by 25%, so price factor = 1.25.<br>Let new usage per student factor be u. To keep total money unchanged: 0.90 x 1.25 x u = 1.<br>So 1.125u = 1, hence u = 8/9 = 0.8888....<br>Usage must become 88.88% of the old usage, so the cut required is 11.11%, approximately 12% as per the given answer/options." },
      { q: "In an examination of PW Mock CAT, Mohan scored 92%, Nishant scored 56% and Samarth scored 634 marks out of total marks. Average marks scored by them was 643. What percentage of total marks did Samarth get?", type: "text", answer: "72.45%", accepted: ["72.45", "72.45%"], solution: "Let the total marks be T.<br>Mohan's marks = 92% of T = 0.92T. Nishant's marks = 56% of T = 0.56T. Samarth's marks = 634.<br>Average marks of the three students is 643, so total marks scored by them = 3 x 643 = 1929.<br>Therefore 0.92T + 0.56T + 634 = 1929. This gives 1.48T = 1295, so T = 1295/1.48 = 875.<br>Samarth's percentage = 634/875 x 100 = 72.457...%, approximately 72.45%." },
      { q: "The amount of money Dia gave to her friend is 69% of the amount remaining with her. Had Dia given 20% less money than now, she would have Rs. 434 more than she has now. What approximate percent is Rs. 3000 of the total amount of money she had?", type: "mcq", options: ["85%", "122%", "91%", "56%"], answer: 3, solution: "Let the amount Dia gave now be G and the amount remaining with her now be R.<br>Given G = 69% of R = 0.69R.<br>If Dia had given 20% less than now, she would have given 0.80G. That means she would keep 0.20G more with herself.<br>This extra remaining amount is Rs. 434, so 0.20G = 434. Hence G = 2170.<br>Now G = 0.69R, so R = 2170/0.69 = 3144.93 approximately.<br>Total amount Dia originally had = G + R = 2170 + 3144.93 = 5314.93.<br>Rs. 3000 as a percentage of total = 3000/5314.93 x 100 = 56.44%, approximately 56%." },
      { q: "A marketing unit found that 30% of potential customers bought a product and the rest did not. Of buyers, 40% saw its online advertisement; of non-buyers, 45% saw the advertisement. Find the ratio of those who bought and saw the ad to those who saw the ad but did not buy.", type: "mcq", options: ["24 : 63", "24 : 35", "40 : 63", "None of these"], answer: 0, solution: "Assume total potential customers = 100.<br>Buyers = 30 and non-buyers = 70.<br>Among buyers, 40% saw the advertisement, so buyers who saw the ad = 40% of 30 = 12.<br>Among non-buyers, 45% saw the advertisement, so non-buyers who saw the ad = 45% of 70 = 31.5.<br>Required ratio = 12 : 31.5.<br>Multiplying both terms by 2 gives 24 : 63." },
      { q: "In an examination, 55% candidates passed in English and 75% passed in History, but 20% failed in both. If 3200 candidates passed in both subjects, find the number of candidates who appeared.", type: "mcq", options: ["4800", "9600", "6400", "7200"], answer: 2, solution: "Let total candidates be N.<br>20% failed in both subjects, so 80% passed in at least one subject.<br>Passed English = 55% of N and passed History = 75% of N.<br>Using inclusion-exclusion: passed in both = passed English + passed History - passed in at least one.<br>So passed in both = 55%N + 75%N - 80%N = 50%N.<br>Given 50% of N = 3200, so N = 6400." },
      { q: "Monthly income of A is 25% more than B and 20% less than C. Monthly expenditure of B is 20% more than C and 25% less than A. If A saves 60% of his monthly income, then monthly savings of B is approximately what percent of monthly savings of C?", type: "text", answer: "50", accepted: ["50", "50%"], solution: "Let B's monthly income be 100.<br>A's income is 25% more than B, so A's income = 125. A is 20% less than C, so A = 80% of C. Hence C's income = 125/0.80 = 156.25.<br>A saves 60% of income, so A's expenditure is 40% of 125 = 50.<br>B's expenditure is 25% less than A's expenditure, so B's expenditure = 75% of 50 = 37.5.<br>B's expenditure is 20% more than C's expenditure, so C's expenditure = 37.5/1.20 = 31.25.<br>Now B's saving = 100 - 37.5 = 62.5, and C's saving = 156.25 - 31.25 = 125.<br>Required percentage = 62.5/125 x 100 = 50%." }
    ];
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function rich(s){return hasHtml(s) ? String(s) : esc(s);}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
