  <style>
    :root{--ink:#101820;--muted:#5f6f7a;--line:#b8c3cc;--brand:#0b75bb;--brand-dark:#24313a;--brand-mid:#4089c8;--soft:#dff3fb;--ok:#60b947;--bad:#e55b25;--review:#7b4ab0;--paper:#fff;--bg:#eef3f7}
    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;grid-template-rows:minmax(0,1fr);gap:0;margin:0;padding:0;background:#fff;position:relative}main>section{grid-column:1;grid-row:1;min-width:0;min-height:0;border-right:2px solid #41515c}main>aside:first-child{grid-column:2;grid-row:1}.panel,.question-card,#result{background:var(--paper);border:0;border-radius:0}.panel{padding:14px;align-self:stretch;position:static;background:#e5f6fc} .calc-wrap{position:fixed!important;top:120px;left:52%;width:264px;z-index:50;border:1px solid #7c8991;box-shadow:0 7px 18px rgba(0,0,0,.28);display:none;padding:0;align-self:auto;background:#eee}.calc-wrap.open{display:block}.panel h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--brand-mid);color:#fff;font-weight:700}.question-palette-panel{display:flex;flex-direction:column}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#7fd7f2;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin-top:18px;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;overflow:auto;padding:0 0 74px;background:#fff}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:none}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px}.qtext p,.block p,.option p{margin:0 0 10px}.data-table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:18px;line-height:1.35;background:#fff}.data-table th,.data-table td{border:1px solid #6f7f8b;padding:8px 10px;text-align:left}.data-table th{background:#dff3fb;font-weight:800}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,100%);font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 0;padding-top:14px;border-top:1px solid var(--line);font-size:17px}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

<body>
  <header><div class="topbar"><div class="title"><h1>Percentage CAT PYQ Practice Test</h1><div class="meta">26 Questions | 40 Minutes | +3 correct, -1 wrong | MCQ and numeric entry</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>
    <section><div id="result"></div><form id="testForm" autocomplete="off"><div id="questionHost" class="question-card"></div></form></section>
    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">×</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">←</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">√</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [{"no": 1, "source": "Percentage CAT PYQ Test | Q1", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Hardik earns â‚¹ 28000 per month at the start of the year, and wants to save an average of â‚¹ 5000 per month during this year. In the first three months, his monthly expense was â‚¹ 24500, and he foresees that, from April onwards, his monthly expense will increase to â‚¹ 29500. By what percentage should his monthly earnings grow if he wishes to meet his yearly savings target?</p>", "options": ["20", "23.33", "26.67", "25"], "answer": 3, "typedAnswer": "25", "accepted": [], "solution": "<p>Required average monthly saving = Rs. 5000 for 12 months, so yearly saving target = Rs. 60000.</p><p>In the first 3 months, monthly earning = Rs. 28000 and monthly expense = Rs. 24500.</p><p>Monthly saving for first 3 months = 28000 - 24500 = Rs. 3500. Saving in 3 months = Rs. 10500.</p><p>Remaining saving required = 60000 - 10500 = Rs. 49500.</p><p>For the remaining 9 months, required monthly saving = 49500/9 = Rs. 5500.</p><p>Expense from April onwards = Rs. 29500, so required monthly earning = 29500 + 5500 = Rs. 35000.</p><p>Increase from 28000 to 35000 = 7000.</p><p>Percentage increase = 7000/28000 Ã— 100 = 25%.</p>"}, {"no": 2, "source": "Percentage CAT PYQ Test | Q2", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Due to excess supply, the price of mangoes reduced by 25%. As a result, Reshma could purchase 400 gm extra mangoes with the fixed budget she allotted for mangoes. What was the quantity (in grams) of mangoes that Reshma had initially planned to purchase?</p>", "options": [], "answer": 0, "typedAnswer": "1200", "accepted": ["1200"], "solution": "<p>Let the initially planned quantity be q grams and the original price per gram be p.</p><p>Fixed budget = pq.</p><p>After a 25% reduction in price, new price = 0.75p.</p><p>New quantity purchasable = pq / 0.75p = q/0.75 = 4q/3.</p><p>Extra quantity = 4q/3 - q = q/3.</p><p>Given extra quantity = 400 g, so q/3 = 400.</p><p>Therefore q = 1200 g.</p>"}, {"no": 3, "source": "Percentage CAT PYQ Test | Q3", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Among all the students of a school, 30% belong to 'A' ethnicity, 20% belong to 'B' ethnicity, 12.5% belong to 'C' ethnicity, and the rest belong to 'D' ethnicity. A single student cannot belong to more than one ethnicity. Among the students in the school 15% of A, 10% of B, 20% of C and 12% of D can speak in English. What percentage of English speaking students in the school belong to 'D' ethnicity?</p>", "options": ["22 <sup>2</sup>/<sub>9</sub>%", "27 <sup>3</sup>/<sub>11</sub>%", "33 <sup>1</sup>/<sub>3</sub>%", "37 <sup>3</sup>/<sub>7</sub>%"], "answer": 2, "typedAnswer": "33 1 / 3 %", "accepted": [], "solution": "<p>Take total students as 100.</p><p>A = 30, B = 20, C = 12.5, so D = 37.5.</p><p>English-speaking A students = 15% of 30 = 4.5.</p><p>English-speaking B students = 10% of 20 = 2.</p><p>English-speaking C students = 20% of 12.5 = 2.5.</p><p>English-speaking D students = 12% of 37.5 = 4.5.</p><p>Total English-speaking students = 4.5 + 2 + 2.5 + 4.5 = 13.5.</p><p>Percentage of English-speaking students who belong to D = 4.5/13.5 Ã— 100 = 33 1/3%.</p>"}, {"no": 4, "source": "Percentage CAT PYQ Test | Q4", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A cricket ball weighs only 25% of a football. A tennis ball and a cricket ball together weighs 40% of the weight of a football and a tennis ball together. What is the weight of a tennis ball as a percentage of the weight of a football?</p>", "options": [], "answer": 0, "typedAnswer": "25", "accepted": ["25"], "solution": "<p>Take the weight of football as 100 units.</p><p>Cricket ball weighs 25% of football, so cricket ball = 25 units.</p><p>Let tennis ball weigh T units.</p><p>Given tennis ball + cricket ball is 40% of football + tennis ball.</p><p>So T + 25 = 40% of (100 + T).</p><p>T + 25 = 40 + 0.4T.</p><p>0.6T = 15, hence T = 25.</p><p>Therefore tennis ball is 25% of the football.</p>"}, {"no": 5, "source": "Percentage CAT PYQ Test | Q5", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Neeraj is the sole earner of his family. He saves a certain amount from his salary after taking care of the household expenses. Every month, out of his savings, he deposits 25% in a recurring bank deposit, gives 33 <sup>1</sup>/<sub>3</sub>% of the remaining amount to his mother and he equally divides the remaining amount among his sisters for their pocket money. If the total monthly amount distributed by him among his family members (his mother and sisters) is Rs. 3000, then the amount (in Rs.) he deposits in his recurring bank deposit account in one year is ________.</p>", "options": ["1000", "4000", "6000", "12000"], "answer": 3, "typedAnswer": "12000", "accepted": [], "solution": "<p>Let Neerajâ€™s monthly savings be S.</p><p>He deposits 25% of S in the recurring deposit. Deposit = S/4.</p><p>Remaining savings = 75% of S = 3S/4.</p><p>He gives 33 1/3% of the remaining amount to his mother, i.e. 1/3 of 3S/4 = S/4.</p><p>The remaining amount after mother = 3S/4 - S/4 = S/2, which is divided among sisters.</p><p>Total distributed among family members = mother + sisters = S/4 + S/2 = 3S/4.</p><p>Given 3S/4 = 3000, so S = 4000.</p><p>Monthly recurring deposit = S/4 = 1000.</p><p>Yearly deposit = 1000 Ã— 12 = Rs. 12000.</p>"}, {"no": 6, "source": "Percentage CAT PYQ Test | Q6", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a locality, over a period of 5 years, the total income of the households increased by 35% and the per capita income increased by 25% during the same time. The percentage by which the population of the locality increased during the same period is ______________.</p>", "options": ["12", "10", "8", "6"], "answer": 2, "typedAnswer": "8", "accepted": [], "solution": "<p>Total income = population Ã— per capita income.</p><p>Total income increased by 35%, so income factor = 1.35.</p><p>Per capita income increased by 25%, so per capita income factor = 1.25.</p><p>Population factor = total income factor / per capita income factor = 1.35/1.25 = 1.08.</p><p>Therefore population increased by 8%.</p>"}, {"no": 7, "source": "Percentage CAT PYQ Test | Q7", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A trader buys potatoes and onions in equal quantities every month. He had to spend Rs. 3000 extra this month as the prices of potatoes and onions increased by 25% and 20% respectively. If the trader used to buy potatoes worth Rs. 8000 every month before the price increase, then the amount he had to spend on buying onions this month, in INR, is _____________.</p>", "options": ["4500", "5000", "5500", "6000"], "answer": 3, "typedAnswer": "6000", "accepted": [], "solution": "<p>The trader buys equal quantities of potatoes and onions every month.</p><p>Before price increase, potatoes were worth Rs. 8000.</p><p>Potato price increased by 25%, so extra paid for potatoes = 25% of 8000 = Rs. 2000.</p><p>Total extra spent this month = Rs. 3000.</p><p>So extra spent on onions = 3000 - 2000 = Rs. 1000.</p><p>Onion price increased by 20%, so 20% of old onion cost = 1000.</p><p>Old onion cost = 1000 Ã— 100 / 20 = Rs. 5000.</p><p>This month onion cost = 5000 Ã— 120/100 = Rs. 6000.</p>"}, {"no": 8, "source": "Percentage CAT PYQ Test | Q8", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a garden, 59% of the trees are coconut trees and the rest are mango trees. The number of coconut trees exceeds that of mango trees by 180. If 54% trees, including 245 mango trees, in the garden are older than 10 years, then the percentage of coconut trees, which are ten years or less older, is ___________.</p>", "options": [], "answer": 0, "typedAnswer": "50", "accepted": ["50"], "solution": "<p>Coconut trees = 59% and mango trees = 41% of total trees.</p><p>Difference = 59% - 41% = 18% of total.</p><p>Given difference = 180, so total trees = 180 Ã— 100 / 18 = 1000.</p><p>Coconut trees = 590 and mango trees = 410.</p><p>Trees older than 10 years = 54% of 1000 = 540.</p><p>Older mango trees = 245, so older coconut trees = 540 - 245 = 295.</p><p>Coconut trees ten years or less old = 590 - 295 = 295.</p><p>Required percentage = 295/590 Ã— 100 = 50%.</p>"}, {"no": 9, "source": "Percentage CAT PYQ Test | Q9", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The income tax rule of a country has three slabs: no tax to be paid up to 500000, 10% tax on the income more than 500000 to 1000000, 20% tax on the income beyond 1000000 (all income slabs mentioned above are annual income and has been expressed in the respective currency of the country). Raja had a net annual earning of 992000 after paying the income tax on his annual gross income. The amount of his gross annual income is __________. (Net annual income = annual gross income - tax paid)</p>", "options": ["1052500", "1054500", "1052000", "1054000"], "answer": 0, "typedAnswer": "1052500", "accepted": [], "solution": "<p>Since net income is Rs. 992000, gross income is above Rs. 1000000.</p><p>Tax up to Rs. 500000 = 0.</p><p>Tax from Rs. 500000 to Rs. 1000000 = 10% of Rs. 500000 = Rs. 50000.</p><p>Let gross income be G. Tax above Rs. 1000000 = 20% of (G - 1000000).</p><p>Net income = G - 50000 - 0.20(G - 1000000).</p><p>992000 = G - 50000 - 0.2G + 200000 = 0.8G + 150000.</p><p>0.8G = 842000, so G = 1052500.</p>"}, {"no": 10, "source": "Percentage CAT PYQ Test | Q10", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Naveen expected that his annual electricity consumption (in units) for the year 2023 will be in the ratio of 3 : 7 : 6 : 4 in the first, second, third and the fourth quarter respectively, and accordingly he allotted Rs. 14000 for the annual electricity bill. The actual bills for the first three quarters deviated from his expectations by +10%, +5%, and -4%, respectively. By what percentage should Naveen reduce his electricity consumption in the fourth quarter to meet the allotted annual budget assuming that electricity bill is directly proportional to units consumed?</p>", "options": ["10 <sup>1</sup>/<sub>4</sub>", "12 <sup>2</sup>/<sub>3</sub>", "14 <sup>1</sup>/<sub>2</sub>", "18 <sup>1</sup>/<sub>3</sub>"], "answer": 0, "typedAnswer": "10 1 / 4", "accepted": [], "solution": "<p>The expected quarterly consumption ratio is 3 : 7 : 6 : 4. Total parts = 20.</p><p>Annual budget = Rs. 14000, so one part = Rs. 700.</p><p>Expected bills: Q1 = 2100, Q2 = 4900, Q3 = 4200, Q4 = 2800.</p><p>Actual Q1 = 10% more than 2100 = 2310.</p><p>Actual Q2 = 5% more than 4900 = 5145.</p><p>Actual Q3 = 4% less than 4200 = 4032.</p><p>Total actual bill for first three quarters = 2310 + 5145 + 4032 = 11487.</p><p>Remaining budget for Q4 = 14000 - 11487 = 2513.</p><p>Expected Q4 bill = 2800. Required reduction = 2800 - 2513 = 287.</p><p>Percentage reduction = 287/2800 Ã— 100 = 10.25% = 10 1/4%.</p>"}, {"no": 11, "source": "Percentage CAT PYQ Test | Q11", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Amit's present age in years is 75% less than that of Chandan's. In another few years, Amit's age will be one-third of Chandan's. By what percentage will Chandan's age increase during this period?</p>", "options": ["10%", "12.5%", "25%", "30%"], "answer": 1, "typedAnswer": "12.5%", "accepted": [], "solution": "<p>Let Chandanâ€™s present age be C.</p><p>Amit is 75% less than Chandan, so Amitâ€™s present age = 25% of C = C/4.</p><p>After t years, Amitâ€™s age will be one-third of Chandanâ€™s age.</p><p>So C/4 + t = (C + t)/3.</p><p>Multiplying by 3: 3C/4 + 3t = C + t.</p><p>2t = C/4, hence t = C/8.</p><p>Chandanâ€™s age increase percentage = (C/8)/C Ã— 100 = 12.5%.</p>"}, {"no": 12, "source": "Percentage CAT PYQ Test | Q12", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In the year 2019, the adult population in a suburban town was 9,12,800. The population was categorized into two groups only - male and female. In 2022, the town had a total adult population of 10,40,592. During this period, the adult male population increased by 12.5% and the adult female population increased by 15.5%. The number of adult male population in the town in 2022 was __________.</p>", "options": ["514350", "513450", "456400", "454600"], "answer": 1, "typedAnswer": "513450", "accepted": [], "solution": "<p>Let the adult male population in 2019 be M and female population be F.</p><p>M + F = 912800.</p><p>In 2022, male population = 1.125M and female population = 1.155F.</p><p>So 1.125M + 1.155F = 1040592.</p><p>Now 1.125(M + F) = 1.125 Ã— 912800 = 1026900.</p><p>Subtracting this from the 2022 total: 0.03F = 1040592 - 1026900 = 13692.</p><p>F = 13692 / 0.03 = 456400.</p><p>Therefore M = 912800 - 456400 = 456400.</p><p>Adult male population in 2022 = 1.125 Ã— 456400 = 513450.</p>"}, {"no": 13, "source": "Percentage CAT PYQ Test | Q13", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A box contains small cubes made of either only wood or only metal. Some cubes are of red colour and the rest are of green colour. The number of red cubes is three times that of green cubes. Among the red cubes, 44% are made of metal and among the green cubes, 48% are made of metal. What percentages of cubes are made up of wood?</p>", "options": ["55", "52", "48", "45"], "answer": 0, "typedAnswer": "55", "accepted": [], "solution": "<p>Let total cubes be 100.</p><p>Red cubes are three times green cubes, so red = 75 and green = 25.</p><p>Among red cubes, 44% are metal: metal red = 44% of 75 = 33.</p><p>Among green cubes, 48% are metal: metal green = 48% of 25 = 12.</p><p>Total metal cubes = 33 + 12 = 45.</p><p>Therefore wood cubes = 100 - 45 = 55%.</p><p>Hence 55% of cubes are made of wood.</p>"}, {"no": 14, "source": "Percentage CAT PYQ Test | Q14", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The speed of a conveyor belt in an assembly line is controlled using a digital control device. The speed of the conveyor belt at the beginning of the day remains 1200 items per hour. After the lapse of every hour, the speed is reduced by a fixed percentage. The speed of the belt becomes 768 items per hour after two such reductions. At the end of the 3rd hour of the operation the speed of the belt is increased to the value which is equal to the reduced speed it had at the end of the first hour of its operation. What is the value (in items per hour) of the increased speed of the belt after the completion of its 3rd hour of the operation?</p>", "options": [], "answer": 0, "typedAnswer": "960", "accepted": ["960"], "solution": "<p>Initial speed = 1200 items/hour.</p><p>Let the fixed reduction factor after each hour be k.</p><p>After two reductions, speed = 1200kÂ² = 768.</p><p>So kÂ² = 768/1200 = 0.64 and k = 0.8.</p><p>Speed after the first hour = 1200 Ã— 0.8 = 960 items/hour.</p><p>At the end of the 3rd hour, speed is increased to the value it had after the first reduction.</p><p>Therefore increased speed = 960 items/hour.</p>"}, {"no": 15, "source": "Percentage CAT PYQ Test | Q15", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a test, Sam answers 7 of the first 10 questions correctly and 40% of remaining questions correctly. He got 44% of the total marks in the test. How many questions were there in the test, if all questions carried equal marks and that there were no negative marks for wrong answers?</p>", "options": [], "answer": 0, "typedAnswer": "75", "accepted": ["75"], "solution": "<p>Let total number of questions be N.</p><p>Sam answers 7 of first 10 correctly.</p><p>Remaining questions = N - 10.</p><p>Correct answers from remaining questions = 40% of (N - 10) = 0.4N - 4.</p><p>Total correct answers = 7 + 0.4N - 4 = 0.4N + 3.</p><p>He got 44% marks, so correct answers = 0.44N.</p><p>Thus 0.4N + 3 = 0.44N.</p><p>0.04N = 3, hence N = 75.</p>"}, {"no": 16, "source": "Percentage CAT PYQ Test | Q16", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Mr. Sharma received Rs. 20 lakh towards his retirement benefits. He wants to invest this amount prudentially in Monthly Income Plan (MIP), Bank deposits (FD) and Tax-free Bonds(Bond) so that he gets maximum returns. The minimum amount required to be invested in MIP and Bonds are Rs. 2 lakh each. The yield/return rate of MIP, FD and Bonds are 9%, 10% and 8% respectively. If he wants to invest at least double the amount in MIP as compared to FD, then how much should Mr. Sharma invest in MIP and Bonds respectively to maximize return?</p>", "options": ["Rs. 10 lakh, Rs. 5 lakh", "Rs. 12 lakh, Rs. 2 lakh", "Rs. 12 lakh, Rs. 6 lakh", "Rs. 8 lakh, Rs. 8 lakh"], "answer": 1, "typedAnswer": "Rs. 12 lakh, Rs. 2 lakh", "accepted": [], "solution": "<p>FD has the highest return rate at 10%, MIP has 9%, and Bonds have 8%.</p><p>To maximize return, invest minimum possible in the lowest return option, Bonds = Rs. 2 lakh.</p><p>Remaining amount = 20 - 2 = Rs. 18 lakh.</p><p>He wants MIP investment to be at least double FD investment.</p><p>Since FD gives higher return than MIP, maximize FD subject to MIP â‰¥ 2 Ã— FD.</p><p>Let FD = x and MIP = 2x. Then 3x = 18, so x = 6.</p><p>Therefore FD = Rs. 6 lakh and MIP = Rs. 12 lakh.</p><p>Required MIP and Bonds investment = Rs. 12 lakh and Rs. 2 lakh.</p>"}, {"no": 17, "source": "Percentage CAT PYQ Test | Q17", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Akash purchased a piece of land for Rs. X. He sold that to Paresh for Rs. Y. Had he sold the piece of land for 19% less than this price, he would have earned 8% profit. In order to earn 100% profit, the price at which he should have sold the land is:</p>", "options": ["50% more than Y", "39% more than Y", "73% of Y", "33% more than Y"], "answer": 0, "typedAnswer": "50% more than Y", "accepted": [], "solution": "<p>Let Akashâ€™s cost price be X.</p><p>He sold the land for Y.</p><p>If he had sold it for 19% less than Y, selling price would be 81% of Y = 0.81Y.</p><p>That price would give 8% profit, so 0.81Y = 1.08X.</p><p>Therefore Y = 1.08X/0.81 = 4X/3.</p><p>For 100% profit, required selling price = 2X.</p><p>Compared with Y, 2X divided by 4X/3 = 3/2 = 1.5.</p><p>So required price is 50% more than Y.</p>"}, {"no": 18, "source": "Percentage CAT PYQ Test | Q18", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Bhupati has Rs. 20000 with him which he wants to invest for two years. Some portion of his money is invested in Scheme-1 at 5% rate of interest per annum compounded annually, for two years. Rest of the money was invested in Scheme-2 where 2% commission is deducted upfront from the invested amount and a total of 12.5% return is paid after two years on the balance amount. How much earning does Bhupati make in these two years from the two investments?</p>", "options": ["Rs. 2050", "Rs. 2000", "Rs. 2400", "Cannot be determined"], "answer": 0, "typedAnswer": "Rs. 2050", "accepted": [], "solution": "<p>Let the amount invested in Scheme-1 be A and Scheme-2 be B. A + B = 20000.</p><p>Scheme-1 at 5% compounded annually for 2 years gives factor 1.05Â² = 1.1025, so earning = 10.25% of A.</p><p>In Scheme-2, 2% commission is deducted, so only 98% of B is invested.</p><p>A 12.5% return on this balance gives final amount = 0.98B Ã— 1.125 = 1.1025B.</p><p>So Scheme-2 also gives earning = 10.25% of B.</p><p>Total earning = 10.25% of (A + B) = 10.25% of 20000 = Rs. 2050.</p>"}, {"no": 19, "source": "Percentage CAT PYQ Test | Q19", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>What can be the maximum percentage reduction in the value of any two-digit natural number less than 100 due to interchanging its digits?</p>", "options": [], "answer": 0, "typedAnswer": "90", "accepted": ["90"], "solution": "<p>Let the two-digit number be 10a + b.</p><p>After interchanging digits, it becomes 10b + a.</p><p>Reduction = (10a + b) - (10b + a) = 9(a - b).</p><p>Percentage reduction = 9(a - b)/(10a + b) Ã— 100.</p><p>To maximize reduction, take the largest possible tens digit and smallest possible units digit: a = 9, b = 0.</p><p>Original number = 90 and reversed number = 09 = 9.</p><p>Reduction = 81.</p><p>Maximum percentage reduction = 81/90 Ã— 100 = 90%.</p>"}, {"no": 20, "source": "Percentage CAT PYQ Test | Q20", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Rachana bought some kurtas of the same type and some lehengas of the same type from a shopping mall. Each piece of kurta costs 60% more than each piece of lehengas. While preparing the bill the cashier swapped the number of kurtas and the number of lehengas. Due to this mistake, Rachana had to pay 20% more than the correct bill amount. Which of the following can be the total number of kurtas and lehengas bought by Rachana?</p>", "options": ["36", "57", "66", "9"], "answer": 2, "typedAnswer": "66", "accepted": [], "solution": "<p>Let the price of one lehenga be L. Then price of one kurta = 1.6L.</p><p>Let Rachana buy k kurtas and l lehengas.</p><p>Correct bill = 1.6kL + lL.</p><p>Wrong bill after swapping quantities = 1.6lL + kL.</p><p>Wrong bill is 20% more than correct bill, so 1.6l + k = 1.2(1.6k + l).</p><p>1.6l + k = 1.92k + 1.2l.</p><p>0.4l = 0.92k, so l/k = 0.92/0.4 = 2.3 = 23/10.</p><p>Thus k:l = 10:23 and total pieces must be a multiple of 33.</p><p>Among the options, 66 is possible.</p>"}, {"no": 21, "source": "Percentage CAT PYQ Test | Q21", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In a locality, 42 <sup>6</sup>/<sub>7</sub>% families read TOI, 25% of the rest read HT, half of the rest read ET, and the remaining families do not read any news paper. What can be the minimum number of families who live in the locality if the number of families who read HT is more than 100?</p>", "options": [], "answer": 0, "typedAnswer": "714", "accepted": ["714"], "solution": "<p>42 6/7% = 3/7 of the families read TOI.</p><p>Remaining families = 4/7.</p><p>25% of the rest read HT, so HT readers = 1/4 Ã— 4/7 = 1/7 of total families.</p><p>After TOI and HT, remaining families = 3/7.</p><p>Half of these read ET, so ET readers = 3/14 and non-readers = 3/14.</p><p>All counts will be integral if total families is a multiple of 14.</p><p>HT readers = total/7, and this must be more than 100.</p><p>So total must be more than 700 and also a multiple of 14.</p><p>The smallest such number is 714.</p>"}, {"no": 22, "source": "Percentage CAT PYQ Test | Q22", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>There are 5 cups of equal volume and each cup contains a distinct volume of water. None of the cups is completely filled or completely empty. Combining all the cups, 70% of the total volume is filled with water. The percentage of the volume that each cup is filled is an integral multiple of 10. What is the difference between the highest and lowest percentage points considering the percentage of the volume of each cup filled with water?</p>", "options": ["30", "40", "50", "60"], "answer": 1, "typedAnswer": "40", "accepted": [], "solution": "<p>There are 5 equal-volume cups and combined filling is 70% of total volume.</p><p>So the sum of the five individual filling percentages = 5 Ã— 70 = 350.</p><p>Each cup has a distinct filling percentage, each an integral multiple of 10, and none is 0% or 100%.</p><p>The possible percentages are 10, 20, 30, ..., 90.</p><p>The only five distinct multiples of 10 that sum to 350 are 50, 60, 70, 80 and 90.</p><p>Highest percentage = 90 and lowest percentage = 50.</p><p>Difference = 90 - 50 = 40 percentage points.</p>"}, {"no": 23, "source": "Percentage CAT PYQ Test | Q23", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The monthly savings of Raj was 20% of his monthly salary. His salary increased by 20% and the expenditure increased by 25%. What is the change in his monthly savings?</p>", "options": ["20% increase", "10% decrease", "10% increase", "No change"], "answer": 3, "typedAnswer": "No change", "accepted": [], "solution": "<p>Let Rajâ€™s original salary be 100.</p><p>Original savings = 20% of salary = 20.</p><p>Original expenditure = 80.</p><p>Salary increases by 20%, so new salary = 120.</p><p>Expenditure increases by 25%, so new expenditure = 80 Ã— 1.25 = 100.</p><p>New savings = 120 - 100 = 20.</p><p>Savings remain 20, so there is no change in monthly savings.</p>"}, {"no": 24, "source": "Percentage CAT PYQ Test | Q24", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>In 2020, Mr. Paritosh invested 25% of his savings in Mutual funds and 15% in fixed deposits. Out of the remaining part of his savings, 25% was invested in Gold bonds and the rest of the amount was invested in shares. If his investment in shares is Rs. 20000 more as compared to the investment in Mutual Funds, how much amount (in Rs.) had he invested in Gold bonds?</p>", "options": [], "answer": 0, "typedAnswer": "15000", "accepted": ["15000"], "solution": "<p>Let total savings be S.</p><p>Mutual funds investment = 25% of S = 0.25S.</p><p>Fixed deposits investment = 15% of S = 0.15S.</p><p>Remaining savings = 60% of S = 0.60S.</p><p>Gold bonds = 25% of remaining = 0.25 Ã— 0.60S = 0.15S.</p><p>Shares = remaining after gold bonds = 0.60S - 0.15S = 0.45S.</p><p>Shares investment is Rs. 20000 more than mutual funds investment, so 0.45S - 0.25S = 20000.</p><p>0.20S = 20000, hence S = 100000.</p><p>Gold bonds investment = 0.15 Ã— 100000 = Rs. 15000.</p>"}, {"no": 25, "source": "Percentage CAT PYQ Test | Q25", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A family reduced their consumption of rice by n% as the price of rice increased by 2n%. What will be the change in expenditure of the family for rice if n < 36?</p>", "options": ["Net decrease", "Net increase", "No change", "Cannot be determined"], "answer": 1, "typedAnswer": "Net increase", "accepted": [], "solution": "<p>Let original price be P and original consumption be Q.</p><p>Price increases by 2n%, so price factor = 1 + 2n/100.</p><p>Consumption reduces by n%, so consumption factor = 1 - n/100.</p><p>New expenditure factor = (1 + 2n/100)(1 - n/100).</p><p>Let a = n/100. Then factor = (1 + 2a)(1 - a) = 1 + a - 2aÂ².</p><p>Change over original = a - 2aÂ² = a(1 - 2a).</p><p>Given n < 36, a < 0.36, so 1 - 2a is positive.</p><p>Therefore a(1 - 2a) is positive and expenditure increases.</p>"}, {"no": 26, "source": "Percentage CAT PYQ Test | Q26", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Atul has some money with him. He can buy 50 pens or 30 notebooks using the entire amount with him. However, he bought chocolates for his sister using 20% of the amount with him and then he bought 20 pens. How many notebooks can he purchase from the remaining amount?</p>", "options": ["8", "12", "16", "20"], "answer": 1, "typedAnswer": "12", "accepted": [], "solution": "<p>Let Atulâ€™s total money be M.</p><p>If he can buy 50 pens, price of one pen = M/50.</p><p>If he can buy 30 notebooks, price of one notebook = M/30.</p><p>He spends 20% of M on chocolates, so money left = 80% of M.</p><p>He buys 20 pens. Cost of 20 pens = 20 Ã— M/50 = 40% of M.</p><p>Money remaining = 80% of M - 40% of M = 40% of M.</p><p>Number of notebooks he can buy = (0.40M) / (M/30) = 0.40 Ã— 30 = 12.</p>"}];
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 40 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
