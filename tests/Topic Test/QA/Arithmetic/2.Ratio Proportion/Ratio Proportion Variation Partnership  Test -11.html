    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin:18px 0;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;min-height:0;overflow-y:auto;overflow-x:hidden;padding:0 0 88px;background:#fff;scroll-behavior:smooth;overscroll-behavior:contain}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:block;font-size:13px;color:var(--muted);margin-top:2px}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px;white-space:pre-wrap}.qtext p,.block p,.option p{margin:0 0 10px}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,calc(100% - 48px));font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 28px;padding:16px 18px 20px;border:1px solid var(--line);border-radius:4px;background:#fbfcfd;font-size:17px;line-height:1.6;white-space:normal;overflow:visible}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.solution .block{max-height:min(320px,calc(100vh - 360px));overflow:auto;margin-top:10px;border:1px solid #cbd5dd;border-radius:4px;background:#fff;line-height:1.55;overscroll-behavior:contain}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    .formula-box{margin:14px 0;padding:12px 14px;border:2px solid #2d7fb8;background:#f4fbff;font-size:17px;font-weight:700}.shortcut-box{margin:14px 0;padding:12px 14px;border-left:5px solid #60b947;background:#f5fbf2}.final-answer{margin-top:14px;padding:10px 12px;background:#fff7df;border:1px solid #e4c86d;font-size:18px;font-weight:800}.solution-step{margin:0 0 10px}.solution-steps{margin:8px 0 0 22px;padding:0}.solution-steps li{margin:0 0 8px}.math{font-family:"Cambria Math","STIX Two Math","Times New Roman",serif;font-weight:600;white-space:normal}.frac{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;vertical-align:middle;line-height:1.05;font-family:"Cambria Math","STIX Two Math","Times New Roman",serif}.frac span:first-child{border-bottom:1.6px solid currentColor;padding:0 .18em}.frac span:last-child{padding:0 .18em}.sqrt{display:inline-flex;align-items:flex-start;font-family:"Cambria Math","STIX Two Math","Times New Roman",serif}.sqrt:before{content:"√";font-size:1.15em;line-height:1}.sqrt-radicand{border-top:1.6px solid currentColor;padding:0 .16em;line-height:1.05}.math sup,.qtext sup,.option sup,.solution sup{font-size:.72em;line-height:0;vertical-align:super}table{border-collapse:collapse;max-width:100%;margin:10px 0}td,th{border:1px solid #c9d4dc;padding:6px 8px;text-align:left}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.solution .block{max-height:240px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}
  </style>

<body>
  <header><div class="topbar"><div class="title"><h1>CAT CBT Exam Console - QA Section</h1><div class="meta">Quantitative Aptitude | 30 Questions | 60 Minutes | +3 correct, -1 wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>
    <section><div id="result"></div><form id="testForm" autocomplete="off"><div id="questionHost" class="question-card"></div></form></section>
    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">x</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">Back</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">sqrt</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
            {
                id: 1,
                type: 'MCQ',
                text: 'If a = (9/8)b, then 3b/4a =',
                options: ['2/3', '1/3', '4/3', '2'],
                correct: 'A'
            },
            {
                id: 2,
                type: 'MCQ',
                text: 'If 2.4p = 0.08q, then (q + p)/(q - p) =',
                options: ['31/28', '31/27', '31/29', '39/35'],
                correct: 'C'
            },
            {
                id: 3,
                type: 'MCQ',
                text: 'If a : b = 2 : 3, find (3a + 4b)/(4a + 5b).',
                options: ['6 : 7', '18 : 23', '19 : 23', '20 : 23'],
                correct: 'B'
            },
            {
                id: 4,
                type: 'MCQ',
                text: 'If a : b = b : c = 2 : 3, find a : b : c.',
                options: ['4 : 6 : 9', '2 : 3 : 3', '3 : 3 : 4', '9 : 6 : 4'],
                correct: 'A'
            },
            {
                id: 5,
                type: 'MCQ',
                text: 'If p : q = 5 : 6 and q : r = 4 : 7, then find p : q : r.',
                options: ['10 : 12 : 21', '20 : 24 : 35', '15 : 18 : 28', '25 : 30 : 35'],
                correct: 'A'
            },
            {
                id: 6,
                type: 'MCQ',
                text: 'Find a : e, if a : b = 2 : 3, b : c = 6 : 7, c : d = 14 : 25 and d : e = 1 : 2.',
                options: ['14 : 25', '6 : 25', '12 : 25', '4 : 25'],
                correct: 'D'
            },
            {
                id: 7,
                type: 'MCQ',
                text: 'If p : q = 5 : 4 and p = a + b and q = a - b, find a : b.',
                options: ['1 : 9', '9 : 1', '5 : 4', '4 : 5'],
                correct: 'B'
            },
            {
                id: 8,
                type: 'TITA',
                text: 'Thirty five sweets are distributed among Sita and Gita in the ratio 4 : 3. Find the number of sweets received by Sita.',
                correct: '20'
            },
            {
                id: 9,
                type: 'MCQ',
                text: 'Two numbers are in the ratio of 2 : 5. If 4 is added to each, they would be in the ratio 4 : 9. Find the numbers.',
                options: ['16 and 40', '18 and 45', '22 and 55', '20 and 50'],
                correct: 'D'
            },
            {
                id: 10,
                type: 'TITA',
                text: 'The ratio of the ages of A, B and C is 7 : 5 : 4. If C\'s age is 32 years, find the sum of the ages of A, B and C (in years).',
                correct: '128'
            },
            {
                id: 11,
                type: 'MCQ',
                text: 'The ratio of the ages of four members of a family is 9 : 8 : 3 : 2. The average age of the family is 22 years. What is the age of the eldest person in the family?',
                options: ['36 years', '32 years', '12 years', '6 years'],
                correct: 'A'
            },
            {
                id: 12,
                type: 'MCQ',
                text: 'The number of marbles with A and B are in the ratio of 10 : 11. Which of the following cannot be a possible number of marbles with A and B together?',
                options: ['189', '210', '231', '153'],
                correct: 'D'
            },
            {
                id: 13,
                type: 'MCQ',
                text: 'The strength of a class is 70. Which of the following cannot be the ratio of the number of boys and girls in the class?',
                options: ['2 : 5', '3 : 2', '11 : 3', '9 : 2'],
                correct: 'D'
            },
            {
                id: 14,
                type: 'TITA',
                text: 'The ratio of the number of ladies and gentlemen in a party is 3 : 4. If eight ladies join the party, the ratio of ladies and gentlemen would become 5 : 4. Find the number of gentlemen in the party.',
                correct: '16'
            },
            {
                id: 15,
                type: 'MCQ',
                text: 'The ratio of the present ages of a mother and a son is 4 : 1. Twelve years from now, the ratio of their ages will be 2 : 1. Find the present ages of mother and son respectively. (in years)',
                options: ['36, 9', '28, 6', '24, 6', '32, 8'],
                correct: 'C'
            },
            {
                id: 16,
                type: 'TITA',
                text: 'The ratio of the number of chocolates with A and B is 3 : 4. If A gives four chocolates to B, the ratio of the number of chocolates with them becomes 5 : 9. How many chocolates did A have initially?',
                correct: '24'
            },
            {
                id: 17,
                type: 'TITA',
                text: 'The ratio of the number of students in three classes A, B and C is 3 : 7 : 8. If ten students are transferred from C to B, B will have 80 students. Find the total number of students in the three classes.',
                correct: '180'
            },
            {
                id: 18,
                type: 'MCQ',
                text: 'The ratio of the incomes of A and B is 4 : 3. The ratio of the savings of A and B is 5 : 6. Find the ratio of the expenditures of A and B, if A spends three-fourth of his income.',
                options: ['3 : 2', '5 : 3', '3 : 5', '2 : 3'],
                correct: 'B'
            },
            {
                id: 19,
                type: 'MCQ',
                text: 'The ratio of the monthly incomes of A and B is 3 : 4. The ratio of the monthly expenditures of A and B is 4 : 5. Which of the following represents a possible value of the ratio of their savings?',
                options: ['9 : 10', '3 : 4', '13 : 20', '4 : 5'],
                correct: 'C'
            },
            {
                id: 20,
                type: 'MCQ',
                text: 'The ratio of the present ages of a husband and a wife is 5 : 4.\n\n(i) Which of the following can be a possible ratio of their ages 20 years ago?\n(ii) Which of the following can be a possible ratio of their ages 20 years hence?',
                options: [
                    '(i) 13 : 10, (ii) 6 : 5',
                    '(i) 5 : 4, (ii) 6 : 5',
                    '(i) 23 : 20, (ii) 7 : 5',
                    '(i) 13 : 10, (ii) 5 : 4'
                ],
                correct: 'A'
            },
            {
                id: 21,
                type: 'MCQ',
                text: 'Four positive numbers are in the ratio of 1 : 2 : 3 : 4. If the sum of their squares is equal to 480, find the numbers.',
                options: ['2, 4, 8 10', '8, 12, 16, 20', '4, 8, 12, 16', '8, 10, 12, 16'],
                correct: 'C'
            },
            {
                id: 22,
                type: 'MCQ',
                text: 'Three positive numbers p, q and r satisfy (q+r)/p = (p+r)/q = (p+q)/r = K. K = _______.',
                options: ['3/2', '5/2', '3', '2'],
                correct: 'D'
            },
            {
                id: 23,
                type: 'MCQ',
                text: 'x varies directly as y^2 and when y = 12, x = 4. Find x when y = 18.',
                options: ['9^1/16', '9', '1/9', '16/9'],
                correct: 'B'
            },
            {
                id: 24,
                type: 'TITA',
                text: 'The area of a square varies with the square of its diagonal. The area of a square whose diagonal measures eight units is 32 sq.units. Find the diagonal of a square of area 72 sq.units (in units).',
                correct: '12'
            },
            {
                id: 25,
                type: 'TITA',
                text: 'The monthly salary of an employee in an office varies directly with the number of days he works in that month. An employee gets ₹10400 as salary in a month in which he works for 26 days. Find his salary (in ₹) in a month in which he works for 24 days.',
                correct: '9600'
            },
            {
                id: 26,
                type: 'MCQ',
                text: 'For a given distance, speed is inversely proportional to the time taken. Raju would take six hours to cover it if his speed was 50 km/hr. Find the time taken (in hours) by him to cover it if his speed was 100 km/hr.',
                options: ['2', '3', '4', '6'],
                correct: 'B'
            },
            {
                id: 27,
                type: 'MCQ',
                text: 'P, Q and R are three quantities, P varies directly with the sum of Q and R. If both Q and R decrease by 1, find the change in P.',
                options: ['No change', 'A decrease of 2', 'An increase of 2', 'Cannot be determined'],
                correct: 'D'
            },
            {
                id: 28,
                type: 'TITA',
                text: 'A, B and C are three quantities. A varies directly with B when C is constant. A varies directly with C when B is constant. A = 6000 if B = 20 and C = 30. Find A if B = 40 and C = 60.',
                correct: '24000'
            },
            {
                id: 29,
                type: 'MCQ',
                text: 'A varies directly with B when C is constant and inversely with C when B is constant. When A = 26, B = 65 and C = 30. Find A when B = 84 and C = 42.',
                options: ['24', '36', 'C14', 'D32'],
                correct: 'A'
            },
            {
                id: 30,
                type: 'TITA',
                text: 'X, Y and Z are three quantities. X varies inversely with Y when Z is constant. Y varies inversely with Z when X is constant. When Y = 8, and Z = 7, X = 30. Find X if Y = 16 and Z = 21.',
                correct: '5'
            }
        ];
    questions.forEach(q => { if (q.question && !q.q) q.q = q.question; if (!q.type && q.options && q.options.length) q.type = 'mcq'; });
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function formatMathText(text){let out=esc(text);out=out.replace(/(\d+)(?:st|nd|rd|th)\s+power\s+of\s+([A-Za-z][A-Za-z0-9]*)/gi,'$2<sup>$1</sup>');out=out.replace(/([A-Za-z][A-Za-z0-9]*|\d+)\s+(?:raised\s+to\s+the\s+power|to\s+the\s+power)\s+(?:of\s+)?(-?\d+)/gi,'$1<sup>$2</sup>');out=out.replace(/square\s+root\s+of\s+([A-Za-z0-9]+(?:\s*[+\-*/]\s*[A-Za-z0-9]+)?)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/sqrt\s*\(([^()]+)\)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/√\s*([A-Za-z0-9]+)/g,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/([A-Za-z0-9\)])\^\s*\{?(-?\d+)\}?/g,'$1<sup>$2</sup>');out=out.replace(/(\d+)\s+(\d+)\/(\d+)/g,'$1 <span class="frac"><span>$2</span><span>$3</span></span>').replace(/(^|[^\w>])(\d+)\/(\d+)(?![\w<])/g,'$1<span class="frac"><span>$2</span><span>$3</span></span>');return out;}
    function formatFractionText(text){return formatMathText(text);}
    function formatMathHtml(html){const template=document.createElement('template');template.innerHTML=String(html ?? "");const walker=document.createTreeWalker(template.content,NodeFilter.SHOW_TEXT);const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(node=>{const span=document.createElement('span');span.innerHTML=formatMathText(node.nodeValue);node.replaceWith(...Array.from(span.childNodes));});return template.innerHTML;}
    function rich(s){return formatMathHtml(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? q.correctAnswer ?? q.correct ?? "";}
    function answerIndex(q){const a=q.answer ?? q.correctAnswer ?? q.correct; if(typeof a==='number')return a; const s=String(a ?? '').trim(); if(/^[A-D]$/i.test(s))return labels.indexOf(s.toUpperCase()); if(/^\d+$/.test(s)){const n=Number(s); return n>=0&&n<labels.length?n:-1;} return -1;}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){if(qType(q)==="mcq"){const idx=answerIndex(q); return idx>=0 ? "(" + labels[idx] + ") " + stripHtml((q.options || [])[idx] || "") : stripHtml(qAnswer(q));} return qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function sentenceSteps(text){return String(text ?? "").replace(/\s+/g,' ').trim().split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(Boolean);}
    function detailedSolutionHtml(q){const sol=q.solution || "Solution not provided."; if(hasHtml(sol)) return rich(sol); const steps=sentenceSteps(sol); if(!steps.length || sol==="Solution not provided.") return rich(sol); const items=steps.map((step,i)=>'<li><strong>Step '+(i+1)+':</strong> '+rich(step)+'</li>').join(''); return '<p><strong>Detailed solution:</strong></p><ol class="solution-steps">'+items+'</ol><div class="final-answer">Final Answer: '+rich(correctText(q))+'</div>';}
    function solutionHtml(q){return detailedSolutionHtml(q);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===answerIndex(q);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.innerHTML='Unattempted. Correct answer: '+rich(correctText(q));}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.innerHTML='Wrong. Correct answer: '+rich(correctText(q));} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
