<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    :root{--ink:#101820;--muted:#5f6f7a;--line:#b8c3cc;--brand:#0b75bb;--brand-dark:#24313a;--brand-mid:#4089c8;--soft:#dff3fb;--ok:#60b947;--bad:#e55b25;--review:#7b4ab0;--paper:#fff;--bg:#eef3f7}
    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}

    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin-top:18px;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;overflow:auto;padding:0 0 74px;background:#fff}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:none}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px}.qtext p,.block p,.option p{margin:0 0 10px}.data-table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:18px;line-height:1.35;background:#fff}.data-table th,.data-table td{border:1px solid #6f7f8b;padding:8px 10px;text-align:left}.data-table th{background:#dff3fb;font-weight:800}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,100%);font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 0;padding-top:14px;border-top:1px solid var(--line);font-size:17px}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <header><div class="topbar"><div class="title"><h1>CAT CBT Exam Console - QA Section</h1><div class="meta">0 Questions | 60 Minutes | +3 correct, -1 wrong | MCQ and numeric entry</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>
    <section><div id="result"></div><form id="testForm" autocomplete="off"><div id="questionHost" class="question-card"></div></form></section>
    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">×</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">←</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">√</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
            {
                id: 1,
                type: 'MCQ',
                text: 'If a + b - c : b + c - a : a + c - b = 5 : 6 : 7, then find a : b : c.',
                options: ['12 : 13 : 11', '12 : 11 : 13', '13 : 12 : 11', '13 : 11 : 12'],
                correct: 'B'
            },
            {
                id: 2,
                type: 'MCQ',
                text: 'Which of the following represents a possible value of p : q satisfying:\n(20p^2 - 40pq)/(pq + 4q^2) = 20?',
                options: ['3 : 1', '1 : 4', '4 : 1', '5 : 1'],
                correct: 'C'
            },
            {
                id: 3,
                type: 'MCQ',
                text: 'If a : b = 3 : 4 and c : d = 2 : 3, then find:\n(a^3c^2 + b^3d^2)/(ab^2d^2 + a^2bcd)',
                options: ['19/3', '19/4', '19/9', '19/18'],
                correct: 'D'
            },
            {
                id: 4,
                type: 'MCQ',
                text: 'Ajay and Vijay wrote a test. The sum of Ajay\'s score and twice Vijay\'s score is 310. The sum of Vijay\'s score and twice Ajay\'s score is 290. Find the ratio of the scores of Ajay and Vijay.',
                options: ['9 : 11', '13 : 17', '11 : 19', '7 : 13'],
                correct: 'A'
            },
            {
                id: 5,
                type: 'TITA',
                text: 'Ninety three is divided into two parts such that thrice the first part and twice the second part are in the ratio 25 : 4. Find the first part.',
                correct: '75'
            },
            {
                id: 6,
                type: 'MCQ',
                text: 'If three is subtracted from the numerator and five is added to the denominator of a fraction, the new fraction formed is 1/2. If two is added to the numerator of the initial fraction, the ratio of the new numerator to the denominator becomes 1 : 1. Find the original fraction.',
                options: ['11/13', '18/23', '13/15', '13/11'],
                correct: 'C'
            },
            {
                id: 7,
                type: 'TITA',
                text: 'The ratio of the number of students in classes A, B and C is 3 : 7 : 8. If 10 students leave C and join B, the ratio of the number of students in B and C would be reversed. Find the total number of students in the classes A, B and C.',
                correct: '180'
            },
            {
                id: 8,
                type: 'TITA',
                text: 'Ajay distributed a total of 60 sweets among his sons Ram, Shyam and Tarun. For every five sweets received by Ram, Shyam received four sweets. For every two sweets received by Shyam, Tarun received three sweets. Find the number of sweets received by Tarun.',
                correct: '24'
            },
            {
                id: 9,
                type: 'MCQ',
                text: 'Divide 66 into three parts such that the sum of the first two parts equals the third part and the second part is three less than twice the first part. What is the ratio of the parts as arranged in the ascending order?',
                options: ['14 : 17 : 19', '5 : 9 : 11', '11 : 7 : 4', '4 : 7 : 11'],
                correct: 'D'
            },
            {
                id: 10,
                type: 'MCQ',
                text: 'A person has with him a certain number of weighing stones of 100 gm, 500 gm and 1 kg in the ratio of 3 : 5 : 1. If a maximum of 5 kg can be measured using weighing stones of 500 gm alone, then what is the number of 100 gm stones he has?',
                options: ['6', '3', '9', '5'],
                correct: 'A'
            },
            {
                id: 11,
                type: 'MCQ',
                text: 'In a class, the ratio of the number of boys and girls is 1 : 2. Among the boys, one-third are day scholars and one-fourth of these day scholars travel to school by bus. Among the girls, two-thirds are day scholars and half of these day scholars travel to school by bus. What part of the students in the class are day scholars travelling to school by bus?',
                options: ['1/3', '1/5', '1/4', '2/5'],
                correct: 'C'
            },
            {
                id: 12,
                type: 'MCQ',
                text: 'In a bag, there are balls of three colours - white, black and green. The ratio of the number of white and black balls is 3 : 4. The ratio of the number of black and green balls is 3 : 5. Which of the following can be a possible value of the total number of white and green balls in the bag?',
                options: ['42', '32', '58', '41'],
                correct: 'C'
            },
            {
                id: 13,
                type: 'MCQ',
                text: 'Amar, Bhavan and Chetan have some coins with them. The total number of coins with Bhavan and Chetan and those with Amar and Chetan are in the ratio 4 : 5. The total number of coins with Bhavan and Chetan and those with Amar and Bhavan are in the ratio 4 : 3. Which of the following is the ratio of the number of coins with Bhavan and Chetan?',
                options: ['7 : 4', '3 : 2', '7 : 5', '1 : 3'],
                correct: 'D'
            },
            {
                id: 14,
                type: 'MCQ',
                text: 'The ratio of the prices of tea, last year and this year is 5 : 6. The ratio of the prices of coffee last year and this year is 7 : 8. The sum of prices of a kg of tea and a kg of coffee this year is â‚¹48. Find the price of tea (in â‚¹) last year if it was 20/21 of the price of coffee last year.',
                options: ['â‚¹15', 'â‚¹20', 'â‚¹25', 'â‚¹30'],
                correct: 'B'
            },
            {
                id: 15,
                type: 'MCQ',
                text: 'â‚¹117 was supposed to be divided among Rohan, Sohan and Mohan in the ratio 2 : 3 : 4. By mistake, it was divided in the ratio 1/2 : 1/3 : 1/4. Find the loss / gain of Rohan due to his mistake (in â‚¹).',
                options: ['gain, 26', 'loss, 26', 'gain, 28', 'loss, 28'],
                correct: 'C'
            },
            {
                id: 16,
                type: 'TITA',
                text: 'Five vessels have equal capacities. Each vessel contains some milk. The ratio of the quantities of milk in these vessels is 3 : 4 : 5 : 6 : 7. The total quantity of milk is three-fifth of the combined capacity of the vessels. How many vessels contain at least half milk?',
                correct: '3'
            },
            {
                id: 17,
                type: 'MCQ',
                text: 'The monthly incomes of Ashok and Bala be 3 : 4. The ratio of the expenditures of Ashok and Bala is 4 : 5. Which of the following cannot be the ratio of the savings of Ashok and Bala?',
                options: ['2 : 3', '4 : 5', '8 : 11', '5 : 7'],
                correct: 'B'
            },
            {
                id: 18,
                type: 'MCQ',
                text: 'Manoj and Shiva, who are colleagues in an office, have their monthly savings in the ratio of 2 : 3. Manoj spends two-thirds of his income every month. If the ratio of their monthly incomes is 3 : 4, what is the ratio of their expenditures?',
                options: ['3 : 2', '4 : 5', '4 : 3', '5 : 3'],
                correct: 'B'
            },
            {
                id: 19,
                type: 'MCQ',
                text: 'In a three digit number, the units digit is the sum of the other two digits and it exceeds the tens digit by as much as the latter exceeds the hundreds digit. How many such three digit numbers exist?',
                options: ['1', '2', '3', '4'],
                correct: 'C'
            },
            {
                id: 20,
                type: 'TITA',
                text: 'The sum of the present ages of a mother and her daughter is 60 years. When the mother attains her husband\'s present age, the ratio of her husband\'s age and her daughter\'s age would be 2 : 1. Find the present age of the daughter (in years).',
                correct: '20'
            },
            {
                id: 21,
                type: 'MCQ',
                text: 'A person had two plots of land. In each plot, he cultivated maize and barley. The ratio of the area under maize cultivation and barley cultivation in the larger plot is 8 : 9. The ratio of the total areas under maize cultivation and barley cultivation in the two plots together is 29 : 33. The ratio of the areas under maize cultivation and barley cultivation in the smaller plot is 13 : 15. The ratio of the area under maize cultivation in the larger plot and that under barley cultivation in the smaller plot is:',
                options: ['8 : 15', '16 : 15', '15 : 16', '15 : 8'],
                correct: 'B'
            },
            {
                id: 22,
                type: 'MCQ',
                text: 'Directions for questions 22 and 23: A test of 60 minutes contains questions on Mathematics and English only. The time taken to solve a Mathematics question is twice the time taken to answer an English question and the ratio of time taken to solve all Mathematics questions to time taken to answer all English questions is 8/7.\n\nWhat is the ratio of the number of English questions to that of Mathematics?',
                options: ['11/7', '7/4', '9/4', '7/5'],
                correct: 'B'
            },
            {
                id: 23,
                type: 'MCQ',
                text: 'Using the information in Q22, if the total number of questions is 22, how many English questions can be answered in 18 minutes?',
                options: ['8', '10', '11', '9'],
                correct: 'D'
            },
            {
                id: 24,
                type: 'MCQ',
                text: 'If (a^2 + c^2)/(a + c) = (b^2 + c^2)/(b + c) = k and a â‰  b, which of the following is equal to k?',
                options: ['a + c', 'b + c', 'a + b', 'a - c'],
                correct: 'C'
            },
            {
                id: 25,
                type: 'MCQ',
                text: 'If (p + q)/r = (q + r)/p = (p + r)/q = k, find the sum of all the possible values of k.',
                options: ['1', '2', 'C0', 'D3'],
                correct: 'A'
            },
            {
                id: 26,
                type: 'MCQ',
                text: 'If (2x^2 - 4x + 3)/(4x - 3) = (2x^2 - 3x + 5)/(3x - 5), find the value(s) of x.',
                options: ['0', '2', '-2', 'Both (A) and (C)'],
                correct: 'D'
            },
            {
                id: 27,
                type: 'MCQ',
                text: 'There are 2 two-digit numbers. Their product equals the product of the numbers formed by reversing their digits. Which of the following holds true if the numbers are denoted by ab and cd?',
                options: [
                    'a, b, d and c are in proportion', 
                    'a, b, c and d are in proportion', 
                    'a, d, c and b are in proportion', 
                    'a, c, b, d are in proportion'
                ],
                correct: 'A'
            },
            {
                id: 28,
                type: 'MCQ',
                text: 'A string is cut into two parts. The ratio of the lengths of the string and the smaller part is six times the ratio of the lengths of the smaller and the larger parts. Find the ratio of the lengths of the larger and smaller parts of the string.',
                options: ['2 : 1', '3 : 1', 'C4 : 1', 'D5 : 1'],
                correct: 'A'
            },
            {
                id: 29,
                type: 'TITA',
                text: 'The mean proportional between two numbers is 9. The third proportional of the same numbers is 6561. Find the greater of the 2 numbers.',
                correct: '81'
            },
            {
                id: 30,
                type: 'MCQ',
                text: 'The ratio of Ahmed\'s age to Mohammed\'s age is the same as the ratio of the ages of their respective elder brothers. The ratio of the difference of the ages of Ahmed and Mohammed to that of the difference of the ages of their respective brothers is 1 : 2. What is the ratio of the sum of the ages of their respective brothers to the sum of the ages of Ahmed and Mohammed?',
                options: ['2 : 1', '4 : 1', '3 : 1', 'âˆš2 : 1'],
                correct: 'A'
            },
            {
                id: 31,
                type: 'TITA',
                text: 'x is directly proportional to 4 more than the square of y. x is 39 when y is 3. What is the positive value of y when x is 60?',
                correct: '4'
            },
            {
                id: 32,
                type: 'MCQ',
                text: 'In a three digit number the tens digit is the average of the other two digits. The ratio of the number formed by its first two digits and their sum equals the ratio of the number formed by its last two digits and their sum. How many three digit numbers satisfy these conditions?',
                options: ['7', '8', '9', '6'],
                correct: 'C'
            },
            {
                id: 33,
                type: 'TITA',
                text: 'The distance a body falls through when dropped from a certain height varies directly with the square of the time of fall. A body falls through a total of 500 m in 10 seconds. Find the distance it falls through, in the 9th second (in m).',
                correct: '85',
                hasDiagram: true,
                diagramType: 'falling'
            },
            {
                id: 34,
                type: 'TITA',
                text: 'A quantity Q is obtained by adding three quantities. The first is a constant, the second varies directly with the square root of y and the third varies directly with the cube root of y. When y = 1, Q = 60. When y = 64, Q = 230 and when y = 729, Q = 660. Find the constant.',
                correct: '30'
            },
            {
                id: 35,
                type: 'MCQ',
                text: 'The cost of supply of a commodity equals the sum of three quantities. The first one is a constant, the second varies directly as the price per unit of the commodity and the third varies directly as the square of the price per unit. The costs of supply are â‚¹9, â‚¹24 and â‚¹47 when the prices per unit of commodity is â‚¹1, â‚¹2 and â‚¹3 respectively. Find the cost (in â‚¹) of supply when price per unit of commodity is â‚¹4.',

    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
