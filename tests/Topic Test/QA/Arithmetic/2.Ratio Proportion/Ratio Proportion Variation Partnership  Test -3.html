<body>
  <header><div class="topbar"><div class="title"><h1>DPP 01 Ratio and Proportion Test</h1><div class="meta">Quantitative Aptitude | 15 Questions | 60 Minutes | +3 correct, -1 wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>

    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">x</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">Back</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">sqrt</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
      {level:"DPP - 01",q:"Chiru observes that for every white Maruti car, there are thrice as many black Honda cars. For every blue Nissan car, there are 5/7 times as many red Mercedes cars. If black Honda and blue Nissan cars are equal, which cannot be the total number of cars spotted?",options:["1152","448","768","432"],answer:3,solution:"White:Black = 1:3 and Blue:Red = 7:5. Make Black and Blue equal by taking LCM 21. Then White:Black:Blue:Red = 7:21:21:15, total = 64 parts. Only 432 is not a multiple of 64."},
      {level:"DPP - 01",q:"Three numbers are such that first:second = second:third = 3:2. If the difference between first and last is 255, find the sum of the three.",options:["959","969","979","989"],answer:1,solution:"The three numbers are in ratio 9:6:4. Difference between first and last = 5 parts = 255, so 1 part = 51. Sum = 19 parts = 969."},
      {level:"DPP - 01",q:"The ratio of two bags A and B is 23.75. If the ratio is a:b, what is the minimum possible value of a+b?",options:["396","198","99","49"],answer:2,solution:"23.75 = 2375/100 = 95/4. Minimum a+b = 95+4 = 99."},
      {level:"DPP - 01",q:"Venkatesh and Shrinivas have marbles in the ratio 3:5. If Shrinivas gives some marbles to Venkat, the ratio becomes 4:3. If their initial marble counts are two-digit numbers, find their maximum possible difference.",options:["11","28","55","56"],answer:1,solution:"Let initial marbles be 3k and 5k. After transfer t, (3k+t):(5k-t)=4:3, giving 7t=11k. Thus k must be a multiple of 7. Since 5k is two-digit, maximum k=14. Difference = 2k = 28."},
      {level:"DPP - 01",q:"Bhel is made by mixing Sev, Chatni and puffed rice in ratio 5:3:4. More chatni and sev are added so the ratio becomes 4:5:3. If 132 gm of Chatni was added, find the amount of puffed rice.",options:["132 gm","156 gm","144 gm","120 gm"],answer:2,solution:"Initial ratio 5:3:4 and final ratio 4:5:3. Make puffed rice equal: initial 15:9:12 and final 16:20:12. Chatni added = 11 parts = 132 gm, so 1 part = 12 gm. Puffed rice = 12 parts = 144 gm."},
      {level:"DPP - 01",q:"George contributed one-half as much as the other three Beatles combined, John one-third as much as the others combined, and Paul one-fourth as much as the other three combined. If George and John together contributed 63 million USD, find John's contribution.",options:["24","27","30","36"],answer:1,solution:"George is 1/3 of total and John is 1/4 of total. So G+J = 7/12 of total = 63, making total 108. John's share = 1/4 x 108 = 27 million."},
      {level:"DPP - 01",q:"Kenan and Kel scored in the ratio 9:7. Both received the same penalty and their new scores became 15:11. Find the ratio of Kenan's original score to the penalty.",options:["6:5","4:3","5:2","6:1"],answer:3,solution:"Initial difference 2 parts and final difference 4 parts, so multiply initial ratio by 2: 18:14. Final ratio is 15:11, meaning the same penalty is 3. Kenan original:penalty = 18:3 = 6:1."},
      {level:"DPP - 01",q:"Arthur divided his prize equally among Bill, Percy, Fred, George, Ron and Ginny. Ginny gave half to Harry and half equally to James, Lily and Albus. Albus gave one-fifth to Molly and had 16 Galleons left. If Harry received 3/7 of his net worth from Ginny and the remaining from inheritance, what was the inheritance?",options:["60","140","160","80"],answer:3,solution:"Let total prize be 180 units. Ginny gets 30, gives 15 to Harry and 15 to children, so Albus gets 5. After giving away 1/5, Albus has 4 units = 16, so multiplier is 4. Harry got 60 from Ginny. This is 3/7 of his net worth, so net worth = 140 and inheritance = 4/7 x 140 = 80."},
      {level:"DPP - 01",q:"A bus starts with male:female passengers = 3:1. At first stop, 16 males get down and 6 more females get in. The ratio becomes 2:1. What was the total number of passengers initially?",options:["64","56","112","None of These"],answer:2,solution:"Let males=3a and females=a. After stop, (3a-16):(a+6)=2:1. Thus 3a-16=2a+12, so a=28. Initial total = 4a = 112."},
      {level:"DPP - 01",q:"Last year tea:coffee prices were 2:3. Tea rose in ratio 5:6 and coffee in ratio 7:8. This year, 1 kg coffee and 1 kg tea together cost Rs.51. How much does 1 kg coffee cost?",options:["Rs 17.50","Rs 21","Rs 26.25","Rs 30"],answer:3,solution:"Let last year's prices be 2x and 3x. This year tea = 12x/5 and coffee = 24x/7. Their sum is 51, so x=35/4. Coffee price = 24x/7 = Rs. 30."},
      {level:"DPP - 01",q:"A factory employs skilled workers, unskilled workers and clerks in proportion 8:5:1. Their wages are in ratio 5:2:3. If total daily wages are Rs.318, wages paid to each category are:",options:["Rs. 240, Rs. 60, Rs. 18","Rs. 200, Rs. 90, Rs. 28","Rs. 150, Rs. 108, Rs. 60","Rs. 250, Rs. 50, Rs. 18"],answer:0,solution:"Total category wages are proportional to 8x5 : 5x2 : 1x3 = 40:10:3. Total 53 parts = 318, so 1 part = 6. Amounts are Rs. 240, Rs. 60 and Rs. 18."},
      {level:"DPP - 01",q:"Sachin has two-third of the money with Kalpesh. Kalpesh has three-fifth of the money with Lokesh. If Lokesh has Rs. 1200, how much does Sachin have?",options:["720","320","200","480"],answer:3,solution:"Kalpesh = 3/5 of 1200 = 720. Sachin = 2/3 of 720 = Rs. 480."},
      {level:"DPP - 01",q:"Two equal-capacity containers are full of oil-water mixtures. In first, oil:water = 4:7 and in second, oil:water = 7:11. Both mixtures are mixed. What is resulting oil:water ratio?",options:["149:247","247:149","143:241","241:143"],answer:0,solution:"Equal volumes imply 11x = 18y. Oil:water after mixing = (4x+7y):(7x+11y). Substituting x=18y/11 gives 149:247."},
      {level:"DPP - 01",q:"Boys:girls in a school = 2:1. Of girls, 3/4 are day scholars and 2/3 of those travel by bus. Of boys, 2/3 are day scholars and 3/4 of those travel by bus. What part of all students travel by bus?",options:["2/3","1/2","1/3","2/5"],answer:1,solution:"Let boys=2x and girls=x. Girls travelling by bus = 2/3 x 3/4 x x = x/2. Boys travelling by bus = 3/4 x 2/3 x 2x = x. Total bus travellers = 3x/2 out of 3x, so fraction = 1/2."},
      {level:"DPP - 01",q:"In a 4 km race, Anu defeats Banu by 600 m. Banu gives Caira a start of 200 m and both finish together. How much start should Caira get from Anu to finish at the same time?",options:["800 m","700 m","770 m","400 m"],answer:2,solution:"Anu:Banu speed = 4000:3400 = 20:17. Banu:Caira speed = 4000:3800 = 20:19, so Caira relative to Anu = 17/20 x 19/20 = 323/400. In 4000 m, Caira runs 3230 m while Anu runs 4000 m. Start needed = 770 m."}
    ];
    questions.forEach(q => { if (q.question && !q.q) q.q = q.question; if (!q.type && q.options && q.options.length) q.type = 'mcq'; });
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function formatMathText(text){let out=esc(text);out=out.replace(/(\d+)(?:st|nd|rd|th)\s+power\s+of\s+([A-Za-z][A-Za-z0-9]*)/gi,'$2<sup>$1</sup>');out=out.replace(/([A-Za-z][A-Za-z0-9]*|\d+)\s+(?:raised\s+to\s+the\s+power|to\s+the\s+power)\s+(?:of\s+)?(-?\d+)/gi,'$1<sup>$2</sup>');out=out.replace(/square\s+root\s+of\s+([A-Za-z0-9]+(?:\s*[+\-*/]\s*[A-Za-z0-9]+)?)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/sqrt\s*\(([^()]+)\)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/√\s*([A-Za-z0-9]+)/g,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/([A-Za-z0-9\)])\^\s*\{?(-?\d+)\}?/g,'$1<sup>$2</sup>');out=out.replace(/(\d+)\s+(\d+)\/(\d+)/g,'$1 <span class="frac"><span>$2</span><span>$3</span></span>').replace(/(^|[^\w>])(\d+)\/(\d+)(?![\w<])/g,'$1<span class="frac"><span>$2</span><span>$3</span></span>');return out;}
    function formatFractionText(text){return formatMathText(text);}
    function formatMathHtml(html){const template=document.createElement('template');template.innerHTML=String(html ?? "");const walker=document.createTreeWalker(template.content,NodeFilter.SHOW_TEXT);const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(node=>{const span=document.createElement('span');span.innerHTML=formatMathText(node.nodeValue);node.replaceWith(...Array.from(span.childNodes));});return template.innerHTML;}
    function rich(s){return formatMathHtml(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? q.correctAnswer ?? q.correct ?? "";}
    function answerIndex(q){const a=q.answer ?? q.correctAnswer ?? q.correct; if(typeof a==='number')return a; const s=String(a ?? '').trim(); if(/^[A-D]$/i.test(s))return labels.indexOf(s.toUpperCase()); if(/^\d+$/.test(s)){const n=Number(s); return n>=0&&n<labels.length?n:-1;} return -1;}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){if(qType(q)==="mcq"){const idx=answerIndex(q); return idx>=0 ? "(" + labels[idx] + ") " + stripHtml((q.options || [])[idx] || "") : stripHtml(qAnswer(q));} return qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function sentenceSteps(text){return String(text ?? "").replace(/\s+/g,' ').trim().split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(Boolean);}
    function detailedSolutionHtml(q){const sol=q.solution || "Solution not provided."; if(hasHtml(sol)) return rich(sol); const steps=sentenceSteps(sol); if(!steps.length || sol==="Solution not provided.") return rich(sol); const items=steps.map((step,i)=>'<li><strong>Step '+(i+1)+':</strong> '+rich(step)+'</li>').join(''); return '<p><strong>Detailed solution:</strong></p><ol class="solution-steps">'+items+'</ol><div class="final-answer">Final Answer: '+rich(correctText(q))+'</div>';}
    function solutionHtml(q){return detailedSolutionHtml(q);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===answerIndex(q);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.innerHTML='Unattempted. Correct answer: '+rich(correctText(q));}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.innerHTML='Wrong. Correct answer: '+rich(correctText(q));} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
