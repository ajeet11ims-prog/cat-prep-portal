  <script>
    const questions = [
      {
        level: "Questions 1-10",
        q: "The speeds of three cars are in the ratio 5:3:4. The ratio between the times taken by these cars to travel the same distance is:",
        options: ["5:3:4", "4:3:5", "15:20:12", "None of these"],
        answer: 3,
        solution: "For the same distance, time is inversely proportional to speed. The time ratio is 1/5:1/3:1/4 = 12:20:15, which is not among the listed ratios."
      },
      {
        level: "Questions 1-10",
        q: "A varies directly to B when C is constant and directly to the square of C when B is constant. When B = 1 and C = 3, A = 108. What will be the value of C when A = 4056 and B = 2?",
        options: ["11", "12", "13", "14"],
        answer: 2,
        solution: "A = kBC^2. From 108 = k x 1 x 9, k = 12. Then 4056 = 12 x 2 x C^2, so C^2 = 169 and C = 13."
      },
      {
        level: "Questions 1-10",
        q: "Three partners A, B and C share profits such that 3 times the share of A is equal to 2 times the share of B which is equal to 4 times the share of C. Find the ratio of their shares.",
        options: ["3:2:4", "3:6:4", "4:2:3", "4:6:3"],
        answer: 3,
        solution: "Let 3A = 2B = 4C = k. Then A:B:C = k/3:k/2:k/4. Multiplying by 12 gives 4:6:3."
      },
      {
        level: "Questions 1-10",
        q: "6 years ago, the ratio of the ages of A and B was 13:17 respectively. The difference between the age of A after 4 years and the age of B after 5 years is 9 years. Find the present age of A.",
        options: ["30 years", "34 years", "32 years", "36 years"],
        answer: 2,
        solution: "Let ages 6 years ago be 13x and 17x. Then (17x + 11) - (13x + 10) = 9, so x = 2. Present age of A = 13x + 6 = 32 years."
      },
      {
        level: "Questions 1-10",
        q: "Anu, Vinu and Punit started a business with initial investments Rs. 8000, Rs. 12000 and Rs. 10000 respectively and after 1 year, Anu and Punit again invested Rs. 2000 each. What is the ratio of share of profit of Anu, Vinu and Punit after two years?",
        options: ["9:12:7", "9:10:11", "9:12:11", "8:12:11"],
        answer: 2,
        solution: "Capital-time ratio = (8000 + 10000):(12000 + 12000):(10000 + 12000) = 18000:24000:22000 = 9:12:11."
      },
      {
        level: "Questions 1-10",
        q: "The product of two fractions is 7/10 and when first fraction is divided by second fraction, the result is 35/32. What is the smaller fraction?",
        options: ["4/5", "3/5", "6/7", "7/8"],
        answer: 0,
        solution: "Let the fractions be x and y. xy = 7/10 and x/y = 35/32. Solving gives y^2 = 16/25, so y = 4/5, the smaller fraction."
      },
      {
        level: "Questions 1-10",
        q: "A and B enter a partnership with initial investment in the ratio of 8:7 and after two months, C joins them with initial investment equal to 3/2 of investment of A. At the end of the year, the sum of share of profit of A and C is Rs. 63000. Find the share of profit of B.",
        type: "text",
        answerText: "24500",
        solution: "Capital-time ratio A:B:C = 8 x 12 : 7 x 12 : 12 x 10 = 8:7:10. A + C = 18 parts = Rs. 63000, so B's 7 parts = Rs. 24500."
      },
      {
        level: "Questions 1-10",
        q: "A, B and C entered into a partnership. The respective ratio of the investment of A to that of C is 4:7 and the ratio of the investment of B to C is 3:5 respectively. All of them invested for an equal period of time. Find B's profit share, given that the total profit earned by them is Rs. 10640.",
        type: "text",
        answerText: "2940",
        solution: "Investments are A:C = 4:7 and B:C = 3:5. Combining gives A:B:C = 20:21:35. B's share = 21/76 x 10640 = Rs. 2940."
      },
      {
        level: "Questions 1-10",
        q: "Aleksandar and Binny started a business in partnership investing Rs. 24000 and Rs. 16000 respectively. After six months, Charli joined them with Rs. 20000. What will be Binny's share in the total profit of Rs. 32,890 earned at the end of 2 years from the starting of the business?",
        options: ["5986", "6895", "8695", "9568"],
        answer: 3,
        solution: "Capital-time ratio = 24000 x 24 : 16000 x 24 : 20000 x 18 = 24:16:15. Binny's share = 16/55 x 32890 = Rs. 9568."
      },
      {
        level: "Questions 1-10",
        q: "The present ages of A and B are 18 years and 27 years respectively. The ratio of the age of A, X years later and the age of B, Y years later will be 5:6 respectively. Which option is true for X and Y, if X + Y = 10?",
        options: ["X = 2Y + 1", "Y = 2X + 1", "X = 2Y - 1", "Y = 2X - 1"],
        answer: 0,
        solution: "(18 + X)/(27 + Y) = 5/6 and X + Y = 10. Solving gives X = 7 and Y = 3, so X = 2Y + 1."
      },
      {
        level: "Questions 11-20",
        q: "Lokendra starts a business with capital of Rs. 15000. After 6 months, Mukesh joins with Rs. 20000 and after 3 more months Suresh joins with a certain amount. At the end of the year the profit ratio is 15:10:6. Find the amount invested by Suresh.",
        type: "text",
        answerText: "24000",
        solution: "Profit ratio = 15000 x 12 : 20000 x 6 : P x 3 = 15:10:6. Hence P = Rs. 24000."
      },
      {
        level: "Questions 11-20",
        q: "Mark and Stark start a business together and invest $50,000 and $70,000 respectively. Stark is an active partner and gets 15% of the profit separately. If their business yields a total profit of $60,000, what is the share of Stark at the end of a year?",
        type: "text",
        answerText: "38750",
        solution: "Stark first gets 15% of 60000 = 9000. Remaining 51000 is divided in 5:7, so Stark gets 7/12 x 51000 = 29750. Total = $38750."
      },
      {
        level: "Questions 11-20",
        q: "Mr. Buffet and Mr. Stark start a Robotics company by investing $14000 and $21000 respectively. They share half of the total profit equally and the remaining half in the ratio of their capitals. If the entire profit had been shared in the ratio of their capitals, Mr. Stark would have got $1500 more. What is the total profit?",
        options: ["$20000", "$30000", "$40000", "$50000"],
        answer: 1,
        solution: "Capital ratio is 2:3. Under the agreement, Stark gets 1250x + 1500x = 2750x while pure capital sharing gives 3000x. Difference 250x = 1500, so x = 6 and total profit = 5000x = $30000."
      },
      {
        level: "Questions 11-20",
        q: "If x varies directly as (y^3 - 6) and when y = 2 then x = 4. Find the value of x when y = 4.",
        options: ["115", "116", "119", "120"],
        answer: 1,
        solution: "x = k(y^3 - 6). With y = 2, 4 = k(8 - 6), so k = 2. For y = 4, x = 2(64 - 6) = 116."
      },
      {
        level: "Questions 11-20",
        q: "In Mithadesh, the cost per kg of sugar varies inversely with the square of the quantity of sugar produced in a year. When 6 million tonnes is the annual production, the cost is Rs. 25/kg. What must have been the total production when the cost is Rs. 36/kg? (in million tonnes)",
        options: ["5", "8.64", "9", "10"],
        answer: 0,
        solution: "Price is inversely proportional to production squared. 25/36 = P^2/6^2, so P = 5 million tonnes."
      },
      {
        level: "Questions 11-20",
        q: "Ramya starts a company, and after 3 months, Ravi also joins. The initial investment of Ramya and Ravi is in the ratio of 3:2 respectively. Ramya and Ravi receive Rs. ____ and Rs. ____ respectively, as profit after one year.",
        options: ["2350, 1350", "1960, 980", "1330, 660", "1240, 310"],
        answer: 1,
        solution: "Profit ratio = 3 x 12 : 2 x 9 = 36:18 = 2:1. The only option in this ratio is Rs. 1960 and Rs. 980."
      },
      {
        level: "Questions 11-20",
        q: "The price of the product varied such that the ratio of prices in 2000 to 2001 is 3:5, 2001 to 2002 is 7:4 and 2002 to 2003 is 5:7. If the price in 2001 is Rs. 35000, what is the difference in prices in 2000 and 2003?",
        options: ["7000", "8000", "9000", "10000"],
        answer: 0,
        solution: "Price in 2000 = 3/5 x 35000 = 21000. Price in 2003 = 4/7 x 7/5 x 35000 = 28000. Difference = Rs. 7000."
      },
      {
        level: "Questions 11-20",
        q: "In a tea business, Amit is a working partner. Amit invests Rs. 7000 and Narendra invests Rs. 3000. Amit received 37.5% of profit for managing the business and the rest is divided in proportion to their capitals. What is Amit's share of profit if the total profit is Rs. 440?",
        options: ["Rs. 357.5", "Rs. 90", "Rs. 390", "Rs. 100"],
        answer: 0,
        solution: "Amit gets 37.5% of 440 = 165 first. Remaining 275 is divided 7:3, so Amit gets 7/10 x 275 = 192.5. Total = Rs. 357.5."
      },
      {
        level: "Questions 11-20",
        q: "If 'a' is directly proportional to the square of 'b' and 'b' is inversely proportional to 'c', then which of the following is correct? I: 'a' is inversely proportional to the square of 'c'. II: 'ac' is directly proportional to 'b'.",
        options: ["Both I and II", "Only II", "Only I", "Neither I nor II"],
        answer: 0,
        solution: "a is proportional to b^2, and b is proportional to 1/c. Therefore a is proportional to 1/c^2. Also, since c is proportional to 1/b, ac is proportional to b. Both statements are correct."
      },
      {
        level: "Questions 11-20",
        q: "Prerna started a business by investing 0.75 lakh. Mansee joins the business by investing 1 lakh after a few months. After how many months did Mansee join if at the end of the year profit was divided between Mansee and Prerna in the ratio of 13:18?",
        options: ["5 1/2", "5", "7", "6"],
        answer: 0,
        solution: "Prerna's capital-time = 0.75 x 12 = 9 lakh-months. Let Mansee invest for N months. N:9 = 13:18, so N = 6.5 months. Therefore she joined after 5.5 months."
      },
      {
        level: "Questions 21-30",
        q: "5 years ago, Father's age was twice the age of his son at that time. 10 years from now, the ratio of age of son to father will become 8:13. What is the current age of son?",
        options: ["20", "30", "35", "25"],
        answer: 1,
        solution: "Let present ages be F and S. F - 5 = 2(S - 5), and (S + 10):(F + 10) = 8:13. Solving gives S = 30."
      },
      {
        level: "Questions 21-30",

    questions.forEach(q => { if (q.question && !q.q) q.q = q.question; if (!q.type && q.options && q.options.length) q.type = 'mcq'; });
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function formatFractionText(text){return esc(text).replace(/(\d+)\s+(\d+)\/(\d+)/g,'$1 <span class="frac"><span>$2</span><span>$3</span></span>').replace(/(^|[^\w>])(\d+)\/(\d+)(?![\w<])/g,'$1<span class="frac"><span>$2</span><span>$3</span></span>');}
    function formatMathHtml(html){const template=document.createElement('template');template.innerHTML=String(html ?? "");const walker=document.createTreeWalker(template.content,NodeFilter.SHOW_TEXT);const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(node=>{const span=document.createElement('span');span.innerHTML=formatFractionText(node.nodeValue);node.replaceWith(...Array.from(span.childNodes));});return template.innerHTML;}
    function rich(s){return formatMathHtml(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? q.correctAnswer ?? q.correct ?? "";}
    function answerIndex(q){const a=q.answer ?? q.correctAnswer ?? q.correct; if(typeof a==='number')return a; const s=String(a ?? '').trim(); if(/^[A-D]$/i.test(s))return labels.indexOf(s.toUpperCase()); if(/^\d+$/.test(s)){const n=Number(s); return n>=0&&n<labels.length?n:-1;} return -1;}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){if(qType(q)==="mcq"){const idx=answerIndex(q); return idx>=0 ? "(" + labels[idx] + ") " + stripHtml((q.options || [])[idx] || "") : stripHtml(qAnswer(q));} return qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function sentenceSteps(text){return String(text ?? "").replace(/\s+/g,' ').trim().split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(Boolean);}
    function detailedSolutionHtml(q){const sol=q.solution || "Solution not provided."; if(hasHtml(sol)) return rich(sol); const steps=sentenceSteps(sol); if(!steps.length || sol==="Solution not provided.") return rich(sol); const items=steps.map((step,i)=>'<li><strong>Step '+(i+1)+':</strong> '+rich(step)+'</li>').join(''); return '<p><strong>Detailed solution:</strong></p><ol class="solution-steps">'+items+'</ol><div class="final-answer">Final Answer: '+rich(correctText(q))+'</div>';}
    function solutionHtml(q){return detailedSolutionHtml(q);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===answerIndex(q);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.innerHTML='Unattempted. Correct answer: '+rich(correctText(q));}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.innerHTML='Wrong. Correct answer: '+rich(correctText(q));} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
