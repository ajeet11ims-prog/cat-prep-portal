  <script>
    const questions = [
      {q:"A trader makes a profit equal to the selling price of 75 articles when he sold 100 of the articles. What percent did he make in the transaction?",o:["33.33%","75%","300%","150%"],h:"C"},
      {q:"As a part of sales promotion, a trader is offering 1 article free with every pack of 10 articles. By what percentage should he mark-up his goods if he desires a profit of 10%?",o:["20%","21%","22.22%","18.18%"],h:"B"},
      {q:"A girl sells two bags at Rs. 600 each. If she makes a profit of 20% on one bag and incurs a loss of 25% on the other, find the resultant gain or loss in the transaction.",o:["Rs. 100 loss","Rs. 200 loss","Rs. 130 gain","Rs. 240 gain"],h:"A"},
      {q:"A person incurs a loss of 40% when he sells 32 oranges at Rs. 1,000. In order to make a profit of 20%, how many oranges should he sell at Rs. 1000?",o:["12","14","16","18"],h:"C"},
      {q:"A jobber buys an article at Rs. 24 less 12.5%. He then wishes to sell the article at a gain of 33 1/3% of his cost after allowing a 20% discount on his marked price. At what price, in rupees, should the article be marked?",o:["30.00","33.60","40.00","none of these"],h:"D"},
      {q:"Sohum purchased some mangoes at 5 for Rs. 2 and another lot of the same number of mangoes at 2 for Rs. 1. He sold all the mangoes at 10 for Rs. 3. What is his net profit% or loss%?",o:["14 2/7% loss","25% loss","14 2/7% profit","None of these"],h:"A"},
      {q:"Sohum purchased some mangoes at 5 for Rs. 2 and another lot of mangoes at 2 for Rs. 1. He sold all the mangoes at 3 for Rs. 2. What is his net profit% or loss% if he spent the same amount on both lots of mangoes?",o:["33 1/3% loss","25% profit","50% profit","50% loss"],h:"C"},
      {q:"An article when sold at a certain price results in 10% loss. Had the cost price been Rs. 80 less and had the selling price been Rs. 100 more, then there would have been a profit of 15%. Find the price at which the article was sold.",o:["Rs. 868","Rs. 768","Rs. 691.2","Cannot be determined"],h:"C"},
      {q:"A tie and a belt together costs Rs. 200 to a trader. When a trader sells two articles, each for the same amount, he makes a profit of 10% on the first article and a loss of 10% on the second article. If he wants an overall profit of 1% by selling each at the same price, by what amount should he increase the selling price of each article?",o:["Rs. 0.5","Rs. 1","Rs. 2","Rs. 0.25"],h:"C"},
      {q:"Cost price of 15 oranges is equal to selling price of 9 oranges and the discount on 8 oranges is same as the profit on 4 oranges. Find the percentage point difference between the profit % and the discount %.",o:["25","35","50","12"],h:"C"},
      {q:"A fruit vendor professes to sell fruits at the cost price, but uses false weights. He gains 30% in this manner. What weight does he substitute for one kilogram?",o:["645 1/3 gm","750 gm","769 3/13 gm","800 gm"],h:"C"},
      {q:"A merchant wants to make profit by selling food grains. Which of the following would maximize his profit? I. Sell product at 30% profit. II. Increase the price by 15% over the cost price and reduce weight by 15%. III. Use 700 gm of weight instead of 1 kg. IV. Mix 30% impurities in grains and sell it at cost price.",o:["III","II and I","II","All give the same profit"],h:"A"},
      {q:"A shopkeeper purchases rice from the wholesale market and then retails it by hiking the selling rate by 10% more than his rate of purchase. 10% of his goods are eaten away by rats at his godown. If he uses a 1 kg weight that actually measures only 909.09 gms, what is his overall profit percentage?",o:["10% loss","10% profit","11.11% profit","8.9% profit"],h:"D"},
      {q:"A salesman sells two kinds of trousers: cotton and woollen. A pair of cotton trousers is sold at 30% profit and a pair of woollen trousers is sold at 50% profit. He sells 100% more woollen trousers than cotton trousers, so his overall profit will be 45%. However he ends up selling 50% more cotton trousers than woollen trousers. What will be his overall profit?",o:["37.5%","40%","41%","42.33%","None of the above"],h:"B"},
      {q:"Ramsukh bhai sells rasgulla at Rs. 15 per kg. A rasgulla is made up of flour and sugar in the ratio 5:3. The ratio of price of sugar and flour is 7:3 per kg. Thus he earns 66 2/3% profit. What is the cost price of sugar?",o:["Rs. 10/kg","Rs. 9/kg","Rs. 18/kg","Rs. 14/kg"],h:"D"},
      {q:"Rohit bought 20 soaps and 12 toothpastes. He marked-up the soaps by 15% on cost price of each, and the toothpastes by Rs. 20 on the cost price of each. He sold 75% of the soaps and 8 toothpastes and made a profit of Rs. 385. If the cost of a toothpaste is 60% of the cost of a soap and he got no return on unsold items, what was his overall profit or loss?",o:["Loss of Rs. 355","Loss of Rs. 210","Loss of Rs. 250","None of the above"],h:"A"},
      {q:"Books and More sells books, music CDs and film DVDs. In December 2009, they earned 40% profit in music CDs and 25% profit in books. Music CDs contributed 35% towards their total sales in rupees. Total sales from books was 50% more than that of music CDs. If Books and More earned 20% profit overall, then in film DVDs they made:",o:["15.2% profit","10.0% profit","10.0% loss","16.3% loss","23.4% loss"],h:"E"},
      {q:"Using the same Books and More information, if Books and More made 50% loss in film DVDs, then overall they made:",o:["12.3% profit","8.7% profit","0.4% loss","6.25% loss","20% loss"],h:"B"},
      {q:"A space research company wants to sell its two products A and B. If product A is sold at 20% loss and product B at 30% gain, the company will not lose anything. If product A is sold at 15% loss and product B at 15% gain, the company will lose Rs. 6 million in the deal. What is the cost of product B?",o:["Rs. 140 million","Rs. 120 million","Rs. 100 million","Rs. 80 million"],h:"D"},
      {q:"Two articles are sold individually at profit of 33.33% and 25%. If the selling price of the second article is 16.66% less than the selling price of the first, by what percentage is the cost price of the first article more/less than the cost price of the second article?",o:["11.11% less","12.5% more","12.5% less","11.11% more"],h:"B"},
      {q:"The selling price of x number of oranges is equal to the cost price of y number of oranges. If this is a case of profit of 18.18%, find the ratio x:y.",o:["9:11","11:9","11:13","13:11"],h:"C"},
      {q:"On selling certain number of oranges, a fruit-seller made a profit equal to the selling price of 3 oranges. If the profit percentage was 25%, find the number of oranges sold.",o:["9","12","15","18"],h:"C"},
      {q:"A shopkeeper purchases certain number of oranges at the rate of Rs. 1 per orange. He sells exactly half at 3 oranges for Rs. 5 and the other half at Rs. 3 per lot of 5 oranges. What is his overall profit/loss percentage?",o:["No profit no loss","6.66% loss","6.25% profit","13.33% profit"],h:"D"},
      {q:"A trader marks-up his goods by 20% and offers a 10% discount. Another trader who purchases the goods from the same source as the first trader sells at a discount of 4%. What should be his minimum mark-up percentage so that he still makes a profit at least equal to, if not more than, the first trader?",o:["14%","12.5%","10%","8.33%"],h:"B"},
      {q:"Even though a cloth merchant sells at a mark-up of 12.5%, his profit is only 4.166...%. What is the actual length of cloth that his meter scale measures?",o:["104 cm","105 cm","108 cm","110 cm"],h:"C"},
      {q:"A trader allows two successive discounts of 20% and 15%. If he gets Rs. 136 for an item, then its marked cost is:",o:["100","200","300","400"],h:"B"},
      {q:"60% goods are sold at 5% loss while rest are sold at 10% profit. If there is a total profit of Rs. 100, then the worth of goods sold is:",o:["Rs. 5,000","Rs. 6,000","Rs. 10,000","None of these"],h:"C"},
      {q:"A buys a pen for Rs. 4 and sells it for Rs. 5. He calculates his profit first as a percentage of the buying price and then as the percentage of the selling price. The difference between these two is:",o:["20%","10%","5%","15%"],h:"C"},
      {q:"A trader purchases apples at Rs. 60 per hundred. He spends 15% on transportation. What should be the selling price per 100 to earn a profit of 20%?",o:["Rs. 72","Rs. 81.8","Rs. 83.8","Rs. 82.8"],h:"D"},
      {q:"By selling a casserole for Rs. 960, a man incurs a loss of 4%. At what price should he sell the casserole to gain 16%?",o:["Rs. 1,160","Rs. 1,080","Rs. 1,120","None of these"],h:"A"},
      {q:"Shyam is a dishonest tea dealer who sells loose tea leaves at 6 1/4% loss on the cost price in Daryagunj market but he uses 12 1/2% less weight. What is his percentage of profit or loss?",o:["Loss of 7 1/7%","Profit of 7 1/7%","Loss of 5 1/7%","Profit of 5 1/7%"],h:"B"},
      {q:"A shopkeeper placed on display some dresses each with a marked price. She then posted a sign '1/4 off on these dresses'. The cost of dresses was 2/3 of the price at which she actually sold them. Then the ratio of the cost to the marked price was:",o:["1:2","2:3","4:9","3:5"],h:"A"},
      {q:"If an article is sold for Rs. x, there is a loss of 15%. If the same article is sold for Rs. y, there is a profit of 15%. The ratio of (y - x) to (y + x) is:",o:["20:23","20:3","3:20","17:23"],h:"C"},
      {q:"The cost of labour in manufacturing a product is 16.66% of the total cost. Due to improvement in automation, the cost of labour decreased to 12.5% of the total cost, all other costs remaining the same. Find the percentage decrease in the cost of labour.",o:["25%","28.56%","33.33%","37.5%"],h:"B"},
      {q:"A trader sells three articles at the same price. On one of them he makes a 10% loss, on each of the other two he makes a 5% profit. Which of the following is true about the overall profit/loss he makes?",o:["Overall he makes a loss","Overall he makes a profit","Overall he breaks even","Depends on the selling price"],h:"A"},
      {q:"Even though the cost price of goods increases by Rs. 50, a trader manages to increase his selling price by only Rs. 40. This resulted in his profit percentage dropping from 20% to 12%. What was the percentage increase in the selling price?",o:["20%","16.66%","16.25%","15.55%"],h:"B"},
      {q:"Renuka bought n articles for Rs. d. She sold 2 of them at half price and rest at a profit of Rs. 8 each. The overall profit is Rs. 72. What is the minimum value of n?",o:["12","24","20","32"],h:"A"},
      {q:"A shopkeeper gives some discount to all the customers who purchase 5 or more articles. Vijay went to purchase 4 articles and noticed that if he purchases 4 or 5 articles, he had to pay the same amount. What is the discount offered?",o:["15%","20%","25%","33.33%"],h:"B"},
      {q:"A dishonest trader marks up his goods by 80% and gives a discount of 25%. Besides he gets 20% more quantity per kg from the wholesaler while purchasing and gives 10% less to his customers. Find the overall profit percentage he is making.",o:["80","60","40","30"],h:"A"},
      {q:"The price of an article reduces to Rs. 576 after two equal successive discounts are applied on a markup of 80%. If the cost price is Rs. 500, find the new profit percentage had the price been marked up by same percentages as the discounts were and no further discounts were given.",o:["259.2","59.2","159.2","29.2"],h:"C"},
      {type:"text",q:"Amal purchases some pens at Rs. 8 each. To sell these, he hires an employee at a fixed wage. He sells 100 of these pens at Rs. 12 each. If the remaining pens are sold at Rs. 11 each, then he makes a net profit of Rs. 300, while he makes a net loss of Rs. 300 if the remaining pens are sold at Rs. 9 each. The wage of the employee, in INR, is:",answerText:"1000",h:"N1000"},
      {q:"Mayank buys some candies for Rs. 15 a dozen and an equal number of different candies for Rs. 12 a dozen. He sells all for Rs. 16.50 a dozen and makes a profit of Rs. 150. How many dozens of candies did he buy altogether?",o:["50","30","25","45"],h:"A"},
      {q:"The manufacturer of a table sells it to a wholesale dealer at a profit of 10%. The wholesale dealer sells the table to a retailer at a profit of 30%. Finally, the retailer sells it to a customer at a profit of 50%. If the customer pays Rs. 4290 for the table, then its manufacturing cost is:",o:["1500","2000","2500","3000"],h:"B"},
      {q:"A shopkeeper sells two tables, each procured at cost price p, to Amal and Asim at a profit of 20% and at a loss of 20%, respectively. Amal sells his table to Bimal at a profit of 30%, while Asim sells his table to Barun at a loss of 30%. If the amounts paid by Bimal and Barun are x and y, respectively, then (x - y)/p equals:",o:["1.0","1.2","0.7","0.5"],h:"B"},
      {q:"Mukesh purchased 10 bicycles in 2017, all at the same price. He sold six of these at a profit of 25% and the remaining four at a loss of 25%. If he made a total profit of Rs. 2000, then his purchase price of a bicycle, in Rupees, was:",o:["2000","6000","8000","4000"],h:"D"},
      {q:"On selling a pen at 5% loss and a book at 15% gain, Karim gains Rs. 7. If he sells the pen at 5% gain and the book at 10% gain, he gains Rs. 13. What is the cost price of the book in Rupees?",o:["Rs. 80","Rs. 85","Rs. 100","Rs. 95"],h:"A"}
    ];
    questions.forEach(q => { if (q.question && !q.q) q.q = q.question; if (q.o && !q.options) q.options = q.o; if (q.answerText && (q.answer === undefined || q.answer === null)) q.answer = q.answerText; if (q.h && /^[A-H]$/.test(String(q.h)) && (q.answer === undefined || q.answer === null)) q.answer = q.h; if (!q.type && q.options && q.options.length) q.type = 'mcq'; });
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D","E","F","G","H"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function formatMathText(text){let out=esc(text);out=out.replace(/(\d+)(?:st|nd|rd|th)\s+power\s+of\s+([A-Za-z][A-Za-z0-9]*)/gi,'$2<sup>$1</sup>');out=out.replace(/([A-Za-z][A-Za-z0-9]*|\d+)\s+(?:raised\s+to\s+the\s+power|to\s+the\s+power)\s+(?:of\s+)?(-?\d+)/gi,'$1<sup>$2</sup>');out=out.replace(/square\s+root\s+of\s+([A-Za-z0-9]+(?:\s*[+\-*/]\s*[A-Za-z0-9]+)?)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/sqrt\s*\(([^()]+)\)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/√\s*([A-Za-z0-9]+)/g,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/([A-Za-z0-9\)])\^\s*\{?(-?\d+)\}?/g,'$1<sup>$2</sup>');out=out.replace(/(\d+)\s+(\d+)\/(\d+)/g,'$1 <span class="frac"><span>$2</span><span>$3</span></span>').replace(/(^|[^\w>])(\d+)\/(\d+)(?![\w<])/g,'$1<span class="frac"><span>$2</span><span>$3</span></span>');return out;}
    function formatFractionText(text){return formatMathText(text);}
    function formatMathHtml(html){const template=document.createElement('template');template.innerHTML=String(html ?? "");const walker=document.createTreeWalker(template.content,NodeFilter.SHOW_TEXT);const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(node=>{const span=document.createElement('span');span.innerHTML=formatMathText(node.nodeValue);node.replaceWith(...Array.from(span.childNodes));});return template.innerHTML;}
    function rich(s){return formatMathHtml(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? q.correctAnswer ?? q.correct ?? "";}
    function answerIndex(q){const a=q.answer ?? q.correctAnswer ?? q.correct; if(typeof a==='number')return a; const s=String(a ?? '').trim(); if(/^[A-D]$/i.test(s))return labels.indexOf(s.toUpperCase()); if(/^\d+$/.test(s)){const n=Number(s); return n>=0&&n<labels.length?n:-1;} return -1;}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){if(qType(q)==="mcq"){const idx=answerIndex(q); return idx>=0 ? "(" + labels[idx] + ") " + stripHtml((q.options || [])[idx] || "") : stripHtml(qAnswer(q));} return qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function sentenceSteps(text){return String(text ?? "").replace(/\s+/g,' ').trim().split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(Boolean);}
    function topicGuide(q){const title=(document.title||'').toLowerCase(), ans=rich(correctText(q));let topic='this topic', method='Start by converting the information in the question into equations or unit values. Keep the required answer in mind, then simplify step by step.', formula='Use the standard relationship stated in the question and substitute the given values carefully.';if(title.includes('average')){topic='Average';method='Use the average formula: total = average × number of observations. When an item is added, removed, replaced, or combined, compare the old total with the new total.';formula='Average = total of observations / number of observations.';}else if(title.includes('si')||title.includes('ci')||title.includes('simple')||title.includes('compound')){topic='Simple Interest and Compound Interest';method='Identify principal, rate, and time. For simple interest, interest is proportional to time. For compound interest, multiply by the growth factor for each compounding period.';formula='SI = P × R × T / 100 and CI amount = P(1 + R/100)^T, adjusted for the compounding interval.';}else if(title.includes('profit')||title.includes('loss')){topic='Profit and Loss';method='Mark the cost price, selling price, marked price, discount, and profit/loss relation separately. Convert each percentage into a multiplier before calculating.';formula='Profit% = profit / CP × 100, Loss% = loss / CP × 100, and SP = MP × (1 - discount%).';}else if(title.includes('ratio')||title.includes('proportion')||title.includes('partnership')){topic='Ratio, Proportion and Partnership';method='Convert every ratio into common units. If two ratios share a term, make that common term equal. For partnership, multiply capital by time before dividing profit.';formula='Required share = required ratio units / total ratio units × total quantity.';}return '<p><strong>Detailed solution:</strong></p><ol class="solution-steps"><li><strong>Identify the concept:</strong> This is a '+topic+' question.</li><li><strong>Use the formula/method:</strong> '+rich(formula)+'</li><li><strong>Apply to this question:</strong> '+rich(method)+'</li><li><strong>Check the answer:</strong> After substituting the given values and simplifying, the correct answer is '+ans+'.</li></ol><div class="final-answer">Final Answer: '+ans+'</div>';}
    function detailedSolutionHtml(q){const sol=q.solution; if(sol && String(sol).trim()){ if(hasHtml(sol)) return rich(sol); const steps=sentenceSteps(sol); const items=steps.map((step,i)=>'<li><strong>Step '+(i+1)+':</strong> '+rich(step)+'</li>').join(''); return '<p><strong>Detailed solution:</strong></p><ol class="solution-steps">'+items+'</ol><div class="final-answer">Final Answer: '+rich(correctText(q))+'</div>'; } return topicGuide(q);}
    function solutionHtml(q){return detailedSolutionHtml(q);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===answerIndex(q);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.innerHTML='Unattempted. Correct answer: '+rich(correctText(q));}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.innerHTML='Wrong. Correct answer: '+rich(correctText(q));} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
