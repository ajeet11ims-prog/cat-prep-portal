  <script>
    const questions = [{"no": 1, "itemId": 70601, "source": "Profit Loss Test -6 | Q1 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>On selling an article for Rs. 1470 a man gets profit of 22.5%. Find the cost price of the article.</p>", "options": ["<p>Rs. 1080</p>", "<p>Rs. 1200</p>", "<p>Rs. 1320</p>", "<p>Rs. 1470</p>"], "answer": 1, "typedAnswer": "Rs. 1200", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Profit = 22.5% = 22.5/100 = 9/40.</li><li>So selling price = CP × (1 + 9/40) = CP × 49/40.</li><li>1470 = CP × 49/40, so CP = 1470 × 40 / 49 = 1200.</li></ol>"}, {"no": 2, "itemId": 70602, "source": "Profit Loss Test -6 | Q2 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>On selling 25 articles a person incurred loss equal to cost price of 5 articles. Find profit/loss percent.</p>", "options": [], "answer": 0, "typedAnswer": "20% loss", "acceptedAnswers": ["20", "20%", "20 loss", "20% loss", "loss 20", "loss 20%"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP of one article = C.</li><li>Total CP of 25 articles = 25C.</li><li>Loss is equal to CP of 5 articles = 5C.</li><li>Loss percent = 5C/25C × 100 = 20%.</li><li>So the transaction has a 20% loss.</li></ol>"}, {"no": 3, "itemId": 70603, "source": "Profit Loss Test -6 | Q3 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>On selling an article for Rs. 155 a man bears a loss of 16⅔%. Find the cost price of the article.</p>", "options": ["<p>Rs. 172</p>", "<p>Rs. 180</p>", "<p>Rs. 186</p>", "<p>Rs. 192</p>"], "answer": 2, "typedAnswer": "Rs. 186", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Loss = 16⅔% = 1/6 of CP.</li><li>Therefore SP = 5/6 of CP.</li><li>155 = 5CP/6, so CP = 155 × 6 / 5 = 186.</li></ol>"}, {"no": 4, "itemId": 70604, "source": "Profit Loss Test -6 | Q4 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>On selling an article for Rs. 76, there is a profit of 52%. If it is sold for Rs. 75, find the profit percent.</p>", "options": ["<p>46%</p>", "<p>48%</p>", "<p>50%</p>", "<p>52%</p>"], "answer": 2, "typedAnswer": "50%", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>At SP = Rs. 76, profit = 52%, so SP = 152% of CP.</li><li>CP = 76 / 1.52 = 50.</li><li>If sold at Rs. 75, profit = 75 - 50 = 25.</li><li>Profit percent = 25/50 × 100 = 50%.</li></ol>"}, {"no": 5, "itemId": 70605, "source": "Profit Loss Test -6 | Q5 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>On selling 17 articles for Rs. 720, a person incurred loss equal to cost price of 5 articles. Find the cost price of each article.</p>", "options": [], "answer": 0, "typedAnswer": "60", "acceptedAnswers": ["60"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP of one article = C.</li><li>Total CP of 17 articles = 17C.</li><li>Loss is equal to CP of 5 articles = 5C.</li><li>Therefore total SP = 17C - 5C = 12C.</li><li>Given total SP = 720, so 12C = 720 and C = Rs. 60.</li></ol>"}, {"no": 6, "itemId": 70606, "source": "Profit Loss Test -6 | Q6 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>If books bought at prices from Rs. 150 to Rs. 300 are sold at prices ranging from Rs. 250 to Rs. 350, what is the greatest possible profit that can be made in selling 15 books?</p>", "options": ["<p>Rs. 2250</p>", "<p>Rs. 2500</p>", "<p>Rs. 3000</p>", "<p>Rs. 3500</p>"], "answer": 2, "typedAnswer": "Rs. 3000", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>For maximum profit, buy each book at the least possible cost, Rs. 150.</li><li>Sell each book at the maximum possible selling price, Rs. 350.</li><li>Maximum profit per book = 350 - 150 = 200.</li><li>For 15 books, maximum profit = 15 × 200 = Rs. 3000.</li></ol>"}, {"no": 7, "itemId": 70607, "source": "Profit Loss Test -6 | Q7 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Cost price of 19 articles is Rs. 625. By selling these articles, a person incurred loss equal to selling price of 6 articles. Find the selling price of each article.</p>", "options": [], "answer": 0, "typedAnswer": "25", "acceptedAnswers": ["25"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let selling price of each article = S.</li><li>Total SP of 19 articles = 19S.</li><li>Loss is equal to SP of 6 articles = 6S.</li><li>Given CP of 19 articles = 625, so 625 - 19S = 6S.</li><li>625 = 25S, hence S = Rs. 25.</li></ol>"}, {"no": 8, "itemId": 70608, "source": "Profit Loss Test -6 | Q8 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Loss incurred by selling an article for Rs. 600 is equal to profit gained by selling the same article for Rs. 1000. Find the cost price of this article.</p>", "options": ["<p>Rs. 700</p>", "<p>Rs. 750</p>", "<p>Rs. 800</p>", "<p>Rs. 850</p>"], "answer": 2, "typedAnswer": "Rs. 800", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP = x.</li><li>Loss at SP 600 = x - 600.</li><li>Profit at SP 1000 = 1000 - x.</li><li>Given x - 600 = 1000 - x.</li><li>2x = 1600, hence x = Rs. 800.</li></ol>"}, {"no": 9, "itemId": 70609, "source": "Profit Loss Test -6 | Q9 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Loss incurred by selling an article for Rs. 550 is equal to half of the profit gained by selling the same article for Rs. 850. Find the cost price of this article.</p>", "options": ["<p>Rs. 600</p>", "<p>Rs. 625</p>", "<p>Rs. 650</p>", "<p>Rs. 700</p>"], "answer": 2, "typedAnswer": "Rs. 650", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP = x.</li><li>Loss at Rs. 550 = x - 550.</li><li>Profit at Rs. 850 = 850 - x.</li><li>Given x - 550 = half of (850 - x), so x - 550 = (850 - x)/2.</li><li>2x - 1100 = 850 - x, so 3x = 1950 and x = Rs. 650.</li></ol>"}, {"no": 10, "itemId": 70610, "source": "Profit Loss Test -6 | Q10 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The cost price of 16 apples is equal to the selling price of 10 apples. The cost price of 12 oranges is equal to the selling price of 16 oranges and the cost price of 6 mangoes is equal to the selling price of 4 mangoes. If the ratio of the cost price of 1 apple, 1 orange and 1 mango is 1 : 1 : 2, then find the net profit percent on the sale of 1 apple, 2 oranges and 2 mangoes.</p>", "options": [], "answer": 0, "typedAnswer": "30% profit", "acceptedAnswers": ["30", "30%", "30 profit", "30% profit", "profit 30", "profit 30%"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP of one apple, one orange and one mango be 1, 1 and 2 units respectively.</li><li>For apples: CP of 16 apples = SP of 10 apples, so SP per apple = 16/10 × CP = 1.6 units.</li><li>For oranges: CP of 12 oranges = SP of 16 oranges, so SP per orange = 12/16 × CP = 0.75 units.</li><li>For mangoes: CP of 6 mangoes = SP of 4 mangoes, so SP per mango = 6/4 × CP = 1.5 × 2 = 3 units.</li><li>Total CP of 1 apple, 2 oranges and 2 mangoes = 1 + 2 + 4 = 7 units.</li><li>Total SP = 1.6 + 2(0.75) + 2(3) = 9.1 units.</li><li>Profit = 9.1 - 7 = 2.1 units, so profit percent = 2.1/7 × 100 = 30%.</li></ol>"}, {"no": 11, "itemId": 70611, "source": "Profit Loss Test -6 | Q11 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The profit earned when an article is sold for Rs. 800 is 20 times the loss incurred when it is sold for Rs. 275. At what price should the article be sold if it is desired to make a profit of 25%?</p>", "options": ["<p>Rs. 300</p>", "<p>Rs. 350</p>", "<p>Rs. 375</p>", "<p>Rs. 400</p>"], "answer": 2, "typedAnswer": "Rs. 375", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP = x.</li><li>Profit at Rs. 800 = 800 - x.</li><li>Loss at Rs. 275 = x - 275.</li><li>Given 800 - x = 20(x - 275).</li><li>800 - x = 20x - 5500, so 6300 = 21x and x = 300.</li><li>For 25% profit, required SP = 125% of 300 = Rs. 375.</li></ol>"}, {"no": 12, "itemId": 70612, "source": "Profit Loss Test -6 | Q12 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A person bought some articles at the rate of 11 for Rs. 10 and sold them at the rate of 10 for Rs. 11. Find the profit/loss percent.</p>", "options": [], "answer": 0, "typedAnswer": "21% profit", "acceptedAnswers": ["21", "21%", "21 profit", "21% profit", "profit 21", "profit 21%"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Buying rate: 11 articles for Rs. 10, so CP per article = 10/11.</li><li>Selling rate: 10 articles for Rs. 11, so SP per article = 11/10.</li><li>SP/CP = (11/10) ÷ (10/11) = 121/100.</li><li>Therefore profit percent = 21%.</li></ol>"}, {"no": 13, "itemId": 70613, "source": "Profit Loss Test -6 | Q13 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Loss incurred by selling an article for Rs. 800 is 23% more than profit gained by selling the same article for Rs. 1246. Find the cost price of this article.</p>", "options": ["<p>Rs. 1000</p>", "<p>Rs. 1025</p>", "<p>Rs. 1046</p>", "<p>Rs. 1060</p>"], "answer": 2, "typedAnswer": "Rs. 1046", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP = x.</li><li>Loss at Rs. 800 = x - 800.</li><li>Profit at Rs. 1246 = 1246 - x.</li><li>Loss is 23% more than profit, so x - 800 = 1.23(1246 - x).</li><li>x - 800 = 1532.58 - 1.23x.</li><li>2.23x = 2332.58, hence x = Rs. 1046.</li></ol>"}, {"no": 14, "itemId": 70614, "source": "Profit Loss Test -6 | Q14 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Ratio of loss incurred by selling an article for Rs. 820 and profit gained by selling the same article for Rs. 950 is 7 : 6. Find the cost price of this article.</p>", "options": ["<p>Rs. 860</p>", "<p>Rs. 875</p>", "<p>Rs. 890</p>", "<p>Rs. 900</p>"], "answer": 2, "typedAnswer": "Rs. 890", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP = x.</li><li>Loss at Rs. 820 = x - 820 and profit at Rs. 950 = 950 - x.</li><li>Given (x - 820) : (950 - x) = 7 : 6.</li><li>So (x - 820)/(950 - x) = 7/6.</li><li>6x - 4920 = 6650 - 7x, so 13x = 11570 and x = Rs. 890.</li></ol>"}, {"no": 15, "itemId": 70615, "source": "Profit Loss Test -6 | Q15 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A person bought some articles at the rate of 6 for Rs. 5 and sold them at the rate of 5 for Rs. 6. Find the profit or loss percent.</p>", "options": [], "answer": 0, "typedAnswer": "44% profit", "acceptedAnswers": ["44", "44%", "44 profit", "44% profit", "profit 44", "profit 44%"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Buying rate: 6 articles for Rs. 5, so CP per article = 5/6.</li><li>Selling rate: 5 articles for Rs. 6, so SP per article = 6/5.</li><li>SP/CP = (6/5) ÷ (5/6) = 36/25 = 1.44.</li><li>Therefore profit percent = 44%.</li></ol>"}, {"no": 16, "itemId": 70616, "source": "Profit Loss Test -6 | Q16 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>The ratio of cost price and selling price is 5 : 4. Find the loss percent.</p>", "options": ["<p>16% loss</p>", "<p>20% loss</p>", "<p>25% loss</p>", "<p>20% profit</p>"], "answer": 1, "typedAnswer": "20% loss", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>CP : SP = 5 : 4.</li><li>Loss = 5 - 4 = 1 part on CP of 5 parts.</li><li>Loss percent = 1/5 × 100 = 20%.</li></ol>"}, {"no": 17, "itemId": 70617, "source": "Profit Loss Test -6 | Q17 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A person bought some caps at the rate of 60 for Rs. 93 and sold them at the rate of 50 for Rs. 93. Find the profit or loss percent.</p>", "options": [], "answer": 0, "typedAnswer": "20% profit", "acceptedAnswers": ["20", "20%", "20 profit", "20% profit", "profit 20", "profit 20%"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Buying rate: 60 caps for Rs. 93, so CP per cap = 93/60.</li><li>Selling rate: 50 caps for Rs. 93, so SP per cap = 93/50.</li><li>SP/CP = (93/50) ÷ (93/60) = 60/50 = 1.2.</li><li>Therefore profit percent = 20%.</li></ol>"}, {"no": 18, "itemId": 70618, "source": "Profit Loss Test -6 | Q18 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>If selling price of an article is 8/5 times of its cost price, find the profit percent on it.</p>", "options": ["<p>40%</p>", "<p>50%</p>", "<p>60%</p>", "<p>80%</p>"], "answer": 2, "typedAnswer": "60%", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>SP = 8/5 × CP.</li><li>That means SP = 160% of CP.</li><li>Profit percent = 160% - 100% = 60%.</li></ol>"}, {"no": 19, "itemId": 70619, "source": "Profit Loss Test -6 | Q19 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Selling price of 25 articles is equal to cost price of 20 articles. Find profit/loss percent.</p>", "options": ["<p>20% profit</p>", "<p>25% profit</p>", "<p>20% loss</p>", "<p>25% loss</p>"], "answer": 2, "typedAnswer": "20% loss", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP of one article = C and SP of one article = S.</li><li>SP of 25 articles = CP of 20 articles gives 25S = 20C.</li><li>S = 20C/25 = 0.8C.</li><li>SP is 80% of CP, so loss = 20%.</li></ol>"}, {"no": 20, "itemId": 70620, "source": "Profit Loss Test -6 | Q20 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A person bought some caps at the rate of 27 for Rs. 102 and sold them at the rate of 8 for Rs. 34. Find the profit or loss percent.</p>", "options": [], "answer": 0, "typedAnswer": "12.5% profit", "acceptedAnswers": ["12.5", "12.5%", "12.5 profit", "12.5% profit", "profit 12.5", "profit 12.5%"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Buying rate: 27 caps for Rs. 102, so CP per cap = 102/27 = 34/9.</li><li>Selling rate: 8 caps for Rs. 34, so SP per cap = 34/8 = 17/4.</li><li>SP/CP = (17/4) ÷ (34/9) = 9/8 = 1.125.</li><li>Therefore profit percent = 12.5%.</li></ol>"}, {"no": 21, "itemId": 70621, "source": "Profit Loss Test -6 | Q21 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>Selling price of 33 articles is equal to cost price of 44 articles. Find profit/loss percent.</p>", "options": ["<p>25% profit</p>", "<p>33⅓% profit</p>", "<p>33⅓% loss</p>", "<p>44% profit</p>"], "answer": 1, "typedAnswer": "33⅓% profit", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let CP of one article = C and SP of one article = S.</li><li>SP of 33 articles = CP of 44 articles gives 33S = 44C.</li><li>S = 44C/33 = 4C/3.</li><li>Profit = 4C/3 - C = C/3.</li><li>Profit percent = (1/3) × 100 = 33⅓%.</li></ol>"}, {"no": 22, "itemId": 70622, "source": "Profit Loss Test -6 | Q22 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A person bought some articles at the rate of 36 for Rs. 189 and sold them at the rate of 45 for Rs. 189. Find the profit or loss percent.</p>", "options": [], "answer": 0, "typedAnswer": "20% loss", "acceptedAnswers": ["20", "20%", "20 loss", "20% loss", "loss 20", "loss 20%"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Buying rate: 36 articles for Rs. 189, so CP per article = 189/36.</li><li>Selling rate: 45 articles for Rs. 189, so SP per article = 189/45.</li><li>SP/CP = (189/45) ÷ (189/36) = 36/45 = 4/5.</li><li>SP is 80% of CP, so loss = 20%.</li></ol>"}, {"no": 23, "itemId": 70623, "source": "Profit Loss Test -6 | Q23 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>If the total cost of 73 articles having equal cost is Rs. 5110 and the total selling price of 89 such articles is Rs. 5607, then in the transaction there will be:</p>", "options": ["<p>10% profit</p>", "<p>10% loss</p>", "<p>12% loss</p>", "<p>15% loss</p>"], "answer": 1, "typedAnswer": "10% loss", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>CP per article = 5110/73 = Rs. 70.</li><li>SP per article = 5607/89 = Rs. 63.</li><li>Loss per article = 70 - 63 = Rs. 7.</li><li>Loss percent = 7/70 × 100 = 10%.</li></ol>"}, {"no": 24, "itemId": 70624, "source": "Profit Loss Test -6 | Q24 | MCQ", "type": "mcq", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>On selling 23 articles a person gains profit equal to selling price of 3 articles. Find profit percent.</p>", "options": ["<p>13%</p>", "<p>15%</p>", "<p>18%</p>", "<p>20%</p>"], "answer": 1, "typedAnswer": "15%", "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let SP per article = S and CP per article = C.</li><li>For 23 articles, total profit = 23(S - C).</li><li>Given this profit equals SP of 3 articles, so 23(S - C) = 3S.</li><li>23S - 23C = 3S, hence 20S = 23C.</li><li>S/C = 23/20 = 1.15, so profit percent = 15%.</li></ol>"}, {"no": 25, "itemId": 70625, "source": "Profit Loss Test -6 | Q25 | TITA", "type": "text", "direction": "<p>Answer the questions independently of each other.</p>", "passage": "", "question": "<p>A person bought some articles at the rate of 11 for Rs. 10 and bought the same number of articles at the rate of 9 for Rs. 10, and sold all the stock at the rate of 1 for Rs. 1. Find the profit or loss percent.</p>", "options": [], "answer": 0, "typedAnswer": "1% loss", "acceptedAnswers": ["1", "1%", "1 loss", "1% loss", "loss 1", "loss 1%"], "solution": "<p><strong>Detailed solution:</strong></p><ol class=\"solution-steps\"><li>Let the same number of articles bought in each lot be n.</li><li>First lot CP = n × 10/11.</li><li>Second lot CP = n × 10/9.</li><li>Total CP = n(10/11 + 10/9) = n(90/99 + 110/99) = 200n/99.</li><li>Total articles = 2n and selling rate is 1 for Rs. 1, so total SP = 2n.</li><li>Loss = 200n/99 - 2n = 2n/99.</li><li>Loss percent = (2n/99) ÷ (200n/99) × 100 = 1%.</li></ol>"}];
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 60 * 60, timerId = null;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}

    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;const possible=[q.typedAnswer].concat(q.acceptedAnswers||[]);return possible.some(v=>norm(ans)===norm(v));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;if(timerId){clearInterval(timerId);timerId=null;}document.body.classList.add('submitted-mode');let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();setTimeout(()=>{const sol=document.getElementById('solution');if(sol)sol.scrollIntoView({behavior:'smooth',block:'start'});},60);}
    function tick(){if(submitted)return;const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}

    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));

    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();timerId=setInterval(tick,1000);
  </script>
</body>
