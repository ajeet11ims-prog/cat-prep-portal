<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Average Test 5 75 Minute Test</title>
  <style>
    :root{--bg:#f4f7fa;--paper:#fff;--ink:#17202a;--muted:#5d6d7e;--line:#d7dde5;--brand:#4f79c7;--brand-dark:#2f5ca8;--brand-soft:#eef4ff;--ok:#157347;--bad:#b02a37}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:var(--bg);line-height:1.45;overflow:hidden}
    header{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(20,40,60,.08)}
    .topbar{width:100%;margin:0;padding:12px 16px;display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center}
    h1{margin:0;font-size:21px;color:var(--brand);letter-spacing:0}.meta{color:var(--muted);font-size:13px;margin-top:2px}
    .pill,.calc-open{border:1px solid var(--line);border-radius:6px;background:var(--brand-soft);color:var(--brand-dark);padding:8px 11px;font-weight:700;white-space:nowrap}.calc-open{border-color:var(--brand);background:var(--brand);color:#fff;cursor:pointer}
    main{width:100vw;height:calc(100vh - 65px);margin:0;padding:12px 14px;display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:14px;overflow:hidden}
    aside,.question,#result{background:var(--paper);border:1px solid var(--line);border-radius:8px}
    aside{grid-column:2;grid-row:1;align-self:stretch;padding:14px;min-height:0;overflow-y:auto}
    main>section{grid-column:1;grid-row:1;min-width:0;overflow:auto}.panel-title{margin:0 0 12px;color:var(--brand);font-size:17px}
    .palette{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.dot{min-height:46px;border:1px solid var(--line);border-radius:6px;background:#fbfcfd;color:var(--ink);font-weight:700;cursor:pointer;font-size:15px}.dot.active{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark)}.dot.answered{background:#eef8f2;border-color:rgba(21,115,71,.4);color:var(--ok)}
    #result,.question{padding:12px;margin-bottom:0}#result{display:none}#result h2{margin:0 0 10px;color:var(--brand);font-size:18px}
    .score-grid{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:9px;margin-top:12px}.score-box{border:1px solid var(--line);border-radius:6px;padding:9px;background:#fbfcfd}.score-box strong{display:block;font-size:22px;margin-top:2px}
    .question{display:none}.question.active{display:block;height:calc(100vh - 205px);min-height:0}
    .question-body{border:1px solid var(--line);border-radius:8px;background:#fff;padding:24px;min-height:0;height:100%;overflow:auto}.question-body h2{margin:0 0 20px;font-size:22px;line-height:1.45}
    .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:6px;padding:12px;cursor:pointer;background:#fbfcfd;min-height:50px;font-size:17px}label.option:hover{border-color:#9ab7ca}input[type=radio]{width:18px;height:18px;margin-top:4px;flex:0 0 auto;accent-color:var(--brand)}
    .text-answer{width:min(100%,360px);min-height:44px;border:1px solid var(--line);border-radius:6px;padding:10px 12px;font-size:16px;background:#fbfcfd}
    .question-nav,.actions{display:flex;justify-content:space-between;gap:10px;margin:10px 0 0;flex-wrap:wrap}button{border:0;border-radius:6px;background:var(--brand);color:white;padding:11px 18px;font-size:15px;font-weight:700;cursor:pointer}button.secondary{background:#e8edf4;color:var(--ink)}button:disabled{opacity:.55;cursor:default}
    .answer-note{margin-top:12px;font-weight:700}.answer-note.ok{color:var(--ok)}.answer-note.bad{color:var(--bad)}.answer-note.muted{color:var(--muted)}.correct{border-color:rgba(21,115,71,.45);background:#eef8f2}.wrong{border-color:rgba(176,42,55,.45);background:#fff1f2}.missed{border-color:rgba(93,109,126,.45);background:#f6f7f9}
    .calculator-dialog{width:min(340px,calc(100vw - 28px));max-width:340px;margin:0;inset:84px auto auto 50%;transform:translateX(-50%);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:0 12px 34px rgba(15,23,42,.2)}.calculator-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;cursor:move;user-select:none}.calculator-head h2{margin:0;color:var(--brand-dark);font-size:18px}.calc-close{border:1px solid var(--line);border-radius:6px;background:#eef2f6;color:var(--ink);width:34px;height:34px;padding:0;font-size:20px;line-height:1;cursor:pointer}.calc-display{width:100%;border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px;background:#fbfcfd;color:var(--ink);font-size:22px;font-weight:700;text-align:right}.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.calc-key{min-height:42px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:var(--ink);font-size:17px;font-weight:700;cursor:pointer}.calc-key.operator{background:var(--brand-soft);color:var(--brand-dark)}.calc-key.equal{background:var(--brand);color:#fff;grid-column:span 2}.calc-key.clear{color:var(--bad)}
    @media(max-width:900px){body{overflow:auto}main{height:auto;grid-template-columns:1fr;overflow:visible}aside{grid-column:1;grid-row:2}.question.active{display:block;height:auto}.question-body{height:auto;margin-bottom:14px}.options,.score-grid{grid-template-columns:1fr}.pill,.calc-open,.question-nav button,.actions button{width:100%}}
  </style>
</head>
<body>
  <header><div class="topbar"><div><h1>Average Test 5</h1><div class="meta">30 Questions | 75 Minutes</div></div><div class="pill">Time Left: <span id="time">75:00</span></div><div class="pill">Answered: <span id="answeredCount">0</span>/30</div><button class="calc-open" type="button" id="openCalculator">Calculator</button></div></header>
  <main><section><section id="result"></section><form id="testForm"></form></section><aside><h2 class="panel-title">Question Palette</h2><div class="palette" id="palette"></div></aside></main>

  <dialog class="calculator-dialog" id="calculatorDialog"><div class="calculator-head"><h2>Calculator</h2><button class="calc-close" type="button" id="closeCalculator" aria-label="Close calculator">x</button></div><input class="calc-display" id="calcDisplay" type="text" value="0" inputmode="decimal" aria-label="Calculator display"><div class="calc-grid" id="calcKeys"><button class="calc-key clear" type="button" data-action="clear">C</button><button class="calc-key" type="button" data-action="backspace">DEL</button><button class="calc-key operator" type="button" data-value="%">%</button><button class="calc-key operator" type="button" data-value="/">/</button><button class="calc-key" type="button" data-value="7">7</button><button class="calc-key" type="button" data-value="8">8</button><button class="calc-key" type="button" data-value="9">9</button><button class="calc-key operator" type="button" data-value="*">x</button><button class="calc-key" type="button" data-value="4">4</button><button class="calc-key" type="button" data-value="5">5</button><button class="calc-key" type="button" data-value="6">6</button><button class="calc-key operator" type="button" data-value="-">-</button><button class="calc-key" type="button" data-value="1">1</button><button class="calc-key" type="button" data-value="2">2</button><button class="calc-key" type="button" data-value="3">3</button><button class="calc-key operator" type="button" data-value="+">+</button><button class="calc-key" type="button" data-value="0">0</button><button class="calc-key" type="button" data-value=".">.</button><button class="calc-key equal" type="button" data-action="equals">=</button></div></dialog>

  <script>
    const optionLabels=["A","B","C","D"];
    const questions=[
      {q:"The average of n numbers is 40. If each of (4/5)th of the numbers is increased by 5 and each of the remaining (1/5)th of them is decreased by 10, then the new average will be:",options:["41","41.5","42","42.5"],answer:"C"},
      {q:"The average weight of 15 students increased by 1.8 kg when one of the students whose weight was 64 kg was replaced by a new man. Find the weight of the new man (in kg).",options:["79","84","90","91"],answer:"D"},
      {q:"If the average of 43 consecutive natural numbers is K, then what is the average of the next 999 consecutive natural numbers?",options:["K + 498","K + 520","K + 521","K + 518"],answer:"C"},
      {q:"A running track is in the form of a regular pentagon. A runner covers each side of this pentagonal park track with different speeds of 12 km/h, 15 km/h, 18 km/h, 20 km/h and 30 km/h. Find the range of average speed K of the runner during the entire journey (in km/h).",options:["14 < K < 15","15 < K < 16","16 < K < 17","17 < K < 18"],answer:"D"},
      {q:"Three years ago, the average age of a family of 5 members was 17 years. A baby being born; the average of the family is the same today. What is the age of the baby?",options:["1 year","2 years","6 months","9 months"],answer:"B"},
      {q:"The average age of a man and his son is 30 years. Four years ago, the ratio of their ages was 10:3. What is the difference (in years) between the present ages of the man and his son?",type:"text",answer:"28"},
      {q:"If the average of 9 consecutive even natural numbers, the greatest of which is n, is m. Find the average of 17 consecutive natural numbers, the least of which is m.",options:["n - 2","n","n - 1","n + 4"],answer:"B"},
      {q:"The average marks of a class of 50 students is 40. Two of them scored 0 and for the rest, the first 32 scored an average of 40, the next fourteen scored an average of 20. If the remaining two scored equal marks, what are their individual marks?",options:["220","225","440","222"],answer:"A"},
      {q:"The average weight of a family of 9 people is 4 less than the median weight. If the median weight person is removed, the average weight of the remaining persons will reduce by k. Find the value of k.",options:["0.5","1","3","7"],answer:"A"},
      {q:"The average age of A, B and C is 31 years. However, when D joins them, their average age comes down to 28 years. Now a new person E whose age is 51 years more than D, replaces A and the new average of B, C, D and E is 36 years. Find the age of A (in years).",type:"text",answer:"38"},
      {q:"A was born two years ago when B was two years old. At present, the average age (in years) of A, B, C and D is a perfect square. Also, the difference between the ages of any two persons is not more than five years. Which of the following could be the ages of C and D (in years) if all were born in different years?",options:["8,2","10,9","7,3","6,3"],answer:"C"},
      {q:"65 students appeared for an exam. Their average score in that exam is 180 out of 200. If the top three ranker's scores are removed, the average drops by 0.5. The second highest score is less than 190 and all the scores are integers. Find the least possible score that the topper could have obtained?",options:["170","193","185","198"],answer:"B"},
      {q:"The sum of five positive numbers is M. The average of the averages of all possible distinct triplets of these 5 numbers is N. Which of the following is true?",options:["M = 5N","M = 4N","M = 3N","M = 2N"],answer:"A"},
      {q:"Shyam analyzed the monthly salary figures of five managers of his company. All the salary figures are in integer lakhs. The mean and the median salary figures are Rs. 8.6 lakhs and Rs. 9 lakhs respectively and the only mode is Rs. 11 lakhs. Which of the following could be the difference (in lakhs) between the second lowest and the lowest salary?",options:["8","6","4","0"],answer:"C"},
      {q:"An NGO has raised 90% of the donation that it needs for school construction by receiving an average donation of Rs. 540 per person from a group of employees of a company. To raise the remaining amount, the NGO now plans to approach another group of employees of another company which has 40% of the number of employees as compared to the first company. Find the average donation per person (in rupees) from each employee of another company.",type:"text",answer:"150"},
      {q:"Chauhan, Sharma and Kumar scored 45%, 70% and 50% of maximum marks respectively in subject A and 55%, 85% and 70% of maximum marks respectively in subject B. Had Chauhan scored 40 more marks in subject A, his score in subject A would have been equal to his score in subject B. If Kumar scored 60 marks less in subject A as compared to his marks in subject B, then what is the sum of maximum marks of both the subjects?",options:["100","200","300","400"],answer:"C"},
      {q:"The management of Oxford Public School proposed to construct an auditorium for which it contributed 15% of the estimated cost. For the remaining amount, the management approached 60% of the parents and all of them contributed Rs. 1200 on an average. The amount thus collected, together with the management's share formed only 75% of the estimated cost. To cover the deficit, they approached the remaining parents. What is the average amount that should be contributed by each of them to meet the estimated cost?",options:["Rs 600","Rs 500","Rs 750","Rs 400"],answer:"C"},
      {q:"A batsman had an average of 36 runs in the first 8 matches. In the second to the ninth match his average score was 40. If he scored a total of 46 runs in the first and the ninth matches, then find his score in the 9th match.",options:["33","35","37","39"],answer:"D"},
      {q:"In a school, the average weight of all the boys is 68 kg and that of all the girls is 52 kg. For the school's annual day, each male teacher is asked to coordinate the activities of exactly 13 boys and each female teacher is asked to coordinate the activities of exactly 12 girls. If the ratio of male to female teachers is 4 : 1, find the average weight of the students of the school (in kg).",options:["50","55","65","70"],answer:"C"},
      {q:"Four years ago, the average age of Reena, Sheena and Cheena was 22. The average age of Reena and Cheena today is 25. Also, the present age of Reena is 75% of the present age of Sheena. What is the present age of Cheena?",options:["29 years","30 years","32 years","36 years"],answer:"A"},
      {q:"Rohan married 12 years ago at the age of 29 years. His wife was 25 years old then. 8 years after their marriage, the average age of Rohan, his wife and their son are 26 years. After how many years of Rohan's marriage was his son born?",options:["2","3","4","5"],answer:"B"},
      {q:"A class consists of 60 boys and 80 girls. In the mid-semester examination, the average score of the girls was 7 higher than that of the boys. In the final exam, however, the average score of the girls dropped by 4 while the average score of the entire class increased by 2. The increase in the average score of the boys in the final exam is?",options:["12","10","8","6"],answer:"B"},
      {q:"Abhi and Bunny travel from P to Q via R. Abhi travels from P to R in 4 hours and from R to Q in 5 hours. Bunny travels from P to R, then R to P and then P to R in 7 hours and from R to Q in 5 hours. If the average speed of Abhi and Bunny for the whole journey is the same, find the ratio of the distance between P to R to the distance between R to Q.",options:["1 : 2","2 : 3","1 : 3","1 : 5"],answer:"D"},
      {q:"Gulzar Saab, Mani-Ratnam, Shekhar Kapoor and Vishal Bhardwaj collaborated for a project to write the screenplay of the untitled film by Shubham. All the writers decide that they should share the wages in the proportion of the work they contribute. If Mani Ratnam does 3 units of work per day, then Gulzar Saab does 5 units of work per day. If Shekhar does 1 unit of work per day, then Mani Ratnam does 2 units of work per day and if Vishal does 4 units of work per day, then Shekhar does 3 units of work per day. If they worked together for 10 days and got a total of Rs. 2.07 crores, then find the average daily income (in Rs.) of Gulzar Saab.",type:"text",answer:"900000"},
      {q:"In the year 2020, Vishal got 20% more incentive in the 3rd month than what he got in the 2nd month. His incentive in the 4th month was 7 61/77% more than what he got in the 3rd month. If he got Rs. 4500 as an incentive in the first month and the difference in incentives received in the 4th month and 2nd month is Rs. 1130, then the average incentive received by Vishal in the first four months is:",options:["Rs 4,472.5","Rs 4,478.5","Rs 4,487.5","Rs 4,497.5"],answer:"C"},
      {q:"Ram went from Delhi to Shimla via Chandigarh by car. The distance from Delhi to Chandigarh is 4/3 times the distance from Chandigarh to Shimla. The average speed from Delhi to Chandigarh was 1.5 times that from Chandigarh to Shimla. If the average speed for the entire journey was 63 km/hr, find the average speed from Chandigarh to Shimla (in km/hr).",options:["40","36","34","51"],answer:"D"},
      {q:"The average number of runs scored by 6 batsmen including Rohit and Virat in a T-20 cricket match is 30. The average runs by 5 batsmen excluding Rohit is 24 and the average number of runs scored by 5 batsmen excluding Virat is 28. The runs scored by Rohit is what percent higher than the runs scored by Virat?",options:["20 %","25 %","33.33 %","50%"],answer:"D"},
      {q:"Samuel's present age is 4 times his daughter's present age and 16 times his granddaughter's present age. Samuel's father is 20 years older than him and the average present age of all the members in the family of 4 members is 51.25 years. Find the sum of the ages of all the family members 5 years from now.",options:["225 years","200 years","175 years","150 years"],answer:"A"},
      {q:"Set S contains 7 integers that have an average value of 65. The mean of all numbers in set S is equal to the median of the numbers. If the smallest number of set S is 20 less than half the largest number, then the minimum value that the smallest number in set S can be:",options:["8","12","20","15"],answer:"C"},
      {q:"There are N students in the class. Their class teacher gave them a task of finding the average of first N natural numbers and each of them let out a different number and found the average of the remaining numbers. The average of the averages obtained by all the students was 27. Find N.",options:["25","53","60","78"],answer:"B"}
    ];
    const form=document.getElementById("testForm"),resultBox=document.getElementById("result"),palette=document.getElementById("palette"),answeredCount=document.getElementById("answeredCount"),time=document.getElementById("time"),calculatorDialog=document.getElementById("calculatorDialog"),calcDisplay=document.getElementById("calcDisplay");
    let submitted=false,secondsLeft=75*60,currentQuestionIndex=0;
    function correctAnswerText(item){if(item.type==="text")return item.answer;const i=optionLabels.indexOf(item.answer);return `(${item.answer}) ${item.options[i]}`}
    function renderQuestions(){form.innerHTML=questions.map((item,index)=>{const control=item.type==="text"?`<input class="text-answer" type="text" name="q${index}" placeholder="Write your answer here">`:`<div class="options">${item.options.map((option,i)=>`<label class="option"><input type="radio" name="q${index}" value="${optionLabels[i]}"><span>(${optionLabels[i]}) ${option}</span></label>`).join("")}</div>`;return `<div class="question" id="qcard-${index}"><div class="question-body"><h2>Q${index+1}. ${item.q}</h2>${control}<div class="answer-note" id="note-${index}"></div></div></div>`}).join("")+`<div class="question-nav"><button class="secondary" type="button" id="prevQuestion">Previous</button><button class="secondary" type="button" id="nextQuestion">Save & Next</button></div><div class="actions"><button type="submit" id="submitBtn">Submit Test</button><button class="secondary" type="button" id="clearAnswers">Clear Responses</button></div>`;
      palette.innerHTML=questions.map((_,i)=>`<button class="dot" type="button" data-target="${i}">${i+1}</button>`).join("");palette.querySelectorAll(".dot").forEach(b=>b.addEventListener("click",()=>showQuestion(Number(b.dataset.target))));form.querySelectorAll("input").forEach(input=>{input.addEventListener("change",updateAnsweredState);input.addEventListener("input",updateAnsweredState)});document.getElementById("prevQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex-1));document.getElementById("nextQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex+1));document.getElementById("clearAnswers").addEventListener("click",()=>{if(submitted)return;form.reset();updateAnsweredState();showQuestion(currentQuestionIndex)});showQuestion(0)}
    function showQuestion(index){if(index<0||index>=questions.length)return;currentQuestionIndex=index;document.querySelectorAll(".question").forEach((card,i)=>card.classList.toggle("active",i===index));palette.querySelectorAll(".dot").forEach((dot,i)=>dot.classList.toggle("active",i===index));const prev=document.getElementById("prevQuestion"),next=document.getElementById("nextQuestion");if(prev)prev.disabled=index===0||submitted;if(next)next.disabled=index===questions.length-1||submitted}
    function getAnswer(index){const item=questions[index];if(item.type==="text")return document.querySelector(`[name="q${index}"]`).value.trim();const selected=document.querySelector(`input[name="q${index}"]:checked`);return selected?selected.value:""}
    function updateAnsweredState(){let answered=0;questions.forEach((_,i)=>{const has=Boolean(getAnswer(i));if(has)answered++;const dot=palette.querySelector(`[data-target="${i}"]`);if(dot)dot.classList.toggle("answered",has)});answeredCount.textContent=answered}
    function updateTimer(){const m=String(Math.floor(secondsLeft/60)).padStart(2,"0"),s=String(secondsLeft%60).padStart(2,"0");time.textContent=`${m}:${s}`;if(secondsLeft<=0){submitTest();return}secondsLeft--}
    function normalize(value){return value.replaceAll(",","").replace(/rs\.?/gi,"").replace(/%$/,"").replace(/\s+/g," ").trim().toLowerCase()}
    function submitTest(event){if(event)event.preventDefault();if(submitted)return;submitted=true;let correct=0,wrong=0,unattempted=0;questions.forEach((item,index)=>{const answer=getAnswer(index),card=document.getElementById(`qcard-${index}`),note=document.getElementById(`note-${index}`),correctText=`Correct answer: ${correctAnswerText(item)}`,isCorrect=item.type==="text"?normalize(answer)===normalize(item.answer):answer===item.answer;document.querySelectorAll(`[name="q${index}"]`).forEach(input=>input.disabled=true);if(!answer){unattempted++;card.classList.add("missed");note.className="answer-note muted";note.textContent=`Unattempted. ${correctText}`}else if(isCorrect){correct++;card.classList.add("correct");note.className="answer-note ok";note.textContent=`Correct. ${correctText}`}else{wrong++;card.classList.add("wrong");note.className="answer-note bad";note.textContent=`Incorrect. ${correctText}`}});resultBox.style.display="block";resultBox.innerHTML=`<h2>Test Summary</h2><div class="score-grid"><div class="score-box">Score<strong>${correct} / ${questions.length}</strong></div><div class="score-box">Correct<strong>${correct}</strong></div><div class="score-box">Wrong<strong>${wrong}</strong></div><div class="score-box">Unattempted<strong>${unattempted}</strong></div></div>`;document.querySelectorAll(".question").forEach(card=>card.classList.add("active"));document.getElementById("prevQuestion").disabled=true;document.getElementById("nextQuestion").disabled=true;document.getElementById("submitBtn").disabled=true;document.getElementById("clearAnswers").disabled=true}
    function appendCalcValue(v){if(calcDisplay.value==="0"||calcDisplay.value==="Error"){calcDisplay.value=v==="."?"0.":v;return}calcDisplay.value+=v}function calculateExpression(){const expression=calcDisplay.value.trim();if(!/^[0-9+\-*/%. ()]+$/.test(expression)){calcDisplay.value="Error";return}try{const value=Function(`"use strict"; return (${expression})`)();calcDisplay.value=Number.isFinite(value)?String(Number(value.toFixed(10))):"Error"}catch{calcDisplay.value="Error"}}
    document.getElementById("openCalculator").addEventListener("click",()=>{calculatorDialog.showModal();if(!calculatorDialog.dataset.moved){calculatorDialog.style.left=`${Math.max(14,(window.innerWidth-calculatorDialog.offsetWidth)/2)}px`;calculatorDialog.style.top="84px";calculatorDialog.style.transform="none"}calcDisplay.focus()});document.getElementById("closeCalculator").addEventListener("click",()=>calculatorDialog.close());document.getElementById("calcKeys").addEventListener("click",event=>{const key=event.target.closest("button");if(!key)return;if(key.dataset.action==="clear")calcDisplay.value="0";else if(key.dataset.action==="backspace")calcDisplay.value=calcDisplay.value.length>1?calcDisplay.value.slice(0,-1):"0";else if(key.dataset.action==="equals")calculateExpression();else if(key.dataset.value)appendCalcValue(key.dataset.value);calcDisplay.focus()});calcDisplay.addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();calculateExpression()}});
    const calculatorHead=calculatorDialog.querySelector(".calculator-head");let calculatorDrag=null;calculatorHead.addEventListener("pointerdown",event=>{if(event.target.closest("button"))return;const rect=calculatorDialog.getBoundingClientRect();calculatorDrag={offsetX:event.clientX-rect.left,offsetY:event.clientY-rect.top};calculatorDialog.style.transform="none";calculatorHead.setPointerCapture(event.pointerId)});calculatorHead.addEventListener("pointermove",event=>{if(!calculatorDrag)return;const maxLeft=window.innerWidth-calculatorDialog.offsetWidth-8,maxTop=window.innerHeight-calculatorDialog.offsetHeight-8;calculatorDialog.style.left=`${Math.min(Math.max(8,event.clientX-calculatorDrag.offsetX),Math.max(8,maxLeft))}px`;calculatorDialog.style.top=`${Math.min(Math.max(8,event.clientY-calculatorDrag.offsetY),Math.max(8,maxTop))}px`;calculatorDialog.dataset.moved="true"});calculatorHead.addEventListener("pointerup",event=>{calculatorDrag=null;calculatorHead.releasePointerCapture(event.pointerId)});calculatorHead.addEventListener("pointercancel",()=>{calculatorDrag=null});
    renderQuestions();updateAnsweredState();updateTimer();const timerId=setInterval(()=>{if(submitted){clearInterval(timerId);return}updateTimer()},1000);form.addEventListener("submit",submitTest);
  </script>
</body>
</html>
