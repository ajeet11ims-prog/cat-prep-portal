mal;overflow:visible}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.solution .block{max-height:min(320px,calc(100vh - 360px));overflow:auto;margin-top:10px;border:1px solid #cbd5dd;border-radius:4px;background:#fff;line-height:1.55;overscroll-behavior:contain}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}

    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.solution .block{max-height:240px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

<body>
  <header><div class="topbar"><div class="title"><h1>Average Test 5</h1><div class="meta">Quantitative Aptitude | 30 Questions | 60 Minutes | +3 correct, -1 wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>

  <script>
    const questions = [
      {q:"The average of n numbers is 40. If each of (4/5)th of the numbers is increased by 5 and each of the remaining (1/5)th of them is decreased by 10, then the new average will be:",options:["41","41.5","42","42.5"],answer:"C"},
      {q:"The average weight of 15 students increased by 1.8 kg when one of the students whose weight was 64 kg was replaced by a new man. Find the weight of the new man (in kg).",options:["79","84","90","91"],answer:"D"},
      {q:"If the average of 43 consecutive natural numbers is K, then what is the average of the next 999 consecutive natural numbers?",options:["K + 498","K + 520","K + 521","K + 518"],answer:"C"},
      {q:"A running track is in the form of a regular pentagon. A runner covers each side of this pentagonal park track with different speeds of 12 km/h, 15 km/h, 18 km/h, 20 km/h and 30 km/h. Find the range of average speed K of the runner during the entire journey (in km/h).",options:["14 < K < 15","15 < K < 16","16 < K < 17","17 < K < 18"],answer:"D"},
      {q:"Three years ago, the average age of a family of 5 members was 17 years. A baby being born; the average of the family is the same today. What is the age of the baby?",options:["1 year","2 years","6 months","9 months"],answer:"B"},
      {q:"The average age of a man and his son is 30 years. Four years ago, the ratio of their ages was 10:3. What is the difference (in years) between the present ages of the man and his son?",type:"text",answer:"28"},
      {q:"If the average of 9 consecutive even natural numbers, the greatest of which is n, is m. Find the average of 17 consecutive natural numbers, the least of which is m.",options:["n - 2","n","n - 1","n + 4"],answer:"B"},
      {q:"The average marks of a class of 50 students is 40. Two of them scored 0 and for the rest, the first 32 scored an average of 40, the next fourteen scored an average of 20. If the remaining two scored equal marks, what are their individual marks?",options:["220","225","440","222"],answer:"A"},
      {q:"The average weight of a family of 9 people is 4 less than the median weight. If the median weight person is removed, the average weight of the remaining persons will reduce by k. Find the value of k.",options:["0.5","1","3","7"],answer:"A"},
      {q:"The average age of A, B and C is 31 years. However, when D joins them, their average age comes down to 28 years. Now a new person E whose age is 51 years more than D, replaces A and the new average of B, C, D and E is 36 years. Find the age of A (in years).",type:"text",answer:"38"},
      {q:"A was born two years ago when B was two years old. At present, the average age (in years) of A, B, C and D is a perfect square. Also, the difference between the ages of any two persons is not more than five years. Which of the following could be the ages of C and D (in years) if all were born in different years?",options:["8,2","10,9","7,3","6,3"],answer:"C"},
      {q:"65 students appeared for an exam. Their average score in that exam is 180 out of 200. If the top three ranker's scores are removed, the average drops by 0.5. The second highest score is less than 190 and all the scores are integers. Find the least possible score that the topper could have obtained?",options:["170","193","185","198"],answer:"B"},
      {q:"The sum of five positive numbers is M. The average of the averages of all possible distinct triplets of these 5 numbers is N. Which of the following is true?",options:["M = 5N","M = 4N","M = 3N","M = 2N"],answer:"A"},
      {q:"Shyam analyzed the monthly salary figures of five managers of his company. All the salary figures are in integer lakhs. The mean and the median salary figures are Rs. 8.6 lakhs and Rs. 9 lakhs respectively and the only mode is Rs. 11 lakhs. Which of the following could be the difference (in lakhs) between the second lowest and the lowest salary?",options:["8","6","4","0"],answer:"C"},
      {q:"An NGO has raised 90% of the donation that it needs for school construction by receiving an average donation of Rs. 540 per person from a group of employees of a company. To raise the remaining amount, the NGO now plans to approach another group of employees of another company which has 40% of the number of employees as compared to the first company. Find the average donation per person (in rupees) from each employee of another company.",type:"text",answer:"150"},
      {q:"Chauhan, Sharma and Kumar scored 45%, 70% and 50% of maximum marks respectively in subject A and 55%, 85% and 70% of maximum marks respectively in subject B. Had Chauhan scored 40 more marks in subject A, his score in subject A would have been equal to his score in subject B. If Kumar scored 60 marks less in subject A as compared to his marks in subject B, then what is the sum of maximum marks of both the subjects?",options:["100","200","300","400"],answer:"C"},
      {q:"The management of Oxford Public School proposed to construct an auditorium for which it contributed 15% of the estimated cost. For the remaining amount, the management approached 60% of the parents and all of them contributed Rs. 1200 on an average. The amount thus collected, together with the management's share formed only 75% of the estimated cost. To cover the deficit, they approached the remaining parents. What is the average amount that should be contributed by each of them to meet the estimated cost?",options:["Rs 600","Rs 500","Rs 750","Rs 400"],answer:"C"},
      {q:"A batsman had an average of 36 runs in the first 8 matches. In the second to the ninth match his average score was 40. If he scored a total of 46 runs in the first and the ninth matches, then find his score in the 9th match.",options:["33","35","37","39"],answer:"D"},
      {q:"In a school, the average weight of all the boys is 68 kg and that of all the girls is 52 kg. For the school's annual day, each male teacher is asked to coordinate the activities of exactly 13 boys and each female teacher is asked to coordinate the activities of exactly 12 girls. If the ratio of male to female teachers is 4 : 1, find the average weight of the students of the school (in kg).",options:["50","55","65","70"],answer:"C"},
      {q:"Four years ago, the average age of Reena, Sheena and Cheena was 22. The average age of Reena and Cheena today is 25. Also, the present age of Reena is 75% of the present age of Sheena. What is the present age of Cheena?",options:["29 years","30 years","32 years","36 years"],answer:"A"},
      {q:"Rohan married 12 years ago at the age of 29 years. His wife was 25 years old then. 8 years after their marriage, the average age of Rohan, his wife and their son are 26 years. After how many years of Rohan's marriage was his son born?",options:["2","3","4","5"],answer:"B"},
      {q:"A class consists of 60 boys and 80 girls. In the mid-semester examination, the average score of the girls was 7 higher than that of the boys. In the final exam, however, the average score of the girls dropped by 4 while the average score of the entire class increased by 2. The increase in the average score of the boys in the final exam is?",options:["12","10","8","6"],answer:"B"},
      {q:"Abhi and Bunny travel from P to Q via R. Abhi travels from P to R in 4 hours and from R to Q in 5 hours. Bunny travels from P to R, then R to P and then P to R in 7 hours and from R to Q in 5 hours. If the average speed of Abhi and Bunny for the whole journey is the same, find the ratio of the distance between P to R to the distance between R to Q.",options:["1 : 2","2 : 3","1 : 3","1 : 5"],answer:"D"},
      {q:"Gulzar Saab, Mani-Ratnam, Shekhar Kapoor and Vishal Bhardwaj collaborated for a project to write the screenplay of the untitled film by Shubham. All the writers decide that they should share the wages in the proportion of the work they contribute. If Mani Ratnam does 3 units of work per day, then Gulzar Saab does 5 units of work per day. If Shekhar does 1 unit of work per day, then Mani Ratnam does 2 units of work per day and if Vishal does 4 units of work per day, then Shekhar does 3 units of work per day. If they worked together for 10 days and got a total of Rs. 2.07 crores, then find the average daily income (in Rs.) of Gulzar Saab.",type:"text",answer:"900000"},
      {q:"In the year 2020, Vishal got 20% more incentive in the 3rd month than what he got in the 2nd month. His incentive in the 4th month was 7 61/77% more than what he got in the 3rd month. If he got Rs. 4500 as an incentive in the first month and the difference in incentives received in the 4th month and 2nd month is Rs. 1130, then the average incentive received by Vishal in the first four months is:",options:["Rs 4,472.5","Rs 4,478.5","Rs 4,487.5","Rs 4,497.5"],answer:"C"},
      {q:"Ram went from Delhi to Shimla via Chandigarh by car. The distance from Delhi to Chandigarh is 4/3 times the distance from Chandigarh to Shimla. The average speed from Delhi to Chandigarh was 1.5 times that from Chandigarh to Shimla. If the average speed for the entire journey was 63 km/hr, find the average speed from Chandigarh to Shimla (in km/hr).",options:["40","36","34","51"],answer:"D"},
      {q:"The average number of runs scored by 6 batsmen including Rohit and Virat in a T-20 cricket match is 30. The average runs by 5 batsmen excluding Rohit is 24 and the average number of runs scored by 5 batsmen excluding Virat is 28. The runs scored by Rohit is what percent higher than the runs scored by Virat?",options:["20 %","25 %","33.33 %","50%"],answer:"D"},
      {q:"Samuel's present age is 4 times his daughter's present age and 16 times his granddaughter's present age. Samuel's father is 20 years older than him and the average present age of all the members in the family of 4 members is 51.25 years. Find the sum of the ages of all the family members 5 years from now.",options:["225 years","200 years","175 years","150 years"],answer:"A"},
      {q:"Set S contains 7 integers that have an average value of 65. The mean of all numbers in set S is equal to the median of the numbers. If the smallest number of set S is 20 less than half the largest number, then the minimum value that the smallest number in set S can be:",options:["8","12","20","15"],answer:"C"},
      {q:"There are N students in the class. Their class teacher gave them a task of finding the average of first N natural numbers and each of them let out a different number and found the average of the remaining numbers. The average of the averages obtained by all the students was 27. Find N.",options:["25","53","60","78"],answer:"B"}
    ];
    questions.forEach(q => { if (q.question && !q.q) q.q = q.question; if (q.o && !q.options) q.options = q.o; if (q.answerText && (q.answer === undefined || q.answer === null)) q.answer = q.answerText; if (q.typedAnswer && q.type === 'text') q.answer = q.typedAnswer; if (q.h && /^[A-H]$/.test(String(q.h)) && (q.answer === undefined || q.answer === null)) q.answer = q.h; if (!q.accepted && q.acceptedAnswers) q.accepted = q.acceptedAnswers; if (!q.type && q.options && q.options.length) q.type = 'mcq'; });
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D","E","F","G","H"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function formatMathText(text){let out=esc(text);out=out.replace(/(\d+)(?:st|nd|rd|th)\s+power\s+of\s+([A-Za-z][A-Za-z0-9]*)/gi,'$2<sup>$1</sup>');out=out.replace(/([A-Za-z][A-Za-z0-9]*|\d+)\s+(?:raised\s+to\s+the\s+power|to\s+the\s+power)\s+(?:of\s+)?(-?\d+)/gi,'$1<sup>$2</sup>');out=out.replace(/square\s+root\s+of\s+([A-Za-z0-9]+(?:\s*[+\-*/]\s*[A-Za-z0-9]+)?)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/sqrt\s*\(([^()]+)\)/gi,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/√\s*([A-Za-z0-9]+)/g,'<span class="sqrt"><span class="sqrt-radicand">$1</span></span>');out=out.replace(/([A-Za-z0-9\)])\^\s*\{?(-?\d+)\}?/g,'$1<sup>$2</sup>');out=out.replace(/(\d+)\s+(\d+)\/(\d+)/g,'$1 <span class="frac"><span>$2</span><span>$3</span></span>').replace(/(^|[^\w>])(\d+)\/(\d+)(?![\w<])/g,'$1<span class="frac"><span>$2</span><span>$3</span></span>');return out;}
    function formatFractionText(text){return formatMathText(text);}
    function formatMathHtml(html){const template=document.createElement('template');template.innerHTML=String(html ?? "");const walker=document.createTreeWalker(template.content,NodeFilter.SHOW_TEXT);const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(node=>{const span=document.createElement('span');span.innerHTML=formatMathText(node.nodeValue);node.replaceWith(...Array.from(span.childNodes));});return template.innerHTML;}
    function rich(s){return formatMathHtml(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? q.correctAnswer ?? q.correct ?? "";}
    function answerIndex(q){const a=q.answer ?? q.correctAnswer ?? q.correct; if(typeof a==='number')return a; const s=String(a ?? '').trim(); if(/^[A-D]$/i.test(s))return labels.indexOf(s.toUpperCase()); if(/^\d+$/.test(s)){const n=Number(s); return n>=0&&n<labels.length?n:-1;} return -1;}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){if(qType(q)==="mcq"){const idx=answerIndex(q); return idx>=0 ? "(" + labels[idx] + ") " + stripHtml((q.options || [])[idx] || "") : stripHtml(qAnswer(q));} return qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function sentenceSteps(text){return String(text ?? "").replace(/\s+/g,' ').trim().split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(Boolean);}
    function detailedSolutionHtml(q){const sol=q.solution || "Solution not provided."; if(hasHtml(sol)) return rich(sol); const steps=sentenceSteps(sol); if(!steps.length || sol==="Solution not provided.") return rich(sol); const items=steps.map((step,i)=>'<li><strong>Step '+(i+1)+':</strong> '+rich(step)+'</li>').join(''); return '<p><strong>Detailed solution:</strong></p><ol class="solution-steps">'+items+'</ol><div class="final-answer">Final Answer: '+rich(correctText(q))+'</div>';}
    function solutionHtml(q){return detailedSolutionHtml(q);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===answerIndex(q);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.innerHTML='Unattempted. Correct answer: '+rich(correctText(q));}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.innerHTML='Wrong. Correct answer: '+rich(correctText(q));} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
