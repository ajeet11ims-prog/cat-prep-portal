    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;min-width:1050px}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9}.topbar{height:100%;display:grid;grid-template-columns:1fr 300px;align-items:stretch}.title{background:var(--brand);color:#fff;padding:12px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;margin:0}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{display:grid;place-items:center;background:#fff;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;background:#fff}section{min-width:0;border-right:2px solid #41515c;overflow:auto}.side{background:#e5f6fc;padding:14px;display:flex;flex-direction:column}.side h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--blue);color:#fff}.qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a}.qbtn.current{background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}
    .legend{display:grid;gap:10px;margin-top:18px;font-size:15px}.dot{display:inline-block;width:20px;height:20px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21}.dot.answered{background:#72bd3b}.dot.marked{background:#7950a5;border-radius:50%}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#29a8df;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    #result{display:none;padding:16px;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.score-box{border:1px solid var(--line);padding:10px;background:#fbfcfd}.score-box strong{display:block;font-size:24px}
    .qhead{display:flex;justify-content:space-between;align-items:center;min-height:52px;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.qtype{color:var(--muted);font-weight:700}.direction{border-bottom:1px solid #d7dde5;padding:12px 18px;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:130px}.options{display:grid;gap:14px;padding:0 24px 14px;min-width:620px}.option{display:flex;gap:12px;align-items:flex-start;font-size:20px;font-weight:700;cursor:pointer}.option input{margin-top:7px;transform:scale(1.25)}.typed-answer{width:min(420px,100%);font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.typed-answer-hint{font-size:13px;color:var(--muted);margin:8px 24px 0;font-weight:700}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.solution{display:none;margin:16px 24px 100px;padding-top:14px;border-top:1px solid var(--line);font-size:17px}.submitted .solution{display:block}.solution h3{margin:0 0 8px;color:#0b75bb}.solution-steps{margin:8px 0 0 24px;padding:0}.solution-steps li{margin:8px 0}
    .navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}

  <script>
const questions = [
{type:'mcq',q:'In a cooking competition, Team A and Team B made mocktails. Team A mocktail contains orange juice and blueberry juice in the ratio 11 : 3, and Team B mocktail contains orange juice and blueberry juice in the ratio 7 : 4. What should be the ratio of volumes of mocktails of Team A and Team B to obtain a mocktail of orange juice and blueberry juice in the ratio 5 : 2?',o:['6 : 11','1 : 14','3 : 7','12 : 11'],a:3,ad:'12 : 11',s:['Orange fraction in Team A = 11/14; in Team B = 7/11; required orange fraction = 5/7.','By alligation, Team A : Team B = (5/7 - 7/11) : (11/14 - 5/7).','= 6/77 : 1/14 = 12 : 11.']},
{type:'mcq',q:'The ratio of copper and zinc by weight in two alloys x and y is 2 : 7 and 5 : 4. How many kilograms of alloys x and y are required to make 42 kg of new alloy z in which the ratio of copper and zinc is the same?',o:['6 kg and 36 kg','10 kg and 32 kg','7 kg and 35 kg','None of these'],a:2,ad:'7 kg and 35 kg',s:['Copper fraction in alloy x = 2/9 = 4/18 and in alloy y = 5/9 = 10/18.','The required equal copper-zinc alloy has copper fraction 1/2 = 9/18.','By alligation, x : y = (10/18 - 9/18) : (9/18 - 4/18) = 1 : 5.','Total = 42 kg, so x = 7 kg and y = 35 kg.']},
{type:'mcq',q:'A, B and C are containers containing milk, sugar and water in varying proportions. Container A contains x% milk and y% sugar. Container B contains y% milk and y% water. Container C contains x% sugar and y% water. When A, B and C are mixed in the ratio 2 : 3 : 5, the final mixture has 18% milk and 23% sugar. Find the product of x and y.',o:['1500','1200','1000','900'],a:1,ad:'1200',s:['Assume quantities of A, B and C are 200, 300 and 500 litres.','Milk condition: 2x + 3y = 180.','Sugar condition: 2y + 5x = 230.','Solving gives x = 30 and y = 40.','Therefore, xy = 1200.']},
{type:'mcq',q:'From a vessel containing 750 ml pure milk, 160 ml pure milk was drawn out and distributed equally between beakers P and Q. The milk in both beakers was diluted by adding water in different proportions. After that, contents of P and Q were added back to the vessel. The concentration of milk in the vessel is now 75%. Had the contents of P and Q been mixed with each other instead of adding it into the vessel, what would be the approximate concentration of milk in the mixture?',o:['42%','39%','35%','36%'],a:1,ad:'39%',s:['After diluted contents are added back, total milk in the vessel is still 750 ml and this is 75% of total volume.','So total final volume = 1000 ml and water added = 250 ml.','If beaker contents alone are mixed, they contain 160 ml milk and 250 ml water.','Milk concentration = 160/(160 + 250) x 100 = 39.02%, approximately 39%.','Hence, option B is correct.']},
{type:'mcq',q:'Shreyas took pure milk and started diluting it with water. He first replaced 14 litres from the beaker full of pure milk with 14 litres of water. He performed this process three more times. Finally, the ratio of milk left in the beaker to water became 81 : 544. Find how much pure milk was there initially.',o:['21','28','35','42'],a:2,ad:'35',s:['Let initial quantity be q litres. Four replacements of 14 litres are made.','Milk fraction left = (1 - 14/q)^4.','Given milk : water = 81 : 544, so milk fraction = 81/625.','Thus (1 - 14/q)^4 = 81/625 = (3/5)^4.','So 1 - 14/q = 3/5, giving q = 35 litres.']},
{type:'mcq',q:'In what ratio should water costing Rs. 10 per litre be mixed with concentrated acid costing Rs. 25/litre to make a profit of 30% by selling the resultant liquid at Rs. 18/litre? Given that any acid should have at least 50% acid content or else it will be rejected.',o:['1.2','1.3','2.9','Not possible'],a:3,ad:'Not possible',s:['Let acid quantity be x and water quantity be y.','Cost = 25x + 10y. Selling price with 30% profit = 1.3(25x + 10y).','Also selling at Rs. 18/litre gives revenue = 18(x + y).','So 1.3(25x + 10y) = 18(x + y), giving 14.5x = 5y and y/x = 2.9.','This means water is 2.9 times acid, so acid content is less than 50%. Hence it will be rejected.']},
{type:'mcq',q:'Two alloys P and Q of tin and lead are prepared by mixing the respective metals in the proportion 5 : 2 and 5 : 11 respectively. If the two alloys are melted and mixed to form a third alloy R having 1 : 1 proportion of tin and lead, what is the ratio of alloys P and Q in the mixture?',o:['7 : 8','8 : 7','5 : 7','7 : 5'],a:0,ad:'7 : 8',s:['Tin fraction in P = 5/7 and in Q = 5/16.','Required tin fraction = 1/2.','By alligation, P : Q = (1/2 - 5/16) : (5/7 - 1/2).','= 3/16 : 3/14 = 14 : 16 = 7 : 8.']},
{type:'mcq',q:'In 320 litres of mixture, milk and water are in the ratio 5 : 3. If 80 litres of the mixture is taken out and some water is added, the ratio between milk and water becomes 5 : 4. Find the amount of water added.',o:['30 litres','50 litres','80 litres','20 litres'],a:0,ad:'30 litres',s:['After removing 80 litres, remaining mixture = 240 litres and ratio remains 5 : 3.','Milk = (5/8) x 240 = 150 litres; water = 90 litres.','Let x litres water be added. Then 150/(90 + x) = 5/4.','Solving gives x = 30 litres.']},
{type:'mcq',q:'If 40 litres of milk solution having 36% milk and remaining water is given, how many litres of water must be added to make it a 30% solution of milk?',o:['4','6','8','10'],a:2,ad:'8',s:['Milk in the solution = 36% of 40 = 14.4 litres.','Water initially = 25.6 litres.','Let x litres water be added. Then 14.4/(40 + x) = 30/100.','Equivalently, 14.4/(25.6 + x) = 30/70.','Solving gives x = 8 litres.']},
{type:'mcq',q:'A vessel is filled with milk. 12 litres of milk is withdrawn and replaced with water. Next, from the same vessel, 12 litres of the mixture is withdrawn and replaced with water. If the volumes of milk and water are now in the ratio 81 : 19, then the capacity of the vessel is:',o:['40','80','90','120'],a:3,ad:'120',s:['Let vessel capacity be Q litres.','After two equal replacements of 12 litres, milk fraction left = (1 - 12/Q)^2.','Given milk : water = 81 : 19, so milk fraction = 81/100.','Thus (1 - 12/Q)^2 = 81/100, so 1 - 12/Q = 9/10.','Therefore, Q = 120 litres.']},
{type:'mcq',q:'In what ratio should two varieties of tea costing Rs. 600 per kg and Rs. 900 per kg be mixed so that the resulting mixture, when mixed with another variety of tea costing Rs. 1000 per kg in ratio 5 : 4, yields a mixture costing Rs. 800/kg?',o:['2 : 13','13 : 2','5 : 13','9 : 17'],a:1,ad:'13 : 2',s:['Let the first resulting mixture cost be x.','(5x + 4 x 1000)/9 = 800, so 5x + 4000 = 7200 and x = 640.','Now mix Rs. 600 and Rs. 900 tea to obtain Rs. 640 tea.','By alligation, 600 : 900 quantities = (900 - 640) : (640 - 600) = 260 : 40 = 13 : 2.']},
{type:'mcq',q:'Two types of spirits solutions P and Q are mixed in the proportion 3 : 5 by volume. The volume of the mixture is then doubled by adding solution P such that the resulting mixture has 60% spirit. If solution P has 70% spirit, then find the percentage of spirit in solution Q.',o:['36%','38%','40%','42%'],a:1,ad:'38%',s:['Let initial volumes be P = 3x and Q = 5x.','To double the total volume from 8x to 16x, 8x of P is added.','Final P volume = 11x and Q volume = 5x.','Let Q have a% spirit. Then 11x x 70 + 5x x a = 16x x 60.','770 + 5a = 960, so a = 38%.']},
{type:'mcq',q:'When 20 litres of milk is added to 60 litres of a milk-water solution, the new concentration of milk is the same as the new concentration of water when 30 litres of water is added to the same 60 litres of initial solution. What is the ratio of milk and water in the original milk-water solution?',o:['3 : 2','8 : 9','9 : 8','5 : 3'],a:2,ad:'9 : 8',s:['Let initial milk and water be M and W litres, where M + W = 60.','After adding 20 litres milk, milk concentration = (M + 20)/80.','After adding 30 litres water, water concentration = (W + 30)/90.','Equate: (M + 20)/80 = (W + 30)/90.','This gives 9M - 8W = 60. With M + W = 60, solving gives M = 540/17 and W = 480/17.','Therefore, M : W = 9 : 8.']},
{type:'mcq',q:'A jar contains 40 litres of pure milk. 20% is taken out and replaced with water in the first cycle. In the second cycle, 30% of the resultant mixture is taken out and replaced with water, and finally in the third cycle 20% of the mixture is taken out and replaced with water. Find the ratio of milk and water in the final mixture.',o:['56 : 69','71 : 79','38 : 43','45 : 56'],a:0,ad:'56 : 69',s:['Milk left = 40(1 - 0.2)(1 - 0.3)(1 - 0.2).','= 40 x 0.8 x 0.7 x 0.8 = 17.92 litres.','Water = 40 - 17.92 = 22.08 litres.','Milk : water = 17.92 : 22.08 = 56 : 69.']},
{type:'mcq',q:'Mixture x is formed by mixing raw elements A and B in the ratio 3 : 5. Mixture y is formed by mixing raw elements A and C in the ratio 3 : 2. In what ratio should both mixtures be mixed to obtain a solution which has concentration of B as 40%?',o:['9 : 1','13 : 2','16 : 9','5 : 9'],a:2,ad:'16 : 9',s:['Let amount of mixture x be P units and mixture y be Q units.','B fraction in mixture x = 5/8, while mixture y has no B.','Required B concentration = 40%.','So (5P/8)/(P + Q) = 0.40.','5P/8 = 0.4P + 0.4Q, giving P/Q = 16/9.']},
{type:'mcq',q:'A milk distribution tanker contains 320 litres mixture of milk and water with 70% milk. How much milk should be added so that milk percentage increases to 80%?',o:['120','130','140','160'],a:3,ad:'160',s:['In 320 litres, water = 30% of 320 = 96 litres.','Adding pure milk does not change water quantity.','For final mixture to have 80% milk, water must be 20% of total.','So 20% of final total = 96, giving final total = 480 litres.','Milk added = 480 - 320 = 160 litres.']},
{type:'mcq',q:'A 30% ethanol solution is mixed with another ethanol solution K of unknown concentration in the proportion 3 : 5 by volume. This mixture is then mixed with an equal volume of 12.5% ethanol solution. If the resultant mixture is 18.75% ethanol, then the unknown concentration of K is:',o:['20%','22%','24%','18%'],a:1,ad:'22%',s:['Let the first two volumes be 300x and 500x, so their mixture is 800x.','This is mixed with an equal volume 800x of 12.5% ethanol.','Equating ethanol: (30% of 300x) + (K% of 500x) + (12.5% of 800x) = 18.75% of 1600x.','90x + 5Kx + 100x = 300x.','5K = 110, so K = 22%.']},
{type:'mcq',q:'Three vessels of equal capacities contain liquids L, M and N in the ratios 1 : 2 : 3, 3 : 4 : 5 and 5 : 6 : 7 respectively. The mixtures from these vessels are taken in the ratio 1 : 2 : 3 and poured into a fourth vessel. The ratio of liquids L, M and N in the resulting mixture is:',o:['16 : 21 : 26','3 : 4 : 5','1 : 2 : 3','None of these'],a:1,ad:'3 : 4 : 5',s:['Take equal vessel capacity as 36 litres.','First vessel contains L, M, N = 6, 12, 18. Second contains 9, 12, 15. Third contains 10, 12, 14.','Taking mixtures in ratio 1 : 2 : 3 is equivalent to 6, 12 and 18 litres from the vessels.','Contribution of L = 1 + 3 + 5 = 9; M = 2 + 4 + 6 = 12; N = 3 + 5 + 7 = 15.','Thus L : M : N = 9 : 12 : 15 = 3 : 4 : 5.']},
{type:'mcq',q:'A 20 kg alloy made of copper and zinc in the ratio 4 : 1 is mixed with 12 kg of another alloy of copper and zinc such that in the resultant alloy, copper and zinc become 5 : 3. Find the ratio of copper and zinc in the second alloy.',o:['1 : 2','2 : 1','3 : 2','2 : 3'],a:0,ad:'1 : 2',s:['In first alloy, copper = 16 kg and zinc = 4 kg.','Final mixture total = 32 kg with copper : zinc = 5 : 3.','So final copper = (5/8) x 32 = 20 kg and final zinc = 12 kg.','Copper from second alloy = 20 - 16 = 4 kg; zinc from second alloy = 12 - 4 = 8 kg.','Second alloy copper : zinc = 4 : 8 = 1 : 2.']},
{type:'mcq',q:'Two vessels whose volumes are in the ratio 3 : 4 contain milk-water mixtures. If 40% of the first mixture, which is 60% milk concentration, is mixed with 60% of the second mixture, which is 50% milk concentration, find the milk concentration of the final mixture.',o:['53.33%','42.28%','19.75%','80%'],a:0,ad:'53.33%',s:['Let vessel volumes be 3 and 4 units.','Taken quantity from first = 40% of 3 = 1.2 units; milk in it = 1.2 x 60% = 0.72.','Taken quantity from second = 60% of 4 = 2.4 units; milk in it = 2.4 x 50% = 1.2.','Total milk = 1.92 and total mixture = 3.6.','Milk concentration = 1.92/3.6 x 100 = 53.33%.']},
{type:'mcq',q:'If a certain weight of an alloy of copper and gold is mixed with 6 kg of pure gold, the resulting alloy has 90% gold by weight. If the same weight of the initial alloy is mixed with 4 kg of another alloy which has 90% gold by weight, the resulting alloy has 80% gold by weight. Then the weight of the initial alloy, in kg, is:',o:['0.82 kg','5/13 kg','8/13 kg','2 kg'],a:3,ad:'2 kg',s:['Let initial alloy contain a kg gold and b kg copper. Weight = a + b.','With 6 kg pure gold: (a + 6)/(a + b + 6) = 90/100, giving 9b - a = 6.','With 4 kg of 90% gold alloy: (a + 3.6)/(a + b + 4) = 80/100, giving a - 4b = -2.','Solving gives b = 4/5 and a = 6/5.','Initial alloy weight = a + b = 2 kg.']},
{type:'mcq',q:'A can contains a solution of milk and water. After adding 50 litres of water, milk concentration becomes 40%. If further 60 litres of water is added, milk concentration reduces by 10 percentage points. How much more water must be added so that milk concentration becomes 15%?',o:['80','120','240','360'],a:2,ad:'240',s:['Let initial milk and water be P and Q litres.','After adding 50 litres water, P/(Q + 50) = 2/3.','After adding total 110 litres water, concentration becomes 30%, so P/(Q + 110) = 3/7.','Solving gives P = 72 and Q = 58.','Now milk = 72 and water = 168 in total 240 litres.','Let y more litres water be added for 15% milk: 72/(240 + y) = 15/100.','Solving gives y = 240 litres.']},
{type:'tita',q:'A mixture P is produced by mixing chemical A and B in the ratio 3 : 5. Chemical A is prepared by mixing raw materials m and n in the ratio 2 : 3. Chemical B is prepared by mixing raw materials n and K in the ratio 3 : 2. Then 128 litres of P is mixed with water. If the concentration of raw material n in the final mixture is 40%, how much water, in litres, has been added to mixture P?',ta:'64',ad:'64',s:['Let A = 3x and B = 5x in mixture P.','n in A = (3/5)(3x) = 1.8x. n in B = (3/5)(5x) = 3x.','Total n in P = 4.8x and total P = 8x.','Given 8x = 128, so x = 16. Thus n = 4.8 x 16 = 76.8 litres.','If n is 40% of final mixture, final mixture = 76.8/0.40 = 192 litres.','Water added = 192 - 128 = 64 litres.']},
{type:'mcq',q:'A vessel contains 240 litres of milk and water solution in the ratio 1 : 5. 60 litres are taken out and x litres of pure milk is added, due to which the ratio of milk and water gets reversed. Then y litres of water is added, due to which the ratio of milk and water once again gets reversed. Find x + y.',o:['4200','4230','4320','None of these'],a:2,ad:'4320',s:['Initially milk : water = 1 : 5, so milk = 40 and water = 200.','After taking out 60 litres, remaining milk = 30 and water = 150.','Add x litres milk so ratio becomes 5 : 1: (30 + x) : 150 = 5 : 1.','So x = 720. Now milk = 750 and water = 150.','Add y litres water so ratio becomes 1 : 5: 750 : (150 + y) = 1 : 5.','So y = 3600. Therefore x + y = 4320.']},
{type:'mcq',q:'A vessel has a 900-litre mixture of spirit and water with 40% spirit. How many litres of another mixture with 60% spirit content may be added so that spirit content in the resulting mixture will be more than 45% but less than 50%?',o:['More than 300 litres but less than 900 litres','More than 800 litres but less than 1200 litres','More than 500 litres but less than 900 litres','More than 200 litres but less than 600 litres'],a:0,ad:'More than 300 litres but less than 900 litres',s:['Initial spirit = 40% of 900 = 360 litres. Let a litres of 60% mixture be added.','For 45%: (360 + 0.6a)/(900 + a) = 45/100, giving a = 300.','For 50%: (360 + 0.6a)/(900 + a) = 1/2, giving a = 900.','Required amount is more than 300 litres but less than 900 litres.']},
{type:'mcq',q:'Ganpat mixed alcohol and water in equal proportions to get 300 ml of solution. He tasted 30 ml of the solution and then mixed 30 ml water. He kept doing this until the concentration of alcohol was at most 30%. How much alcohol, in millilitres, did he consume? Mark the closest integral value.',o:['61','62','88','89'],a:0,ad:'61',s:['Initially alcohol = 150 ml in 300 ml solution.','Each time 30 ml is removed and 30 ml water is added, alcohol left is multiplied by (1 - 30/300) = 0.9.','Need alcohol concentration at most 30%, i.e. alcohol at most 90 ml.','After 4 replacements alcohol = 150(0.9)^4 = 98.415 ml, still more than 90.','After 5 replacements alcohol = 150(0.9)^5 = 88.57 ml.','Alcohol consumed = 150 - 88.57 = 61.43 ml, closest integer 61.']},
{type:'mcq',q:'Two solutions P and Q made of alcohol and soda water have different percentages of alcohol. The total volumes of P and Q are 40 and 16 litres respectively. Equal volumes are taken from P and Q and mixed with the other solution. If the final percentage of alcohol in both solutions is equal, find the amount of solution taken out and mixed with the other solution.',o:['11.42','12.33','11.60','12.2'],a:0,ad:'11.42',s:['Let alcohol percentages in P and Q be x% and y%, and let k litres be exchanged.','After exchange, percentage equality gives: [x(40-k)+yk]/40 = [y(16-k)+xk]/16.','Multiplying: 16x(40-k)+16yk = 40y(16-k)+40xk.','This simplifies to 80(x-y)=7k(x-y). Since x is not equal to y, k = 80/7 = 11.42 litres.']},
{type:'mcq',q:'A mixture of volume 120 litres has milk and water in the proportion 2 : 3. When water is added, the ratio changes to 2 : 5. If 1/5th part of this mixture is taken out, how many litres of milk must be added to the remaining mixture so that the ratio of milk and water again becomes 2 : 3?',o:['28.7 litres','24.5 litres','25.6 litres','26.7 litres'],a:2,ad:'25.6 litres',s:['Initial 120 litres has milk = 48 and water = 72.','To change ratio from 2 : 3 to 2 : 5, milk remains 48 and total becomes 168 litres, so water added = 48 litres.','After taking out 1/5, remaining mixture = 168 x 4/5 = 134.4 litres with milk : water = 2 : 5.','Remaining milk = 38.4 and water = 96.','Let m litres milk be added. Then (38.4 + m)/96 = 2/3.','m = 25.6 litres.']},
{type:'mcq',q:'Profit is 20% when pulses x and y are mixed in the ratio 3 : 2 and sold at Rs. 60/kg. Profit is 5% when the same pulses are mixed in the ratio 2 : 3 and sold at Rs. 60/kg. Find the ratio of cost prices per kg of x and y.',o:['41 : 43','5 : 3','1 : 2','2 : 3'],a:2,ad:'1 : 2',s:['Let cost prices of x and y be a and b.','Case 1: selling price 60 with 20% profit gives cost price of mixture = 50. So (3a + 2b)/5 = 50, hence 3a + 2b = 250.','Case 2: selling price 60 with 5% profit gives cost price of mixture = 60/1.05 = 400/7. So (2a + 3b)/5 = 400/7, hence 2.1a + 3.15b = 300.','Solving gives a = 250/7 and b = 500/7.','Therefore a : b = 1 : 2.']},
{type:'mcq',q:'A milkman has a 100 L tank of milk. He removes 5 L from the container and replaces it with water. He keeps repeating it till the content of milk is a maximum of 80%. Statement 1: The desired proportion is reached when he has added 20 L of water. Statement 2: The desired proportion is reached when he has added 25 L of water.',o:['Both statements are correct','Only statement 1 is correct','Only statement 2 is correct','Both statements are false'],a:2,ad:'Only statement 2 is correct',s:['Each replacement leaves 95% of the previous milk.','After 4 replacements, milk = 100(0.95)^4 = 81.45 litres, still more than 80%.','After 5 replacements, milk = 100(0.95)^5 = 77.37 litres, which is at most 80%.','Water added after 5 replacements = 5 x 5 = 25 litres.','So statement 1 is false and statement 2 is true.']}
];
let current=0,submitted=false,seconds=3600;
const state=questions.map(()=>({ans:null,marked:false}));
const host=document.getElementById('host'),qbar=document.getElementById('qbar'),time=document.getElementById('time'),result=document.getElementById('result');
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function renderBar(){qbar.innerHTML=questions.map((q,i)=>`<button class="qbtn ${i===current?'current':''} ${state[i].ans!==null&&state[i].ans!==''?'answered':''} ${state[i].marked?'marked':''}" onclick="goQ(${i})">${i+1}</button>`).join('')}
function render(){const q=questions[current];let body=`<div class="qhead"><div class="qnum">Question ${current+1}</div><div class="qtype">${q.type==='tita'?'TITA':'MCQ'}</div></div><div class="direction">Answer the question independently.</div><div class="qtext">${q.q}</div>`;if(q.type==='mcq'){body+=`<div class="options">`+q.o.map((o,i)=>`<label class="option"><input type="radio" name="opt" value="${i}" ${state[current].ans===i?'checked':''} ${submitted?'disabled':''} onchange="state[current].ans=${i};renderBar()"><span>(${String.fromCharCode(65+i)})</span><span>${o}</span></label>`).join('')+`</div>`}else{body+=`<input class="typed-answer" ${submitted?'disabled':''} value="${state[current].ans??''}" oninput="this.value=this.value.replace(/[^0-9]/g,'');state[current].ans=this.value;renderBar()" placeholder="Enter whole number answer"><div class="typed-answer-hint">TITA accepts whole number only.</div>`}if(submitted){let ok=q.type==='mcq'?state[current].ans===q.a:String(state[current].ans).trim()===q.ta;body+=`<div class="answer-note ${ok?'ok':'bad'}">${ok?'Correct':'Incorrect'} | Correct Answer: ${q.ad}</div><div class="solution"><h3>Solution</h3><ol class="solution-steps">${q.s.map(x=>`<li>${x}</li>`).join('')}</ol></div>`}host.innerHTML=body;renderBar()}
function goQ(i){current=i;render()}function nextQ(){if(current<questions.length-1){current++;render()}}function prevQ(){if(current>0){current--;render()}}function markReview(){state[current].marked=!state[current].marked;renderBar()}function clearAns(){if(submitted)return;state[current].ans=null;render()}
function submitTest(){if(submitted)return;submitted=true;document.body.classList.add('submitted');let c=0,w=0,u=0;questions.forEach((q,i)=>{let a=state[i].ans;if(a===null||a==='')u++;else if(q.type==='mcq'?a===q.a:String(a).trim()===q.ta)c++;else w++});let score=c*3-w;result.style.display='block';result.innerHTML=`<div class="score-grid"><div class="score-box">Score<strong>${score}</strong></div><div class="score-box">Correct<strong>${c}</strong></div><div class="score-box">Wrong<strong>${w}</strong></div><div class="score-box">Unattempted<strong>${u}</strong></div><div class="score-box">Total<strong>${questions.length}</strong></div></div>`;render()}
setInterval(()=>{if(submitted)return;seconds=Math.max(0,seconds-1);let m=String(Math.floor(seconds/60)).padStart(2,'0'),s=String(seconds%60).padStart(2,'0');time.textContent=m+':'+s;if(seconds===0)submitTest()},1000);
render();
  </script>
</body>
</html>
