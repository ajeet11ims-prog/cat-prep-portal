<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mixture Alligation Test -9</title>
  <style>
    :root{--ink:#101820;--muted:#5f6f7a;--line:#b8c3cc;--brand:#24313a;--blue:#4089c8;--bg:#eef3f7;--ok:#60b947;--bad:#e55b25;--review:#7b4ab0}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;min-width:1050px}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9}.topbar{height:100%;display:grid;grid-template-columns:1fr 300px;align-items:stretch}.title{background:var(--brand);color:#fff;padding:12px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;margin:0}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{display:grid;place-items:center;background:#fff;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;background:#fff}section{min-width:0;border-right:2px solid #41515c;overflow:auto}.side{background:#e5f6fc;padding:14px;display:flex;flex-direction:column}.side h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--blue);color:#fff}.qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a}.qbtn.current{background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}
    .legend{display:grid;gap:10px;margin-top:18px;font-size:15px}.dot{display:inline-block;width:20px;height:20px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21}.dot.answered{background:#72bd3b}.dot.marked{background:#7950a5;border-radius:50%}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#29a8df;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    #result{display:none;padding:16px;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.score-box{border:1px solid var(--line);padding:10px;background:#fbfcfd}.score-box strong{display:block;font-size:24px}
    .qhead{display:flex;justify-content:space-between;align-items:center;min-height:52px;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.qtype{color:var(--muted);font-weight:700}.direction{border-bottom:1px solid #d7dde5;padding:12px 18px;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:130px}.options{display:grid;gap:14px;padding:0 24px 14px;min-width:620px}.option{display:flex;gap:12px;align-items:flex-start;font-size:20px;font-weight:700;cursor:pointer}.option input{margin-top:7px;transform:scale(1.25)}.typed-answer{width:min(420px,100%);font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.typed-answer-hint{font-size:13px;color:var(--muted);margin:8px 24px 0;font-weight:700}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.solution{display:none;margin:16px 24px 100px;padding-top:14px;border-top:1px solid var(--line);font-size:17px}.submitted .solution{display:block}.solution h3{margin:0 0 8px;color:#0b75bb}.solution-steps{margin:8px 0 0 24px;padding:0}.solution-steps li{margin:8px 0}
    .navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}
  </style>
</head>
<body>
  <header><div class="topbar"><div class="title"><h1>Mixture Alligation Test -9</h1><div class="meta">29 Questions | 60 Minutes | 16 MCQ | 13 TITA | +3 correct, -1 wrong</div></div><div class="timer">Time Left: <span id="time">60:00</span></div></div></header>
  <main>
    <section><div id="result"></div><div id="host"></div></section>
    <aside class="side"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button class="side-submit" onclick="submitTest()">Submit</button></aside>
  </main>
  <div class="navrow"><button onclick="prevQ()">Previous</button><button onclick="markReview()">Mark for Review</button><button onclick="clearAns()">Clear</button><button onclick="nextQ()">Next</button><button class="submit" onclick="submitTest()">Submit</button></div>
  <script>
const questions = [
{type:'mcq',q:'The average weight of girls in a class is 10 kg and the average weight of boys of the same class is 20 kg. The average weight of the whole class is 15 kg. If the number of boys is 20, then the number of girls is:',o:['5','10','15','20'],a:3,ad:'20',s:['Let number of girls be x.','15 = (10x + 20 Ã— 20)/(x + 20).','15x + 300 = 10x + 400, so 5x = 100.','x = 20.']},
{type:'tita',q:'If 20 kg of rice costing Rs. 16/kg is mixed with 16 kg of the second variety of rice costing Rs. 25/kg, then what is the average cost per kg of the resulting mixture?',ta:'20',ad:'20',s:['Average cost = (16 Ã— 20 + 25 Ã— 16)/(20 + 16).','= (320 + 400)/36 = 720/36 = 20.']},
{type:'tita',q:'How many kilograms of coffee costing Rs. 20/kg must be mixed with 20 kg of coffee costing Rs. 15/kg, so that the resulting mixture costs Rs. 18/kg?',ta:'30',ad:'30',s:['By alligation, dearer : cheaper = (18 - 15) : (20 - 18) = 3 : 2.','20 kg cheaper coffee represents 2 parts.','Dearer coffee = 20 Ã— 3/2 = 30 kg.']},
{type:'mcq',q:'Two acid solutions with concentrations 70% and 80% are mixed in a certain ratio to get a 64% acid solution. This solution is mixed with 10 L of water to get back 50% acid solution. How much of the 80% solution has been used?',o:['Cannot be determined from the given data','10 litres','20 litres','25 litres'],a:0,ad:'Cannot be determined',s:['A mixture of 70% and 80% solutions must have concentration between 70% and 80%.','64% is below both, so the given data is inconsistent.']},
{type:'tita',q:'There is a 100-litre solution of milk and water in which milk forms 60%. How much water must be added to make milk form 40%?',ta:'50',ad:'50',s:['Milk initially = 60 litres.','For this to be 40%, total solution = 60/0.40 = 150 litres.','Water added = 150 - 100 = 50 litres.']},
{type:'tita',q:'The cost of type 1 rice is Rs. 22 per kg and type 2 rice is Rs. 18 per kg. If both are mixed in the ratio 3 : 1, find the price per kg of the mixed variety.',ta:'21',ad:'21',s:['Weighted average = (22 Ã— 3 + 18 Ã— 1)/4 = 84/4 = 21.']},
{type:'tita',q:'The ratio of expenditure and savings is 9 : 11. If income increases by 20% and savings increases by 11%, by how much percent does expenditure increase?',ta:'31',ad:'31',s:['Let expenditure increase be x%.','Using alligation: (20 - 11)/(x - 20) = 9/11.','So x - 20 = 11 and x = 31.']},
{type:'mcq',q:'There are two drums, each containing a mixture of paints A and B. In drum 1, A and B are in the ratio 18 : 7. The mixtures from drum 1 and 2 are mixed in the ratio 3 : 4 and in the final mixture, A and B are in the ratio 13 : 7. In drum 2, A and B were in the ratio:',o:['239 : 161','251 : 166','273 : 167','239 : 157'],a:0,ad:'239 : 161',s:['Fraction of A in drum 1 = 18/25 and final mixture = 13/20.','Let fraction of A in drum 2 be x.','(3 Ã— 18/25 + 4x)/7 = 13/20.','x = 239/400, so A : B = 239 : 161.']},
{type:'tita',q:'Ashwani lent money to Raghav at 12% p.a. S.I. and the remaining amount to Neeti at 7% p.a. S.I. Overall he gets 8.5% p.a. Find the amount lent to Raghav if total money is Rs. 50,000.',ta:'15000',ad:'15000',s:['By alligation, Raghav : Neeti = (8.5 - 7) : (12 - 8.5) = 1.5 : 3.5 = 3 : 7.','Raghav amount = 3/10 Ã— 50000 = 15000.']},
{type:'tita',q:'Anil sold 40% of books at 40% profit and 60% of books at 20% profit. Find the average profit percent.',ta:'28',ad:'28',s:['Average profit = (40 Ã— 40 + 60 Ã— 20)/100 = 2800/100 = 28%.']},
{type:'mcq',q:'Two alcohol solutions A and B are mixed in proportions 1 : 3 by volume. The volume is then doubled by adding solution A, and the resulting mixture has 72% alcohol. If A has 60% alcohol, find alcohol percentage in B.',o:['92%','83%','62%','74%'],a:0,ad:'92%',s:['Take initial mixture as 4 units: A = 1, B = 3.','Adding 4 units of A doubles the volume, so final A = 5 and B = 3.','(5 Ã— 60 + 3x)/8 = 72.','x = 92%.']},
{type:'mcq',q:'Simba purchased a table for Rs. 13,000 and sold it at 30% profit. He purchased a chair for Rs. 4,000 and sold it at 5% profit. Find the overall profit percent.',o:['24.12%','20%','25.5%','26.25%'],a:0,ad:'24.12%',s:['Total cost = 17000.','Profit = 30% of 13000 + 5% of 4000 = 3900 + 200 = 4100.','Profit percent = 4100/17000 Ã— 100 = 24.12%.']},
{type:'mcq',q:'Keerti usually takes 10 hours from Agra to New Delhi. She stops for 20 minutes at Greater Noida, then increases speed by 25% and reaches 20 minutes early. Find the ratio of distance Agra to Greater Noida and Greater Noida to New Delhi.',o:['2 : 1','1 : 2','3 : 2','4 : 3'],a:0,ad:'2 : 1',s:['Let usual speed be 4x and increased speed be 5x.','Total distance = 40x. At increased speed, full journey would take 8 hours.','Actual travel time = 10 hours - 40 minutes = 28/3 hours.','Alligation between 10 and 8 to get 28/3 gives ratio 2 : 1.']},
{type:'mcq',q:'A 40 litre solution has dye and water in the ratio 2 : 3. Water is added to make the ratio 2 : 5. If one-fourth of this diluted solution is taken out, how many litres of dye must be added to the remaining solution to bring the ratio back to 2 : 3?',o:['8 litres','6 litres','7.5 litres','9 litres'],a:0,ad:'8 litres',s:['Initial dye = 16 litres.','For dye : water = 2 : 5, total solution = 56 litres.','After removing one-fourth, dye = 12 and water = 30.','Let dye added be d. (12 + d)/30 = 2/3, so d = 8.']},
{type:'mcq',q:'In a vessel, acid and water are in ratio 2 : 5. In another vessel, water and acid are in ratio 6 : 1. In what ratio should both contents be mixed so that acid and water become 3 : 11?',o:['3 : 2','1 : 1','4 : 3','5 : 2'],a:1,ad:'1 : 1',s:['Acid fraction in vessel 1 = 2/7.','Acid fraction in vessel 2 = 1/7.','Required acid fraction = 3/14.','Alligation gives (3/14 - 1/7) : (2/7 - 3/14) = 1/14 : 1/14 = 1 : 1.']},
{type:'mcq',q:'In a mixture of 600 litres, milk and water are in the ratio 7 : 8. Now 120 litres of water is added. What is the final ratio of milk and water?',o:['7 : 11','7 : 10','8 : 11','11 : 7'],a:0,ad:'7 : 11',s:['One part = 600/15 = 40 litres.','Milk = 280 and water = 320.','After adding 120 litres water, water = 440.','Ratio = 280 : 440 = 7 : 11.']},
{type:'tita',q:'How many litres of water should be mixed with 50 litres of 30% wine solution so that the resultant solution is a 10% wine solution?',ta:'100',ad:'100',s:['Wine initially = 15 litres.','For this to be 10%, total final solution = 150 litres.','Water added = 150 - 50 = 100 litres.']},
{type:'mcq',q:'A person has 90 litres of pure alcohol and 9 litres is replaced with 9 litres water. This operation is performed two more times. Find alcohol left.',o:['65.61 litres','64.80 litres','72.90 litres','68.40 litres'],a:0,ad:'65.61 litres',s:['Alcohol left = 90 Ã— (1 - 9/90)^3.','= 90 Ã— (9/10)^3 = 65.61 litres.']},
{type:'mcq',q:'Two glasses P and Q were partially filled with water. 70% of P was transferred to Q. Then 50% of Q was transferred to P. Now P and Q are in ratio 5 : 3. Find initial ratio of water in P and Q.',o:['5 : 1','4 : 1','3 : 2','2 : 1'],a:0,ad:'5 : 1',s:['Let initial P = a and Q = b.','After first transfer, P = 0.3a, Q = b + 0.7a.','After second transfer, P = 0.65a + 0.5b and Q = 0.35a + 0.5b.','Equating to 5 : 3 gives b = 0.2a, hence a : b = 5 : 1.']},
{type:'tita',q:'A milkman has 90 litres of milk. 9 litres is taken out and replaced by water. Again, 10 litres of mixture is taken out and replaced by water. Find final milk volume.',ta:'72',ad:'72',s:['After first replacement, milk = 81 litres.','Second removal of 10 litres contains 10 Ã— 81/90 = 9 litres milk.','Final milk = 81 - 9 = 72 litres.']},
{type:'mcq',q:'Vessels A, B, C contain 500 ml salt solutions of strengths 10%, 22%, 32%. 100 ml from A to B, then 100 ml from B to C, then 100 ml from C to A. Find final strength in A.',o:['14%','12%','86%','72%'],a:0,ad:'14%',s:['Initial salt in A, B, C = 50, 110, 160.','After A to B: A has 400 ml with 40 salt, B has 600 ml with 120 salt.','B is now 20%, so B to C carries 20 salt.','C becomes 600 ml with 180 salt, i.e. 30%.','C to A carries 30 salt. A finally has 70 salt in 500 ml = 14%.']},
{type:'tita',q:'A sample of a litres from a 60 litre tank containing alcohol and water in ratio 2 : 3 is replaced with pure alcohol, so that alcohol and water become equal. Find a.',ta:'10',ad:'10',s:['Initially alcohol = 24 and water = 36.','After removing a litres and adding pure alcohol, alcohol = 24 - 2a/5 + a = 24 + 3a/5.','Water = 36 - 3a/5.','Equating gives 24 + 3a/5 = 36 - 3a/5, so a = 10.']},
{type:'mcq',q:'8 litres of alcohol solution contains 60% alcohol. 3 litres water is added. Find alcohol percentage in the new solution.',o:['43.63%','45%','48%','50%'],a:0,ad:'43.63%',s:['Alcohol = 8 Ã— 60/100 = 4.8 litres.','Total solution = 11 litres.','Alcohol percentage = 4.8/11 Ã— 100 = 43.63%.']},
{type:'tita',q:'Wine and water are in ratio 5 : 7. If 44 litres water is added, the ratio becomes 2 : 5. Find total wine quantity in the new mixture.',ta:'40',ad:'40',s:['Wine is constant. Scale 5 : 7 to 10 : 14 and 2 : 5 to 10 : 25.','Water increase = 11 parts = 44 litres, so 1 part = 4 litres.','Wine = 10 parts = 40 litres.']},
{type:'mcq',q:'There is 40 litres of milk. Four litres is taken out and replaced with 5 L water. Then 6 L mixture is replaced with 7 L water, and finally 8 L mixture is replaced with 9 L water. How much milk is now in the vessel?',o:['1020/41 litres','25 litres','24 litres','1000/41 litres'],a:0,ad:'1020/41 litres',s:['After first step, volume = 41 litres and milk = 36 litres.','Milk removed in second step = 6 Ã— 36/41 = 216/41, so milk left = 1260/41.','After adding 7 litres water, volume = 42 litres.','After removing 8 litres, milk left = (1260/41) Ã— (34/42) = 1020/41 litres.']},
{type:'mcq',q:'Jar A contains 20% acid and Jar B contains 50% acid. In what ratio should A be mixed with B to obtain 38% acid?',o:['2 : 3','3 : 2','1 : 2','3 : 5'],a:0,ad:'2 : 3',s:['By alligation, A : B = (50 - 38) : (38 - 20) = 12 : 18 = 2 : 3.']},
{type:'mcq',q:'Sharad Chand has 50 litres alcohol. He replaces 5 litres with water and performs this operation 2 more times. Find alcohol left after third operation.',o:['36.45 litres','40.5 litres','35.45 litres','37.5 litres'],a:0,ad:'36.45 litres',s:['Alcohol left = 50 Ã— (1 - 5/50)^3 = 50 Ã— (9/10)^3 = 36.45 litres.']},
{type:'mcq',q:'Three salt solutions A, B, C are mixed in proportion 1 : 2 : 3 and strength is 20%. If mixed in proportion 3 : 2 : 1, strength is 30%. D is produced by mixing B and C in ratio 2 : 7. Find D : A strength ratio.',o:['1 : 2','1 : 3','1 : 4','1 : 5'],a:1,ad:'1 : 3',s:['Let strengths be a, b, c.','a + 2b + 3c = 120 and 3a + 2b + c = 180.','Subtracting gives a - c = 30.','Also b + 2c = 45.','D = (2b + 7c)/9 = (90 + 3c)/9 = 10 + c/3 = (c + 30)/3 = a/3.','So D : A = 1 : 3.']},
{type:'tita',q:'When 12 litres water is added to a vessel having milk and water in ratio 2 : 3, the ratio changes to 4 : 7. Find the new volume of water if 22 litres solution is removed from the same vessel.',ta:'70',ad:'70',s:['Let milk and water be 2x and 3x.','2x/(3x + 12) = 4/7 gives x = 24.','Water after adding = 3x + 12 = 84 litres.','Water fraction in 4 : 7 mixture is 7/11.','Water removed = 22 Ã— 7/11 = 14 litres.','New water = 84 - 14 = 70 litres.']}
];
let current=0,submitted=false,seconds=3600;
const state=questions.map(()=>({ans:null,marked:false}));
const host=document.getElementById('host'),qbar=document.getElementById('qbar'),time=document.getElementById('time'),result=document.getElementById('result');
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function renderBar(){qbar.innerHTML=questions.map((q,i)=>`<button class="qbtn ${i===current?'current':''} ${state[i].ans!==null&&state[i].ans!==''?'answered':''} ${state[i].marked?'marked':''}" onclick="goQ(${i})">${i+1}</button>`).join('')}
function render(){const q=questions[current];let body=`<div class="qhead"><div class="qnum">Question ${current+1}</div><div class="qtype">${q.type==='tita'?'TITA':'MCQ'}</div></div><div class="direction">Answer the question independently.</div><div class="qtext">${q.q}</div>`;if(q.type==='mcq'){body+=`<div class="options">`+q.o.map((o,i)=>`<label class="option"><input type="radio" name="opt" value="${i}" ${state[current].ans===i?'checked':''} ${submitted?'disabled':''} onchange="state[current].ans=${i};renderBar()"><span>(${String.fromCharCode(65+i)})</span><span>${o}</span></label>`).join('')+`</div>`}else{body+=`<input class="typed-answer" ${submitted?'disabled':''} value="${state[current].ans??''}" oninput="this.value=this.value.replace(/[^0-9]/g,'');state[current].ans=this.value;renderBar()" placeholder="Enter whole number answer"><div class="typed-answer-hint">TITA accepts whole number only.</div>`}if(submitted){let ok=q.type==='mcq'?state[current].ans===q.a:String(state[current].ans).trim()===q.ta;body+=`<div class="answer-note ${ok?'ok':'bad'}">${ok?'Correct':'Incorrect'} | Correct Answer: ${q.ad}</div><div class="solution"><h3>Solution</h3><ol class="solution-steps">${q.s.map(x=>`<li>${x}</li>`).join('')}</ol></div>`}host.innerHTML=body;renderBar()}
function goQ(i){current=i;render()}function nextQ(){if(current<questions.length-1){current++;render()}}function prevQ(){if(current>0){current--;render()}}function markReview(){state[current].marked=!state[current].marked;renderBar()}function clearAns(){if(submitted)return;state[current].ans=null;render()}
function submitTest(){if(submitted)return;submitted=true;document.body.classList.add('submitted');let c=0,w=0,u=0;questions.forEach((q,i)=>{let a=state[i].ans;if(a===null||a==='')u++;else if(q.type==='mcq'?a===q.a:String(a).trim()===q.ta)c++;else w++});let score=c*3-w;result.style.display='block';result.innerHTML=`<div class="score-grid"><div class="score-box">Score<strong>${score}</strong></div><div class="score-box">Correct<strong>${c}</strong></div><div class="score-box">Wrong<strong>${w}</strong></div><div class="score-box">Unattempted<strong>${u}</strong></div><div class="score-box">Total<strong>${questions.length}</strong></div></div>`;render()}
setInterval(()=>{if(submitted)return;seconds=Math.max(0,seconds-1);let m=String(Math.floor(seconds/60)).padStart(2,'0'),s=String(seconds%60).padStart(2,'0');time.textContent=m+':'+s;if(seconds===0)submitTest()},1000);
render();
  </script>
</body>
</html>
