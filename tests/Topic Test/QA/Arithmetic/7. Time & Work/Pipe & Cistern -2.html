      "<p class=\"solution-step\">Let the capacity of the tank be C litres.</p><div class=\"formula-box\">Outlet rates = C/12 and C/15 litres per minute</div><p class=\"solution-step\">Since the tank gets emptied in 20 minutes, the net emptying rate is C/20 litres per minute.</p><div class=\"formula-box\">C/12 + C/15 - 12 = C/20</div><p class=\"solution-step\">Taking LCM 60:</p><div class=\"formula-box\">5C + 4C - 720 = 3C ⇒ 6C = 720 ⇒ C = 120</div><div class=\"final-answer\">Final Answer: 120 litres</div>",
      "<p class=\"solution-step\">Let the capacity be C litres.</p><div class=\"formula-box\">Inlet rates = C/10 + C/20 = 3C/20</div><p class=\"solution-step\">The outlet drains 1710 litres per minute and the tank gets emptied in 25 minutes, so the net emptying rate is C/25.</p><div class=\"formula-box\">1710 - 3C/20 = C/25</div><p class=\"solution-step\">Multiply by 100:</p><div class=\"formula-box\">171000 - 15C = 4C ⇒ 19C = 171000 ⇒ C = 9000</div><div class=\"final-answer\">Final Answer: 9000 litres</div>",
      "<p class=\"solution-step\">Let the capacity be C litres.</p><div class=\"formula-box\">First inlet rate = C/12.5 = 2C/25<br>Second inlet rate = C/(25/3) = 3C/25</div><p class=\"solution-step\">So together the two inlets fill at C/5 litres per minute.</p><p class=\"solution-step\">All three together empty the tank in 4 minutes, so the outlet rate exceeds the inlet rate by C/4.</p><div class=\"formula-box\">162 - C/5 = C/4</div><p class=\"solution-step\">Multiply by 20:</p><div class=\"formula-box\">3240 - 4C = 5C ⇒ 9C = 3240 ⇒ C = 360</div><div class=\"final-answer\">Final Answer: 360 litres</div>",
      "<p class=\"solution-step\">Let the capacity be C litres.</p><div class=\"formula-box\">Outlet rates = C/15 and C/20</div><p class=\"solution-step\">The inlet supplies 91 litres per minute. Since the tank gets filled in 10 minutes, the net filling rate is C/10.</p><div class=\"formula-box\">91 - C/15 - C/20 = C/10</div><p class=\"solution-step\">Multiply by 60:</p><div class=\"formula-box\">5460 - 4C - 3C = 6C ⇒ 13C = 5460 ⇒ C = 420</div><div class=\"final-answer\">Final Answer: 420 litres</div>",
      "<p class=\"solution-step\">Without leakage, the two pipes together fill the tank in:</p><div class=\"formula-box\">1 / (1/14 + 1/16) = 112/15 hours = 7 hours 28 minutes</div><p class=\"solution-step\">Due to leakage, the filling time becomes 32 minutes more, i.e. 8 hours.</p><div class=\"formula-box\">Normal rate = 1/14 + 1/16 = 15/112<br>Actual rate = 1/8 = 14/112</div><p class=\"solution-step\">Leakage rate = 15/112 − 14/112 = 1/112 tank per hour.</p><div class=\"final-answer\">Final Answer: 112 hours</div>",
      "<p class=\"solution-step\">With clogging, the effective rates are:</p><div class=\"formula-box\">First pipe = (4/5)(1/20) = 1/25<br>Second pipe = (3/4)(1/25) = 3/100</div><p class=\"solution-step\">So the clogged combined rate is 1/25 + 3/100 = 7/100 tank per minute.</p><p class=\"solution-step\">After the clogging is removed, the remaining tank is filled in 8 minutes at the normal rate:</p><div class=\"formula-box\">Normal rate = 1/20 + 1/25 = 9/100</div><p class=\"solution-step\">Remaining work after unclogging = 8 × 9/100 = 72/100. Therefore, the work done before unclogging is 28/100.</p><div class=\"formula-box\">Time before unclogging = (28/100) ÷ (7/100) = 4 minutes</div><div class=\"final-answer\">Final Answer: 4 minutes</div>",
      "<p class=\"solution-step\">Let the number of inlet pipes be x and outlet pipes be y.</p><div class=\"formula-box\">x + y = 8</div><p class=\"solution-step\">Each inlet fills 1/8 tank per hour and each outlet empties 1/6 tank per hour. Net rate is 1/8 tank per hour.</p><div class=\"formula-box\">x/8 - y/6 = 1/8</div><p class=\"solution-step\">Multiply by 24:</p><div class=\"formula-box\">3x - 4y = 3</div><p class=\"solution-step\">Using x + y = 8 gives x = 5 and y = 3.</p><div class=\"final-answer\">Final Answer: 5 inlet pipes and 3 outlet pipes</div>",
      "<p class=\"solution-step\">Let x be the number of inlet pipes and y be the number of outlet pipes.</p><div class=\"formula-box\">x + y = 7</div><p class=\"solution-step\">Net filling rate is 1/20 tank per hour.</p><div class=\"formula-box\">x/5 - y/4 = 1/20</div><p class=\"solution-step\">Multiply by 20:</p><div class=\"formula-box\">4x - 5y = 1</div><p class=\"solution-step\">Solving with x + y = 7 gives x = 4 and y = 3.</p><div class=\"final-answer\">Final Answer: 4 inlet pipes and 3 outlet pipes</div>",
      "<p class=\"solution-step\">Let the total time be T minutes.</p><p class=\"solution-step\">For T/2 minutes, only A works; for the remaining T/2 minutes, both A and B work together.</p><div class=\"formula-box\">(T/2)(1/20) + (T/2)(1/20 + 1/30) = 1</div><p class=\"solution-step\">Simplify:</p><div class=\"formula-box\">T/40 + T/24 = 1 ⇒ 8T/120 = 1 ⇒ T = 15</div><div class=\"final-answer\">Final Answer: 15 minutes</div>",
      "<p class=\"solution-step\">Water flow is proportional to the square of the radius.</p><div class=\"formula-box\">Rate ratio = 1² : 2² : 3² = 1 : 4 : 9</div><p class=\"solution-step\">If the thinnest pipe alone fills the tank in 42 minutes, its rate is 1/42 tank per minute.</p><div class=\"formula-box\">Total rate = (1 + 4 + 9) × (1/42) = 14/42 = 1/3</div><div class=\"final-answer\">Final Answer: 3 minutes</div>",
      "<p class=\"solution-step\">With equal water speed, discharge is proportional to cross-sectional area, i.e. to the square of the radius.</p><div class=\"formula-box\">Rate ratio = (1/2)² : 1² : (3/2)² = 1/4 : 1 : 9/4 = 1 : 4 : 9</div><p class=\"solution-step\">Let the rates be x, 4x and 9x. Then 14x fills the tank in 18 minutes.</p><div class=\"formula-box\">14x = 1/18 ⇒ x = 1/252</div><p class=\"solution-step\">Thickest pipe rate = 9x = 1/28.</p><div class=\"final-answer\">Final Answer: 28 minutes</div>",
      "<p class=\"solution-step\">The discharge of a pipe is proportional to area × speed.</p><div class=\"formula-box\">Rate ratio = 1²×3 : (3/2)²×2 : 2²×1 = 3 : 9/2 : 4 = 6 : 9 : 8</div><p class=\"solution-step\">The thinnest pipe corresponds to 6 parts and fills the tank in 46 minutes, so 6 parts = 1/46 tank per minute.</p><div class=\"formula-box\">Total parts = 6 + 9 + 8 = 23<br>Total rate = (23/6)(1/46) = 1/12</div><div class=\"final-answer\">Final Answer: 12 minutes</div>",
      "<p class=\"solution-step\">Boy's rate = 4 litres in 3 minutes = 4/3 litres per minute.</p><div class=\"formula-box\">Girl's rate = 3 litres in 4 minutes = 3/4 litres per minute</div><p class=\"solution-step\">Combined rate:</p><div class=\"formula-box\">4/3 + 3/4 = 25/12 litres per minute</div><p class=\"solution-step\">Time for 100 litres:</p><div class=\"formula-box\">100 ÷ (25/12) = 48 minutes</div><div class=\"final-answer\">Final Answer: 48 minutes</div>",
      "<p class=\"solution-step\">Work is proportional to (number of pumps) × (hours per day) × (days).</p><div class=\"formula-box\">12 × 6 × 15 = n × 9 × 12</div><p class=\"solution-step\">Therefore:</p><div class=\"formula-box\">1080 = 108n ⇒ n = 10</div><div class=\"final-answer\">Final Answer: 10 pumps</div>",
      "<p class=\"solution-step\">Let the inlet alone fill the tank in T hours.</p><p class=\"solution-step\">Leakage is equal to half of the inlet flow, so the net rate becomes half of the inlet rate.</p><div class=\"formula-box\">Actual time = 2T</div><p class=\"solution-step\">Extra time due to leakage = 2T − T = T = 36 hours.</p><div class=\"final-answer\">Final Answer: 36 hours</div>",
      "<p class=\"solution-step\">Initially the cistern is <sup>3</sup>/<sub>4</sub> full.</p><p class=\"solution-step\">When both pipes are opened, net emptying rate is:</p><div class=\"formula-box\">1/5 − 1/8 = 3/40 tank per hour</div><p class=\"solution-step\">Time to empty <sup>3</sup>/<sub>4</sub> tank:</p><div class=\"formula-box\">(3/4) ÷ (3/40) = 10 hours</div><div class=\"final-answer\">Final Answer: 10 hours</div>",
      "<p class=\"solution-step\">Tap A works continuously. B and C work alternately for one hour each.</p><div class=\"formula-box\">Hour 1: A + B = 1/12 + 1/15 = 3/20<br>Hour 2: A + C = 1/12 + 1/20 = 2/15</div><p class=\"solution-step\">Work done in 2 hours:</p><div class=\"formula-box\">3/20 + 2/15 = 17/60</div><p class=\"solution-step\">In 6 hours, work done = 3 × 17/60 = 17/20. Remaining work = 3/20, which is done in the next hour by A + B.</p><div class=\"final-answer\">Final Answer: 7 hours</div>",
      "<p class=\"solution-step\">Let tap A remain open for x minutes. Then B alone works for 25.5 − x minutes.</p><div class=\"formula-box\">Together rate = 1/48 + 1/36 = 7/144<br>B alone rate = 1/36 = 4/144</div><p class=\"solution-step\">Equation:</p><div class=\"formula-box\">(7x/144) + (25.5 - x)(4/144) = 1</div><p class=\"solution-step\">Multiply by 144:</p><div class=\"formula-box\">7x + 102 - 4x = 144 ⇒ 3x = 42 ⇒ x = 14</div><div class=\"final-answer\">Final Answer: 14 minutes</div>",
      "<p class=\"solution-step\">Normal combined rate:</p><div class=\"formula-box\">1/12 + 1/16 = 7/48</div><p class=\"solution-step\">With the problem, the effective rate is:</p><div class=\"formula-box\">(7/8)(1/12) + (5/6)(1/16) = 7/96 + 5/96 = 1/8</div><p class=\"solution-step\">After removal of the problem, the remaining tank is filled in 3 minutes, so remaining work = 3 × 7/48 = 7/16.</p><div class=\"formula-box\">Work done before removal = 1 - 7/16 = 9/16</div><p class=\"solution-step\">Time before removal:</p><div class=\"formula-box\">(9/16) ÷ (1/8) = 9/2 = 4 1/2 minutes</div><div class=\"final-answer\">Final Answer: 4 <sup>1</sup>/<sub>2</sub> minutes</div>",
      "<p class=\"solution-step\">Normal combined rate:</p><div class=\"formula-box\">1/15 + 1/25 = 8/75</div><p class=\"solution-step\">With the problem, the effective rate is:</p><div class=\"formula-box\">(5/6)(1/15) + (5/8)(1/25) = 1/18 + 1/40 = 29/360</div><p class=\"solution-step\">After removal, the remaining tank gets filled in 5 minutes, so remaining work = 5 × 8/75 = 8/15.</p><div class=\"formula-box\">Work done before removal = 1 - 8/15 = 7/15</div><p class=\"solution-step\">Time before removal:</p><div class=\"formula-box\">(7/15) ÷ (29/360) = 168/29 = 5 23/29 minutes</div><div class=\"final-answer\">Final Answer: 5 <sup>23</sup>/<sub>29</sub> minutes</div>",
      "<p class=\"solution-step\">This source is interpreted as the total filling time being 16 <sup>1</sup>/<sub>2</sub> minutes.</p><p class=\"solution-step\">Normal combined rate:</p><div class=\"formula-box\">1/30 + 1/36 = 11/180</div><p class=\"solution-step\">With the problem, the effective rate is:</p><div class=\"formula-box\">(5/6)(1/30) + (9/10)(1/36) = 1/36 + 1/40 = 19/360</div><p class=\"solution-step\">Let the problem be removed after x minutes. Then:</p><div class=\"formula-box\">x(19/360) + (16.5 - x)(11/180) = 1</div><p class=\"solution-step\">Multiply by 360:</p><div class=\"formula-box\">19x + 22(16.5 - x) = 360 ⇒ -3x = -3 ⇒ x = 1</div><div class=\"final-answer\">Final Answer: 1 minute</div>",
      "<p class=\"solution-step\">Together the two pipes fill the tank at:</p><div class=\"formula-box\">1/20 + 1/30 = 1/12 tank per hour</div><p class=\"solution-step\">To fill the first <sup>1</sup>/<sub>3</sub> of the tank, they take:</p><div class=\"formula-box\">(1/3) ÷ (1/12) = 4 hours</div><p class=\"solution-step\">After the leak develops, <sup>1</sup>/<sub>3</sub> of the supplied water leaks out, so only <sup>2</sup>/<sub>3</sub> of the filling rate is effective.</p><div class=\"formula-box\">New effective rate = (2/3)(1/12) = 1/18</div><p class=\"solution-step\">Remaining work = <sup>2</sup>/<sub>3</sub> of the tank, which takes:</p><div class=\"formula-box\">(2/3) ÷ (1/18) = 12 hours</div><div class=\"final-answer\">Final Answer: 16 hours</div>",
      "<p class=\"solution-step\">The four outlet taps are at heights 0, <sup>1</sup>/<sub>4</sub>H, <sup>1</sup>/<sub>2</sub>H and <sup>3</sup>/<sub>4</sub>H. As the water level falls, the upper taps stop working one by one.</p><p class=\"solution-step\">Each tap alone can empty the whole tank in 12 hours, so each tap's rate is 1/12 tank per hour.</p><p class=\"solution-step\">The tank empties in four stages, each stage corresponding to <sup>1</sup>/<sub>4</sub> of the tank:</p><div class=\"formula-box\">Top quarter with 4 taps: (1/4) ÷ (4/12) = 3/4 hour<br>Second quarter with 3 taps: (1/4) ÷ (3/12) = 1 hour<br>Third quarter with 2 taps: (1/4) ÷ (2/12) = 3/2 hours<br>Last quarter with 1 tap: (1/4) ÷ (1/12) = 3 hours</div><p class=\"solution-step\">Total time:</p><div class=\"formula-box\">3/4 + 1 + 3/2 + 3 = 25/4 hours</div><div class=\"final-answer\">Final Answer: 6 <sup>1</sup>/<sub>4</sub> hours</div>"
]

    questions.forEach((q, i) => { q.solution = solutionText[i] || 'Solution not provided.'; });
    let current = 0, submitted = false, secondsLeft = 30 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let v=String(s ?? "");v=v.replace(/(\d+)\s*<sup>(\d+)<\/sup>\/<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');return v.replace(/(^|[^A-Za-z0-9.²>])([A-Za-z0-9.²]+)\/([A-Za-z0-9.²]+)/g,'$1<span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span>');}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="number" min="1" step="1" inputmode="numeric" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type a natural number" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
