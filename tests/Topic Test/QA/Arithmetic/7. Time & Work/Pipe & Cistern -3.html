    const solutionText = [
      "<p class=\"solution-step\">Let the outlet tap C empty the tank in x hours.</p><div class=\"formula-box\">1/10 + 1/12 - 1/x = 1/30</div><p class=\"solution-step\">The two inlet rates add to 11/60, while the net filling rate is 1/30 = 2/60.</p><div class=\"formula-box\">1/x = 11/60 - 2/60 = 9/60 = 3/20</div><div class=\"final-answer\">Final Answer: 20/3 hours = 6 <sup>2</sup>/<sub>3</sub> hours</div>",
      "<p class=\"solution-step\">Convert all rates into tanks per hour.</p><div class=\"formula-box\">A = 1 tank/hour<br>B = 60/75 = 4/5 tank/hour<br>Net rate = 60/50 = 6/5 tank/hour</div><p class=\"solution-step\">Therefore the outlet rate is:</p><div class=\"formula-box\">C = 1 + 4/5 - 6/5 = 3/5 tank/hour</div><p class=\"solution-step\">Time taken by C alone:</p><div class=\"formula-box\">1 ÷ (3/5) = 5/3 hours = 100 minutes</div><div class=\"final-answer\">Final Answer: 100 minutes</div>",
      "<p class=\"solution-step\">Without the outlet, the two inlet pipes together fill at:</p><div class=\"formula-box\">1/5 + 1/20 = 1/4 tank/hour</div><p class=\"solution-step\">So the normal filling time is 4 hours. Because of the outlet, the tank takes 1 hour longer, i.e. 5 hours.</p><div class=\"formula-box\">Outlet rate = 1/4 - 1/5 = 1/20 tank/hour</div><div class=\"final-answer\">Final Answer: 20 hours</div>",
      "<p class=\"solution-step\">The normal combined rate of the two inlet pipes is:</p><div class=\"formula-box\">1/14 + 1/16 = 15/112 tank/hour</div><p class=\"solution-step\">Normal filling time = 112/15 hours = 7 hours 28 minutes. The leak adds 92 minutes, so the actual filling time is 9 hours.</p><div class=\"formula-box\">Leak rate = 15/112 - 1/9 = (135 - 112)/1008 = 23/1008</div><p class=\"solution-step\">Therefore the leak alone empties the tank in:</p><div class=\"formula-box\">1008/23 hours = 43 <sup>19</sup>/<sub>23</sub> hours</div><div class=\"final-answer\">Final Answer: 43 <sup>19</sup>/<sub>23</sub> hours</div>",
      "<p class=\"solution-step\">Let the capacity of the tank be C litres. Work in litres per hour.</p><div class=\"formula-box\">First inlet = C/30<br>Second inlet = C/20<br>Outlet = 45 × 60 = 2700 litres/hour<br>Net filling rate = C/15</div><p class=\"solution-step\">Therefore:</p><div class=\"formula-box\">C/30 + C/20 - 2700 = C/15</div><p class=\"solution-step\">Since 1/30 + 1/20 - 1/15 = 1/60:</p><div class=\"formula-box\">C/60 = 2700 ⇒ C = 162000</div><div class=\"final-answer\">Final Answer: 162000 litres</div>",
      "<p class=\"solution-step\">Let x be the number of inlet taps and y the number of outlet taps.</p><div class=\"formula-box\">x + y = 8</div><p class=\"solution-step\">The net filling rate is 1/3 tank per hour.</p><div class=\"formula-box\">x/12 - y/36 = 1/3</div><p class=\"solution-step\">Multiply by 36:</p><div class=\"formula-box\">3x - y = 12</div><p class=\"solution-step\">Using x + y = 8 gives 4x = 20, so x = 5 and y = 3.</p><div class=\"final-answer\">Final Answer: 5 inlet taps and 3 outlet taps</div>",
      "<p class=\"solution-step\">Let x be the number of inlet taps and 12 - x the number of outlet taps.</p><div class=\"formula-box\">x/6 - (12 - x)/12 = 1/4</div><p class=\"solution-step\">Multiply by 12:</p><div class=\"formula-box\">2x - (12 - x) = 3<br>3x = 15</div><div class=\"final-answer\">Final Answer: 5 inlet taps</div>",
      "<p class=\"solution-step\">The normal combined filling rate of A and B is:</p><div class=\"formula-box\">1/10 + 1/15 = 1/6 tank/hour</div><p class=\"solution-step\">So the tank should normally be full in 6 hours. With C accidentally open, the net rate is:</p><div class=\"formula-box\">1/10 + 1/15 - 1/20 = 7/60</div><p class=\"solution-step\">Work completed in 6 hours:</p><div class=\"formula-box\">6 × 7/60 = 7/10</div><p class=\"solution-step\">Remaining work = 3/10. After C is closed, A and B fill at 1/6 tank per hour.</p><div class=\"formula-box\">Additional time = (3/10) ÷ (1/6) = 9/5 hours</div><div class=\"final-answer\">Final Answer: 1 <sup>4</sup>/<sub>5</sub> hours</div>",
      "<p class=\"solution-step\">The two inlet pipes together fill at:</p><div class=\"formula-box\">1/10 + 1/15 = 1/6 tank/minute</div><p class=\"solution-step\">They should normally fill the tank in 6 minutes. After the outlet is closed, they take 4 more minutes, so the remaining work is:</p><div class=\"formula-box\">4 × 1/6 = 2/3</div><p class=\"solution-step\">Thus only 1/3 of the tank was filled during the first 6 minutes. The net rate with the outlet open was 1/18.</p><div class=\"formula-box\">Outlet rate = 1/6 - 1/18 = 1/9</div><div class=\"final-answer\">Final Answer: 9 minutes</div>",
      "<p class=\"solution-step\">A and B together fill at:</p><div class=\"formula-box\">1/20 + 1/30 = 1/12 tank/minute</div><p class=\"solution-step\">They should normally fill the tank in 12 minutes. After C is closed, they take another 3 minutes, so the remaining work is:</p><div class=\"formula-box\">3 × 1/12 = 1/4</div><p class=\"solution-step\">Hence 3/4 of the tank was filled in the first 12 minutes, giving a net rate of 1/16.</p><div class=\"formula-box\">C's rate = 1/12 - 1/16 = 1/48</div><div class=\"final-answer\">Final Answer: 48 minutes</div>",
      "<p class=\"solution-step\">In every two minutes, the monkey gains:</p><div class=\"formula-box\">6 - 4 = 2 metres</div><p class=\"solution-step\">After 94 minutes, i.e. 47 complete cycles, it is at 94 metres.</p><p class=\"solution-step\">In the 95th minute, it climbs the remaining 6 metres and reaches the top before slipping.</p><div class=\"final-answer\">Final Answer: 95 minutes</div>",
      "<p class=\"solution-step\">In every two minutes, the monkey gains:</p><div class=\"formula-box\">5 - 4 = 1 metre</div><p class=\"solution-step\">After 110 minutes, i.e. 55 complete cycles, it is at 55 metres.</p><p class=\"solution-step\">In the 111th minute, it climbs 5 metres and reaches the top.</p><div class=\"final-answer\">Final Answer: 111 minutes</div>",
      "<p class=\"solution-step\">The work done in one 3-minute cycle A, B, C is:</p><div class=\"formula-box\">1/20 + 1/30 - 1/15 = (3 + 2 - 4)/60 = 1/60</div><p class=\"solution-step\">Therefore 60 such cycles are required.</p><div class=\"formula-box\">Total time = 60 × 3 = 180 minutes</div><div class=\"final-answer\">Final Answer: 180 minutes</div>",
      "<p class=\"solution-step\">The work done in one 3-hour cycle A, B, C is:</p><div class=\"formula-box\">1/10 + 1/20 - 1/12 = (6 + 3 - 5)/60 = 1/15</div><p class=\"solution-step\">Therefore 15 such cycles are required.</p><div class=\"formula-box\">Total time = 15 × 3 = 45 hours</div><div class=\"final-answer\">Final Answer: 45 hours</div>",
      "<p class=\"solution-step\">During the first hour, A and C work together:</p><div class=\"formula-box\">A + C = 1/20 - 1/60 = 1/30</div><p class=\"solution-step\">During the second hour, B and C work together:</p><div class=\"formula-box\">B + C = 1/30 - 1/60 = 1/60</div><p class=\"solution-step\">Work completed in each 2-hour cycle:</p><div class=\"formula-box\">1/30 + 1/60 = 1/20</div><p class=\"solution-step\">Twenty cycles are required.</p><div class=\"formula-box\">Total time = 20 × 2 = 40 hours</div><div class=\"final-answer\">Final Answer: 40 hours</div>",
      "<p class=\"solution-step\">Flow is proportional to the square of the diameter.</p><div class=\"formula-box\">Rate ratio = 1² : 2² : 4² = 1 : 4 : 16</div><p class=\"solution-step\">The largest pipe alone fills the tank in 1 <sup>1</sup>/<sub>20</sub> hours = 21/20 hours, so its rate is 20/21 tank per hour.</p><p class=\"solution-step\">The largest pipe represents 16 rate-parts. Therefore one part is 5/84, and all three pipes together represent 21 parts.</p><div class=\"formula-box\">Combined rate = 21 × 5/84 = 5/4 tank/hour</div><div class=\"formula-box\">Time = 1 ÷ (5/4) = 4/5 hour = 48 minutes</div><div class=\"final-answer\">Final Answer: 48 minutes</div>",
      "<p class=\"solution-step\">Let A and B together fill the tank in x minutes.</p><div class=\"formula-box\">A alone = x + 3 minutes<br>B alone = x + 21 <sup>1</sup>/<sub>3</sub> = x + 64/3 minutes</div><p class=\"solution-step\">Their rates satisfy:</p><div class=\"formula-box\">1/(x + 3) + 1/(x + 64/3) = 1/x</div><p class=\"solution-step\">For two workers, this simplifies to:</p><div class=\"formula-box\">x² = 3 × 64/3 = 64</div><div class=\"final-answer\">Final Answer: 8 minutes</div>"
]

    questions.forEach((q, i) => { q.solution = solutionText[i] || 'Solution not provided.'; });
    let current = 0, submitted = false, secondsLeft = 30 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let v=String(s ?? "");v=v.replace(/(\d+)\s*<sup>(\d+)<\/sup>\/<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');return v.replace(/(^|[^A-Za-z0-9.²>])([A-Za-z0-9.²]+)\/([A-Za-z0-9.²]+)/g,'$1<span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span>');}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="number" min="1" step="1" inputmode="numeric" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type a natural number" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
