  <header><div class="topbar"><div class="title"><h1>Class Sheet L1 - Time &amp; Work, Pipe &amp; Cistern Test -1</h1><div class="meta">Quantitative Aptitude | 10 Questions | 15 Minutes | 2 TITA + 8 MCQ | +3 correct, -1 MCQ wrong, 0 TITA wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">15:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>

    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">x</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">Back</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">sqrt</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
      {
            "q": "64 men can lay a road 50 m long and 2 m wide in 5 days, working 12 hours a day. In how many days will 80 men, working 8 hours a day, lay another road 75 m long and 4 m wide?",
            "type": "text",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "answer": "18",
            "accepted": [
                  "18"
            ]
      },
      {
            "q": "Four pipes of type A and three pipes of type B can empty a tank in 6 hours. Five pipes of type A and seven pipes of type B can empty the same tank in 4 hours. Nearly how long will one pipe each of type A and type B take to empty the tank?",
            "type": "mcq",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "options": [
                  "5 hours",
                  "12 hours",
                  "25 hours",
                  "22 hours"
            ],
            "answer": 3
      },
      {
            "q": "Seven ballerinas dance for 8 hours and lose a total of 20 pounds. How many more ballerinas would be needed to lose the same total in 4 hours if every new ballerina loses weight only half as fast as each of the original seven?",
            "type": "mcq",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "options": [
                  "7",
                  "21",
                  "27",
                  "14"
            ],
            "answer": 3
      },
      {
            "q": "Anshul and Saurabh, working together, solve a problem in 5 minutes. If Anshul worked at twice his present efficiency and Saurabh at half his present efficiency, they would solve it in 4 minutes. How long would Anshul alone take?",
            "type": "mcq",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "options": [
                  "10 minutes",
                  "8 minutes",
                  "12 minutes",
                  "None of these"
            ],
            "answer": 0
      },
      {
            "q": "A regiment of 1500 jawans has food for 30 days. After 20 days, 1000 more jawans join. If the food consumption per jawan per day is reduced to half, how many more days will the food last than it would have without the reinforcement and change in consumption?",
            "type": "text",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "answer": "2",
            "accepted": [
                  "2"
            ]
      },
      {
            "q": "Bucket P has three times the capacity of bucket Q. It takes 60 turns of bucket P to fill an empty drum. How many turns will it take when buckets P and Q are used together?",
            "type": "mcq",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "options": [
                  "30",
                  "40",
                  "45",
                  "90"
            ],
            "answer": 2
      },
      {
            "q": "A tank can be filled by one tap in 10 minutes and by another tap in 30 minutes. Both taps are kept open for 5 minutes and then the first tap is shut off. In how many more minutes is the tank completely filled?",
            "type": "mcq",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "options": [
                  "5",
                  "7.5",
                  "10",
                  "12"
            ],
            "answer": 2
      },
      {
            "q": "A and B can complete a work in 30 days, B and C in 24 days, and C and A in 20 days. All three work for 10 days, after which B and C leave. How many more days will A take to finish the work?",
            "type": "mcq",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "options": [
                  "<sup>45</sup>/<sub>11</sub> days",
                  "<sup>9</sup>/<sub>2</sub> days",
                  "8 days",
                  "18 days"
            ],
            "answer": 3
      },
      {
            "q": "Anand and Bharat can cut 5 kg of wood in 20 minutes. Bharat and Chandra can cut 5 kg in 40 minutes. Chandra and Anand can cut 5 kg in 30 minutes. How much time will Chandra alone take to cut 5 kg?",
            "type": "mcq",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "options": [
                  "120 minutes",
                  "48 minutes",
                  "240 minutes",
                  "<sup>120</sup>/<sub>7</sub> minutes"
            ],
            "answer": 2
      },
      {
            "q": "A group of students volunteered to finish a work in 25 days. Ten students did not turn up, so the work was finished in 35 days. What was the original number of students?",
            "type": "mcq",
            "source": "Class Sheet L1 | Time & Work, Pipe & Cistern",
            "options": [
                  "25",
                  "30",
                  "35",
                  "45"
            ],
            "answer": 2
      }
]

    const solutionText = [
      "<p class=\"solution-step\">Road work is proportional to length × width, and capacity is proportional to men × days × hours.</p><div class=\"formula-box\">New work / old work = (75 × 4)/(50 × 2) = 3</div><div class=\"formula-box\">64 × 5 × 12 × 3 = 80 × d × 8</div><p class=\"solution-step\">Solving gives d = 18.</p><div class=\"final-answer\">Final Answer: 18 days</div>",
      "<p class=\"solution-step\">Let the hourly emptying rates of one A-type and one B-type pipe be a and b.</p><div class=\"formula-box\">4a + 3b = 1/6<br>5a + 7b = 1/4</div><p class=\"solution-step\">Solving gives a = 5/156 and b = 1/78.</p><div class=\"formula-box\">a + b = 7/156 ⇒ time = 156/7 ≈ 22.29 hours</div><div class=\"final-answer\">Final Answer: Approximately 22 hours</div>",
      "<p class=\"solution-step\">Take the rate of each original ballerina as 1 unit per hour. Total effort used initially = 7 × 8 = 56 units.</p><div class=\"formula-box\">In 4 hours: 4(7 + x/2) = 56</div><p class=\"solution-step\">Thus 7 + x/2 = 14, so x = 14.</p><div class=\"final-answer\">Final Answer: 14 more ballerinas</div>",
      "<p class=\"solution-step\">Let their present rates be a and s problems per minute.</p><div class=\"formula-box\">a + s = 1/5<br>2a + s/2 = 1/4</div><p class=\"solution-step\">Multiplying the second equation by 2 gives 4a + s = 1/2. Subtracting the first equation gives 3a = 3/10, so a = 1/10.</p><div class=\"final-answer\">Final Answer: 10 minutes</div>",
      "<p class=\"solution-step\">Initial food = 1500 × 30 = 45,000 normal jawan-days. Food used in 20 days = 30,000, so 15,000 remain.</p><p class=\"solution-step\">After reinforcement, 2500 jawans consume at half rate, equivalent to 1250 normal jawans.</p><div class=\"formula-box\">New remaining duration = 15,000/1250 = 12 days</div><p class=\"solution-step\">Without any change, the remaining food would last 15,000/1500 = 10 days.</p><div class=\"final-answer\">Final Answer: 2 more days</div>",
      "<p class=\"solution-step\">Let bucket Q hold 1 unit, so bucket P holds 3 units. The drum capacity is 60 × 3 = 180 units.</p><div class=\"formula-box\">Capacity poured per combined turn = 3 + 1 = 4 units</div><div class=\"formula-box\">Number of turns = 180/4 = 45</div><div class=\"final-answer\">Final Answer: 45 turns</div>",
      "<div class=\"formula-box\">Combined rate = 1/10 + 1/30 = 2/15 tank per minute</div><p class=\"solution-step\">In 5 minutes they fill 2/3 of the tank, leaving 1/3.</p><p class=\"solution-step\">The second tap alone fills at 1/30 tank per minute.</p><div class=\"formula-box\">Time for remaining 1/3 = (1/3)/(1/30) = 10 minutes</div><div class=\"final-answer\">Final Answer: 10 minutes</div>",
      "<p class=\"solution-step\">Add the three pair rates to get twice the rate of A + B + C.</p><div class=\"formula-box\">2(A+B+C) = 1/30 + 1/24 + 1/20 = 1/8<br>A+B+C = 1/16</div><p class=\"solution-step\">In 10 days, all three finish 10/16 = 5/8, leaving 3/8.</p><div class=\"formula-box\">A = (1/30 + 1/20 - 1/24)/2 = 1/48</div><div class=\"formula-box\">Time = (3/8)/(1/48) = 18 days</div><div class=\"final-answer\">Final Answer: 18 days</div>",
      "<p class=\"solution-step\">Let the rates for completing one 5-kg job be A, B and C.</p><div class=\"formula-box\">A+B = 1/20, B+C = 1/40, C+A = 1/30</div><div class=\"formula-box\">2C = 1/40 + 1/30 - 1/20 = 1/120</div><p class=\"solution-step\">Therefore C = 1/240 job per minute.</p><div class=\"final-answer\">Final Answer: 240 minutes</div>",
      "<p class=\"solution-step\">Let the original number of students be n. Total work in student-days is unchanged.</p><div class=\"formula-box\">25n = 35(n - 10)</div><p class=\"solution-step\">25n = 35n − 350, hence n = 35.</p><div class=\"final-answer\">Final Answer: 35 students</div>"
]

    questions.forEach((q, i) => { q.solution = solutionText[i] || 'Solution not provided.'; });
    let current = 0, submitted = false, secondsLeft = 15 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let v=String(s ?? "");v=v.replace(/(\d+)\s*<sup>(\d+)<\/sup>\/<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');return v.replace(/(^|[^A-Za-z0-9.²>])([A-Za-z0-9.²]+)\/([A-Za-z0-9.²]+)/g,'$1<span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span>');}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="text" inputmode="decimal" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your numerical answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;let score=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r){c++;score+=3;}else{w++;if(qType(q)==='mcq')score-=1;}});resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
