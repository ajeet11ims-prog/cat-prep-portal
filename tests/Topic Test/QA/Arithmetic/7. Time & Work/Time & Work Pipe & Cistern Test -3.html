    const solutionText = [
      "<p class=\"solution-step\">Let the time taken together be x days. Then A alone takes x + 8 days and B alone takes x + 18 days.</p><div class=\"formula-box\">1/(x+8) + 1/(x+18) = 1/x</div><p class=\"solution-step\">Cross-multiplying gives x² = 144, so x = 12.</p><div class=\"formula-box\">A alone = x + 8 = 20 days</div><div class=\"final-answer\">Final Answer: 20 days</div>",
      "<p class=\"solution-step\">Take each full-time worker’s daily work as 1 unit. Total work = 4 × 11 = 44 units.</p><p class=\"solution-step\">Effective daily workforce = 1 + 1 + 1/2 + 1/4 = 11/4 units.</p><div class=\"formula-box\">Time = 44 ÷ (11/4) = 16 days</div><div class=\"final-answer\">Final Answer: 16 days</div>",
      "<p class=\"solution-step\">Every individual pipe appears in exactly k − 1 different pairs.</p><div class=\"formula-box\">Work done using all pairs = (k−1)(P₁+P₂+...+Pₖ)</div><p class=\"solution-step\">The final one hour with all pipes adds one more (P₁+...+Pₖ).</p><div class=\"formula-box\">Total work = k(P₁+...+Pₖ)</div><p class=\"solution-step\">Hence the process lasts k hours.</p><div class=\"final-answer\">Final Answer: k hours</div>",
      "<p class=\"solution-step\">People required are directly proportional to apples and inversely proportional to time.</p><div class=\"formula-box\">M₂ = 18 × (12/18) × (18/12) = 18</div><div class=\"final-answer\">Final Answer: 18 people</div>",
      "<p class=\"solution-step\">Their rates are proportional to 1/4, 1/8, 1/16 and 1/32, or 8x, 4x, 2x and x.</p><p class=\"solution-step\">The faster pair must have rate 3/2 times the slower pair, since it takes 2/3 of the time.</p><div class=\"formula-box\">A + D = 8x + x = 9x<br>B + C = 4x + 2x = 6x<br>9x = (3/2)(6x)</div><div class=\"final-answer\">Final Answer: A and D</div>",
      "<div class=\"formula-box\">Y’s rate = 1/8 - 1/12 = 1/24</div><div class=\"final-answer\">Final Answer: 24 days</div>",
      "<p class=\"solution-step\">Let the total duration be x days. X works x days, Y works 4 days and Z works 10 days.</p><div class=\"formula-box\">x/20 + 4/30 + 10/60 = 1</div><p class=\"solution-step\">This gives x = 14 days. Since the first 10 days have already elapsed, X needs 4 more days.</p><div class=\"final-answer\">Final Answer: 4 days</div>",
      "<p class=\"solution-step\">Let Y’s efficiency be 1. Then X’s efficiency is 1.25, so X takes only 1/1.25 = 0.8 times Y’s time.</p><p class=\"solution-step\">X’s hourly wage is 1.25 times Y’s. Total wage for the same job is hourly wage × time.</p><div class=\"formula-box\">X total wage / Y total wage = 1.25 × 0.8 = 1</div><div class=\"final-answer\">Final Answer: ₹75</div>",
      "<p class=\"solution-step\">Let M, W, B and G denote daily wages.</p><div class=\"formula-box\">6M = 8W, 2W = 3B, 4B = 5G</div><p class=\"solution-step\">Therefore M = (4/3)(3/2)(5/4)G = (5/2)G.</p><div class=\"formula-box\">M = (5/2) × 50 = 125</div><div class=\"final-answer\">Final Answer: ₹125</div>",
      "<p class=\"solution-step\">Let the initial number of workers be n. With one worker withdrawn each day, work done is proportional to n + (n−1) + ... + 1 = n(n+1)/2.</p><p class=\"solution-step\">With no withdrawal, completion time would be 33⅓% less than n days, i.e. 2n/3 days, so work would be n × 2n/3.</p><div class=\"formula-box\">n(n+1)/2 = 2n²/3</div><p class=\"solution-step\">This gives 3(n+1)=4n, hence n=3.</p><div class=\"final-answer\">Final Answer: 3 workers</div>",
      "<p class=\"solution-step\">Convert all rates to buckets per minute: A = 1/6, B = 2/15, C = 1/10.</p><div class=\"formula-box\">Total rate = 1/6 + 2/15 + 1/10 = 2/5 bucket/min</div><p class=\"solution-step\">In 120 minutes, the amount discharged is 120 × 2/5 = 48 buckets.</p><div class=\"formula-box\">Capacity = 48 × 5 = 240 litres</div><div class=\"final-answer\">Final Answer: 240 litres</div>",
      "<p class=\"solution-step\">Let the first curator’s time be X days and the second’s time be Y days.</p><div class=\"formula-box\">3/X + 2/Y = 11/20</div><p class=\"solution-step\">At completion each has done half. The first worked X/2 days and the second Y/2 days. Since the second started one day later:</p><div class=\"formula-box\">X/2 - Y/2 = 1</div><p class=\"solution-step\">Solving gives X=10 and Y=8.</p><div class=\"final-answer\">Final Answer: 8 days</div>",
      "<p class=\"solution-step\">Since tap i has the same rate as all previous taps together, each new tap doubles the cumulative rate.</p><p class=\"solution-step\">If tap 4 takes 40 minutes, tap 5 takes 20 minutes, tap 6 takes 10 minutes, tap 7 takes 5 minutes and tap 8 takes 2.5 minutes.</p><div class=\"formula-box\">Combined time = 1/(1/5 + 1/2.5) = 5/3 ≈ 1.66 minutes</div><div class=\"final-answer\">Final Answer: 1.66 minutes</div>",
      "<p class=\"solution-step\">Each new tap has the same rate as all preceding taps together, which equals the rate of the immediately preceding cumulative total. Hence each new tap’s rate is double the previous tap’s rate.</p><p class=\"solution-step\">The 15th tap therefore fills at 2 × 1427 L/hour, which is 100% more.</p><div class=\"final-answer\">Final Answer: 100% more</div>",
      "<p class=\"solution-step\">Let hourly rates be p and q. Total work satisfies 24p = 20q, so q = 6p/5.</p><p class=\"solution-step\">Working 4 hours daily together, daily work is 4(p+q)=4(p+6p/5)=44p/5.</p><div class=\"formula-box\">Days = 24p ÷ (44p/5) = 30/11</div><div class=\"final-answer\">Final Answer: <sup>30</sup>/<sub>11</sub> days</div>",
      "<p class=\"solution-step\">The remaining work is 1/5, and A+B complete it in 6 days.</p><div class=\"formula-box\">A+B rate = (1/5)/6 = 1/30</div><div class=\"final-answer\">Final Answer: 30 days</div>",
      "<p class=\"solution-step\">One inlet has rate +1/6 and one drain has rate −1/12. A group of one inlet and two drains has net rate zero.</p><p class=\"solution-step\">To achieve a net rate of 1/2, three extra inlet pipes are needed beyond any number of zero-net groups.</p><div class=\"formula-box\">Therefore n must be a multiple of 3</div><p class=\"solution-step\">Among the listed values, 24, 33 and 9 qualify.</p><div class=\"final-answer\">Final Answer: 3 values</div>",
      "<p class=\"solution-step\">Let A:B efficiency = 2:1, so if A takes x days, B takes 2x days.</p><div class=\"formula-box\">A+B rate = 1/x + 1/(2x) = 3/(2x)</div><div class=\"formula-box\">C+D rate = 1/30 + 1/45 = 1/18</div><p class=\"solution-step\">Equating gives 3/(2x)=1/18, so x=27.</p><div class=\"final-answer\">Final Answer: 27 days</div>",
      "<p class=\"solution-step\">In the same n days: A+B = 50%, B+C = 70%, A+B+C = 100%.</p><div class=\"formula-box\">B = (A+B)+(B+C)-(A+B+C) = 20%</div><p class=\"solution-step\">Thus A=30%, B=20% and C=50% of the work in n days.</p><div class=\"final-answer\">Final Answer: C</div>",
      "<p class=\"solution-step\">Three inlet pipes exactly cancel two drain pipes: 3/20 − 2/30 = 1/12, not zero. More directly, let f be fill pipes and d drain pipes.</p><div class=\"formula-box\">f/20 - d/30 = 1/5 ⇒ 3f - 2d = 12</div><p class=\"solution-step\">With n=f+d, integer solutions require n = 5k + 4. Among the given values, 54 and 29 satisfy this form.</p><div class=\"final-answer\">Final Answer: II and III only</div>"
]

    questions.forEach((q, i) => { q.solution = solutionText[i] || 'Solution not provided.'; });
    let current = 0, submitted = false, secondsLeft = 30 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let v=String(s ?? "");v=v.replace(/(\d+)\s*<sup>(\d+)<\/sup>\/<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');return v.replace(/(^|[^A-Za-z0-9.²>])([A-Za-z0-9.²]+)\/([A-Za-z0-9.²]+)/g,'$1<span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span>');}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="text" inputmode="decimal" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your numerical answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;let score=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r){c++;score+=3;}else{w++;if(qType(q)==='mcq')score-=1;}});resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
