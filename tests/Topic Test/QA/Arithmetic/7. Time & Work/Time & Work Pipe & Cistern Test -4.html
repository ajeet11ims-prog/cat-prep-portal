    const solutionText = [
      "<p class=\"solution-step\">Take tank capacity as 15 units. A fills 2 units/min, B fills 3 units/min, and C empties 1 unit/min.</p><p class=\"solution-step\">In the first minute, net work = 2+3−1 = 4 units, leaving 11 units.</p><div class=\"formula-box\">After C closes, A+B fill 5 units/min. Time = 11/5 = 2 1/5 minutes</div><div class=\"final-answer\">Final Answer: 2 <sup>1</sup>/<sub>5</sub> minutes</div>",
      "<div class=\"formula-box\">Net filling requires 1/p + 1/q > 1/r</div><p class=\"solution-step\">Multiplying by pqr gives qr + pr > pq, or pq < qr + rp.</p><div class=\"final-answer\">Final Answer: pq < qr + rp</div>",
      "<p class=\"solution-step\">Let their joint time be t hours. Then individual times are t+6, t+1 and 2t.</p><div class=\"formula-box\">1/(t+6) + 1/(t+1) + 1/(2t) = 1/t</div><p class=\"solution-step\">Solving gives 3t² + 7t − 6 = 0, so t=2/3 hour.</p><div class=\"final-answer\">Final Answer: 40 minutes</div>",
      "<p class=\"solution-step\">C completes 2/12 = 1/6. A and B then complete 2(1/6+1/8)=7/12.</p><div class=\"formula-box\">Completed = 1/6 + 7/12 = 3/4; remaining = 1/4</div><div class=\"formula-box\">A alone time = (1/4)/(1/6) = 3/2 hours</div><div class=\"final-answer\">Final Answer: 1.5 hours</div>",
      "<p class=\"solution-step\">After 46 days, 10 days remain. During those 10 days, 200 men finish the remaining work.</p><p class=\"solution-step\">The same remaining work would take 20 days for 100 men.</p><p class=\"solution-step\">Instead of finishing in 56 days, it would finish after 46+20=66 days.</p><div class=\"final-answer\">Final Answer: 10 days</div>",
      "<p class=\"solution-step\">Let the larger pipe take t minutes, so the smaller takes t+30 minutes. Together they take t−10 minutes.</p><div class=\"formula-box\">1/t + 1/(t+30) = 1/(t-10)</div><p class=\"solution-step\">This simplifies to t² − 20t − 300 = 0, giving t=30.</p><div class=\"final-answer\">Final Answer: 30 minutes</div>",
      "<p class=\"solution-step\">The numbers are 18 men, 15 women and 6 children. Their work rates are in the ratio 6:3:1.</p><div class=\"formula-box\">Total work-units = 18×6 + 15×3 + 6×1 = 159</div><p class=\"solution-step\">The 6 children together receive 6/159 of ₹1113 = ₹42.</p><div class=\"formula-box\">One child = 42/6 = ₹7</div><div class=\"final-answer\">Final Answer: ₹7</div>",
      "<p class=\"solution-step\">In each 3-minute cycle, work done is 1/15 + 1/20 − 1/30 = 1/12.</p><p class=\"solution-step\">After 33 minutes, 11 cycles complete 11/12, leaving 1/12.</p><p class=\"solution-step\">Minute 34: A fills 1/15, leaving 1/60. B then fills the remainder in (1/60)/(1/20)=1/3 minute.</p><div class=\"final-answer\">Final Answer: 34 <sup>1</sup>/<sub>3</sub> minutes</div>",
      "<p class=\"solution-step\">Each leak empties water at an equivalent vertical rate of 100/200 = 0.5 m per hour.</p><div class=\"formula-box\">Top 20 m: 5 leaks ⇒ 20/(2.5)=8 h<br>Next 20 m: 4 leaks ⇒ 20/2=10 h<br>Next: 3 leaks ⇒ 20/1.5=13.33 h<br>Next: 2 leaks ⇒ 20/1=20 h<br>Last: 1 leak ⇒ 20/0.5=40 h</div><div class=\"formula-box\">Total = 8 + 10 + 13.33 + 20 + 40 = 91.33 hours</div><div class=\"final-answer\">Final Answer: Approximately 91.33 hours</div>",
      "<p class=\"solution-step\">Compute each tank’s net rate.</p><div class=\"formula-box\">A: +90−20−10 = +60 L/min<br>B: +20+110−100 = +30 L/min<br>C: +100−90−50 = −40 L/min<br>D: +10+50−110 = −50 L/min</div><p class=\"solution-step\">D loses fastest and empties in 1000/50=20 minutes.</p><div class=\"final-answer\">Final Answer: Tank D, 20 minutes</div>",
      "<p class=\"solution-step\">Total work = 24×16 = 384 man-days. Since 32 women×24 days equals the same work, 1 man = 2 woman-days.</p><p class=\"solution-step\">Sixteen men + sixteen women = 16 + 8 = 24 men-equivalent. In 12 days they complete 288 man-days, leaving 96.</p><div class=\"formula-box\">(16+x + 8)×2 = 96 ⇒ x=24</div><div class=\"final-answer\">Final Answer: 24 additional men</div>",
      "<p class=\"solution-step\">Replace 18 boys by 9 men. Bilaspur work = 21 men × 7.5 × 60.</p><p class=\"solution-step\">Harigarh work is twice this amount.</p><p class=\"solution-step\">Let a boys join 21 men. Their man-equivalent workforce is 21 + a/2.</p><div class=\"formula-box\">(21+a/2)×9×50 = 2×21×7.5×60</div><p class=\"solution-step\">Solving gives a=42.</p><div class=\"final-answer\">Final Answer: 42 boys</div>",
      "<p class=\"solution-step\">The completed 2/5 equals 104×8×30 man-hours. The remaining 3/5 is therefore this amount multiplied by 3/2.</p><div class=\"formula-box\">Remaining work = 104×8×30×3/2</div><p class=\"solution-step\">There are 26 days left at 9 hours/day. Let additional men be a.</p><div class=\"formula-box\">(104+a)×9×26 = 104×8×30×3/2</div><p class=\"solution-step\">Solving gives a=56.</p><div class=\"final-answer\">Final Answer: 56 men</div>",
      "<p class=\"solution-step\">One man’s rate is 1/120 and one woman’s rate is 1/240.</p><p class=\"solution-step\">Initial daily rate = 8/120 + 4/240 = 1/12. In 9 days they complete 3/4, leaving 1/4.</p><p class=\"solution-step\">After 10 women join, daily rate = 8/120 + 14/240 = 1/8.</p><div class=\"formula-box\">Time = (1/4)/(1/8)=2 days</div><div class=\"final-answer\">Final Answer: 2 days</div>",
      "<p class=\"solution-step\">Take total work as 40 units. Normal daily rates are P=10, Q=8, R=5.</p><p class=\"solution-step\">Reduced rates are P=6, Q=4, R=4.</p><div class=\"formula-box\">Day 1 P+Q=10 units<br>Day 2 Q+R=8<br>Day 3 R+P=10<br>Day 4 P+Q=10</div><p class=\"solution-step\">After 4 days, 38 units are complete. Q+R finish the remaining 2 units at 8 units/day in 1/4 day.</p><div class=\"final-answer\">Final Answer: 4 <sup>1</sup>/<sub>4</sub> days</div>",
      "<p class=\"solution-step\">Let x be inlet pipes and 20−x outlet pipes.</p><div class=\"formula-box\">x/8 - (20-x)/24 = 1/2</div><p class=\"solution-step\">Multiplying by 24 gives 3x−20+x=12, so x=8.</p><div class=\"final-answer\">Final Answer: 8 inlet pipes</div>",
      "<p class=\"solution-step\">There are 35 men and 55 women. A man’s daily work is twice a woman’s, so wage ratio per worker is 2:1.</p><div class=\"formula-box\">Total wage-units = 35×2 + 55×1 = 125</div><div class=\"formula-box\">One woman’s wage = 13,750/125 = ₹110</div><div class=\"final-answer\">Final Answer: ₹110</div>",
      "<p class=\"solution-step\">If B’s efficiency is 1 unit/hour, A’s is 0.2 unit/hour. Together they work at 1.2 units/hour.</p><p class=\"solution-step\">In 60 hours, tank capacity is 72 units.</p><div class=\"formula-box\">A alone time = 72/0.2 = 360 hours</div><div class=\"final-answer\">Final Answer: 360 hours</div>",
      "<p class=\"solution-step\">From 18 men×12 days = 24 women×18 days, one man equals two women.</p><p class=\"solution-step\">Twelve men + twelve women = 24+12=36 women-equivalent. In 9 days they complete 324 woman-days.</p><p class=\"solution-step\">Total work = 24×18=432 woman-days, leaving 108.</p><p class=\"solution-step\">Current 12 men+12 women already equal 36 women, so additional women needed =108−36=72.</p><div class=\"final-answer\">Final Answer: 72 women</div>",
      "<p class=\"solution-step\">Anand works a total of 14 days after Shiva leaves plus the common working time x. Shiva works only x days.</p><div class=\"formula-box\">(x+14)/18 + x/22 = 1</div><p class=\"solution-step\">Solving gives x = 11/5 = 2.2 days.</p><div class=\"final-answer\">Final Answer: 2.2 days</div>",
      "<p class=\"solution-step\">Giraj is half as efficient: he builds in 12 days and demolishes in 8 days.</p><p class=\"solution-step\">Over the first 8 days, the repeating contributions are 1/6, 1/12, 1/6, −1/8, giving 7/24 per 4 days; twice gives 14/24.</p><p class=\"solution-step\">Remaining after day 8 is 10/24. Day 9 Sahil adds 1/6, day 10 Giraj builds 1/12, and day 11 Sahil adds 1/6.</p><div class=\"formula-box\">14/24 + 4/24 + 2/24 + 4/24 = 1</div><div class=\"final-answer\">Final Answer: 11th day</div>",
      "<p class=\"solution-step\">If A takes x days, B takes 1.4x days because A is 40% more efficient. Given B takes 10 days more: 1.4x=x+10, so x=25 and B=35 days.</p><p class=\"solution-step\">Since B is 20% more efficient than C, C takes 1.2×35=42 days.</p><p class=\"solution-step\">Take total work LCM(25,35,42)=1050 units. Rates are A=42, B=30, C=25 units/day.</p><div class=\"formula-box\">Work done by A and B = 10×42 + 15×30 = 870<br>Remaining = 180 units</div><div class=\"formula-box\">C time = 180/25 = 7.2 days</div><div class=\"final-answer\">Final Answer: 7.2 days</div>",
      "<p class=\"solution-step\">Let skilled and unskilled workers be S and U.</p><div class=\"formula-box\">S/15 + U/60 = 1/3 ⇒ 4S + U = 20</div><p class=\"solution-step\">Positive integer solutions are (S,U)=(1,16),(2,12),(3,8),(4,4). Odd totals occur for 17 and 11.</p><div class=\"final-answer\">Final Answer: 11 workers</div>",
      "<p class=\"solution-step\">A’s first 3 days complete 3/10. B’s next 3 days destroy 3/15=1/5. Net after 6 days =1/10.</p><p class=\"solution-step\">In the next 3 days together, net rate is 1/10−1/15=1/30, so they add 1/10. Total completed =1/5.</p><p class=\"solution-step\">Remaining work =4/5. A alone at 1/10 per day needs 8 days.</p><div class=\"final-answer\">Final Answer: 8 days</div>",
      "<p class=\"solution-step\">Take total work as 90 units. Hourly rates are A=9, B=6, C=3 and D=2 units.</p><p class=\"solution-step\">By 8:00 a.m.: A works 4 hours (36 units), B 2 hours (12), C 1 hour (3), total 51 units. Remaining =39 units.</p><p class=\"solution-step\">After 8:00 a.m. all four work at 20 units/hour, requiring 39/20≈1.95 hours.</p><div class=\"final-answer\">Final Answer: Approximately 10:00 a.m.</div>"
]

    questions.forEach((q, i) => { q.solution = solutionText[i] || 'Solution not provided.'; });
    let current = 0, submitted = false, secondsLeft = 45 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let v=String(s ?? "");v=v.replace(/(\d+)\s*<sup>(\d+)<\/sup>\/<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');return v.replace(/(^|[^A-Za-z0-9.²>])([A-Za-z0-9.²]+)\/([A-Za-z0-9.²]+)/g,'$1<span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span>');}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="text" inputmode="decimal" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your numerical answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;let score=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r){c++;score+=3;}else{w++;if(qType(q)==='mcq')score-=1;}});resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
