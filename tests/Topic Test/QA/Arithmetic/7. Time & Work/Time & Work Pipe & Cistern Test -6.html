    const solutionText = [
  "<p class=\"solution-step\">Q’s rate is the difference between the joint rate and P’s rate.</p><div class=\"formula-box\">Q = 1/12 − 1/20 = 1/30</div><div class=\"final-answer\">Final Answer: 30 days</div>",
  "<p class=\"solution-step\">A completes 6/24 = 1/4 of the work in 6 days, leaving 3/4.</p><div class=\"formula-box\">A + B rate = 1/24 + 1/48 = 1/16</div><div class=\"formula-box\">Time for remaining work = (3/4) ÷ (1/16) = 12 days</div><div class=\"final-answer\">Final Answer: 12 days</div>",
  "<p class=\"solution-step\">Let Rakesh join after x days. Rajesh works for all 10 days and Rakesh works for 10 − x days.</p><div class=\"formula-box\">10/12 + (10 − x)/24 = 1</div><p class=\"solution-step\">Solving gives 20 + 10 − x = 24, so x = 6.</p><div class=\"final-answer\">Final Answer: 6 days</div>",
  "<p class=\"solution-step\">C works throughout the entire job.</p><p class=\"solution-step\">During the first 5 days, C completes 5/60 = 1/12. During the next 5 days, C completes another 1/12.</p><p class=\"solution-step\">After 10 days, A, B and C together have completed 5/12 + 1/4 + 1/6 = 5/6, leaving 1/6 for C.</p><div class=\"formula-box\">Total work completed by C = 1/12 + 1/12 + 1/6 = 5/12</div><div class=\"final-answer\">Final Answer: 5/12</div>",
  "<p class=\"solution-step\">Let the total time be t days. A works for 4 days, B for t − 2 days and C for t days.</p><div class=\"formula-box\">4/12 + (t − 2)/16 + t/20 = 1</div><p class=\"solution-step\">Multiplying by 240 gives 80 + 15t − 30 + 12t = 240.</p><div class=\"formula-box\">27t = 190 ⇒ t = 190/27 = 7 1/27</div><div class=\"final-answer\">Final Answer: 7 <sup>1</sup>/<sub>27</sub> days</div>",
  "<p class=\"solution-step\">Let A and B take a and b days alone.</p><div class=\"formula-box\">0.2a + 0.8b = 20<br>0.8a + 0.2b = 30</div><p class=\"solution-step\">Solving gives a = 100/3 days and b = 50/3 days.</p><div class=\"formula-box\">Combined rate = 3/100 + 3/50 = 9/100</div><div class=\"formula-box\">Combined time = 100/9 = 11 1/9 days</div><div class=\"final-answer\">Final Answer: 11 <sup>1</sup>/<sub>9</sub> days</div>",
  "<p class=\"solution-step\">Individual times are A = 1 day, B = 2 days, C = 4 days and D = 8 days.</p><div class=\"formula-box\">Time of A + B = 1 ÷ (1 + 1/2) = 2/3 day<br>Time of C + D = 1 ÷ (1/4 + 1/8) = 8/3 days</div><p class=\"solution-step\">The faster pair takes only (2/3)/(8/3) = 25% of the slower pair’s time, which is at most 40%.</p><div class=\"final-answer\">Final Answer: A and B</div>",
  "<p class=\"solution-step\">Wages are proportional to work done, that is, rate × days.</p><div class=\"formula-box\">First wage-units = 1×15 + 3×20 + 2×25 = 125</div><p class=\"solution-step\">₹5000 corresponds to 125 units, so each unit is ₹40.</p><div class=\"formula-box\">New units = 1×10 + 3×15 + 2×12 = 79</div><div class=\"formula-box\">New wages = 79 × ₹40 = ₹3160</div><div class=\"final-answer\">Final Answer: ₹3160</div>",
  "<p class=\"solution-step\">For the first job, efficiency ratio A:B:C = 1/20 : 1/15 : 1/30 = 3:4:2.</p><p class=\"solution-step\">For the second job, efficiency ratio A:B:C = 1/15 : 1/25 : 1/10 = 10:6:15.</p><div class=\"formula-box\">First-job payments: A = ₹4000×3/9, B = ₹4000×4/9, C = ₹4000×2/9<br>Second-job payments: A = ₹10000×10/31, B = ₹10000×6/31, C = ₹10000×15/31</div><p class=\"solution-step\">Adding each person’s two payments shows that B receives the minimum total amount.</p><div class=\"final-answer\">Final Answer: B</div>",
  "<p class=\"solution-step\">Wages are proportional to efficiencies.</p><div class=\"formula-box\">Mahesh : Suresh : Naresh = 6300 : 7350 : 8400 = 6 : 7 : 8</div><p class=\"solution-step\">Their combined rate is 1/4. Naresh’s rate is 8/21 of the total.</p><div class=\"formula-box\">Naresh’s rate = 8/21 × 1/4 = 2/21</div><div class=\"formula-box\">Naresh’s time = 21/2 = 10.5 days</div><div class=\"final-answer\">Final Answer: 10.5 days</div>",
  "<p class=\"solution-step\">Every completed jump-and-slip cycle gives a net gain of 1 metre. The boy must not slip after the final jump.</p><p class=\"solution-step\">After 98 jumps and slips, he is at 98 metres. On the 99th jump he reaches 100 metres.</p><div class=\"final-answer\">Final Answer: 99 jumps</div>",
  "<p class=\"solution-step\">Work is proportional to wall height.</p><div class=\"formula-box\">25 × 20 × 10 = m × 10 × 8</div><p class=\"solution-step\">Therefore, m = 40.</p><div class=\"final-answer\">Final Answer: 40 men</div>",
  "<p class=\"solution-step\">The same 64 men working 8 hours per day for 5 days complete 40% of the work.</p><div class=\"formula-box\">For the remaining 60%: (4 × h)/(5 × 8) = 60/40</div><p class=\"solution-step\">Thus 4h = 60, so h = 15.</p><div class=\"final-answer\">Final Answer: 15 hours per day</div>",
  "<p class=\"solution-step\">A works for 2 days and completes 2/8 = 1/4.</p><p class=\"solution-step\">B and E work for 3 days and complete 3(1/12 + 1/24) = 3/8.</p><div class=\"formula-box\">Completed = 1/4 + 3/8 = 5/8; remaining = 3/8</div><p class=\"solution-step\">C completes half the remaining work, 3/16, in 3 days. D completes the other 3/16 in 15/4 days.</p><div class=\"formula-box\">Total time = 2 + 3 + 3 + 15/4 = 47/4 = 11 3/4 days</div><div class=\"final-answer\">Final Answer: 11 <sup>3</sup>/<sub>4</sub> days</div>",
  "<p class=\"solution-step\">Let the promised total wage be W and the unfinished fraction after 14 days be u.</p><p class=\"solution-step\">The forfeiture is three times the wage corresponding to unfinished work, so 3uW = 3W/8.</p><div class=\"formula-box\">u = 1/8; completed fraction in 14 days = 7/8</div><p class=\"solution-step\">Thus their combined rate is (7/8)/14 = 1/16. Anil’s rate is 1/80.</p><div class=\"formula-box\">Bala’s rate = 1/16 − 1/80 = 1/20</div><div class=\"final-answer\">Final Answer: 20 days</div>",
  "<p class=\"solution-step\">In each two-day cycle, Q and P complete 1/16 + 1/12 = 7/48.</p><p class=\"solution-step\">After 12 days, 6 cycles complete 42/48 = 7/8. On day 13, Q completes 1/16 = 3/48, leaving 3/48 = 1/16.</p><div class=\"formula-box\">P’s time for the remainder = (1/16) ÷ (1/12) = 3/4 day</div><div class=\"formula-box\">Total = 13 3/4 days</div><div class=\"final-answer\">Final Answer: 13 <sup>3</sup>/<sub>4</sub> days</div>",
  "<p class=\"solution-step\">A takes half B’s time, so A is twice as efficient as B.</p><p class=\"solution-step\">Let B’s rate be 1 unit/hour and A’s rate be 2 units/hour. Their total rate is 3 units/hour.</p><div class=\"formula-box\">Tank capacity = 3 × 8 = 24 units</div><div class=\"formula-box\">A’s time = 24/2 = 12 hours</div><div class=\"final-answer\">Final Answer: 12 hours</div>",
  "<p class=\"solution-step\">In the first 10 minutes, the two pipes fill:</p><div class=\"formula-box\">10(1/40 + 1/60) = 10/24 = 5/12</div><p class=\"solution-step\">The remaining part is 7/12 and P₂ alone fills at 1/60 tank per minute.</p><div class=\"formula-box\">Time = (7/12) ÷ (1/60) = 35 minutes</div><div class=\"final-answer\">Final Answer: 35 minutes</div>",
  "<p class=\"solution-step\">By 11:00 a.m., P has worked for 3 hours and Q for 1 hour.</p><div class=\"formula-box\">Work done = 3/8 + 1/10 = 19/40</div><p class=\"solution-step\">Remaining = 21/40. After 11:00 a.m., all three work at:</p><div class=\"formula-box\">1/8 + 1/10 + 1/12 = 37/120</div><div class=\"formula-box\">Time for remaining work = (21/40) ÷ (37/120) = 63/37 hours ≈ 1 hour 42 minutes</div><div class=\"final-answer\">Final Answer: Approximately 12:42 p.m.</div>",
  "<p class=\"solution-step\">By 10:00 a.m., A has worked for 3 hours, B for 2 hours and C for 1 hour.</p><div class=\"formula-box\">Work done = 3/6 + 2/8 + 1/10 = 17/20</div><p class=\"solution-step\">Remaining = 3/20. All four together work at:</p><div class=\"formula-box\">1/6 + 1/8 + 1/10 + 1/12 = 19/40</div><div class=\"formula-box\">Time after 10:00 = (3/20) ÷ (19/40) = 6/19 hour ≈ 19 minutes</div><div class=\"final-answer\">Final Answer: Approximately 10:19 a.m.</div>",
  "<p class=\"solution-step\">Let the rates be p, q and r. The combined rate is 1/10.</p><p class=\"solution-step\">P takes three times the time of Q and R together, so q + r = 3p. Hence p + q + r = 4p and p = 1/40.</p><p class=\"solution-step\">Q takes twice the time of P and R together, so p + r = 2q. Hence p + q + r = 3q and q = 1/30.</p><div class=\"formula-box\">r = 1/10 − 1/40 − 1/30 = 1/24</div><div class=\"final-answer\">Final Answer: 24 hours</div>",
  "<p class=\"solution-step\">For the first 5 minutes, all three taps fill at 1/20 + 1/30 + 1/40 = 13/120 per minute.</p><div class=\"formula-box\">Work in first 5 minutes = 65/120</div><p class=\"solution-step\">For the next 6 minutes, B and C fill 6(1/30 + 1/40) = 42/120.</p><div class=\"formula-box\">Total after 11 minutes = 107/120; remaining = 13/120</div><p class=\"solution-step\">After B closes and the leak starts, net rate = 1/40 − 1/60 = 1/120.</p><div class=\"formula-box\">Additional time = 13 minutes; total time = 5 + 6 + 13 = 24 minutes</div><div class=\"final-answer\">Final Answer: 24 minutes</div>",
  "<p class=\"solution-step\">In each three-hour cycle, the filled portion is:</p><div class=\"formula-box\">1/7 + 1/14 + 1/21 = 11/42</div><p class=\"solution-step\">After 9 hours, three cycles fill 33/42 = 11/14. In the 10th hour A adds 1/7 = 2/14, leaving 1/14. B fills this in the 11th hour.</p><div class=\"final-answer\">Final Answer: 11 hours</div>",
  "<p class=\"solution-step\">The net filling rate is:</p><div class=\"formula-box\">3/20 + 2/25 − 4/40 − 5/50</div><div class=\"formula-box\">= 15/100 + 8/100 − 10/100 − 10/100 = 3/100</div><div class=\"formula-box\">Time = 1 ÷ 3/100 = 100/3 = 33 1/3 hours</div><div class=\"final-answer\">Final Answer: 33 <sup>1</sup>/<sub>3</sub> hours</div>",
  "<p class=\"solution-step\">Let the number of type-D pipes be n.</p><div class=\"formula-box\">1/20 + 1/25 − 1/40 − n/50 = 1/40</div><p class=\"solution-step\">Simplifying gives 1/25 = n/50.</p><div class=\"formula-box\">n = 2</div><div class=\"final-answer\">Final Answer: 2 pipes</div>",
  "<p class=\"solution-step\">P and Q together fill at 1/8 + 1/24 = 1/6 tank per hour.</p><p class=\"solution-step\">The outlet is above the two-thirds level, so it does not operate while the lower two-thirds is filling.</p><div class=\"formula-box\">Time for lower 2/3 = (2/3) ÷ (1/6) = 4 hours</div><p class=\"solution-step\">For the top one-third, the outlet empties at (1/3)/4 = 1/12 tank per hour.</p><div class=\"formula-box\">Net rate above the outlet = 1/6 − 1/12 = 1/12</div><div class=\"formula-box\">Time for top 1/3 = (1/3) ÷ (1/12) = 4 hours</div><div class=\"final-answer\">Final Answer: 8 hours</div>",
  "<p class=\"solution-step\">A and B together fill at 1/20 + 1/30 = 1/12 tank per hour, so without the outlet the tank should be full in 12 hours.</p><p class=\"solution-step\">After the outlet is closed, the two inlets take 6 more hours, meaning half the tank was still empty.</p><div class=\"formula-box\">Work filled during the first 12 hours = 1/2 ⇒ net rate = 1/24</div><div class=\"formula-box\">Outlet rate = 1/12 − 1/24 = 1/24</div><div class=\"final-answer\">Final Answer: 24 hours</div>",
  "<p class=\"solution-step\">Let the tank capacity be V litres. Pipe B fills at V/4 litres/hour and C empties at V/12 litres/hour.</p><div class=\"formula-box\">50 + V/4 − V/12 = V</div><p class=\"solution-step\">So 50 + V/6 = V, giving 50 = 5V/6.</p><div class=\"formula-box\">V = 60 litres</div><div class=\"final-answer\">Final Answer: 60 litres</div>",
  "<p class=\"solution-step\">Let all three together fill the tank in t hours.</p><div class=\"formula-box\">1/(6t) + 1/(7t − 40) + 1/(t + 10) = 1/t</div><p class=\"solution-step\">The positive solutions are t = 10 and t = 200/13. Since t is an integer, t = 10.</p><div class=\"formula-box\">X alone = 60 hours, Y alone = 30 hours, Z alone = 20 hours</div><p class=\"solution-step\">The shortest individual time corresponds to the greatest efficiency.</p><div class=\"final-answer\">Final Answer: Z</div>",
  "<p class=\"solution-step\">Let Sᵢ be the combined rate of pipes P₁ through Pᵢ. For i > 1, the rate of Pᵢ is 3Sᵢ₋₁.</p><div class=\"formula-box\">Sᵢ = Sᵢ₋₁ + 3Sᵢ₋₁ = 4Sᵢ₋₁</div><p class=\"solution-step\">Therefore, each successive individual pipe from P₂ onward has four times the rate of the preceding pipe.</p><div class=\"formula-box\">Rate of Pₙ = 4³ × rate of Pₙ₋₃ = 64 × rate of Pₙ₋₃</div><div class=\"formula-box\">Time of Pₙ = 128/64 = 2 minutes</div><div class=\"final-answer\">Final Answer: 2 minutes</div>"
];

    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;let score=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r){c++;score+=3;}else{w++;if(qType(q)==='mcq')score-=1;}});resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
