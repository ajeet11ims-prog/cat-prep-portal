  "<div class=\"formula-box\">Work ∝ men × days × hours</div><p class=\"solution-step\">Equating productivity: p/(xkh) = m/(n·h·k).</p><div class=\"formula-box\">n = mx/p</div><div class=\"final-answer\">Final Answer: mx/p</div>",
  "<div class=\"formula-box\">30 × 7 × 18 = 21 × 8 × d</div><p class=\"solution-step\">d = 3780/168 = 22.5 days.</p><div class=\"final-answer\">Final Answer: 22 <sup>1</sup>/<sub>2</sub> days</div>",
  "<div class=\"formula-box\">Net rate = 1/3 − 1/4 = 1/12 tank per hour</div><div class=\"final-answer\">Final Answer: 12 hours</div>",
  "<p class=\"solution-step\">A works for all 8 minutes and fills 8/10 = 4/5 of the tank. B must fill the remaining 1/5.</p><div class=\"formula-box\">Time for B = (1/5) ÷ (1/20) = 4 minutes</div><div class=\"final-answer\">Final Answer: 4 minutes</div>",
  "<p class=\"solution-step\">Adding pair rates gives 2(A+B+C) = 1/12 + 1/15 + 1/20 = 1/5, so all three work at 1/10 per day.</p><p class=\"solution-step\">In 4 days they complete 2/5, leaving 3/5.</p><div class=\"formula-box\">Time by A+B = (3/5) ÷ (1/12) = 36/5 days</div><div class=\"final-answer\">Final Answer: 36/5 days</div>",
  "<p class=\"solution-step\">In a two-day cycle, A and B complete 1/15 + 1/20 = 7/60.</p><p class=\"solution-step\">After 16 days, 14/15 is complete. A completes the remaining 1/15 in one day.</p><div class=\"final-answer\">Final Answer: 17 days</div>",
  "<p class=\"solution-step\">Let C’s rate be c. Using A+B = 1/12 and B+C = 1/16:</p><div class=\"formula-box\">5(A+B) + 2B + 13C = 1</div><p class=\"solution-step\">Substituting B = 1/16 − C gives C = 1/24.</p><div class=\"final-answer\">Final Answer: 24 days</div>",
  "<p class=\"solution-step\">In 1.5 days, the man and woman complete 1.5(1/3 + 1/4) = 7/8. The remaining 1/8 is exactly what one boy completes in 1.5 days.</p><div class=\"final-answer\">Final Answer: 1 boy</div>",
  "<p class=\"solution-step\">New output compared with the old output:</p><div class=\"formula-box\">(30×12×15)/(20×6×30) = 3/2</div><p class=\"solution-step\">New area = 120×3/2 = 180 acres, which is 60 acres more.</p><div class=\"final-answer\">Final Answer: 60 acres</div>",
  "<div class=\"formula-box\">20x + 15(35 − x) = 20×30</div><p class=\"solution-step\">Solving gives x = 15.</p><div class=\"final-answer\">Final Answer: 15 days</div>",
  "<p class=\"solution-step\">The daily workforce is 25, 26, 27, …</p><div class=\"formula-box\">x(49+x)/2 = 330</div><p class=\"solution-step\">x = 11 satisfies the equation.</p><div class=\"final-answer\">Final Answer: 11 days</div>",
  "<div class=\"formula-box\">A+B = 1/9<br>A/2 + 2B = 1/6</div><p class=\"solution-step\">Solving gives B = 2/27.</p><div class=\"final-answer\">Final Answer: 27/2 days</div>",
  "<p class=\"solution-step\">Hari requires 108 working hours and Raghu requires 36 working hours.</p><div class=\"formula-box\">Combined hourly rate = 1/108 + 1/36 = 1/27</div><p class=\"solution-step\">At 2.5 hours per day, daily work = 2.5/27.</p><div class=\"formula-box\">Days = 27/2.5 = 10.8</div><div class=\"final-answer\">Final Answer: 10.8 days</div>",
  "<p class=\"solution-step\">R completes one-third in 8/3 days, so R’s rate is 1/8.</p><p class=\"solution-step\">Before R starts, two-thirds is complete. P contributes 8/24 = 1/3 during his 8 days, so Q contributes the other 1/3 in 4 days.</p><div class=\"formula-box\">Q’s rate = 1/12</div><div class=\"final-answer\">Final Answer: 12 days</div>",
  "<div class=\"formula-box\">15n = 18(n − 4)</div><p class=\"solution-step\">3n = 72, so n = 24.</p><div class=\"final-answer\">Final Answer: 24 men</div>",

  "<p class=\"solution-step\">For the same reference work, rates are Sanjay:Vijay:Ajay = 1/16:1/24:1/32 = 6:4:3.</p><p class=\"solution-step\">Ajay contributes 3/13 of the combined rate.</p><div class=\"formula-box\">Ajay-alone time = 24×13/3 = 104 hours</div><div class=\"final-answer\">Final Answer: 104 hours</div>",

  "<div class=\"formula-box\">Combined apple rate = 3/5 + 6/4 = 21/10 apples per day</div><div class=\"formula-box\">Time = 21 ÷ 21/10 = 10 days</div><div class=\"final-answer\">Final Answer: 10 days</div>",

  "<p class=\"solution-step\">Let 10 men take d days. Then 8 men take d+3 days.</p><div class=\"formula-box\">10d = 8(d+3) ⇒ d = 12</div><p class=\"solution-step\">Total work = 120 man-days.</p><div class=\"formula-box\">Time for 24 men = 120/24 = 5 days</div><div class=\"final-answer\">Final Answer: 5 days</div>",
  "<p class=\"solution-step\">Let A’s efficiency be 1. Then B=2, D=3/4 and C=1/4. Total efficiency = 4.</p><p class=\"solution-step\">B contributes 2/4 = half the total output.</p><div class=\"formula-box\">B’s production = 256/2 = 128</div><div class=\"final-answer\">Final Answer: 128 pieces</div>",
  "<p class=\"solution-step\">Tarun’s wage share is 24000/90000 = 4/15, so he completes 4/15 of the work. At his normal rate 1/16, the total project duration is 64/15 days.</p><p class=\"solution-step\">Shyam completes 8/15, so Ram completes 1/5 on day 1. Ram’s normal daily work is 1/4.</p><div class=\"formula-box\">Capacity used = (1/5)/(1/4) = 4/5 = 80%</div><div class=\"final-answer\">Final Answer: 80%</div>",
  "<p class=\"solution-step\">Efficiency ratio = 1/16 : 1/18 : 1/20 = 45 : 40 : 36.</p><div class=\"formula-box\">B’s share = 1089×40/(45+40+36) = 1089×40/121 = ₹360</div><div class=\"final-answer\">Final Answer: ₹360</div>",
  "<p class=\"solution-step\">A+B+C rate = 1/10 + 1/15 + 1/20 = 13/60. In 4 days they complete 13/15, so D completes 2/15.</p><div class=\"formula-box\">D’s wage = 3750×2/15 = ₹500</div><div class=\"final-answer\">Final Answer: ₹500</div>",
  "<p class=\"solution-step\">Let one goat’s daily cost be g. One cow costs 5g.</p><div class=\"formula-box\">10(20×5g + 40g) = 460 ⇒ 1400g = 460</div><div class=\"formula-box\">New cost = 12(50×5g + 30g) = 3360g = ₹1104</div><div class=\"final-answer\">Final Answer: ₹1104</div>",
  "<div class=\"formula-box\">Net emptying rate = 1/6 − 1/18 − 1/27 = 2/27 tank per minute</div><div class=\"formula-box\">Time to empty 2/3 = (2/3) ÷ (2/27) = 9 minutes</div><div class=\"final-answer\">Final Answer: 9 minutes</div>",
  "<p class=\"solution-step\">In the first 4 minutes, P and Q fill 4(1/20 + 1/25) = 9/25. The remaining part is 16/25.</p><div class=\"formula-box\">Time by Q = (16/25) ÷ (1/25) = 16 minutes</div><div class=\"final-answer\">Final Answer: 16 minutes</div>",
  "<p class=\"solution-step\">In the first minute, net work = 1/12 + 1/18 − 1/24 = 7/72. Remaining = 65/72.</p><div class=\"formula-box\">X+Y rate = 1/12 + 1/18 = 5/36</div><div class=\"formula-box\">Additional time = (65/72) ÷ (5/36) = 13/2 = 6 1/2 minutes</div><div class=\"final-answer\">Final Answer: 6 <sup>1</sup>/<sub>2</sub> minutes</div>",
  "<div class=\"formula-box\">Leak rate = 1/8 − 1/10 = 1/40 tank per hour</div><div class=\"formula-box\">Time to empty 3/5 = (3/5) ÷ (1/40) = 24 hours</div><div class=\"final-answer\">Final Answer: 24 hours</div>",
  "<p class=\"solution-step\">From 6 a.m. to 8 p.m. is 14 hours. Let both pipes run for x hours.</p><div class=\"formula-box\">x(1/12−1/18) + (14−x)/12 = 1</div><p class=\"solution-step\">Solving gives x = 3 hours.</p><div class=\"final-answer\">Final Answer: B was closed at 9 a.m.</div>",
  "<p class=\"solution-step\">All three fill 1/3 in the first 2 hours. A and B then fill the remaining 2/3 in 8 hours, so A+B rate = 1/12.</p><div class=\"formula-box\">C’s rate = 1/6 − 1/12 = 1/12</div><div class=\"final-answer\">Final Answer: 12 hours</div>",
  "<p class=\"solution-step\">Each three-minute cycle adds 1/20 + 1/30 − 1/15 = 1/60.</p><p class=\"solution-step\">After 55 cycles, 11/12 is filled in 165 minutes. A then adds 1/20 and B adds 1/30, completing the tank at minute 167.</p><div class=\"final-answer\">Final Answer: 167 minutes</div>",
  "<p class=\"solution-step\">Let C’s efficiency be 1. Then B=1.6 and A=2.88. From the 40-day difference, B takes 90 days, A 50 days and C 144 days.</p><p class=\"solution-step\">A does 25/50 = 1/2 and B does 30/90 = 1/3. Remaining = 1/6.</p><div class=\"formula-box\">C’s time = (1/6)×144 = 24 days</div><div class=\"final-answer\">Final Answer: 24 days</div>",
  "<p class=\"solution-step\">All three together work at 1/8. In the first 4 days they complete 1/2. Then A+C work for 3 days at 1/15 and complete 1/5. Remaining = 3/10.</p><div class=\"formula-box\">A+B finish at 1/10, requiring 3 days</div><div class=\"formula-box\">Total time = 4+3+3 = 10 days</div><div class=\"final-answer\">Final Answer: 10 days</div>",
  "<p class=\"solution-step\">Let P=1. Then Q=1.5, R=2 and S=3. All four together have rate 7.5.</p><div class=\"formula-box\">Time ratio = (1/7.5)/(1/3) = 3/7.5 = 2/5</div><div class=\"final-answer\">Final Answer: 2/5</div>",
  "<p class=\"solution-step\">Statement I gives only the starting time and is insufficient. Statement II gives a uniform rate: 3/8 tank in 1.5 hours = 1/4 tank per hour, so the remaining 1/4 after 11 a.m. takes one hour.</p><div class=\"final-answer\">Final Answer: (A) Exactly one statement alone is sufficient</div>",
  "<p class=\"solution-step\">From Statement I, man = 10 − 5 = 5 pots/day, so 100 pots take 20 days. From Statement II, using man = 2×child also determines the man’s rate. Each statement alone is sufficient.</p><div class=\"final-answer\">Final Answer: (B) Either statement alone is sufficient</div>",
  "<p class=\"solution-step\">The stem gives the soldier-ant rate. Statement I directly gives the queen-ant rate. Statement II also determines the queen-ant rate because the mixed-team time and soldier rate are known. Either statement alone is sufficient.</p><div class=\"final-answer\">Final Answer: (B) Either statement alone is sufficient</div>",
  "<p class=\"solution-step\">Statement I gives individual rates but not Tarun’s joining time. Statement II gives the schedule but not rates. Together they determine the remaining work when Tarun joins and therefore how long he works.</p><div class=\"final-answer\">Final Answer: (C) Both statements together are required</div>",
  "<p class=\"solution-step\">Statement I only shows that Chadda is less efficient than the combined Arun-Bhargav team; it cannot distinguish Arun from Bhargav. Statement II gives Arun’s rate as Bhargav+Chadda, so Arun is individually the most efficient.</p><div class=\"final-answer\">Final Answer: (A) Exactly one statement alone is sufficient</div>",
  "<p class=\"solution-step\">Statement I provides only the alternation schedule. Statement II determines the effective individual work rates from their completion patterns and is sufficient to determine the alternating completion time.</p><div class=\"final-answer\">Final Answer: (A) Exactly one statement alone is sufficient</div>",
  "<p class=\"solution-step\">Statement I gives the efficiency ratio Varun:Sameer = 3:1, so Sameer’s share is determined. Statement II, together with the 25-day combined time, also determines Sameer’s rate. Either statement alone is sufficient.</p><div class=\"final-answer\">Final Answer: (B) Either statement alone is sufficient</div>",
  "<p class=\"solution-step\">Statement I gives the staggered opening pattern but not tap capacity. Statement II gives tap capacity but not the schedule. Both are needed.</p><div class=\"final-answer\">Final Answer: (C) Both statements together are required</div>",
  "<p class=\"solution-step\">Statement I determines Vashist’s rate but not the split between Rishab and Shrayan. Statement II relates Vashist and Shrayan. Together they determine Shrayan and then Rishab.</p><div class=\"final-answer\">Final Answer: (C) Both statements together are required</div>",
  "<p class=\"solution-step\">The total rate is known from the stem. Statement I gives B+C+D and Statement II gives A+B+C. Both are needed to isolate B+C.</p><div class=\"formula-box\">B+C = 13/48 + 3/8 − 7/17 = 191/816</div><div class=\"final-answer\">Final Answer: (C) Both statements together are required</div>"

    questions.forEach((q, i) => { q.solution = solutionText[i] || 'Solution not provided.'; });
    let current = 0, submitted = false, secondsLeft = 90 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let v=String(s ?? "");v=v.replace(/(\d+)\s*<sup>(\d+)<\/sup>\/<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');return v.replace(/(^|[^A-Za-z0-9.²>])([A-Za-z0-9.²]+)\/([A-Za-z0-9.²]+)/g,'$1<span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span>');}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(q.palette || (i+1))+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="text" inputmode="decimal" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your numerical answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(q.display || (current+1))+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;let score=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r){c++;score+=3;}else{w++;if(qType(q)==='mcq')score-=1;}});resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
