<head>

  <style>
    :root{--ink:#101820;--muted:#5f6f7a;--line:#b8c3cc;--brand:#0b75bb;--brand-dark:#24313a;--brand-mid:#4089c8;--soft:#dff3fb;--ok:#60b947;--bad:#e55b25;--review:#7b4ab0;--paper:#fff;--bg:#eef3f7}
    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;grid-template-rows:minmax(0,1fr);gap:0;margin:0;padding:0;background:#fff;position:relative}main>section{grid-column:1;grid-row:1;min-width:0;min-height:0;border-right:2px solid #41515c;display:flex;flex-direction:column;overflow:hidden}main>section>#result{flex:0 0 auto}main>section>#testForm{flex:1 1 auto;min-height:0;overflow:hidden}main>aside:first-child{grid-column:2;grid-row:1}.panel,.question-card,#result{background:var(--paper);border:0;border-radius:0}.panel{padding:14px;align-self:stretch;position:static;background:#e5f6fc}.question-palette-panel{display:flex;flex-direction:column;overflow:auto}.calc-wrap{position:fixed!important;top:120px;left:52%;width:264px;z-index:50;border:1px solid #7c8991;box-shadow:0 7px 18px rgba(0,0,0,.28);display:none;padding:0;align-self:auto;background:#eee}.calc-wrap.open{display:block}.panel h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--brand-mid);color:#fff;font-weight:700}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#7fd7f2;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin:18px 0;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;min-height:0;overflow-y:auto;overflow-x:hidden;padding:0 0 88px;background:#fff;scroll-behavior:smooth;overscroll-behavior:contain}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:block;font-size:13px;color:var(--muted);margin-top:2px}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px;white-space:pre-wrap}.qtext p,.block p,.option p{margin:0 0 10px}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,calc(100% - 48px));font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 28px;padding:16px 18px 24px;border:1px solid var(--line);border-radius:4px;background:#fbfcfd;font-size:17px;line-height:1.6;white-space:normal;overflow:visible}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

    .formula-box{margin:14px 0;padding:12px 14px;border:2px solid #2d7fb8;background:#f4fbff;font-size:17px;font-weight:700}
    .shortcut-box{margin:14px 0;padding:12px 14px;border-left:5px solid #60b947;background:#f5fbf2}
    .final-answer{margin-top:14px;padding:10px 12px;background:#fff7df;border:1px solid #e4c86d;font-size:18px;font-weight:800}
    .solution-step{margin:0 0 10px}
    .mixed-number{display:inline-flex;align-items:center;gap:.18em;white-space:nowrap}.math-frac{display:inline-grid;grid-template-rows:auto auto;min-width:1.35em;margin:0 .1em;vertical-align:middle;text-align:center;font-size:.82em;line-height:1}.math-frac .frac-num{padding:0 .12em .08em;border-bottom:1.5px solid currentColor}.math-frac .frac-den{padding:.08em .12em 0}.option .math-frac{font-size:.78em}.formula-box .math-frac,.final-answer .math-frac{font-size:.86em}
  </style>

<body>
  <header><div class="topbar"><div class="title"><h1>Time &amp; Work Test -1</h1><div class="meta">Quantitative Aptitude | 13 Questions | 30 Minutes | +3 correct, -1 wrong</div></div><button type="button" class="calc-toggle" id="calcToggle" title="Open calculator" aria-label="Open calculator"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" fill="#fff4cf" stroke="#8f6500" stroke-width="1.7"/><rect x="8" y="5" width="8" height="3" rx=".6" fill="#8f6500"/><circle cx="8.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="12" cy="12" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="12" r="1.2" fill="#8f6500"/><circle cx="8.5" cy="16" r="1.2" fill="#8f6500"/><circle cx="12" cy="16" r="1.2" fill="#8f6500"/><circle cx="15.5" cy="16" r="1.2" fill="#8f6500"/></svg></button><div class="timer">Time Left: <span id="time">30:00</span></div></div></header>
  <main>
    <aside class="panel question-palette-panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div><button type="button" class="side-submit" onclick="submitTest()">Submit</button></aside>
    <section><div id="result"></div><form id="testForm" autocomplete="off"><div id="questionHost" class="question-card"></div></form></section>
    <aside class="panel calc-wrap" id="calcPopup"><div class="calc"><div class="calc-title" id="calcDragHandle"><span>Normal Calculator</span><span class="calc-title-actions"><span class="calc-min">-</span><button type="button" class="calc-close" id="calcClose" title="Close calculator">x</button></span></div><input id="calcDisplay" class="calc-display" readonly><div class="calc-subdisplay" id="calcSubDisplay">0</div><div class="calc-grid"><button type="button" data-calc="MC">MC</button><button type="button" data-calc="MR">MR</button><button type="button" data-calc="MS">MS</button><button type="button" data-calc="M+">M+</button><button type="button" data-calc="M-">M-</button><button type="button" data-calc="B" class="red">Back</button><button type="button" data-calc="C" class="red">C</button><button type="button" data-calc="+/-" class="red">+/-</button><button type="button" data-calc="sqrt">sqrt</button><button type="button" data-calc="%">%</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="/">/</button><button type="button" data-calc="1/x">1/x</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="*">*</button><button type="button" data-calc="=" class="eq">=</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="-">-</button><button type="button" data-calc="0">0</button><button type="button" data-calc=".">.</button><button type="button" data-calc="+">+</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside>
  </main>
  <script>
    const questions = [
      { q: "Hardik earns ₹ 28000 per month at the start of the year, and wants to save an average of ₹ 5000 per month during this year. In the first three months, his monthly expense was ₹ 24500, and he foresees that, from April onwards, his monthly expense will increase to ₹ 29500. By what percentage should his monthly earnings grow if he wishes to meet his yearly savings target?", type: "mcq", options: ["20", "23.33", "26.67", "25"], answer: 3 },
      { q: "Due to excess supply, the price of mangoes reduced by 25%. As a result, Reshma could purchase 400 gm extra mangoes with the fixed budget she allotted for mangoes. What was the quantity (in grams) of mangoes that Reshma had initially planned to purchase?", type: "text", answer: "1200", accepted: ["1200"] },
      { q: "Among all the students of a school, 30% belong to 'A' ethnicity, 20% belong to 'B' ethnicity, 12.5% belong to 'C' ethnicity, and the rest belong to 'D' ethnicity. A single student cannot belong to more than one ethnicity. Among the students in the school 15% of A, 10% of B, 20% of C and 12% of D can speak in English. What percentage of English speaking students in the school belong to 'D' ethnicity?", type: "mcq", options: ["22 <sup>2</sup>/<sub>9</sub>%", "27 <sup>3</sup>/<sub>11</sub>%", "33 <sup>1</sup>/<sub>3</sub>%", "37 <sup>3</sup>/<sub>7</sub>%"], answer: 2 },
      { q: "A cricket ball weighs only 25% of a football. A tennis ball and a cricket ball together weighs 40% of the weight of a football and a tennis ball together. What is the weight of a tennis ball as a percentage of the weight of a football?", type: "text", answer: "25", accepted: ["25"] },
      { q: "Neeraj is the sole earner of his family. He saves a certain amount from his salary after taking care of the household expenses. Every month, out of his savings, he deposits 25% in a recurring bank deposit, gives 33 <sup>1</sup>/<sub>3</sub>% of the remaining amount to his mother and he equally divides the remaining amount among his sisters for their pocket money. If the total monthly amount distributed by him among his family members (his mother and sisters) is Rs. 3000, then the amount (in Rs.) he deposits in his recurring bank deposit account in one year is ________.", type: "mcq", options: ["1000", "4000", "6000", "12000"], answer: 3 },
      { q: "In a locality, over a period of 5 years, the total income of the households increased by 35% and the per capita income increased by 25% during the same time. The percentage by which the population of the locality increased during the same period is ______________.", type: "mcq", options: ["12", "10", "8", "6"], answer: 2 },
      { q: "A trader buys potatoes and onions in equal quantities every month. He had to spend Rs. 3000 extra this month as the prices of potatoes and onions increased by 25% and 20% respectively. If the trader used to buy potatoes worth Rs. 8000 every month before the price increase, then the amount he had to spend on buying onions this month, in INR, is _____________.", type: "mcq", options: ["4500", "5000", "5500", "6000"], answer: 3 },
      { q: "In a garden, 59% of the trees are coconut trees and the rest are mango trees. The number of coconut trees exceeds that of mango trees by 180. If 54% trees, including 245 mango trees, in the garden are older than 10 years, then the percentage of coconut trees, which are ten years or less older, is ___________.", type: "text", answer: "50", accepted: ["50"] },
      { q: "The income tax rule of a country has three slabs: no tax to be paid up to 500000, 10% tax on the income more than 500000 to 1000000, 20% tax on the income beyond 1000000 (all income slabs mentioned above are annual income and has been expressed in the respective currency of the country). Raja had a net annual earning of 992000 after paying the income tax on his annual gross income. The amount of his gross annual income is __________. (Net annual income = annual gross income - tax paid)", type: "mcq", options: ["1052500", "1054500", "1052000", "1054000"], answer: 0 },
      { q: "Naveen expected that his annual electricity consumption (in units) for the year 2023 will be in the ratio of 3 : 7 : 6 : 4 in the first, second, third and the fourth quarter respectively, and accordingly he allotted Rs. 14000 for the annual electricity bill. The actual bills for the first three quarters deviated from his expectations by +10%, +5%, and -4%, respectively. By what percentage should Naveen reduce his electricity consumption in the fourth quarter to meet the allotted annual budget assuming that electricity bill is directly proportional to units consumed?", type: "mcq", options: ["10 <sup>1</sup>/<sub>4</sub>", "12 <sup>2</sup>/<sub>3</sub>", "14 <sup>1</sup>/<sub>2</sub>", "18 <sup>1</sup>/<sub>3</sub>"], answer: 0 },
      { q: "Amit's present age in years is 75% less than that of Chandan's. In another few years, Amit's age will be one-third of Chandan's. By what percentage will Chandan's age increase during this period?", type: "mcq", options: ["10%", "12.5%", "25%", "30%"], answer: 1 },
      { q: "In the year 2019, the adult population in a suburban town was 9,12,800. The population was categorized into two groups only - male and female. In 2022, the town had a total adult population of 10,40,592. During this period, the adult male population increased by 12.5% and the adult female population increased by 15.5%. The number of adult male population in the town in 2022 was __________.", type: "mcq", options: ["514350", "513450", "456400", "454600"], answer: 1 },
      { q: "A box contains small cubes made of either only wood or only metal. Some cubes are of red colour and the rest are of green colour. The number of red cubes is three times that of green cubes. Among the red cubes, 44% are made of metal and among the green cubes, 48% are made of metal. What percentages of cubes are made up of wood?", type: "mcq", options: ["55", "52", "48", "45"], answer: 0 },
      { q: "The speed of a conveyor belt in an assembly line is controlled using a digital control device. The speed of the conveyor belt at the beginning of the day remains 1200 items per hour. After the lapse of every hour, the speed is reduced by a fixed percentage. The speed of the belt becomes 768 items per hour after two such reductions. At the end of the 3rd hour of the operation the speed of the belt is increased to the value which is equal to the reduced speed it had at the end of the first hour of its operation. What is the value (in items per hour) of the increased speed of the belt after the completion of its 3rd hour of the operation?", type: "text", answer: "960", accepted: ["960"] },
      { q: "In a test, Sam answers 7 of the first 10 questions correctly and 40% of remaining questions correctly. He got 44% of the total marks in the test. How many questions were there in the test, if all questions carried equal marks and that there were no negative marks for wrong answers?", type: "text", answer: "75", accepted: ["75"] },
      { q: "Mr. Sharma received Rs. 20 lakh towards his retirement benefits. He wants to invest this amount prudentially in Monthly Income Plan (MIP), Bank deposits (FD) and Tax-free Bonds(Bond) so that he gets maximum returns. The minimum amount required to be invested in MIP and Bonds are Rs. 2 lakh each. The yield/return rate of MIP, FD and Bonds are 9%, 10% and 8% respectively. If he wants to invest at least double the amount in MIP as compared to FD, then how much should Mr. Sharma invest in MIP and Bonds respectively to maximize return?", type: "mcq", options: ["Rs. 10 lakh, Rs. 5 lakh", "Rs. 12 lakh, Rs. 2 lakh", "Rs. 12 lakh, Rs. 6 lakh", "Rs. 8 lakh, Rs. 8 lakh"], answer: 1 },
      { q: "Akash purchased a piece of land for Rs. X. He sold that to Paresh for Rs. Y. Had he sold the piece of land for 19% less than this price, he would have earned 8% profit. In order to earn 100% profit, the price at which he should have sold the land is:", type: "mcq", options: ["50% more than Y", "39% more than Y", "73% of Y", "33% more than Y"], answer: 0 },
      { q: "Bhupati has Rs. 20000 with him which he wants to invest for two years. Some portion of his money is invested in Scheme-1 at 5% rate of interest per annum compounded annually, for two years. Rest of the money was invested in Scheme-2 where 2% commission is deducted upfront from the invested amount and a total of 12.5% return is paid after two years on the balance amount. How much earning does Bhupati make in these two years from the two investments?", type: "mcq", options: ["Rs. 2050", "Rs. 2000", "Rs. 2400", "Cannot be determined"], answer: 0 },
      { q: "What can be the maximum percentage reduction in the value of any two-digit natural number less than 100 due to interchanging its digits?", type: "text", answer: "90", accepted: ["90"] },
      { q: "Rachana bought some kurtas of the same type and some lehengas of the same type from a shopping mall. Each piece of kurta costs 60% more than each piece of lehengas. While preparing the bill the cashier swapped the number of kurtas and the number of lehengas. Due to this mistake, Rachana had to pay 20% more than the correct bill amount. Which of the following can be the total number of kurtas and lehengas bought by Rachana?", type: "mcq", options: ["36", "57", "66", "9"], answer: 2 },
      { q: "In a locality, 42 <sup>6</sup>/<sub>7</sub>% families read TOI, 25% of the rest read HT, half of the rest read ET, and the remaining families do not read any news paper. What can be the minimum number of families who live in the locality if the number of families who read HT is more than 100?", type: "text", answer: "714", accepted: ["714"] },
      { q: "There are 5 cups of equal volume and each cup contains a distinct volume of water. None of the cups is completely filled or completely empty. Combining all the cups, 70% of the total volume is filled with water. The percentage of the volume that each cup is filled is an integral multiple of 10. What is the difference between the highest and lowest percentage points considering the percentage of the volume of each cup filled with water?", type: "mcq", options: ["30", "40", "50", "60"], answer: 1 },
      { q: "The monthly savings of Raj was 20% of his monthly salary. His salary increased by 20% and the expenditure increased by 25%. What is the change in his monthly savings?", type: "mcq", options: ["20% increase", "10% decrease", "10% increase", "No change"], answer: 3 },
      { q: "In 2020, Mr. Paritosh invested 25% of his savings in Mutual funds and 15% in fixed deposits. Out of the remaining part of his savings, 25% was invested in Gold bonds and the rest of the amount was invested in shares. If his investment in shares is Rs. 20000 more as compared to the investment in Mutual Funds, how much amount (in Rs.) had he invested in Gold bonds?", type: "text", answer: "15000", accepted: ["15000"] },
      { q: "A family reduced their consumption of rice by n% as the price of rice increased by 2n%. What will be the change in expenditure of the family for rice if n < 36?", type: "mcq", options: ["Net decrease", "Net increase", "No change", "Cannot be determined"], answer: 1 },
      { q: "Atul has some money with him. He can buy 50 pens or 30 notebooks using the entire amount with him. However, he bought chocolates for his sister using 20% of the amount with him and then he bought 20 pens. How many notebooks can he purchase from the remaining amount?", type: "mcq", options: ["8", "12", "16", "20"], answer: 1 }
    ];

    const solutionText = [
      `<p class="solution-step"><strong>Step 1:</strong> Required yearly saving = 12 × ₹5,000 = ₹60,000.</p><p class="solution-step"><strong>Step 2:</strong> During the first three months, monthly saving = ₹28,000 − ₹24,500 = ₹3,500. Total saving in these months = ₹10,500.</p><div class="formula-box">Saving required during the remaining 9 months = ₹60,000 − ₹10,500 = ₹49,500</div><p class="solution-step">Required monthly saving from April = ₹49,500 ÷ 9 = ₹5,500.</p><p class="solution-step">Since monthly expense from April is ₹29,500, required monthly earning = ₹29,500 + ₹5,500 = ₹35,000.</p><div class="shortcut-box"><strong>Percentage increase:</strong> (35,000 − 28,000)/28,000 × 100 = 25%.</div><div class="final-answer">Final Answer: 25%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> A 25% price reduction means the new price is 75% of the old price.</p><p class="solution-step"><strong>Step 2:</strong> With a fixed budget, quantity varies inversely with price.</p><div class="formula-box">New quantity / Old quantity = 100/75 = 4/3</div><p class="solution-step">The extra quantity is 1/3 of the original quantity and equals 400 g.</p><div class="shortcut-box">Original quantity = 400 × 3 = 1,200 g.</div><div class="final-answer">Final Answer: 1,200 grams</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Assume total students = 100. Then A = 30, B = 20, C = 12.5 and D = 37.5.</p><p class="solution-step"><strong>Step 2:</strong> English speakers: A = 15% of 30 = 4.5; B = 10% of 20 = 2; C = 20% of 12.5 = 2.5; D = 12% of 37.5 = 4.5.</p><div class="formula-box">Total English speakers = 4.5 + 2 + 2.5 + 4.5 = 13.5</div><p class="solution-step">Required percentage = 4.5/13.5 × 100 = 33⅓%.</p><div class="final-answer">Final Answer: 33⅓%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let football weight = F and tennis-ball weight = T. Cricket-ball weight = 25% of F = 0.25F.</p><p class="solution-step"><strong>Step 2:</strong> Tennis + cricket equals 40% of tennis + football.</p><div class="formula-box">T + 0.25F = 0.40(T + F)<br>0.60T = 0.15F<br>T = 0.25F</div><div class="final-answer">Final Answer: 25%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let monthly savings be S. Bank deposit = 25% of S, leaving 75% of S.</p><p class="solution-step"><strong>Step 2:</strong> Mother receives ⅓ of the remaining amount = 25% of S. Sisters together receive the balance = 50% of S.</p><div class="formula-box">Total distributed to family = 25%S + 50%S = 75%S = ₹3,000</div><p class="solution-step">Therefore S = ₹4,000 and monthly bank deposit = 25% of ₹4,000 = ₹1,000.</p><div class="shortcut-box">Annual deposit = ₹1,000 × 12 = ₹12,000.</div><div class="final-answer">Final Answer: ₹12,000</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Total income = population × per-capita income.</p><div class="formula-box">Population multiplier = 1.35/1.25 = 1.08</div><p class="solution-step">Thus population becomes 108% of the original.</p><div class="final-answer">Final Answer: 8% increase</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Monthly potatoes expenditure was ₹8,000. A 25% rise adds ₹2,000.</p><p class="solution-step"><strong>Step 2:</strong> Total extra expenditure is ₹3,000, so the increase in onion expenditure is ₹1,000.</p><div class="formula-box">20% of old onion expenditure = ₹1,000<br>Old onion expenditure = ₹5,000</div><p class="solution-step">New onion expenditure = 120% of ₹5,000 = ₹6,000.</p><div class="final-answer">Final Answer: ₹6,000</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Coconut trees = 59%, mango trees = 41%; difference = 18% = 180.</p><div class="formula-box">Total trees = 180 × 100/18 = 1,000</div><p class="solution-step">Coconut = 590 and mango = 410. Trees older than 10 years = 54% of 1,000 = 540.</p><p class="solution-step">Older mango trees = 245, hence older coconut trees = 540 − 245 = 295.</p><div class="shortcut-box">Coconut trees aged 10 years or less = 590 − 295 = 295 = 50% of 590.</div><div class="final-answer">Final Answer: 50%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Since net income is above ₹9,50,000, gross income is above ₹10,00,000. Let gross income be G.</p><p class="solution-step">Tax = 10% of ₹5,00,000 + 20% of (G − ₹10,00,000).</p><div class="formula-box">G − [₹50,000 + 0.20(G − ₹10,00,000)] = ₹9,92,000<br>0.80G + ₹1,50,000 = ₹9,92,000<br>0.80G = ₹8,42,000</div><p class="solution-step">G = ₹10,52,500.</p><div class="final-answer">Final Answer: ₹10,52,500</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Expected quarterly consumption ratio is 3:7:6:4, total 20 parts.</p><p class="solution-step"><strong>Step 2:</strong> Actual first three quarters = 3(1.10) + 7(1.05) + 6(0.96).</p><div class="formula-box">Actual first three = 3.3 + 7.35 + 5.76 = 16.41 parts</div><p class="solution-step">Only 20 − 16.41 = 3.59 parts can be used in Q4 instead of 4 parts.</p><div class="shortcut-box">Required reduction = (4 − 3.59)/4 × 100 = 10.25%</div><div class="final-answer">Final Answer: 10¼%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Amit is 75% less than Chandan, so take present ages A = 25 and C = 100.</p><p class="solution-step"><strong>Step 2:</strong> After x years, Amit will be one-third of Chandan.</p><div class="formula-box">25 + x = (100 + x)/3<br>75 + 3x = 100 + x<br>2x = 25 ⇒ x = 12.5</div><p class="solution-step">Chandan's age rises from 100 to 112.5.</p><div class="final-answer">Final Answer: 12.5%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let 2019 male and female populations be M and F.</p><div class="formula-box">M + F = 9,12,800<br>1.125M + 1.155F = 10,40,592</div><p class="solution-step"><strong>Step 2:</strong> Subtract 1.125(M + F) = 10,26,900 from the second equation.</p><div class="formula-box">0.03F = 13,692 ⇒ F = 4,56,400<br>M = 9,12,800 − 4,56,400 = 4,56,400</div><p class="solution-step">Male population in 2022 = 1.125 × 4,56,400 = 5,13,450.</p><div class="final-answer">Final Answer: 5,13,450</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Red : Green = 3 : 1. Assume red = 300 and green = 100.</p><p class="solution-step"><strong>Step 2:</strong> Metal red cubes = 44% of 300 = 132; metal green cubes = 48% of 100 = 48.</p><div class="formula-box">Total metal = 180 out of 400 = 45%</div><p class="solution-step">Therefore wooden cubes = 100% − 45% = 55%.</p><div class="final-answer">Final Answer: 55%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let the hourly remaining multiplier be r.</p><div class="formula-box">1200r² = 768<br>r² = 0.64 ⇒ r = 0.8</div><p class="solution-step">So the speed decreases by 20% each hour. At the end of the first hour:</p><div class="shortcut-box">Speed = 1200 × 0.8 = 960 items per hour.</div><p class="solution-step">At the end of the third hour it is increased to this same value.</p><div class="final-answer">Final Answer: 960</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let total questions be N. Sam gets 7 of the first 10 correct and 40% of the remaining N − 10 correct.</p><div class="formula-box">7 + 0.40(N − 10) = 0.44N</div><p class="solution-step">7 + 0.4N − 4 = 0.44N, hence 3 = 0.04N.</p><div class="final-answer">Final Answer: N = 75 questions</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> FD gives the highest return (10%), then MIP (9%), then bonds (8%). Therefore invest the minimum ₹2 lakh in bonds.</p><p class="solution-step"><strong>Step 2:</strong> Remaining ₹18 lakh is split between MIP and FD with MIP at least twice FD.</p><div class="formula-box">M + F = 18 and M ≥ 2F</div><p class="solution-step">To maximize return, maximize FD. Thus use equality M = 2F.</p><div class="formula-box">3F = 18 ⇒ F = 6 and M = 12</div><div class="final-answer">Final Answer: ₹12 lakh in MIP and ₹2 lakh in Bonds</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Selling at 19% less than Y would give 8% profit.</p><div class="formula-box">0.81Y = 1.08X ⇒ Y = (1.08/0.81)X = 4X/3</div><p class="solution-step"><strong>Step 2:</strong> For 100% profit, required selling price = 2X.</p><div class="shortcut-box">2X ÷ (4X/3) = 1.5</div><p class="solution-step">Thus the required price is 50% more than Y.</p><div class="final-answer">Final Answer: 50% more than Y</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Scheme 1 earns compound return for two years:</p><div class="formula-box">(1.05)² − 1 = 10.25%</div><p class="solution-step"><strong>Step 2:</strong> In Scheme 2, 2% commission leaves 98% for investment. It becomes 112.5% after two years.</p><div class="formula-box">0.98 × 1.125 = 1.1025</div><p class="solution-step">Scheme 2 also gives an effective return of 10.25%. Hence the allocation does not matter.</p><div class="shortcut-box">Total earning = 10.25% of ₹20,000 = ₹2,050.</div><div class="final-answer">Final Answer: ₹2,050</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let a two-digit number be 10a + b, with a &gt; b so interchange reduces it.</p><div class="formula-box">Reduction % = [(10a+b) − (10b+a)]/(10a+b) × 100<br>= 9(a−b)/(10a+b) × 100</div><p class="solution-step">To maximize the reduction, take the largest tens digit and smallest units digit: 90 → 09.</p><div class="shortcut-box">Reduction = (90 − 9)/90 × 100 = 90%</div><div class="final-answer">Final Answer: 90%</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let each lehenga cost 5 units and each kurta cost 8 units. Let numbers bought be K kurtas and L lehengas.</p><p class="solution-step">Correct bill = 8K + 5L. Swapped bill = 8L + 5K and is 20% more.</p><div class="formula-box">8L + 5K = 1.2(8K + 5L)<br>2L = 4.6K ⇒ L:K = 23:10</div><p class="solution-step">Total pieces must therefore be a multiple of 23 + 10 = 33.</p><div class="final-answer">Final Answer: 66</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> 42 6/7% = 3/7. Thus TOI readers = 3N/7 and the remaining families = 4N/7.</p><p class="solution-step"><strong>Step 2:</strong> HT readers = 25% of the remainder.</p><div class="formula-box">HT readers = 1/4 × 4N/7 = N/7</div><p class="solution-step">N/7 must exceed 100, so N &gt; 700. Also, after HT, half of the remainder reads ET, requiring N to be divisible by 14.</p><div class="shortcut-box">Smallest multiple of 14 greater than 700 = 714.</div><div class="final-answer">Final Answer: 714 families</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Five equal-volume cups are on average 70% full, so their percentage fillings sum to 350.</p><p class="solution-step"><strong>Step 2:</strong> Fillings are distinct multiples of 10 from 10% to 90%. To minimize the range, choose five consecutive multiples centered around 70.</p><div class="formula-box">50% + 60% + 70% + 80% + 90% = 350%</div><p class="solution-step">Highest − lowest = 90 − 50 = 40 percentage points.</p><div class="final-answer">Final Answer: 40</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Assume salary = 100. Savings = 20 and expenditure = 80.</p><p class="solution-step"><strong>Step 2:</strong> New salary = 120. New expenditure = 80 × 1.25 = 100.</p><div class="formula-box">New savings = 120 − 100 = 20</div><p class="solution-step">Savings remain unchanged.</p><div class="final-answer">Final Answer: No change</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let total savings be S. Mutual funds = 25%S and fixed deposits = 15%S, leaving 60%S.</p><p class="solution-step"><strong>Step 2:</strong> Gold bonds = 25% of 60%S = 15%S. Shares = 75% of 60%S = 45%S.</p><div class="formula-box">Shares − Mutual funds = 45%S − 25%S = 20%S = ₹20,000</div><p class="solution-step">Therefore S = ₹1,00,000.</p><div class="shortcut-box">Gold investment = 15% of ₹1,00,000 = ₹15,000.</div><div class="final-answer">Final Answer: ₹15,000</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Price rises by 2n%, so price multiplier = 1 + 2n/100. Consumption falls by n%, so quantity multiplier = 1 − n/100.</p><div class="formula-box">Expenditure multiplier = (1 + 2n/100)(1 − n/100)<br>= 1 + n/100 − 2n²/10000</div><p class="solution-step">Net percentage change = n − n²/50 = n(1 − n/50).</p><p class="solution-step">For 0 &lt; n &lt; 36, this expression is positive.</p><div class="final-answer">Final Answer: Net increase</div>`,
      `<p class="solution-step"><strong>Step 1:</strong> Let total money = 100 units. He spends 20% on chocolates, leaving 80 units.</p><p class="solution-step"><strong>Step 2:</strong> Since 50 pens cost 100 units, 20 pens cost 40 units.</p><div class="formula-box">Money remaining = 80 − 40 = 40 units</div><p class="solution-step">Thirty notebooks cost 100 units, so notebooks purchasable with 40 units = 30 × 40/100 = 12.</p><div class="final-answer">Final Answer: 12 notebooks</div>`

      { q: "Ruby can do a work in 40 days, whereas Nandini can do the same work in 50 days. They work together for some days; Bhavna then joins them, and all three complete the whole work in 20 days. If the total payment is ₹1,400, what is Bhavna's share?", type: "mcq", source: "Level of Difficulty – 2", options: ["₹140", "₹200", "₹250", "₹290"], answer: 0 },
      { q: "P can do a piece of work in 10 days. Q and R are each three-fourths as efficient as P. S and T are each one-fifth as efficient as P. If all five work together, in how many days will the work be completed?", type: "mcq", source: "Level of Difficulty – 2", options: ["2 <sup>13</sup>/<sub>29</sub> days", "3 <sup>13</sup>/<sub>29</sub> days", "5 <sup>1</sup>/<sub>13</sub> days", "45 days"], answer: 1 },
      { q: "In an automobile company, one engineer started a machine-learning project on day 1. Two more engineers joined on day 2, three more on day 3, and so on. The project was completed in 10 days. In how many days can 20 data scientists complete the project if each data scientist is twice as efficient as an engineer?", type: "mcq", source: "Level of Difficulty – 2", options: ["<sup>11</sup>/<sub>2</sub> days", "<sup>22</sup>/<sub>3</sub> days", "<sup>7</sup>/<sub>2</sub> days", "9 days"], answer: 0 },
      { q: "Water is discharged through a pipe at 40 m/s. The pipe is attached to the bottom of a cuboidal tank measuring 20 m × 18 m × 10 m. If the tank is emptied in 30 minutes, find the cross-sectional area of the pipe.", type: "mcq", source: "Level of Difficulty – 2", options: ["600 cm²", "800 cm²", "700 cm²", "500 cm²"], answer: 3 },
      { q: "Three taps can fill an empty tank together in 40 minutes. Two of them can fill the tank alone in 120 minutes and 180 minutes, respectively. In how many minutes can the third tap alone fill the tank?", type: "mcq", source: "Level of Difficulty – 2", options: ["90 minutes", "75 minutes", "80 minutes", "70 minutes"], answer: 0 },
      { q: "C is twice as efficient as A, while B takes three times as many days as C to finish a work alone. A takes 12 days. If they work in pairs—AB on day 1, BC on day 2 and CA on day 3—and repeat this pattern, how many days are required to finish the work?", type: "mcq", source: "Level of Difficulty – 3", options: ["6 <sup>1</sup>/<sub>3</sub> days", "4.5 days", "5 <sup>1</sup>/<sub>9</sub> days", "8 days"], answer: 2 },
      { q: "A cistern has large and small pipes, each usable for filling or emptying. The filling speed of each pipe is 10 times its emptying speed. All large pipes have the same rate, and all small pipes have the same rate. One large and seven small pipes can empty the cistern in 6 minutes, whereas one large and three small pipes can fill it in 1 minute. How many minutes will one large and one small pipe together take to empty the cistern?", type: "mcq", source: "Level of Difficulty – 3", options: ["12 minutes", "16 minutes", "15 minutes", "18 minutes"], answer: 2 },
      { q: "A tank has four inlet pipes. Their water flow per minute is directly proportional to their cross-sectional areas. The pipes have square cross-sections with sides 2 cm, 4 cm, 8 cm and 16 cm. If the smallest pipe alone fills the tank in 60 minutes, how many seconds will all four pipes take together?", type: "mcq", source: "Level of Difficulty – 3", options: ["42.35 seconds", "41.45 seconds", "40.4 seconds", "43.5 seconds"], answer: 0 },
      { q: "Simba can complete a work in 15 days and Jaggu in 18 days. They work together for some days; Bala then joins them, and all three finish the work in 8 days. If the total payment is ₹3,600, what is Bala's share?", type: "mcq", source: "Level of Difficulty – 3", options: ["₹70", "₹75", "₹80", "₹85"], answer: 2 },
      { q: "Anil, Aman, Amit and Anshul must make a wooden chair. Anil alone takes 12 hours. Aman is 20% more efficient than Anil, Amit is 25% more efficient than Aman, and Anshul is one-third as efficient as Anil. All four work for 15 minutes; then Anil and Aman leave. Amit and Anshul work for another 4 hours, after which Anshul finishes the remaining work alone. For how many minutes does Anshul work alone?", type: "mcq", source: "Level of Difficulty – 3", options: ["678.5 minutes", "658.5 minutes", "666.3 minutes", "645.5 minutes"], answer: 1 }
    ];

    const timeWorkSolutions = [
      `<p class="solution-step">A completes 2/5 of the work in 9 days, so A's rate is 2/45 per day. The remaining 3/5 is completed by A and B in 6 days.</p><div class="formula-box">A + B = (3/5) ÷ 6 = 1/10<br>B = 1/10 − 2/45 = 1/18</div><div class="final-answer">Final Answer: 18 days (A)</div>`,
      `<p class="solution-step">Take total work as LCM(45, 40) = 360 units. A and B work at 8 and 9 units per day.</p><p class="solution-step">B completes 9 × 23 = 207 units after A leaves, so together they had completed 360 − 207 = 153 units.</p><div class="formula-box">Days together = 153/(8 + 9) = 153/17 = 9</div><div class="final-answer">Final Answer: 9 days (B)</div>`,
      `<p class="solution-step">A completes the whole job in 32 days. B completes one-fourth in 24 days, so B completes the whole job in 96 days.</p><div class="formula-box">Combined rate = 1/32 + 1/96 = 1/24<br>Time for 3/4 work = (3/4) ÷ (1/24) = 18</div><div class="final-answer">Final Answer: 18 days (A)</div>`,
      `<p class="solution-step">Let the normal efficiencies of Arun and Varun be A and V.</p><div class="formula-box">8(A + V) = 6(2A + V/3)<br>4A + 4V = 6A + V<br>3V = 2A</div><p class="solution-step">Thus A : V = 3 : 2. Total work = (3 + 2) × 8 = 40 units.</p><div class="formula-box">Varun's time = 40/2 = 20 days</div><div class="final-answer">Final Answer: 20 days (C)</div>`,
      `<p class="solution-step">Take tank capacity as LCM(30,45) = 90 units. P fills 3 units per minute and Q fills 2 units per minute.</p><p class="solution-step">Each two-minute cycle fills 5 units. Eighteen cycles fill 90 units.</p><div class="formula-box">Total time = 18 × 2 = 36 minutes</div><div class="final-answer">Final Answer: 36 minutes (D)</div>`,
      `<p class="solution-step">Ruby and Nandini's daily rates are 1/40 and 1/50. In 20 days they complete:</p><div class="formula-box">20(1/40 + 1/50) = 20 × 9/200 = 9/10</div><p class="solution-step">Bhavna completes the remaining 1/10, so she receives one-tenth of the total payment.</p><div class="formula-box">Bhavna's share = (1/10) × ₹1,400 = ₹140</div><div class="final-answer">Final Answer: ₹140 (A)</div>`,
      `<p class="solution-step">Let P's efficiency be 20 units per day. Then Q and R each have efficiency 15, while S and T each have efficiency 4.</p><div class="formula-box">Combined efficiency = 20 + 15 + 15 + 4 + 4 = 58<br>Total work = 20 × 10 = 200 units</div><p class="solution-step">Time = 200/58 = 100/29 days.</p><div class="final-answer">Final Answer: 3 <sup>13</sup>/<sub>29</sub> days (B)</div>`,
      `<p class="solution-step">On days 1 through 10, the numbers of active engineer-days are 1×10, 2×9, 3×8, ..., 10×1.</p><div class="formula-box">Total work = 1×10 + 2×9 + ⋯ + 10×1 = 220 engineer-days</div><p class="solution-step">Each data scientist is twice as efficient, so 20 data scientists equal 40 engineers.</p><div class="formula-box">Time = 220/40 = 11/2 days</div><div class="final-answer">Final Answer: 11/2 days (A)</div>`,
      `<p class="solution-step">Tank volume = 20 × 18 × 10 = 3,600 m³. Emptying time = 30 minutes = 1,800 seconds.</p><div class="formula-box">Volume flow rate = 3600/1800 = 2 m³/s<br>Area = flow rate/speed = 2/40 = 1/20 m²</div><p class="solution-step">Since 1 m² = 10,000 cm², area = 10,000/20 = 500 cm².</p><div class="final-answer">Final Answer: 500 cm² (D)</div>`,
      `<p class="solution-step">Let the third tap take t minutes.</p><div class="formula-box">1/120 + 1/180 + 1/t = 1/40<br>1/72 + 1/t = 1/40<br>1/t = 1/40 − 1/72 = 1/90</div><div class="final-answer">Final Answer: 90 minutes (A)</div>`,
      `<p class="solution-step">Let A's efficiency be 3 units/day. Since C is twice as efficient, C = 6. B takes three times C's time, so B = 2.</p><p class="solution-step">Total work = 3 × 12 = 36 units. Pair efficiencies are AB = 5, BC = 8 and CA = 9.</p><div class="formula-box">One 3-day cycle completes 22 units.<br>After 5 days: 22 + 5 + 8 = 35 units.</div><p class="solution-step">The remaining 1 unit is completed by CA at 9 units/day in 1/9 day.</p><div class="final-answer">Final Answer: 5 <sup>1</sup>/<sub>9</sub> days (C)</div>`,
      `<p class="solution-step">Let a large pipe take a minutes to fill and 10a minutes to empty; let a small pipe take b minutes to fill and 10b minutes to empty.</p><div class="formula-box">(1/10a + 7/10b) = 1/6<br>(1/a + 3/b) = 1</div><p class="solution-step">Solving gives a = 2 and b = 6. Their combined emptying rate is 1/20 + 1/60 = 1/15.</p><div class="final-answer">Final Answer: 15 minutes (C)</div>`,
      `<p class="solution-step">The square cross-sectional areas are 4, 16, 64 and 256 cm². Their rates relative to the smallest pipe are 1, 4, 16 and 64.</p><div class="formula-box">Combined rate = (1 + 4 + 16 + 64)/60 = 85/60 tanks/minute<br>Time = 60/85 minute</div><p class="solution-step">In seconds: (60/85) × 60 = 42.35 seconds.</p><div class="final-answer">Final Answer: 42.35 seconds (A)</div>`,
      `<p class="solution-step">Take total work as LCM(15,18) = 90 units. Simba and Jaggu work at 6 and 5 units/day.</p><div class="formula-box">Work done by them in 8 days = 8 × 11 = 88 units<br>Bala's work = 90 − 88 = 2 units</div><p class="solution-step">Each unit earns ₹3,600/90 = ₹40, so Bala gets 2 × ₹40.</p><div class="final-answer">Final Answer: ₹80 (C)</div>`,
      `<p class="solution-step">Their individual times are: Anil 12 h; Aman 12/1.2 = 10 h; Amit 10/1.25 = 8 h; Anshul 12 × 3 = 36 h.</p><div class="formula-box">Combined hourly rate = 1/12 + 1/10 + 1/8 + 1/36 = 121/360<br>Work in 15 minutes = (1/4)(121/360) = 121/1440</div><p class="solution-step">Amit and Anshul's hourly rate is 1/8 + 1/36 = 11/72. In 4 hours they complete 44/72 = 880/1440.</p><div class="formula-box">Work left = 1 − 121/1440 − 880/1440 = 439/1440</div><p class="solution-step">Anshul alone takes (439/1440) × 36 = 10.975 hours = 658.5 minutes.</p><div class="final-answer">Final Answer: 658.5 minutes (B)</div>`
    ];

    questions.splice(0, questions.length, ...previousTimeWorkQuestions);
    questions.forEach((q, i) => { q.solution = previousTimeWorkSolutions[i] || "Solution not provided."; });
    let current = 0, submitted = false, secondsLeft = 30 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let v=String(s ?? "");v=v.replace(/(\d+)\s*<sup>(\d+)<\/sup>\/<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');return v.replace(/(^|[^A-Za-z0-9.²>])([A-Za-z0-9.²]+)\/([A-Za-z0-9.²]+)/g,'$1<span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span>');}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
