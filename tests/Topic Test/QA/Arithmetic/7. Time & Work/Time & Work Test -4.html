      "<p class=\"solution-step\"><strong>Step 1:</strong> Take the total work as 60 units.</p><div class=\"formula-box\">Rate of A + B = 60/20 = 3 units/day<br>Rate of A = 60/60 = 1 unit/day</div><p class=\"solution-step\"><strong>Step 2:</strong> B's rate = 3 − 1 = 2 units/day.</p><div class=\"formula-box\">B's time = 60/2 = 30 days</div><div class=\"final-answer\">Final Answer: 30 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take the total work as LCM(10, 15) = 30 units.</p><div class=\"formula-box\">A's rate = 3 units/day; B's rate = 2 units/day<br>Together they do 5 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> In 3 days they complete 3 × 5 = 15 units, leaving 15 units.</p><div class=\"formula-box\">Time taken by A for the remaining work = 15/3 = 5 days</div><div class=\"final-answer\">Final Answer: 5 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take the total work as LCM(20, 25) = 100 units.</p><div class=\"formula-box\">A's rate = 5 units/day; B's rate = 4 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> In the first 8 days they complete 8 × 9 = 72 units. The remaining work is 28 units.</p><div class=\"formula-box\">B takes 28/4 = 7 more days<br>Total time = 8 + 7 = 15 days</div><div class=\"final-answer\">Final Answer: 15 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as LCM(12, 18) = 36 units.</p><div class=\"formula-box\">A's rate = 3 units/day; B's rate = 2 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> B completes the final 8 × 2 = 16 units. Hence A and B together completed 36 − 16 = 20 units before A left.</p><div class=\"formula-box\">Days worked together = 20/(3 + 2) = 4 days</div><div class=\"final-answer\">Final Answer: A left after 4 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as LCM(20, 15) = 60 units.</p><div class=\"formula-box\">A's rate = 3 units/day; B's rate = 4 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> A completes the remaining work in 6 days, so the remaining work was 6 × 3 = 18 units.</p><p class=\"solution-step\">Therefore, the work completed together was 60 − 18 = 42 units.</p><div class=\"formula-box\">Days worked together = 42/(3 + 4) = 6 days</div><div class=\"final-answer\">Final Answer: B left after 6 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 120 units. Since A and B together finish it in 10 days:</p><div class=\"formula-box\">A's rate + B's rate = 12 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> Let A's rate be x; then B's rate is 12 − x. Half the work is 60 units.</p><div class=\"formula-box\">2 <sup>1</sup>/<sub>2</sub>x + 8 <sup>1</sup>/<sub>2</sub>(12 − x) = 60<br>2.5x + 102 − 8.5x = 60<br>6x = 42 ⇒ x = 7</div><p class=\"solution-step\">Thus B's rate = 12 − 7 = 5 units/day.</p><div class=\"formula-box\">B's time = 120/5 = 24 days</div><div class=\"final-answer\">Final Answer: 24 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 224 units. Since A and B together finish it in 14 days:</p><div class=\"formula-box\">A's rate + B's rate = 16 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> Let B's rate be b; then A's rate is 16 − b. Half the work is 112 units.</p><div class=\"formula-box\">3 <sup>1</sup>/<sub>2</sub>(16 − b) + 11 <sup>1</sup>/<sub>2</sub>b = 112<br>56 − 3.5b + 11.5b = 112<br>8b = 56 ⇒ b = 7</div><div class=\"formula-box\">B's time = 224/7 = 32 days</div><div class=\"final-answer\">Final Answer: 32 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 75 units. At normal efficiency, A and B together do 75/5 = 15 units/day.</p><p class=\"solution-step\">Let A's normal rate be x, so B's normal rate is 15 − x.</p><div class=\"formula-box\">At changed efficiencies: 2x + (15 − x)/3 = 75/3 = 25</div><div class=\"formula-box\">2x + 5 − x/3 = 25<br>5x/3 = 20 ⇒ x = 12 units/day</div><p class=\"solution-step\">Therefore A's normal time is 75/12 days.</p><div class=\"final-answer\">Final Answer: 25/4 days = 6 <sup>1</sup>/<sub>4</sub> days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 20 units. Then A + B = 20/5 = 4 units/day.</p><p class=\"solution-step\">Let A's rate be x, so B's rate is 4 − x. Under the changed efficiencies, the combined rate is 20/4 = 5 units/day.</p><div class=\"formula-box\">2x + (4 − x)/2 = 5<br>2x + 2 − x/2 = 5<br>3x/2 = 3 ⇒ x = 2</div><p class=\"solution-step\">Thus B's rate is also 2 units/day.</p><div class=\"formula-box\">A's time = 20/2 = 10 days<br>B's time = 20/2 = 10 days</div><div class=\"final-answer\">Final Answer: A = 10 days, B = 10 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 12 units.</p><div class=\"formula-box\">A's rate = 12/4 = 3 units/hour<br>B + C = 12/3 = 4 units/hour<br>A + C = 12/2 = 6 units/hour</div><p class=\"solution-step\"><strong>Step 2:</strong> Since A = 3, from A + C = 6 we get C = 3. Therefore B = 4 − 3 = 1 unit/hour.</p><div class=\"formula-box\">B's time = 12/1 = 12 hours</div><div class=\"final-answer\">Final Answer: 12 hours</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> A completes 1/3 in 9 days, so A's daily rate is 1/27 of the wall.</p><p class=\"solution-step\">B completes 2/3 in 9 days, so B's daily rate is 2/27.</p><div class=\"formula-box\">Combined rate = 1/27 + 2/27 = 3/27 = 1/9</div><div class=\"final-answer\">Final Answer: 9 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> A's daily work is (13/56)/111 and B's daily work is (43/56)/111.</p><div class=\"formula-box\">Combined daily work = 13/(56 × 111) + 43/(56 × 111)<br>= 56/(56 × 111) = 1/111</div><p class=\"solution-step\">Hence together they complete 1/111 of the work each day.</p><div class=\"final-answer\">Final Answer: 111 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> A completes 1/4 in 21 days.</p><div class=\"formula-box\">A's rate = (1/4)/21 = 1/84</div><p class=\"solution-step\">B completes 1/4 in 7 days.</p><div class=\"formula-box\">B's rate = (1/4)/7 = 1/28 = 3/84</div><p class=\"solution-step\">Combined rate = 4/84 = 1/21.</p><div class=\"final-answer\">Final Answer: 21 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 48 units.</p><div class=\"formula-box\">A + B = 48/12 = 4 units/day<br>B + C = 48/16 = 3 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> Let B's rate be b. Then A = 4 − b and C = 3 − b.</p><div class=\"formula-box\">5A + 7B + 13C = 48<br>5(4 − b) + 7b + 13(3 − b) = 48<br>59 − 11b = 48 ⇒ b = 1</div><p class=\"solution-step\">Therefore A = 3 and C = 2 units/day.</p><div class=\"formula-box\">A's time = 48/3 = 16 days<br>B's time = 48/1 = 48 days<br>C's time = 48/2 = 24 days</div><div class=\"final-answer\">Final Answer: A = 16 days, B = 48 days, C = 24 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 60 units.</p><div class=\"formula-box\">A + B = 60/12 = 5 units/day<br>B + C = 60/(20/3) = 9 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> Let B's rate be b. Then A = 5 − b and C = 9 − b.</p><div class=\"formula-box\">3A + 4B + 7C = 60<br>3(5 − b) + 4b + 7(9 − b) = 60<br>78 − 6b = 60 ⇒ b = 3</div><p class=\"solution-step\">Thus A = 2 and C = 6 units/day.</p><div class=\"formula-box\">A's time = 60/2 = 30 days<br>B's time = 60/3 = 20 days<br>C's time = 60/6 = 10 days</div><div class=\"final-answer\">Final Answer: A = 30 days, B = 20 days, C = 10 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 30 units. Let A and B work at a and b units/day.</p><div class=\"formula-box\">2a + 9b = 30<br>3a + 6b = 30</div><p class=\"solution-step\"><strong>Step 2:</strong> Subtracting the first equation from the second gives a − 3b = 0, so a = 3b.</p><div class=\"formula-box\">2(3b) + 9b = 30<br>15b = 30 ⇒ b = 2 and a = 6</div><div class=\"formula-box\">A's time = 30/6 = 5 days<br>B's time = 30/2 = 15 days</div><div class=\"final-answer\">Final Answer: A = 5 days, B = 15 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 240 units. A's rate is 240/80 = 3 units/day.</p><p class=\"solution-step\">A works for 10 days, so A completes 30 units. B completes the remaining 210 units in 42 days.</p><div class=\"formula-box\">B's rate = 210/42 = 5 units/day</div><p class=\"solution-step\">Together their rate is 3 + 5 = 8 units/day.</p><div class=\"formula-box\">Time together = 240/8 = 30 days</div><div class=\"final-answer\">Final Answer: 30 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as LCM(45, 40) = 360 units.</p><div class=\"formula-box\">A's rate = 8 units/day; B's rate = 9 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> B works alone for the last 23 days and completes 23 × 9 = 207 units.</p><p class=\"solution-step\">Therefore A and B together completed 360 − 207 = 153 units.</p><div class=\"formula-box\">Days worked together = 153/(8 + 9) = 153/17 = 9 days</div><div class=\"final-answer\">Final Answer: A left after 9 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as LCM(20, 30) = 60 units.</p><div class=\"formula-box\">A's rate = 3 units/day; B's rate = 2 units/day<br>Work in each two-day cycle = 5 units</div><p class=\"solution-step\"><strong>Step 2:</strong> In 22 days, there are 11 complete cycles, so 55 units are completed.</p><p class=\"solution-step\">On day 23, A completes 3 more units, leaving 2 units. B completes these 2 units on day 24.</p><div class=\"final-answer\">Final Answer: 24 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as LCM(20, 25) = 100 units.</p><div class=\"formula-box\">A's rate = 5 units/day; B's rate = 4 units/day<br>Work in each two-day cycle = 9 units</div><p class=\"solution-step\"><strong>Step 2:</strong> In 22 days, 11 cycles complete 11 × 9 = 99 units.</p><p class=\"solution-step\">One unit remains. A works next and completes 5 units per day.</p><div class=\"formula-box\">Time for the last unit = 1/5 day<br>Total time = 22 <sup>1</sup>/<sub>5</sub> days</div><div class=\"final-answer\">Final Answer: 22 <sup>1</sup>/<sub>5</sub> days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as LCM(12, 15, 20) = 60 units.</p><div class=\"formula-box\">A's rate = 5, B's rate = 4, C's rate = 3 units/day<br>AB = 9, AC = 8, BC = 7 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> To minimize time, use the two fastest pairs, AB and AC, alternately so that the same pair is not repeated on consecutive days.</p><div class=\"formula-box\">Work in 6 days = 3(AB + AC) = 3(9 + 8) = 51 units</div><p class=\"solution-step\">Even the best possible six-day schedule completes only 51 units, so at least 7 days are necessary.</p><p class=\"solution-step\">On day 7, pair AB completes the remaining 9 units exactly.</p><div class=\"final-answer\">Final Answer: 7 days</div>"
];

    questions.forEach((q, i) => { q.solution = solutionText[i] || 'Solution not provided.'; });
    let current = 0, submitted = false, secondsLeft = 40 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let v=String(s ?? "");v=v.replace(/(\d+)\s*<sup>(\d+)<\/sup>\/<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');return v.replace(/(^|[^A-Za-z0-9.²>])([A-Za-z0-9.²]+)\/([A-Za-z0-9.²]+)/g,'$1<span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span>');}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="number" min="1" step="1" inputmode="numeric" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type a natural number" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
