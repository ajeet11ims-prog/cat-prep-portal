    const solutionText = [
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take the total work as 100 units.</p><div class=\"formula-box\">A = 10 units/day, B = 5 units/day, C = 4 units/day<br>AB = 15, AC = 14 and BC = 9 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> Because the same pair cannot work on consecutive days, the fastest possible pattern is AB, AC, AB, AC, ... .</p><div class=\"formula-box\">Maximum work in every two days = 15 + 14 = 29 units<br>Work in 6 days = 3 × 29 = 87 units</div><p class=\"solution-step\">The remaining work is 13 units. After AC works on day 6, AB may work next and completes 15 units per day.</p><div class=\"formula-box\">Time for remaining work = 13/15 day</div><div class=\"final-answer\">Final Answer: 6 <sup>13</sup>/<sub>15</sub> days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 60 units.</p><div class=\"formula-box\">A = 60/20 = 3 units/day<br>B = 60/30 = 2 units/day</div><p class=\"solution-step\"><strong>Step 2:</strong> In each two-day cycle they complete 3 + 2 = 5 units.</p><div class=\"formula-box\">Work in 22 days = 11 × 5 = 55 units</div><p class=\"solution-step\">On day 23, A completes 3 units, leaving 2 units. B completes those 2 units on day 24.</p><div class=\"final-answer\">Final Answer: 24 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Take total work as 30 units.</p><div class=\"formula-box\">A + B = 30/6 = 5 units/day<br>A + B + C = 30/5 = 6 units/day<br>Therefore C = 1 unit/day</div><p class=\"solution-step\"><strong>Step 2:</strong> Let A's rate be x, so B's rate is 5 − x.</p><div class=\"formula-box\">Time of A + C = 30/(x + 1)<br>Time of B + C = 30/(6 − x)</div><p class=\"solution-step\">Since A + C takes 2 <sup>1</sup>/<sub>2</sub> days less:</p><div class=\"formula-box\">30/(6 − x) − 30/(x + 1) = 5/2<br>x = 3 (the other root is negative)</div><p class=\"solution-step\">Thus A, B and C work at 3, 2 and 1 units/day.</p><div class=\"final-answer\">Final Answer: A = 10 days, B = 15 days, C = 30 days</div>",
      "<p class=\"solution-step\">Let A and B together take x days. Then A alone takes x + 27 days and B alone takes x + 3 days.</p><div class=\"formula-box\">1/(x + 27) + 1/(x + 3) = 1/x</div><p class=\"solution-step\">Cross-multiplication gives:</p><div class=\"formula-box\">x(2x + 30) = (x + 27)(x + 3)<br>2x² + 30x = x² + 30x + 81<br>x² = 81</div><p class=\"solution-step\">Taking the positive value, x = 9.</p><div class=\"final-answer\">Final Answer: 9 days</div>",
      "<p class=\"solution-step\">Let A and B together take x days. Then A takes x + 9/2 days and B takes x + 8 days.</p><div class=\"formula-box\">1/(x + 9/2) + 1/(x + 8) = 1/x</div><p class=\"solution-step\">After cross-multiplication, the terms containing x cancel:</p><div class=\"formula-box\">x² = (9/2) × 8 = 36<br>x = 6</div><div class=\"final-answer\">Final Answer: 6 days</div>",
      "<p class=\"solution-step\">Let A and B together take x days.</p><div class=\"formula-box\">A's time = x + 16/3<br>B's time = x + 25/3</div><p class=\"solution-step\">Using their combined rate:</p><div class=\"formula-box\">1/(x + 16/3) + 1/(x + 25/3) = 1/x</div><p class=\"solution-step\">For an equation of this form, cross-multiplication gives x² equal to the product of the two added times.</p><div class=\"formula-box\">x² = (16/3)(25/3) = 400/9<br>x = 20/3</div><div class=\"formula-box\">A = 20/3 + 16/3 = 12 days<br>B = 20/3 + 25/3 = 15 days</div><div class=\"final-answer\">Final Answer: A = 12 days, B = 15 days</div>",
      "<p class=\"solution-step\">Let C alone take x days. Since A takes 16 days more than C and 7 days more than B:</p><div class=\"formula-box\">C = x, A = x + 16, B = x + 9</div><p class=\"solution-step\">C works at the same rate as A and B together.</p><div class=\"formula-box\">1/x = 1/(x + 16) + 1/(x + 9)</div><p class=\"solution-step\">Cross-multiplication gives x² = 16 × 9 = 144, so x = 12.</p><div class=\"formula-box\">C = 12 days, B = 21 days, A = 28 days</div><div class=\"final-answer\">Final Answer: A = 28 days, B = 21 days, C = 12 days</div>",
      "<p class=\"solution-step\">Let C alone take x days. Then A = x + 32 days and B = x + 8 days.</p><div class=\"formula-box\">1/x = 1/(x + 32) + 1/(x + 8)</div><p class=\"solution-step\">Cross-multiplication gives:</p><div class=\"formula-box\">x² = 32 × 8 = 256<br>x = 16</div><div class=\"formula-box\">C = 16 days, B = 24 days, A = 48 days</div><div class=\"final-answer\">Final Answer: A = 48 days, B = 24 days, C = 16 days</div>",
      "<p class=\"solution-step\">Let C alone take x days. Then A = x + 9 days and B = x + 4 days.</p><div class=\"formula-box\">1/x = 1/(x + 9) + 1/(x + 4)</div><p class=\"solution-step\">Cross-multiplication gives x² = 9 × 4 = 36, so C = 6 days and B = 10 days.</p><div class=\"formula-box\">Rate of B + C = 1/10 + 1/6 = 4/15</div><div class=\"formula-box\">Time of B + C = 15/4 = 3 <sup>3</sup>/<sub>4</sub> days</div><div class=\"final-answer\">Final Answer: 3 <sup>3</sup>/<sub>4</sub> days</div>",
      "<p class=\"solution-step\">Let A, B and C together take x hours. Then A takes x + 6 hours, B takes x + 1 hour and C takes 2x hours.</p><div class=\"formula-box\">1/(x + 6) + 1/(x + 1) + 1/(2x) = 1/x</div><p class=\"solution-step\">Therefore:</p><div class=\"formula-box\">1/(x + 6) + 1/(x + 1) = 1/(2x)<br>2x(2x + 7) = (x + 6)(x + 1)<br>3x² + 7x − 6 = 0<br>(3x − 2)(x + 3) = 0</div><p class=\"solution-step\">Hence x = 2/3 hour. A's time is 20/3 hours and B's time is 5/3 hours.</p><div class=\"formula-box\">A + B rate = 3/20 + 3/5 = 3/4<br>Time = 4/3 hours</div><div class=\"final-answer\">Final Answer: <sup>4</sup>/<sub>3</sub> hours</div>",
      "<p class=\"solution-step\">Let the daily rates of A, B and C be a, b and c.</p><div class=\"formula-box\">a + b = 1/12<br>b + c = 1/8<br>c + a = 1/6</div><p class=\"solution-step\">Add the first two equations and subtract the third:</p><div class=\"formula-box\">2b = 1/12 + 1/8 − 1/6 = 1/24<br>b = 1/48</div><div class=\"final-answer\">Final Answer: B alone takes 48 days</div>",
      "<p class=\"solution-step\"><strong>Step 1:</strong> Add the three pair rates.</p><div class=\"formula-box\">2(A + B + C) = 1/12 + 1/15 + 1/20<br>= (5 + 4 + 3)/60 = 1/5</div><p class=\"solution-step\">Thus A + B + C = 1/10, so together they take 10 days.</p><p class=\"solution-step\"><strong>Step 2:</strong> Find individual rates by adding the two pairs containing a person and subtracting the opposite pair.</p><div class=\"formula-box\">2A = 1/12 + 1/20 − 1/15 = 1/15 ⇒ A = 1/30<br>2B = 1/12 + 1/15 − 1/20 = 1/10 ⇒ B = 1/20<br>2C = 1/15 + 1/20 − 1/12 = 1/30 ⇒ C = 1/60</div><div class=\"final-answer\">Final Answer: Together = 10 days; A = 30 days; B = 20 days; C = 60 days</div>",
      "<p class=\"solution-step\">Let the rates of A, B and C be a, b and c.</p><div class=\"formula-box\">a = b + c<br>a + b = 1/10<br>c = 1/50</div><p class=\"solution-step\">Substitute a = b + 1/50 into a + b = 1/10.</p><div class=\"formula-box\">2b + 1/50 = 1/10<br>2b = 4/50<br>b = 1/25</div><div class=\"final-answer\">Final Answer: 25 days</div>",
      "<p class=\"solution-step\">Take B's efficiency as 5 units/day. Then A's efficiency, being 40% more, is 7 units/day.</p><p class=\"solution-step\">Since B takes 24 days, total work is:</p><div class=\"formula-box\">Work = 5 × 24 = 120 units</div><div class=\"formula-box\">Combined rate = 7 + 5 = 12 units/day<br>Time = 120/12 = 10 days</div><div class=\"final-answer\">Final Answer: 10 days</div>",
      "<p class=\"solution-step\">A is three times as efficient as B, so their efficiency ratio is 3 : 1.</p><p class=\"solution-step\">A alone takes 12 days. Therefore B alone takes 3 × 12 = 36 days.</p><div class=\"formula-box\">Combined rate = 1/12 + 1/36 = 4/36 = 1/9</div><div class=\"final-answer\">Final Answer: 9 days</div>",
      "<p class=\"solution-step\">Since B is four times as efficient as A, their time ratio is:</p><div class=\"formula-box\">A : B = 4 : 1</div><p class=\"solution-step\">The difference of 3 ratio-parts equals 15 days, so one part equals 5 days.</p><div class=\"formula-box\">A = 4 × 5 = 20 days<br>B = 1 × 5 = 5 days</div><div class=\"final-answer\">Final Answer: A = 20 days, B = 5 days</div>",
      "<p class=\"solution-step\">Let C's efficiency be 25 units. Since B is 20% less efficient than C, B = 20 units. A is 40% more efficient than B, so A = 28 units.</p><div class=\"formula-box\">Efficiency ratio A : B : C = 28 : 20 : 25<br>Time ratio A : B : C = 1/28 : 1/20 : 1/25</div><p class=\"solution-step\">A and C times are in the ratio 25 : 28. Their difference of 3 parts equals 6 days, so one part is 2 days.</p><div class=\"formula-box\">A = 50 days, C = 56 days</div><p class=\"solution-step\">B's efficiency is 20/25 of C's, so B's time is 25/20 of C's time.</p><div class=\"formula-box\">B's time = 56 × 25/20 = 70 days</div><div class=\"final-answer\">Final Answer: 70 days</div>",
      "<p class=\"solution-step\">Time is inversely proportional to efficiency.</p><div class=\"formula-box\">Efficiency P : Q = 3 : 4<br>Time P : Q = 4 : 3</div><div class=\"final-answer\">Final Answer: 4 : 3</div>",
      "<p class=\"solution-step\">Take C's efficiency as 20 units. Then B's efficiency is 80% of 20 = 16 units, and A's efficiency is 3/4 of 16 = 12 units.</p><div class=\"formula-box\">A : B : C = 12 : 16 : 20<br>B + C = 36 units</div><p class=\"solution-step\">Let total work be W units. The difference between A's time and the time of B + C is 120 days.</p><div class=\"formula-box\">W/12 − W/36 = 120<br>W/18 = 120<br>W = 2160 units</div><div class=\"formula-box\">Combined efficiency = 12 + 16 + 20 = 48<br>Time together = 2160/48 = 45 days</div><div class=\"final-answer\">Final Answer: 45 days</div>",
      "<p class=\"solution-step\">Take total work as 80 units. Then the normal combined rate is 80/4 = 20 units/day.</p><div class=\"formula-box\">Let A = a and B = b.<br>a + b = 20</div><p class=\"solution-step\">At changed efficiencies, the combined rate is 80/5 = 16.</p><div class=\"formula-box\">0.7a + 1.1b = 16<br>7a + 11b = 160</div><p class=\"solution-step\">Using a + b = 20 gives b = 5 and a = 15.</p><div class=\"formula-box\">New rate = a + 3b/2 = 15 + 15/2 = 45/2</div><div class=\"formula-box\">Required time = 80 ÷ (45/2) = 160/45 = 32/9</div><div class=\"final-answer\">Final Answer: 3 <sup>5</sup>/<sub>9</sub> days</div>",
      "<p class=\"solution-step\">Make the efficiency ratios consistent.</p><div class=\"formula-box\">A : B = 3 : 5 and B : C = 2 : 3<br>Therefore A : B : C = 6 : 10 : 15</div><p class=\"solution-step\">A and B work for 4 days and C works for 8 days.</p><div class=\"formula-box\">Total work = 4(6 + 10) + 8(15)<br>= 64 + 120 = 184 units</div><div class=\"formula-box\">B's time = 184/10 = 92/5 = 18 <sup>2</sup>/<sub>5</sub> days</div><div class=\"final-answer\">Final Answer: 18 <sup>2</sup>/<sub>5</sub> days</div>",
      "<p class=\"solution-step\">Take total work as 90 units. At normal efficiency:</p><div class=\"formula-box\">A + B = 90/10 = 9 units/day</div><p class=\"solution-step\">At the first changed efficiencies, the rate is 90/9 = 10 units/day.</p><div class=\"formula-box\">(2/3)A + (5/3)B = 10<br>2A + 5B = 30</div><p class=\"solution-step\">From A + B = 9, we get A = 5 and B = 4.</p><div class=\"formula-box\">New rate = A/2 + 2B = 5/2 + 8 = 21/2</div><div class=\"formula-box\">Required time = 90 ÷ (21/2) = 180/21 = 60/7</div><div class=\"final-answer\">Final Answer: 8 <sup>4</sup>/<sub>7</sub> days</div>",
      "<p class=\"solution-step\">Let the rates of A, B and C be a, b and c.</p><p class=\"solution-step\">A takes three times the time of B + C, so B + C is three times as efficient as A. B takes four times the time of A + C.</p><div class=\"formula-box\">b + c = 3a<br>a + c = 4b</div><p class=\"solution-step\">Solving the ratios gives b = 4a/5 and c = 11a/5.</p><div class=\"formula-box\">a + b + c = a + 4a/5 + 11a/5 = 4a</div><p class=\"solution-step\">Together they take 22 days, so 4a = 1/22 and a = 1/88.</p><div class=\"formula-box\">A = 88 days<br>B rate = 1/110 ⇒ B = 110 days<br>C rate = 1/40 ⇒ C = 40 days</div><div class=\"final-answer\">Final Answer: A = 88 days, B = 110 days, C = 40 days</div>",
      "<p class=\"solution-step\">Let the rates of A, B and C be a, b and c.</p><p class=\"solution-step\">B takes twice the time of A + C, and C takes three times the time of A + B.</p><div class=\"formula-box\">a + c = 2b<br>a + b = 3c</div><p class=\"solution-step\">These equations give b = 4a/5 and c = 3a/5.</p><div class=\"formula-box\">a + b + c = a + 4a/5 + 3a/5 = 12a/5 = 1/36</div><p class=\"solution-step\">Thus a = 5/432, b = 1/108 and c = 1/144.</p><div class=\"formula-box\">A's time = 432/5 = 86 <sup>2</sup>/<sub>5</sub> days<br>B's time = 108 days<br>C's time = 144 days</div><div class=\"final-answer\">Final Answer: A = 86 <sup>2</sup>/<sub>5</sub> days, B = 108 days, C = 144 days</div>",
      "<p class=\"solution-step\">Suppose B completes W units of work in t days. A completes W/2 units in t/6 days.</p><div class=\"formula-box\">Efficiency of A / Efficiency of B = (W/2)/(t/6) ÷ (W/t) = 3</div><p class=\"solution-step\">Therefore A : B efficiency = 3 : 1. Take their rates as 3 and 1 units/day.</p><div class=\"formula-box\">Total work = (3 + 1) × 10 = 40 units</div><div class=\"formula-box\">B's time = 40/1 = 40 days</div><div class=\"final-answer\">Final Answer: 40 days</div>",
      "<p class=\"solution-step\">Suppose B completes W units in t days. A completes W/2 units in 3t/4 days.</p><div class=\"formula-box\">Efficiency of A / Efficiency of B = (W/2)/(3t/4) ÷ (W/t) = 2/3</div><p class=\"solution-step\">Thus A : B efficiency = 2 : 3. Take their rates as 2 and 3 units/day.</p><div class=\"formula-box\">Total work = (2 + 3) × 18 = 90 units</div><div class=\"formula-box\">B's time = 90/3 = 30 days</div><div class=\"final-answer\">Final Answer: 30 days</div>",
      "<p class=\"solution-step\">Take total work as LCM(25, 40, 60) = 600 units.</p><div class=\"formula-box\">A = 24 units/day, B = 15 units/day, C = 10 units/day</div><p class=\"solution-step\">Let the total completion time be T days. A works for 5 days, B works for T − 10 days, and C works for all T days.</p><div class=\"formula-box\">5(24) + 15(T − 10) + 10T = 600</div><div class=\"formula-box\">120 + 15T − 150 + 10T = 600<br>25T = 630<br>T = 126/5</div><div class=\"final-answer\">Final Answer: 25 <sup>1</sup>/<sub>5</sub> days</div>"
];

    let current = 0, submitted = false, secondsLeft = 40 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function mathFractions(s){let v=String(s ?? "");v=v.replace(/(\d+)\s*<sup>(\d+)<\/sup>\/<sub>(\d+)<\/sub>/g,'<span class="mixed-number">$1 <span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span></span>');return v.replace(/(^|[^A-Za-z0-9.²>])([A-Za-z0-9.²]+)\/([A-Za-z0-9.²]+)/g,'$1<span class="math-frac"><span class="frac-num">$2</span><span class="frac-den">$3</span></span>');}
    function rich(s){return mathFractions(hasHtml(s) ? String(s) : esc(s));}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="number" min="1" step="1" inputmode="numeric" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type a natural number" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
