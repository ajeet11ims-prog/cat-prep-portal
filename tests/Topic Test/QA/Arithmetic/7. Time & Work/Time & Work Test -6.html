    const solutionText = [
      "<p class=\"solution-step\">Rates: A = 1/10, B = 1/12 and C = 1/15.</p><div class=\"formula-box\">A + B + C = 1/4, B + C = 3/20, C = 1/15</div><p class=\"solution-step\">Let total time be T days. A works for T − 5 days, B works for T − 3 days and C works for all T days.</p><div class=\"formula-box\">(T - 5)(1/4) + 2(3/20) + 3(1/15) = 1</div><p class=\"solution-step\">So (T − 5)/4 + 1/2 = 1, hence T = 7.</p><div class=\"final-answer\">Final Answer: 7 days</div>",
      "<p class=\"solution-step\">A + B together do 1/20 + 1/30 = 1/12 of the work per day.</p><div class=\"formula-box\">Work done in 7 days = 7/12</div><p class=\"solution-step\">Remaining work = 5/12. C does this in 10 days.</p><div class=\"formula-box\">C's rate = (5/12)/10 = 1/24</div><div class=\"final-answer\">Final Answer: 24 days</div>",
      "<p class=\"solution-step\">B alone and C alone each take 12 days, so B = C = 1/12.</p><div class=\"formula-box\">A + B = 1/8 \⇒ A = 1/24</div><p class=\"solution-step\">A and B work for 4 days, so they complete 1/2 of the work. B then works 2 days and completes 1/6. Remaining work = 1/3.</p><div class=\"formula-box\">Time taken by C = (1/3)/(1/12) = 4 days</div><div class=\"final-answer\">Final Answer: 4 days</div>",
      "<p class=\"solution-step\">A's rate = 1/18. Since B takes half the time of A, B takes 9 days, so B's rate = 1/9.</p><div class=\"formula-box\">Together = 1/18 + 1/9 = 1/6</div><div class=\"final-answer\">Final Answer: <sup>1</sup>/<sub>6</sub> part</div>",
      "<p class=\"solution-step\">Let A, B and C have rates a, b and c.</p><div class=\"formula-box\">1/b = 2/(a + c) \⇒ a + c = 2b<br>1/c = 3/(a + b) \⇒ a + b = 3c</div><p class=\"solution-step\">These give b = 4c/3 and a = 5c/3.</p><div class=\"formula-box\">a + b + c = 4c = 1/25</div><p class=\"solution-step\">So c = 1/100, b = 1/75 and a = 1/60.</p><div class=\"final-answer\">Final Answer: A = 60 days, B = 75 days, C = 100 days</div>",
      "<p class=\"solution-step\">A completes 4/5 of the work in 20 days.</p><div class=\"formula-box\">A's rate = (4/5)/20 = 1/25</div><p class=\"solution-step\">The remaining 1/5 is done by A + B in 3 days, so A + B = 1/15.</p><div class=\"formula-box\">B = 1/15 - 1/25 = 2/75</div><div class=\"formula-box\">B's time = 1/(2/75) = 75/2</div><div class=\"final-answer\">Final Answer: 37 <sup>1</sup>/<sub>2</sub> days</div>",
      "<p class=\"solution-step\">A's rate = (1/2)/5 = 1/10, B's rate = (3/5)/9 = 1/15 and C's rate = (2/3)/8 = 1/12.</p><div class=\"formula-box\">Together = 1/10 + 1/15 + 1/12 = 1/4</div><div class=\"final-answer\">Final Answer: 4 days</div>",
      "<p class=\"solution-step\">Let Ram's efficiency be x. Rahul is twice as efficient, so Rahul's efficiency is 2x.</p><div class=\"formula-box\">3x = 1/12 \⇒ x = 1/36</div><p class=\"solution-step\">Rahul's rate = 2x = 1/18.</p><div class=\"final-answer\">Final Answer: 18 days</div>",
      "<p class=\"solution-step\">A + B together = 1/12 and A = 1/20.</p><div class=\"formula-box\">B's full-day rate = 1/12 - 1/20 = 1/30</div><p class=\"solution-step\">If B works only half a day, his effective daily rate is 1/60.</p><div class=\"formula-box\">Effective daily work = 1/20 + 1/60 = 1/15</div><div class=\"final-answer\">Final Answer: 15 days</div>",
      "<p class=\"solution-step\">Rates: A = 1/12, B = 1/15, C = 1/18.</p><div class=\"formula-box\">A + B + C = 37/180, B + C = 11/90, C = 1/18</div><p class=\"solution-step\">Let total time be T days.</p><div class=\"formula-box\">2(37/180) + (T - 5)(11/90) + 3(1/18) = 1</div><p class=\"solution-step\">This gives T = 8 5/11 days.</p><div class=\"final-answer\">Final Answer: 8 <sup>5</sup>/<sub>11</sub> days</div>",
      "<p class=\"solution-step\">A = 1/15 and B = 1/20. They work on alternate days starting with B.</p><p class=\"solution-step\">In 2 days they complete 1/20 + 1/15 = 7/60.</p><div class=\"formula-box\">After 16 days: 8 cycles = 56/60 = 14/15 done</div><p class=\"solution-step\">Remaining work = 1/15. Day 17 belongs to B, who needs (1/15)/(1/20) = 4/3 day.</p><div class=\"final-answer\">Final Answer: 17 <sup>1</sup>/<sub>3</sub> days</div>",
      "<p class=\"solution-step\">Day 1 and day 2: A alone. Day 3: A + B + C together.</p><div class=\"formula-box\">A = 1/20, A + B + C = 1/10</div><p class=\"solution-step\">Work done in one 3-day cycle:</p><div class=\"formula-box\">1/20 + 1/20 + 1/10 = 1/5</div><p class=\"solution-step\">Therefore 5 such cycles complete the whole work.</p><div class=\"final-answer\">Final Answer: 15 days</div>",
      "<p class=\"solution-step\">Let A work for x days, after which B and C continue. Total completion time is 12 days.</p><div class=\"formula-box\">A + B + C = 37/300, B + C = 11/150</div><div class=\"formula-box\">x(37/300) + (12 - x)(11/150) = 1</div><p class=\"solution-step\">Solving gives x = 12/5.</p><div class=\"final-answer\">Final Answer: 2 <sup>2</sup>/<sub>5</sub> days</div>",
      "<p class=\"solution-step\">Let B leave x days before the end. Then all three work for 7 − x days, and A + C work for x days.</p><div class=\"formula-box\">A + B + C = 37/240, A + C = 5/48</div><div class=\"formula-box\">(7 - x)(37/240) + x(5/48) = 1</div><p class=\"solution-step\">Solving gives x = 19/12.</p><div class=\"final-answer\">Final Answer: 1 <sup>7</sup>/<sub>12</sub> days</div>",
      "<p class=\"solution-step\">Let total time be T days. A works for T days, B works only for 3 days, and C works for T − 3 days.</p><div class=\"formula-box\">T/12 + 3/15 + (T - 3)/20 = 1</div><p class=\"solution-step\">Multiplying by 60 gives 5T + 12 + 3T - 9 = 60, so 8T = 57.</p><div class=\"final-answer\">Final Answer: 7 <sup>1</sup>/<sub>8</sub> days</div>",
      "<p class=\"solution-step\">The intended pattern is: day 1 all three, day 2 B absent, day 3 all three, day 4 C absent; then it repeats.</p><div class=\"formula-box\">A + B + C = 47/240, A + C = 32/240, A + B = 35/240</div><p class=\"solution-step\">Work in first 4 days = 47/240 + 32/240 + 47/240 + 35/240 = 161/240.</p><p class=\"solution-step\">Day 5 all three work, total becomes 208/240. Remaining 32/240 is finished on day 6 by A + C.</p><div class=\"final-answer\">Final Answer: 6 days</div>",
      "<p class=\"solution-step\">Cycle: day 1 A + B, day 2 B + C, day 3 A + C, day 4 holiday.</p><div class=\"formula-box\">A + B = 11/60, B + C = 9/60, A + C = 10/60</div><p class=\"solution-step\">So one 4-day cycle completes 30/60 = 1/2 of the work.</p><p class=\"solution-step\">After 4 days, half remains. Day 5 and day 6 complete 20/60 more, leaving 10/60, which is completed on day 7 by A + C.</p><div class=\"final-answer\">Final Answer: 7 days</div>",
      "<p class=\"solution-step\">A + B + C together = 1/32.</p><div class=\"formula-box\">Work done in 20 days = 20/32 = 5/8</div><p class=\"solution-step\">Remaining 3/8 is done by B + C in 20 days, so B + C = 3/160.</p><div class=\"formula-box\">A = 1/32 - 3/160 = 1/80</div><div class=\"final-answer\">Final Answer: 80 days</div>",
      "<p class=\"solution-step\">A + B + C = 1/32. In 24 days they complete 24/32 = 3/4 of the work.</p><div class=\"formula-box\">Remaining work = 1/4</div><p class=\"solution-step\">A + B complete this in 28 days, so A + B = 1/112.</p><p class=\"solution-step\">A's 1-day work = B's 2-day work, so A = 2B. Therefore 3B = 1/112.</p><div class=\"formula-box\">B = 1/336, A = 1/168, C = 1/32 - 1/112 = 5/224</div><div class=\"final-answer\">Final Answer: A = 168 days, B = 336 days, C = 44 <sup>4</sup>/<sub>5</sub> days</div>",
      "<p class=\"solution-step\">Let A + B together take x hours. Then A takes x + 4 hours and B takes x + 9 hours.</p><div class=\"formula-box\">1/(x + 4) + 1/(x + 9) = 1/x</div><p class=\"solution-step\">This simplifies to x² = 36.</p><div class=\"final-answer\">Final Answer: 6 hours</div>",
      "<p class=\"solution-step\">Let rates be a, b and c.</p><div class=\"formula-box\">a + b = 1/8, b + c = 1/12, 4a + 7b + 9c = 1</div><p class=\"solution-step\">Substituting a = 1/8 − b and c = 1/12 − b gives 5/4 − 6b = 1.</p><div class=\"formula-box\">b = 1/24 \⇒ c = 1/12 - 1/24 = 1/24</div><div class=\"final-answer\">Final Answer: 24 days</div>",
      "<p class=\"solution-step\">Let B alone take x days. Then A alone takes x + 4 days.</p><div class=\"formula-box\">1/x + 1/(x + 4) = 1/(8 8/9) = 9/80</div><p class=\"solution-step\">Trying x = 16 satisfies the equation: 1/16 + 1/20 = 9/80.</p><div class=\"final-answer\">Final Answer: A = 20 days, B = 16 days</div>",
      "<p class=\"solution-step\">Let the rates be a and b.</p><div class=\"formula-box\">4a + 18b = 1, 6a + 12b = 1</div><p class=\"solution-step\">Subtracting gives a = 3b. Substitute into 6a + 12b = 1.</p><div class=\"formula-box\">30b = 1 \⇒ b = 1/30, a = 1/10</div><div class=\"final-answer\">Final Answer: A = 10 days, B = 30 days</div>",
      "<p class=\"solution-step\">Let B's rate be 2x. Then A's rate is x because A does half as much as B.</p><div class=\"formula-box\">A + B = 3x \⇒ C = (A + B)/2 = 3x/2</div><p class=\"solution-step\">C alone takes 40 days, so 3x/2 = 1/40.</p><div class=\"formula-box\">x = 1/60, total rate = x + 2x + 3x/2 = 3/40</div><div class=\"final-answer\">Final Answer: 13 <sup>1</sup>/<sub>3</sub> days</div>",
      "<p class=\"solution-step\">Let the rates be a, b and c. Then a + c = 1/12 and a + b = 1/20.</p><div class=\"formula-box\">24a + 6b + 2c = 1</div><p class=\"solution-step\">Using b = 1/20 − a and c = 1/12 − a gives:</p><div class=\"formula-box\">24a + 6(1/20 - a) + 2(1/12 - a) = 1</div><p class=\"solution-step\">So 16a + 7/15 = 1, hence a = 1/30, b = 1/60 and c = 1/20.</p><div class=\"formula-box\">A + B + C = 1/10</div><div class=\"final-answer\">Final Answer: 10 days</div>",
      "<p class=\"solution-step\">Mohan's speed = 32/6 = 16/3 pages/hour and Sohan's speed = 40/5 = 8 pages/hour.</p><div class=\"formula-box\">Combined speed = 16/3 + 8 = 40/3 pages/hour</div><div class=\"formula-box\">Time for 110 pages = 110 \÷ (40/3) = 33/4</div><div class=\"final-answer\">Final Answer: 8 <sup>1</sup>/<sub>4</sub> hours</div>",
      "<p class=\"solution-step\">A can do 80% of B's work in 20% more time. So A : B = (0.8/1.2) : 1 = 2 : 3 in efficiency.</p><p class=\"solution-step\">Let their rates be 2x and 3x. Together they finish in 40 days.</p><div class=\"formula-box\">5x = 1/40 \⇒ x = 1/200</div><div class=\"formula-box\">A = 1/100, B = 3/200</div><div class=\"final-answer\">Final Answer: A = 100 days, B = 66 <sup>2</sup>/<sub>3</sub> days</div>",
      "<p class=\"solution-step\">A + B + C = 1/40. In 25 days they complete 25/40 = 5/8.</p><div class=\"formula-box\">Remaining work = 3/8, done by A + C in 20 days \⇒ A + C = 3/160</div><p class=\"solution-step\">If C is half as efficient as B, then B = 2C.</p><div class=\"formula-box\">(A + C) + B = 1/40 \⇒ 3/160 + B = 1/40 \⇒ B = 1/160</div><p class=\"solution-step\">So C = 1/320 and A = 3/160 − 1/320 = 1/64.</p><div class=\"final-answer\">Final Answer: 64 days</div>",
      "<p class=\"solution-step\">Let Shashank's and Nitish's rates be s and n.</p><div class=\"formula-box\">12s + 15n = 1, 10s + 18n = 1</div><p class=\"solution-step\">Subtracting gives 2s = 3n, so s = 3n/2.</p><div class=\"formula-box\">33n = 1 \⇒ n = 1/33, s = 1/22</div><p class=\"solution-step\">Changed rates: 0.8s = 4/110 and 1.5n = 5/110.</p><div class=\"formula-box\">Combined rate = 9/110</div><div class=\"final-answer\">Final Answer: 12 <sup>2</sup>/<sub>9</sub> days</div>",
      "<p class=\"solution-step\">Let the rates be a, b and c. Then a + b + c = 1/40.</p><p class=\"solution-step\">(A + B) take one-third less time than C alone, so:</p><div class=\"formula-box\">a + b = 3c/2</div><p class=\"solution-step\">Hence 5c/2 = 1/40, so c = 1/100.</p><p class=\"solution-step\">(A + C) take one-fourth less time than B alone, so:</p><div class=\"formula-box\">a + c = 4b/3</div><p class=\"solution-step\">Using a + c = 1/40 − b gives b = 3/280.</p><div class=\"formula-box\">B + C = 3/280 + 1/100 = 29/1400</div><div class=\"final-answer\">Final Answer: 48 <sup>8</sup>/<sub>29</sub> days</div>",
      "<p class=\"solution-step\">A can do 2/5 of B's work in 1/4 of B's time, so A : B = 8 : 5 in efficiency.</p><div class=\"formula-box\">B can do 4/3 of C's work in 3/5 of C's time \⇒ B : C = 20 : 9</div><p class=\"solution-step\">Therefore A : B : C = 32 : 20 : 9. Let their rates be 32x, 20x and 9x.</p><div class=\"formula-box\">61x = 1/60 \⇒ x = 1/3660</div><div class=\"final-answer\">Final Answer: A = 114 <sup>3</sup>/<sub>8</sub> days, B = 183 days, C = 406 <sup>2</sup>/<sub>3</sub> days</div>",
      "<p class=\"solution-step\">A + B + C = 1/28. In 18 days they complete 18/28 = 9/14.</p><div class=\"formula-box\">Remaining work = 5/14, done by A + C in 25 days \⇒ A + C = 1/70</div><p class=\"solution-step\">Given A's 2-day work = C's 3-day work, so 2A = 3C and A = 3C/2.</p><div class=\"formula-box\">3C/2 + C = 1/70 \⇒ C = 1/175, A = 3/350</div><div class=\"formula-box\">B = 1/28 - 1/70 = 3/140</div><div class=\"final-answer\">Final Answer: A = 116 <sup>2</sup>/<sub>3</sub> days, B = 46 <sup>2</sup>/<sub>3</sub> days, C = 175 days</div>"
]

    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input type="number" min="1" step="1" inputmode="numeric" class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type a natural number" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+rich(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';host.scrollTop=0;if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
