":"<p>Sachin writes all numbers from 1 to 1000 in order. Find the 2883rd digit written by him.</p>","options":["<p>0</p>","<p>9</p>","<p>7</p>","<p>8</p>"],"answer":2,"typedAnswer":"7","solution":""},{"no":5,"itemId":60005,"source":"Number System Properties of Numbers Intermediate Test | Q5 | Intermediate | Primes and zeros","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Let S be the set of prime numbers greater than or equal to 2 and less than 100. Multiply all elements of S. How many consecutive zeros will be produced at the end?</p>","options":["<p>1</p>","<p>4</p>","<p>5</p>","<p>10</p>"],"answer":0,"typedAnswer":"1","solution":""},{"no":6,"itemId":60006,"source":"Number System Properties of Numbers Intermediate Test | Q6 | Intermediate | Number comparison","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Let x &lt; 0.50, 0 &lt; y &lt; 1, z &gt; 1. The median of x, y and z would be:</p>","options":["<p>less than one</p>","<p>between 0 and 1</p>","<p>greater than 1</p>","<p>cannot say</p>"],"answer":1,"typedAnswer":"between 0 and 1","solution":""},{"no":7,"itemId":60007,"source":"Number System Properties of Numbers Intermediate Test | Q7 | Intermediate | Odd-even","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Given odd positive integers x, y and z, which of the following is not necessarily true?</p>","options":["<p>x<sup>2</sup>y<sup>2</sup>z<sup>2</sup> is odd</p>","<p>3(x<sup>2</sup> + y<sup>3</sup>)z<sup>2</sup> is even</p>","<p>5x + y + z<sup>4</sup> is odd</p>","<p>z<sup>2</sup>(x<sup>4</sup> + y<sup>4</sup>)/2 is even</p>"],"answer":3,"typedAnswer":"z<sup>2</sup>(x<sup>4</sup> + y<sup>4</sup>)/2 is even","solution":""},{"no":8,"itemId":60008,"source":"Number System Properties of Numbers Intermediate Test | Q8 | Intermediate | Number comparison","type":"mcq","directio >16</overline> in fraction form.</p>","options":["<p>367/330</p>","<p>221/198</p>","<p>62/55</p>","<p>223/198</p>"],"answer":1,"typedAnswer":"221/198","solution":""},{"no":13,"itemId":60013,"source":"Number System Properties of Numbers Intermediate Test | Q13 | Intermediate | Consecutive even numbers","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>N is obtained by adding 16 to the product of four consecutive even natural numbers. How many statements are always true? (1) N divisible by 32 (2) N divisible by 16 (3) N divisible by 64 (4) N is a perfect square.</p>","options":["<p>0</p>","<p>1</p>","<p>2</p>","<p>3</p>"],"answer":2,"typedAnswer":"2","solution":""},{"no":14,"itemId":60014,"source":"Number System Properties of Numbers Intermediate Test | Q14 | Intermediate | Prime factorization","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>There are four prime numbers in ascending order. The product of the first three is 2431 and the product of the last three is 4199. Find the greatest of them.</p>","options":[],"answer":0,"typedAnswer":"19","solution":""},{"no":15,"itemId":60015,"source":"Number System Properties of Numbers Intermediate Test | Q15 | Intermediate | Divisibility","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>N is a natural number greater than 6. Find the remainder when N<sup>7</sup> - N is divided by 6.</p>","options":["<p>0</p>","<p>1</p>","<p>2</p>","<p>3</p>"],"answer":0,"typedAnswer":"0","solution":""},{"no":16,"itemId":60016,"source":"Number System Properties of Numbers Intermediate Test | Q16 | Intermediate | Digit counting","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>A 1500-page dictionary is to be numbered from page 1 to page 1500. Find the number of digit key presses required.</p>","options":[],"answer":0,"typedAnswer":"4893","solution":""},{"no":17,"itemId":60017,"source":"Number System Properties of Numbers Intermediate Test | Q17 | Intermediate | Recurring decimals","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>What is the value of 0.7<overline>54</overline> + 0.69<overline>2</overline>?</p>","options":["<p>1813/900</p>","<p>1783/910</p>","<p>14323/9900</p>","<p>13243/9900</p>"],"answer":2,"typedAnswer":"14323/9900","solution":""},{"no":18,"itemId":60018,"source":"Number System Properties of Numbers Intermediate Test | Q18 | Intermediate | Arithmetic operations","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>2/3 of 45 &divide; 5 &times; (2<sup>4</sup> - 1) &divide; 90 =</p>","options":["<p>2</p>","<p>1</p>","<p>1/2</p>","<p>1/3</p>"],"answer":1,"typedAnswer":"1","solution":""},{"no":19,"itemId":60019,"source":"Number System Properties of Numbers Intermediate Test | Q19 | Intermediate | Arithmetic operations","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>5 + 6 &times; 1/3 of 9 - {4 - 5/8 + 2 7/8 + 3/4} =</p>","options":["<p>12</p>","<p>14</p>","<p>16</p>","<p>18</p>"],"answer":2,"typedAnswer":"16","solution":""},{"no":20,"itemId":60020,"source":"Number System Properties of Numbers Intermediate Test | Q20 | Intermediate | Divisibility","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>If n is a positive integer greater than 1, n<sup>5</sup> - n is always divisible by ________.</p>","options":["<p>5</p>","<p>7</p>","<p>11</p>","<p>13</p>"],"answer":0,"typedAnswer":"5","solution":""},{"no":21,"itemId":60021,"source":"Number System Properties of Numbers Intermediate Test | Q21 | Intermediate | Divisibility","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>If n is a positive integer greater than 1, then n(2n + 1)(n<sup>2</sup> - 1)(4n<sup>2</sup> + 4n) is always divisible by ________.</p>","options":["<p>12</p>","<p>24</p>","<p>48</p>","<p>144</p>"],"answer":3,"typedAnswer":"144","solution":""},{"no":22,"itemId":60022,"source":"Number System Properties of Numbers Intermediate Test | Q22 | Intermediate | Prime triplets","type":"text","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>If a, b and c are prime numbers satisfying a = b - 2 = c - 4, how many possible combinations exist?</p>","options":[],"answer":0,"typedAnswer":"1","solution":""},{"no":23,"itemId":60023,"source":"Number System Properties of Numbers Intermediate Test | Q23 | Intermediate | Odd integers","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Let p, q and r be distinct positive odd integers. Which statement cannot always be true?</p>","options":["<p>pq<sup>2</sup>r<sup>3</sup> is odd</p>","<p>(p + q)<sup>2</sup>r<sup>3</sup> is even</p>","<p>(p - q + r)<sup>2</sup>(q + r) is even</p>","<p>If p, q and r are consecutive odd integers, the remainder of their product when divided by 4 is 3</p>"],"answer":3,"typedAnswer":"If p, q and r are consecutive odd integers, the remainder of their product when divided by 4 is 3","solution":""},{"no":24,"itemId":60024,"source":"Number System Properties of Numbers Intermediate Test | Q24 | Intermediate | Digit reversal","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>A four-digit number N exceeds the number formed by reversing its digits by K, where K is a positive multiple of 74. The least value of N lies between ________.</p>","options":["<p>1000 and 1300</p>","<p>1900 and 2200</p>","<p>1300 and 1600</p>","<p>1600 and 1900</p>"],"answer":1,"typedAnswer":"1900 and 2200","solution":""},{"no":25,"itemId":60025,"source":"Number System Properties of Numbers Intermediate Test | Q25 | Intermediate | Consecutive numbers","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>If n = 1 + x, where x is the product of four consecutive positive integers, then which are true? A. n is odd. B. n is prime. C. n is a perfect square.</p>","options":["<p>A and C only</p>","<p>A and B only</p>","<p>A only</p>","<p>None of these</p>"],"answer":0,"typedAnswer":"A and C only","solution":""},{"no":26,"itemId":60026,"source":"Number System Properties of Numbers Intermediate Test | Q26 | Intermediate | Odd integers","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Let x, y and z be distinct odd positive integers. Which statement cannot be true?</p>","options":["<p>xyz<sup>2</sup> is odd</p>","<p>(x - y)<sup>2</sup> - z is odd</p>","<p>(x + y - z)<sup>2</sup>(x + y) is even</p>","<p>(x - y)(y + z)(x + y - z) is odd</p>"],"answer":3,"typedAnswer":"(x - y)(y + z)(x + y - z) is odd","solution":""},{"no":27,"itemId":60027,"source":"Number System Properties of Numbers Intermediate Test | Q27 | Intermediate | Twin primes","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>Two prime numbers P<sub>1</sub>, P<sub>2</sub> with P<sub>1</sub> &lt; P<sub>2</sub> are twin primes. If P<sub>2</sub> &gt; 23, which number always divides P<sub>1</sub> + P<sub>2</sub>?</p>","options":["<p>12</p>","<p>8</p>","<p>24</p>","<p>16</p>"],"answer":0,"typedAnswer":"12","solution":""},{"no":28,"itemId":60028,"source":"Number System Properties of Numbers Intermediate Test | Q28 | Intermediate | Sequences","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>The sequence 2, 3, 5, 6, 7, 10, ... contains all natural numbers that are neither perfect squares nor perfect cubes. Find the 76th term.</p>","options":["<p>89</p>","<p>87</p>","<p>86</p>","<p>88</p>"],"answer":1,"typedAnswer":"87","solution":""},{"no":29,"itemId":60029,"source":"Number System Properties of Numbers Intermediate Test | Q29 | Intermediate | Digit constraints","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>A three-digit number has its hundreds digit equal to the product of the other two prime digits. The absolute difference between the number and its reverse is 297. Then the tens digit is</p>","options":["<p>2</p>","<p>3</p>","<p>7</p>","<p>4</p>"],"answer":0,"typedAnswer":"2","solution":""},{"no":30,"itemId":60030,"source":"Number System Properties of Numbers Intermediate Test | Q30 | Intermediate | Digit reversal","type":"mcq","direction":"<p>Answer the questions independently of each other.</p>","passage":"","question":"<p>When a two-digit number is added to another two-digit number with the same digits reversed, the sum is a perfect square. How many such two-digit numbers are there?</p>","options":["<p>4</p>","<p>6</p>","<p>8</p>","<p>10</p>"],"answer":2,"typedAnswer":"8","solution":""}];

    const solutionOverrides = {
      "1": "<p>The only even prime digit is 2. The remaining part is the square of 1234, and 1234<sup>2</sup> = 1522756. Hence the telephone number is 21522756.</p>",
      "2": "<p>Use binary-style bags: 1, 2, 4, 8, 16, 32 and 37. With the first six bags, every amount from 1 to 63 is possible; the last bag extends coverage up to 100. Six bags can cover at most 2<sup>6</sup>-1 = 63 different positive amounts, so 7 bags are necessary.</p>",
      "3": "<p>The distinct multiples of 3 from 1 to 8 are 3 and 6. Thus A = 0.333... = 1/3 and B = 0.666... = 2/3. Hence A+B = 1.</p>",
      "4": "<p>Digits from 1 to 9 use 9 digits. Digits from 10 to 99 use 90 × 2 = 180 digits. So before 3-digit numbers, 189 digits are used. The required position in the 3-digit block is 2883 - 189 = 2694. Since 2694/3 = 898, the digit is the last digit of the 898th three-digit number, which is 997. Hence the digit is 7.</p>",
      "5": "<p>The product of all primes less than 100 contains only one factor 2 and one factor 5. Each trailing zero needs one pair of 2 and 5. Therefore exactly 1 trailing zero is produced.</p>",
      "6": "<p>Since z &gt; 1, z is the greatest among the three. Both x and y are less than 1, while y is positive and x is less than 0.50. Therefore the middle value, or median, must lie between 0 and 1.</p>",
      "7": "<p>For odd x, y and z: x<sup>2</sup>y<sup>2</sup>z<sup>2</sup> is odd. Also x<sup>2</sup> + y<sup>3</sup> is even, so 3(x<sup>2</sup>+y<sup>3</sup>)z<sup>2</sup> is even. Further, 5x+y+z<sup>4</sup> is odd. But (x<sup>4</sup>+y<sup>4</sup>)/2 may be odd, so the last statement is not necessarily true.</p>",
      "8": "<p>yz is always positive, xy can never be zero, and y<sup>2</sup>-z<sup>2</sup> is always negative because 0&lt;y&lt;1&lt;z. But x<sup>2</sup>-z<sup>2</sup> can be positive or negative depending on the magnitude of x. Hence that statement may be false.</p>",
      "9": "<p>0.2\\overline{55} = 0.25555... = (255-2)/990 = 253/990 = 23/90.</p>",
      "10": "<p>0.3\\overline{21} = 0.3212121... = (321-3)/990 = 318/990 = 53/165.</p>",
      "11": "<p>0.32\\overline{1} = 0.321111... = (321-32)/900 = 289/900.</p>",
      "12": "<p>1.1\\overline{16} = 1.1161616... = (1116-11)/990 = 1105/990 = 221/198.</p>",
      "13": "<p>Let the four consecutive even numbers be 2n, 2n+2, 2n+4 and 2n+6. Their product plus 16 is 16[n(n+1)(n+2)(n+3)+1] = 16(n<sup>2</sup>+3n+1)<sup>2</sup>. So N is divisible by 16 and is a perfect square. It is not always divisible by 32 or 64. Hence 2 statements are always true.</p>",
      "14": "<p>Factor the products: 2431 = 11 × 13 × 17 and 4199 = 13 × 17 × 19. The four primes in ascending order are 11, 13, 17 and 19. The greatest is 19.</p>",
      "15": "<p>For any integer N, N<sup>7</sup>-N is divisible by 2 and by 3. Hence it is divisible by 6. Therefore the remainder on division by 6 is 0.</p>",
      "16": "<p>Pages 1 to 9 require 9 digits. Pages 10 to 99 require 90 × 2 = 180 digits. Pages 100 to 999 require 900 × 3 = 2700 digits. Pages 1000 to 1500 require 501 × 4 = 2004 digits. Total = 9+180+2700+2004 = 4893.</p>",
      "17": "<p>0.7\\overline{54} = (754-7)/990 = 747/990 = 83/110. Also 0.69\\overline{2} = (692-69)/900 = 623/900. Adding them gives 83/110 + 623/900 = 14323/9900.</p>",
      "18": "<p>2/3 of 45 is 30. Then 30 ÷ 5 = 6. Also 2<sup>4</sup>-1 = 15. So the expression becomes 6 × 15 ÷ 90 = 90 ÷ 90 = 1.</p>",
      "19": "<p>First, 1/3 of 9 = 3, so 6 × 3 = 18 and 5+18 = 23. The bracket equals 4 - 5/8 + 2 7/8 + 3/4 = 7. Therefore the value is 23 - 7 = 16.</p>",
      "20": "<p>By Fermat's theorem, n<sup>5</sup> ≡ n (mod 5) for every integer n. Hence n<sup>5</sup>-n is always divisible by 5.</p>",
      "21": "<p>The expression is n(2n+1)(n<sup>2</sup>-1)(4n<sup>2</sup>+4n) = 4n<sup>2</sup>(n+1)<sup>2</sup>(n-1)(2n+1). It is always divisible by 16 and also always divisible by 9 by checking n modulo 3. Therefore it is always divisible by 16 × 9 = 144.</p>",
      "22": "<p>The primes are a, a+2 and a+4. Among any three numbers in arithmetic progression with common difference 2, one is divisible by 3. For all three to be prime, that number must be 3. Hence the only triplet is 3, 5, 7, so there is 1 possible combination.</p>",
      "23": "<p>For distinct positive odd p, q and r, the first three statements are always true. But if p, q and r are consecutive odd integers, the product is not always 3 modulo 4. For example, 1 × 3 × 5 leaves remainder 3, while 3 × 5 × 7 leaves remainder 1. Hence the fourth statement cannot always be true.</p>",
      "24": "<p>Checking the condition N - reverse(N) as a positive multiple of 74, the least possible four-digit value is N = 2000, because 2000 - 0002 = 1998 and 1998 is divisible by 74. Thus the least value lies between 1900 and 2200.</p>",
      "25": "<p>For four consecutive positive integers k, k+1, k+2, k+3, we have k(k+1)(k+2)(k+3)+1 = (k<sup>2</sup>+3k+1)<sup>2</sup>. Also the product is even, so 1 plus the product is odd. Thus A and C are true, but B is not necessarily true.</p>",
      "26": "<p>x-y is even because x and y are odd. Therefore (x-y)(y+z)(x+y-z) has an even factor and must be even. It cannot be odd. Hence the given statement cannot be true.</p>",
      "27": "<p>For twin primes greater than 3, the primes are of the form 6k-1 and 6k+1. Their sum is 12k, which is always divisible by 12. Since P<sub>2</sub> &gt; 23, this standard form applies.</p>",
      "28": "<p>Count natural numbers up to 87 that are perfect squares or perfect cubes. Squares up to 87 are 9 in number, cubes are 4 in number, and 1 and 64 are counted in both lists. So excluded numbers = 9+4-2 = 11. Hence non-square and non-cube numbers up to 87 = 87-11 = 76. Therefore the 76th term is 87.</p>",
      "29": "<p>The hundreds digit is the product of the other two prime digits. The only single-digit product of two prime digits that can work here is 2 × 3 = 6, so the hundreds digit is 6. Since the absolute difference between the number and its reverse is 297, we have 99|hundreds - units| = 297, so |6 - units| = 3. Thus the units digit is 3 and the tens digit is 2.</p>",
      "30": "<p>Let the two-digit number be 10a+b. Its reverse is 10b+a, so their sum is 11(a+b). This must be a perfect square. Since a+b can range from 1 to 18, the only possible value is a+b = 11, giving sum 121. The pairs with a from 2 to 9 give 8 two-digit numbers.</p>"
};
    questions.forEach(q=>{ if(solutionOverrides[q.no]) q.solution = solutionOverrides[q.no]; });
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><p class="muted" style="margin:0 0 10px">Solutions are now visible below each question. Use the Question Bar to review all questions.</p><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
