    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}

    .qbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.qbtn{height:44px;border:1px solid #a9b3bc;background:linear-gradient(#fff,#dfe5ea);border-radius:3px;cursor:pointer;font-size:18px;font-weight:700;color:#45515a;box-shadow:inset 0 1px 0 #fff}.qbtn.current{outline:0;background:#e85b21;color:#fff;border-color:#c84815;clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%)}.qbtn.answered{background:#72bd3b;color:#fff;border-color:#4f9727;clip-path:polygon(14% 0,86% 0,100% 50%,86% 100%,14% 100%,0 50%)}.qbtn.marked{background:#7950a5;color:#fff;border-color:#5d3a85;border-radius:50%}.legend{display:grid;gap:10px;margin-top:18px;font-size:15px;color:#26333d}.dot{display:inline-block;width:20px;height:20px;border-radius:3px;border:1px solid var(--line);vertical-align:-5px;margin-right:8px}.dot.current{background:#e85b21;border-color:#c84815}.dot.answered{background:#72bd3b;border-color:#4f9727}.dot.marked{background:#7950a5;border-color:#5d3a85;border-radius:50%}
    .question-card{height:100%;overflow:auto;padding:0 0 74px;background:#fff}.qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:52px;margin:0;padding:10px 16px;border-bottom:1px solid #c6d0d8;background:#f5f7f9}.qnum{font-size:19px;font-weight:700}.source{display:none}.block{border:0;border-bottom:1px solid #d7dde5;border-radius:0;padding:12px 18px;background:#fff;margin:0;font-size:18px}.qtext{font-size:20px;font-weight:700;margin:0;padding:22px 24px 14px;min-height:120px}.qtext p,.block p,.option p{margin:0 0 10px}.options{display:grid;gap:14px;padding:0 24px 14px}.option{border:0;border-radius:0;padding:4px 0;display:flex;gap:12px;cursor:pointer;background:#fff;align-items:flex-start;font-size:20px;font-weight:700}.option:hover .opt-text{text-decoration:underline}.option input{margin-top:7px;flex:0 0 auto;transform:scale(1.25)}.option .opt-label,.option .opt-text{font-weight:700}.option .opt-text{display:inline-block;color:#202a32}.typed-answer{width:min(420px,100%);font-size:20px;font-weight:700;border:1px solid #8795a1;border-radius:2px;padding:12px;background:#fff;margin-left:24px}.navrow{position:fixed;left:0;right:300px;bottom:0;height:64px;display:flex;gap:10px;align-items:center;justify-content:flex-end;margin:0;padding:10px 16px;background:#eef8fc;border-top:1px solid #b6cbd6}.navrow button,.submit{border:1px solid #b6c1ca;border-radius:2px;padding:11px 18px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#2f3b44}.submit{background:#29a8df!important;color:#fff!important;border-color:#198fc0!important}.mark{background:#fff!important;color:#2f3b44!important}.solution{display:none;margin:16px 24px 0;padding-top:14px;border-top:1px solid var(--line);font-size:17px}.solution h3{margin:0 0 8px;color:var(--brand);font-size:18px}.answer-note{margin:14px 24px 0;font-weight:800;font-size:17px}.ok{color:#157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

  <script>
    const questions = [{"no":1,"itemId":32275,"source":"IMS Arithmetic Basic | Q1 | Easy","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eSanta and Banta participate in a race of 1 km. Santa gives Banta a head start of 200 m, due to which the race ends in a dead heat. Now, Santa gives Banta a head start of 100 m. To end the race in a dead heat, by how much percent Banta will have to increase his speed?\u003c/p\u003e","options":["\u003c/span\u003e 6.25%\u003cspan\r\n \u003e","\u003c/span\u003e 12.5%\u003cspan\r\n \u003e","\u003c/span\u003e 25%\u003cspan\r\n \u003e","\u003c/span\u003e 50%\u003cspan\r\n \u003e"],"answer":1,"typedAnswer":"12.5%","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":2,"itemId":32750,"source":"IMS Arithmetic Basic | Q2 | Easy","type":"mcq","direction":"","passage":"","question":"\u003cp\u003e\u003cstrong\u003eThe question below is followed by two statements.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [1], if the question can be answered by using only one of the statements and not the other. \u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [2], if the question can be answered by using either of the statements alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [3], if the question can be answered by using both statements together. \u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [4], if the question cannot be answered even by using both statements together.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003eFind the ratio of the cost price of a bedspread to its selling price.\u003c/p\u003e\n\u003cp\u003eI. The marked price of the bedspread is twice its selling price.\u003cbr /\u003eII. The percentage discount is equal to the percentage profit on the bedspread.\u003c/p\u003e","options":["\u003cp\u003e1\u003c/p\u003e","\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e4\u003c/p\u003e"],"answer":2,"typedAnswer":"3","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":3,"itemId":35659,"source":"IMS Arithmetic Basic | Q3 | Easy","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003eEach of the following questions is followed by two statements.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [1], if the question can be answered by using only one of the statements alone but not by using the other statement alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [2], if the question can be answered by using either of the statements alone.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [3], if the question can be answered only by using both the statements together.\u003c/strong\u003e\u003cbr /\u003e\u003cstrong\u003eMark [4], if the question cannot be answered.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eWhat is the minimum distance between the two poles in a ground?\u003cbr /\u003eI. To reach from one pole, to the other pole, Ram walks towards south for 15 m, then he takes a left turn and walks for another 10 m. Then, he takes a left turn and walks for another 19 m. Then, he takes a left turn and walks for another 10 min.\u003cbr /\u003eII. On the shortest way from one pole to the other, if Ram walks at 20 m/sec, he reaches the other pole half a minute earlier than if he walks 15 m/sec on the same path.\u003c/p\u003e","options":["\u003cp\u003e1\u003c/p\u003e","\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e4\u003c/p\u003e"],"answer":0,"typedAnswer":"1","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":4,"itemId":36470,"source":"IMS Arithmetic Basic | Q4 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eVilas who is a rural engineering student put some amount in co-operative bank and obtained an interest of Rs.15 at the end of one year. He added Rs.85 to this amount and put all the amount again in the bank for another year. At the end of the 2\u003cspan\u003end\u003c/span\u003e\u003cspan\u003e \u003c/span\u003eyear Vilas got Rs.420 as total amount (interest + principal). What amount did he put in the beginning and what is the rate of interest offered by the bank if the minimum amount that can be deposited in the bank is Rs.75?\u003c/p\u003e","options":["\u003c/span\u003e 250,\r\n  5%\u003cspan\u003e","\u003c/span\u003e 300,\r\n  5%\u003cspan\u003e","\u003c/span\u003e 200,\r\n  8%\u003cspan\u003e","\u003c/span\u003e 350,\r\n  3.5%\u003cspan\u003e"],"answer":1,"typedAnswer":"300, 5%","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":5,"itemId":36472,"source":"IMS Arithmetic Basic | Q5 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e Anand\r\n  sold his motorcycle to Sanjay at 15% loss and again bought it from him. If\r\n  Sanjay had a profit of 15% and the original cost of motorcycle was Rs.45000,\r\n  what was the loss incurred by Anand?\u003cspan\u003e","options":["\u003c/span\u003e\r\n  Rs.12487.5 \u003cspan\u003e","\u003c/span\u003e\r\n  Rs.6750\u003cspan\u003e","\u003c/span\u003e\r\n  Rs.1012.5\u003cspan\u003e","\u003c/span\u003e\r\n  Rs.13500\u003cspan\u003e"],"answer":0,"typedAnswer":"Rs.12487.5","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":6,"itemId":36475,"source":"IMS Arithmetic Basic | Q6 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eWhat is the present value of property which would be worth Rs.50000 after 3 years, if it depreciates at the rate of 10% every year?\u003c/p\u003e","options":["\u003cp\u003eRs.35765.74\u003c/p\u003e","\u003cp\u003eRs.67655.74\u003c/p\u003e","\u003cp\u003eRs.68587.10\u003c/p\u003e","\u003cp\u003eRs.67560.74\u003c/p\u003e"],"answer":2,"typedAnswer":"Rs.68587.10","solution":"\u003cp\u003e\u003cspan\u003e \u003c/span\u003e\u003c/p\u003e"},{"no":7,"itemId":36483,"source":"IMS Arithmetic Basic | Q7 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e A\r\n  tank of volume 432 cubic feet has one inlet pipe and 2 outlet pipes. The\r\n  inlet pipe fills water into the tank at the rate of 4 cubic inches/min and\r\n  the 2 outlet pipes empty it out at the rates of 14 cubic inches/min and 6\r\n  cubic inches/min respectively. If all 3 pipes opened when the tank is full,\r\n  in how much time is it emptied?\u003cspan\u003e","options":["\u003c/span\u003e 777.6\r\n  hrs\u003cspan\u003e","\u003c/span\u003e 3\r\n  days\u003cspan\u003e","\u003c/span\u003e 15\r\n  days\u003cspan\u003e","\u003c/span\u003e 77.76\r\n  hrs\u003cspan\u003e"],"answer":0,"typedAnswer":"777.6 hrs","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":8,"itemId":36488,"source":"IMS Arithmetic Basic | Q8 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eWorking alone, A, B and C can do a piece of work in 4, 12 and 16 days respectively. In the beginning, A and B work together for 2 days, then B quits and A and C work together for the next day. If C worked alone to complete the remaining work, then for how many days in all did C work?\u003c/p\u003e","options":["\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e1/3\u003c/p\u003e","\u003cp\u003e4/3\u003c/p\u003e"],"answer":3,"typedAnswer":"4/3","solution":"\u003cp\u003eA, B and C can complete 1/4, 1/12 and 1/16 of the work per day.\u003c/p\u003e\u003cp\u003eIn 2 days, A and B complete 2 × (1/4 + 1/12) = 2/3 of the work.\u003c/p\u003e\u003cp\u003eOn the next day, A and C complete 1/4 + 1/16 = 5/16 of the work.\u003c/p\u003e\u003cp\u003eTotal work completed = 2/3 + 5/16 = 47/48. Remaining work = 1/48.\u003c/p\u003e\u003cp\u003eC alone takes (1/48) ÷ (1/16) = 1/3 day more. So C worked for 1 + 1/3 = 4/3 days in all.\u003c/p\u003e"},{"no":9,"itemId":36492,"source":"IMS Arithmetic Basic | Q9 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e In a\r\n  family of five members, the age of the father is more than thrice the age of\r\n  the youngest member, the mother is twice the age of the daughter, who is\r\n  elder to the twin sons. The family\u0027s\u003cspan\u003e  \r\n  \u003c/span\u003ecombined age is 137. Four years from now, the father\u0027s age will be\r\n  twice the daughter\u0027s age. Three members in the family can vote. If the sons\r\n  are over 10 years of age and the voting age is 18 years and more, in how many\r\n  years will the twin sons be able to vote, if all their ages are taken as\r\n  integers?\u003cspan\u003e","options":["\u003c/span\u003e 6\u003cspan\r\n \u003e","\u003c/span\u003e 4\u003cspan\r\n \u003e","\u003c/span\u003e 3\u003cspan\r\n \u003e","\u003c/span\u003e 2\u003cspan\r\n \u003e"],"answer":1,"typedAnswer":"4","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":10,"itemId":36528,"source":"IMS Arithmetic Basic | Q10 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e The\r\n  interests on a sum under compound interest, when interest is compounded\r\n  annually, for eighth and ninth years are Rs.1336 and Rs.1503 respectively.\r\n  Find the rate of interest.\u003cspan\u003e","options":["\u003c/span\u003e 10%\u003cspan\r\n \u003e","\u003c/span\u003e 12%\u003cspan\r\n \u003e","\u003c/span\u003e 12.5%\u003cspan\r\n \u003e","\u003c/span\u003e 13.5%\u003cspan\r\n \u003e"],"answer":2,"typedAnswer":"12.5%","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":11,"itemId":36537,"source":"IMS Arithmetic Basic | Q11 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e The\r\n  interest charged on a loan is Rs.P per every 2500 per month for the first 3\r\n  months and Rs.q per every 5000 per month for the subsequent months. How much\r\n  is the interest charged during the first one and a half year on a loan of\r\n  Rs.10000?\u003cspan\u003e","options":["\u003c/span\u003e 15p +\r\n  30q\u003cspan\u003e","\u003c/span\u003e 12p +\r\n  30q\u003cspan\u003e","\u003c/span\u003e 30p +\r\n  12q\u003cspan\u003e","\u003c/span\u003e 12p +\r\n  24q\u003cspan\u003e"],"answer":1,"typedAnswer":"12p + 30q","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":12,"itemId":36547,"source":"IMS Arithmetic Basic | Q12 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eStations A, B, C and D are lying on a rail route, such that the distance between A and B is 10 km, B and C is 20 km, and C and D is 30 km. If a train travels from A to B at 2 kmph, from B to C at 5 kmph and from C to D at 3 kmph, what is its average speed in m/sec along its journey from A to D?\u003c/p\u003e","options":["\u003cp\u003e10/19 m/sec\u003c/p\u003e","\u003cp\u003e19/60 m/sec\u003c/p\u003e","\u003cp\u003e60/19 m/sec\u003c/p\u003e","\u003cp\u003e50/57 m/sec\u003c/p\u003e"],"answer":3,"typedAnswer":"50/57","solution":"\u003cp\u003eTotal distance = 10 + 20 + 30 = 60 km.\u003c/p\u003e\u003cp\u003eTotal time = 10/2 + 20/5 + 30/3 = 5 + 4 + 10 = 19 hours.\u003c/p\u003e\u003cp\u003eAverage speed = 60/19 kmph = (60/19) × (5/18) m/sec = 50/57 m/sec.\u003c/p\u003e"},{"no":13,"itemId":98713,"source":"IMS Arithmetic Basic | Q13 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions on the basis of the information given below.\u003c/p\u003e","passage":"","question":"\u003cp\u003eA certain perfume is available at a duty-free shop at the Bangkok international airport. It is priced in the Thai currency Baht but other currencies are also acceptable. In particular, the shop accepts Euro and US Dollar at the following rates of exchange:\u003cbr /\u003eUS Dollar 1 = 41 Bahts\u003cbr /\u003eEuro 1 = 46 Bahts\u003cbr /\u003eThe perfume is priced at 520 Bahts per bottle. After one bottle is purchased, subsequent bottles are available at a discount of 30%. Three friends S, R and M together purchase three bottles of the perfume, agreeing to share the cost equally. R pays 2 Euros. M pays 4 Euros and 27 Thai Bahts and S pays the remaining amount in US Dollars.\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003eHow much does R owe to S in Thai Baht?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2003)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e428\u003c/p\u003e","\u003cp\u003e416\u003c/p\u003e","\u003cp\u003e334\u003c/p\u003e","\u003cp\u003e324\u003c/p\u003e"],"answer":3,"typedAnswer":"324","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":14,"itemId":98714,"source":"IMS Arithmetic Basic | Q14 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eA milkman mixes 20 litres of water with 80 litres of milk. After selling one-fourth of this mixture, he adds water to replenish the quantity that he has sold. What is the current proportion of water to milk?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e","options":["\u003cp\u003e2 : 3\u003c/p\u003e","\u003cp\u003e1 : 2\u003c/p\u003e","\u003cp\u003e1 : 3\u003c/p\u003e","\u003cp\u003e3 : 4\u003c/p\u003e"],"answer":0,"typedAnswer":"2 : 3","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":15,"itemId":98716,"source":"IMS Arithmetic Basic | Q15 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eIf a man cycles at 10 km/hr, then he arrives at a certain place at 1 p.m. If he cycles at 15 km/hr, he will arrive at the same place at 11 a.m. At what speed must he cycle to get there at noon?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2004)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e11 km/hr\u003c/p\u003e","\u003cp\u003e12 km/hr\u003c/p\u003e","\u003cp\u003e13 km/hr\u003c/p\u003e","\u003cp\u003e14 km/hr\u003c/p\u003e"],"answer":1,"typedAnswer":"12 km/hr","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":16,"itemId":98718,"source":"IMS Arithmetic Basic | Q16 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eTwo boats, travelling at 5 km/hr and 10 km/hr, head directly towards each other. They begin at a distance of 20 km from each other. How far apart are they, in km, one minute before they collide?\u003c/p\u003e\u003cp\u003e(CAT 2004)\u003c/p\u003e","options":["\u003cp\u003e1/12\u003c/p\u003e","\u003cp\u003e1/6\u003c/p\u003e","\u003cp\u003e1/4\u003c/p\u003e","\u003cp\u003e1/3\u003c/p\u003e"],"answer":2,"typedAnswer":"1/4","solution":"\u003cp\u003eThe relative speed of the boats = 5 + 10 = 15 km/hr.\u003c/p\u003e\u003cp\u003eOne minute = 1/60 hour. Distance covered in that time at relative speed = 15 × 1/60 = 1/4 km.\u003c/p\u003e"},{"no":17,"itemId":98719,"source":"IMS Arithmetic Basic | Q17 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eIn NutsAndBots factory, one machine produces only nuts at the rate of 100 nuts per minute and needs to cleaned for 5 minute after production of every 1000 nuts. Another machine produces only bolts at the rate of 75 bolts per minute and needs to be cleaned for 10 minutes after production of every 1500 bolts. If both the machine start production at the same time, what is the minimum duration required for producing 9000 pairs of nuts and bolts?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2004)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e130 minutes\u003c/p\u003e","\u003cp\u003e135 minutes\u003c/p\u003e","\u003cp\u003e170 minutes\u003c/p\u003e","\u003cp\u003e180 minutes\u003c/p\u003e"],"answer":2,"typedAnswer":"170 minutes","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":18,"itemId":32276,"source":"IMS Arithmetic Basic | Q18 | ","type":"text","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe ratio of the number of boys and girls in a school is 3 : 2. If 20% of the boys and 25% of the girls are scholarship holders, then the percentage of the students who are not scholarship holders is:\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cdiv\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003e[quizky-text]%\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003c/div\u003e","options":["\u003cp\u003e56%\u003c/p\u003e","\u003cp\u003e78\u003c/p\u003e","\u003cp\u003e77%\u003c/p\u003e","\u003cp\u003e70%\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e"],"answer":1,"typedAnswer":"78","solution":"\u003cp\u003eLet the total number of students in the school be 100, then the number of boys is 60 and the number of girls is 40. 20% "],"answer":1,"typedAnswer":"300","solution":"\u003cp\u003eEfficiency is inversely proportional to Time.\u003c/p\u003e\n\u003cp\u003eHence, if their time taken to finish a job is in the ration 2: 3,\u003c/p\u003e\n\u003cp\u003eThen their efficiency will be in the ratio 3 : 2, so will be the profit distribution. Therefore, money should get divided in the ratio 3 : 2, and A should get Rs.300. \u003c/p\u003e"},{"no":27,"itemId":36544,"source":"IMS Arithmetic Basic | Q27 | Easy","type":"text","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eRs.24400 are lent in two parts, one at 14% p.a. simple interest and the other at 18% p.a. simple interest. If the total interest earned after two years is Rs.7320, then find the amount lent at 14% p.a.\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eRs.\u003cem\u003e[quizky-text]\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e18400\u003c/p\u003e","\u003cp\u003e18300\u003c/p\u003e","\u003cp\u003e15300\u003c/p\u003e","\u003cp\u003e15800\u003c/p\u003e"],"answer":1,"typedAnswer":"18300","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":28,"itemId":36545,"source":"IMS Arithmetic Basic | Q28 | Easy","type":"text","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe variance of first 25 natural numbers is:\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003e[quizky-text]\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e52\u003c/p\u003e","\u003cp\u003e221\u003c/p\u003e","\u003cp\u003e169\u003c/p\u003e","\u003cp\u003e325\u003c/p\u003e"],"answer":0,"typedAnswer":"52","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":29,"itemId":36550,"source":"IMS Arithmetic Basic | Q29 | ","type":"text","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eA man invests Rs.50000 in two different mutual funds (M.Fs) in the ratio 3 : 2 at different interest rates. After 10 years, the total worth of this amount is Rs.385000. What is the difference between the rates of interest for the two mutual funds if the total amount accrued is same for both the M.Fs after 20 years?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003e[quizky-text]\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e30\u003c/p\u003e","\u003cp\u003e52\u003c/p\u003e","\u003cp\u003e43\u003c/p\u003e","\u003cp\u003e38\u003c/p\u003e"],"answer":0,"typedAnswer":"30","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":30,"itemId":36551,"source":"IMS Arithmetic Basic | Q30 | Easy","type":"text","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003ePipe A empties a tank in 104 minutes and pipe B empties the tank in 80 minutes. By what percentage is the efficiency of pipe B more than that of pipe A.\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003e[quizky-text]\u003c/em\u003e\u003c/em\u003e%\u003c/p\u003e","options":["\u003cp\u003e26.23%\u003c/p\u003e","\u003cp\u003e30\u003c/p\u003e","\u003cp\u003e32.32%\u003c/p\u003e","\u003cp\u003e23.07%\u003c/p\u003e"],"answer":1,"typedAnswer":"30","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":31,"itemId":32299,"source":"IMS Arithmetic Basic | Q31 | ","type":"text","direction":"\u003cp\u003e\u003cstrong\u003e Refer to the data below and answer the questions that follow.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003e \u003c/p\u003e\u003cp\u003eAnita purchased five packs of beads of different colours. Each pack has 100 beads. She made two types of necklaces using all the beads.\u003c/p\u003e\u003cp\u003eType 1: Necklace with two coloured beads.\u003c/p\u003e\u003cp\u003eType 2: Necklace with single coloured beads.\u003c/p\u003e\u003cp\u003eShe sold \u0027Type 1\u0027 necklace for Rs.30 and \u0027Type 2\u0027 necklace for Rs.25.\u003c/p\u003e\u003cp\u003eEach pack of beads cost Rs.80. All necklaces that Anita made have equal number of beads.\u003c/p\u003e","question":"\u003cp\u003eIf she had made 20 necklaces in all and earned a 40% profit, find the profit she made only by selling \u0027Type 1\u0027 necklaces.\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cdiv\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eRs.[quizky-text]\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003c/div\u003e","options":["\u003cp\u003eRs.12\u003c/p\u003e","\u003cp\u003e120\u003c/p\u003e","\u003cp\u003eRs.100\u003c/p\u003e","\u003cp\u003eCannot be determined\u003c/p\u003e"],"answer":1,"typedAnswer":"120","solution":"\u003cp\u003e\u003c/p\u003e"},{"no":32,"itemId":36457,"source":"IMS Arithmetic Basic | Q32 | Easy","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eTwo lumps composed of gold, silver and copper together weigh 20 kg, one lump contains 75% gold and 31.25 gm per kg silver. The other contains 85% gold and 30 gm per kg silver. The total quantity of silver in two lumps is 617.5 gm. If the two lumps are melted and formed into one, what percent of gold will it contain?\u003c/p\u003e","options":["\u003cp\u003e75%\u003c/p\u003e","\u003cp\u003e77%\u003c/p\u003e","\u003cp\u003e78%\u003c/p\u003e","\u003cp\u003e80%\u003c/p\u003e"],"answer":2,"typedAnswer":"78%","solution":"\u003cp\u003e\u003cspan\u003e \u003c/span\u003e\u003c/p\u003e"}];
    const optionFixQuestions = new Set([2,3,6,8,12,13,14,15,16,17,32]);
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
