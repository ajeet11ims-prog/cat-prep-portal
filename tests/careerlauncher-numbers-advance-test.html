    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}

tom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

  <script>
    const questions = [{"no":1,"itemId":32384,"source":"Careerlauncher Numbers Advance | Q1 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003c/span\u003e\"I\" is\r\n  a positive integer represented in base 4, 5 and 6 notations. In all the three\r\n  cases the number formed has the last digit as 3 while in two out of three\r\n  cases the number has formed is a four digit number. If \"I\" is less than 200\r\n  then I equals:\u003cspan\u003e","options":["\u003c/span\u003e123\u003cspan\r\n \u003e","\u003c/span\u003e183\u003cspan\r\n \u003e","\u003c/span\u003e63\u003cspan\r\n \u003e","\u003c/span\u003eNone\r\n  of these\u003cspan\u003e"],"answer":1,"typedAnswer":"183","solution":""},{"no":2,"itemId":32393,"source":"Careerlauncher Numbers Advance | Q2 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003c/span\u003e Find\r\n  the greatest 5 digit number, which on being divided by 5, 6, 7, 8 and 9\r\n  leaves 3, 4, 5, 6 and 7 respectively as the remainders.\u003cspan\r\n \u003e","options":["\u003c/span\u003e 93240\u003cspan\r\n \u003e","\u003c/span\u003e 98278\u003cspan\r\n \u003e","\u003c/span\u003e 93249\u003cspan\r\n \u003e","\u003c/span\u003e 99261\u003cspan\r\n \u003e"],"answer":1,"typedAnswer":"98278","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":3,"itemId":32397,"source":"Careerlauncher Numbers Advance | Q3 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eIn some code, letters a, b, c, d and e represent numbers 2, 4, 6, 8 and 10. The order in which the letters represent these numbers is unknown. These letters exhibit following relationships among themselves:\u003c/p\u003e\n\u003cp\u003eI. b + c = e     II. c - a = b    III. d - b = b\u003c/p\u003e\n\u003cp\u003eWhich of the following statements can be true?\u003c/p\u003e","options":["\u003c/span\u003e b =\r\n  2, c = 6\u003cspan\u003e","\u003c/span\u003e c =\r\n  4, a = 2\u003cspan\u003e","\u003c/span\u003e e =\r\n  8, c = 2\u003cspan\u003e","\u003c/span\u003e b =\r\n  2, d = 4\u003cspan\u003e"],"answer":3,"typedAnswer":"b = 2, d = 4","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":4,"itemId":32404,"source":"Careerlauncher Numbers Advance | Q4 | Reconstructed","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eA special lift follows these rules. For a prime target floor, press the previous prime number. If the pressed number is divisible by 3, the lift moves to the next floor. If the pressed number is divisible by 4, the lift moves to half of that number. What is the required triplet of numbers to press for the three target floors described in the source?\u003c/p\u003e","options":["\u003cp\u003e(69, 22, 51)\u003c/p\u003e","\u003cp\u003e(67, 88, 51)\u003c/p\u003e","\u003cp\u003e(69, 88, 51)\u003c/p\u003e","\u003cp\u003eNone of these\u003c/p\u003e"],"answer":3,"typedAnswer":"None of these","solution":"\u003cp\u003eFor 73, press the previous prime number, 71. For 44, press 88 because 88 is divisible by 4 and takes the lift to 44. For 52, press 51 because 51 is divisible by 3 and takes the lift to 52. The triplet is (71, 88, 51), which is not among the first three options.\u003c/p\u003e"},{"no":5,"itemId":32409,"source":"Careerlauncher Numbers Advance | Q5 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003eAnswer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eGiven three positive integers a, b and c with highest common factor D and least common multiple M, which of the following is/are true?\u003c/p\u003e\n\u003cp\u003eI. MD \u003e abc\u003c/p\u003e\n\u003cp\u003eII. MD \u003c |abc|\u003c/p\u003e\n\u003cp\u003eIII. MD = abc if and only if a, b and c are all prime numbers.\u003c/p\u003e\n\u003cp\u003eIV. MD = abc if and only if a, b and c are relatively prime in pairs.\u003c/p\u003e","options":["\u003c/span\u003e I\r\n  only\u003cspan\u003e","\u003c/span\u003e I and\r\n  III only\u003cspan\u003e","\u003c/span\u003e I and\r\n  IV only\u003cspan\u003e","\u003c/span\u003e II\r\n  and IV only\u003cspan\u003e"],"answer":3,"typedAnswer":"II and IV only","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":6,"itemId":32410,"source":"Careerlauncher Numbers Advance | Q6 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eLet E = 1\u003cspan\u003e1 \u003c/span\u003e+ 2\u003cspan\u003e2\u003c/span\u003e\u003cspan\u003e \u003c/span\u003e+ 3\u003cspan\u003e3\u003c/span\u003e\u003cspan\u003e \u003c/span\u003e+ 4\u003cspan\u003e4\u003c/span\u003e\u003cspan\u003e \u003c/span\u003e+ ... + 50\u003cspan\u003e50\u003c/span\u003e. What is the remainder when E is divided by 8?\u003c/p\u003e","options":["\u003c/span\u003e 5\u003cspan\r\n \u003e","\u003c/span\u003e 3\u003cspan\r\n \u003e","\u003c/span\u003e 7\u003cspan\r\n \u003e","\u003c/span\u003e 1\u003cspan\r\n \u003e"],"answer":0,"typedAnswer":"5","solution":"\u003cp\u003e\u003cspan\u003eOdd numbers will leave a remainder of 1, 3, 5, 7, 1, 3, 5, 7 and so on. There will be 6 sets of (1, 3, 5, 7) each as remainder, and one extra 1 as remainder from 49\u003cspan\u003e49\u003c/span\u003e. Since in the expression E, all the terms are added, we will have sets of (1 + 3 + 5 + 7) leaving 0 as the remainder. Thus, the remainders from all the terms with an odd base = 1.\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"MsoNormal\"\u003e\u003cspan\u003eNow, even numbers, 2\u003cspan\u003e2\u003c/span\u003ewill leave a remainder of 4 and all terms from 4\u003cspan\u003e4\u003c/span\u003ewill be fully divisible by 8 as they will be a multiple of 2\u003cspan\u003e3\u003c/span\u003e. Thus, remainder = 1 + 4 = 5. Hence, [1].\u003c/span\u003e\u003c/p\u003e"},{"no":7,"itemId":32411,"source":"Careerlauncher Numbers Advance | Q7 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions independently of each other.\u003c/strong\u003e\u003c/p\u003e","passage":"","question":"\u003cp\u003eFind the remainder when (((11\u003cspan\u003e12\u003c/span\u003e)\u003cspan\u003e13\u003c/span\u003e)\u003cspan\u003e14\u003c/span\u003e) is divided by 9.\u003c/p\u003e","options":["\u003c/span\u003e 8\u003cspan\r\n \u003e","\u003c/span\u003e 1\u003cspan\r\n \u003e","\u003c/span\u003e 2\u003cspan\r\n \u003e","\u003c/span\u003e 0\u003cspan\r\n \u003e"],"answer":1,"typedAnswer":"1","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":8,"itemId":36283,"source":"Careerlauncher Numbers Advance | Q8 | Reconstructed","type":"mcq","direction":"\u003c/span\u003e\r\n  Answer the questions independently of each other.\u003cspan\u003e","passage":"","question":"\u003cp\u003eLet A = 0.a1a2a3a1a2a3... and B = 0.b1b2b1b2..., where a1, a2, a3, b1 and b2 are integers from 1 to 9, not necessarily distinct. Which of the following is always an integer?\u003c/p\u003e","options":["\u003cp\u003e999A\u003c/p\u003e","\u003cp\u003e99B\u003c/p\u003e","\u003cp\u003e999A + 99B\u003c/p\u003e","\u003cp\u003eNone of these\u003c/p\u003e"],"answer":2,"typedAnswer":"999A + 99B","solution":"\u003cp\u003eA repeating decimal with a 3-digit period becomes an integer when multiplied by 999. A repeating decimal with a 2-digit period becomes an integer when multiplied by 99. Hence 999A + 99B is an integer.\u003c/p\u003e"},{"no":9,"itemId":36505,"source":"Careerlauncher Numbers Advance | Q9 | Difficult.","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eWhat is the remainder when 26\u003cspan\u003e5\u003c/span\u003e\u003cspan\u003e \u003c/span\u003e+ 27\u003cspan\u003e5\u003c/span\u003e\u003cspan\u003e \u003c/span\u003e+ 28\u003cspan\u003e5\u003c/span\u003e\u003cspan\u003e \u003c/span\u003e+ 29\u003cspan\u003e5 \u003c/span\u003eis divided by 110?\u003c/p\u003e","options":["\u003c/span\u003e 0\u003cspan\r\n \u003e","\u003c/span\u003e 2\u003cspan\r\n \u003e","\u003c/span\u003e 55\u003cspan\r\n \u003e","\u003c/span\u003e 4\u003cspan\r\n \u003e"],"answer":0,"typedAnswer":"0","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":10,"itemId":36512,"source":"Careerlauncher Numbers Advance | Q10 | Difficult.","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003c/span\u003e If\r\n  200! ends with \u0027n\u0027 zeroes when written in base 27, then n = ?\u003cspan\r\n \u003e","options":["\u003c/span\u003e 36\u003cspan\r\n \u003e","\u003c/span\u003e 33\u003cspan\r\n \u003e","\u003c/span\u003e 32\u003cspan\r\n \u003e","\u003c/span\u003e 37\u003cspan\r\n \u003e"],"answer":2,"typedAnswer":"32","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":11,"itemId":36515,"source":"Careerlauncher Numbers Advance | Q11 | Medium","type":"mcq","direction":"","passage":"","question":"\u003cp\u003eA number when divided by 4 gives a number which is 3 more than the remainder obtained on dividing the number by 34. Find the least such number.\u003c/p\u003e","options":["\u003cp\u003e64\u003c/p\u003e","\u003cp\u003e132\u003c/p\u003e","\u003cp\u003e256\u003c/p\u003e","\u003cp\u003eNone of these\u003c/p\u003e"],"answer":1,"typedAnswer":"132","solution":""},{"no":12,"itemId":100205,"source":"Careerlauncher Numbers Advance | Q12 | Reconstructed","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eA leather factory produces standard and deluxe bags. Profit is Rs.20 on each standard bag and Rs.30 on each deluxe bag. Every bag must be processed on machines A and B. The total time available on machine A is 700 hours and on machine B is 1250 hours. Among the following production plans, which one meets the machine availability constraints and maximizes profit?\u003c/p\u003e","options":["\u003cp\u003eStandard 75 bags, Deluxe 80 bags\u003c/p\u003e","\u003cp\u003eStandard 100 bags, Deluxe 60 bags\u003c/p\u003e","\u003cp\u003eStandard 50 bags, Deluxe 100 bags\u003c/p\u003e","\u003cp\u003eStandard 60 bags, Deluxe 90 bags\u003c/p\u003e"],"answer":0,"typedAnswer":"Standard 75 bags, Deluxe 80 bags","solution":"\u003cp\u003eThe source answer identifies the feasible profit-maximizing plan as 75 standard bags and 80 deluxe bags.\u003c/p\u003e"},{"no":13,"itemId":100496,"source":"Careerlauncher Numbers Advance | Q13 | Difficult","type":"mcq","direction":"\u003cp\u003eChoose the correct alternative.\u003c/p\u003e","passage":"","question":"\u003cp\u003eConsider four digit numbers for which the first two digits are equal and the last two digits are also equal. How many such numbers are perfect squares?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e \u003cem\u003e\u003cstrong\u003e(CAT 2007)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e4\u003c/p\u003e","\u003cp\u003e0\u003c/p\u003e","\u003cp\u003e1\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e2\u003c/p\u003e"],"answer":2,"typedAnswer":"1","solution":"\n\u003cp\u003eHence, [3].\u003c/p\u003e"},{"no":14,"itemId":100498,"source":"Careerlauncher Numbers Advance | Q14 | Difficult","type":"mcq","direction":"\u003cp\u003eChoose the correct alternative.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe integers 1, 2, …, 40 are written on a blackboard. The following operation is then repeated 39 times: In each repetition, any two numbers, say a and b, currently on the blackboard are erased and a new number a + b – 1 is written. What will be the number left on the board at the end?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2008)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e820\u003c/p\u003e","\u003cp\u003e821\u003c/p\u003e","\u003cp\u003e781\u003c/p\u003e","\u003cp\u003e819\u003c/p\u003e","\u003cp\u003e780\u003c/p\u003e"],"answer":2,"typedAnswer":"781","solution":""},{"no":15,"itemId":32401,"source":"Careerlauncher Numbers Advance | Q15 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions on the basis of the information given below.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003eThree non-zero single digits are in A.P. If the sum of all three-digit numbers formed by using these three digits exactly once is divisible by 15, then the minimum possible product of digits is:\u003c/p\u003e","question":"\u003c/span\u003e The\r\n  minimum possible product of three digits is:\u003cspan\u003e","options":["\u003c/span\u003e 6\u003cspan\r\n \u003e","\u003c/span\u003e 12\u003cspan\r\n \u003e","\u003c/span\u003e 15\u003cspan\r\n \u003e","\u003c/span\u003e 24\u003cspan\r\n \u003e"],"answer":2,"typedAnswer":"15","solution":"\u003cp\u003eLet the three non-zero single digits be x, y and z. Thus the sum of all the six possible numbers using these three digits would be, 222(x + y + z). As the sum is divisible by 27 and 222 = 2 x 3 x 37, x + y + z is divisible by 9. The non-zero digits which are in A.P. and whose sum is divisible by 9 are (1, 3, 5), (2, 3, 4), (3, 3, 3), (5, 6, 7), (4, 6, 8), (6, 6, 6), (9, 9, 9) and (3, 6, 9).\u003c/p\u003e\n\u003cp\u003eMinimum possible product is 1 x 3 x 5 = 15. Hence, [3].\u003c/p\u003e"},{"no":16,"itemId":32402,"source":"Careerlauncher Numbers Advance | Q16 | Difficult.","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions on the basis of the information given below.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003eThree non-zero single digits are in A.P. If the sum of all three-digit numbers formed by using these three digits exactly once is divisible by 15, then the minimum possible product of digits is:\u003c/p\u003e","question":"\u003c/span\u003e The\r\n  maximum possible common difference between the digits is:\u003cspan\r\n \u003e","options":["\u003c/span\u003e 1\u003cspan\r\n \u003e","\u003c/span\u003e 2\u003cspan\r\n \u003e","\u003c/span\u003e 3\u003cspan\r\n \u003e","\u003c/span\u003e 4\u003cspan\r\n \u003e"],"answer":2,"typedAnswer":"3","solution":"\u003cp\u003eLet the three non-zero single digits be x, y and z. Thus the sum of all the six possible numbers using these three digits would be, 222(x + y + z). As the sum is divisible by 27 and 222 = 2 x 3 x 37, x + y + z is divisible by 9. The non-zero digits which are in A.P. and whose sum is divisible by 9 are (1, 3, 5), (2, 3, 4), (3, 3, 3), (5, 6, 7), (4, 6, 8), (6, 6, 6), (9, 9, 9) and (3, 6, 9).\u003c/p\u003e\n\u003cp\u003eIt is 3, as in the set (3, 6, 9). Hence, [3].\u003c/p\u003e"}];
    const optionFixQuestions = new Set(questions.filter(q=>q.type==="mcq").map(q=>q.no));
    function cleanOptionHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    questions.forEach(q=>{if(optionFixQuestions.has(q.no)){q.options=q.options.map(cleanOptionHtml);}});
    let current = 0, submitted = false, secondsLeft = 60 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function stripHtml(html){const div=document.createElement('div');div.innerHTML=html;return div.textContent.trim().replace(/\s+/g,' ');}
    function correctText(q){return q.type === "mcq" ? "(" + labels[q.answer] + ") " + stripHtml(q.options[q.answer] || "") : q.typedAnswer;}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+html+'</div>' : '';}
    function control(q,i){if(q.type === "mcq") return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+(optionFixQuestions.has(q.no)?esc(op):op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+q.question+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+(q.solution||'Solution not provided.')+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
