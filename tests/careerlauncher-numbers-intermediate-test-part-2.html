  <script>
    const questions = [{"no":1,"itemId":100216,"source":"Careerlauncher Numbers Intermediate | Q1 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eLet S be a set of positive integers such that every element n of S satisfies the conditions\u003cbr /\u003e a) 1000 \u003cspan\u003e\u003c\u003c/span\u003e n \u003cspan\u003e\u003c\u003c/span\u003e 1200\u003cbr /\u003e b) every digit in n is odd\u003cbr /\u003e Then how many elements of S are divisible by 3?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2005)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e9\u003c/p\u003e","\u003cp\u003e10\u003c/p\u003e","\u003cp\u003e11\u003c/p\u003e","\u003cp\u003e12\u003c/p\u003e"],"answer":0,"typedAnswer":"9","solution":"\u003cp\u003eAccording to conditions givenL\u003cbr /\u003e 100 \u003cspan\u003e\u003c\u003c/span\u003e n \u003cspan\u003e\u003c\u003c/span\u003e 1200 and every digit should be odd.\u003cbr /\u003e We get numbers at 1113, 1119, 1131, 1137, 1155, 1173, 1179, 1191, 1197.\u003cbr /\u003e Thus, there are nine numbers. Hence, [1].\u003c/p\u003e"},{"no":2,"itemId":100217,"source":"Careerlauncher Numbers Intermediate | Q2 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eLet n! = 1 × 2 × 3 × ..... × n for integer n \u003cspan\u003e\u003e\u003c/span\u003e 1. If p = 1! + (2 × 2!) + (3 × 3!) + ..... + (10 × 10!), then p + 2 when divided by 11! leaves a remainder of\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2005)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e10\u003c/p\u003e","\u003cp\u003e0\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e","\u003cp\u003e1\u003c/p\u003e"],"answer":3,"typedAnswer":"1","solution":""},{"no":3,"itemId":100219,"source":"Careerlauncher Numbers Intermediate | Q3 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe digits of a three-digit number \u003cem\u003e\u003cstrong\u003eA\u003c/strong\u003e\u003c/em\u003e are written in the reverse order to form another three-digit number \u003cem\u003e\u003cstrong\u003eB\u003c/strong\u003e\u003c/em\u003e. If \u003cem\u003e\u003cstrong\u003eB \u003e A\u003c/strong\u003e\u003c/em\u003e and \u003cem\u003e\u003cstrong\u003eB–A\u003c/strong\u003e\u003c/em\u003e is perfectly divisible by 7, then which of the following is necessarily true?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2005)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e100\u003c\u003cstrong\u003eA\u003c/strong\u003e\u003c299\u003c/p\u003e","\u003cp\u003e106\u003c\u003cstrong\u003eA\u003c/strong\u003e\u003c305\u003c/p\u003e","\u003cp\u003e112\u003c\u003cstrong\u003eA\u003c/strong\u003e\u003c311\u003c/p\u003e","\u003cp\u003e118\u003c\u003cstrong\u003eA\u003c/strong\u003e\u003c317\u003c/p\u003e"],"answer":1,"typedAnswer":"106 A","solution":""},{"no":4,"itemId":100222,"source":"Careerlauncher Numbers Intermediate | Q4 | Medium","type":"mcq","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe rightmost non-zero digit of the number 30\u003csup\u003e2720\u003c/sup\u003e is\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2005)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e1\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e","\u003cp\u003e9\u003c/p\u003e"],"answer":0,"typedAnswer":"1","solution":""},{"no":5,"itemId":100225,"source":"Careerlauncher Numbers Intermediate | Q5 | Medium","type":"mcq","direction":"\u003cp\ erlauncher Numbers Intermediate | Q7 | Medium","type":"mcq","direction":"\u003cp\u003eChoose the correct alternative.\u003c/p\u003e","passage":"","question":"\u003cp\u003eA shop stores x kg of rice. The first customer buys half this amount plus half a kg of rice. The second customer buys half the remaining amount plus half a kg of rice. Then the third customer also buys half the remaining amount plus half a kg of rice. Thereafter, no rice is left in the shop. Which of the following best describes the value of x? \u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2008)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e2 \u003cspan\u003e\u003c\u003c/span\u003e x \u003cspan\u003e\u003c\u003c/span\u003e 6\u003c/p\u003e","\u003cp\u003e5 \u003cspan\u003e\u003c\u003c/span\u003e x \u003cspan\u003e\u003c\u003c/span\u003e 8\u003c/p\u003e","\u003cp\u003e9 \u003cspan\u003e\u003c\u003c/span\u003e x \u003cspan\u003e\u003c\u003c/span\u003e 12 \u003c/p\u003e","\u003cp\u003e11 \u003cspan\u003e\u003c\u003c/span\u003e x \u003cspan\u003e\u003c\u003c/span\u003e 14\u003c/p\u003e","\u003cp\u003e13 \u003cspan\u003e\u003c\u003c/span\u003e x \u003cspan\u003e\u003c\u003c/span\u003e 18\u003c/p\u003e"],"answer":1,"typedAnswer":"5 x 8","solution":""},{"no":8,"itemId":100500,"source":"Careerlauncher Numbers Intermediate | Q8 | Medium","type":"mcq","direction":"\u003cp\u003eChoose the correct alternative.\u003c/p\u003e","passage":"","question":"\u003cp\u003eWhat are the last two digits of 7\u003csup\u003e2008\u003c/sup\u003e?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cstrong\u003e(CAT 2008)\u003c/strong\u003e\u003c/em\u003e\u003c/p\u003e","options":["\u003cp\u003e21\u003c/p\u003e","\u003cp\u003e61\u003c/p\u003e","\u003cp\u003e01\u003c/p\u003e","\u003cp\u003e41\u003c/p\u003e","\u003cp\u003e81\u003c/p\u003e"],"answer":2,"typedAnswer":"01","solution":"\u003cp\u003e7\u003csup\u003e2008\u003c/sup\u00 auncher Numbers Intermediate | Q19 | Medium","type":"text","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eP consecutive natural numbers are relatively prime. The maximum value of P is:\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e[quizky-text]\u003c/p\u003e","options":["\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e3\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e","\u003cp\u003eCannot be determined\u003c/p\u003e"],"answer":1,"typedAnswer":"3","solution":""},{"no":20,"itemId":36274,"source":"Careerlauncher Numbers Intermediate | Q20 | Medium","type":"text","direction":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","passage":"","question":"\u003cp\u003eThe set T contains all the numbers of the form (n + 2), (2n + 2), (3n + 2) and (4n + 2), where n is a natural number and takes values from 1 to 5. How many distinct prime numbers does T contain?\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cem\u003eEnter your response (as an integer) using the virtual keyboard in the box provided below.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e[quizky-text]\u003c/p\u003e","options":["\u003cp\u003e2\u003c/p\u003e","\u003cp\u003e5\u003c/p\u003e","\u003cp\u003e12\u003c/p\u003e","\u003cp\u003e7\u003c/p\u003e"],"answer":1,"typedAnswer":"5","solution":"\u003cp\u003eSince n takes values from 1 to 5, none of the numbers of the form (2n + 2) and (4n + 2) will be prime. The numbers of the form (n + 2) are 3, 4, 5, 6 and 7 out of which 3, 5 and 7 are prime. The numbers of the form (3n + 2) are 5, 8, 11, 14 and 17 out of which 5, 11 and 17 are prime. \u003cbr /\u003e Thus, T contains five distinct prime numbers. \u003c/p\u003e"},{"no":21,"itemId":36503,"source":"Careerlauncher Numbers Intermediate | Q21 | Medium", ent angles are divisible by\r\n  6 and 10 respectively.\u003cspan\u003e","question":"\u003c/span\u003e If\r\n  one of the remaining angles is necessarily divisible by 16, then its measure\r\n  can be:\u003cspan\u003e","options":["\u003c/span\u003e 128 °\u003cspan\r\n \u003e","\u003c/span\u003e 64 °\u003cspan\r\n \u003e","\u003c/span\u003e 132 °\u003cspan\r\n \u003e","\u003c/span\u003e 48 °\u003cspan\r\n \u003e"],"answer":3,"typedAnswer":"48 °","solution":"\u003c/span\u003e\u003cspan\r\n \u003e \u003c/span\u003e\u003cspan\r\n \u003e"},{"no":32,"itemId":32403,"source":"Careerlauncher Numbers Intermediate | Q32 | Medium","type":"mcq","direction":"\u003cp\u003e\u003cstrong\u003e Answer the questions on the basis of the information given below.\u003c/strong\u003e\u003c/p\u003e","passage":"\u003cp\u003eThree non-zero single digits are in A.P. If the sum of all three-digit numbers formed by using these three digits exactly once is divisible by 15, then the minimum possible product of digits is:\u003c/p\u003e","question":"","options":["\u003cp\u003e15\u003c/p\u003e","\u003cp\u003e35\u003c/p\u003e","\u003cp\u003e45\u003c/p\u003e","\u003cp\u003e80\u003c/p\u003e"],"answer":2,"typedAnswer":"45","solution":"\u003cp\u003eLet the three non-zero single digits be x, y and z. Thus the sum of all the six possible numbers using these three digits would be, 222(x + y + z). As the sum is divisible by 15 and 222 = 2 x 3 x 37, x + y + z is divisible by 5. Possible combinations for the three digits are (1, 5, 9), (2, 5, 8), (3, 5, 7), (4, 5, 6) and (5, 5, 5), but minimum product is for (1, 5, 9), i.e., 45.\u003c/p\u003e\n\u003cp\u003eHence, [3].\u003c/p\u003e"},{"no":33,"itemId":36264,"source":"Careerlauncher Numbers Intermediate | Q33 | Medium","type":"mcq","direction":"","passage":"\u003cp\u003eAnswer the questions independently of each other.\u003c/p\u003e","question":"\u003cp\u003eWhat is the remainder when \u003cspan\u003e7\u003csup\u003e333\u003c/sup\u003e\u003c/span\u003e is divided     function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return norm(ans)===norm(q.typedAnswer);}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;} function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    window.addEventListener('pageshow',()=>{if(!submitted){responses.fill(null);marked.fill(false);current=0;renderQuestion();}});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
