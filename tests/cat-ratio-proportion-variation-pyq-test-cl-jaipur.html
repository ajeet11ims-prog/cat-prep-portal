px;height:12px;border-radius:3px;border:1px solid var(--line);vertical-align:-2px;margin-right:6px}.dot.current{background:var(--soft);border-color:var(--brand)}.dot.answered{background:#eef8f2;border-color:#8fd0ad}.dot.marked{background:#fff8e8;border-color:#e7bf66}.question-card{padding:16px;min-height:0}.qhead{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}.qnum{font-size:18px;font-weight:800}.source{color:var(--muted);font-size:13px}.qtext{font-size:17px;white-space:pre-wrap;margin:12px 0 16px}.options{display:grid;gap:10px}.option{border:1px solid var(--line);border-radius:7px;padding:11px;display:flex;gap:10px;cursor:pointer;background:#fbfcfd}.option:hover{border-color:#9ab7ca}.typed-answer{width:min(360px,100%);font-size:17px;border:1px solid var(--line);border-radius:7px;padding:12px;background:#fbfcfd}.navrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.navrow button,.submit{border:0;border-radius:6px;padding:11px 16px;font-size:15px;font-weight:800;cursor:pointer}.navrow button{background:#eaf0f6;color:var(--ink)}.submit{background:var(--brand);color:#fff}.mark{background:#fff4d6!important;color:#6f4e00!important}.solution{display:none;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);white-space:pre-wrap}.solution h3{margin:0 0 8px;color:var(--brand);font-size:16px}.answer-note{margin-top:12px;font-weight:800}.ok{color:var(--ok)}.bad{color:var(--bad)}.muted{color:var(--muted)}#result{display:none;padding:16px;margin-bottom:14px}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(110px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:6px;padding:10px;background:#fbfcfd}.score-box strong{display:block;font-size:23px;margin-top:2px}.calc{padding:12px}.calc-display{width:100%;height:42px;border:1px solid var(--line);border-radius:6px;padding:8px;text-align:right;font-size:18px;margin-bottom:8px}.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.calc-grid button{height:38px;border:1px solid var(--line);border-radius:5px;background:#fbfcfd;font-weight:800;cursor:pointer}.calc-grid button.op{background:var(--soft);color:var(--brand)}.calc-grid button.eq{background:var(--brand);color:white}.calc-help{font-size:12px;color:var(--muted);margin-top:8px}@media(max-width:980px){main{grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child,.calc-wrap{grid-column:1;grid-row:auto;position:static}.qbar{grid-template-columns:repeat(10,1fr)}.question-card{min-height:auto}.score-grid{grid-template-columns:1fr 1fr}}</style></head><body><header><div class="topbar"><div class="title"><h1>Ratio Proportion Variation CAT PYQ CL Jaipur</h1><div class="meta">35 Questions | 90 Minutes | +3 correct, -1 wrong | One question per page</div></div><div class="timer">Time Left: <span id="time">90:00</span></div></div></header><main><aside class="panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div></aside><section><div id="result"></div><form id="testForm"><div id="questionHost" class="question-card"></div></form></section><aside class="panel calc-wrap"><h2>Basic Calculator</h2><div class="calc"><input id="calcDisplay" class="calc-display" readonly><div class="calc-grid"><button type="button" data-calc="C" class="op">C</button><button type="button" data-calc="B" class="op">Back</button><button type="button" data-calc="%" class="op">%</button><button type="button" data-calc="/" class="op">/</button><button type="button" data-calc="7">7</button><button type="button" data-calc="8">8</button><button type="button" data-calc="9">9</button><button type="button" data-calc="*" class="op">*</button><button type="button" data-calc="4">4</button><button type="button" data-calc="5">5</button><button type="button" data-calc="6">6</button><button type="button" data-calc="-" class="op">-</button><button type="button" data-calc="1">1</button><button type="button" data-calc="2">2</button><button type="button" data-calc="3">3</button><button type="button" data-calc="+" class="op">+</button><button type="button" data-calc="0">0</button><button type="button" data-calc="00">00</button><button type="button" data-calc=".">.</button><button type="button" data-calc="=" class="eq">=</button></div><div class="calc-help">Basic operations: +, -, *, /, %. Example: 250*12%.</div></div></aside></main><script>const questions=[{"no":1,"source":"CAT 2024 QA Slot 1","question":"A fruit seller has a total of 187 fruits consisting of apples, mangoes and oranges. The number of apples and mangoes are in the ratio 5 : 2. After she sells 75 apples, 26 mangoes and half of the oranges, the ratio of number of unsold apples to number of unsold oranges becomes 3 : 2. The total number of unsold fruits is","type":"text","options":[],"answer":"66","accepted":["66"],"solution":"Answer: 66"},{"no":2,"source":"CAT 2024 QA Slot 2","question":"When Rajesh's age was same as the present age of Garima, the ratio of their ages was 3 : 2. When Garima's age becomes the same as the present age of Rajesh, the ratio of the ages of Rajesh and Garima will become","type":"mcq","options":["5 : 4","4 : 3","2 : 1","3 : 2"],"answer":0,"accepted":[],"solution":"Answer: Option A"},{"no":3,"source":"CAT 2024 QA Slot 3","question":"Rajesh and Vimal own 20 hectares and 30 hectares of agricultural land, respectively, which are entirely covered by wheat and mustard crops. The cultivation area of wheat and mustard in the land owned by Vimal are in the ratio of 5 : 3. If the total cultivation area of wheat and mustard are in the ratio 11 : 9, then the ratio of cultivation area of wheat and mustard in the land owned by Rajesh is","type":"mcq","options":["1 : 1","4 : 3","7 : 9","3 : 7"],"answer":2,"accepted":[],"solution":"Answer: Option C"},{"no":4,"source":"CAT 2023 QA Slot 2","question":"The price of a precious stone is directly proportional to the square of its weight. Sita has a precious stone weighing 18 units. If she breaks it into four pieces with each piece having distinct integer weight, then the difference between the highest and lowest possible values of the total price of the four pieces will be 288000. Then, the price of the original precious stone is","type":"mcq","options":["972000","1296000","1944000","1620000"],"answer":1,"accepted":[],"solution":"Price (P) \u0026prop; (weight) 2\n\r\n=\u003e P = k x w 2\n\r\n\r\nTotal value after breaking of the stone will be highest if one of the pieces is as heavy as possible and others are as light as possible i.e., the weights of the pieces are 1, 2, 3 and 12 units.\n\r\nâˆ´ Total value in this case = k x (1) 2 + k x (2) 2 + k x (3) 2 + k x (12) 2 = 159k\n\r\n\r\nTotal value after breaking of the stone will be least if weights of the pieces are as close to each other as possible i.e., the weights of the pieces are 3, 4, 5, and 6 units.\n\r\nâˆ´ Total value in this case = k x (3) 2 + k x (4) 2 + k x (5) 2 + k x (6) 2 = 86k\n\r\n\r\n=\u003e 158k \u0026ndash; 86k = 288000\n\r\n=\u003e 72k = 288000\n\r\n=\u003e k = 4000\n\r\n\r\nâˆ´ Weight of original stone = 4000 x (18) 2 = 1296000.\n\r\n\r\nHence, option (b)."},{"no":5,"source":"CAT 2023 QA Slot 2","question":"In a company, 20% of the employees work in the manufacturing department. If the total salary obtained by all the manufacturing employees is one-sixth of the total salary obtained by all the employees in the company, then the ratio of the average salary obtained by the manufacturing employees to the average salary obtained by the non-manufacturing employees","type":"mcq","options":["4 : 5","6 : 5","5 : 6","5 : 4"],"answer":0,"accepted":[],"solution":"Let the total number of employees be 100 and their average salary be s.\n\r\n\r\n=\u003e There are 20 manufacturing employees and 80 non-manufacturing\n\r\nLet the average salary of manufacturing employees be 'x' and that of non-manufacturing employees be 'y'.\n\r\n\r\nTotal Salary of manufacturing employees is one-sixth that of total employees:\n\r\nâˆ´ 20 x x = 1/6 x 100 x s\n\r\n=\u003e x = 5s/6\n\r\n\r\nTotal Salary of nonmanufacturing employees is five-sixth that of total employees:\n\r\nâˆ´ 80 x x = 5/6 x 100 x s\n\r\n=\u003e x = 25s/24\n\r\n\r\nThe ratio of the average salary obtained by the manufacturing employees to the average salary obtained by the non-manufacturing employee = 5s/6 : 25s/24 = 4 : 5.\n\r\n\r\nHence, option (a)."},{"no":6,"source":"CAT 2023 QA Slot 3","question":"The number of coins collected per week by two coin-collectors A and B are in the ratio 3 : 4. If the total number of coins collected by A in 5 weeks is a multiple of 7, and the total number of coins collected by B in 3 weeks is a multiple of 24, then the minimum possible number of coins collected by A in one week is","type":"text","options":[],"answer":"42","accepted":["42"],"solution":"Let the number of coins collected each week by A and B be 3x and 4x respectively.\n\r\n\r\nFor A : Coins collected by A in 5 weeks is a multiple of 7\n\r\nâˆ´ 3x x 5 is a multiple of 7\n\r\n=\u003e x is a multiple of 7.\n\r\n\r\nFor B : Coins collected by B in 3 weeks is a multiple of 24\n\r\nâˆ´ 4x x 3 is a multiple of 24\n\r\n=\u003e x is a multiple of 2.\n\r\n\r\nâˆ´ x is a multiple of 7 and 2, hence least possible value of x = 14.\n\r\n\r\n=\u003e Minimum possible number of coins collected by A in one week is = 3x = 42.\n\r\n\r\nHence, 42."},{"no":7,"source":"CAT 2022 QA Slot 1","question":"In a village, the ratio of number of males to females is 5 : 4. The ratio of number of literate males to literate females is 2 : 3. The ratio of the number of illiterate males to illiterate females is 4 : 3. If 3600 males in the village are literate, then the total number of females in the village is","type":"text","options":[],"answer":"43200","accepted":["43200"],"solution":"Number of male literates = 3600\n\r\n\r\nNumber/of = 2/3\n\r\n\r\n=\u003e 3600/Number = 2/3\n\r\n\r\n=\u003e Number of literate females = 5400\n\r\n\r\nLet number of illiterate males and females be 4x and 3x respectively.\n\r\n\r\n=\u003e Total/males = 5/4\n\r\n\r\n=\u003e 3600/4 = 5/4\n\r\n\r\n=\u003e 14400 + 16x = 27000 + 15x\n\r\n\r\n=\u003e x = 12,600\n\r\n\r\n=\u003e Total females in the village = 5400 + 3x = 5400 + 37,800 = 43,200\n\r\n\r\nHence, 43200."},{"no":8,"source":"CAT 2022 QA Slot 1","question":"Pinky is standing in a queue at a ticket counter. Suppose the ratio of the number of persons standing ahead of Pinky to the number of persons standing behind her in the queue is 3 : 5. If the total number of persons in the queue is less than 300, then the maximum possible number of persons standing ahead of Pinky is","type":"text","options":[],"answer":"111","accepted":["111"],"solution":"Let the number of people standing in front and behind Pinky be 3x and 5x respectively.\n\r\nâˆ´ Total number of people in the line = 3x + 5x + 1 (Pinky herself) = 8x + 1\n\r\n\r\n=\u003e 8x + 1 \u003c 300\n\r\n=\u003e x \u003c 299/8 = 37.375\n\r\n\r\nâˆ´ Maximum value of x is 37.\n\r\n\r\n=\u003e Maximum number of people standing in front of Pinky = 3x = 111.\n\r\n\r\nHence, 111."},{"no":9,"source":"CAT 2021 QA Slot 1","question":"The amount Neeta and Geeta together earn in a day equals what Sita alone earns in 6 days. The amount Sita and Neeta together earn in a day equals what Geeta alone earns in 2 days. The ratio of the daily earnings of the one who earns the most to that of the one who earns the least is","type":"mcq","options":["7 : 3","3 : 2","11 : 3","11 : 7"],"answer":2,"accepted":[],"solution":"Let the earnings of Neeta, Geeta and Sita be 'n', 'g' and 's' respectively.\n\r\n\r\nThe amount Neeta and Geeta together earn in a day equals what Sita alone earns in 6 days\n\r\n=\u003e 6s = n + g ...(1)\n\r\n\r\nThe amount Sita and Neeta together earn in a day equals what Geeta alone earns in 2 days\n\r\n=\u003e 2g = s + n\n\r\n=\u003e 2(6s \u0026ndash; n) = s + n [From (1)]\n\r\n=\u003e 11s = 3n\n\r\n=\u003e n = 11s/3 ...(2)\n\r\n\r\nSubstituting n = 11s/3 in (1)\n\r\n\r\n=\u003e 6s = 11s/3 + g\n\r\n=\u003e 7s/3 = g ...(3)\n\r\n\r\nFrom (2) and (3)\n\r\n11s/3 \u003e 7s/3 \u003e s\n\r\n\r\nâˆ´ n \u003e g \u003e s\n\r\n\r\nâˆ´ The ratio of the daily earnings of the one who earns the most to that of the one who earns the least is = 11s/3 : s = 11 : 3\n\r\n\r\nHence, option (c)."},{"no":10,"source":"CAT 2021 QA Slot 2","question":"Anil, Bobby and Chintu jointly invest in a business and agree to share the overall profit in proportion to their investments. Anil's share of investment is 70%. His share of profit decreases by â‚¹ 420 if the overall profit goes down from 18% to 15%. Chintu's share of profit increases by â‚¹ 80 if the overall profit goes up from 15% to 17%. The amount, in INR, invested by Bobby is","type":"mcq","options":["2000","2400","2200","1800"],"answer":0,"accepted":[],"solution":"Let the total investment done by all three of them is I.\n\r\n\r\nWhen total profit decreases by 3% (from 18% to 15%) Anil's share decreases by 420.\n\r\n\r\nDecrease in total profit = 3% of I.\n\r\n\r\nDecrease in Anil's profit will be 70% of decrease in total profit.\n\r\n\r\n=\u003e 420 = 70% of 3% of I\n\r\n\r\n=\u003e 420 = 70/100 x 3/100 x I\n\r\n\r\n=\u003e I = 20,000\n\r\n\r\nNow, when total profit increases by 2% (from 15% to 17%) Charu's share increases by 80.\n\r\n\r\nIncrease in total profit = 2% of I.\n\r\n\r\nIncrease in Charu's profit = C% of I [C% = percentage on investment contribution by Charu]\n\r\n\r\n=\u003e 80 = C% of 2% of I\n\r\n\r\n=\u003e 80 = C/100 x 2/100 x 20000\n\r\n\r\n=\u003e C = 20%\n\r\n\r\nâˆ´ Bobby's percentage share of investment = 100 \u0026ndash; 70 \u0026ndash; 20 = 10%\n\r\n\r\n=\u003e Investment done by Bobby = 10% of 20,000 = Rs. 2,000\n\r\n\r\nHence, option (a)."},{"no":11,"source":"CAT 2021 QA Slot 3","question":"One part of a hostel's monthly expenses is fixed, and the other part is proportional to the number of its boarders. The hostel collects â‚¹ 1600 per month from each boarder. When the number of boarders is 50, the profit of the hostel is â‚¹ 200 per boarder, and when the number of boarders is 75, the profit of the hostel is â‚¹ 250 per boarder. When the number of boarders is 80, the total profit of the hostel, in INR, will be","type":"mcq","options":["20000","20200","20800","20500"],"answer":3,"accepted":[],"solution":"Total cost = Fixed cost + Variable cost\n\r\n\r\nVariable cost = k x b\n\r\nwhere, b = number of boarders and k = variable cost per boarder.\n\r\n\r\nTotal cost = FC + kb\n\r\n\r\nTotal collection = 1600b\n\r\n\r\nCase 1 : Total profit = 200 x 50 = 1600 x 50 \u0026ndash; (FC + k x 50) ...(1)\n\r\nCase 2 : Total profit = 250 x 75 = 1600 x 75 \u0026ndash; (FC + k x 75) ...(2)\n\r\n\r\n(2) - (1), we get\n\r\n18750 \u0026ndash; 10000 = 1600 x 25 - 25k\n\r\n=\u003e k = 1250 and FC = 7,500\n\r\n\r\nNow, total profit when there are 80 boarders = 1600 x 80 \u0026ndash; (7500 + 1250 x 80) = 20,500\n\r\n\r\nAlternately,\n\r\nTotal cost when there are 50 students = (1600 \u0026ndash; 200) x 50 = 70,000\n\r\nTotal cost when there are 75 students = (1600 \u0026ndash; 250) x 75 = 1,01,250\n\r\n\r\nDue to 25 students cost increases by (101250 - 70000) = 31250\n\r\nâˆ´ Due to 5 students cost increases by = 31250/5 = 6250\n\r\n\r\nâˆ´ Total cost when there are 80 students = 1,01,250 + 6250 = 1,07,500\n\r\nTotal revenue for 80 students = 1600 x 80 = 1,28,000\n\r\n\r\nâˆ´ Profit = 1,28,000 \u0026ndash; 1,07,500 = 20,500.\n\r\n\r\nHence, option (d)."},{"no":12,"source":"CAT 2020 QA Slot 2","question":"A sum of money is split among Amal, Sunil and Mita so that the ratio of the shares of Amal and Sunil is 3 : 2, while the ratio of the shares of Sunil and Mita is 4 : 5. If the difference between the largest and the smallest of these three shares is Rs 400, then Sunil's share, in rupees, is","type":"text","options":[],"answer":"800","accepted":["800"],"solution":"Let the amount received by them be a, s and m respectively.\n\r\n\r\nGiven, a : s = 3 : 2 and s : m = 4 : 5\n\r\n\r\nâˆ´ a : s : m = 6 : 4 : 5\n\r\n\r\n=\u003e Amal's share = 6x and Sunil's share = 4x.\n\r\n\r\nGiven, difference between the largest and the smallest of these three shares is Rs 400.\n\r\n\r\n=\u003e 6x \u0026ndash; 4x = 400\n\r\n\r\n=\u003e x = 200.\n\r\n\r\nâˆ´ Sunil's share = 4x = Rs. 800.\n\r\n\r\nHence, 800."},{"no":13,"source":"CAT 2019 QA Slot 2","question":"In an examination, Rama's score was one-twelfth of the sum of the scores of Mohan and Anjali. After a review, the score of each of them increased by 6. The revised scores of Anjali, Mohan, and Rama were in the ratio 11 : 10 : 3. Then Anjali's score exceeded Rama's score by","type":"mcq","options":["26","32","24","35"],"answer":1,"accepted":[],"solution":"It is given that the scores of Anjali, Mohan and Rama after review were in the ratio 11 : 10 : 3\n\r\n\r\nSo, let their values be 11x, 10x and 3x respectively.\n\r\n\r\nIt is known that their score increased by 6 after review.\n\r\n\r\nSo, scores before review = 11x - 6, 10x - 6 and 3x - 6 respectively\n\r\n\r\nNow, from the data given : (11x - 6 + 10x - 6) x 1/12 = 3x - 6\n\r\n\r\n=\u003e 21x - 12 = 36x - 72\n\r\n\r\n=\u003e 60 = 15x\n\r\n\r\n=\u003e x = 4\n\r\n\r\nSo, marks after revision are 44, 40 and 12 respectively.\n\r\n\r\nTherefore, Anjali's score exceeded Rama's by 44 - 12 = 32 marks\n\r\n\r\nHence, option (b)."},{"no":14,"source":"CAT 2018 QA Slot 1","question":"Raju and Lalitha originally had marbles in the ratio 4 : 9. Then Lalitha gave some of her marbles to Raju. As a result, the ratio of the number of marbles with Raju to that with Lalitha became 5 : 6. What fraction of her original number of marbles was given by Lalitha to Raju?","type":"mcq","options":["6/19","1/5","7/33","1/4"],"answer":2,"accepted":[],"solution":"Let Raju and Lalitha originally had (4x) and (9x) marbles. Later Lalitha gave (y) marbles to Raju.\n\r\n\r\nTherefore, 4/x = 5/6\n\r\n\r\n=\u003e 6(4x + y) = 5(9x - y)\n\r\n=\u003e 24x + 6y = 45x - 5y\n\r\n=\u003e 11y = 21x\n\r\nâ€‹â€‹â€‹â€‹â€‹â€‹â€‹âˆ´ y = 21x/11\n\r\n\r\nThe required fraction = y/9x = 21/11 x 9 x = 7/33\n\r\n\r\nHence, option (c)."},{"no":15,"source":"CAT 2018 QA Slot 2","question":"The scores of Amal and Bimal in an examination are in the ratio 11 : 14. After an appeal, their scores increase by the same amount and their new scores are in the ratio 47 : 56. The ratio of Bimal's new score to that of his original score is","type":"mcq","options":["4 : 3","3 : 2","8 : 5","5 : 4"],"answer":0,"accepted":[],"solution":"Suppose the original scores of Amal and Bimal are 11x and 14x respectively.\n\r\n\r\nSuppose 'y' is the increase in their marks.\n\r\n\r\nTherefore the new marks of Amal and Bimal are '11x + y' and '14x + y' respectively.\n\r\n\r\nTherefore, we have 11/x = 47/56\n\r\n\r\nâˆ´ 616x + 56y = 658x + 47y\n\r\n\r\nSolving for x and y, we get 14x = 3y\n\r\n\r\nTherefore Bimal's old marks = 14x = 3y and his new marks = 14x + y = 4y. Therefore the required ratio = 4:3.\n\r\n\r\nHence, option (a)."},{"no":16,"source":"CAT 2017 QA Slot 1","question":"Suppose, C 1 , C 2 , C 3 , C 4 , and C 5 are five companies. The profits made by C 1 , C 2 , and C 3 are in the ratio 9 : 10 : 8 while the profits made by C 2 , C 4 , and C 5 are in the ratio 18 : 19 : 20. If C 5 has made a profit of Rs 19 crore more than C1, then the total profit (in Rs) made by all five companies is:","type":"mcq","options":["438 crore","435 crore","348 crore","345 crore"],"answer":0,"accepted":[],"solution":"â€‹â€‹â€‹â€‹â€‹â€‹â€‹\n\r\n\r\nC 5 \u0026ndash; C 1 = 19.\n\r\nâˆ´ 100x - 81x = 19\n\r\nâ€‹â€‹â€‹â€‹â€‹â€‹â€‹=\u003e x = 1\n\r\n\r\nâˆ´ Total profit = 81x + 90x + 72x + 95x + 100x = 438x = 438 crore.\n\r\n\r\nHence, option (a)."},{"no":17,"source":"CAT 2017 QA Slot 1","question":"A stall sells popcorn and chips in packets of three sizes: large, super, and jumbo. The numbers of large, super, and jumbo packets in its stock are in the ratio 7 : 17 : 16 for popcorn and 6 : 15 : 14 for chips. If the total number of popcorn packets in its stock is the same as that of chips packets, then the numbers of jumbo popcorn packets and jumbo chips packets are in the ratio:","type":"mcq","options":["1 : 1","8 : 7","4 : 3","6 : 5"],"answer":0,"accepted":[],"solution":"Total number of popcorn packets in stock = total number of chips packets = T\n\r\n\r\nPopcorn :\n\r\nLarge : Super : Jumbo = 7 : 17 : 16\n\r\n=\u003e Jumbo popcorn packets = 16/40 T\n\r\n\r\nChips :\n\r\nLarge : Super : Jumbo = 6 : 15 : 14\n\r\nâ€‹â€‹â€‹â€‹â€‹â€‹â€‹=\u003e Jumbo popcorn packets = 14/35 T\n\r\n\r\nâˆ´ Required ratio = 16/40 T : 14/35 T = 1 : 1.\n\r\n\r\nHence, option (a)."},{"no":18,"source":"CAT 2017 QA Slot 2","question":"If a, b, c are three positive integers such that a and b are in the ratio 3 : 4 while b and c are in the ratio 2 : 1, then which one of the following is a possible value of (a + b + c)?","type":"mcq","options":["201","205","207","210"],"answer":2,"accepted":[],"solution":"a : b = 3 : 4\n\r\nb : c = 2 : 1\n\r\n\r\nTo get a common ratio we take LC.M (2, 4) = 4\n\r\nSo, we multiply each of b and c by 2\n\r\nHence, ratio of b : c = 4 : 2\n\r\n\r\nâˆ´ Ratio of a : b : c = 4 : 2\n\r\n\r\nNow let a = 3x, b = c = 3 : 4 : 2\n\r\nSo a + b + c = 3x + 4x + 2x = 9x\n\r\n\r\nAs, a, b and c are all positively integers, it implies that the sum of a, b and c will be a positive integer and a multiple of 9.\n\r\n\r\nOut of the given options, only 207 i.e, option (c) is a multiple of 9.\n\r\n\r\nHence, option (c)."},{"no":19,"source":"CAT 2006 QA","question":"If a/b = 1/3, b/c = 2, c/d = 1/2, d/e = 3 and e/f = 1/4 then what is the value of a/b?","type":"mcq","options":["3/8","27/8","3/4","27/4"],"answer":0,"accepted":[],"solution":"a/d = a/b x b/c x c/d = 1/3 x 2 x 1/2 = 1/3\n\r\n\r\nb/e = b/c x c/d x d/e = 2 x 1/2 x 3 = 3\n\r\n\r\nc/f = c/d x d/e x e/f = 1/2 x 3 x 1/4 = 3/8\n\r\n\r\nâˆ´ a/b = 1/3 x 3 x 3/8 = 3/8\n\r\n\r\nHence, option (a)."},{"no":20,"source":"CAT 2006 QA","question":"What is the weight of Praja's luggage?","type":"mcq","options":["20 kg","25 kg","30 kg","35 kg"],"answer":3,"accepted":[],"solution":"Let f kg be the free luggage allowance and let Raja and Praja have r kg and p kg excess luggage respectively.\n\r\n\r\nLet x be the fixed rate per kg for excess luggage.\n\r\n\r\nâˆ´ 2f + r + p = 60 ... (i)\n\r\n\r\nrx = 1200 ... (ii)\n\r\n\r\npx = 2400 ... (iii)\n\r\n\r\n(60 \u0026ndash; f)x = 5400 ... (iv)\n\r\n\r\nFrom (ii) and (iii),\n\r\n\r\np = 2r ... (v)\n\r\n\r\nSubstituting in (i),\n\r\n\r\n2f + 3r = 60\n\r\n\r\nâˆ´ f = 30 \u0026ndash; 3r/2 ... (vi)\n\r\n\r\nSubstituting in (iv),\n\r\n\r\n(60 \u0026ndash; 30 + 3r/2)x = 5400\n\r\n\r\nâˆ´ 30x + 3rx/2 = 5400\n\r\n\r\nFrom (ii),\n\r\n\r\nrx = 1200\n\r\n\r\nâˆ´30x = 3600\n\r\n\r\nâˆ´ x = 120\n\r\n\r\nâˆ´ r = 10, p = 20 and f = 15\n\r\n\r\nâˆ´ Weight of Praja's luggage = p + f = 35 kg\n\r\n\r\nHence, option (d)."},{"no":21,"source":"CAT 2006 QA","question":"What is the free luggage allowance?","type":"mcq","options":["10 kg","15 kg","20 kg","25 kg"],"answer":1,"accepted":[],"solution":"As calculated in the solution to the previous question, f = 15 kg\n\r\n\r\nHence, option (b)."},{"no":22,"source":"CAT 2004 QA","question":"If a/b = b/c = c/a = r , then r cannot take any value except _________.","type":"mcq","options":["1/2","-1","1/2 or -1","- 1/2 or -1"],"answer":2,"accepted":[],"solution":"Given, a/b = b/c = c/c = r\n\r\n\r\nBy property of equal ratios,\n\r\n\r\na/b = r\n\r\n\r\nâˆ´ a/b = r\n\r\n\r\nAssuming (a + b + c \u0026ne; 0),\n\r\n\r\nâˆ´ r = 1/2\n\r\n\r\nIf a + b + c = 0, a = \u0026ndash;(b + c)\n\r\n\r\nThen from the original ratio, r = a/b = - ( b/c= -1\n\r\n\r\nHence, option (c)."},{"no":23,"source":"CAT 2003 QA - Retake","question":"In a coastal village, every year floods destroy exactly half of the huts. After the flood water recedes, twice the number of huts destroyed are rebuilt. The floods occurred consecutively in the last three years namely 2001, 2002 and 2003. If floods are again expected in 2004, the number of huts expected to be destroyed is:","type":"mcq","options":["Less than the number of huts existing at the beginning of 2001.","Less than the total number of huts destroyed by floods in 2001 and 2003.","Less than the total number of huts destroyed by floods in 2002 and 2003.","More than the total number of huts built in 2001 and 2002."],"answer":2,"accepted":[],"solution":"â€‹â€‹â€‹â€‹â€‹â€‹â€‹\n\r\n\r\nLet the number of huts at the beginning of 2001 be n.\n\r\n\r\nFrom the table, it is clear that only option 3 is satisfied as per the above table.\n\r\n\r\nHence, option (c)"},{"no":24,"source":"CAT 2003 QA - Retake","question":"Let a, b, c, d and e be integers such that a = 6b = 12c, and 2b = 9d = 12e. Then which of the following pairs contains a number that is not an integer?","type":"mcq","options":["a/27 , b/e","a/36 , c/e","a/12 , b/d","a/6 , c/d"],"answer":3,"accepted":[],"solution":"Since a = 6b = 12c and 2b = 9d = 12e\n\r\n\r\nâˆ´ a : b : c = 12 : 2 : 1 and b : d : e = 18 : 4 : 3\n\r\n\r\nâˆ´ a : b : c : d : e = 108 : 18 : 9 : 4 : 3\n\r\n\r\nâˆ´ a = 108k; b = 18k; c = 9k; d = 4k and e = 3k where 'k' is an integer\n\r\n\r\nOption 1 is: a/27 , b/e = (4k, 6)\n\r\n\r\nOption 2 is: a/36 , c/e = (3k, 3)\n\r\n\r\nOption 3 is: a/12 , b/d = (9k, 4k 2 )\n\r\n\r\nOption 4 is: a/6 , c/d = 18 k , 9/4\n\r\n\r\nThe 4th option contains 9/4, which is not an integer.\n\r\n\r\nHence, option (d)."},{"no":25,"source":"CAT 2002 QA","question":"Each question is followed by two statements A and B. Answer each question using the following instructions:\n\r\n\r\nAnswer (1) if the question can be solved by any one of the statements, but not the other one.\n\r\nAnswer (2) if the question can be solved by using either of the two statements.\n\r\nAnswer (3) if the question can be solved by using both the statements together and not by any one of them.\n\r\nAnswer (4) if the question cannot be solved with the help of the given data and more data is required.\n\r\n\r\nA sum of Rs. 38,500 was divided among Jagdish, Punit and Girish. Who received the minimum amount?\n\r\n\r\nA. Jagdish received 2/9 of what Punit and Girish together received.\n\r\nB. Punit received 3/11 of what Jagdish and Girish together received.","type":"mcq","options":["1","2","3","4"],"answer":2,"accepted":[],"solution":"Consider statement A:\n\r\n\r\nJagdish : (Punit + Girish) = 2 : 9\n\r\n\r\nâˆ´ Jagdish's share = 2/11 x Total = 18.18% of the total\n\r\n\r\nHowever, we don't know the percentage distribution between Punit and Girish.\n\r\n\r\nâˆ´ Statement A alone is not sufficient.\n\r\n\r\nConsider statement B:\n\r\n\r\nPunit : (Jagdish + Girish) = 3 : 11\n\r\n\r\nâˆ´ Punit's share = 3/14 x Total = 21.4% of the total\n\r\n\r\nHowever, we do not know the percentage distribution between Jagdish and Girish.\n\r\n\r\nâˆ´ Statement B alone is not sufficient.\n\r\n\r\nConsider both statements together:\n\r\n\r\nJagdish = 18.18% of the total amount\n\r\n\r\nPunit = 21.4% of the total amount\n\r\n\r\nGirish = 100 - 18.18 - 21.4 = 60.42% of the total amount\n\r\n\r\nâˆ´ Jagdish received the minimum amount.\n\r\n\r\nHence, option (c)."},{"no":26,"source":"CAT 2001 QA","question":"Three friends, returning from a movie, stopped to eat at a restaurant. After dinner, they paid their bill and noticed a bowl of mints at the front counter. Sita took 1/3 of the mints, but returned four because she had a momentary pang of guilt. Fatima then took 1/4 of what was left but returned three for similar reasons. Eswari then took half of the remainder but threw two back into the bowl. The bowl had only 17 mints left when the raid was over. How many mints were originally in the bowl?","type":"mcq","options":["38","31","41","None of these"],"answer":3,"accepted":[],"solution":"Sita takes 1/3rd of the total mints which implies that the total number of mints in the bowl should be a multiple of 3. None of the options is a multiple of 3.\n\r\n\r\nHence, option (d).\n\r\n\r\nAlternatively\n\r\n\r\nThis problem can be best solved by working backwards.\n\r\n\r\nNumber of mints before Eswari = (17 - 2) x 2 = 30\n\r\n\r\nâˆ´ Number of mints before a Fatima = ( 30/3 = 36\n\r\n\r\nâˆ´ Number of mints before Sita = ( 36/4 = 48\n\r\n\r\nâˆ´ Total number of mints in the bowl = 48\n\r\n\r\nHence, option (d)."},{"no":27,"source":"CAT 2000 QA","question":"A truck travelling at 70 kilometres per hour uses 30% more diesel to travel a certain distance than it does when it travels at the speed of 50 kilometres per hour. If the truck can travel 19.5 kilometres on a litre of diesel at 50 kilometres per hour, how far can the truck travel on 10 litres of diesel at a speed of 70 kilometres per hour?","type":"mcq","options":["130","140","150","175"],"answer":2,"accepted":[],"solution":"Given, that the truck can travel 19.5 kilometres on a litre of diesel at 50 kilometres per hour.\n\r\nâˆ´ At 50 km/hr, truck covers 19.5 km in 1 litre diesel.\n\r\n\r\nâˆ´ The truck will use 30% more diesel i.e., 1.3 litre diesel to cover 19.5 km at 70 km/hr.\n\r\n\r\nâˆ´ At 70 km/hr, in 10 litres of diesel, the truck will cover 19.5/1.3 x 10 = 150 km\n\r\n\r\nHence, option (c)."},{"no":28,"source":"CAT 1999 QA","question":"The speed of a railway engine is 42 kmph when no compartment is attached, and the reduction in speed is directly proportional to the square root of the number of compartments attached. If the speed of the train carried by this engine is 24 kmph when 9 compartments are attached, the maximum number of compartments that can be carried by the engine is","type":"mcq","options":["49","48","46","47"],"answer":1,"accepted":[],"solution":"18 \u0026prop; 9\n\r\n\r\n42 \u0026prop; x ; Here x = number of compartments\n\r\n\r\n18/42 = 9/x\n\r\n\r\nSimplifying, x = 49, but this is with reference to maximum speed. Hence number of compartments would be one less in order to run i.e. 48.\n\r\n\r\nHence, option (b)."},{"no":29,"source":"CAT 1999 QA","question":"Total expenses of a boarding house are partly fixed and partly varying linearly with the number of boarders. The average expense per boarder is Rs. 700 when there are 25 boarders and Rs. 600 when there are 50 boarders. What is the average expense per boarder when there are 100 boarders?","type":"mcq","options":["550","580","540","570"],"answer":0,"accepted":[],"solution":"Let x be the fixed cost and y the variable cost 17500 = x + 25y ... (i)\n\r\n30000 = x + 50y ... (ii)\n\r\n\r\nSolving the equation (i) and (ii), we get\n\r\nx = 5000, y = 500\n\r\n\r\nNow if the average expense of 100 boarders be 'A'.\n\r\n\r\nThen\n\r\n100 x A = 5000 + 500 x 100\n\r\nâˆ´ A = 550.\n\r\n\r\nHence, option (a)."},{"no":30,"source":"CAT 1998 QA","question":"I have one-rupee coins, 50-paisa coins and 25-paisa coins. The number of coins are in the ratio 2.5 : 3 : 4. If the total amount with me is Rs. 210, find the number of one-rupee coins.","type":"mcq","options":["90","85","100","105"],"answer":3,"accepted":[],"solution":"Since the number of coins are in the ratio 2.5 : 3 : 4, the values of the coins will be in the ratio\n\r\n(1 x 2.5) : (0.5 x 3) : (0.25 x 4) = 2.5 : 1.5 : 1 or 5 : 3 : 2\n\r\nSince they totally amount to Rs. 210, if the value of each type of coins are assumed to be 5x, 3x and 2x, the average value per coin will be 210/10.\n\r\n\r\nSo the total value of one-rupee coins will be 5 x 210/10 = Rs. 105\n\r\n\r\nSo the total number of one-rupee coins will be 105."},{"no":31,"source":"CAT 1998 QA","question":"Direction: Each question is followed by two statements, I and II. Answer the questions based on the statements and mark the answer as\n\r\n1. if the question can be answered with the help of any one statement alone but not by the other statement.\n\r\n2. if the question can be answered with the help of either of the statements taken individually.\n\r\n3. if the question can be answered with the help of both statements together.\n\r\n4. if the question cannot be answered even with the help of both statements together.\n\r\n\r\nWhat is the value of 'a'?\n\r\nI. Ratio of a and b is 3 : 5, where b is positive.\n\r\nII. Ratio of 2a and b is 12/10 , where a is positive.","type":"text","options":[],"answer":"4","accepted":["4"],"solution":"Note that both the statements give the same piece of information that a : b = 3 : 5 and that a and b are both positive. But none of the statements either in itself or together can give the value of a."},{"no":32,"source":"CAT 1997 QA","question":"A student instead of finding the value of 7/8 of a number, found the value of 7/18 of the number. If his answer differed from the actual one by 770, find the number.","type":"mcq","options":["1584","2520","1728","1656"],"answer":0,"accepted":[],"solution":"This equation is very straightforward. If the number is 'x', then 7/x - 7/x = 770 . On solving this equation, we get x = 1584. Hint: Students please note that if the difference in 7/8 and 7/18 of a number is 770, then the difference in 1/8 and 1/18 of the number should be 110. If we express this as an equation, we get x/8 - x/18 = 110\n\r\n\r\nor 10x = 110 x 18 x 8\n\r\nor x = 11 x 18 x 8\n\r\nYou can further proceed from here in two ways: (i) the last digit of the required answer should be (1 x 8 x 8) = 4, (ii) number should be divisible by 11. In both cases, the answer that is obtained from the given choices is 1584."},{"no":33,"source":"CAT 1997 QA","question":"The value of each of a set of coins varies as the square of its diameter, if its thickness remains constant, and it varies as the thickness, if the diameter remains constant. If the diameter of two coins are in the ratio 4 : 3, what should be the ratio of their thickness if the value of the first is four times that of the second?","type":"mcq","options":["16 : 9","9 : 4","9 : 16","4 : 9"],"answer":1,"accepted":[],"solution":"Let D 1 , T 1 and D 2 , T 2 denote the diameters and the thickness of the two coins respectively. If V 1 and V 2 are the values of the two coins.\n\r\n\r\nV/1 = D/1 = D/1 2 T/1\n\r\n\r\nTherefore, 4/1 = 4/3 2 T/1 =\u003e T/1 = 9/4"},{"no":34,"source":"CAT 1996 QA","question":"The cost of diamond varies directly as the square of its weight. Once, this diamond broke into four pieces with weights in the ratio 1 : 2 : 3 : 4. When the pieces were sold, the merchant got Rs. 70,000 less. Find the original price of the diamond.","type":"mcq","options":["Rs. 1.4 lakh","Rs. 2 lakh","Rs. 1 lakh","Rs. 2.1 lakh"],"answer":2,"accepted":[],"solution":"Let the original weight of the diamond be 10x. Hence, its original price will be k(100x2) . . . where k is a constant.\n\r\n\r\nThe weights of the pieces after breaking are x, 2x, 3x and 4x. Therefore, their prices will be kx 2 , 4kx 2 , 9kx 2 and 16kx 2 . So the total price of the pieces = (1 + 4 + 9 + 16)kx 2 = 30kx 2 . Hence, the difference in the price of the original diamond and its pieces = 100kx 2 \u0026ndash; 30kx 2 = 70kx 2 = 70000.\n\r\nHence, kx 2 = 1000 and the original price = 100kx 2 = 100 x 1000 = 100000 = Rs. 1 lakh."},{"no":35,"source":"CAT 1996 QA","question":"Out of two-thirds of the total number of basketball matches, a team has won 17 matches and lost 3 of them. What is the maximum number of matches that the team can lose and still win more than threefourths of the total number of matches, if it is true that no match can end in a tie?","type":"mcq","options":["4","6","5","3"],"answer":0,"accepted":[],"solution":"The team has played a total of (17 + 3) = 20 matches. This constitutes 2/3 of the matches. Hence, total number of matches played = 30. To win 3/4 of them, a team has to win 22.5, i.e. at least win 23 of them. In other words, the team has to win a minimum of 6 matches (since it has already won 17) out of remaining 10. So it can lose a maximum of 4 of them."}];let current=0,submitted=false,secondsLeft=90*60;const responses=Array(questions.length).fill(null),marked=Array(questions.length).fill(false),labels=['A','B','C','D'];const qbar=document.getElementById('qbar'),host=document.getElementById('questionHost'),resultBox=document.getElementById('result');function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}function norm(s){return String(s??'').trim().toLowerCase().replace(/[,â‚¹$ rs.%]/g,'').replace(/\s+/g,'');}function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}function correctText(q){return q.type==='mcq'?'('+labels[q.answer]+') '+q.options[q.answer]:q.answer;}function control(q,i){if(q.type==='mcq')return '<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" name="answer" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span>('+labels[j]+') '+esc(op)+'</span></label>').join('')+'</div>';return '<input class="typed-answer" name="answer" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(q.source)+'</div></div><button type="button" class="submit" onclick="submitTest()" '+(submitted?'disabled':'')+'>Submit Test</button></div><div class="qtext">'+esc(q.question)+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong>\n\n'+esc(q.solution||'Solution not provided on source page.')+'</div><div class="navrow"><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()">Next</button><button type="button" class="mark" onclick="toggleMark()">'+(marked[current]?'Unmark':'Mark for Review')+'</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}function bindAnswer(){host.querySelectorAll('[name="answer"]').forEach(el=>{el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}function saveCurrent(){const el=host.querySelector('[name="answer"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}function go(i){saveCurrent();current=i;renderQuestion();}function prevQ(){if(current>0)go(current-1);}function nextQ(){if(current<questions.length-1)go(current+1);}function toggleMark(){marked[current]=!marked[current];renderQuestion();}function clearResponse(){responses[current]=null;renderQuestion();}function isCorrect(q,ans){if(ans===null||ans==='')return null;if(q.type==='mcq')return Number(ans)===q.answer;return(q.accepted||[q.answer]).map(norm).includes(norm(ans));}function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);}}function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}function calcEval(expr){if(!/^[0-9+*/().%\s-]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;}));renderQuestion();tick();setInterval(tick,1000);</script></body></html>
