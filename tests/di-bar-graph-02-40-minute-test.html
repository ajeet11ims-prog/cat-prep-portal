<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DI - BAR graph 02 40 Minute Test</title>
  <style>
    :root{--bg:#f4f7fa;--paper:#fff;--ink:#17202a;--muted:#5d6d7e;--line:#d7dde5;--brand:#4f79c7;--brand-dark:#2f5ca8;--brand-soft:#eef4ff;--ok:#157347;--bad:#b02a37}
    *{box-sizing:border-box}html,body{height:100%;width:100%}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:#fff;line-height:1.45;overflow:hidden}
    header{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(20,40,60,.08)}
    .topbar{width:100%;margin:0;padding:10px 14px;display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center}
    h1{margin:0;font-size:21px;color:var(--brand);letter-spacing:0}.meta{color:var(--muted);font-size:13px;margin-top:2px}
    .pill,.calc-open{border:1px solid var(--line);border-radius:6px;background:var(--brand-soft);color:var(--brand-dark);padding:8px 11px;font-weight:700;white-space:nowrap}.calc-open{border-color:var(--brand);background:var(--brand);color:#fff;cursor:pointer}
    main{width:100vw;height:calc(100vh - 61px);margin:0;padding:8px 10px;display:grid;grid-template-columns:minmax(0,1fr) 420px;gap:10px;overflow:hidden;background:var(--bg)}
    aside,.question,#result{background:var(--paper);border:1px solid var(--line);border-radius:8px}
    aside{grid-column:2;grid-row:1;position:static;align-self:stretch;padding:14px;min-height:0;overflow-y:auto}
    main>section{grid-column:1;grid-row:1;min-width:0;overflow:hidden;display:grid;grid-template-rows:minmax(0,1fr) auto auto}.panel-title{margin:0 0 12px;color:var(--brand);font-size:17px}
    .palette{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.dot{min-height:48px;border:1px solid var(--line);border-radius:6px;background:#fbfcfd;color:var(--ink);font-weight:700;cursor:pointer;font-size:15px}.dot.active{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark)}.dot.answered{background:#eef8f2;border-color:rgba(21,115,71,.4);color:var(--ok)}
    #testForm{height:100%;min-height:0;display:grid;grid-template-rows:minmax(0,1fr) auto auto;overflow:hidden}
    #result,.question{padding:12px;margin-bottom:0}#result{display:none}#result h2{margin:0 0 10px;color:var(--brand);font-size:18px}
    .score-grid{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:9px;margin-top:12px}.score-box{border:1px solid var(--line);border-radius:6px;padding:9px;background:#fbfcfd}.score-box strong{display:block;font-size:22px;margin-top:2px}
    .question{display:none}.question.active{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(360px,.7fr);gap:10px;align-items:stretch;height:100%;min-height:0}.question h2{margin:0 0 14px;font-size:17px}
    .set-info{border:1px solid var(--line);border-radius:8px;padding:8px;background:#fbfcfd;min-height:0;height:100%;display:grid;grid-auto-rows:minmax(0,1fr);gap:8px;overflow:hidden}.set-info.bank,.set-info.coaching{grid-template-rows:auto minmax(0,1fr)}
    .chart-card{border:1px solid var(--line);border-radius:7px;background:#fff;padding:6px;display:grid;place-items:center;min-height:0;overflow:hidden}.chart-svg{width:100%;height:100%;display:block;background:#fff}
    .svg-title{font-size:21px;font-weight:700}.svg-text{font-size:17px;fill:#111}.svg-small{font-size:15px;fill:#111}.svg-axis{stroke:#111;stroke-width:2}.svg-bar{stroke:#111;stroke-width:2}.svg-legend{font-size:21px;font-weight:700}
    .question-body{border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px;min-height:0;height:100%;overflow:auto}
    .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}label.option{display:flex;gap:9px;align-items:flex-start;border:1px solid var(--line);border-radius:6px;padding:9px;cursor:pointer;background:#fbfcfd;min-height:44px}label.option:hover{border-color:#9ab7ca}input[type=radio]{width:17px;height:17px;margin-top:4px;flex:0 0 auto;accent-color:var(--brand)}
    .text-answer{width:min(100%,360px);min-height:42px;border:1px solid var(--line);border-radius:6px;padding:9px 11px;font-size:16px;background:#fbfcfd}
    .question-nav,.actions{display:flex;justify-content:space-between;gap:10px;margin:8px 0 0;flex-wrap:wrap}button{border:0;border-radius:6px;background:var(--brand);color:white;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer}button.secondary{background:#e8edf4;color:var(--ink)}button:disabled{opacity:.55;cursor:default}
    .answer-note{margin-top:10px;font-weight:700}.answer-note.ok{color:var(--ok)}.answer-note.bad{color:var(--bad)}.answer-note.muted{color:var(--muted)}.correct{border-color:rgba(21,115,71,.45);background:#eef8f2}.wrong{border-color:rgba(176,42,55,.45);background:#fff1f2}.missed{border-color:rgba(93,109,126,.45);background:#f6f7f9}
    .calculator-dialog{width:min(360px,calc(100vw - 28px));max-width:360px;margin:0;inset:90px auto auto 50%;transform:translateX(-50%);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:0 12px 34px rgba(15,23,42,.2)}.calculator-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;cursor:move;user-select:none}.calculator-head h2{margin:0;color:var(--brand-dark);font-size:18px}.calc-close{border:1px solid var(--line);border-radius:6px;background:#eef2f6;color:var(--ink);width:34px;height:34px;padding:0;font-size:20px;line-height:1;cursor:pointer}.calc-display{width:100%;border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px;background:#fbfcfd;color:var(--ink);font-size:22px;font-weight:700;text-align:right}.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.calc-key{min-height:44px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:var(--ink);font-size:17px;font-weight:700;cursor:pointer}.calc-key.operator{background:var(--brand-soft);color:var(--brand-dark)}.calc-key.equal{background:var(--brand);color:#fff;grid-column:span 2}.calc-key.clear{color:var(--bad)}
    @media(max-width:900px){.topbar{grid-template-columns:1fr}main{grid-template-columns:1fr}aside{grid-column:1;grid-row:2}.question.active{display:block;min-height:auto}.set-info,.question-body{min-height:auto;margin-bottom:14px}.options,.score-grid{grid-template-columns:1fr}.pill,.calc-open,.question-nav button,.actions button{width:100%}.chart-svg{height:auto}}
  </style>
</head>
<body>

  <main><section><section id="result"></section><form id="testForm"></form></section><aside><h2 class="panel-title">Question Palette</h2><div class="palette" id="palette"></div></aside></main>

  <dialog class="calculator-dialog" id="calculatorDialog"><div class="calculator-head"><h2>Calculator</h2><button class="calc-close" type="button" id="closeCalculator" aria-label="Close calculator">x</button></div><input class="calc-display" id="calcDisplay" type="text" value="0" inputmode="decimal" aria-label="Calculator display"><div class="calc-grid" id="calcKeys"><button class="calc-key clear" type="button" data-action="clear">C</button><button class="calc-key" type="button" data-action="backspace">DEL</button><button class="calc-key operator" type="button" data-value="%">%</button><button class="calc-key operator" type="button" data-value="/">/</button><button class="calc-key" type="button" data-value="7">7</button><button class="calc-key" type="button" data-value="8">8</button><button class="calc-key" type="button" data-value="9">9</button><button class="calc-key operator" type="button" data-value="*">x</button><button class="calc-key" type="button" data-value="4">4</button><button class="calc-key" type="button" data-value="5">5</button><button class="calc-key" type="button" data-value="6">6</button><button class="calc-key operator" type="button" data-value="-">-</button><button class="calc-key" type="button" data-value="1">1</button><button class="calc-key" type="button" data-value="2">2</button><button class="calc-key" type="button" data-value="3">3</button><button class="calc-key operator" type="button" data-value="+">+</button><button class="calc-key" type="button" data-value="0">0</button><button class="calc-key" type="button" data-value=".">.</button><button class="calc-key equal" type="button" data-action="equals">=</button></div></dialog>
  <script>
    const optionLabels=["A","B","C","D"];
    const questions=[
      {group:"vehicles",q:"If the production target of all the vehicles together in 2008 is 20% more than the production in 2007, then what is the percentage deficit in 2008 with respect to the target, if the number of vehicles produced in 2008 is 520 thousand?",options:["Lies between 4% and 5%.","Less than 3%.","Greater than 5%.","Lies between 3% and 4%."],answer:"D"},
      {group:"vehicles",q:"If the production of each of A, B, C and D increases by 10% in 2008 and the overall increase in production of all the vehicles is 15%, then what is the net increase in the production of vehicles of type E?",options:["40,000","35,000","30,000","25,000"],answer:"A"},
      {group:"vehicles",q:"By how many percentage points is the production of the vehicles of type C, as a percentage of the total number of vehicles produced, more in 2006 than in 2007?",options:["3.33","4.88","4.44","2.22"],answer:"C"},
      {group:"vehicles",q:"For vehicles of type B, the percentage decrease in the production from 2006 to 2007 is equal to the percentage increase in the price during the same period. If the price of each vehicle of type B in 2006 was Rs.2 lakh, then its price in 2007 is",options:["Rs.2.33 lakh","Rs.6 lakh","Rs.2.99 lakh","Rs.2.66 lakh"],answer:"D"},
      {group:"vehicles",q:"What is the percentage increase in the total production of vehicles by XYZ from 2005 to 2007?",options:["100%","50%","150%","200%"],answer:"A"},
      {group:"staff",q:"If 30% of the managers in section C leave the company, then approximately how many managers will be there for every 40 executives in that section?",options:["6","5","8","7"],answer:"D"},
      {group:"staff",q:"If 50% of the executives of section E join a new company, then the remaining executives of the section form what percentage of the total executives in the company?",options:["20%","22.22%","12.5%","14.28%"],answer:"D"},
      {group:"staff",q:"Which of the following is the highest?",options:["Number of team leaders in section D.","Number of executives in section C.","Number of managers of section C.","Number of executives in section F."],answer:"D"},
      {group:"staff",q:"In section E, the average salary of a manager is Rs.30,000 and that of an executive is Rs.1,000. What percentage is the amount paid as salary to the managers of the amount paid as salary to the executives?",options:["111.11%","90.90%","125%","112.12%"],answer:"A"},
      {group:"staff",q:"What is the ratio of the number of executives in sections G, F and E together to that of the number of managers in sections A, B, C and D together?",options:["400 : 27","200 : 13","600 : 51","300 : 13"],answer:"B"},
      {group:"bank",type:"text",q:"In which of the following years did the deposits, when compared to the previous year, show the second highest percentage increase?",answer:"2004"},
      {group:"bank",type:"text",q:"What is the approximate simple average annual growth rate in the number of branches of ABC bank from 2003 to 2007?",answer:"124"},
      {group:"bank",type:"text",q:"If there are 12,650 customers for each branch of the bank both in 2005 and in 2007, then what is the percentage increase (approximated to the next highest integer) in the total number of customers of the bank from 2005 to 2007?",answer:"115"},
      {group:"bank",type:"text",q:"In 2006, if there is an average of 800 customers for each branch of the bank, then what is the average deposits per customer (in lakhs)?",answer:"45"},
      {group:"bank",type:"text",q:"If there is an annual growth of 20% in the total number of branches of the bank from 2007 to 2009, then how many branches did the bank have in 2009?",answer:"488"},
      {group:"coaching",q:"If 1000 students received interview calls from B-school 'x' in each of the given years, then how many students of institute A received interview calls but were not selected in the given period?",options:["520","770","430","620"],answer:"B"},
      {group:"coaching",q:"If in 2016, 1000 students who attended coaching in the three institutes together received interview calls from B-school 'x', then the students of institute C, who got interview calls but did not get admission form what percentage of students of institute B who did not get admission?",options:["45%","50%","30%","Cannot be determined"],answer:"D"},
      {group:"coaching",q:"Among the students who got admission in B-school 'x' in the given period, what is the ratio of the number of students who attended coaching at institute B, to that at the other two institutes?",options:["47 : 84","47 : 137","45 : 67","47 : 91"],answer:"A"},
      {group:"coaching",q:"How many students who attended coaching at institute B got admission in B-school 'x' in the given period?",options:["460","450","500","470"],answer:"D"},
      {group:"coaching",q:"The number of students who got admission in B-school 'x' in 2014 forms what percentage of the number of students who got admission in 2016?",options:["85.28","83.78%","80.36%","78.29%"],answer:"B"}
    ];
    const groupTemplateIds={vehicles:"vehiclesInfo",staff:"staffInfo",bank:"bankInfo",coaching:"coachingInfo"};
    const form=document.getElementById("testForm"),resultBox=document.getElementById("result"),palette=document.getElementById("palette"),answeredCount=document.getElementById("answeredCount"),time=document.getElementById("time"),calculatorDialog=document.getElementById("calculatorDialog"),calcDisplay=document.getElementById("calcDisplay");
    let submitted=false,secondsLeft=40*60,currentQuestionIndex=0;
    function correctAnswerText(item){if(item.type==="text")return item.answer;const i=optionLabels.indexOf(item.answer);return `(${item.answer}) ${item.options[i]}`}
    function graphHtml(group,index){let html=document.getElementById(groupTemplateIds[group]).innerHTML;const ids=[...html.matchAll(/id="([^"]+)"/g)].map(m=>m[1]);ids.forEach(id=>{const e=id.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),u=`${id}-${index}`;html=html.replace(new RegExp(`id="${e}"`,"g"),`id="${u}"`).replace(new RegExp(`url\\(#${e}\\)`,"g"),`url(#${u})`)});return html}
    function renderQuestions(){form.innerHTML=questions.map((item,index)=>{const control=item.type==="text"?`<input class="text-answer" type="text" name="q${index}" placeholder="Write your answer here">`:`<div class="options">${item.options.map((option,i)=>`<label class="option"><input type="radio" name="q${index}" value="${optionLabels[i]}"><span>(${optionLabels[i]}) ${option}</span></label>`).join("")}</div>`;return `<div class="question" id="qcard-${index}">${graphHtml(item.group,index)}<div class="question-body"><h2>Q${index+1}. ${item.q}</h2>${control}<div class="answer-note" id="note-${index}"></div></div></div>`}).join("")+`<div class="question-nav"><button class="secondary" type="button" id="prevQuestion">Previous</button><button class="secondary" type="button" id="nextQuestion">Save & Next</button></div><div class="actions"><button type="submit" id="submitBtn">Submit Test</button><button class="secondary" type="button" id="clearAnswers">Clear Responses</button></div>`;palette.innerHTML=questions.map((_,i)=>`<button class="dot" type="button" data-target="${i}">${i+1}</button>`).join("");palette.querySelectorAll(".dot").forEach(b=>b.addEventListener("click",()=>showQuestion(Number(b.dataset.target))));form.querySelectorAll("input").forEach(input=>{input.addEventListener("change",updateAnsweredState);input.addEventListener("input",updateAnsweredState)});document.getElementById("prevQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex-1));document.getElementById("nextQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex+1));document.getElementById("clearAnswers").addEventListener("click",()=>{if(submitted)return;form.reset();updateAnsweredState();showQuestion(currentQuestionIndex)});showQuestion(0)}
    function showQuestion(index){if(index<0||index>=questions.length)return;currentQuestionIndex=index;document.querySelectorAll(".question").forEach((card,i)=>card.classList.toggle("active",i===index));palette.querySelectorAll(".dot").forEach((dot,i)=>dot.classList.toggle("active",i===index));const prev=document.getElementById("prevQuestion"),next=document.getElementById("nextQuestion");if(prev)prev.disabled=index===0||submitted;if(next)next.disabled=index===questions.length-1||submitted}
    function getAnswer(index){const item=questions[index];if(item.type==="text")return document.querySelector(`[name="q${index}"]`).value.trim();const selected=document.querySelector(`input[name="q${index}"]:checked`);return selected?selected.value:""}
    function updateAnsweredState(){let answered=0;questions.forEach((_,i)=>{const has=Boolean(getAnswer(i));if(has)answered++;const dot=palette.querySelector(`[data-target="${i}"]`);if(dot)dot.classList.toggle("answered",has)});answeredCount.textContent=answered}
    function updateTimer(){const m=String(Math.floor(secondsLeft/60)).padStart(2,"0"),s=String(secondsLeft%60).padStart(2,"0");time.textContent=`${m}:${s}`;if(secondsLeft<=0){submitTest();return}secondsLeft--}
    function normalize(value){return value.replaceAll(",","").replace(/rs\.?/gi,"").replace(/%$/,"").replace(/\s+/g," ").trim().toLowerCase()}
    function submitTest(event){if(event)event.preventDefault();if(submitted)return;submitted=true;let correct=0,wrong=0,unattempted=0;questions.forEach((item,index)=>{const answer=getAnswer(index),card=document.getElementById(`qcard-${index}`),note=document.getElementById(`note-${index}`),correctText=`Correct answer: ${correctAnswerText(item)}`,isCorrect=item.type==="text"?normalize(answer)===normalize(item.answer):answer===item.answer;document.querySelectorAll(`[name="q${index}"]`).forEach(input=>input.disabled=true);if(!answer){unattempted++;card.classList.add("missed");note.className="answer-note muted";note.textContent=`Unattempted. ${correctText}`}else if(isCorrect){correct++;card.classList.add("correct");note.className="answer-note ok";note.textContent=`Correct. ${correctText}`}else{wrong++;card.classList.add("wrong");note.className="answer-note bad";note.textContent=`Incorrect. ${correctText}`}});resultBox.style.display="block";resultBox.innerHTML=`<h2>Test Summary</h2><div class="score-grid"><div class="score-box">Score<strong>${correct} / ${questions.length}</strong></div><div class="score-box">Correct<strong>${correct}</strong></div><div class="score-box">Wrong<strong>${wrong}</strong></div><div class="score-box">Unattempted<strong>${unattempted}</strong></div></div>`;document.querySelectorAll(".question").forEach(card=>card.classList.add("active"));document.getElementById("prevQuestion").disabled=true;document.getElementById("nextQuestion").disabled=true;document.getElementById("submitBtn").disabled=true;document.getElementById("clearAnswers").disabled=true}
    function appendCalcValue(v){if(calcDisplay.value==="0"||calcDisplay.value==="Error"){calcDisplay.value=v==="."?"0.":v;return}calcDisplay.value+=v}function calculateExpression(){const expression=calcDisplay.value.trim();if(!/^[0-9+\-*/%. ()]+$/.test(expression)){calcDisplay.value="Error";return}try{const value=Function(`"use strict"; return (${expression})`)();calcDisplay.value=Number.isFinite(value)?String(Number(value.toFixed(10))):"Error"}catch{calcDisplay.value="Error"}}
    document.getElementById("openCalculator").addEventListener("click",()=>{calculatorDialog.showModal();if(!calculatorDialog.dataset.moved){calculatorDialog.style.left=`${Math.max(14,(window.innerWidth-calculatorDialog.offsetWidth)/2)}px`;calculatorDialog.style.top="90px";calculatorDialog.style.transform="none"}calcDisplay.focus()});document.getElementById("closeCalculator").addEventListener("click",()=>calculatorDialog.close());document.getElementById("calcKeys").addEventListener("click",event=>{const key=event.target.closest("button");if(!key)return;if(key.dataset.action==="clear")calcDisplay.value="0";else if(key.dataset.action==="backspace")calcDisplay.value=calcDisplay.value.length>1?calcDisplay.value.slice(0,-1):"0";else if(key.dataset.action==="equals")calculateExpression();else if(key.dataset.value)appendCalcValue(key.dataset.value);calcDisplay.focus()});calcDisplay.addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();calculateExpression()}});
    const calculatorHead=calculatorDialog.querySelector(".calculator-head");let calculatorDrag=null;calculatorHead.addEventListener("pointerdown",event=>{if(event.target.closest("button"))return;const rect=calculatorDialog.getBoundingClientRect();calculatorDrag={offsetX:event.clientX-rect.left,offsetY:event.clientY-rect.top};calculatorDialog.style.transform="none";calculatorHead.setPointerCapture(event.pointerId)});calculatorHead.addEventListener("pointermove",event=>{if(!calculatorDrag)return;const maxLeft=window.innerWidth-calculatorDialog.offsetWidth-8,maxTop=window.innerHeight-calculatorDialog.offsetHeight-8;calculatorDialog.style.left=`${Math.min(Math.max(8,event.clientX-calculatorDrag.offsetX),Math.max(8,maxLeft))}px`;calculatorDialog.style.top=`${Math.min(Math.max(8,event.clientY-calculatorDrag.offsetY),Math.max(8,maxTop))}px`;calculatorDialog.dataset.moved="true"});calculatorHead.addEventListener("pointerup",event=>{calculatorDrag=null;calculatorHead.releasePointerCapture(event.pointerId)});calculatorHead.addEventListener("pointercancel",()=>{calculatorDrag=null});
    renderQuestions();updateAnsweredState();updateTimer();const timerId=setInterval(()=>{if(submitted){clearInterval(timerId);return}updateTimer()},1000);form.addEventListener("submit",submitTest);
  </script>
