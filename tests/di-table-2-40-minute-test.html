<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DI Table -2 40 Minute Test</title>
  <style>
    :root{--bg:#f4f7fa;--paper:#fff;--ink:#17202a;--muted:#5d6d7e;--line:#d7dde5;--brand:#4f79c7;--brand-dark:#2f5ca8;--brand-soft:#eef4ff;--ok:#157347;--bad:#b02a37}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
    header{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(20,40,60,.08)}
    .topbar{max-width:1280px;margin:0 auto;padding:14px 18px;display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center}
    h1{margin:0;font-size:22px;color:var(--brand);letter-spacing:0}.meta{color:var(--muted);font-size:14px;margin-top:2px}
    .pill,.calc-open{border:1px solid var(--line);border-radius:6px;background:var(--brand-soft);color:var(--brand-dark);padding:9px 12px;font-weight:700;white-space:nowrap}.calc-open{border-color:var(--brand);background:var(--brand);color:#fff;cursor:pointer}
    main{max-width:1280px;margin:22px auto 40px;padding:0 18px;display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:18px}
    aside,.instructions,.question,#result{background:var(--paper);border:1px solid var(--line);border-radius:8px}
    aside{grid-column:2;grid-row:1;position:sticky;top:86px;align-self:start;padding:14px;min-height:calc(100vh - 112px);max-height:calc(100vh - 112px);overflow-y:auto}
    main>section{grid-column:1;grid-row:1;min-width:0}.panel-title{margin:0 0 12px;color:var(--brand);font-size:17px}
    .palette{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.dot{min-height:44px;border:1px solid var(--line);border-radius:6px;background:#fbfcfd;color:var(--ink);font-weight:700;cursor:pointer}.dot.active{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark)}.dot.answered{background:#eef8f2;border-color:rgba(21,115,71,.4);color:var(--ok)}
    .instructions,#result,.question{padding:16px;margin-bottom:16px}.instructions{color:var(--muted)}#result{display:none}#result h2,.set-info h3{margin:0 0 10px;color:var(--brand);font-size:18px}
    .score-grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px;margin-top:12px}.score-box{border:1px solid var(--line);border-radius:6px;padding:10px;background:#fbfcfd}.score-box strong{display:block;font-size:22px;margin-top:2px}
    .question{display:none}.question.active{display:block}.question h2{margin:0 0 14px;font-size:17px}.set-info{border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:16px;background:#fbfcfd}.set-info p{margin:0 0 10px}
    .table-wrap{overflow-x:auto;margin:12px 0}table{width:100%;border-collapse:collapse;background:#fff;font-size:14px}th,td{border:1px solid #1f2937;padding:6px 8px;text-align:center;vertical-align:middle}th{background:#f1f5f9;font-weight:700}td.left,th.left{text-align:left}
    .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}label.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:6px;padding:10px;cursor:pointer;background:#fbfcfd;min-height:46px}label.option:hover{border-color:#9ab7ca}input[type=radio]{width:18px;height:18px;margin-top:4px;flex:0 0 auto;accent-color:var(--brand)}
    .text-answer{width:min(100%,420px);min-height:44px;border:1px solid var(--line);border-radius:6px;padding:10px 12px;font-size:16px;background:#fbfcfd}
    .question-nav,.actions{display:flex;justify-content:space-between;gap:10px;margin:16px 0 24px;flex-wrap:wrap}button{border:0;border-radius:6px;background:var(--brand);color:white;padding:12px 20px;font-size:16px;font-weight:700;cursor:pointer}button.secondary{background:#e8edf4;color:var(--ink)}button:disabled{opacity:.55;cursor:default}
    .answer-note{margin-top:10px;font-weight:700}.answer-note.ok{color:var(--ok)}.answer-note.bad{color:var(--bad)}.answer-note.muted{color:var(--muted)}.correct{border-color:rgba(21,115,71,.45);background:#eef8f2}.wrong{border-color:rgba(176,42,55,.45);background:#fff1f2}.missed{border-color:rgba(93,109,126,.45);background:#f6f7f9}
    .calculator-dialog{width:min(360px,calc(100vw - 28px));max-width:360px;margin:0;inset:90px auto auto 50%;transform:translateX(-50%);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:0 12px 34px rgba(15,23,42,.2)}.calculator-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;cursor:move;user-select:none}.calculator-head h2{margin:0;color:var(--brand-dark);font-size:18px}.calc-close{border:1px solid var(--line);border-radius:6px;background:#eef2f6;color:var(--ink);width:34px;height:34px;padding:0;font-size:20px;line-height:1;cursor:pointer}.calc-display{width:100%;border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px;background:#fbfcfd;color:var(--ink);font-size:22px;font-weight:700;text-align:right}.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.calc-key{min-height:44px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:var(--ink);font-size:17px;font-weight:700;cursor:pointer}.calc-key.operator{background:var(--brand-soft);color:var(--brand-dark)}.calc-key.equal{background:var(--brand);color:#fff;grid-column:span 2}.calc-key.clear{color:var(--bad)}
    @media(max-width:900px){.topbar{grid-template-columns:1fr}main{grid-template-columns:1fr}aside{grid-column:1;grid-row:2;position:static;min-height:auto;max-height:none}main>section{grid-column:1;grid-row:1}.options,.score-grid{grid-template-columns:1fr}.pill,.calc-open,.question-nav button,.actions button{width:100%}}
  </style>
</head>
<body>
  <header><div class="topbar"><div><h1>DI Table -2</h1><div class="meta">20 Questions | 40 Minutes</div></div><div class="pill">Time Left: <span id="time">40:00</span></div><div class="pill">Answered: <span id="answeredCount">0</span>/20</div><button class="calc-open" type="button" id="openCalculator">Calculator</button></div></header>
  <main><section><section class="instructions">Select one option for MCQs. Type exact answers for numeric questions. Correct answers unlock after submission or when time is over.</section><section id="result"></section><form id="testForm"></form></section><aside><h2 class="panel-title">Question Palette</h2><div class="palette" id="palette"></div></aside></main>

  <template id="growthInfo"><div class="set-info"><h3>Directions for questions 1 to 5</h3><p>These questions are based on the information given below.</p><p><strong>Percentage growth in population of six countries over the previous years</strong></p><div class="table-wrap"><table><thead><tr><th>Country</th><th>2004</th><th>2005</th><th>2006</th><th>2007</th><th>2008</th></tr></thead><tbody><tr><th class="left">India</th><td>10</td><td>15</td><td>18</td><td>20</td><td>23</td></tr><tr><th class="left">China</th><td>8</td><td>10</td><td>15</td><td>18</td><td>21</td></tr><tr><th class="left">Pakistan</th><td>12</td><td>16</td><td>20</td><td>18</td><td>15</td></tr><tr><th class="left">Sri Lanka</th><td>11</td><td>14</td><td>17</td><td>20</td><td>23</td></tr><tr><th class="left">Bangladesh</th><td>15</td><td>18</td><td>21</td><td>25</td><td>30</td></tr><tr><th class="left">Malaysia</th><td>5</td><td>10</td><td>15</td><td>20</td><td>25</td></tr></tbody></table></div></div></template>
  <template id="classesInfo"><div class="set-info"><h3>Directions for questions 6 to 10</h3><p>The following table shows the number of students in classes 8, 9 and 10 in a school. The school started in 2000 and students are admitted only in class 8. At the end of the year the students who pass the final exams get promoted to the next class while the students who fail stay in the same class and are joined by a new bunch of students, who are either promoted (class 9 and 10) or who joined the school new (class 8). All students who pass the class 10 exams pass out of the school.</p><div class="table-wrap"><table><thead><tr><th>Year</th><th>Class 8</th><th>Class 9</th><th>Class 10</th></tr></thead><tbody><tr><th>2000</th><td>45</td><td>-</td><td>-</td></tr><tr><th>2001</th><td>50</td><td>42</td><td>-</td></tr><tr><th>2002</th><td>46</td><td>52</td><td>36</td></tr><tr><th>2003</th><td>54</td><td>46</td><td>45</td></tr><tr><th>2004</th><td>50</td><td>52</td><td>43</td></tr></tbody></table></div><p>No student in class 10 failed in any of the years and no student failed in the same class more than once.</p></div></template>
  <template id="schoolsInfo"><div class="set-info"><h3>Directions for questions 11 to 15</h3><p>The following table gives details about the number of students from schools P, Q, R, S and T who appeared and passed in the public examination during the years 2012 to 2016.</p><div class="table-wrap"><table><thead><tr><th rowspan="2">Year</th><th colspan="2">P</th><th colspan="2">Q</th><th colspan="2">R</th><th colspan="2">S</th><th colspan="2">T</th></tr><tr><th>A</th><th>C</th><th>A</th><th>C</th><th>A</th><th>C</th><th>A</th><th>C</th><th>A</th><th>C</th></tr></thead><tbody><tr><th>2012</th><td>360</td><td>238</td><td>168</td><td>112</td><td>526</td><td>418</td><td>768</td><td>537</td><td>465</td><td>318</td></tr><tr><th>2013</th><td>340</td><td>227</td><td>175</td><td>118</td><td>542</td><td>407</td><td>685</td><td>489</td><td>482</td><td>341</td></tr><tr><th>2014</th><td>245</td><td>150</td><td>196</td><td>131</td><td>583</td><td>437</td><td>723</td><td>512</td><td>511</td><td>347</td></tr><tr><th>2015</th><td>290</td><td>172</td><td>152</td><td>108</td><td>611</td><td>454</td><td>711</td><td>527</td><td>526</td><td>364</td></tr><tr><th>2016</th><td>286</td><td>168</td><td>161</td><td>113</td><td>618</td><td>471</td><td>653</td><td>508</td><td>508</td><td>343</td></tr></tbody></table></div><p><strong>A - appeared</strong> &nbsp;&nbsp; <strong>C - passed</strong></p><p>Pass percentage = Number of students passed / Number of students appeared</p></div></template>
  <template id="financeInfo"><div class="set-info"><h3>Directions for questions 16 to 20</h3><p>The following table gives the price and P/E ratio of a company on the last day of five financial years.</p><div class="table-wrap"><table><thead><tr><th>Year</th><th>Price (Rs)</th><th>P/E ratio</th><th>Market Capitalization (cr)</th></tr></thead><tbody><tr><th>2012</th><td>1280</td><td>14.5</td><td>62,400</td></tr><tr><th>2013</th><td>1351</td><td>14.2</td><td>67,200</td></tr><tr><th>2014</th><td>1090</td><td>11.5</td><td>55,600</td></tr><tr><th>2015</th><td>1465</td><td>13.8</td><td>72,600</td></tr><tr><th>2016</th><td>1380</td><td>13.5</td><td>69,100</td></tr></tbody></table></div><p>P/E ratio = Price of each share / Earnings per share</p><p>Market capitalization = Number of shares x Price of each share.</p></div></template>

  <dialog class="calculator-dialog" id="calculatorDialog"><div class="calculator-head"><h2>Calculator</h2><button class="calc-close" type="button" id="closeCalculator" aria-label="Close calculator">x</button></div><input class="calc-display" id="calcDisplay" type="text" value="0" inputmode="decimal" aria-label="Calculator display"><div class="calc-grid" id="calcKeys"><button class="calc-key clear" type="button" data-action="clear">C</button><button class="calc-key" type="button" data-action="backspace">DEL</button><button class="calc-key operator" type="button" data-value="%">%</button><button class="calc-key operator" type="button" data-value="/">/</button><button class="calc-key" type="button" data-value="7">7</button><button class="calc-key" type="button" data-value="8">8</button><button class="calc-key" type="button" data-value="9">9</button><button class="calc-key operator" type="button" data-value="*">x</button><button class="calc-key" type="button" data-value="4">4</button><button class="calc-key" type="button" data-value="5">5</button><button class="calc-key" type="button" data-value="6">6</button><button class="calc-key operator" type="button" data-value="-">-</button><button class="calc-key" type="button" data-value="1">1</button><button class="calc-key" type="button" data-value="2">2</button><button class="calc-key" type="button" data-value="3">3</button><button class="calc-key operator" type="button" data-value="+">+</button><button class="calc-key" type="button" data-value="0">0</button><button class="calc-key" type="button" data-value=".">.</button><button class="calc-key equal" type="button" data-action="equals">=</button></div></dialog>

  <script>
    const optionLabels=["A","B","C","D"];
    const questions=[
      {group:"growth",q:"In which of the following countries is the percentage growth in population the highest from 2003 to 2007?",options:["Bangladesh","India","Malaysia","Sri Lanka"],answer:"A"},
      {group:"growth",q:"If the ratio of the population of Pakistan and Bangladesh in 2003 was 5 : 3, then what was the population of Bangladesh in 2006, if the population of Pakistan in 2003 was 25 million?",options:["23.46 million","24.62 million","25.81 million","25.52 million"],answer:"B"},
      {group:"growth",q:"If the population of Malaysia in 2008 was 175 million, then the population of Malaysia in 2005 was approximately",options:["97 million","95.5 million","101.5 million","104.5 million"],answer:"C"},
      {group:"growth",q:"By approximately what percentage was the population of India in 2008 more than the population of China in 2005, if both the countries had the same population in 2004?",options:["82","80","84","78"],answer:"A"},
      {group:"growth",q:"The ratio of the population of China and Pakistan in 2007 is approximately.",options:["5 : 2","6 : 8","5 : 11","Cannot be determined"],answer:"D"},
      {group:"classes",q:"How many students joined the school from 2000 to 2004?",options:["218","221","226","232"],answer:"C"},
      {group:"classes",q:"Approximately, what percentage of the students in class 8 in 2002, passed the final exams?",options:["100","90","88","85"],answer:"D"},
      {group:"classes",q:"How many students studying in class 9 in the year 2003, failed in the final exams?",options:["4","3","2","1"],answer:"B"},
      {group:"classes",q:"The total number of students who failed in class 8 from 2000 to 2003 is",options:["12","14","18","None of these"],answer:"D"},
      {group:"classes",q:"What percentage of the students who joined the school from 2000 to 2002, passed out of the school by 2004?",options:["92.5%","90%","94%","95.5%"],answer:"A"},
      {group:"schools",type:"text",q:"In which year was the pass percentage of school Q the highest?",answer:"2015"},
      {group:"schools",type:"text",q:"Which school had the highest pass percentage in the year 2013?",answer:"R"},
      {group:"schools",type:"text",q:"How many more students passed in school S than in school P in the five years together?",answer:"1618"},
      {group:"schools",type:"text",q:"The number of students who passed in the five schools in 2013 is what percentage more/less than that in 2015?",answer:"2.65"},
      {group:"schools",type:"text",q:"In which year was the pass percentage in the five schools together, the highest?",answer:"2013"},
      {group:"finance",q:"What was the approximate earnings per share of the company in 2014?",options:["89","94","88","99"],answer:"B"},
      {group:"finance",q:"What was the percentage increase in the earnings per share of the company in 2013, when compared to the previous year?",options:["7.8%","7.2%","5.9%","8.6%"],answer:"A"},
      {group:"finance",q:"What was the percentage increase in the number of shares of the company from 2012 to 2016?",options:["0.2%","0.8%","1.4%","2.7%"],answer:"D"},
      {group:"finance",q:"What was the percentage increase in the total earnings of the company from 2014 to 2015?",options:["3.2","8.8","12%","20"],answer:"B"},
      {group:"finance",q:"In how many years from 2013 to 2016 was the percentage change in the market capitalization of the company, when compared to the previous year, more than 5%?",options:["1","2","3","4"],answer:"C"}
    ];
    const groupTemplateIds={growth:"growthInfo",classes:"classesInfo",schools:"schoolsInfo",finance:"financeInfo"};
    const form=document.getElementById("testForm"),resultBox=document.getElementById("result"),palette=document.getElementById("palette"),answeredCount=document.getElementById("answeredCount"),time=document.getElementById("time"),calculatorDialog=document.getElementById("calculatorDialog"),calcDisplay=document.getElementById("calcDisplay");
    let submitted=false,secondsLeft=40*60,currentQuestionIndex=0;
    function correctAnswerText(item){if(item.type==="text")return item.answer;const i=optionLabels.indexOf(item.answer);return `(${item.answer}) ${item.options[i]}`}
    function renderQuestions(){form.innerHTML=questions.map((item,index)=>{const control=item.type==="text"?`<input class="text-answer" type="text" name="q${index}" placeholder="Write your answer here">`:`<div class="options">${item.options.map((option,i)=>`<label class="option"><input type="radio" name="q${index}" value="${optionLabels[i]}"><span>(${optionLabels[i]}) ${option}</span></label>`).join("")}</div>`;return `<div class="question" id="qcard-${index}">${document.getElementById(groupTemplateIds[item.group]).innerHTML}<h2>Q${index+1}. ${item.q}</h2>${control}<div class="answer-note" id="note-${index}"></div></div>`}).join("")+`<div class="question-nav"><button class="secondary" type="button" id="prevQuestion">Previous</button><button class="secondary" type="button" id="nextQuestion">Save & Next</button></div><div class="actions"><button type="submit" id="submitBtn">Submit Test</button><button class="secondary" type="button" id="clearAnswers">Clear Responses</button></div>`;
      palette.innerHTML=questions.map((_,i)=>`<button class="dot" type="button" data-target="${i}">${i+1}</button>`).join("");palette.querySelectorAll(".dot").forEach(b=>b.addEventListener("click",()=>showQuestion(Number(b.dataset.target))));form.querySelectorAll("input").forEach(input=>{input.addEventListener("change",updateAnsweredState);input.addEventListener("input",updateAnsweredState)});document.getElementById("prevQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex-1));document.getElementById("nextQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex+1));document.getElementById("clearAnswers").addEventListener("click",()=>{if(submitted)return;form.reset();updateAnsweredState();showQuestion(currentQuestionIndex)});showQuestion(0)}
    function showQuestion(index){if(index<0||index>=questions.length)return;currentQuestionIndex=index;document.querySelectorAll(".question").forEach((card,i)=>card.classList.toggle("active",i===index));palette.querySelectorAll(".dot").forEach((dot,i)=>dot.classList.toggle("active",i===index));const prev=document.getElementById("prevQuestion"),next=document.getElementById("nextQuestion");if(prev)prev.disabled=index===0||submitted;if(next)next.disabled=index===questions.length-1||submitted;window.scrollTo({top:0,behavior:"smooth"})}
    function getAnswer(index){const item=questions[index];if(item.type==="text")return document.querySelector(`[name="q${index}"]`).value.trim();const selected=document.querySelector(`input[name="q${index}"]:checked`);return selected?selected.value:""}
    function updateAnsweredState(){let answered=0;questions.forEach((_,i)=>{const has=Boolean(getAnswer(i));if(has)answered++;const dot=palette.querySelector(`[data-target="${i}"]`);if(dot)dot.classList.toggle("answered",has)});answeredCount.textContent=answered}
    function updateTimer(){const m=String(Math.floor(secondsLeft/60)).padStart(2,"0"),s=String(secondsLeft%60).padStart(2,"0");time.textContent=`${m}:${s}`;if(secondsLeft<=0){submitTest();return}secondsLeft--}
    function normalize(value){return value.replaceAll(",","").replace(/%$/,"").trim().toLowerCase()}
    function submitTest(event){if(event)event.preventDefault();if(submitted)return;submitted=true;let correct=0,wrong=0,unattempted=0;questions.forEach((item,index)=>{const answer=getAnswer(index),card=document.getElementById(`qcard-${index}`),note=document.getElementById(`note-${index}`),correctText=`Correct answer: ${correctAnswerText(item)}`,isCorrect=item.type==="text"?normalize(answer)===normalize(item.answer):answer===item.answer;document.querySelectorAll(`[name="q${index}"]`).forEach(input=>input.disabled=true);if(!answer){unattempted++;card.classList.add("missed");note.className="answer-note muted";note.textContent=`Unattempted. ${correctText}`}else if(isCorrect){correct++;card.classList.add("correct");note.className="answer-note ok";note.textContent=`Correct. ${correctText}`}else{wrong++;card.classList.add("wrong");note.className="answer-note bad";note.textContent=`Incorrect. ${correctText}`}});resultBox.style.display="block";resultBox.innerHTML=`<h2>Test Summary</h2><div class="score-grid"><div class="score-box">Score<strong>${correct} / ${questions.length}</strong></div><div class="score-box">Correct<strong>${correct}</strong></div><div class="score-box">Wrong<strong>${wrong}</strong></div><div class="score-box">Unattempted<strong>${unattempted}</strong></div></div>`;document.querySelectorAll(".question").forEach(card=>card.classList.add("active"));document.getElementById("prevQuestion").disabled=true;document.getElementById("nextQuestion").disabled=true;document.getElementById("submitBtn").disabled=true;document.getElementById("clearAnswers").disabled=true;window.scrollTo({top:0,behavior:"smooth"})}
    function appendCalcValue(v){if(calcDisplay.value==="0"||calcDisplay.value==="Error"){calcDisplay.value=v==="."?"0.":v;return}calcDisplay.value+=v}function calculateExpression(){const expression=calcDisplay.value.trim();if(!/^[0-9+\-*/%. ()]+$/.test(expression)){calcDisplay.value="Error";return}try{const value=Function(`"use strict"; return (${expression})`)();calcDisplay.value=Number.isFinite(value)?String(Number(value.toFixed(10))):"Error"}catch{calcDisplay.value="Error"}}
    document.getElementById("openCalculator").addEventListener("click",()=>{calculatorDialog.showModal();if(!calculatorDialog.dataset.moved){calculatorDialog.style.left=`${Math.max(14,(window.innerWidth-calculatorDialog.offsetWidth)/2)}px`;calculatorDialog.style.top="90px";calculatorDialog.style.transform="none"}calcDisplay.focus()});document.getElementById("closeCalculator").addEventListener("click",()=>calculatorDialog.close());document.getElementById("calcKeys").addEventListener("click",event=>{const key=event.target.closest("button");if(!key)return;if(key.dataset.action==="clear")calcDisplay.value="0";else if(key.dataset.action==="backspace")calcDisplay.value=calcDisplay.value.length>1?calcDisplay.value.slice(0,-1):"0";else if(key.dataset.action==="equals")calculateExpression();else if(key.dataset.value)appendCalcValue(key.dataset.value);calcDisplay.focus()});calcDisplay.addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();calculateExpression()}});
    const calculatorHead=calculatorDialog.querySelector(".calculator-head");let calculatorDrag=null;calculatorHead.addEventListener("pointerdown",event=>{if(event.target.closest("button"))return;const rect=calculatorDialog.getBoundingClientRect();calculatorDrag={offsetX:event.clientX-rect.left,offsetY:event.clientY-rect.top};calculatorDialog.style.transform="none";calculatorHead.setPointerCapture(event.pointerId)});calculatorHead.addEventListener("pointermove",event=>{if(!calculatorDrag)return;const maxLeft=window.innerWidth-calculatorDialog.offsetWidth-8,maxTop=window.innerHeight-calculatorDialog.offsetHeight-8;calculatorDialog.style.left=`${Math.min(Math.max(8,event.clientX-calculatorDrag.offsetX),Math.max(8,maxLeft))}px`;calculatorDialog.style.top=`${Math.min(Math.max(8,event.clientY-calculatorDrag.offsetY),Math.max(8,maxTop))}px`;calculatorDialog.dataset.moved="true"});calculatorHead.addEventListener("pointerup",event=>{calculatorDrag=null;calculatorHead.releasePointerCapture(event.pointerId)});calculatorHead.addEventListener("pointercancel",()=>{calculatorDrag=null});
    renderQuestions();updateAnsweredState();updateTimer();const timerId=setInterval(()=>{if(submitted){clearInterval(timerId);return}updateTimer()},1000);form.addEventListener("submit",submitTest);
  </script>
</body>
</html>
