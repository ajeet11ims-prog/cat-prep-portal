<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DILR - Games &amp; Tournaments -2</title>
  <style>
    :root{--brand:#0f4c81;--brand-dark:#0a3357;--line:#c9d3df;--ink:#111827;--muted:#6b7280;--ok:#157347;--bad:#b02a37}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:#eef2f6;line-height:1.45}
    header{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px}
    .topbar{width:100%;display:flex;align-items:center;gap:14px}
    .topbar h1{font-size:20px;margin:0;color:var(--brand-dark);letter-spacing:0}
    .meta{font-size:13px;color:var(--muted);margin-top:3px}
    .pill{margin-left:auto;border:1px solid var(--line);border-radius:6px;padding:8px 12px;background:#f8fafc;font-weight:700}
    .pill+.pill{margin-left:0}
    main{height:calc(100vh - 64px);display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:10px;padding:10px}
    main>section,aside{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:0;overflow:hidden}
    #testForm{height:100%;display:grid;grid-template-rows:minmax(0,1fr) auto auto;overflow:hidden}
    #result,.question{padding:12px}
    #result{display:none}
    .question{display:none}
    .question.active{display:grid;grid-template-columns:minmax(0,1.12fr) minmax(380px,.88fr);gap:10px;height:100%;min-height:0}
    .question h2{margin:0 0 12px;font-size:17px;line-height:1.32}
    .set-info,.question-body{border:1px solid var(--line);border-radius:8px;background:#fff;min-height:0;height:100%;overflow:auto}
    .set-info{padding:16px;font-size:17px;font-weight:700;line-height:1.5}
    .question-body{padding:14px}
    .set-title{font-weight:800;font-style:italic;margin:0 0 10px;color:var(--brand-dark)}
    .set-heading{font-family:Georgia,serif;font-size:28px;font-weight:700;margin:0 0 14px;letter-spacing:.5px}
    p{margin:0 0 10px}
    .stats-wrap{display:grid;grid-template-columns:1fr 1.1fr;gap:16px;margin:12px 0}
    .wide-table-wrap{overflow:auto;margin:14px 0}
    .ranking-table{min-width:980px}
    .ranking-table th,.ranking-table td{font-size:15px;padding:5px 6px}
    .compact-table{max-width:660px;margin:14px auto}
    table{border-collapse:collapse;width:100%;background:#fff}
    th,td{border:2px solid #111;padding:6px 8px;text-align:center;font-size:16px;font-weight:700}
    th:first-child,td:first-child{text-align:left}
    .note{font-weight:700;margin-top:12px}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label.option{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--line);border-radius:6px;padding:10px;background:#fbfcfd;cursor:pointer;font-size:16px;min-height:42px}
    label.option:hover{border-color:#9ab7ca}
    input[type=radio]{width:17px;height:17px;margin-top:3px;accent-color:var(--brand);flex:0 0 auto}
    .text-answer{width:160px;border:2px solid #111;border-radius:0;padding:11px 12px;font-size:20px}
    .question-nav,.actions{display:flex;justify-content:space-between;gap:10px;margin:8px 12px 0;flex-wrap:wrap}
    button{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer}
    button.secondary{background:#e8edf4;color:var(--ink)}
    button:disabled{opacity:.55;cursor:default}
    aside{padding:14px;overflow:auto}
    .panel-title{font-size:17px;margin:0 0 12px;color:var(--brand-dark)}
    .palette{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .dot{height:38px;border-radius:6px;border:1px solid var(--line);background:#f8fafc;color:var(--ink);font-weight:700}
    .dot.active{background:var(--brand);color:#fff}
    .dot.answered{border-color:var(--ok);box-shadow:inset 0 -4px 0 rgba(21,115,71,.4)}
    .score-grid{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:9px;margin-top:12px}
    .score-box{border:1px solid var(--line);border-radius:6px;padding:9px;background:#fbfcfd}
    .score-box strong{display:block;font-size:22px}
    .answer-note{margin-top:12px;font-weight:700}
    .answer-note.ok{color:var(--ok)}
    .answer-note.bad{color:var(--bad)}
    .answer-note.muted{color:var(--muted)}
    .correct{background:#eef8f2}
    .wrong{background:#fff1f2}
    .missed{background:#f6f7f9}
    @media (max-width:900px){
      header{height:auto;min-height:64px}.topbar{flex-wrap:wrap;padding:10px 0}.pill{margin-left:0}
      main{height:auto;display:block}.question.active{display:block}.set-info,.question-body{height:auto;max-height:none;margin-bottom:10px}
      aside{margin-top:10px}.options,.stats-wrap{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div><h1>DILR - Games &amp; Tournaments -2</h1><div class="meta">20 Questions | 40 Minutes</div></div>
      <div class="pill">Time Left: <span id="time">40:00</span></div>
      <div class="pill">Answered: <span id="answeredCount">0</span>/20</div>
    </div>
  </header>
  <main>
    <section><section id="result"></section><form id="testForm"></form></section>
    <aside><h2 class="panel-title">Question Palette</h2><div class="palette" id="palette"></div></aside>
  </main>
  <script>
    const optionLabels=["A","B","C","D"];
    const sets={
      1:`<p class="set-title">Directions for questions 1 to 5: These questions are based on the information given below.</p><p>Teams from six countries participated in the Ice Hockey world championship. Every team plays every other team once. A team is awarded 3 points for a win, no points for a loss and 1 point for a draw. Teams are ranked on the basis of their total points and in the case of a tie, the result of the match between the teams that tied is used to determine their rank. Both Russia and Czech Republic scored 7 points each, while the match they played did not end in a draw. Sweden topped the tournament with 15 points. It is also known that Finland defeated Czech Republic when the two played, and that Canada got 4 points overall whereas the United States lost all the matches.</p>`,
      2:`<p>ICC's top - 8 test Cricket teams played in ICC Test Champions Tournament. Each team plays a match against every other team and the teams are awarded 2 points for a win, 1 point for a draw and no points for a loss. In the end, the team with the highest total points is declared the winner, the next one second and so on. In case two or more teams are tied for a position, the outcomes of the matches played by them earlier serve as the tie-breaker, with the winner being ranked higher. The table given below gives partial information about the points scored in the matches played in the tournament.</p><div class="wide-table-wrap"><table class="ranking-table"><tr><th colspan="2">ICC Ranks</th><th>South Africa</th><th>India</th><th>Australia</th><th>England</th><th>Pakistan</th><th>Sri Lanka</th><th>West Indies</th><th>New Zealand</th><th>Total</th></tr><tr><td>1</td><td>South Africa</td><td></td><td>2</td><td></td><td>2</td><td></td><td>2</td><td>2</td><td>1</td><td></td></tr><tr><td>2</td><td>India</td><td></td><td></td><td>2</td><td>2</td><td></td><td>2</td><td>0</td><td></td><td></td></tr><tr><td>3</td><td>Australia</td><td>1</td><td></td><td></td><td></td><td>2</td><td>2</td><td>1</td><td>2</td><td></td></tr><tr><td>4</td><td>England</td><td></td><td></td><td>1</td><td></td><td>2</td><td></td><td>1</td><td>2</td><td></td></tr><tr><td>5</td><td>Pakistan</td><td>0</td><td>1</td><td></td><td>0</td><td></td><td>2</td><td>1</td><td></td><td></td></tr><tr><td>6</td><td>Sri Lanka</td><td></td><td></td><td></td><td>2</td><td></td><td></td><td>2</td><td></td><td></td></tr><tr><td>7</td><td>West Indies</td><td>0</td><td></td><td>1</td><td>1</td><td>1</td><td></td><td></td><td></td><td></td></tr><tr><td>8</td><td>New Zealand</td><td>1</td><td></td><td>0</td><td></td><td></td><td>2</td><td></td><td></td><td></td></tr></table></div><p>It is also known that:<br>(i) The number of matches won by West Indies is not less than those won by New Zealand.<br>(ii) The match between India and New Zealand did not end in India's favour.<br>(iii) New Zealand had the same number of points as exactly one other team and India was not ranked third in the final ranking.</p>`,
      3:`<p class="set-title">Directions for questions 11 to 15: These questions are based on the information given below.</p><p>The 32 players who took part in the world match play golf tournament were seeded from 1 to 32. The tournament was to be played in a knock out format in five rounds - first round, second round, quarter-finals, semi-finals and the finals. The matches were scheduled such that in any round, in case of no upset, i.e., a lower seeded player beating a higher seeded player, the highest seeded player would play the lowest seeded player left, the second highest seeded player would play the second lowest seeded player left and so on. In case of an upset, the player who caused the upset would take the designated place of the player whom he had upset, without any change in the seedings.</p>`,
      4:`<p>Six teams - Brazil, Argentina, Germany, France, Italy and Portugal - participated in the 'Super Six', Football Tournament held in Brazil. The tournament comprised five rounds, such that every team played exactly one match in every round and by the end of the five rounds, every team played exactly one match with every other team. For every win, a team got 5 points. If the team won by a margin of 2 or more goals, it got another bonus point. For a draw, the team got 2 points and for a loss, it did not get any points. However, if a team lost by a margin of 2 or more goals, a point was deducted.</p><p>The following table gives the tally of the goals scored, goals conceded and the points earned by the teams after the first two rounds of the tournament.</p><table class="compact-table"><tr><th>Team</th><th>Goals Scored</th><th>Goals Conceded</th><th>Total Points earned</th></tr><tr><td>Brazil</td><td>3</td><td>4</td><td>5</td></tr><tr><td>Argentina</td><td>6</td><td>2</td><td>11</td></tr><tr><td>Germany</td><td>3</td><td>5</td><td>0</td></tr><tr><td>France</td><td>2</td><td>3</td><td>2</td></tr><tr><td>Italy</td><td>2</td><td>1</td><td>7</td></tr><tr><td>Portugal</td><td>4</td><td>5</td><td>4</td></tr></table><p>It is also known that the hosts, Brazil, lost their first round match. However, they scored at least one goal in every match that they played.</p>`
    };
    const questions=[
      {set:1,type:"mcq",q:"Which team was ranked fourth in the tournament?",options:["Finland","Russia","Canada","Czech Republic"],answer:"B"},
      {set:1,type:"text",q:"<em>Directions for questions 2 to 5: Type in your answer in the input box provided below the question.</em><br><br>How many points did Finland score overall?",answer:"10"},
      {set:1,type:"text",q:"What were the total points scored by all the teams together?",answer:"43"},
      {set:1,type:"text",q:"How many matches definitely ended in a draw?",answer:"2"},
      {set:1,type:"text",q:"The teams, which had the same number of points, defeated how many teams in common?",answer:"1"},
      {set:2,type:"mcq",q:"How many matches ended in a draw?",options:["8","7","6","Cannot be determined"],answer:"A"},
      {set:2,type:"mcq",q:"An upset is said to happen every time a team lower in the ICC rankings, beats a higher ranked team. How many upsets happened in the tournament?",options:["3","4","2","zero"],answer:"B"},
      {set:2,type:"mcq",q:"Which team has the second lowest total points at the end of the tournament?",options:["New Zealand","India","Pakistan","Sri Lanka"],answer:"C"},
      {set:2,type:"mcq",q:"How many teams retained the same rank in the ICC Test rankings as well as the final tournament rankings?",options:["None","One","Two","Cannot be determined"],answer:"B"},
      {set:2,type:"mcq",q:"Which of the following statements can be true?<br>(i) The India - New Zealand match ended in a draw.<br>(ii) The Pakistan - New Zealand match ended in a draw.<br>(iii) Australia won two matches more than Pakistan.<br>(iv) West Indies drew four matches.",options:["(i), (ii), (iv)","(ii), (iii), (iv)","(iii), (iv)","(ii), (iii)"],answer:"D"},
      {set:3,type:"mcq",q:"The lowest seeded player who can win the tournament without himself causing an upset is",options:["32","26","24","16"],answer:"D"},
      {set:3,type:"mcq",q:"If it was known that the player seeded 9 won the tournament, which of the following seeded players could have reached the finals?",options:["seed 8","seed 4","seed 3","seed 1"],answer:"C"},
      {set:3,type:"mcq",q:"What was the minimum number of upsets in the tournament if it was known that the player seeded 25 reached the finals?",options:["2","3","4","5"],answer:"C"},
      {set:3,type:"mcq",q:"If it was known that the winner of the tournament had caused only a single upset, his seeding was at most",options:["32","16","24","17"],answer:"C"},
      {set:3,type:"mcq",q:"Had there been only one upset in the tournament, then what is the earliest stage at which seed 2 could have been eliminated?",options:["Finals","Semi-finals","2nd round","1st round"],answer:"D"},
      {set:4,type:"mcq",q:"Which of the following statements is/are true of the two matches played by Brazil?<br>I. It won a match and lost a match without gaining or conceding bonus points in either match.<br>II. It won a match by gaining a bonus point and lost a match by conceding a bonus point.<br>III. It lost its first round match to Argentina by 1 goal to 4 goals.",options:["Only I and III","Only I","Only II and III","Only III"],answer:"C"},
      {set:4,type:"mcq",q:"Which of the following statements is/are true?<br>I. Portugal lost its second round match to Brazil by conceding a bonus point.<br>II. Portugal, in its first round match, played against neither France nor Italy but scored 4 goals.<br>III. Argentina played against France in its second round match.",options:["Only II","Only II and III","Only I and II","All the three statements"],answer:"D"},
      {set:4,type:"mcq",q:"What is the number of goals scored by France in its first round match?",options:["0","1","2","0 or 1"],answer:"B"},
      {set:4,type:"mcq",q:"By the end of the first round, which of the following teams is in the last position in terms of the points scored?",options:["Germany","France","Portugal","Brazil"],answer:"D"},
      {set:4,type:"mcq",q:"If Goal difference = goals scored - goals conceded, then what was the goal difference for Argentina in its match with Brazil?",options:["1","2","3","4"],answer:"C"}
    ];
    const form=document.getElementById("testForm"),resultBox=document.getElementById("result"),palette=document.getElementById("palette"),answeredCount=document.getElementById("answeredCount"),time=document.getElementById("time");
    let submitted=false,secondsLeft=40*60,currentQuestionIndex=0;
    function correctAnswerText(item){return item.type==="text"?item.answer:`(${item.answer}) ${item.options[optionLabels.indexOf(item.answer)]}`}
    function renderQuestions(){
      form.innerHTML=questions.map((item,index)=>{
        const control=item.type==="text"?`<input class="text-answer" name="q${index}" autocomplete="off" inputmode="numeric">`:`<div class="options">${item.options.map((o,i)=>`<label class="option"><input type="radio" name="q${index}" value="${optionLabels[i]}"><span>(${optionLabels[i]}) ${o}</span></label>`).join("")}</div>`;
        return `<div class="question" id="qcard-${index}"><div class="set-info">${sets[item.set]}</div><div class="question-body"><h2>Q${index+1}. ${item.q}</h2>${control}<div class="answer-note" id="note-${index}"></div></div></div>`;
      }).join("")+`<div class="question-nav"><button class="secondary" type="button" id="prevQuestion">Previous</button><button class="secondary" type="button" id="nextQuestion">Save & Next</button></div><div class="actions"><button type="submit" id="submitBtn">Submit Test</button><button class="secondary" type="button" id="clearAnswers">Clear Responses</button></div>`;
      palette.innerHTML=questions.map((_,i)=>`<button class="dot" type="button" data-target="${i}">${i+1}</button>`).join("");
      palette.querySelectorAll(".dot").forEach(b=>b.addEventListener("click",()=>showQuestion(Number(b.dataset.target))));
      form.querySelectorAll("input").forEach(input=>{input.addEventListener("change",updateAnsweredState);input.addEventListener("input",updateAnsweredState)});
      document.getElementById("prevQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex-1));
      document.getElementById("nextQuestion").addEventListener("click",()=>showQuestion(currentQuestionIndex+1));
      document.getElementById("clearAnswers").addEventListener("click",()=>{if(submitted)return;form.reset();updateAnsweredState();showQuestion(currentQuestionIndex)});
      showQuestion(0);
    }
    function showQuestion(i){if(i<0||i>=questions.length)return;currentQuestionIndex=i;document.querySelectorAll(".question").forEach((c,n)=>c.classList.toggle("active",n===i));palette.querySelectorAll(".dot").forEach((d,n)=>d.classList.toggle("active",n===i));document.getElementById("prevQuestion").disabled=i===0||submitted;document.getElementById("nextQuestion").disabled=i===questions.length-1||submitted}
    function getAnswer(i){const item=questions[i];if(item.type==="text"){const el=document.querySelector(`[name="q${i}"]`);return el?el.value.trim():""}const s=document.querySelector(`input[name="q${i}"]:checked`);return s?s.value:""}
    function norm(v){return String(v).replace(/,/g,"").trim().toLowerCase()}
    function updateAnsweredState(){let a=0;questions.forEach((_,i)=>{const has=!!getAnswer(i);if(has)a++;const dot=palette.querySelector(`[data-target="${i}"]`);if(dot)dot.classList.toggle("answered",has)});answeredCount.textContent=a}
    function updateTimer(){const m=String(Math.floor(secondsLeft/60)).padStart(2,"0"),s=String(secondsLeft%60).padStart(2,"0");time.textContent=`${m}:${s}`;if(secondsLeft<=0){submitTest();return}secondsLeft--}
    function submitTest(e){
      if(e)e.preventDefault();if(submitted)return;submitted=true;let c=0,w=0,u=0;
      questions.forEach((item,i)=>{const ans=getAnswer(i),card=document.getElementById(`qcard-${i}`),note=document.getElementById(`note-${i}`),ok=item.type==="text"?norm(ans)===norm(item.answer):ans===item.answer;document.querySelectorAll(`[name="q${i}"]`).forEach(x=>x.disabled=true);if(!ans){u++;card.classList.add("missed");note.className="answer-note muted";note.textContent=`Unattempted. Correct answer: ${correctAnswerText(item)}`}else if(ok){c++;card.classList.add("correct");note.className="answer-note ok";note.textContent=`Correct. Correct answer: ${correctAnswerText(item)}`}else{w++;card.classList.add("wrong");note.className="answer-note bad";note.textContent=`Incorrect. Correct answer: ${correctAnswerText(item)}`}});
      resultBox.style.display="block";resultBox.innerHTML=`<h2>Test Summary</h2><div class="score-grid"><div class="score-box">Score<strong>${c} / ${questions.length}</strong></div><div class="score-box">Correct<strong>${c}</strong></div><div class="score-box">Wrong<strong>${w}</strong></div><div class="score-box">Unattempted<strong>${u}</strong></div></div>`;
      document.querySelectorAll(".question").forEach(x=>x.classList.add("active"));["prevQuestion","nextQuestion","submitBtn","clearAnswers"].forEach(id=>document.getElementById(id).disabled=true);
    }
    renderQuestions();updateAnsweredState();updateTimer();const timerId=setInterval(()=>{if(submitted){clearInterval(timerId);return}updateTimer()},1000);form.addEventListener("submit",submitTest);
  </script>
</body>
</html>
