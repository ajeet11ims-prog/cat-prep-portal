    *{box-sizing:border-box} html,body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;overflow:hidden} img{max-width:100%;height:auto}
    header{height:84px;background:#f3f5f7;border-bottom:1px solid #9eadb9;box-shadow:none}.topbar{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 62px 300px;align-items:stretch;padding:0}.title{background:var(--brand-dark);color:#fff;padding:10px 18px;display:flex;flex-direction:column;justify-content:center}.title h1{font-size:22px;line-height:1.1;margin:0;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:15px;color:#dce9ef;margin-top:6px}.timer{align-self:stretch;display:grid;place-items:center;text-align:center;background:#fff;color:#111;border-left:1px solid #9eadb9;font-weight:700;font-size:18px}.timer span{font-size:22px;color:#111}
    main{height:calc(100vh - 84px);display:grid;grid-template-columns:minmax(0,1fr) 300px;grid-template-rows:minmax(0,1fr);gap:0;margin:0;padding:0;background:#fff;position:relative}main>section{grid-column:1;grid-row:1;min-width:0;min-height:0;border-right:2px solid #41515c}main>aside:first-child{grid-column:2;grid-row:1}.panel,.question-card,#result{background:var(--paper);border:0;border-radius:0}.panel{padding:14px;align-self:stretch;position:static;background:#e5f6fc}.question-palette-panel{display:flex;flex-direction:column;overflow:auto}.calc-wrap{position:fixed!important;top:120px;left:52%;width:264px;z-index:50;border:1px solid #7c8991;box-shadow:0 7px 18px rgba(0,0,0,.28);display:none;padding:0;align-self:auto;background:#eee}.calc-wrap.open{display:block}.panel h2{font-size:18px;margin:0 -14px 14px;padding:10px 14px;background:var(--brand-mid);color:#fff;font-weight:700}.side-submit{margin-top:auto;align-self:center;width:124px;height:42px;border:0;border-radius:2px;background:#7fd7f2;color:#fff;font-weight:700;font-size:16px;cursor:pointer}

157347}.bad{color:#b02a37}.muted{color:var(--muted)}#result{display:none;padding:16px;margin:0;border-bottom:1px solid var(--line)}.score-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}.score-box{border:1px solid var(--line);border-radius:2px;padding:10px;background:#fbfcfd;font-size:16px}.score-box strong{display:block;font-size:24px;margin-top:2px}
    .calc{padding:9px;background:#eee}.calc-title{display:flex;align-items:center;justify-content:space-between;background:#4a8fd0;color:#fff;font-size:17px;font-weight:700;margin:-9px -9px 9px;padding:8px 9px;cursor:grab;user-select:none;touch-action:none}.calc-title:active{cursor:grabbing}.calc-title-actions{display:flex;align-items:center;gap:8px}.calc-min{line-height:1;font-size:23px;font-weight:800}.calc-close{width:27px;height:27px;border:0;background:#4a8fd0;color:#fff;border-radius:2px;cursor:pointer;font-weight:800;font-size:26px;line-height:24px}.calc-toggle{align-self:center;justify-self:center;width:34px;height:34px;border:1px solid #d89c29;background:#f9c35b;color:#774d00;border-radius:2px;cursor:pointer;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}.calc-toggle svg{width:18px;height:18px;display:block;flex:0 0 auto}.calc-display{width:100%;height:39px;border:1px solid #b6b6b6;border-radius:1px;padding:6px;text-align:right;font-size:20px;margin-bottom:8px;background:#fff}.calc-subdisplay{height:27px;background:#fff;border:1px solid #d0d0d0;border-top:0;text-align:right;padding:2px 8px;font-size:18px;color:#666;margin:-8px 0 8px}.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.calc-grid button{height:33px;border:1px solid #bababa;border-radius:4px;background:linear-gradient(#fff,#e7e7e7);font-weight:700;cursor:pointer;font-size:15px;color:#555;padding:0}.calc-grid button.op{background:#e9edf2;color:#555}.calc-grid button.red{background:#e35d4f;color:#fff;border-color:#c94a3d}.calc-grid button.eq{grid-row:span 2;height:71px;background:#21c987;color:#fff;border-color:#19a66f}.calc-help{display:none}
    @media(max-width:980px){html,body{overflow:auto}header{height:auto}.topbar{grid-template-columns:1fr 62px 1fr}.title h1{white-space:normal}main{height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto}.panel,main>section,main>aside:first-child{grid-column:1;grid-row:auto;position:static}.calc-wrap{top:90px;left:12px;right:auto}.qbar{grid-template-columns:repeat(8,1fr)}.question-card{height:auto;min-height:70vh;padding-bottom:16px}.navrow{position:static;right:auto}.score-grid{grid-template-columns:1fr 1fr}}

  <script>
    const questions = [{"no":1,"source":"CAT 2024 QA Slot 1","question":"In September, the incomes of Kamal, Amal and Vimal are in the ratio 8 ∶ 6 ∶ 5. They rent a house together, and Kamal pays 15%, Amal pays 12% and Vimal pays 18% of their respective incomes to cover the total house rent in that month. In October, the house rent remains unchanged while their incomes increase by 10%, 12% and 15%, respectively. In October, the percentage of their total income that will be paid as house rent, is nearest to","type":"mcq","options":["12.75","14.84","15.18","13.26"],"answer":3,"accepted":[],"solution":"Answer: 3"},{"no":2,"source":"CAT 2024 QA Slot 2","question":"A fruit seller has a stock of mangoes, bananas and apples with at least one fruit of each type. At the beginning of a day, the number of mangoes make up 40% of his stock. That day, he sells half of the mangoes, 96 bananas and 40% of the apples. At the end of the day, he ends up selling 50% of the fruits. The smallest possible total number of fruits in the stock at the beginning of the day is","type":"text","options":[],"answer":"340","accepted":["340","340","340","340"],"solution":"Answer: 340"},{"no":3,"source":"CAT 2023 QA Slot 1","question":"The salaries of three friends Sita, Gita and Mita are initially in the ratio 5 : 6 : 7, respectively. In the first year, they get salary hikes of 20%, 25% and 20%, respectively. In the second year, Sita and Mita get salary hikes of 40% and 25%, respectively, and the salary of Gita becomes equal to the mean salary of the three friends. The salary hike of Gita in the second year is","type":"mcq","options":["26%","25%","30%","28%"],"answer":0,"accepted":[],"solution":"Let the initial salaries of A, B and C be 5x, 6x and 7x respectively.\nSalary of A increases by 20% and then by 40%.\n∴ Salary of A after 2 years = 5x × 1.2 × 1.4 = 8.4x\nSalary of C increases by 20% and then by 25%.\n∴ Salary of C after 2 years = 7x × 1.2 × 1.25 = 10.5x\nAt the end of 2 years, B\u0027s salary is average of all three, hence B\u0027s salary will also be average of salaries of A and C.\n⇒ Salary of B after 2 years = (8.4x + 10.5x)/2 = 9.45\nLet the % increase in B\u0027s salary be P% in 2 nd year. Increase in first year is 25%.\n⇒ 9.45x = 6x × 1.25 × (1 + P/100)\n⇒ (1 + P/100) = 9.45/7.5 = 1.26\n⇒ P = 26%\nHence, option (a)."},{"no":4,"source":"CAT 2023 QA Slot 3","question":"The population of a town in 2020 was 100000. The population decreased by y% from the year 2020 to 2021, and increased by x% from the year 2021 to 2022, where x and y are two natural numbers. If population in 2022 was greater than the population in 2020 and the difference between x and y is 10, then the lowest possible population of the town in 2021 was","type":"mcq","options":["73000","72000","75000","74000"],"answer":0,"accepted":[],"solution":"Population at the end of 2021 = 1,00,000 × (1 - x/100)\nPopulation at the end of 2022 = 1,00,000 × (1 - y/100) × (1 + x/100) ...(1)\n∴ Overall % change = -y + x + (-y × x)/100 [ using formula = a + b + ab/100]\nSince population in 2022 is greater than that in 2020\n⇒ x \u003e y.\n∴ x = y + 10\nHence, the population decreases by y% and then increases by (y + 10)%\n∴ Overall % change = -y + (y + 10) + (-y × (y + 10))/100 = 10 - y(y + 10)/100 [ using formula = a + b + ab/100]\nOverall change should be positive\n∴ Overall % change = 10 - y(y + 10)/100 \u003e 0\n⇒ y(y + 10) \u003c 1000\nHigheset value of y satisfying the above inequality is 27.\n∴ The population will decrease by a maximum of 27%.\n⇒ Least population in 2021 = 1,00,000 × (1 - 27%) = 73,000.\nHence, option (a)."},{"no":5,"source":"CAT 2023 QA Slot 3","question":"A fruit seller has a stock of mangoes, bananas and apples with at least one fruit of each type. At the beginning of a day, the number of mangoes make up 40% of his stock. That day, he sells half of the mangoes, 96 bananas and 40% of the apples. At the end of the day, he ends up selling 50% of the fruits. The smallest possible total number of fruits in the stock at the beginning of the day is","type":"text","options":[],"answer":"340","accepted":["340","340","340","340"],"solution":"Let total number of fruits at the beginning of the day = 5x\n∴ Number of mangoes = 40% of 5x = 2x\nLet the number of apples be \u00275a\u0027, hence the number of bananas = 5x - 5a.\n⇒ He sells 50% of 2x mangoes, 96 bananas and 40% of 5a apples i.e., x + 96 + 2a fruits.\nAlso, he sold 50% of his fruits\n⇒ x + 96 + 2a = 50% of 5x = 2.5x\n⇒ 1.5x = 96 + 2a\n⇒ x = 64 + 4a/3\n⇒ 5x = 320 + 20a/3\nTo minimise 5x, we need to minimise 2aa/3.\nMinimum integral value of 20a/3 will be 20 when a = 3.\n∴ 5x = 320 + 20 = 340\nHence, 340."},{"no":6,"source":"CAT 2022 QA Slot 2","question":"In an election, there were four candidates and 80% of the registered voters casted their votes. One of the candidates received 30% of the casted votes while the other three candidates received the remaining casted votes in the proportion 1 : 2 : 3. If the winner of the election received 2512 votes more than the candidate with the second highest votes, then the number of registered voters was:","type":"mcq","options":["60288","50240","40192","62800"],"answer":3,"accepted":[],"solution":"Let the total number of registered voters be 100x.\nNumber of votes casted = 80x\nVotes for Candidate 1 = 30% of 80x = 24x\n∴ Remaining three candidates will recieve = 80x - 24x = 56x votes.\nRemaining 3 candidates get votes in the ratio of 1 : 2 : 3 of the remaining 56x votes.\n⇒ Votes of Candidate 2 = 1 6 × 56x = 28 x 3\n⇒ Votes of Candidate 3 = 2 6 × 56x = 56 x 3\n⇒ Votes of Candidate 4 = 3 6 × 56x = 28x\nHighest number of votes is received by Candidate 4 while second highest is by Candidate 1.\n⇒ 28x – 24x = 2512\n⇒ x = 2512/4 = 628\n∴ total number of registered votes = 100x = 62800\nHence, option (d)."},{"no":7,"source":"CAT 2021 QA Slot 1","question":"Identical chocolate pieces are sold in boxes of two sizes, small and large. The large box is sold for twice the price of the small box. If the selling price per gram of chocolate in the large box is 12% less than that in the small box, then the percentage by which the weight of chocolate in the large box exceeds that in the small box is nearest to","type":"mcq","options":["127","135","144","124"],"answer":0,"accepted":[],"solution":"Let the weight and price of small box is ‘w’ and ‘p’ respectively.\n∴ Selling price per gram for small box = p/w\nNow, selling price per gram for large box = 0.88p/w\nAlso, selling price for the whole box = 2p.\n⇒ Weight of the large box = 2 p 0 . 88 p / w = 2 w 0 . 88 = 25 w 11\n∴ Required percentage = 25 11 w - w w × 100 = 14/11 × 100 ≈ 127%\nHence, option (a)."},{"no":8,"source":"CAT 2021 QA Slot 2","question":"Raj invested ₹ 10000 in a fund. At the end of first year, he incurred a loss but his balance was more than ₹ 5000. This balance, when invested for another year, grew and the percentage of growth in the second year was five times the percentage of loss in the first year. If the gain of Raj from the initial investment over the two year period is 35%, then the percentage of loss in the first year is","type":"mcq","options":["10","15","5","70"],"answer":0,"accepted":[],"solution":"Let the loss incurred by Raj in first year = P%\n∴ Amount remaining after 1st year = 10,000 1 - P 100 \u003e 5,000 …(1)\nNow the percentage growth next year = 5P%\n∴ Amount after 2 years = 10,000 1 - P 100 1 + 5 P 100\nOverall growth after 2 years is 35%, hence amount after 2 years should be 10,000 × 1.35\n⇒ 10,000 1 - P 100 1 + 5 P 100 = 10,000 × 1.35\n⇒ 10000 – 5P 2 + 400P = 13500\n⇒ 5P 2 - 400P + 3500 = 0\n⇒ P 2 – 80P + 700 = 0\n⇒ P = 10% or 70%.\nP cannot be 70% since amount remaining after 1st year has to be greater than 5000 [from (1)]\n∴ P = 10%\nHence, option (a)."},{"no":9,"source":"CAT 2021 QA Slot 3","question":"In a tournament, a team has played 40 matches so far and won 30% of them. If they win 60% of the remaining matches, their overall win percentage will be 50%. Suppose they win 90% of the remaining matches, then the total number of matches won by the team in the tournament will be","type":"mcq","options":["78","84","80","86"],"answer":1,"accepted":[],"solution":"Matches so far:\nTotal played = 40\nWon = 30% of 40 = 12\nLet the number of remaining matches be ‘n’.\nThe team wins 60% i.e., 0.6n matches.\nThere overall win percentage is 50% i.e., half\n⇒ 12 + 0.6n = ½ (40 + n)\n⇒ 24 + 1.2n = 40 + n\n⇒ n = 80\nNow, if the team wins 90% of these 80 remaining matches, they will win 90% of 80 = 72 more matches.\n∴ Total matches won = 12 + 72 = 84\nHence, option (b)."},{"no":10,"source":"CAT 2021 QA Slot 3","question":"The total of male and female populations in a city increased by 25% from 1970 to 1980. During the same period, the male population increased by 40% while the female population increased by 20%. From 1980 to 1990, the female population increased by 25%. In 1990, if the female population is twice the male population, then the percentage increase in the total of male and female populations in the city from 1970 to 1990 is","type":"mcq","options":["68.50","69.25","68.75","68.25"],"answer":2,"accepted":[],"solution":"Let the male and female population be ‘m’ and ‘f’ in 1970.\nUsing alligation\nm f = 25 - 20 40 - 25 = 1 3\n∴ f = 3m\nTotal population in 1970 = f + m = 4m\n⇒ Number of females in 1980 = 1.2f = 3.6m and number of males in 1980 = 1.4m\nPopulation in 1990\nNumber of females = 1.25 × 3.6m = 4.5m\nNumber of males = ½ × 4.5m = 2.25m\nTotal population = 4.5m + 2.25m = 6.75m\n⇒ Total population increases from 4m in 1970 to 6.75m in 1990.\n∴ Percentage increase = 2.75m/4m×100 = 68.75%.\nAlternately ,\nLet the number of males and females in 1970 be \u0027m\u0027 and \u0027f\u0027 respectively.\n∴ In 1980, number of males = 1.4m, females = 1.2f and total population = 1.25(m + f)\n⇒ 1.4m + 1.2f = 1.25(m + f)\n⇒ 0.15m = 0.05f\n⇒ m : f = 1 : 3\n∴ In 1990, number of females = 1.25 × 1.2f = 1.5f, number of males = 1/2 × 1.5f = 0.75f\n∴ Total population in 1990 = 1.5f + 0.75f = 2.25f\nAlso, total population in 1970 = m + f = f + f/3 = 4f/3\n⇒ Required percentage = 2 . 25 f - 4 f / 3 4 f / 3 × 100% = 11 16 × 100% = 68.75%\nHence, option (c)."},{"no":11,"source":"CAT 2020 QA Slot 1","question":"In a group of people, 28% of the members are young while the rest are old. If 65% of the members are literates, and 25% of the literates are young, then the percentage of old people among the illiterates is nearest to","type":"mcq","options":["55","66","59","62"],"answer":1,"accepted":[],"solution":"According to the information given in the question, we can make the following table.\n​​​​​​​\n∴ % old illiterates among illiterates = 23.25/35 × 100 = 66.4%\nHence, option (b)."},{"no":12,"source":"CAT 2020 QA Slot 2","question":"In May, John bought the same amount of rice and the same amount of wheat as he had bought in April, but spent ₹ 150 more due to price increase of rice and wheat by 20% and 12%, respectively. If John had spent ₹ 450 on rice in April, then how much did he spend on wheat in May?","type":"mcq","options":["Rs. 580","Rs. 560","Rs. 590","Rs. 570"],"answer":1,"accepted":[],"solution":"John spent Rs. 450 on rice in April hence he will spend 450 × 1.2 = 540 on rice in May.\nHe spends Rs. 90 extra on rice.\nHe also spends a total of Rs. 150 more in May compared to April\n⇒ He spends 150 – 90 = Rs. 60 more on wheat in May compared to April.\n∴ His expenditure on wheat in April on wheat = 60/0.12 = Rs. 500.\n⇒ His expenditure on wheat in May = 500 + 60 = Rs. 560.\nHence, option (b)."},{"no":13,"source":"CAT 2020 QA Slot 3","question":"In the final examination, Bishnu scored 52% and Asha scored 64%. The marks obtained by Bishnu is 23 less, and that by Asha is 34 more than the marks obtained by Ramesh. The marks obtained by Geeta, who scored 84%, is","type":"mcq","options":["399","439","417","357"],"answer":0,"accepted":[],"solution":"Let the maximum marks be 100x.\nMarks scored by Bishnu = 52x and Asha = 64x\nBishnu scored 23 less, Asha scored 34 more than the marks obtained by Ramesh\n∴ Asha – Bishnu = 34 + 23 = 57\n⇒ 64x – 52x = 57\n⇒ 12x = 57\nNow, Geeta scored 84%, her score = 84x = 7 × 12x\n= 7 × 57 = 399.\nHence, option (a)."},{"no":14,"source":"CAT 2019 QA Slot 1","question":"Meena scores 40% in an examination and after review, even though her score is increased by 50%, she fails by 35 marks. If her post-review score is increased by 20%, she will have 7 marks more than the passing score. The percentage score needed for passing the examination is","type":"mcq","options":["60","80","70","75"],"answer":2,"accepted":[],"solution":"Let the total marks be 100x.\nMeena\u0027s score = 40x.\nMeena\u0027s score after review = 40x + [(40x)/2] = 60x.\nPassing marks = 60x + 35.\nPost review score × (6/5) = 7 + Passing marks\n∴ 60x × (6/5) = 60x + 42.\nSolving this equation we get; x = 3.5.\nSo, passing marks = 60x + 35 = (60 × 3.5) + 35 = 245 and total marks = 100x = 100 × 3.5 = 350.\nPercentage score needed to pass the examination = (Passing marks/Total marks) × 100 = (245/350) × 100 = 70%.\nHence, option (c)."},{"no":15,"source":"CAT 2019 QA Slot 1","question":"The income of Amala is 20% more than that of Bimala and 20% less than that of Kamala. If Kamala\u0027s income goes down by 4% and Bimala\u0027s goes up by 10%, then the percentage by which Kamala\u0027s income would exceed Bimala\u0027s is nearest to","type":"mcq","options":["31","29","28","32"],"answer":0,"accepted":[],"solution":"Let incomes of Amala, Bimala and Kamala be a, b and k respectively.\n∴ a = 6 5 × b = 4 5 × k.\n∴ k b = 3 2\nLet Kamala\u0027s income be 300 and Bimala\u0027s income be 200.\n∴ Kamala\u0027s new income = 300 × 0.96 = 288 and Bimla\u0027s new income = 200 × 1.1 = 220.\n∴ Required percentage = 288 - 220 220 × 100 = 68 220 × 100 = 30.9 ≈ 31%.\nHence, option (a)."},{"no":16,"source":"CAT 2019 QA Slot 1","question":"On selling a pen at 5% loss and a book at 15% gain, Karim gains Rs. 7. If he sells the pen at 5% gain and the book at 10% gain, he gains Rs. 13. What is the cost price of the book in Rupees?","type":"mcq","options":["95","85","100","80"],"answer":3,"accepted":[],"solution":"Let the cost price of one pen and one book be 100p and 100b respectively.\nOn selling a pen at 5% loss and a book at 15% gain, Karim gains Rs. 7.\n∴ 95p + 115b = 7 + (100p + 100b) ⇒ 15b − 5p = 7 ...(1)\nOn selling the pen at 5% gain and the book at 10% gain, he gains Rs. 13.\n∴ 105p + 110b = 13 + (100p + 100b) ⇒ 10b + 5p = 13 ...(2)\nSolving (1) and (2), we get; b = 4/5.\nSo, cost price of one book = 100b = 100 × (4/5) = Rs. 80.\nHence, option (d)."},{"no":17,"source":"CAT 2019 QA Slot 1","question":"In a class, 60% of the students are girls and the rest are boys. There are 30 more girls than boys. If 68% of the students, including 30 boys, pass an examination, the percentage of the girls who do not pass is","type":"text","options":[],"answer":"20","accepted":["20","20","20","20"],"solution":"Let the total number of students be 100x.\nSo, number of girls and boys are 60x and 40x respectively.\nThere are 30 more girls than boys ∴ 60x = 40x + 30.\n∴ x = 3/2.\nNumber of students who passed = 68x = 68 × (3/2) = 102 out of which 30 boys passed.\nSo, number of girls who passed = 102 − 30 = 72\nNumber of girls who did not pass = 60x − 72 = 90 − 72 = 18.\nRequired percentage = [18/90] × 100 = 20%.\nHence, 20."},{"no":18,"source":"CAT 2019 QA Slot 2","question":"In 2010, a library contained a total of 11500 books in two categories - fiction and non-fiction. In 2015, the library contained a total of 12760 books in these two categories. During this period, there was 10% increase in the fiction category while there was 12% increase in the non-fiction category. How many fiction books were in the library in 2015?","type":"mcq","options":["6600","6160","6000","5500"],"answer":0,"accepted":[],"solution":"In 2010 : Total books = 11500\nLet the number of fiction books be f, non-fiction books will be (11500 - f)\nIn 2015 : Total books = 12760\nIncrease in total number of books = 12760 - 11500 = 1260\nFiction books increase by 10%, non-fiction books increase by 12%.\nHence, f × 10 100 + (11500 - f) × 12 100 = 1260\n10f + 12 × 11500 – 12f = 126000\nx = 6000 books\nSo, Fiction books in 2015, 6000 + 600 = 6600 books\nHence, option (a)."},{"no":19,"source":"CAT 2019 QA Slot 2","question":"In an examination, the score of A was 10% less than that of B, the score of B was 25% more than that of C, and the score of C was 20% less than that of D. If A scored 72, then the score of D was","type":"text","options":[],"answer":"80","accepted":["80","80","80","80"],"solution":"Given: A scored 72\nA\u0027s score was 10% less than B\nSo, Score of B = 72/0.9 = 80\nWe know that B was 25% more than C\nSo, C × 5/4 = 80\n⇒ C = 64\nNow, we know that C scored 20% less than D.\nSo, C = 4/5 × D\n⇒ 64 = 4/5 × D\n⇒ D = 80 marks\nHence, 80."},{"no":20,"source":"CAT 2019 QA Slot 2","question":"The salaries of Ramesh, Ganesh and Rajesh were in the ratio 6 : 5 : 7 in 2010, and in the ratio 3 : 4 : 3 in 2015. If Ramesh\u0027s salary increased by 25% during 2010-2015, then the percentage increase in Rajesh\u0027s salary during this period is closest to","type":"mcq","options":["7","8","9","10"],"answer":0,"accepted":[],"solution":"The salaries of Ramesh, Ganesh and Rajesh were in the ratio 6 : 5 : 7 in 2010\nIn 2010, let salary of Ramesh = 6x, Ganesh = 5x \u0026 Rajesh = 7x\nIn 2015, their salaries are in the ratio 3 : 4 : 3 respectively.\nIn 2015, let salary of Ramesh = 3y, Ganesh = 4y \u0026 Rajesh = 3y\nNow, Ramesh’s salary increased by 25%\nHence, 3y = 5/4 × 6x\n⇒ y = 2.5x\n∴ Rajesh’s salary in 2015 = 3y = 3 × 2.5x = 7.5x\nPercentage increase in Rajesh\u0027s salary during 2010 - 2015 = 7 . 5 - 7 7 × 100% ≈ 7.\nHence, option (a)."},{"no":21,"source":"CAT 2018 QA Slot 1","question":"In an examination, the maximum possible score is N while the pass mark is 45% of N. A candidate obtains 36 marks, but falls short of the pass mark by 68%. Which one of the following is then correct?","type":"mcq","options":["N ≤ 200","201 ≤ N ≤ 242","243 ≤ N ≤ 252","N ≥ 253"],"answer":2,"accepted":[],"solution":"Passing marks = 45% of N\nAs 36 marks are short of the pass marks by 68%, it means the cadidate got (100 - 68 = ) 32% of the passing marks.\n⇒ 36 = 32% of 45% of N\n∴ 36 = 0.32 × 0.45 × N\n∴ N = 36 0 . 32 × 0 . 45 = 250\nHence, option (c)."},{"no":22,"source":"CAT 2017 QA Slot 1","question":"Arun\u0027s present age in years is 40% of Barun\u0027s. In another few years, Arun\u0027s age will be half of Barun\u0027s. By what percentage will Barun\u0027s age increase during this period?","type":"text","options":[],"answer":"20","accepted":["20","20","20","20"],"solution":"Let Barun’s age be 10x. Arun’s age is 4x.\nThe difference of these ages in 6x, a constant.\nWhen Arun’s age is 50% of Barun’s age, this difference also would be 50% i.e., Barun’s age, at that stage would be 12x.\nIt would be increase by 20%.\nAlternately ,\nLet Barun’s age be 10x. Arun’s age is 4x.\nIn t years, Arun\u0027s age will be 50% or half of Barun\u0027s age\n⇒ (4x + t) = 1/2 × (10x + t)\n⇒ t = 2x\n∴ Barun\u0027s age will become 12x.\n⇒ Required % = (12x - 10x)/10x × 100% = 20%\nHence, 20."},{"no":23,"source":"CAT 2017 QA Slot 1","question":"Ravi invests 50% of his monthly savings in fixed deposits. Thirty percent of the rest of his savings is invested in stocks and the rest goes into Ravi\u0027s savings bank account. If the total amount deposited by him in the bank (for savings account and fixed deposits) is Rs 59,500, then Ravi\u0027s total monthly savings (in Rs) is:","type":"text","options":[],"answer":"70000","accepted":["70000","70000","70000","70000"],"solution":"Let the total monthly savings be S.\nInvestment in FD = 50% of S = 0.5S\n​​​​​​​Remaining savings = S - 0.5S = 0.5S\nInvestment in stocks = 30% of 0.5S = 0.15S\nTotal invested amount (FD + stocks) = 0.5S + 0.15S = 0.65S\nRemaing amount that is invested in savings account = 0.35S.\n⇒ 0.35S + 0.5S = 59,500\n⇒ 0.85S = 59500.\n⇒ S = 70,000.\nHence, 70,000."},{"no":24,"source":"CAT 2017 QA Slot 1","question":"The number of girls appearing for an admission test is twice the number of boys. If 30% of the girls and 45% of the boys get admission, the percentage of candidates who do not get admission is:","type":"mcq","options":["35","50","60","65"],"answer":3,"accepted":[],"solution":"Let the number of boys appearing for the admission test be b.\nNumber of girs appearing for the admission test = 2b.\nTotal boys who got admission = 45% of b = 0.45b\nTotal girls who got admission = 30% of 2b = 0.6b\nTotal students who got admission = 0.45b + 0.6b = 1.05b\n∴ Percentage of candidates who get admission = 1 . 05 b 2 b + b × 100 % = 35%\n∴ 65% of the candidates do not get admission.\nHence, option (d)."},{"no":25,"source":"CAT 2017 QA Slot 2","question":"Out of the shirts produced in a factory, 15% are defective, while 20% of the rest are sold in the domestic market. If the remaining 8840 shirts are left for export, then the number of shirts produced in the factory is","type":"mcq","options":["13600","13000","13400","14000"],"answer":1,"accepted":[],"solution":"Let us assume that the number of shirts produced in the factory is ‘100x’. Now 15% of ‘100x’ or ‘15x’ shirts are defective.\nSo the number of remaining shirts = 100x – 15 = 85x\nNow 20% of the remaining ‘85x’or ‘17x’ shirts are sold in the domestic market.\nSo number of shirts left for exports = 85x – 17x = 68x\nAs per given information, 8840 shirts are left for exports.\n∴ 68x = 8840\n⇒ x = 130 or 100x = 13000\nSo number of shirts produced in the factory is 13000.\nHence, option (b)."},{"no":26,"source":"CAT 2017 QA Slot 2","question":"In a village, the production of food grains increased by 40% and the per capita production of food grains increased by 27% during a certain period. The percentage by which the population of the village increased during the same period is nearest to","type":"mcq","options":["16","13","10","7"],"answer":2,"accepted":[],"solution":"Total Food Production = Total Population × Per Capita Food Production\nLet the initial population be ‘p’ and the initial per capita food production be ‘c’\nIf f is the total food production, f = pc\nThis can also be rewritten as p = f c\nNow, as per given information, f increases to 1.4f and c increases to 1.27c.\nSo, if p 1 is population after increase.\n1.4f = p 1 (1.27c)\n1 . 4 f 1 . 27 c = p 1\n⇒ p 1 = 1 . 4 1 . 27 f c\nor p 1 = 1 . 4 1 . 27 (p) [ ∵ p = f c ]\n⇒ p 1 ≃ 1.1p\nThis means that the population of the village has increased by approximately 10%.\nHence, option (c)."},{"no":27,"source":"CAT 2007 QA","question":"The maximum guaranteed return to Shabnam is:","type":"mcq","options":["0.25%","0.10%","0.20%","0.15%"],"answer":2,"accepted":[],"solution":"Let Shabnam have Rs. 100 to invest. Let Rs. x, Rs. y and Rs. z be invested in option A, B and C respectively.\n∴ x + y + z = 100 ... (I)\nIf there is a rise in the stock market, returns = 0.001x + 0.05y – 0.025z\nIf there is a fall in the stock market, returns = 0.001x – 0.03y + 0.02z\nNow, x, y and z should be such that regardless of whether the market rises or falls, they give the same return, which is the maximum guaranteed return.\n∴ 0.001x + 0.05y – 0.025z = 0.001x – 0.03y + 0.02z\n∴ y/z = 9/16\nNow, consider different possible values of x, y and z. The returns are as follows:\n​​​​​​​​​​​​​​\nWe see that as the values of y and z increase, the returns increase.\n∴ The returns are maximum when x = 0%, y = 36% and z = 64% (Note that the values of y and x are multiples of 9 and 16.)\nThe maximum returns are 0.2%.\nHence, option (c)."},{"no":28,"source":"CAT 2007 QA","question":"What strategy will maximize the guaranteed return to Shabnam?","type":"mcq","options":["100% in option A","36% in option B and 64% in option C","64% in option B and 36% in option C","1/3 in each of the three options"],"answer":1,"accepted":[],"solution":"As shown by the table formulated in the first question, maximum returns are guaranteed by investing 36% in option B and 64% in option C.\nHence, option (b)."},{"no":29,"source":"CAT 2007 QA","question":"Each question is followed by two statements, I and II. Answer each question using the following instructions:\nMark (1) if the question can be answered by using statement I alone but not by using statement II alone.\nMark (2) if the question can be answered by using statement II alone but not by using statement I alone.\nMark (3) if the question can be answered by using either of the statements alone.\nMark (4) if the question can be answered by using both the statements together but not by either of the statements alone.\nMark (5) if the question cannot be answered by using any of the statements.\nThirty percent of the employees of a call centre are males. Ten per cent of the female employees have an engineering background. What is the percentage of male employees with engineering background?\nI. Twenty five per cent of the employees have engineering background.\nII. Number of male employees having an engineering background is 20% more than the number of female employees having an engineering background.","type":"mcq","options":["1","2","3","4"],"answer":2,"accepted":[],"solution":"Let there be 100x employees. So, 30x are male and 70x are female.\n∴ 7x female employees have an engineering background.\nFrom statement I, 25x employees have an engineering background.\n∴ 18x male employees have an engineering background.\nRequired percentage = 18x × 100/ 30x\nStatement I is sufficient.\nFrom Statement II, Number of male employees having an engineering background = 1.2 × 7x\nRequired percentage = 1.2 × 7x × 100/30x\nHence, option (c)."},{"no":30,"source":"CAT 2004 QA","question":"If group B contains 23 questions, then how many questions are there in group C?","type":"mcq","options":["1","2","3","Cannot be determined"],"answer":0,"accepted":[],"solution":"Let there be a, b and c questions in groups A, B and C respectively.\nThen, a + b + c =100\nTotal marks = a + 2b + 3c\nAlso, a a + 2 b + 3 c ≥ 60 100\nb = 23\n⇒ a + c = 77\n⇒ a = 77 – c\n⇒ a a + 46 + 3 c ≥ 0 . 6\n⇒ a ≥ 0.6a + 27.6 + 1.8c\n⇒ 4a ≥ 276 + 18c\n⇒ a ≥ 69 + 4.5c\n⇒ a – 4.5c ≥ 69\n⇒ 77 – c – 4.5c ≥ 69\n⇒ 77 ≥ 69 + 5.5c\n⇒ c ≤ 8/5.5\n⇒ c = 1\nHence, option (a).\nAlternatively,\nEvaluating options,\nIf C has 1 question then B and A have 23 and 76 questions respectively.\nThe total number of marks = 125\n⇒ Group A has 60.8% marks.\n⇒ Option (a) is possible.\nIf C has 2 questions then B and A have 23 and 75 questions respectively.\nThe total number of marks = 127\n⇒ Group A has 59.05% marks.\n⇒ Option (b) is not possible.\nIf C has 3 questions then B and A have 23 and 74 questions respectively.\nThe total number of marks = 129\n⇒ Group A has 57.36% marks.\n⇒ Option (c) is not possible.\nHence, option (a)."},{"no":31,"source":"CAT 2004 QA","question":"If group C contains 8 questions and group B carries at least 20% of the total marks, which of the following best describes the number of questions in group B?","type":"mcq","options":["11 or 12","12 or 13","13 or 14","14 or 15"],"answer":2,"accepted":[],"solution":"c = 8\n∴ a + b = 92 ...(1)\nAlso, 2 b a + 2 b + 3 c ≥ 0 . 2\n⇒ 2 b 92 - b + 2 b + 24 ≥ 0 . 2\n⇒ 2b ≥ 23.2 + 0.2b\n⇒ b ≥ 232 18\n⇒ b ≥ 13 ...(2)\nAlso, as group A carries at least 60% of the total marks,\na a + 2 b + 3 c ≥ 0 . 6\n⇒ a a + 2 ( 92 - a ) + 24 ≥ 0 . 6\n⇒ aa ≥ 0.6a + 110.4 - 1.2a + 14.4\n⇒ 1.6a ≥ 124.8\n⇒ a ≥ 78 ...(3)\nFrom (1), (2) and (3)\n⇒ b can be 13 or 14.\nHence, option (c).\nAlternately,\nConsider options.\nFor c = 8 and b = 11, a = 81. The total marks = 127.\nGroup B has 17.32% marks, which is not possible.\nFor c = 8 and b = 12, a = 80. The total marks = 128.\nGroup B has 18.75% marks, which is not possible.\nFor c = 8 and b = 13, a = 79. The total marks = 129.\nGroup B has 20.15% marks and group A has 61.24% marks, which is possible.\nFor c = 8 and b = 14, a = 78. The total marks = 130.\nGroup B has 21.53% marks and group A has 60% marks, which is possible.\nFor c = 8 and b = 15, a = 77. The total marks = 131.\nGroup B has 22.9% marks and group A has 58.77 marks, which is not possible.\nHence, option (c)."},{"no":32,"source":"CAT 2004 QA","question":"Each question is followed by two statements, A and B. Answer each question using the following instructions\nChoose 1 if the question can be answered by using one of the statements alone but not by using the other statement alone.\nChoose 2 if the question can be answered by using either of the statements alone.\nChoose 3 if the question can be answered by using both statements together but not by either statement alone.\nChoose 4 if the question cannot be answered on the basis of the two statements.\nZakib spends 30% of his income on his children’s education, 20% on recreation and 10% on healthcare. The corresponding percentages for Supriyo are 40%, 25%, and 13%. Who spends more on children’s education?\nA. Zakib spends more on recreation than Supriyo.\nB. Supriyo spends more on healthcare than Zakib.","type":"mcq","options":["1","2","3","4"],"answer":0,"accepted":[],"solution":"Let Zakib’s and Supriyo’s incomes be z and s respectively.\nConsider statement A:\n0.2z \u003e 0.25s\n∴ z s \u003c 1 . 25\n∴ z \u003e s\nZakib and Supriyo spend 0.3z and 0.4s on children’s education.\n0 . 3 z 0 . 4 s \u003e 0 . 3 × 1 . 25 0 . 4 0 . 3 z 0 . 4 s \u003e 0 . 9375\n∴ Statement A alone is not sufficient.\nConsider statement B:\n0.13s \u003e 0.1z\n∴ z s \u003c 1 . 3\n0 . 3 z 0 . 4 s \u003c 0 . 975\n∴ Supriyo spends more than Zakib on children’s education.\n∴ Statement B alone is sufficient.\nHence, option (a)."},{"no":33,"source":"CAT 2003 QA - Leaked","question":"At the end of year 1998, Shepard bought nine dozen goats. Henceforth, every year he added p% of the goats at the beginning of the year and sold q% of the goats at the end of the year where p \u003e 0 and q \u003e 0. If Shepard had nine dozen goats at the end of year 2002, after making the sales for that year, which of the following is true?","type":"mcq","options":["p = q","p \u003c q","p \u003e q","p = q/2"],"answer":2,"accepted":[],"solution":"Shepard bought 9 dozen goats at the end of 1998.\nConsider that he added 1 dozen goats to it, i.e. 11.11% of 9 dozen.\nAnd he sold 1 dozen to get back the same 9 dozen i.e. 10% of 10 dozen.\n∴ He adds 11.11% and subtracts 10% to get the same amount every time.\n∴ p = 11.11% and q = 10%\n∴ p \u003e q\nHence, option (c)."},{"no":34,"source":"CAT 2001 QA","question":"A student took five papers in an examination, where the full marks were the same for each paper. His marks in these papers were in the proportion of 6 : 7 : 8 : 9 : 10. In all papers together, the candidate obtained 60% of the total marks. Then the number of papers in which he got more than 50% marks is","type":"mcq","options":["2","3","4","5"],"answer":2,"accepted":[],"solution":"Let the maximum marks for each of the paper = 100\n∴ Total maximum marks = 5 × 100 = 500\nLet the marks obtained by the student be 6x, 7x, 8x, 9x and 10x in each of the paper.\n∴ 6x + 7x + 8x + 9x + 10x = 60% of 500\n40x = 300\n∴ x = 7.5\n∴ The marks obtained in each of the paper will be 45, 52.5, 60, 67.5 and 75.\n∴ In 4 papers he got more than 50% marks.\nHence, option (c).\nAlternatively\nAverage of 6, 7, 8, 9 and 10 = 6 + 7 + 8 + 9 + 10 5 = 8\n∵ 60% of marks = 8\n∴ 50% of marks = 8 60 × 50\n= 6.67\n∴ The score in 4 of the subjects is more than 6.67.\nHence, option (c)."},{"no":35,"source":"CAT 2001 QA","question":"A college has raised 75% of the amount it needs for a new building by receiving an average donation of Rs. 600 from the people already solicited. The people already solicited represent 60% of the people the college will ask for donations. If the college is to raise exactly the amount needed for the new building, what should be the average donation from the remaining people to be solicited?","type":"mcq","options":["Rs. 300","Rs. 250","Rs. 400","Rs. 500"],"answer":0,"accepted":[],"solution":"Let the total population be p.\nThen the amount already received = 0.6p × 600 = 360p\nThis is 75% (3/4th) of the amount.\n∴ Remaining amount (25%) = (360p)/3 = 120p = 120p\n∴ Required contribution per head = (120p)/(0.4p) = Rs. 300\nHence, option (a)."},{"no":36,"source":"CAT 2001 QA","question":"The owner of an art shop conducts his business in the following manner: Every once in a while he raises his prices by X%, then a while later he reduces all the new prices by X%. After one such up-down cycle, the price of a painting decreased by Rs. 441. After a second up-down cycle the painting was sold for Rs. 1,944.81. What was the original price of the painting?","type":"mcq","options":["Rs. 2,756.25","Rs. 2,256.25","Rs. 2,500","Rs. 2,000"],"answer":0,"accepted":[],"solution":"As the price decreases after the first cycle, it has to decrease after the second cycle too. Also the decrease in the second cycle will be less than 441 as the original price for the second cycle is less than the original price for the first cycle.\n∴ Price after First Cycle – 1944.81 \u003c 441\nNow we consider options.\n​​​​​​​\nSo, options 2 and 4 are eliminated.\nAs the percentage change in the price in the first and second cycles is equal,\nO r i g i n a l p r i c e D e c r e a s e i n p r i c e a f t e r t h e f i r s t c y c l e should be equal to\nP r i c e a f t e r f i r s t c y c l e D e c r e a s e i n p r i c e a f t e r t h e s e c o n d c y c l e\nOnly option 1 satisfies this.\nHence, option (a)."},{"no":37,"source":"CAT 2001 QA","question":"Choose 1 ; if the question can be answered by using one of the statements alone, but cannot be answered using the other statement alone.\nChoose 2 ; if the question can be answered by using either statement alone.\nChoose 3 ; if the question can be answered by using both statements together, but cannot be answered using either statement alone.\nChoose 4 ; if the question cannot be answered even by using both statements together.\nIs Country X\u0027s GDP higher than country Y\u0027s GDP?\nGDPs of the countries X and Y have grown over the past five years at compounded annual rate of 5% and 6% respectively.\nFive years ago, GDP of country X was higher than that of country Y.","type":"mcq","options":["1","2","3","4"],"answer":3,"accepted":[],"solution":"Statement A does not give us the actual values of their GDPs 5 years ago.\nUsing statement B alone:\nWe know that GDP of country X is greater than that of Y but we do not know by how much it is greater.\nEven after combining both the statements the question cannot be answered.\nHence, option (d)."},{"no":38,"source":"CAT 2000 QA","question":"The table below shows the age-wise distribution of the population of Reposia. The number of people aged below 35 years is 400 million.\n​​​​​​​\nIf the ratio of females to males in the ‘below 15 years’ age group is 0.96, then what is the number of females (in millions) in that age group?","type":"mcq","options":["82.8","90.8","80.0","90.0"],"answer":1,"accepted":[],"solution":"Population below 35 years of age = 30 + 17.75 + 17 = 64.75% of the total population = 400 million\n∴ 30% of the total population = 30 × 400 64 . 75 million ≈ 185 million\nThe ratio of females to males in the ‘below 15 years’ age group is 0.96.\ni.e. if the total population is 196, then there are 96 females.\nApproximately, the number of females (in millions) in the ‘below 15 years’ age group\n= 185 × 96 196 = 90 . 6\nHence, option (b)."},{"no":39,"source":"CAT 1999 QA","question":"Forty per cent of the employees of a certain company are men, and 75% of the men earn more than Rs. 25,000 per year. If 45% of the company’s employees earn more than Rs. 25,000 per year, what fraction of the women employed by the company earn less than or equal to Rs. 25,000 per year?","type":"mcq","options":["2 11","1 4","1 3","3 4"],"answer":3,"accepted":[],"solution":"Men Women\n40% 60%\nOut of 40% men, 75% earn more than Rs. 25,000.\nHence, 30% of the company (men) earn more than Rs. 25,000.\nBut, in all 45% of the employees earn more than Rs. 25,000.\nHence, among women 15% earn more than Rs. 25,000 and the remaining (60 – 15)% earn less than or equal to Rs. 25,000.\nTherefore, the fraction of women = 45 60 = 3 4\nHence, option (d)."},{"no":40,"source":"CAT 1998 QA","question":"One bacterium splits into eight bacteria of the next generation. But due to environmental condition only 50% survives and remaining 50% dies after producing next generation. If the seventh generation number is 4,096 million, what is the number in first generation?","type":"mcq","options":["1 million","2 million","4 million","8 million"],"answer":0,"accepted":[],"solution":"Let there be x bacteria in the first generation i.e. n 1 = x\n∴ n₂ = 8x, but only 50% survives\n⇒ n 2, survived = 8 x 2 = 4 x\nn 3 = 8(4x), but only 50% survives\nn 3, survived = 4 2 x\nn 3, survived = 4 7-1 x = 4096 million\n∴ x = 1 million"},{"no":41,"source":"CAT 1998 QA","question":"Direction: Each question is followed by two statements, I and II. Answer the questions based on the statements and mark the answer as\n1. if the question can be answered with the help of any one statement alone but not by the other statement.\n2. if the question can be answered with the help of either of the statements taken individually.\n3. if the question can be answered with the help of both statements together.\n4. if the question cannot be answered even with the help of both statements together.\nRadha and Rani appeared in an examination. What was the total number of questions?\nI. Radha and Rani together solved 20% of the paper.\nII. Radha alone solved 3 5 of the paper solved by Rani.","type":"text","options":[],"answer":"4","accepted":["4","4","4","4"],"solution":"Even by using both the statements, we can only find out the proportion of the paper solved by Radha and Rani. In the light of the fact that the number of questions solved by either or both of them is not given, we cannot answer the question asked."},{"no":42,"source":"CAT 1997 QA","question":"A student gets an aggregate of 60% marks in five subjects in the ratio 10 : 9 : 8 : 7 : 6. If the passing marks are 50% of the maximum marks and each subject has the same maximum marks, in how many subjects did he pass the examination?","type":"mcq","options":["2","3","4","5"],"answer":2,"accepted":[],"solution":"Let his marks be 100, 90, 80, 70 and 60 in the five subjects. Hence, totally he has scored 400 marks. This constitutes only 60% of the total marks. Hence, total marks = 400 0 . 6 = 667 , Since the total marks in each subject is the same, hence maximum marks in each subject will be 667 5 ≃ 133. Out of this 50% is the passing marks. In other words, to pass in a subject he needs to score 66.5 marks. We can see that only in\none subject he scored less than this, viz. 60. Hence, he passed in 4 subjects."},{"no":43,"source":"CAT 1997 QA","question":"A man earns x% on the first Rs. 2,000 and y% on the rest of his income. If he earns Rs. 700 from income of Rs. 4,000 and Rs. 900 from if his income is Rs. 5,000, find x%.","type":"mcq","options":["20%","15%","25%","None of these"],"answer":1,"accepted":[],"solution":"The two equations can be written\n2000 x 100 + 2000 y 100 = 700 and 2000 x 100 + 3000 y 100 = 900\nThe equations can be simplified to x + y = 35 and 2x + 3y = 90. Solving these two equations simultaneously, we get x = 15%."},{"no":44,"source":"CAT 1996 QA","question":"I bought 5 pens, 7 pencils and 4 erasers. Rajan bought 6 pens, 8 erasers and 14 pencils for an amount which was half more what I had paid. What per cent of the total amount paid by me was paid for the pens?","type":"mcq","options":["37.5%","62.5%","50%","None of these"],"answer":1,"accepted":[],"solution":"Let us look at the two equations. Let (5 pens + 7 pencils + 4 erasers) cost Rs. x. Hence, (6 pens + 14 pencils + 8 erasers) will cost Rs. 1.5x. Had, in the second case, Rajan decided to buy 10 pens instead of 6, the quantity of each one of them would have doubled over the first case and hence it would have cost me Rs. 2x. So (10 pens + 14 pencils + 8 erasers) = Rs. 2x. Now subtracting the second equation from the third, we get 4 pens cost Rs. 0.5x. Since 4 pens cost Re 0.5x, 5 of them will cost Re 0.625x. This is the amount that I spent on pens. Hence, fraction of the total amount paid = 0.625 = 62.5%."},{"no":45,"source":"CAT 1996 QA","question":"The price of a Maruti car rises by 30% while the sales of the car come down by 20%. What is the percentage change in the total revenue?","type":"mcq","options":["-4%","-2%","+4%","+2%"],"answer":2,"accepted":[],"solution":"This can simply be solved by multiplying the two multiplication factors to get the effective multiplication factor. e.g. multiplication factor for 30% increase = 1.30. Multiplication factor for 20% decrease = 0.8. Hence, 1.30 × 0.8 = 1.04. This multiplication factor (i.e. 1.04) indicates that there is a 4% increase in total revenue. So the answer is +4.\nAlternative method:\nBy using the formula x + y + x y 100\n∴ x = +30%; y = – 20%\n⇒ 30 + 60 + 50 ( - 20 ) 100\n= 30 – 20 – 6 = +4%"},{"no":46,"source":"CAT 1995 QA","question":"Ram purchased a flat at Rs.1 lakh and Prem purchased a plot of land worth Rs.1.1 lakh. The respective annual rates at which the prices of the flat and the plot increased were 10% and 5%. After two years they exchanged their belongings and one paid the other the difference. Then","type":"mcq","options":["Ram paid Rs.275 to Prem","Ram paid Rs.475 to Prem","Ram paid Rs.375 to Prem","Prem paid Rs.475 to Ram"],"answer":0,"accepted":[],"solution":"After 2 years, the price of the flat will be (1)(1.10) 2 = Rs.1.21 lakh.\nCorrespondingly the price of the land will be (1.1)(1.05) 2 = Rs.1.21275 lakh.\nHence, the price of the plot = Rs.(1.21275 – 1.21) lakh = Rs.275 more than that of the flat.\nHence, if they exchange, Ram will have to pay this amount to Prem ."},{"no":47,"source":"CAT 1995 QA","question":"A person who has a certain amount with him goes to market. He can buy 50 oranges or 40 mangoes. He retains 10% of the amount for taxi fares and buys 20 mangoes and of the balance he purchases oranges. Number of oranges he can purchase is","type":"mcq","options":["36","40","15","20"],"answer":3,"accepted":[],"solution":"Let us assume that the person has Rs.100.\nWith this, he can buy 50 oranges or 40 mangoes.\nIn other words, the price of an orange is Rs.2 and that of a mango is Rs.2.50.\nIf he decides to keep 10% of his money for taxi fare, he would be left with Rs.90.\nNow if he buys 20 mangoes, he would spend Rs.50 and will be left with Rs.40.\nThus, he can buy 20 oranges."},{"no":48,"source":"CAT 1995 QA","question":"2 5 of the voters promise to vote for P and the rest promised to vote for Q. Of these, on the last day 15% of the voters went back of their promise to vote for P and 25% of voters went back of their promise to vote for Q, and P lost by 2 votes. Then the total number of voters is","type":"mcq","options":["100","110","90","95"],"answer":0,"accepted":[],"solution":"Let there be 100 voters in all.\nInitially, 40 of these promised to vote for P, while 60 of them promised to vote for Q.\nOn the last day, (15% of 40) = 6 voters went back of their promise and voted for Q.\nAlso, 25% of 60 = 15 voters shifted their interest from Q to P.\nSo finally, P end up getting (40 – 6 + 15) = 49 votes and\nQ end up getting (60 – 15 + 6) = 51 votes.\nHence, margin of victory for Q = (51 – 49) = 2, which is true. Hence, there were 100 voters in all."},{"no":49,"source":"CAT 1995 QA","question":"The rate of inflation was 1000%. Then what will be the cost of an article, which costs 6 units of currency now, 2 years from now?","type":"mcq","options":["666","660","720","726"],"answer":3,"accepted":[],"solution":"Required cost = 6 1 + 1000 100 2 = 6(11) 2 = 121 × 6 = 726."},{"no":50,"source":"CAT 1994 QA","question":"The number of votes not cast for the Praja Party increased by 25% in the National General Election over those not cast for it in the previous Assembly Polls, and the Praja Party lost by a majority twice as large as that by which it had won the Assembly Polls. If a total 2,60,000 people voted each time. How many voted for the Praja Party in the Assembly Elections.","type":"mcq","options":["1,10,000","1,50,000","1,40,000","1,20,000"],"answer":2,"accepted":[],"solution":"Let x be the number of votes not cast for Praja Party in the previous polls.\nSo the number of votes not cast for the party in this assembly polls would be 1.25x.\nMargin of victory in the previous polls\n= (Votes cast) – (Votes not cast)\n= (260000 – x) – x = (260000 – 2x).\nMargin of loss in this years polls\n= 1.25x – (260000 – 1.25x)\n= (2.5x – 260000).\nAs per the given information, margin of loss this year = 2 × Margin of victory last year.\nTherefore, (2.5x – 260000) = 2(260000 – 2x).\n∴ x = 120000.\nSo the number of votes cast for the party in assembly election = 260000 – 120000 = 140000.\nHence, option (c)."},{"no":51,"source":"CAT 1993 QA","question":"The rate of increase of the price of sugar is observed to be two percent more than the inflation rate expressed in percentage. The price of sugar, on January 1, 1994, is Rs. 20 per kg. The inflation rate for the years 1994 and 1995 are expected to be 8% each. The expected price of sugar on January 1, 1996 would be","type":"mcq","options":["Rs. 23.60","Rs. 24.00","Rs. 24.20","Rs. 24.60"],"answer":2,"accepted":[],"solution":"Since the inflation rate is 8% in both the years 1994 and 1995, therefore, the rate of increase of the price of sugar is 10%.\n∴ Price of sugar on January 1, 1996 = Price of sugar on January 1, 1994 × 1 + 10 100 2 = 20 × 1.21 = Rs. 24.20 per kg.\nHence, option (c)."},{"no":52,"source":"CAT 1993 QA","question":"A report consists of 20 sheets each of 55 lines and each such line consist of 65 characters. This report is retyped into sheets each of 65 lines such that each line consists of 70 characters. The percentage reduction in number of sheets is closest to","type":"mcq","options":["20","5","30","35"],"answer":0,"accepted":[],"solution":"The total number of the characters = (20 × 55 × 65).\nLet the number of pages in the new format be n.\nThus, the total number of the characters = (65 × 70 × n).\nSince the total number of the characters remains same,\n⇒ 20 × 55 × 65 = 65 × 70 × n\n⇒ n ≈ 16.\nHence, the required percentage = 20 - 16 20 × 100 = 20%.\nHence, option (a)."},{"no":53,"source":"CAT 1991 QA","question":"Prakash should not test if the number of bad widgets in the lot is:","type":"mcq","options":["less than 100","more than 200","between 120 \u0026 190","Cannot be found out."],"answer":0,"accepted":[],"solution":"Let the number of defective widgets be ‘x’.\nCost to Prakash if he does not use any test = 50x\nCost to Prakash if he uses test 1 = 2 × 1000 + 4 x 5 × 25 + x 5 × 50 = 2000 + 30x\nCost to Prakash if he uses test 2 = 3000 + 25x\nPrakash should not test when 50x ≤ (2000 + 30x) and (3000 + 25x)\n50x ≤ (2000 + 30x) and 50x ≤ (3000 + 25x)\n20x ≤ 2000 and 25x ≤ 3000\nx ≤ 100 and x ≤ 120\nx ≤ 100\nPrakash should use test 1 when test 1 is cheaper than test 2\n3000 + 25x ≥ 2000 + 30x\n5x ≤ 1000\nx ≤ 200\nFor x ≥ 200 he can use test 2.\nBelow 100, no test would be cheaper.\nHence, option (a)."},{"no":54,"source":"CAT 1991 QA","question":"If there are 120 defective widgets in the lot, Prakash:","type":"mcq","options":["should either use Test I or not test.","should either use Test II or not test","should use Test I or Test II.","should use Test I only."],"answer":3,"accepted":[],"solution":"Consider the solution to first question of this set.\nFor widgets ≤ 100, no test is required.\nFor 100 ≥ widgets ≤ 200 test 1 is preferred.\nFor widgets ≥ 200 test 2 is preferred.\nIf there are 120 widgets, he should go for test I as it is cheaper.\nHence, option (d)."},{"no":55,"source":"CAT 1991 QA","question":"If the number of defective widgets in the lot is between 200 and 400, Prakash:","type":"mcq","options":["may use Test I or Test II","should use Test I only","should use Test II only","cannot decide"],"answer":2,"accepted":[],"solution":"Consider the solution to first question of this set.\nFor widgets ≤ 100, no test is required.\nFor 100 ≥ widgets ≤ 200 test 1 is preferred.\nFor widgets ≥ 200 test 2 is preferred.\nHence, option (c)."},{"no":56,"source":"CAT 1991 QA","question":"If Prakash is told that the lot has 160 defective widgets, he should:","type":"mcq","options":["use Test I only","use Test II only","do no testing","either use Test I or do not test"],"answer":0,"accepted":[],"solution":"Consider the solution to first question of this set.\nFor widgets ≤ 100, no test is required.\nFor 100 ≥ widgets ≤ 200 test 1 is preferred.\nFor widgets ≥ 200 test 2 is preferred.\nIn case of 160 defectives he should use test I as it is cheaper.\nHence, option (a)."},{"no":57,"source":"CAT 1991 QA","question":"If there are 200 defective widgets in the lot, Prakash:","type":"mcq","options":["may use either Test I or Test II","should use Test I or not use any test","should use Test II or not use any test","cannot decide"],"answer":0,"accepted":[],"solution":"Consider the solution to first question of this set.\nFor widgets ≤ 100, no test is required.\nFor 100 ≥ widgets ≤ 200 test 1 is preferred.\nFor widgets ≥ 200 test 2 is preferred.\nIf there are 200 defective widgets in the lot, Prakash may use either Test I or Test II as the cost of both the Tests is same = Rs.8000.\nHence, option (a)."},{"no":58,"source":"CAT 1991 QA","question":"Gopal went to a fruit market with certain amount of money. With this money he can buy either 50 oranges or 40 mangoes. He retains 10% of the money for taxi fare. If he buys 20 mangoes, then the number of oranges he can buy is","type":"mcq","options":["25","20","18","6"],"answer":1,"accepted":[],"solution":"Let the amount with Gopal be Rs. 400.\nTherefore price of an orange is then Rs. 8 and that of a mango is Rs.10.\nIf he keeps 10% of the money for taxi fare, he is left with Rs.360.\nNow if he buys 20 mangoes, then he spends on mangoes Rs. 200.\nNow he is left with Rs.160, in which he can buy = 160/8 = 20 oranges.\nHence, option (b)."},{"no":59,"source":"CAT 1991 QA","question":"An outgoing batch of students wants to gift PA system worth Rs. 4200 to their school. If the teachers offer to pay 50% more than the students, and an external benefactor gives three times teachers’ contribution, how much should the teachers donate?","type":"mcq","options":["600","840","900","1200"],"answer":2,"accepted":[],"solution":"The ratios of the share of students, teachers and benefactor is 1 : 1.5 : 4.5.\nSo, the proportion of teachers share is 1.5/7.\nSo teachers would donate: (1.5 × 4200)/7 = Rs. 900\nHence, option (c)."}];
    let current = 0, submitted = false, secondsLeft = 150 * 60;
    const responses = Array(questions.length).fill(null), marked = Array(questions.length).fill(false), labels = ["A","B","C","D"];
    const qbar = document.getElementById("qbar"), host = document.getElementById("questionHost"), resultBox = document.getElementById("result");
    function esc(s){return String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
    function norm(s){return String(s ?? "").trim().toLowerCase().replace(/[,₹ rs.%]/g,"").replace(/\s+/g,"");}
    function hasHtml(s){return /<\/?[a-z][\s\S]*>/i.test(String(s ?? ""));}
    function rich(s){return hasHtml(s) ? String(s) : esc(s);}
    function stripHtml(html){const div=document.createElement("div");div.innerHTML=String(html ?? "");return div.textContent.trim().replace(/\s+/g," ");}
    function qType(q){return q.type || ((q.options && q.options.length) ? "mcq" : "text");}
    function qText(q){return q.question ?? q.q ?? "";}
    function qSource(q){return q.source || q.level || "";}
    function qAnswer(q){return q.typedAnswer ?? q.answer ?? "";}
    function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null&&responses[i]!==''?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('');}
    function correctText(q){return qType(q)==="mcq" ? "(" + labels[q.answer] + ") " + stripHtml((q.options || [])[q.answer] || "") : qAnswer(q);}
    function contentBlock(html, cls){return html ? '<div class="'+cls+'">'+rich(html)+'</div>' : '';}
    function control(q,i){if(qType(q)==="mcq") return '<div class="options">'+(q.options||[]).map((op,j)=>'<label class="option"><input type="radio" autocomplete="off" name="answer_'+i+'" value="'+j+'" '+(responses[i]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><span class="opt-label">('+labels[j]+')</span> <span class="opt-text">'+rich(op)+'</span></span></label>').join('')+'</div>'; return '<input class="typed-answer" name="answer_'+i+'" autocomplete="off" value="'+esc(responses[i]||'')+'" placeholder="Type your answer" '+(submitted?'disabled':'')+'>';}
    function solutionHtml(q){const sol=q.solution || "Solution not provided.";return rich(sol);}
    function renderQuestion(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="source">'+esc(qSource(q))+'</div></div></div>'+contentBlock(q.direction,'block')+contentBlock(q.passage,'block')+'<div class="qtext">'+rich(qText(q))+'</div>'+control(q,current)+'<div id="note" class="answer-note"></div><div id="solution" class="solution"><h3>Solution</h3><strong>Answer: '+esc(correctText(q))+'</strong><div class="block">'+solutionHtml(q)+'</div></div><div class="navrow"><button type="button" onclick="markReviewNext()" class="mark">Mark for Review & Next</button><button type="button" onclick="clearResponse()" '+(submitted?'disabled':'')+'>Clear Response</button><button type="button" onclick="prevQ()">Previous</button><button type="button" onclick="nextQ()" class="submit">Save & Next</button></div>';if(submitted)showReviewForCurrent();bindAnswer();renderBar();}
    function bindAnswer(){host.querySelectorAll('[name^="answer_"]').forEach(el=>{if(responses[current]===null&&el.type==='radio')el.checked=false;el.addEventListener('input',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});el.addEventListener('change',()=>{responses[current]=el.type==='radio'?el.value:el.value;renderBar();});});}
    function saveCurrent(){const el=host.querySelector('[name^="answer_"]:checked')||host.querySelector('input.typed-answer');if(el&&!submitted)responses[current]=el.value||null;}
    function go(i){saveCurrent();current=i;renderQuestion();} function prevQ(){if(current>0)go(current-1);} function nextQ(){if(current<questions.length-1)go(current+1);} function toggleMark(){marked[current]=!marked[current];renderQuestion();} function markReviewNext(){marked[current]=true;if(current<questions.length-1)nextQ();else renderQuestion();} function clearResponse(){responses[current]=null;renderQuestion();}
    function isCorrect(q,ans){if(ans===null||ans==='')return null;if(qType(q)==='mcq')return Number(ans)===Number(q.answer);const accepted=(q.accepted&&q.accepted.length?q.accepted:[qAnswer(q)]).map(norm);return accepted.includes(norm(ans));}
    function showReviewForCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('solution');sol.style.display='block';if(r===null){note.className='answer-note muted';note.textContent='Unattempted. Correct answer: '+correctText(q);}else if(r){note.className='answer-note ok';note.textContent='Correct.';}else{note.className='answer-note bad';note.textContent='Wrong. Correct answer: '+correctText(q);} }
    function submitTest(){if(submitted)return;saveCurrent();submitted=true;let c=0,w=0,u=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===null)u++;else if(r)c++;else w++;});const score=c*3-w;resultBox.style.display='block';resultBox.innerHTML='<h2>Test Submitted</h2><div class="score-grid"><div class="score-box">Score<strong>'+score+'</strong></div><div class="score-box">Correct<strong>'+c+'</strong></div><div class="score-box">Wrong<strong>'+w+'</strong></div><div class="score-box">Attempted<strong>'+(c+w)+'</strong></div><div class="score-box">Unattempted<strong>'+u+'</strong></div></div>';showReviewForCurrent();renderBar();resultBox.scrollIntoView({behavior:'smooth',block:'start'});}
    function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return;}secondsLeft--;}
    function calcEval(expr){if(!/^[0-9+\-*/().%\s]+$/.test(expr))return 'Error';return Function('return ('+expr.replace(/%/g,'/100')+')')();}
    function updateCalcSub(){document.getElementById('calcSubDisplay').textContent=document.getElementById('calcDisplay').value||'0';}
    document.querySelectorAll('[data-calc]').forEach(btn=>btn.addEventListener('click',()=>{const d=document.getElementById('calcDisplay'),v=btn.dataset.calc;if(['MC','MR','MS','M+','M-'].includes(v))return; if(v==='C')d.value='';else if(v==='B')d.value=d.value.slice(0,-1);else if(v==='+/-'){d.value=d.value.startsWith('-')?d.value.slice(1):('-'+d.value);}else if(v==='sqrt'){try{d.value=Math.sqrt(Number(calcEval(d.value||'0')));}catch(e){d.value='Error';}}else if(v==='1/x'){try{d.value=1/Number(calcEval(d.value||'0'));}catch(e){d.value='Error';}}else if(v==='='){try{d.value=calcEval(d.value);}catch(e){d.value='Error';}}else d.value+=v;updateCalcSub();}));
    const calcPopup=document.getElementById('calcPopup'), calcHandle=document.getElementById('calcDragHandle');
    document.getElementById('calcToggle').addEventListener('click',()=>{calcPopup.classList.toggle('open');if(calcPopup.classList.contains('open')&&!calcPopup.dataset.moved){calcPopup.style.left='52%';calcPopup.style.top='120px';}});
    document.getElementById('calcClose').addEventListener('pointerdown',e=>e.stopPropagation());
    document.getElementById('calcClose').addEventListener('click',e=>{e.stopPropagation();calcPopup.classList.remove('open');});
    let dragCalc=false, calcDx=0, calcDy=0;
    calcHandle.addEventListener('pointerdown',e=>{dragCalc=true;calcHandle.setPointerCapture(e.pointerId);const r=calcPopup.getBoundingClientRect();calcDx=e.clientX-r.left;calcDy=e.clientY-r.top;calcPopup.style.left=r.left+'px';calcPopup.style.top=r.top+'px';calcPopup.style.right='auto';calcPopup.dataset.moved='1';e.preventDefault();});
    calcHandle.addEventListener('pointermove',e=>{if(!dragCalc)return;const maxX=window.innerWidth-calcPopup.offsetWidth-4,maxY=window.innerHeight-calcPopup.offsetHeight-4;calcPopup.style.left=Math.max(4,Math.min(maxX,e.clientX-calcDx))+'px';calcPopup.style.top=Math.max(4,Math.min(maxY,e.clientY-calcDy))+'px';});
    calcHandle.addEventListener('pointerup',e=>{dragCalc=false;try{calcHandle.releasePointerCapture(e.pointerId);}catch(err){}});
    calcHandle.addEventListener('pointercancel',()=>{dragCalc=false;});
    renderQuestion();tick();setInterval(tick,1000);
  </script>
</body>
</html>
