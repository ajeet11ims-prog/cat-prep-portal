ion{font-size:17px;margin:14px 0;white-space:pre-wrap}.media{display:grid;gap:10px;margin:12px 0}.support-img{margin:0;border:1px solid var(--line);border-radius:7px;background:#fff;padding:8px;width:max-content;max-width:100%}.options{display:grid;gap:9px}.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:7px;background:#fbfcfd;padding:11px;cursor:pointer}.option:hover{border-color:#9ab7ca}.option input{margin-top:4px}.nav{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}.nav button,.submit{border:0;border-radius:6px;padding:10px 14px;font-weight:800;cursor:pointer}.nav button{background:#eaf0f6}.submit{background:var(--brand);color:white}.mark{background:#fff0c2!important;color:#6c4b00!important}.solution{display:none;border-top:1px solid var(--line);margin-top:16px;padding-top:14px}.solution h3{font-size:16px;margin:0 0 8px;color:var(--brand)}.note{font-weight:800;margin-top:12px}.ok{color:var(--ok)}.bad{color:var(--bad)}.muted{color:var(--muted)}#result{display:none;padding:16px;margin-bottom:12px}.score{display:grid;grid-template-columns:repeat(5,minmax(105px,1fr));gap:10px}.score div{border:1px solid var(--line);border-radius:6px;background:#fbfcfd;padding:10px}.score strong{display:block;font-size:23px}.legend{font-size:12px;color:var(--muted);display:grid;gap:6px;margin-top:12px}.dot{display:inline-block;width:12px;height:12px;border:1px solid var(--line);border-radius:3px;margin-right:6px;vertical-align:-2px}.dot.current{background:var(--soft);border-color:var(--brand)}.dot.answered{background:#eaf8f0;border-color:#8ccca8}.dot.marked{background:#fff6dd;border-color:#e2bd61}@media(max-width:900px){main{grid-template-columns:1fr}.panel{position:static}.qbar{grid-template-columns:repeat(10,1fr)}.score{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><header><div class="top"><div><h1>SIMCAT107 VARC Test</h1><div class="meta">35 questions | 60 minutes | +3 correct, -1 wrong</div></div><div class="timer">Time Left: <span id="time"></span></div></div></header><main><section><div id="result"></div><div id="host" class="card"></div></section><aside class="panel"><h2>Question Bar</h2><div id="qbar" class="qbar"></div><div class="legend"><span><i class="dot current"></i>Current</span><span><i class="dot answered"></i>Answered</span><span><i class="dot marked"></i>Marked</span></div></aside></main><script>const questions=[{"no":1,"source":"VARC","answer":0,"options":["He thinks that it is not necessarily omniscient, and that the view about it among certain writers is exaggerated.","He considers it acceptable only if one is deliberately trying to imitate older writers such as Jane Austen.","He thinks it is only acceptable in a world with a greater degree of certainty about the rules than in the present time.","He does not offer his own opinion of it; he merely mentions certain writers who dislike it."],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"The house of fiction has many windows, but only two or three doors. I can tell a story in the third person or in the first person, and perhaps in the second person singular, or in the first person plural, though successful examples of these latter two are rare indeed. In reality, we are stuck with third- and first-person narration. The common idea is that there is a contrast between reliable narration (third-person omniscience) and unreliable narration (the unreliable first-person narrator, who knows less about himself than the reader eventually does). On one side, Tolstoy, say; and on the other, Nabokov\u0027s narrator Humbert Humbert or Italo Svevo\u0027s Zeno Cosini, or Wodehouse\u0027s Bertie Wooster. Authorial omniscience, people assume, has had its day. W. G. Sebald once said, \u0027I think that fiction writing which does not acknowledge the uncertainty of the narrator himself is a form of imposture which I find very, very difficult to take. In Jane Austen\u0027s world there were set standards of propriety which were accepted by everyone. I think it is legitimate, within that context, to be a narrator who knows what the rules are and who knows the answers to certain questions. But I think these certainties have been taken from us by the course of history, and that we have to acknowledge our own sense of ignorance and insufficiency in these matters and therefore try and write accordingly.\u0027 For Sebald, and for many writers like him, standard third-person omniscient narration is a kind of antique cheat. But both sides of this division have been caricatured. Actually, first-person narration is generally more reliable than unreliable; and third-person \u0027omniscient\u0027 narration is generally more partial than omniscient. The first-person narrator is often highly reliable; Charlotte BrontÃ«\u0027s Jane Eyre, a highly reliable first-person narrator, for instance, tells us her story from a position of belated enlightenment. Even the apparently unreliable narrator is more often than not reliably unreliable. Think of Kazuo Ishiguro\u0027s butler in The Remains of the Day, or of Bertie Wooster, or even of Humbert Humbert. We know that the narrator is being unreliable because the author is alerting us, through reliable manipulation, to that narrator\u0027s unreliability. A process of authorial flagging is going on; the novel teaches us how to read its narrator. Unreliably unreliable narration is very rare, actually – about as rare as a genuinely mysterious, truly bottomless character. The nameless narrator of Knut Hamsun\u0027s Hunger is highly unreliable, and finally unknowable (it helps that he is insane); Dostoevsky\u0027s narrator in Notes from Underground is the model for Hamsun. Italo Svevo\u0027s Zeno Cosini may be the best example of truly unreliable narration. He imagines that by telling us his life story he is psychoanalysing himself (he has promised his analyst to do this). But his self-comprehension, waved confidently before our eyes, is as comically perforated as a bullet-holed flag.","question":"What is the author\u0027s opinion of third-person omniscient narration?","solution":"Refer to paragraph 3 and the first sentence of paragraph 4. [3] is W. G. Sebald\u0027s opinion of third-person omniscient narration, not the author\u0027s. There is no mention of imitating older writers in the passage, so [2] is completely wrong. The author does offer his opinion of third-person omniscient narration both directly (in the first sentence of paragraph 4) and indirectly, by criticizing W. G. Sebald\u0027s view (in the last two sentences of paragraph 3), so [4] is not true either. Only [1] is correct: the author thinks that \u0027third-person \"omniscient\" narration is generally more partial than omniscient\u0027; and he also thinks that Sebald and writers like him have an exaggerated view of third-person omniscient narration (\u0027both sides of this division have been caricatured\u0027). Hence, [1].","questionImages":[],"solutionImages":[]},{"no":2,"source":"VARC","answer":0,"options":["Only [iii]","[i] and [ii]","[iii] and [iv]","[i], [ii], [iii] and [iv]"],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"The house of fiction has many windows, but only two or three doors. I can tell a story in the third person or in the first person, and perhaps in the second person singular, or in the first person plural, though successful examples of these latter two are rare indeed. In reality, we are stuck with third- and first-person narration. The common idea is that there is a contrast between reliable narration (third-person omniscience) and unreliable narration (the unreliable first-person narrator, who knows less about himself than the reader eventually does). On one side, Tolstoy, say; and on the other, Nabokov\u0027s narrator Humb t helps that he is insane); Dostoevsky\u0027s narrator in Notes from Underground is the model for Hamsun. Italo Svevo\u0027s Zeno Cosini may be the best example of truly unreliable narration. He imagines that by telling us his life story he is psychoanalysing himself (he has promised his analyst to do this). But his self-comprehension, waved confidently before our eyes, is as comically perforated as a bullet-holed flag.","question":"Based on the definition in this passage, which of the following hypothetical first-person narrators could be considered an unreliable narrator? i] At the beginning of the story, the narrator promises to explain a particular mystery in the course of the story; but the mystery remains unexplained till the end. ii] The narrator tells the readers about certain past events at the beginning of the story; but as the story progresses, it becomes clear that these events never actually occurred. iii]The narrator presents herself as smart and knowledgeable; but as the story progresses, it becomes clear to the reader that the narrator doesn\u0027t know or understand what is going on around her. iv] Throughout the story, the narrator deliberately fails to mention the fact that he is blind; the revelation of this (through another character) near the end sheds a completely different light on the narrator\u0027s personality and actions.","solution":"According to the passage, an unreliable first-person narrator is one \u0027who knows less about himself than the reader eventually does\u0027. Based on this definition, only the narrator in [iii] can be considered an unreliable narrator: she does not know that she is not smart and knowledgeable, as the readers eventually realize. Neither [i] nor [ii] involves a narrator\u0027s knowledge about himself/herself. In case of [iv], the narrator deliberately tries to hide his blindness – it is impossible that he would not be aware of it. (Note that in the general literary sense, all these four hypothetical narrators would be considered unreliable narrators; but we need to answer this question based only on the definition provided in the passage.) Hence, [1].","questionImages":[],"solutionImages":[]},{"no":3,"source":"VARC","answer":2,"options":["Examples of \u0027reliably unreliable\u0027 narrators","The many \u0027windows\u0027 of the house of fiction","So-called omniscient narrators who are not necessarily omniscient","Books that are written in the second person singular or in the first person plural"],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"The house of fiction has many windows, but only two or three doors. I can tell a story in the third person or in the first person, and perhaps in the second person singular, or in the first person plural, though successful examples of these latter two are rare indeed. In reality, we are stuck with third- and first-person narration. The common idea is that there is a contrast between reliable narration (third-person omniscience) and unreliable narration (the unreliable first-person narrator, who knows less about himself than the reader eventually does). On one side, Tolstoy, say; and on the other, Nabokov\u0027s narrator Humbert Humbert or Italo Svevo\u0027s Zeno Cosini, or Wodehouse\u0027s Bertie Wooster. Authorial omniscience, people assume, has had its day. W. G. Sebald once said, \u0027I think that fiction writing which does not acknowledge the uncertainty of the narrator himself is a form of imposture which I find very, very difficult to take. In Jane Austen\u0027s world there were set standards of propriety which were accepted by everyone. I think it is legitimate, within that context, to be a narrator who knows what the rules are and who knows the answers to certain questions. But I think these certainties have been taken from us by the course of history, and that we have to acknowledge our own sense of ignorance and insufficiency in these matters and therefore try and write accordingly.\u0027 For Sebald, and for many writers like him, standard third-person omniscient narration is a kind of antique cheat. But both sides of this division have been caricatured. Actually, first-person narration is generally more reliable than unreliable; and third-person \u0027omniscient\u0027 narration is generally more partial than omniscient. The first-person narrator is often highly reliable; Charlotte BrontÃ«\u0027s Jane Eyre, a highly reliable first-person narrator, for instance, tells us her story from a position of belated enlightenment. Even the apparently unreliable narrator is more often than not reliably unreliable. Think of Kazuo Ishiguro\u0027s butler in The Remains of the Day, or of Bertie Wooster, or even of Humbert Humbert. We know that the narrator is being unreliable because the author is alerting us, through reliable manipulation, to that narrator\u0027s unreliability. A process of authorial flagging is going on; the novel teaches us how to read its narrator. Unreliably unreliable narration is very rare, actually – about as rare as a genuinely mysterious, truly bottomless character. The nameless narrator of Knut Hamsun\u0027s Hunger is highly unreliable, and finally unknowable (it helps that he is insane); Dostoevsky\u0027s narrator in Notes from Underground is the model for Hamsun. Italo Svevo\u0027s Zeno Cosini may be the best example of truly unreliable narration. He imagines that by telling us his life story he is psychoanalysing himself (he has promised his analyst to do this). But his self-comprehension, waved confidently before our eyes, is as comically perforated as a bullet-holed flag.","question":"If this passage were to continue, what would it most likely go on to discuss?","solution":"Several \u0027reliably unreliable\u0027 narrators are mentioned in the penultimate paragraph, so the passage is not likely to go back to them after discussing \u0027unreliably unreliable\u0027 narrators in the last paragraph. The \u0027windows of the house of fiction\u0027 are mentioned in the beginning of the passage, but there is no further reference to them, so [2] seems unlikely. [4] can be ruled out on the same grounds. In the penultimate paragraph, the author says \u0027first-person narration is generally more reliable than unreliable; and third-person \"omniscient\" narration is generally more partial than omniscient\u0027. He goes on to show how first-person narration is generally reliable. So it is likely that if the passage were to continue, it would discuss how third-person omniscient narration is not so omniscient. Hence, [3].","questionImages":[],"solutionImages":[]},{"no":4,"source":"VARC","answer":3,"options":["Tolstoy – Humbert Humbert","Zeno Cosini – Italo Svevo","Dostoevsky – Knut Hamsun","Kazuo Ishiguro – butler"],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"The house of fiction has many windows, but only two or three doors. I can tell a story in the third person or in the first person, and perhaps in the second person singular, or in the first person plural, though successful examples of these latter two are rare indeed. In reality, we are stuck with third- and first-person narration. The common idea is that there is a contrast between reliable narration (third-person omniscience) and unreliable narration (the unreliable first-person narrator, who knows less about himself than the reader eventually does). On one side, Tolstoy, say; and on the other, Nabokov\u0027s narrator Humbert Humbert or Italo Svevo\u0027s Zeno Cosini, or Wodehouse\u0027s Bertie Wooster. Authorial omniscience, people assume, has had its day. W. G. Sebald once said, \u0027I think that fiction writing which does not acknowledge the uncertainty of the narrator himself is a form of imposture which I find very, very difficult to take. In Jane Austen\u0027s world there were set standards of propriety which were accepted by everyone. I think it is legitimate, within that context, to be a narrator who knows what the rules are and who knows the answers to certain questions. But I think these certainties have been taken from us by the course of history, and that we have to acknowledge our own sense of ignorance and insufficiency in these matters and therefore try and write accordingly.\u0027 For Sebald, and for many writers like him, standard third-person omniscient narration is a kind of antique cheat. But both sides of this division have been caricatured. Actually, first-person narration is generally more reliable than unreliable; and third-person \u0027omniscient\u0027 narration is generally more partial than omniscient. The first-person narrator is often highly reliable; Charlotte BrontÃ«\u0027s Jane Eyre, a highly reliable first-person narrator, for instance, tells us her story from a position of belated enlightenment. Even the apparently unreliable narrator is more often than not reliably unreliable. Think of Kazuo Ishiguro\u0027s butler in The Remains of the Day, or of Bertie Wooster, or even of Humbert Humbert. We know that the narrator is being unreliable because the author is alerting us, through reliable manipulation, to that narrator\u0027s unreliability. A process of authorial flagging is going on; the novel teaches us how to read its narrator. Unreliably unreliable narration is very rare, actually – about as rare as a genuinely mysterious, truly bottomless character. The nameless narrator of Knut Hamsun\u0027s Hunger is highly unreliable, and finally unknowable (it helps that he is insane); Dostoevsky\u0027s narrator in Notes from Underground is the model for Hamsun. Italo Svevo\u0027s Zeno Cosini may be the best example of truly unreliable narration. He imagines that by telling us his life story he is psychoanalysing himself (he has promised his analyst to do this). But his self-comprehension, waved confidently before our eyes, is as comically perforated as a bullet-holed flag.","question":"Choose the option in which the author and his/her character respectively are correctly paired.","solution":"According to the second paragraph, Humbert Humbert is a character by Nabokov, not Tolstoy, so [1] is wrong. [2] switches the names of the author and the character. Both Dostoevsky and Knut Hamsun are authors, not characters, as per the last paragraph, so [3] is wrong as well. Only [4] is correct: according to the fourth paragraph, a butler is the narrator of Kazuo Ishiguro\u0027s novel The Remains of the Day. Hence, [4].","questionImages":[],"solutionImages":[]},{"no":5,"source":"VARC","answer":3,"options":["Extraterrestrial life must be of natural origin, just like life on earth, despite being apparently designed.","Extraterrestrial life and life on earth must have a common origin that can be explained by the theory of natural selection.","Extraterrestrial life must be a product of Darwinian natural selection, as it is the best explanation for the existence of life.","Extraterrestrial life, like life on earth, must be a product of Darwinian natural selection, the only process that apparently designs organisms."],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"One evolutionary biologist has made a prediction about extraterrestrial life – not to help us look for life on other planets, but to help us understand life on this planet. Richard Dawkins has ventured that life, anywhere it is found in the universe, will be a product of Darwinian natural selection. That may seem like the most overreaching prognosis ever made from an armchair, but in fact it is a straightforward consequence of the argument for the theory of natural selection. Natural selection is the only explanation we have of how complex life can evolve, putting aside the question of how it did evolve. If Dawkins is right, as I think he is, natural selection is indispensable for understanding the existence of complex life like human beings. The theory of natural selection has an odd status in modern intellectual life. Within its home discipline, it is indispensable, explaining thousands of discoveries in a coherent framework and constantly inspiring new ones. But outside its home, it is misunderstood and reviled. I want to spell out the case for this foundational idea: how it explains a key mystery that its alternatives cannot explain, how it has been verified in the lab and the field, and why some famous arguments against it are wrong. Natural selection has a special place in science because it alone explains what makes life special. Life fascinates us because of its adaptive complexity or complex design. Living things are not just pretty bits of bric-a-brac, but do amazing things. They fly, or swim, or see, or digest food, or catch prey, or manufacture honey or silk or wood or poison. These are rare accomplishments, beyond the means of puddles, rocks, clouds, and other nonliving things. We would call a heap of extraterrestrial matter \u0027life\u0027 only if it achieved comparable feats. Rare accomplishments come from special structures. Animals can see and rocks can\u0027t because animals have eyes, and eyes have precise arrangements of unusual materials capable of forming an image. The odds are mind-bogglingly stacked against these structures\u0027 being assembled at one go, out of raw materials, by natural events. The eye has so many parts, arranged so precisely, that it appears to have been designed in advance with the goal of putting together something that sees. The same is true for our other organs. The laws of the world work forwards, not backwards: rain causes the ground to be wet; the ground\u0027s benefiting from being wet cannot cause the rain. So the argument against natural selection goes: What else but the plans of God could effect the teleology (goal-directedness) of life on earth? Darwin showed what else. He identified a forward-causation physical process that mimics the paradoxical appearance of backward causation or teleology. The trick is replication. A replicator is something that can make a copy of itself, with most of its traits duplicated in the copy, including the ability to replicate in turn. Darwin\u0027s theory\u0027s extraordinary contribution is that it explains the appearance of design without a designer, using ordinary forward causation as it applies to replicators. Natural selection is not the only process that changes organisms over time. But it is the only process that seemingly designs organisms over time. Dawkins stuck out his neck about extraterrestrial evolution because he reviewed every alternative to selection that has been proposed in the history of biology and showed that they are impotent to explain the signature of life: complex design.","question":"What is Richard Dawkins\u0027s main point in this passage?","solution":"There is no suggestion in the passage that Richard Dawkins thinks that extraterrestrial life and life on earth have a common origin, so [2] can be eliminated at once. Dawkins\u0027s main point involves Darwin\u0027s theory of natural selection; so [1], which does not mention it at all, cannot be the answer. Dawkins would agree with both [3] and [4]; but the latter, which includes the additional point that Darwinian natural selection explains both extraterrestrial life and life on earth, better summarizes his view. Hence, [4].","questionImages":[],"solutionImages":[]},{"no":6,"source":"VARC","answer":1,"options":["He is aware that at first glance, Dawkins\u0027s prediction seems far-fetched.","He is aware that Dawkins\u0027s prediction has no basis in knowledge of actual extraterrestrial life.","He thinks Dawkins is exaggerating based on no actual knowledge of extraterrestrial life.","He thinks Dawkins may have gone too far with his predictions, given that there are no extraterrestrials."],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"One evolutionary biologist has made a prediction about extraterrestrial life – not to help us look for life on other planets, but to help us understand life on this planet. Richard Dawkins has ventured that life, anywhere it is found in the universe, will be a product of Darwinian natural selection. That may seem like the most overreaching prognosis ever made from an armchair, but in fact it is a straightforward consequence of the argument for the theory of natural selection. Natural selection is the only explanation we have of how complex life can evolve, putting aside the question of how it did evolve. If Dawkins is right, as I think he is, natural selection is indispensable for understanding the existence of complex life like human beings. The theory of natural selection has an odd status in modern intellectual life. Within its home discipline, it is indispensable, explaining thousands of discoveries in a coherent framework and constantly inspiring new ones. But outside its home, it is misunderstood and reviled. I want to spell out the case for this foundational idea: how it explains a key mystery that its alternatives cannot explain, how it has been verified in the lab and the field, and why some famous arguments against it are wrong. Natural selection has a special place in science because it alone explains what makes life special. Life fascinates us because of its adaptive complexity or complex design. Living things are not just pretty bits of bric-a-brac, but do amazing things. They fly, or swim, or see, or digest food, or catch prey, or manufacture honey or silk or wood or poison. These are rare accomplishments, beyond the means of puddles, rocks, clouds, and other nonliving things. We would call a heap of extraterrestrial matter \u0027life\u0027 only if it achieved comparable feats. Rare accomplishments come from special structures. Animals can see and rocks can\u0027t because animals have eyes, and eyes have precise arrangements of unusual materials capable of forming an image. The odds are mind-bogglingly stacked against these structures\u0027 being assembled at one go, out of raw materials, by natural events. The eye has so many parts, arranged so precisely, that it appears to have been designed in advance with the goal of putting together something that sees. The same is true for our other organs. The laws of the world work forwards, not backwards: rain causes the ground to be wet; the ground\u0027s benefiting from being wet cannot cause the rain. So the argument against natural selection goes: What else but the plans of God could effect the teleology (goal-directedness) of life on earth? Darwin showed what else. He identified a forward-causation physical process that mimics the paradoxical appearance of backward causation or teleology. The trick is replication. A replicator is something that can make a copy of itself, with most of its traits duplicated in the copy, including the ability to replicate in turn. Darwin\u0027s theory\u0027s extraordinary contribution is that it explains the appearance of design without a designer, using ordinary forward causation as it applies to replicators. Natural selection is not the only process that changes organisms over time. But it is the only process that seemingly designs organisms over time. Dawkins stuck out his neck about extraterrestrial evolution because he reviewed every alternative to selection that has been proposed in the history of biology and showed that they are impotent to explain the signature of life: complex design.","question":"Why does the author call Richard Dawkins\u0027s prediction about extraterrestrial life \u0027the most overreaching prognosis ever made from an armchair\u0027?","solution":"Option [1] is merely a paraphrase of the quoted sentence, and does not explain why the author thinks so. The second half of [4] has no basis in this passage, whic at it explains the appearance of design without a designer, using ordinary forward causation as it applies to replicators. Natural selection is not the only process that changes organisms over time. But it is the only process that seemingly designs organisms over time. Dawkins stuck out his neck about extraterrestrial evolution because he reviewed every alternative to selection that has been proposed in the history of biology and showed that they are impotent to explain the signature of life: complex design.","question":"If you were to interview the author, which is the question that you would be least likely to ask him?","solution":"Refer to paragraph 2: the author mentions that the theory of natural selection is despised outside its home discipline, and that it is better than its alternatives, without revealing what those alternatives are. So [1] and [2] are conceivably questions you would ask the author for more information on these points. In the first paragraph, he says \u0027natural selection is the only explanation we have of how complex life can evolve\u0027, but does not clarify if the same applies to the simplest forms of life (extraterrestrial life or on Earth). If extraterrestrial life exists, it may not be complex life, as the author assumes, so [4] is a valid question. However, the answer to [3] is stated clearly in the last sentence of paragraph 3. Therefore, you would be least likely to ask the author [3]. Hence, [3].","questionImages":[],"solutionImages":[]},{"no":8,"source":"VARC","answer":0,"options":["Yes, he would definitely agree.","Yes, he would agree, but with some qualifications.","No, he would probably not agree.","His opinion cannot be determined from the passage."],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"One evolutionary biologist has made a prediction about extraterrestrial life – not to help us look for life on other planets, but to help us y natural events. The eye has so many parts, arranged so precisely, that it appears to have been designed in advance with the goal of putting together something that sees. The same is true for our other organs. The laws of the world work forwards, not backwards: rain causes the ground to be wet; the ground\u0027s benefiting from being wet cannot cause the rain. So the argument against natural selection goes: What else but the plans of God could effect the teleology (goal-directedness) of life on earth? Darwin showed what else. He identified a forward-causation physical process that mimics the paradoxical appearance of backward causation or teleology. The trick is replication. A replicator is something that can make a copy of itself, with most of its traits duplicated in the copy, including the ability to replicate in turn. Darwin\u0027s theory\u0027s extraordinary contribution is that it explains the appearance of design without a designer, using ordinary forward causation as it applies to replicators. Natural selection is not the only process that changes organisms over time. But it is the only process that seemingly designs organisms over time. Dawkins stuck out his neck about extraterrestrial evolution because he reviewed every alternative to selection that has been proposed in the history of biology and showed that they are impotent to explain the signature of life: complex design.","question":"Would the author of this passage agree with this statement?","solution":"Refer to the last sentence of paragraph 5 and the whole of paragraph 6. The author mentions that the argument against natural selection generally evokes God, but Darwin showed how the mechanism of natural selection works (i.e. using replicators), which removed the need for God to be a designer of life. Therefore, the author would definitely agree with the given statement. Hence, [1].","questionImages":[],"solutionImages":[]},{"no":9,"source":"VARC","answer":0,"options":["A scheme in which workers can work any way and any time they want, as long as they meet their goals","A scheme in which the workers have the freedom to work as many or as few hours as they choose, as long as they finish their work","A plan which involves allowing employees freedom to be their own bosses, including taking vacations whenever they want, and skipping meetings","A plan in which bosses no longer supervise their employees, in return for which the latter are expected to produce results"],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"In 2003, Cali Ressler and Jody Thompson were developing new human resources guidelines at Best Buy, an electronics retailer, when they suggested a profound shift in the way the company managed its employees. They wondered what might happen if they granted workers 100 percent autonomy and expected of them 100 percent accountability. What if employees were judged solely on the work they did and not at all on the manner in which they did it? Ressler and Thompson dubbed their plan the Results-Only Work Environment, or ROWE. The scheme involved some radical proposals. People could work from home absolutely anytime they felt like it, without needing a reason or excuse. There would be no such thing as a sick day or a vacation allotment – employees could take off as much time as they wanted, whenever they saw fit. Perhaps most provocative: all meetings would be optional. Even if your boss had invited you. Don\u0027t think you need to be there? Don\u0027t come. In return for this absolute freedom, workers would need to produce. Bosses would set macro expectations (e.g., increase sales by 10 percent) and then assess the results without micromanaging (e.g., keeping tabs on who arrived at the office earliest in the morning or left latest at night). If the goal was met, there were no complaints from your boss about that Tuesday afternoon you spent at your kid\u0027s football game. If the goal wasn\u0027t met, no amount of face time around the office would substitute for the lack of results. Of course, if your job description involved opening up the store at 9 a.m., fulfilment of that goal was a must. But for knowledge workers, measuring output became entirely divorced from hours logged in the office. The key difference under ROWE is that superiors are managing the work instead of managing the people. It forces clear thinking on what the expectations should be for delivering results. Thompson claims the effect on employees is remarkable. \u0027When you get to take over your own life and feel responsible for yourself and your work,\u0027 she says, \u0027you feel proud and liberated and dignified. It\u0027s the control, but it\u0027s also the clarity on top of it. I now need to know what my results are supposed to be so I can prove that I\u0027m getting there.\u0027 Decades ago, it was useful to be physically present in the office as much as possible. That way, your boss knew how to find you when it was time to get a question answered or to work together on a project. Now, though, we have mobile phones and email and instant messenger and collaboration software. It\u0027s quite easy to get things done from different places and at different times. Chair-warming presenteeism isn\u0027t necessary. But what happens when we give ROWE a taste of its own medicine and judge it solely on its results, instead of its intentions? According to Phyllis Moen, a sociology professor at the University of Minnesota, who has conducted a number of studies on the effects of ROWE on Best Buy employees, ROWE has had some surprisingly positive results, including better employee health, reduced turnover and improved morale. That all sounds great for the employees. But Ressler and Thompson claim the company benefited, as well. According to them, voluntary turnover rates went down as much as 90 percent on ROWE teams, while productivity on those teams increased by 41 percent. Thompson and Ressler have laid out their blueprint for ROWE in a book titled Why Work Sucks and How to Fix It.","question":"What is ROWE, as per this passage?","solution":"Refer to the first three paragraphs, which explain what ROWE (Results-Only Work Environment) is. [3] fails to mention what the employees are expected to do in return for the freedom conferred on them due to ROWE (i.e. produce results). [2] focuses only on the work timings aspect of ROWE, and neglects to mention other aspects such as working from home or skipping meetings. The passage does not suggest that ROWE involves a complete lack of supervision. Also, since there is more to it than just the supervision aspect, which is not mentioned in [4], this option is incomplete. Only [1] suitably summarizes what ROWE is. Hence, [1].","questionImages":[],"solutionImages":[]},{"no":10,"source":"VARC","answer":0,"options":["He is in favour of it, and mentions none of its shortcomings.","He admires it, though he does question some aspects of it.","He is a bit sceptical about it, as it is applicable in only some types of jobs.","He is biased towards it, and only quotes positive views by ROWE\u0027s developers and others."],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"In 2003, Cali Ressler and Jody Thompson were developing new human resources guidelines at Best Buy, an electronics retailer, when they suggested a profound shift in the way the company managed its employees. They wondered what might happen if they granted workers 100 percent autonomy and expected of them 100 percent accountability. What if employees were judged solely on the work they did and not at all on the manner in which they did it? Ressler and Thompson dubbed their plan the Results-Only Work Environment, or ROWE. The scheme involved some radical proposals. People could work from home absolutely anytime they felt like it, without needing a reason nswer":3,"options":["It is difficult for managers in a ROWE-based office to coordinate work among the employees.","People whose jobs involve meeting with clients cannot be allowed the kind of freedom conferred by ROWE.","Employees who have become used to a ROWE-based work environment are unable to adjust to an ordinary workplace again.","ROWE policies involve minimum face-to-face interaction among employees, and therefore weaken their sense of being a team."],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"In 2003, Cali Ressler and Jody Thompson were developing new human resources guidelines at Best Buy, an electronics retailer, when they suggested a profound shift in the way the company managed its employees. They wondered what might happen if they granted workers 100 percent autonomy and expected of them 100 percent accountability. What if employees were judged solely on the work they did and not at all on the manner in which they did it? Ressler and Thompson dubbed their plan the Results-Only Work Environment, or ROWE. The scheme involved some radical proposals. People could work from home absolutely anytime they felt like it, without needing a reason or excuse. There would be no such thing as a sick day or a vacation allotment – employees could take off as much time as they wanted, whenever they saw fit. Perhaps most provocative: all meetings would be optional. Even if your boss had invited you. Don\u0027t think you need to be there? Don\u0027t come. In return for this absolute freedom, workers would need to produce. Bosses would set macro expectations (e.g., increase sales by 10 percent) and then assess the results without micromanaging (e.g., keeping tabs on who arrived at the office earliest in the morning or left latest at night). If the goal was met, there were no complaints from your boss about that Tuesday afternoon you spent at your kid\u0027s football game. If the g on and Ressler have laid out their blueprint for ROWE in a book titled Why Work Sucks and How to Fix It.","question":"In today\u0027s scenario, which of the following causes would be most likely to weaken the purported usefulness of ROWE?","solution":"Refer to paragraph 6: [1] is not something that is applicable any more, as modern technology makes coordination among scattered employees easy. [2] is not relevant, as the passage already makes it clear that ROWE applies mainly to knowledge workers, not to those who need to interact with clients/customers (see the last two sentences of paragraph 3). [3] is not a problem with a ROWE-based workplace, but rather with the ordinary workplaces. Only [4] suggests a genuine problem with ROWE: it may lead to an erosion of the sense of being a team. Thus, [4] weakens the purported usefulness of ROWE. Hence, [4].","questionImages":[],"solutionImages":[]},{"no":13,"source":"VARC","answer":1,"options":["In Best Buy\u0027s annual report for 2003","In a book on management written in 2012","In an issue of a business magazine from 2001","In Thompson and Ressler\u0027s second book, released in 2014"],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"In 2003, Cali Ressler and Jody Thompson were developing new human resources guidelines at Best Buy, an electronics retailer, when they suggested a profound shift in the way the company managed its employees. They wondered what might happen if they granted workers 100 percent autonomy and expected of them 100 percent accountability. What if employees were judged solely on the work they did and not at all on the manner in which they did it? Ressler and Thompson dubbed their plan the Results-Only Work Environment, or ROWE. The scheme involved some radical proposals. People could work from home absolutely anytime they felt like it, without needing a reason or excuse. There would be no such thing as a sick day or a vacation allotment – employees could take off as much time as they wanted, whenever they saw fit. Perhaps most provocative: all meetings would be optional. Even if your boss had invited you. Don\u0027t think you need to be there? Don\u0027t come. In return for this absolute freedom, workers would need to produce. Bosses would set macro expectations (e.g., increase sales by 10 percent) and then assess the results without micromanaging (e.g., keeping tabs on who arrived at the office earliest in the morning or left latest at night). If the goal was met, there were no complaints from your boss about that Tuesday afternoon you spent at your kid\u0027s football game. If the goal wasn\u0027t met, no amount of face time around the office would substitute for the lack of results. Of course, if your job description involved opening up the store at 9 a.m., fulfilment of that goal was a must. But for knowledge workers, measuring output became entirely divorced from hours logged in the office. The key difference under ROWE is that superiors are managing the work instead of managing the people. It forces clear thinking on what the expectations should be for delivering results. Thompson claims the effect on employees is remarkable. \u0027When you get to take over your own life and feel responsible for yourself and your work,\u0027 she says, \u0027you feel proud and liberated and dignified. It\u0027s the control, but it\u0027s also the clarity on top of it. I now need to know what my results are supposed to be so I can prove that I\u0027m getting there.\u0027 Decades ago, it was useful to be physically present in the office as much as possible. That way, your boss knew how to find you when it was time to get a question answered or to work together on a project. Now, though, we have mobile phones and email and instant messenger and collaboration software. It\u0027s quite easy to get things done from different places and at different times. Chair-warming presenteeism isn\u0027t necessary. But what happens when we give ROWE a taste of its own medicine and judge it solely on its results, instead of its intentions? According to Phyllis Moen, a sociology professor at the University of Minnesota, who has conducted a number of studies on the effects of ROWE on Best Buy employees, ROWE has had some surprisingly positive results, including better employee health, reduced turnover and improved morale. That all sounds great for the employees. But Ressler and Thompson claim the company benefited, as well. According to them, voluntary turnover rates went down as much as 90 percent on ROWE teams, while productivity on those teams increased by 41 percent. Thompson and Ressler have laid out their blueprint for ROWE in a book titled Why Work Sucks and How to Fix It.","question":"Where would you be most likely to find this passage?","solution":"Since Thompson and Ressler came up with ROWE in 2003 (see the first sentence of the passage), it is impossible that the passage could have been written in 2001. The passage is not likely to be from their own book, as they would not refer to themselves in the third person. The passage is focused on ROWE, not Best Buy or any other aspect of Best Buy\u0027s business, so [1] is unlikely. In any case, the passage does not read like an annual report, but rather an article or book extract for a general audience. So the most likely source of the passage is a book on management published for a general audience, sometime after 2003. Hence, [2].","questionImages":[],"solutionImages":[]},{"no":14,"source":"VARC","answer":2,"options":["The Internet changes the way people think and process information.","Overreliance on the Internet has led to a superficial mode of thinking.","Overuse of the Internet may lead to an inability to concentrate on large amounts of text.","People may lose the ability to think on their own due to the effects of the Internet."],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"The sentient supercomputer HAL pleads with the implacable astronaut Dave Bowman to stop what he is doing in a famous and weirdly poignant scene towards the end of Stanley Kubrick\u0027s 2001: A Space Odyssey. Bowman, having nearly been sent to a deep-space death by the malfunctioning computer, is calmly, coldly disconnecting the memory circuits that control its artificial brain. \u0027Dave, my mind is going,\u0027 HAL says, forlornly. \u0027I can feel it. I can feel it.\u0027 I can feel it too. Over the last few years I\u0027ve had an uncomfortable sense that someone, or something, has been tinkering with my brain, remapping the neural circuitry, reprogramming the memory. My mind isn\u0027t going – so far as I can tell – but it\u0027s changing. I\u0027m not thinking the way I used to think. I feel it most strongly when I\u0027m reading. I used to find it easy to immerse myself in a book or a lengthy article. But that\u0027s rarely the case anymore. Now my concentration starts to drift after a page or two. I feel like I\u0027m always dragging my wayward brain back to the text. The deep reading that used to come naturally has become a struggle. I think I know what\u0027s going on. For well over a decade now, I\u0027ve been spending a lot of time online, searching and surfing and sometimes adding to the great databases of the Internet. The Web\u0027s been a godsend to me as a writer. Research that once required days in libraries can now be done in minutes. A few Google searches, some quick clicks on hyperlinks, and I\u0027ve got the telltale fact or the pithy quote I was after. Even when I\u0027m not working, I\u0027m as likely as not to be foraging in the Web\u0027s data thickets. The Net has become my all-purpose medium, the conduit for most of the information that flows through my eyes and ears and into my mind. The advantages of having immediate access to such an incredibly rich and easily searched store of data are many, and they\u0027ve been widely described and duly applauded. The boons are real. But they come at a price. Media aren\u0027t just channels of information. They supply the stuff of thought, but they also shape the process of thought. And what the Net seems to be doing is chipping away my capacity for concentration and contemplation. Whether I\u0027m online or not, my mind now expects to take in information the way the Net distributes it: in a swiftly moving stream of particles. Once I was a scuba diver in the sea of words; now I zip along the surface like a guy on a Jet Ski. Maybe I\u0027m an aberration, an outlier. But it doesn\u0027t seem that way. When I mention my troubles with reading to friends, many say they\u0027re suffering from similar afflictions. The more they use the Web, the more they have to fight to stay focused on long pieces of writing. Some worry they\u0027re becoming chronic scatterbrains. Scott Karp, who used to work for a magazine and now writes a blog about online media, speculates: \u0027What if I do all my reading on the web not so much because the way I read has changed, i.e. I\u0027m just seeking convenience, but because the way I think has changed?\u0027 We seem to have arrived at an important juncture in our intellectual and cultural history, a moment of transition between two very different modes of thinking. What we\u0027re trading away in return for the riches of the Net – and only a curmudgeon would refuse to see the riches – is our old linear thought process. The calm, focused, undistracted linear mind is being pushed aside by a new kind of mind that wants and needs to take in and dole out information in short, disjointed, often overlapping bursts – the faster, the better.","question":"What is the author\u0027s main argument in this passage?","solution":"The author mostly puts forth his main argument in this passage in speculative terms, not certainties, so [1] and [2], which deal with certainties, are exaggerations. [4] is too extreme \"“ the author does not suggest that people will lose the ability to think on their own due to the Internet. Rather, he claims that people may lose the ability to concentrate, especially on large amounts of text (such as books), because they have become too used to the Internet\u0027s method of providing constantly changing bite-sized pieces of information. Hence, [3].","questionImages":[],"solutionImages":[]},{"no":15,"source":"VARC","answer":3,"options":["He wants to show that technology – like HAL as well as the Internet – can have a negative effect on the human mind.","He wants to show that his \u0027mind is going\u0027 due to an overdependence on machines, just as in the movie.","He wants to show how he is helpless to keep his mind from going, just like HAL is in the movie.","He wants to provide an analogy for how he can feel that his mind is changing, just like HAL does."],"direction":"The passage given below is followed by a set of questions. Choose the most appropriate answer to each question.","passage":"The sentient supercomputer HAL pleads with the implacable astronaut Dave Bowman to stop what he is doing in a famous and weirdly poignant scene towards the end of Stanley Kubrick\u0027s 2001: A Space Odyssey. Bowman, having nearly been sent to a deep-space death by the malfunctioning computer, is calmly, coldly disconnecting the memory circuits that control its artificial brain. \u0027Dave, my mind is going,\u0027 HAL says, forlornly. \u0027I can feel it. I can feel it.\u0027 I can feel it too. Over the last few years I\u0027ve had an uncomfortable sense that someone, or something, has been tinkering with my brain, remapping the neural circuitry, reprogramming the memory. My mind isn\u0027t going – so far as I can tell – but it\u0027s changing. I\u0027m not thinking the way I used to think. I feel it most strongly when I\u0027m reading. I used to find it easy to immerse myself in a book or a lengthy article. But that\u0027s rarely the cas
