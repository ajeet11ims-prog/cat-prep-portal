iate answer to each question.","passage":"The sentient supercomputer HAL pleads with the implacable astronaut Dave Bowman to stop what he is doing in a famous and weirdly poignant scene towards the end of Stanley Kubrick\u0027s 2001: A Space Odyssey. Bowman, having nearly been sent to a deep-space death by the malfunctioning computer, is calmly, coldly disconnecting the memory circuits that control its artificial brain. \u0027Dave, my mind is going,\u0027 HAL says, forlornly. \u0027I can feel it. I can feel it.\u0027 I can feel it too. Over the last few years I\u0027ve had an uncomfortable sense that someone, or something, has been tinkering with my brain, remapping the neural circuitry, reprogramming the memory. My mind isn\u0027t going – so far as I can tell – but it\u0027s changing. I\u0027m not thinking the way I used to think. I feel it most strongly when I\u0027m reading. I used to find it easy to immerse myself in a book or a lengthy article. But that\u0027s rarely the case anymore. Now my concentration starts to drift after a page or two. I feel like I\u0027m always dragging my wayward brain back to the text. The deep reading that used to come naturally has become a struggle. I think I know what\u0027s going on. For well over a decade now, I\u0027ve been spending a lot of time online, searching and surfing and sometimes adding to the great databases of the Internet. The Web\u0027s been a godsend to me as a writer. Research that once required days in libraries can now be done in minutes. A few Google searches, some quick clicks on hyperlinks, and I\u0027ve got the telltale fact or the pithy quote I was after. Even when I\u0027m not working, I\u0027m as likely as not to be foraging in the Web\u0027s data thickets. The Net has become my all-purpose medium, the conduit for most of the information that flows through my eyes and ears and into my mind. The advantages of having immediate access to such an incredibly rich and easily searched store of data are many, and they\u0027ve been widely described and duly applauded. The boons are real. But they come at a price. Media aren\u0027t just channels of information. They supply the stuff of thought, but they also shape the process of thought. And what the Net seems to be doing is chipping away my capacity for concentration and contemplation. Whether I\u0027m online or not, my mind now expects to take in information the way the Net distributes it: in a swiftly moving stream of particles. Once I was a scuba diver in the sea of words; now I zip along the surface like a guy on a Jet Ski. Maybe I\u0027m an aberration, an outlier. But it doesn\u0027t seem that way. When I mention my troubles with reading to friends, many say they\u0027re suffering from similar afflictions. The more they use the Web, the more they have to fight to stay focused on long pieces of writing. Some worry they\u0027re becoming chronic scatterbrains. Scott Karp, who used to work for a magazine and now writes a blog about online media, speculates: \u0027What if I do all my reading on the web not so much because the way I read has changed, i.e. I\u0027m just seeking convenience, but because the way I think has changed?\u0027 We seem to have arrived at an important juncture in our intellectual and cultural history, a moment of transition between two very different modes of thinking. What we\u0027re trading away in return for the riches of the Net – and only a curmudgeon would refuse to see the riches – is our old linear thought process. The calm, focused, undistracted linear mind is being pushed aside by a new kind of mind that wants and needs to take in and dole out information in short, disjointed, often overlapping bursts – the faster, the better.","question":"Which of the following is a flaw in the author\u0027s main argument?","solution":"The author does not assume [1] – rather, his argument only relates to those people who do use the Internet as much as he does. The first half of [2] is incorrect – the author does mention positive qualities of the Internet in paragraphs 3 and 6 – and the second half cannot be inferred from the passage. [3], if true, would apply only to the author himself, and not to the other users of the Internet; however, as stated in the penultimate paragraph, his friends feel the same way. So [3] is not necessarily true. Only [4] is a flaw in the author\u0027s reasoning: he states that he, as well as many of his friends, have started having trouble concentrating while reading in recent years, and blames it on the Internet. However, it is possible that the effect could be due to other aspects of modern life, such as watching too much TV or too many movies, and not the Internet at all. Hence, [4].","questionImages":[],"solutionImages":[]},{"no":19,"source":"VARC","answer":1,"options":["The event\u0027s organizers worked through the night to make it a grand success.","I don\u0027t think Ram will go through his divorce.","Mrs. Sharma was through with her yearly appraisals.","Though no longer in the limelight, Rajesh is a public figure through and through."],"direction":"In the following question, a word has been used in sentences in four different ways. Choose the option corresponding to the sentence in which the usage of the word is incorrect or inappropriate.","passage":"","question":"THROUGH","solution":"In [1], \u0027through\u0027 means \u0027during the whole period of\u0027 or \u0027throughout\u0027. In [3], \u0027through\u0027 means \u0027finished\u0027. In [4], the idiom \u0027thorough and through\u0027 means \u0027in all respects\u0027 or \u0027from beginning to end\u0027. To \u0027go through\u0027 means to \u0027experience\u0027, which does not make sense in [2]. The correct phrasal verb in this context should be to \u0027go through with (something)\u0027 which means to \u0027bring to c ompletion\u0027. Hence, [2].","questionImages":[],"solutionImages":[]},{"no":20,"source":"VARC","answer":2,"options":["Just accept what you have been given – don\u0027t look a gift horse in the mouth.","I don\u0027t think our suggestions will be accepted – we will just be flogging a dead horse if we keep trying.","No amount of persuasion or training is going to change the senior clerk\u0027s manner of working – you can\u0027t teach an old horse new tricks.","The politician was wary of the new member of his party, as he believed the latter to be a Trojan horse sent by the opposition."],"direction":"In the following question, a word has been used in sentences in four different ways. Choose the option corresponding to the sentence in which the usage of the word is incorrect or inappropriate.","passage":"","question":"HORSE","solution":"\u0027Don\u0027t look a gift horse in the mouth\u0027 is a proverb that means \u0027don\u0027t criticize something that is given to you freely\u0027. \u0027Flogging a dead horse\u0027 means \u0027wasting time on something at which you will not succeed\u0027. A \u0027Trojan horse\u0027 is a \u0027trap intended to trick an enemy\u0027. So options [1], [2] and [4] are correct. However, the correct idiom in [3] should be \u0027you can\u0027t teach an old dog new tricks\u0027, not \u0027horse\u0027, meaning that it is difficult for someone old to change his ways. Hence, [3].","questionImages":[],"solutionImages":[]},{"no":21,"source":"VARC","answer":2,"options":["Pop-up shops are the future of retail.","These stores are often about experiences of the hands-on kind.","The holidays have long been a prime season for retailers.","Some retailers are even integrating them with their brick-and-mortar locations."],"direction":"Three out of four sentences in the options, when correctly sequenced, form a coherent paragraph. Which of the following sentences does not fit into the context?","passage":"","question":"","solution":"[1] and [3] are stand-alone sentences. So, either of these can be the opening sentence of the paragraph. [1] introduces the concept of pop-up shops and [2] provides further explanation of it. [4] meaningfully concludes the paragraph by stating that retailers are integrating these pop-up shops with their stores. [3] talks about the prime season for retailers, which makes no sense in this context. Thus, [3] does not fit in the context. Hence, [3].","questionImages":[],"solutionImages":[]},{"no":22,"source":"VARC","answer":0,"options":["Clocks didn\u0027t just become more ornate; they also got smaller and cheaper.","The need for tighter scheduling and synchronization of work, transport, devotion and even leisure provided the impetus for rapid progress in clock technology.","Units of time became standardized – seconds, minutes, hours – and clock mechanisms were fine-tuned to measure those units with much greater accuracy.","By the fourteenth century, the mechanical clock had become commonplace, a near-universal tool for coordinating the intricate workings of the new urban society."],"direction":"Three out of four sentences in the options, when correctly sequenced, form a coherent paragraph. Which of the following sentences does not fit into the context?","passage":"","question":"","solution":"Sentences [2], [3] and [4] – in that order – talk about the progress and increasing accuracy in clock technology. [1], on the other hand, is about a different, though related, point: the looks, sizes and prices of clocks. Therefore, it does not fit into the sequence. Hence, [1]. Y","questionImages":[],"solutionImages":[]},{"no":23,"source":"VARC","answer":2,"options":["Willows are the most common, though not the only, types of trees that produce flowers and leaves at different times.","Thus it becomes difficult, if not impossible, to identify willow species with any degree of certainty.","If you want to know what species a particular willow belongs to, you may have to make two visits.","So in case of willows, you need to look for other markers to identify individual species: the texture of the bark, the shape of the branches, and so on."],"direction":"The following question has a paragraph from which the last sentence has been deleted. From the given options, choose the sentence that completes the paragraph in the most appropriate way.","passage":"","question":"Many trees can be identified definitively by their flowers. But many trees are not in flower at the time you come across them – a particular problem in the tropics, where flowering often seems to be erratic (or perhaps the tree knows when it is appropriate to flower, but the biologist does not). Some trees with similar flowers have different leaves, and both may be needed to make the identification. Willows, however, tend to produce their flowers before they produce leaves: you never find flowers and leaves on the same tree at the same time.","solution":"The paragraph is about identifying trees on the basis of their flowers and leaves. So [1], which only vaguely refers to other trees besides willows that produce flowers and leaves at different times, seems like the beginning of a new paragraph rather than the completion of the idea in this one. [4] provides additional information that does not have a basis in the given paragraph: would it even be possible to identify different species of willows based on their bark or branches? Even if it is, in light of [3] being a possibility, [4] seems unnecessary. [2] is far too negative, especially in comparison to [3], which is simple and straightforward, and effectively concludes the point being made on how to identify willows. Hence, [3].","questionImages":[],"solutionImages":[]},{"no":24,"source":"VARC","answer":3,"options":["Therefore, mutual comprehensibility is the most objective basis for saying whether two kinds of speech are languages or dialects.","Therefore, mutual comprehensibility is not a useful basis for saying whether two kinds of speech are languages or dialects.","Nonetheless, mutual comprehensibility is not a useful basis for saying whether two kinds of speech are languages or dialects.","Nonetheless, mutual comprehensibility is the most objective basis for saying whether two kinds of speech are languages or dialects."],"direction":"The following question has a paragraph from which the last sentence has been deleted. From the given options, choose the sentence that completes the paragraph in the most appropriate way.","passage":"","question":"Two kinds of criteria distinguish languages from dialects. The first are social and political: in this view, \u0027languages\u0027 are typically prestigious, official and written, whereas \u0027dialects\u0027 are mostly spoken, unofficial and looked down upon. In a famous formulation of this view, \u0027a language is a dialect with an army and a navy\u0027. Speakers of mere \u0027dialects\u0027 often refer to their speech as \u0027slang\u0027, \u0027patois\u0027 or the like. Linguists have a different criterion: if two related kinds of speech are so close that speakers can have a conversation and understand each other, they are dialects of a single language. If comprehension is difficult to impossible, they are distinct languages. Of course, comprehensibility is not either-or, but a continuum – and it may even be asymmetrical.","solution":"Based on the options, the missing sentence should either claim that mutual comprehensibility is a good way to distinguish between languages and dialects, or that it isn\u0027t. According to the paragraph, this is the criterion that linguists use; so it is more likely to be a good way than a bad one. Thus, [2] and [3] are negated. The last sentence of the given paragraph suggests some limitations of this criterion, so the missing sentence, which says that it is useful, should begin with \u0027nonetheless\u0027 (meaning \u0027however\u0027) rather than \u0027therefore\u0027. Hence, [4].","questionImages":[],"solutionImages":[]},{"no":25,"source":"VARC","answer":1,"options":["BDACE","BEDAC","EDACB","EBADC"],"direction":"Sentences given in the following question, when properly sequenced, form a coherent paragraph. Each sentence is labelled with a letter. Choose the most logical order of sentences, from among the four given choices, to construct a coherent paragraph.","passage":"","question":"A. When they melted, these earthen kettles filled with fossil water, leaving countless mirrors that sequin the tundra. B. North of the 60th parallel, Canada contains more lakes than the rest of the world combined. C. Now, as the permafrost thaws around these kettles, glacial water held in place by frozen soil for thousands of years is seeping away. D. Here, ice ages gouged cavities into which icebergs dropped when the glaciers retreated. E. Nearly half of Canada\u0027s Northwest Territories isn\u0027t land at all, but water.","solution":"The DA link is the most obvious one in this sequence: \u0027they\u0027 in A has to refer to the \u0027icebergs\u0027 mentioned in D. This rules out option [4], which lacks this link. B and E, both of which talk about the water bodies in Canada, belong together, so [1] and [3], which place them at opposite ends of the sequence, can be ruled out as well. Option [2] – BEDAC – makes sense, with BE introducing the topic of Canadian lakes, DA explaining how they formed, and C ending the sequence with their current status. Hence, [2].","questionImages":[],"solutionImages":[]},{"no":26,"source":"VARC","answer":1,"options":["AEBCD","AECDB","ADECB","AECD"],"direction":"The sentences given in the question below when properly sequenced, form a coherent paragraph. Each sentence is labelled with a letter. Type in the box provided below the most logical order of sentences to construct a coherent paragraph Note: Your answer should be a combination of letters indicating the order of the sentences .Use the virtual keyboard to enter your answer","passage":"","question":"A. At the end of his 1494 book Summa de Arithmetica, Geometria, Proportioni et Proportionalita, summarizing all the knowledge of that time on arithmetic, algebra (including quadratic equations), and trigonometry, the Franciscan friar Luca Pacioli (circa 1445–1514) made a bold assertion. B. He clearly meant to use it only as a measure of the difficulty of solving the cubic, but actually the quadrature problem is a measure of the greatest difficulty, since it was shown, in 1882, to be impossible. C. The latter problem had been around in mathematics ever since the time of the Greek mathematician Hippocrates, circa 440 B.C. D. The quadrature of a circle, the construction by straightedge and compass alone of the square equal in area to the circle, had proven to be difficult, and when Pacioli wrote, the quadrature problem was still unsolved. E. He declared that the solution of the cubic equation is \u0027as impossible at the present state of science as the quadrature of the circle\u0027. ____","solution":"A is obviously the opening sentence, going by the options, as well as the fact that it introduces the topic. E follows A, as it states what Pacioli\u0027s \u0027bold assertion\u0027 was. \u0027The latter problem\u0027 in C refers to \u0027the quadrature of the circle\u0027 introduced in E. D explains what the quadrature of the circle is. B concludes the sequence by stating that the problem is impossible to solve. Therefore, the answer is : AECDB.","questionImages":[],"solutionImages":[]},{"no":27,"source":"VARC","answer":0,"options":["AC","ABC","B, C \u0026 D","C \u0026 D"],"direction":"In the following question, four sentences are given. Choose the sentences that are the same in meaning. Note: Your answer should be in letters and in alphabetical order. Use the virtual keyboard to enter your answer in the box provided below","passage":"","question":"A. Aggression is not a single motive, let alone a mounting urge; rather, it is the output of several psychological systems that differ in their environmental triggers. B. Aggression is neither a single motive nor a mounting urge; instead, aggression results in a number of psychological systems that differ in how they are triggered by the environment. C. Aggression is mistakenly thought of as a single motive or a mounting urge; the truth is that aggression is the product of multiple psychological systems that have different environmental triggers. D. It is wrong to think of aggression as a single motive with a mounting urge, as it is in fact the result of various psychological systems that are triggered in different ways by the environment. ____","solution":"The first part of this sentence means the same thing in A, B and C; D is different, as it states that aggression is not \u0027a single motive with a mounting urge\u0027, while the rest of the sentences claim that it is neither of the two. The second half of B differs from the others: while the other statements claim that aggression is the \u0027output\u0027, \u0027product\u0027 or \u0027result\u0027 of psychological systems, B claims that aggression \u0027results in\u0027 these psychological systems. So neither B nor D means the same as the other two, while A and C mean the same as each other. .","questionImages":[],"solutionImages":[]},{"no":28,"source":"VARC","answer":1,"options":["AD","BC","A, B \u0026 C","None of the above"],"direction":"In the following question, four sentences are given. Choose the sentences that are the same in meaning. Note: Your answer should be in letters and in alphabetical order. Use the virtual keyboard to enter your answer in the box provided below","passage":"","question":"A. An invention that is rarely mentioned today was the common source of our modern media, and was a decisive factor in shaping society, just like the internal combustion engine or the incandescent lightbulb. B. Our modern media spring from a common source, an invention that is rarely mentioned today, but which had as decisive a role in shaping society as the internal combustion engine or the incandescent lightbulb. C. Although it is seldom mentioned today, the invention that our modern media originated from is an invention that was as decisive in shaping society as the internal combustion engine or the incandescent lightbulb. D. Although our modern media spring from a common source, the invention is seldom mentioned today, despite having had a more decisive role in shaping society than the internal combustion engine or the incandescent lightbulb. ____","solution":"Statements A, B and C assign equal importance to the invention in question in shaping society as the internal combustion engine or the incandescent lightbulb, while D says it \u0027had a more decisive role\u0027, so D does not mean the same as the others. The two halves of B and C are contrasted using \u0027but\u0027 and \u0027although\u0027 respectively; but A features no such contrast. So it has a subtly different connotation than the other two. B and C mean exactly the same as each other, with only a different arrangement of words and the use of some synonyms.","questionImages":[],"solutionImages":[]},{"no":29,"source":"VARC","answer":2,"options":["All pathbreakers are seen in relation to their predecessors, such as Julius Caesar, Jesus and Newton.","Pathbreakers such as Julius Caesar, Jesus and Newton are repeatedly compared to their predecessors.","All pathbreakers, such as Julius Caesar, Jesus and Newton, are seen in relation to their predecessors.","Pathbreakers such as Julius Caesar, Jesus and Newton had to accept being compared to their predecessors."],"direction":"Four alternative summaries are given below each text. Choose the option that best captures the essence of the text.","passage":"","question":"All pathbreakers are seen, first and foremost, in terms of their predecessors. Julius Caesar wept comparing his own deeds in his early thirties with those of Alexander the Great. Jesus, in the Gospels, was explicitly compared with Elijah from the Old Testament. And Newton, in lessening his own role as a discoverer of nature\u0027s laws, claimed to stand on the shoulders of giants.","solution":"The way that [1] is framed suggests that Julius Caesar, Jesus and Newton were the predecessors, not the pathbreakers, so [1] is incorrect. \u0027Repeatedly compared\u0027 is not an idea that comes across in the paragraph, so [2] is not an accurate summary. Neither is it stated that the pathbreakers \u0027had to accept being compared to their predecessors\u0027, just that they were compared. So [4] can be ruled out as well. Only [3] is a fully correct summary. Hence, [3].","questionImages":[],"solutionImages":[]},{"no":30,"source":"VARC","answer":0,"options":["There are so many rules and guidelines in the English Wikipedia, that it is highly likely that nobody knows them all.","The English Wikipedia has a huge number of rules and guidelines, but not enough people who know them all.","There are enough rules and guidelines in the English Wikipedia to fill a thick book, so no one can follow them all.","Given the huge number of rules and guidelines in the English Wikipedia, one can assume that people no longer bother learning them all."],"direction":"Four alternative summaries are given below each text. Choose the option that best captures the essence of the text.","passage":"","question":"Currently, the English Wikipedia has more than 50 official policies with a word count close to 150,000 (enough for a thick book). But that\u0027s just the tip of the administrative iceberg. In addition to the policies, there are guidelines and essays – more than 450 devoted solely to proper conduct. You will also find more than 1,200 essays containing comments on the policies and guidelines, advisory notes and analyses of the community. The total word count for all guidelines and essays can easily be in the magnitude of millions, so it is safe to assume that no one in the world knows them all.","solution":"According to the paragraph, there is unlikely to be anyone who knows all the rules and guidelines of Wikipedia. Options [2] and [4] twist these words slightly: there is no suggestion in the paragraph that there are not \u0027enough\u0027 people who know them, or that \u0027people no longer bother learning them all\u0027. [3] is incorrect, as the description \u0027enough for a thick book\u0027 is only applicable to the more than 50 policies with a word count of around 150,000 mentioned in the first sentence; the total word count of the rules is said to be in the millions. Only [1] accurately and succinctly summarizes the paragraph. Hence, [1].","questionImages":[],"solutionImages":[]},{"no":31,"source":"VARC","answer":0,"options":["BAAA","AABA","BAAB","BBAB"],"direction":"In the following questions, there are four sentences. Each sentence has a pair of words that are italicized and highlighted. From the italicized and highlighted words, identify the most appropriate words (A or B) to form correct sentences. Type the letters corresponding to the correct option for each sentence in the correct order. Note: Your answer should be in letters .Use the virtual keyboard to enter your answer in the box provided below Note: Your answer should be in letters .Use the virtual keyboard to enter your answer in the box provided below","passage":"","question":"Though my friend seemed to understand the play quite well, I was mostly just amused (A) / bemused (B) by it. The police are planning to indict (A) / indite (B) the murdered woman\u0027s husband for the crime. Some abbreviations (A) / acronyms (B), such as \u0027Mr.\u0027 (for \u0027mister\u0027), have become so common that it is odd to see the words spelt out fully. Air contains a negligible (A) / negligent (B) amount of methane, yet it can be a potent greenhouse gas. ____","solution":"To \u0027amuse\u0027 means to \u0027entertain\u0027, while to \u0027bemuse\u0027 means to \u0027confuse\u0027; in first sentence, it is clear that the latter is meant, as it is contrasted with the word \u0027understand\u0027. \u0027Indict\u0027 means to \u0027charge with a crime\u0027; \u0027indite\u0027 means to \u0027write\u0027 or \u0027compose a poem\u0027. So only the former can be correct in the second sentence. An \u0027abbreviation\u0027 is a \u0027shortened or contracted form of a word or phrase\u0027; an \u0027acronym\u0027 is a \u0027pronounceable word made up of a series of initial letters of words\u0027 (such as NASA or UNESCO). In the third sentence, the example given (\u0027Mr.\u0027) is an abbreviation, not an acronym. \u0027Negligible\u0027 means \u0027extremely small\u0027 or \u0027insignificant\u0027, while \u0027negligent\u0027 means \u0027not paying enough attention to\u0027, so the former is the correct word in the last sentence. Therefore, the correct sequence is BAAA..","questionImages":[],"solutionImages":[]},{"no":32,"source":"VARC","answer":0,"options":["BBBA","AABB","BAAB","ABBA"],"direction":"In the following questions, there are four sentences. Each sentence has a pair of words that are italicized and highlighted. From the italicized and highlighted words, identify the most appropriate words (A or B) to form correct sentences. Type the letters corresponding to the correct option for each sentence in the correct order. Note: Your answer should be in letters .Use the virtual keyboard to enter your answer in the box provided below","passage":"","question":"The two friends bared their hearts (A) / souls (B) to each other. It is important to learn to keep your mind (A) / head (B) during a crisis. The spoilt child had his parents eating out of his fingers (A) / hands (B). Make sure you put your best foot (A) / leg (B) forward at the interview! ____","solution":"All of these sentences involve particular idioms, the words of which do not have literal meanings and cannot be interchanged with any others, so you need to know the full idiomatic phrases in question. To \u0027bare one\u0027s soul\u0027 means to \u0027reveal one\u0027s innermost thoughts and feelings\u0027. To \u0027keep one\u0027s head\u0027 means to \u0027remain calm\u0027. To \u0027eat out of someone\u0027s hand\u0027 means to \u0027do everything someone wants\u0027. To \u0027put one\u0027s best foot forward\u0027 is to \u0027try to make a good impression\u0027. So the correct sequence is BBBA.","questionImages":[],"solutionImages":[]},{"no":33,"source":"VARC","answer":1,"options":["ABC","CD","C \u0026 E","A, D \u0026 E"],"direction":"In the following question, there are sentences or parts of sentences that form a paragraph. Identify the sentence(s) or part(s) of sentence(s) that is/are correct in terms of grammar and usage (including spelling, punctuation and logical consistency). Enter in the box provided below the letters corresponding only to the correct sentences. Note: Your answer should be in letters and in alphabetical order.Use the virtual keyboard to enter your answer in the box provided below","passage":"","question":"A. Apart from the Arab\u0027s conquest of Sind and their raids into Gujarat and Rajasthan, all in the early eighth century, B. no major confrontation with Islamic intruders are known to have taken place before the late tenth century. C. Indeed, Hindu-Muslim relations may often have been amicable. D. The Rashtrakuta king is said to have afforded generous protection to Muslim merchants. E. No formal alliance is recorded, probably because the Muslim leaders were rarely in a position to render any worthwhile aid for India\u0027s \u0027king of kings\u0027. ____","solution":"There is a punctuation error in A: the word Arab\u0027s should be plural (as indicated by the pronoun \u0027their\u0027), so the apostrophe should be after the \u0027s\u0027, not before it, i.e. Arabs\u0027. There is a subject-verb disagreement in B: \u0027confrontation\u0027 is singular, so the verb \u0027are\u0027 should also be singular, i.e. \u0027is\u0027 (alternatively, both could be in the plural). There is a preposition error in E: the correct preposition after \u0027aid\u0027 should be \u0027to\u0027 not \u0027for\u0027 in this context. Only C and D are grammatically correct.","questionImages":[],"solutionImages":[]},{"no":34,"source":"VARC","answer":1,"options":["sanctity … excommunicate","piety … extirpate","craving … expurgate","yearning … expunge"],"direction":"The following question has a sentence with two blanks. Given below it are four pairs of words. Choose the pair that best completes the sentence.","passage":"","question":"Medieval clerics recognized with dismay that music was as apt to incite lust and desire as ______, and this was a central consideration in the efforts during the Counter-Reformation to ______ the contaminating influences of secular music from the sacred.","solution":"The first part of the sentence implies that music was as likely to cause emotions such as \u0027lust\u0027 and \u0027desire\u0027, which the clerics were dismayed by, as it was to cause some emotions that they wanted to rouse. So in the first blank, we need a word opposite in meaning to \u0027lust\u0027 and \u0027desire\u0027. This rules out \u0027craving\u0027 and \u0027yearning\u0027, which mean nearly the same as \u0027lust\u0027 and \u0027desire\u0027. To \u0027excommunicate\u0027 is to \u0027expel someone from the Church\u0027, and can be applied only to people, not \u0027influences\u0027, so option [1] does not fit into the second blank. This leaves us with option [2]: \u0027piety\u0027, which means \u0027devoutness\u0027, fits in the first blank, while \u0027extirpate\u0027, which means \u0027remove or destroy completely\u0027, fits into the second blank. Hence, [2].","questionImages":[],"solutionImages":[]},{"no":35,"source":"VARC","answer":1,"options":["sanctity … excommunicate","piety … extirpate","craving … expurgate","yearning … expunge"],"direction":"The following question has a sentence with two blanks. Given below it are four pairs of words. Choose the pair that best completes the sentence.","passage":"","question":"Medieval clerics recognized with dismay that music was as apt to incite lust and desire as ______, and this was a central consideration in the efforts during the Counter-Reformation to ______ the contaminating influences of secular music from the sacred.","solution":"The first part of the sentence implies that music was as likely to cause emotions such as \u0027lust\u0027 and \u0027desire\u0027, which the clerics were dismayed by, as it was to cause some emotions that they wanted to rouse. So in the first blank, we need a word opposite in meaning to \u0027lust\u0027 and \u0027desire\u0027. This rules out \u0027craving\u0027 and \u0027yearning\u0027, which mean nearly the same as \u0027lust\u0027 and \u0027desire\u0027. To \u0027excommunicate\u0027 is to \u0027expel someone from the Church\u0027, and can be applied only to people, not \u0027influences\u0027, so option [1] does not fit into the second blank. This leaves us with option [2]: \u0027piety\u0027, which means \u0027devoutness\u0027, fits in the first blank, while \u0027extirpate\u0027, which means \u0027remove or destroy completely\u0027, fits into the second blank. Hence, [2].","questionImages":[],"solutionImages":[]}];let current=0,submitted=false,secondsLeft=60*60;const responses=Array(questions.length).fill(null),marked=Array(questions.length).fill(false),labels=['A','B','C','D'];const host=document.getElementById('host'),qbar=document.getElementById('qbar'),result=document.getElementById('result');function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}function arr(x){return Array.isArray(x)?x:(x?[x]:[])}function media(files){files=arr(files);return files.length?'<div class="media">'+files.map(f=>'<figure class="support-img"><img src="'+f+'" alt="Question image"></figure>').join('')+'</div>':''}function block(txt,cls){return txt?'<div class="block '+cls+'">'+esc(txt)+'</div>':''}function renderBar(){qbar.innerHTML=questions.map((q,i)=>'<button type="button" class="qbtn '+(i===current?'current ':'')+(responses[i]!==null?'answered ':'')+(marked[i]?'marked ':'')+'" onclick="go('+i+')">'+(i+1)+'</button>').join('')}function correctText(q){return q.answer===null||q.answer===undefined?'Solution image/text provided':'('+labels[q.answer]+') '+esc(q.options[q.answer]||('Option '+(q.answer+1)))}function render(){const q=questions[current];host.innerHTML='<div class="qhead"><div><div class="qnum">Question '+(current+1)+' of '+questions.length+'</div><div class="src">'+esc(q.source)+' | Original Q'+esc(q.no)+'</div></div><button class="submit" onclick="submitTest()" '+(submitted?'disabled':'')+'>Submit Test</button></div>'+block(q.direction,'')+block(q.passage,'passage')+'<div class="question">'+esc(q.question||'Refer to the image/question material below.')+'</div>'+media(q.questionImages)+'<div class="options">'+q.options.map((op,j)=>'<label class="option"><input type="radio" name="ans" value="'+j+'" '+(responses[current]===String(j)?'checked':'')+' '+(submitted?'disabled':'')+'> <span><strong>('+labels[j]+')</strong> '+esc(op||('Option '+(j+1)))+'</span></label>').join('')+'</div><div id="note" class="note"></div><div id="sol" class="solution"><h3>Solution</h3><div><strong>Correct answer: '+correctText(q)+'</strong></div>'+block(q.solution,'')+media(q.solutionImages)+'</div><div class="nav"><button onclick="prev()">Previous</button><button onclick="next()">Next</button><button class="mark" onclick="toggleMark()">'+(marked[current]?'Unmark':'Mark for Review')+'</button><button onclick="clearAns()" '+(submitted?'disabled':'')+'>Clear Response</button></div>';host.querySelectorAll('[name=ans]').forEach(el=>el.addEventListener('change',()=>{responses[current]=el.value;renderBar()}));if(submitted)reviewCurrent();renderBar()}function isCorrect(q,a){if(a===null)return null;if(q.answer===null||q.answer===undefined)return null;return Number(a)===Number(q.answer)}function go(i){current=i;render()}function prev(){if(current>0)go(current-1)}function next(){if(current<questions.length-1)go(current+1)}function toggleMark(){marked[current]=!marked[current];render()}function clearAns(){responses[current]=null;render()}function reviewCurrent(){const q=questions[current],r=isCorrect(q,responses[current]),note=document.getElementById('note'),sol=document.getElementById('sol');sol.style.display='block';if(r===true){note.className='note ok';note.textContent='Correct.'}else if(r===false){note.className='note bad';note.textContent='Wrong. Correct answer: '+correctText(q)}else{note.className='note muted';note.textContent='Unattempted or answer key not detected. Review the solution.'}}function submitTest(){if(submitted)return;submitted=true;let c=0,w=0,u=0,na=0;questions.forEach((q,i)=>{const r=isCorrect(q,responses[i]);if(r===true)c++;else if(r===false)w++;else if(responses[i]===null)u++;else na++});const score=c*3-w;result.style.display='block';result.innerHTML='<h2>Test Submitted</h2><div class="score"><div>Score<strong>'+score+'</strong></div><div>Correct<strong>'+c+'</strong></div><div>Wrong<strong>'+w+'</strong></div><div>Unattempted<strong>'+u+'</strong></div><div>Review only<strong>'+na+'</strong></div></div>';reviewCurrent();renderBar();result.scrollIntoView({behavior:'smooth'})}function tick(){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(secondsLeft<=0){submitTest();return}secondsLeft--}render();tick();setInterval(tick,1000);</script></body></html>
